Ping:
  ai_description: >-
    ### General Description

    This action verifies connectivity to the Cybersixgill DVE Feed service by authenticating
    with the configured credentials. It is primarily used to validate that the integration
    is correctly set up and that the provided API credentials have access to the service.


    ### Flow Description

    1. The action extracts the `Client Id` and `Client Secret` from the integration
    configuration.

    2. It initializes the `SixgillEnrichManager` with the retrieved credentials.

    3. The action calls `create_sixgill_client` to instantiate a `SixgillBaseClient`
    and attempts to retrieve an access token from the Cybersixgill API.

    4. If the authentication is successful, the action returns a success status and
    a confirmation message.


    ### Additional Notes

    This action is a connectivity test and does not perform any data enrichment or
    state-changing operations on entities or alerts.
  ai_short_description: >-
    Verifies connectivity to the Cybersixgill DVE Feed service.
  capabilities:
