Delete Token:
  ai_description: >-
    ### General Description

    Deletes a specific Webhook token using the Webhook integration. This action is
    used to revoke access to a previously generated webhook URL by removing the token
    from the external service.


    ### Flow Description

    1. The action initializes the `WebhookManager` using the configured base URL.

    2. It extracts the `Token ID` parameter provided by the user.

    3. The action calls the `delete_token` method of the `WebhookManager`, which performs
    a `DELETE` request to the external Webhook API endpoint.

    4. The action returns the status of the deletion operation.


    ### Additional Notes

    This action is destructive and permanently removes the specified token. Once deleted,
    the associated URL will become inaccessible. Ensure the correct `Token ID` is
    provided before execution.
  ai_short_description: >-
    Deletes a specific Webhook token, rendering the associated URL inaccessible.
