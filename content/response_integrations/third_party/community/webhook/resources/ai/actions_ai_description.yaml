Create Token:
  ai_description: >-
    ### General Description

    Creates a new webhook token on the configured webhook service. This action allows
    users to generate a unique URL that can be used to receive and inspect incoming
    webhooks, facilitating integration with external systems that need to send data
    to the SOAR platform.


    ### Flow Description

    1. Initialize the `WebhookManager` using the base URL retrieved from the integration
    configuration.

    2. Extract the action parameters: `Default Content`, `Default Content Type`, and
    `Timeout`.

    3. Execute the `create_token` method, which performs a POST request to the `{base_url}/token`
    endpoint with the provided configuration payload.

    4. Receive the response from the external service, which includes the token's
    `uuid`.

    5. Construct the full `webhookURL` by appending the `uuid` to the base URL.

    6. Add the resulting JSON, containing the token details and the new URL, to the
    action result.


    ### Additional Notes

    The action returns the generated webhook URL in the result JSON, which can be
    used for subsequent operations or shared with external systems. The `Timeout`
    parameter is optional and allows testing of response delays.
  ai_short_description: >-
    Creates a new webhook token and returns a unique webhook URL.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new webhook token on the external webhook service.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to create a new resource (webhook token)
