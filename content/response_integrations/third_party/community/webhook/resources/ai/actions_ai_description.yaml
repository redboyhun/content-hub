Get Webhook Response:
  ai_description: >-
    ### General Description

    Fetches webhook request data for a specific token ID from the configured Webhook
    service. This action allows users to retrieve either all requests or only the
    latest request associated with a specific webhook token, supporting both time-based
    and event-based (click) waiting conditions.


    ### Flow Description

    1. The action initializes parameters including the Token ID, the pending condition
    (TimeFrame or AwaitClick), and the response retrieval preference.

    2. If the 'TimeFrame' condition is selected, the action enters an asynchronous
    loop, waiting for the specified duration to collect requests.

    3. If the 'AwaitClick' condition is selected, the action checks for the arrival
    of the first request.

    4. The `WebhookManager` makes a GET request to the external API endpoint `{Base
    URL}/token/{Token ID}/requests` to retrieve the data.

    5. The retrieved data is filtered to remove specific user agents (e.g., Slackbot)
    and optionally restricted to the latest request.

    6. The final result is returned as a JSON object and added to the action results.


    ### Additional Notes

    This action is asynchronous and supports polling mechanisms to wait for incoming
    webhook requests. It does not modify any external or internal data, serving purely
    as a data retrieval mechanism.
  ai_short_description: >-
    Fetches webhook request data for a specific token ID from the Webhook service.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to retrieve data from a webhook service. It
      does not mutate external data or modify internal SOAR data.
