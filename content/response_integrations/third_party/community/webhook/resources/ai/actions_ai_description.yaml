Delete Token:
  ai_description: >-
    ### General Description

    Deletes a specific Webhook token from the external Webhook service using the provided
    Token ID. This action is used to manage and remove active webhook tokens, effectively
    rendering the associated URL inaccessible.


    ### Flow Description

    1. The action extracts the `Token ID` parameter provided by the user.

    2. It initializes the `WebhookManager` using the base URL configured in the integration
    settings.

    3. The action calls the `delete_token` method, which performs an HTTP DELETE request
    to the endpoint `{base_url}/token/{token_id}`.

    4. Upon successful execution, the action returns a confirmation message indicating
    the token has been deleted and updates the execution status.


    ### Additional Notes

    This action performs a destructive operation on the external Webhook service.
    Ensure that the `Token ID` provided is correct, as this action cannot be undone.
