Get Webhook Response:
  ai_description: >-
    ### General Description

    Retrieves webhook request data from an external webhook service for a specified
    token ID. This action allows analysts to monitor incoming requests to a generated
    webhook URL, supporting both time-based polling and waiting for the first request
    to arrive.


    ### Flow Description

    1. **Initialization**: The action initializes the `WebhookManager` using the base
    URL configured in the integration settings.

    2. **Parameter Extraction**: It extracts the `Token ID`, `Responses To Retrieve`
    (All or Latest), `Pending Condition` (TimeFrame or AwaitClick), and `TimeFrame`
    duration.

    3. **Execution Logic**:
       - If `Pending Condition` is set to `TimeFrame`, the action enters an asynchronous
    loop, waiting for the specified duration before calling the `get_requests` method.
       - If `Pending Condition` is set to `AwaitClick`, the action immediately calls
    `get_requests` to check for incoming data.
    4. **Data Retrieval**: The `WebhookManager.get_requests` method performs an HTTP
    GET request to `{Base URL}/token/{Token ID}/requests`.

    5. **Processing**: The action filters out specific user agents (e.g., Slackbot)
    and optionally restricts the output to the latest request if requested.

    6. **Result Output**: The retrieved data is added to the action result JSON, and
    the execution state is updated to completed or in-progress accordingly.


    ### Additional Notes

    This action is designed to be asynchronous. When using the `TimeFrame` condition,
    the action will return an `IN_PROGRESS` state until the specified time has elapsed,
    allowing the SOAR platform to re-run the action until completion.
  ai_short_description: >-
    Retrieves webhook request data for a specified token ID from an external webhook
    service.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
