Create Token:
  ai_description: >-
    ### General Description

    Creates a new webhook token on the configured Webhook service. This action allows
    users to generate a unique webhook URL that can be used for testing or integration
    purposes.


    ### Flow Description

    1. Extracts the required parameters: `Default Content`, `Default Content Type`,
    and `Timeout` from the action configuration.

    2. Initializes the `WebhookManager` with the base URL configured in the integration
    settings.

    3. Calls the `webhookManager.create_token` method, which performs a `POST` request
    to the `/token` endpoint of the external Webhook service.

    4. Constructs the full webhook URL by appending the returned UUID to the base
    URL.

    5. Adds the resulting JSON, which contains the token details and the newly created
    webhook URL, to the action result.


    ### Additional Notes

    This action creates a new resource on an external system. It does not interact
    with any entities within the Google SecOps platform.
  ai_short_description: >-
    Creates a new webhook token on the external Webhook service.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new webhook token on the external Webhook service.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to create a new webhook token on the external
      Webhook service (can_mutate_external_data=true). It does not fetch context data
      or update internal entities.
  categories:
    enrichment: false
    reasoning: >-
      The action creates a new resource (webhook token) on an external system. It
