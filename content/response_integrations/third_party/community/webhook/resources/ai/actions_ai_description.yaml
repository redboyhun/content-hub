Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the configured Webhook integration by sending a GET request
    to the base URL. This action verifies that the integration is reachable and properly
    configured.


    ### Flow Description

    1. The action initializes the `SiemplifyAction` and retrieves the `URL` configuration
    from the Webhook integration settings.

    2. A `WebhookManager` instance is created using the retrieved base URL.

    3. The action calls the `test_connectivity` method, which performs a `GET` request
    to the base URL.

    4. The action returns a success or failure status based on the connectivity response.


    ### Additional Notes

    This action is strictly for connectivity testing and does not perform any data
    enrichment, entity updates, or remediation tasks.
