Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Webhook integration by sending a GET request to
    the configured base URL. This action verifies that the integration is properly
    configured and reachable.


    ### Flow Description

    1. Initialize the `SiemplifyAction` and retrieve the `URL` configuration from
    the Webhook integration settings.

    2. Instantiate the `WebhookManager` with the retrieved base URL.

    3. Execute the `test_connectivity` method, which performs an HTTP GET request
    to the base URL.

    4. Return a success message if the connection is established, or an error message
    if the connection fails.


    ### Additional Notes

    This action is used for verifying the integration configuration and connectivity.
    It does not perform any data enrichment or state changes.
