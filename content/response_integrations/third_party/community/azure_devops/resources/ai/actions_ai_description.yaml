    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity test by calling `get_projects()`. It does
      not mutate external or internal data.
  categories:
    enrichment: false
    reasoning: >-
      The action is named 'Ping' and is a connectivity test. Per instructions, 'Actions
      named Ping must not be categorized as enrichment actions.' It does not perform
      any remediation.
    remediation: false
