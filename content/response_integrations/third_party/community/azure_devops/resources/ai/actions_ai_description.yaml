Ping:
  ai_description: >-
    General Description

    Tests connectivity to the Azure DevOps platform by attempting to retrieve the
    list of projects. This action verifies that the provided credentials and configuration
    parameters are valid for establishing a connection to the Azure DevOps API.


    Flow Description

    1. Extracts configuration parameters: `Personal Access Token`, `Organization`,
    and `Base URL`.

    2. Initializes an Azure DevOps connection using `BasicAuthentication` with the
    provided token.

    3. Attempts to retrieve the list of projects using the `core_client.get_projects()`
    method.

    4. Returns a success or failure message based on the connection attempt.


    Additional Notes

    This action is a connectivity test and does not perform any data enrichment or
    remediation.
  ai_short_description: >-
    Tests connectivity to the Azure DevOps platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
