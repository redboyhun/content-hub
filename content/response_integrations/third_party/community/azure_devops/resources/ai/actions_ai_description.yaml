Trigger Azure Build:
  ai_description: >-
    ### General Description

    Triggers an Azure DevOps build pipeline and monitors its execution status. This
    action allows users to initiate automated workflows or deployments in Azure DevOps
    directly from the SOAR platform by specifying a build definition ID and passing
    custom variables.


    ### Flow Description

    1. The action extracts configuration parameters (Project, Organization, Personal
    Access Token, Base URL) and action parameters (Build Definition Id, Build Variables).

    2. A POST request is sent to the Azure DevOps API to trigger a new build with
    the specified definition ID and variables.

    3. The action returns the `build_id` of the triggered build to the SOAR platform.

    4. The action enters an asynchronous state, where the `query_job` function periodically
    polls the Azure DevOps API via a GET request using the `build_id` to check the
    build status.

    5. The action continues to poll until the build reaches a terminal state (e.g.,
    succeeded, failed, or canceled), at which point it reports the final status.


    ### Additional Notes

    This action is designed to run asynchronously to accommodate the time required
    for build pipelines to complete. Ensure that the provided Personal Access Token
    has the necessary permissions to trigger and query builds in the target Azure
    DevOps project.
  ai_short_description: >-
    Triggers an Azure DevOps build pipeline and monitors its execution status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Triggers a new build pipeline in Azure DevOps.
    fetches_data: true
    internal_data_mutation_explanation: null
