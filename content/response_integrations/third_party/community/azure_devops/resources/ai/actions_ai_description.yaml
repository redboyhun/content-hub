Wait Until Web Resource Is Up:
  ai_description: >-
    General Description

    Checks the availability of a web resource by performing an HTTP GET request.


    Flow Description

    1. The action extracts the `URL` parameter provided by the user.

    2. It performs an HTTP GET request to the specified URL with a 5-second timeout.

    3. If the request is successful (HTTP 2xx), the action returns `True` and sets
    the execution state to `COMPLETED`.

    4. If the request fails or the resource is unreachable, the action returns `False`
    and sets the execution state to `INPROGRESS`, signaling the SOAR platform to retry
    the action.


    Additional Notes

    This action is designed for asynchronous workflows where the platform polls the
    resource until it becomes available.
  ai_short_description: >-
    Checks the availability of a web resource via an HTTP GET request.
  capabilities:
