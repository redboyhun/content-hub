Trigger Azure Build:
  ai_description: >-
    Triggers an Azure DevOps pipeline build and monitors its completion status.


    ### Flow Description

    1. The action extracts configuration parameters (Project, Organization, Token,
    Base URL) and action parameters (Build Definition Id, Build Variables).

    2. The `main()` function sends a POST request to the Azure DevOps API to trigger
    a new build with the provided definition ID and variables.

    3. The action returns the new build ID.

    4. The `query_job()` function periodically checks the status of the triggered
    build via a GET request to the Azure DevOps API.

    5. The action reports the final build status and result (e.g., succeeded, failed).


    ### Additional Notes

    This action is asynchronous and uses a job mechanism to poll for the build result.
  ai_short_description: >-
    Triggers an Azure DevOps pipeline build and monitors its status until completion.
