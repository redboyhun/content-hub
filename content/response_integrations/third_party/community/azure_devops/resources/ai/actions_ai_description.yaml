Ping:
  ai_description: >-
    Tests connectivity to the Azure DevOps environment by attempting to retrieve a
    list of projects using the provided credentials. ### Flow Description 1. Extracts
    the 'Personal Access Token', 'Organization', and 'Base URL' from the integration
    configuration. 2. Initializes a connection to the Azure DevOps API using 'BasicAuthentication'.
    3. Attempts to retrieve the list of projects using the 'core_client.get_projects()'
    method. 4. Returns a success or failure message based on the outcome of the API
    call. ### Additional Notes This action is used to verify that the integration
    configuration is correct and that the SOAR platform can communicate with the Azure
    DevOps instance.
