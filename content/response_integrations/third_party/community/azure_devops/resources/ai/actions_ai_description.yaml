Wait Until Web Resource Is Up:
  ai_description: >-
    ### General Description

    Checks the availability of a specific web resource by sending an HTTP GET request
    to the provided URL. This action is designed to verify if a web resource is reachable
    and returns a success status if the resource responds with a 200-299 status code.


    ### Flow Description

    1. Extract the `URL` parameter from the action configuration.

    2. Perform an HTTP GET request to the specified URL with a 5-second timeout.

    3. Evaluate the response status code. If the status code indicates success (200-299),
    the resource is considered "up".

    4. If the resource is "up", the action completes with a success status.

    5. If the resource is "down" (request fails or returns an error), the action sets
    the execution state to "In Progress", allowing the playbook to retry the check.


    ### Additional Notes

    This action is designed to be used as an asynchronous polling mechanism within
    a playbook to wait for a web resource to become available.
