Upload Image From File Path:
  ai_description: >-
    ### General Description

    Uploads an image file from a specified local file path to the Imgbb image hosting
    service. This action facilitates the sharing or storage of images by converting
    local files into a hosted URL.


    ### Flow Description

    1. The action retrieves the `Image File Path` parameter provided by the user.

    2. It reads the image file from the local filesystem and converts the binary content
    into a base64-encoded string.

    3. It executes a POST request to the Imgbb API (`https://api.imgbb.com/1/upload`)
    with the base64-encoded image data.

    4. It parses the JSON response from the API to extract the URL of the uploaded
    image.

    5. It adds the resulting image URL as a link to the action result and attaches
    the full JSON response to the action.


    ### Additional Notes

    This action requires a valid Imgbb API key configured in the integration settings.
    The provided file path must be accessible to the SOAR environment where the action
    is executed.
