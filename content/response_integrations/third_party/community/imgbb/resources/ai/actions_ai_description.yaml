Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Imgbb service by performing a sample image upload. This
    action is designed to verify that the integration with Imgbb is correctly configured
    and that the API is reachable.


    ### Flow Description

    1. Retrieves the API key from the Imgbb integration configuration.

    2. Constructs the upload URL with the API key and expiration parameters.

    3. Sends a POST request to the Imgbb API with a hardcoded base64 image payload.

    4. Validates the response status using `response.raise_for_status()`.

    5. Terminates the action with a success message using `siemplify.end()`.


    ### Additional Notes

    This action is intended for connectivity testing and performs an actual upload
    operation to the external Imgbb service. It does not process any entities or perform
    security-related operations.
  ai_short_description: >-
    Tests connectivity to the Imgbb service by uploading a sample image.
