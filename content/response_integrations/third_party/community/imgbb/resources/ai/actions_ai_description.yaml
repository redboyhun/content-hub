Upload Image From Base64:
  ai_description: >-
    ### General Description

    Uploads a base64-encoded image to the Imgbb image hosting service. This action
    facilitates the sharing of visual evidence or artifacts by converting raw base64
    data into a publicly accessible URL.


    ### Flow Description

    1. The action retrieves the `API Key` and `Verify SSL` configuration from the
    Imgbb integration settings.

    2. It extracts the `Image in base64` parameter provided by the user.

    3. It performs an HTTP POST request to the Imgbb API (`https://api.imgbb.com/1/upload`)
    with the base64 image data.

    4. The action parses the JSON response from the API.

    5. If the upload is successful, it extracts the image URL, adds it as a link to
    the action result, and includes the URL in the JSON result.

    6. If the upload fails, it captures the error message from the API response.

    7. The action concludes by returning a success or failure status message.


    ### Additional Notes

    This action interacts with an external service (Imgbb) to host images. Ensure
    the API key is valid and the base64 string is correctly formatted.
  ai_short_description: >-
    Uploads a base64-encoded image to Imgbb and returns the hosted image URL.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads an image to the Imgbb service, creating a new resource (image) on their
      platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to upload an image to Imgbb, which mutates
      external data (creates a new image resource). It does not fetch data, nor does
      it modify internal SecOps data (entities, insights, or comments).
  categories:
