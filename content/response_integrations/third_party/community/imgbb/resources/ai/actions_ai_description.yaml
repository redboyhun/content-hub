Upload Image From Base64:
  ai_description: >-
    ### General Description

    Uploads a base64-encoded image to the Imgbb image hosting service. This action
    allows users to store images externally and retrieve a public URL for the uploaded
    content.


    ### Flow Description

    1. Retrieves the `API Key` and `Verify SSL` configuration from the Imgbb integration
    settings.

    2. Extracts the `Image in base64` parameter provided by the user.

    3. Constructs a POST request to the Imgbb API endpoint (`https://api.imgbb.com/1/upload`)
    with the base64 image data.

    4. Parses the API response to retrieve the uploaded image URL.

    5. Adds the image URL as a link to the action result.

    6. Adds the JSON result containing the image URL or error message to the action.

    7. Terminates the action with a success or failure status message.


    ### Additional Notes

    The action requires a valid Imgbb API key. The image is uploaded with a default
    expiration of 600 seconds.
