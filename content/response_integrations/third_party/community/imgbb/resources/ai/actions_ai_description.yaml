    external_data_mutation_explanation: >-
      Uploads a sample image to the Imgbb service to test connectivity.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Imgbb API to upload an image (can_mutate_external_data=true).
