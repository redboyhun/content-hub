Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Imgbb API by performing a test image upload. This action
    verifies that the integration is correctly configured and that the API is reachable.


    ### Flow Description

    1. Retrieves the `API Key` from the integration configuration.

    2. Constructs the API request URL for the Imgbb upload endpoint.

    3. Executes a POST request to the Imgbb API with a hardcoded test image payload.

    4. Validates the response using `raise_for_status()` to ensure the API is reachable
    and the key is valid.

    5. Finalizes the action with a success message using `siemplify.end()`.


    ### Additional Notes

    This action is designed solely for connectivity verification and does not process
    any entities or perform meaningful data analysis.
  ai_short_description: Tests connectivity to the Imgbb API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Performs a POST request to upload a test image to Imgbb to verify connectivity.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to upload a test image to Imgbb to verify
      connectivity (can_mutate_external_data=true). It does not fetch context data
      or update internal entities.
  categories:
    enrichment: false
    reasoning: >-
      The action is a connectivity test ('Ping'). It does not fetch data for entities
      or perform remediation.
    remediation: false
