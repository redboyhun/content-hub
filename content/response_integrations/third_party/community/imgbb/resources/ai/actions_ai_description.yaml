Upload Image From File Path:
  ai_description: >-
    ### General Description

    Uploads an image file from a specified local path to the Imgbb image hosting service.
    This action facilitates the sharing of forensic images or evidence by hosting
    them externally and returning a direct URL.


    ### Flow Description

    1. The action extracts the `Image File Path` parameter provided by the user.

    2. It reads the image file from the local filesystem and converts the binary content
    into a base64-encoded string.

    3. A POST request is sent to the Imgbb API (`https://api.imgbb.com/1/upload`)
    containing the base64-encoded image data.

    4. The action parses the API response to extract the URL of the uploaded image.

    5. The resulting image URL is added as a link to the action result using `siemplify.result.add_link`.

    6. The full JSON response from the API is attached to the action result using
    `siemplify.result.add_result_json`.


    ### Additional Notes

    This action requires a valid Imgbb API key configured within the integration settings.
    The action does not modify existing case or alert data; it strictly performs an
    external upload and returns the resulting link.
