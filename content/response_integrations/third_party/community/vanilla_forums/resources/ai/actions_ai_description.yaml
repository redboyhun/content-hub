    1. Extracts configuration parameters (API Token, URL) and action parameters (Leaderboards,
    Amount Limit, From, To).

    2. Splits the `Leaderboards` parameter into a list of individual boards.

    3. Iterates through each leaderboard name.

    4. Calls the `get_leaderboard_analytics` method in the `VanillaManager` class,
