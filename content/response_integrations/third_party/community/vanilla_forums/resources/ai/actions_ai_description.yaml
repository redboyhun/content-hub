Search User By Email and Name:
  ai_description: >-
    ### General Description

    Searches for a user in the VanillaForums platform using their email address and
    username. This action verifies the existence of a user by querying the platform
    for both identifiers and returns a JSON object containing the search results and
    user details if found.


    ### Flow Description

    1. The action extracts the `User Name` and `User Email` parameters provided by
    the user.

    2. It initializes the `VanillaManager` using the configured API token and base
    URL.

    3. The action calls `vanillaManager.search_user_by_email` to check if the provided
    email address exists in the system.

    4. The action calls `vanillaManager.search_user_by_name` to check if the provided
    username exists in the system.

    5. The results are compiled into a JSON object (`res_json`) indicating the success
    of each search and including the user details if the email was found.

    6. The action outputs the result JSON and terminates with a status message indicating
    whether the user was found.


    ### Additional Notes

    This action is a read-only operation. It does not modify any data within the VanillaForums
    platform or the Google SecOps SOAR environment. It is intended for verification
    and contextual enrichment purposes.
