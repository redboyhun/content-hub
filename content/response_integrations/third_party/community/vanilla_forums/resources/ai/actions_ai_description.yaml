Generate Password:
  ai_description: >-
    ### General Description

    Generates a random password string based on a specified length. This action uses
    the VanillaForums integration context but performs the generation locally using
    Python's random library. It enforces a minimum length of 6 characters.


    ### Flow Description

    1. Extract the `Length` parameter from the action configuration.

    2. Validate that the requested length is at least 6 characters.

    3. Initialize the `VanillaManager`.

    4. Invoke the `genereate_pass` method to create a random string consisting of
    one uppercase letter, one lowercase letter, and the remaining characters as digits.

    5. Return the generated password as the action result.


    ### Additional Notes

    This action does not interact with the VanillaForums API to generate the password;
    it is a local utility function.
