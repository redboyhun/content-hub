Add User:
  ai_description: >-
    ### General Description

    Adds a new user to the Vanilla Forums platform. This action automates the user
    provisioning process by taking user details, validating the password, checking
    for existing username conflicts, and creating the account in the external system.


    ### Flow Description

    1. Extracts input parameters: First Name, Last Name, Email, Role ID, Password,
    and optional configuration settings (Override Name Duplicity, Additional Identifiers,
    Photo URL, Email Confirmed).

    2. Validates the provided password against security standards (must include letters
    and digits, and be at least 6 characters long).

    3. Searches for existing users with the same name using the `search_user_by_name`
    method (GET request to `/v2/users/by-names`).

    4. If a name conflict exists, attempts to resolve it by appending a special character
    from the `Additional Identifiers` list to the username, provided `Override Name
    Duplicity` is enabled.

    5. Calls the `add_new_user` method (POST request to `/v2/users`) to create the
    user in Vanilla Forums with the specified details.

    6. Returns the created user's details in the action result JSON.


    ### Additional Notes

    The action includes logic to handle username duplicity by inserting special characters
    between the first and last name if allowed. It does not modify any internal SOAR
    entities or cases.
  ai_short_description: >-
    Adds a new user to the Vanilla Forums platform with specified details and role.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new user account in the Vanilla Forums platform.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to search for existing users and a POST request
      to create a new user in Vanilla Forums. It does not mutate internal SOAR data
      or entities.
  categories:
    enrichment: false
    reasoning: >-
      The action creates a new user in an external system (Vanilla Forums). It does
      not fetch data to enrich alerts or entities, nor does it perform security remediation
      (e.g., blocking, isolating). Therefore, it is neither an enrichment nor a remediation
      action.
