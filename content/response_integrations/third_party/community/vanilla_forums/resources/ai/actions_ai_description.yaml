Ping:
  ai_description: >-
    ### General Description

    Checks the connectivity between the SOAR platform and the VanillaForums API. This
    action verifies that the configured API Token and URL are valid and that the platform
    can successfully communicate with the VanillaForums service.


    ### Flow Description

    1. The action initializes the `VanillaManager` using the API Token and Base URL
    retrieved from the integration configuration.

    2. The `test_connectivity` method is invoked.

    3. The action performs an HTTP GET request to the `/v2/categories` endpoint of
    the VanillaForums API with `maxDepth=1` and `limit=1` parameters.

    4. The response is validated to ensure a successful connection (HTTP 200 OK).

    5. If the request is successful, the action returns a success message; otherwise,
    it catches the exception and returns an error message indicating the failure.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying the integration
    setup. It does not perform any operations on entities or alerts.
