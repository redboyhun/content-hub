    Fetches analytics data for specified leaderboards from the VanillaForums platform
    within a defined date range. This action allows analysts to retrieve performance
    metrics for community leaderboards to monitor engagement or activity levels.


    ### Flow Description

    1. The action extracts the required parameters: `Leaderboards` (a comma-separated
    list), `Amount Limit`, `From` (start date), and `To` (end date).

    2. It initializes the `VanillaManager` using the integration's API token and base
    URL.

    3. The action iterates through the provided list of leaderboards.

    4. For each leaderboard, it performs an API call (GET request to `/v2/analytics/leaderboard`)
    via the `VanillaManager.get_leaderboard_analytics` method, passing the limit and
    date range parameters.

    5. The retrieved analytics data is aggregated into a JSON list.

    6. Finally, the action outputs the aggregated JSON results to the SOAR platform
    and completes the execution.


