Add User:
  ai_description: >-
    ### General Description

    Adds a new user to the Vanilla Forums platform. This action automates the user
    creation process, including validation of password complexity, checking for existing
    usernames to prevent conflicts, and applying custom naming conventions if duplicates
    are found.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves configuration parameters, including
    user details (First Name, Last Name, Email, Role ID, Password) and settings for
    handling name duplicity.

    2. **Validation**: The action validates the provided password against security
    standards (minimum 6 characters, must include letters and digits).

    3. **Duplicate Check**: The action calls the `search_user_by_name` API endpoint
    to check if a user with the specified name already exists in Vanilla Forums.

    4. **Name Resolution**: If a duplicate is found and `Override Name Duplicity`
    is enabled, the action iterates through the provided `Additional Identifiers`
    (special characters) to construct a unique username.

    5. **User Creation**: The action executes a POST request to the `/v2/users` endpoint
    via the `VanillaManager` to create the new user account with the specified role,
    email, and profile details.

    6. **Result Reporting**: The action returns the created user's details in the
    result JSON and updates the execution status.


    ### Additional Notes

    - This action requires a valid API Token and Base URL for the Vanilla Forums integration.

    - The action does not operate on SOAR entities; it uses input parameters provided
    directly to the action.
  ai_short_description: >-
    Adds a new user to the Vanilla Forums platform, including duplicate name handling
    and password validation.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new user account in the Vanilla Forums system.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data by searching for existing users to check for duplicates
      (fetches_data=true). It mutates external data by creating a new user account
      in Vanilla Forums (can_mutate_external_data=true). It does not mutate internal
      SOAR data, update entities, create insights, or modify alerts.
