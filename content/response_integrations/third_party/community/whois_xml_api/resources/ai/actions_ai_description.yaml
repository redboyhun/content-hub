Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and URL entities by retrieving registration information from
    the Whois XML API. This action queries the external service for domain or host
    registration details and updates the entity's additional properties within the
    Google SecOps platform, providing analysts with valuable context regarding the
    ownership and registration status of the indicators.


    ### Flow Description

    1. The action initializes by extracting the `API Key` from the integration configuration.

    2. It iterates through the provided `target_entities`.

    3. For each entity, it checks if the type is `HOSTNAME` (and not internal) or
    `URL`.

    4. If the entity matches, it constructs a request URL using the entity identifier
    and the API key.

    5. It performs an HTTP GET request to the Whois XML API (`https://www.whoisxmlapi.com/whoisserver/WhoisService`).

    6. Upon receiving a successful response, it parses the `registrant` details from
    the JSON response.

    7. It updates the entity's `additional_properties` with the retrieved registrant
    data.

    8. Finally, it calls `siemplify.update_entities` to save the enriched data back
    to the SecOps platform and adds the full JSON result to the action output.


    ### Additional Notes

    This action performs enrichment only. It does not modify external systems or create
    insights, but it does update the entity metadata within the case.
  ai_short_description: >-
    Enriches Hostname and URL entities with registration data retrieved from the Whois
    XML API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entity's `additional_properties` with registrant details retrieved
      from the Whois XML API and saves these changes to the SecOps platform.
    reasoning: >-
      The action fetches data from an external API (Whois XML API) via HTTP GET. It
      does not mutate external data. It mutates internal data by updating entity properties
      using `siemplify.update_entities`.
