Ping:
  ai_description: >-
    ### General Description

    This action verifies connectivity to the Whois XML API service by performing a
    test request. It validates the provided API key to ensure the integration is correctly
    configured and authorized.


    ### Flow Description

    1. The action retrieves the `API Key` from the integration configuration.

    2. It constructs a request URL to the Whois XML API endpoint using the provided
    API key and a test domain (`google.com`).

    3. It executes an HTTP GET request to the API.

    4. It checks the response content for authentication errors.

    5. If the request is successful, it terminates with a "Successful Connection"
    status.


    ### Additional Notes

    This action is typically used for troubleshooting or verifying integration health.
    It does not process any entities or perform data enrichment.
