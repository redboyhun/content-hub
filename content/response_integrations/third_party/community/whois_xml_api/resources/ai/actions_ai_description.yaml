Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and URL entities using the Whois XML API. This action retrieves
    domain registration details, such as registrant information, and updates the entity's
    additional properties within the SOAR platform to provide context for investigations.


    ### Flow Description

    1. The action extracts the API key from the integration configuration.

    2. It iterates through the provided target entities.

    3. It filters the entities to process only Hostnames (that are not internal) and
    URLs.

    4. For each valid entity, the action performs a GET request to the Whois XML API
    to retrieve registration data.

    5. The JSON response is parsed to extract registrant details.

    6. The entity's `additional_properties` are updated with the retrieved registrant
    information.

    7. The action updates the entities in the SOAR platform using `siemplify.update_entities`.

    8. The raw JSON result is added to the action results for reference.


    ### Additional Notes

    This action performs enrichment by updating entity properties. It does not modify
    external systems or create case insights.
  ai_short_description: >-
    Enriches Hostname and URL entities with domain registration data retrieved from
    the Whois XML API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with Whois registration data.
    reasoning: >-
      The action fetches data from an external API (fetches_data=true) and updates
      internal entity properties (can_update_entities=true). It does not mutate external
      data or modify alert/case data.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external API (Whois XML API) and updates internal
      entity properties. It does not mutate external systems or perform remediation
      tasks. Therefore, it is classified as an enrichment action.
    remediation: false
