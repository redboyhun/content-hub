Get Domain Details:
  ai_description: >-
    ### General Description

    Fetches comprehensive WHOIS information for a specified domain using the WHOIS
    XML API. This action retrieves registration details, availability status, and
    other domain-related metadata to assist in threat intelligence gathering and investigation.


    ### Flow Description

    1. The action extracts the required API Key from the integration configuration.

    2. It retrieves the 'Domain Name' and 'Check availability' parameters provided
    by the user.

    3. It constructs a GET request URL for the WHOIS XML API, incorporating the domain
    name and the availability check flag.

    4. The action executes the HTTP GET request to the external WHOIS XML API service.

    5. Upon receiving the response, the action adds the raw JSON data to the action
    result and the context details for further use in the playbook.


    ### Additional Notes

    This action is strictly read-only and does not modify any external systems or
    internal case data. It is intended for enrichment purposes only.
