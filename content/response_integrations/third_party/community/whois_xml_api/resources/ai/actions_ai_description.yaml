Ping:
  ai_description: >-
    ### General Description

    This action verifies connectivity to the Whois XML API service by performing a
    test request. It ensures that the provided API key is valid and that the integration
    can successfully communicate with the external service.


    ### Flow Description

    1. Extract the API Key from the integration configuration.

    2. Construct a request URL using the API Key and a test domain (google.com).

    3. Execute a GET request to the Whois XML API endpoint.

    4. Validate the response to ensure authentication is successful.

    5. Return a success message if the connection is established.


    ### Additional Notes

    This action is used for connectivity testing and does not perform any data enrichment
    or remediation.
