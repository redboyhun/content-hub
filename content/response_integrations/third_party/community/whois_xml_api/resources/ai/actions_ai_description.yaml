Get Domain Details:
  ai_description: >-
    ### General Description

    Fetches WHOIS information for a specified domain using the WHOIS XML API. This
    action retrieves registration details, availability status, and other domain-related
    metadata, providing valuable context for threat intelligence and investigation.


    ### Flow Description

    1. The action extracts the required API Key from the integration configuration.

    2. It retrieves the `Domain Name` and the optional `Check availability` flag from
    the action parameters.

    3. It constructs a GET request URL to the WHOIS XML API endpoint, appending the
    domain name and availability check parameter.

    4. The action executes the HTTP GET request to the external WHOIS XML API service.

    5. The retrieved JSON response is added to the action results using `siemplify.result.add_result_json`
    and `siemplify.result.add_json` for use in subsequent playbook steps.


    ### Additional Notes

    This action does not operate on entities directly; it requires a domain name to
    be provided as an input parameter.
