Enrich URL:
  ai_description: >-
    Enriches URL entities using Pulsedive threat intelligence. This action retrieves
    threat intelligence including risk levels, risk factors, and comments. It evaluates
    risk based on thresholds, updates the entity's suspicious status, and generates
    an insight with the analysis results.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Key, Verify SSL) and action
    parameters (Max Comments, Threshold, etc.).

    2. Filters `target_entities` to process only those with `EntityTypes.URL`.

    3. For each URL, calls `PulsediveManager.get_indicator_data` to retrieve threat
    intelligence, including risk levels and comments.

    4. Compares the retrieved risk score against the configured `Threshold`. If the
    risk meets or exceeds the threshold, marks the entity as suspicious.

    5. Updates the entity's `additional_properties` with enrichment data.

    6. If comments are retrieved, adds a data table to the action results.

    7. Generates an entity insight if the entity is suspicious or if the `Only Suspicious
    Entity Insight` flag is false.

    8. Updates the entities in the SOAR platform and adds a JSON result containing
    the enrichment data.


    ### Additional Notes

    This action performs enrichment and does not mutate external systems.
