    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes, adds insights, and adds data tables to the case.
    reasoning: >-
      The action makes a GET request to Pulsedive API to fetch IP data. It does not
      mutate external data but updates internal entities and creates insights.
  categories:
