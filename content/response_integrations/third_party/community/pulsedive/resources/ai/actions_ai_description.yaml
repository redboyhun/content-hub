Enrich IP:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using threat intelligence from Pulsedive. This action
    retrieves comprehensive indicator data, including risk scores, risk factors, and
    optional community comments, to provide context for security investigations.


    ### Flow Description

    1. **Initialization**: Extracts configuration parameters (API Root, API Key, Verify
    SSL) and action parameters (Threshold, Retrieve Comments, etc.).

    2. **Filtering**: Filters the `target_entities` to process only those of type
    `ADDRESS`.

    3. **Data Retrieval**: For each valid IP, the action calls the Pulsedive API (`/api/info.php`)
    to fetch indicator details.

    4. **Risk Evaluation**: Compares the retrieved risk score against the user-defined
    `Threshold`. If the score meets or exceeds the threshold, the entity is marked
    as suspicious (`entity.is_suspicious = True`).

    5. **Enrichment**: Updates the entity's `additional_properties` with the retrieved
    enrichment data and sets `is_enriched` to true.

    6. **Insight Generation**: Creates an entity insight containing the risk assessment,
    risk factors, and threat details. If `Only Suspicious Entity Insight` is enabled,
    insights are only created for entities meeting the risk threshold.

    7. **Result Reporting**: Constructs a data table for comments (if retrieved) and
    adds it to the case wall. Finally, updates the entities in the SOAR platform and
    adds the full JSON result to the action output.


    ### Additional Notes

    The action allows for granular control over insight generation and comment retrieval,
    enabling analysts to focus on high-risk indicators while maintaining a clean case
    wall.
  ai_short_description: >-
    Enriches IP Address entities with threat intelligence from Pulsedive, including
    risk assessment and optional comments.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
