Get Threat Details:
  ai_description: "### General Description\nRetrieves comprehensive threat intelligence\
    \ details from Pulsedive based on a provided Threat Name or Threat ID. This action\
    \ fetches data such as threat category, risk levels, risk factors, and associated\
    \ news or comments. It provides visibility into threat intelligence, allowing\
    \ analysts to assess the risk and context of a specific threat within the SOAR\
    \ platform.\n\n### Flow Description\n1. **Parameter Extraction**: The action extracts\
    \ configuration parameters (API Root, API Key, Verify SSL) and action parameters\
    \ (Threat Name, Threat ID, Retrieve Comments, Split Risk, Create Insight).\n2.\
    \ **Data Retrieval**: The action initializes the `PulsediveManager` and performs\
    \ a GET request to the Pulsedive API to fetch threat details using either the\
    \ provided `Threat Name` or `Threat ID`.\n3. **Data Processing**: \n    * If threat\
    \ data is retrieved, the action constructs a CSV table of comments (if `Retrieve\
