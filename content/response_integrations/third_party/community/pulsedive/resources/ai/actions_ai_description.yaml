Scan Indicator:
  ai_description: >-
    General Description

    Scans indicators (such as URLs, IPs, or domains) using Pulsedive to retrieve comprehensive
    threat intelligence, risk scores, and associated comments. This action helps analysts
    understand the risk profile of an indicator by leveraging Pulsedive's analysis
    engine.


    Flow Description

    1. The action initiates an asynchronous scan request to Pulsedive for the provided
    indicators using the `scan_indicator` API call.

    2. It periodically checks the status of the scan using the `is_scan_report_ready`
    API call until the analysis is complete.

    3. Once the scan is complete, it retrieves the detailed report using the `get_scan_indicator_data`
    API call.

    4. The action evaluates the risk score against the user-configured threshold.

    5. If the risk meets the threshold, it marks the entity as suspicious.

    6. It enriches the entity with additional properties, adds insights to the case,
    and attaches a data table of comments if requested.


    Additional Notes

    This action is asynchronous and may require multiple runs to complete. It is designed
    to be used in workflows where indicator analysis is required.
