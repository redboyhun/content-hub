Scan Indicator:
  ai_description: >-
    ### General Description

    This action performs a scan on a specified indicator (e.g., IP, URL, Hash) using
    the Pulsedive platform. It allows users to choose between 'Active' or 'Passive'
    scan types to retrieve threat intelligence, risk scores, and associated comments.
    The action evaluates the indicator's risk against a configurable threshold, updates
    the entity's suspicious status, and enriches the entity with detailed threat data.


    ### Flow Description

    1. **Initialization**: The action extracts configuration parameters (API Root,
    API Key) and action parameters (Scan Type, Threshold, etc.).

    2. **Submission**: The action iterates through the target entities and calls the
    Pulsedive API (`POST /api/analyze.php`) to initiate a scan for each indicator.

    3. **Status Monitoring**: The action periodically checks the status of the scan
    reports using the Pulsedive API (`POST /api/analyze.php`) until all scans are
    completed.

    4. **Data Retrieval & Enrichment**: Once scans are finished, the action retrieves
    the detailed scan results using the Pulsedive API (`POST /api/analyze.php`).

    5. **Evaluation**: The action compares the retrieved risk score against the user-defined
    threshold. If the risk meets or exceeds the threshold, the entity is marked as
    suspicious.

    6. **Finalization**: The action updates the entities with the retrieved enrichment
    data, generates insights, and adds a data table containing comments to the case
    wall.


    ### Additional Notes

    - The action supports both 'Active' (more noisy) and 'Passive' (less noisy) scan
    types.

    - The action can be configured to only create insights for entities deemed 'suspicious'
    based on the threshold.

    - The action adds a data table to the case wall if comments are retrieved.
