Get Threat Details:
  ai_description: >-
    ### General Description

    Retrieves comprehensive threat intelligence details from Pulsedive based on a
    specified Threat Name or Threat ID. This action queries the Pulsedive platform
    to gather information such as threat categories, risk summaries, wiki summaries,
    and associated news. It provides the flexibility to include comments and split
    risk data in the results, and can optionally generate a case insight within the
    SecOps platform to summarize the findings.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts configuration parameters (API
    Root, API Key, Verify SSL) and action parameters (Threat Name, Threat ID, Retrieve
    Comments, Split Risk, Create Insight).

    2. **Initialization**: Initializes the `PulsediveManager` with the provided credentials.

    3. **Data Retrieval**: Calls the `manager.get_threats` method using either the
    provided `Threat Name` or `Threat ID` to fetch threat data from Pulsedive.

    4. **Result Processing**:
        - If threat data is retrieved, it constructs a CSV table of comments (if `Retrieve
    Comments` is enabled) and adds it to the action results.
        - It adds the full threat details as a JSON result.
        - If `Create Insight` is enabled, it creates a case insight containing the
    threat details.
    5. **Error Handling**: Catches and logs exceptions, such as `PulsediveNotFoundException`
    or `PulsediveLimitReachedException`, and updates the action status accordingly.


    ### Additional Notes

    - This action does not operate on target entities; it relies entirely on the input
    parameters provided by the user.

    - The action supports optional retrieval of comments and news associated with
    the threat.
  ai_short_description: >-
    Retrieves threat intelligence details from Pulsedive using a Threat Name or Threat
