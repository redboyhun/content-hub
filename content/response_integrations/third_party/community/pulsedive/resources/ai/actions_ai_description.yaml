Enrich IP:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using Pulsedive threat intelligence. This action
    retrieves threat intelligence including risk levels, risk factors, and comments.
    It evaluates risk based on a configurable threshold, updates the entity's suspicious
    status, and generates an insight with the analysis results.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Key, Verify SSL) and action
    parameters (Threshold, Retrieve Comments, Only Suspicious Entity Insight, Max
    Comments To Return).

    2. Filters target entities for IP addresses (`EntityTypes.ADDRESS`).

    3. Queries the Pulsedive API (`manager.get_indicator_data`) for indicator data.

    4. Evaluates the risk score against the configured threshold.

    5. Updates the entity's suspicious status and additional properties.

    6. Adds insights and data tables (comments) to the case.

    7. Updates the entities in the SecOps platform.


    ### Additional Notes

    Requires a valid Pulsedive API key.
  ai_short_description: >-
    Enriches IP Address entities using Pulsedive threat intelligence.
