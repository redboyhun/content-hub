Enrich URL:
  ai_description: >-
    ### General Description

    Enriches URL entities using threat intelligence data from Pulsedive. This action
    retrieves comprehensive indicator information, including risk levels, risk factors,
    and community comments. It evaluates the URL's risk against a user-defined threshold
    to determine if it should be flagged as suspicious, updates the entity's profile
    with enrichment data, and provides detailed insights and data tables for analyst
    review.


    ### Flow Description

    1. The action initializes the Pulsedive manager using the provided API credentials.

    2. It filters the target entities to process only those of type `URL`.

    3. For each URL entity, it calls the Pulsedive API (`info` endpoint) to retrieve
    indicator data, including comments if requested.

    4. It compares the retrieved risk score against the configured `Threshold` parameter.
    If the score meets or exceeds the threshold, the entity is marked as suspicious.

    5. The action updates the entity's `additional_properties` with the retrieved
    enrichment data.

    6. If comments are available, it constructs a data table and adds it to the action
    results.

    7. It creates an entity insight containing the risk assessment and indicator details,
    optionally filtering to only include suspicious entities.

    8. Finally, it updates the entities within the SOAR platform and adds a JSON result
    containing the full indicator data.


    ### Additional Notes

    - The action supports configurable thresholds (verylow, low, medium, high, critical)
    to control when an entity is flagged as suspicious.

    - It can optionally retrieve comments and limit the number of comments returned.

    - The action does not perform any external mutations; it is strictly an enrichment
    and analysis task.
