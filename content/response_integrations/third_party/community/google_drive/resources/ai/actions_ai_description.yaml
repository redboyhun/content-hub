Delete File:
  ai_description: >-
    ### General Description

    Deletes a specific file from Google Drive using the provided File ID. This action
    is used to remove files, such as malicious payloads or unauthorized documents,
    directly from the Google Drive environment.


    ### Flow Description

    1. The action extracts the `Credentials Json` configuration to authenticate with
    the Google Drive API.

    2. The action extracts the `File Id` parameter provided by the user.

    3. The `GoogleDriveManager` is initialized using the provided credentials.

    4. The action calls the `delete_file` method, which executes a DELETE request
    via the Google Drive API to permanently remove the specified file.


    ### Additional Notes

    This action performs a destructive operation on the external Google Drive system.
    Ensure the `File Id` is correct before execution, as this action permanently deletes
    the file and does not move it to the trash.
