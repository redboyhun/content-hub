Add Permission:
  ai_description: >-
    ### General Description

    Adds specific access permissions (Owner, Writer, or Reader) to a Google Drive
    file for one or more users. This action allows administrators to manage file access
    control directly from the SOAR platform, facilitating automated governance or
    incident response workflows where file access needs to be granted or modified.


    ### Flow Description

    1. The action extracts the required parameters: `File Id`, `Role`, `Emails`, and
    `Should send notification`.

    2. It initializes the `GoogleDriveManager` using the provided credentials.

    3. The `Emails` parameter is parsed by splitting the input string by the semicolon
    (`;`) delimiter.

    4. The action iterates through the list of email addresses.

    5. For each email, it calls the Google Drive API `permissions().create` method
    to apply the specified `Role` to the target `File Id`.

    6. The action concludes by returning a success message indicating the permissions
    were granted.


    ### Additional Notes

    This action performs a write operation on an external system (Google Drive). Ensure
    the service account used for the integration has the necessary permissions to
    modify file access. Note that the `Should send notification` parameter is treated
    as a boolean; ensure the input is configured correctly to trigger or suppress
    email notifications to the target users.
  ai_short_description: >-
    Adds specified access permissions (Owner, Writer, or Reader) to a Google Drive
    file for one or more users.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Modifies file permissions in Google Drive by adding users with the specified
      role.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a write operation (POST) to the Google Drive API to update
      file permissions. It does not fetch data, nor does it modify internal SecOps
      data or entities.
  categories:
