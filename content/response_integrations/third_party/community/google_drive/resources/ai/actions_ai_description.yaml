Upload File From Base64:
  ai_description: >-
    ### General Description

    Uploads a file to Google Drive using a provided Base64 encoded string. This action
    allows users to convert raw data into a file within the Google Drive environment
    and optionally share that file with specific email addresses.


    ### Flow Description

    1. The action extracts the `File Name`, `Base64 String`, and `Share with emails`
    parameters.

    2. It initializes the `GoogleDriveManager` using the configured credentials.

    3. The `upload_file_from_base64` method is called to create a new file in Google
    Drive with the specified name and content.

    4. If the `Share with emails` parameter is provided, the action splits the string
    by semicolons and iterates through each email address.

    5. For each email, the `insert_permission` method is called to grant 'writer'
    access to the newly created file.

    6. The file ID and upload result are added to the action's result output.


    ### Additional Notes

    This action requires valid Google Drive API credentials configured in the integration
    settings. The `Share with emails` parameter is mandatory and must contain at least
    one valid email address if sharing is intended, or be handled according to the
    integration's requirements.
