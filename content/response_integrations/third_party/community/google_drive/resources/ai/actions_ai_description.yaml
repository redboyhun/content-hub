Download File To Path:
  ai_description: >-
    ### General Description

    Downloads a file from Google Drive to a specified local path on the SOAR worker.
    This action facilitates the retrieval of documents, images, or other files stored
    in Google Drive for further analysis or processing within the security operations
    workflow.


    ### Flow Description

    1. The action extracts the `File Id` and `Folder Path` parameters from the configuration.

    2. It initializes the `GoogleDriveManager` using the provided credentials.

    3. The action calls the `download_file_to_path` method, which performs the following
    steps:
        * Executes a `files().get` API call to retrieve the file's metadata and MIME
    type from Google Drive.
        * Determines the appropriate download method (e.g., `export_media` for Google
    Docs/Sheets/Slides or `get_media` for standard files).
        * Downloads the file content as a binary stream.
        * Writes the binary stream to the specified local `Folder Path`.
    4. The action returns a JSON result containing the file name, type, and the local
    path where the file was saved.


    ### Additional Notes

    This action requires valid Google Drive API credentials. The file is saved to
    the local filesystem of the SOAR worker node. Ensure the worker has appropriate
    write permissions to the target directory.
