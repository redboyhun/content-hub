Delete File:
  ai_description: >-
    ### General Description

    Deletes a specific file from Google Drive using the provided File ID. This action
    interacts with the Google Drive API to permanently remove the specified file from
    the user's drive.


    ### Flow Description

    1. The action extracts the `File Id` parameter provided by the user.

    2. The `GoogleDriveManager` is initialized using the configured credentials.

    3. The action calls the `delete_file` method, which executes a DELETE request
    to the Google Drive API using the provided `File Id`.

    4. Upon successful execution, the action returns a confirmation message indicating
    the file has been deleted.


    ### Additional Notes

    This action performs a permanent deletion of the file from Google Drive. Ensure
    the `File Id` is correct before execution, as this operation cannot be undone
    via this action.
