Download File To Base64:
  ai_description: >-
    ### General Description

    Downloads a file from Google Drive and converts it into a Base64-encoded string.
    This action allows for the retrieval of file content from Google Drive, which
    can then be used for further processing, analysis, or storage within the SOAR
    platform.


    ### Flow Description

    1. The action retrieves the `File Id` parameter provided by the user.

    2. It initializes the `GoogleDriveManager` using the configured credentials.

    3. It fetches the file metadata from Google Drive to determine the file type and
    name.

    4. It downloads the file content as a binary stream, handling conversions for
    Google Workspace formats (Docs, Sheets, Slides) if necessary.

    5. The binary content is encoded into a Base64 string.

    6. The resulting Base64 string, along with file metadata, is added to the action
    results.


    ### Additional Notes

    This action does not modify the file in Google Drive; it is a read-only operation.
    The file content is returned as a Base64 string in the action result.
