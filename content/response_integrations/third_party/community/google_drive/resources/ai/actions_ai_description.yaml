Add Permission:
  ai_description: >-
    ### General Description

    Adds permissions to a specific file in Google Drive. This action allows users
    to grant access to a file for one or more email addresses with a specified role
    (Owner, Writer, or Reader).


    ### Flow Description

    1. The action extracts the `File Id`, `Role`, `Emails`, and `Should send notification`
    parameters.

    2. It initializes the `GoogleDriveManager` using the provided credentials.

    3. The `Emails` parameter is split by the semicolon (`;`) delimiter to handle
    multiple recipients.

    4. For each email address, the action calls the `insert_permission` method, which
    invokes the Google Drive API `permissions().create` endpoint to grant the specified
    role to the user.

    5. The action concludes by returning a success message indicating the permissions
    were granted.


    ### Additional Notes

    None.
  ai_short_description: >-
    Adds permissions to a specific file in Google Drive.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Modifies file permissions in Google Drive by adding users with the specified
      role.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a mutation on an external system (Google Drive) by adding
      permissions to a file. It does not fetch data, update internal entities, or
      modify alert/case data.
