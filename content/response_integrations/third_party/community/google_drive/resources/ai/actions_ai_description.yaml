Download File To Base64:
  ai_description: >-
    ### General Description

    Downloads a file from Google Drive and converts its content into a Base64-encoded
    string. This action allows analysts to retrieve file content from Google Drive
    for further analysis or processing within the SOAR platform.


    ### Flow Description

    1. Extracts the `Credentials Json` configuration and the `File Id` parameter.

    2. Initializes the `GoogleDriveManager` using the provided credentials.

    3. Retrieves the file metadata from Google Drive using the `File Id`.

    4. Downloads the file content as a binary stream (handling Google Docs/Sheets/Slides
    conversion if necessary).

    5. Encodes the binary content into a Base64 string.

    6. Returns the file name, type, and Base64-encoded content as a JSON result.


    ### Additional Notes

    This action does not modify the file in Google Drive; it only retrieves and encodes
    the content.
