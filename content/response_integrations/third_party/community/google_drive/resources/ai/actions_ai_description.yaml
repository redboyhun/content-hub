Upload File From Base64:
  ai_description: >-
    ### General Description

    Uploads a file to Google Drive from a provided Base64 encoded string. This action
    allows users to specify the target file name and optionally share the uploaded
    file with one or more email addresses by granting them 'writer' permissions.


    ### Flow Description

    1. The action extracts the `Base64 String`, `File Name`, and `Share with emails`
    parameters from the action configuration.

    2. It initializes the `GoogleDriveManager` using the provided credentials.

    3. The action calls the `upload_file_from_base64` method to create the file in
    Google Drive.

    4. If the `Share with emails` parameter is provided, the action splits the string
    by the semicolon (';') delimiter.

    5. For each email address, the action calls `insert_permission` to grant 'writer'
    access to the newly created file.

    6. The result of the upload operation is added to the action's result JSON, and
    the action completes successfully.


