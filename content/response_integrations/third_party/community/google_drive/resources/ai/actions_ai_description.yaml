    1. The action extracts the `Credentials Json` configuration parameter to authenticate
    with the Google Drive API.

    2. The action extracts the `File Id` parameter provided by the user.

    3. The `GoogleDriveManager` is initialized using the provided credentials.

    4. The action calls the Google Drive API `files().get` method with the specified
    `File Id` to fetch the file's metadata.

    5. The retrieved metadata is added to the action's result JSON.

    6. The action concludes by returning a success message and the file ID.


