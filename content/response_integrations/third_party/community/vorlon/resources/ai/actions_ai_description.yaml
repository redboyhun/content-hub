Get Linked Alerts:
  ai_description: >-
    ### General Description

    Fetches linked alerts from the Vorlon server based on a provided Alert ID. Linked
    alerts are defined as alerts sharing the same secret ID and alert group. This
    action retrieves relevant historical or related alert data to provide context
    for an investigation.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the `API Root`, `Client
    ID`, and `Client Secret` from the integration configuration.

    2. **Parameter Extraction**: The action extracts the `Alert ID`, `Alert Status`,
    `Page`, and `Limit` parameters provided by the user.

    3. **Manager Initialization**: The `VorlonManager` is initialized with the extracted
    credentials.

    4. **API Request**: The action calls the `get_linked_alerts` method, which performs
    a GET request to the Vorlon API endpoint `/rest/v1/alerts/linked/{id}`.

    5. **Result Handling**: The retrieved linked alerts are returned as a JSON result
    using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is read-only and does not modify any data within the SOAR platform
    or the external Vorlon system. It is intended for investigative purposes to gather
    supplemental context regarding related alerts.
