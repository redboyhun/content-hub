    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to the Vorlon API to fetch alert data. It
      does not mutate any external or internal data, nor does it update entities or
      create insights.
