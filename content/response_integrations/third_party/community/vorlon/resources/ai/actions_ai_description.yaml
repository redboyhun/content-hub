Get Alerts:
  ai_description: >-
    ### General Description

    Fetches alerts from the Vorlon server based on specified filters such as service
    IDs, alert IDs, time ranges, and status. This action allows analysts to retrieve
    historical or current alert data from the Vorlon platform for further investigation.


    ### Flow Description

    1. The action initializes the `VorlonManager` using the configured API Root, Client
    ID, and Client Secret.

    2. It extracts the provided action parameters: Requesting Service, Responding
    Service, Alert IDs, From, To, Alert Status, Page, and Limit.

    3. The action calls the `get_alerts` method of the `VorlonManager`, which performs
    an HTTP GET request to the `/rest/v1/alerts` endpoint with the specified filters.

    4. The retrieved alert data is returned as a JSON result using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is read-only and does not modify any data within the Vorlon platform
    or the Google SecOps environment. It is intended solely for data retrieval.
  ai_short_description: >-
    Fetches alerts from the Vorlon server based on provided filters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
