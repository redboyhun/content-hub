Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Vorlon instance by verifying the API connection. This
    action ensures that the integration is correctly configured and able to communicate
    with the Vorlon server.


    ### Flow Description

    1. The action extracts the required integration configuration parameters: API
    Root, Client ID, and Client Secret.

    2. It initializes the `VorlonManager` using the provided credentials.

    3. The action calls the `test_connectivity` method, which performs a GET request
    to the Vorlon API endpoint `/rest/v1/services`.

    4. If the request is successful, the action completes with a success message.
    If the request fails (e.g., due to invalid credentials or network issues), the
    action fails and returns an error message.


    ### Additional Notes

    This action is a diagnostic tool used to verify the health and connectivity of
    the Vorlon integration. It does not perform any data enrichment or remediation
    tasks.
