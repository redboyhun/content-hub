Get Connection Summary:
  ai_description: >-
    ### General Description

    Fetches a connection summary for a specific service from the Vorlon platform.
    This action retrieves telemetry data regarding connections associated with a service,
    allowing analysts to review network activity patterns, instance-specific traffic,
    and connection types within a defined timeframe.


    ### Flow Description

    1. **Initialization**: The action extracts the necessary configuration parameters
    (API Root, Client ID, Client Secret) and action-specific parameters (Service ID,
    Instance ID, From, To, Type, Secret IDs).

    2. **Authentication**: The `VorlonManager` initializes a session and authenticates
    with the Vorlon API using the provided credentials to obtain an access token.

    3. **Data Retrieval**: The action calls the `get_connection_summary` method, which
    performs a GET request to the Vorlon API endpoint `/rest/v1/connections/summary/{service}`
    with the provided filters.

    4. **Result Processing**: The retrieved connection summary JSON is added to the
    action results using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is a data retrieval task and does not modify any data within the Vorlon
    platform or the Google SecOps environment. Ensure the `Service ID` is accurate,
    as it is a mandatory parameter for the API request.
