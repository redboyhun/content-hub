    Limit.

    3. The action initializes the `VorlonManager` with the provided credentials.

    4. It calls the `get_linked_alerts` method, which performs a GET request to the
    Vorlon API endpoint `/rest/v1/alerts/linked/{id}`.

    5. The retrieved linked alerts are returned as a JSON result to the SOAR platform.


    ### Additional Notes

    This action requires valid Vorlon API credentials. The action relies on the Vorlon
