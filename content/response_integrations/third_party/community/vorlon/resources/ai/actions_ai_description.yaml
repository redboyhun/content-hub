Get Connection Summary:
  ai_description: >-
    ### General Description

    Retrieves a connection summary for a specified service from the Vorlon platform.
    This action allows analysts to query historical connection telemetry, filtered
    by instance, time range, connection type, and specific secret IDs, providing visibility
    into service interactions.


    ### Flow Description

    1. The action initializes the `VorlonManager` using the configured API Root, Client
    ID, and Client Secret.

    2. It extracts the provided action parameters: `Service ID`, `Instance ID`, `From`,
    `To`, `Type`, and `Secret IDs`.

    3. The action calls the `get_connection_summary` method, which performs an HTTP
    GET request to the Vorlon API endpoint `/rest/v1/connections/summary/{service}`
    with the specified filters.

    4. The retrieved connection summary data is added to the action result using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is read-only and does not modify any data on the Vorlon platform or
    within the SOAR case. It requires a valid `Service ID` to function.
