Update Alert:
  ai_description: >-
    ### General Description

    Updates an alert in the Vorlon system by sending a JSON payload. This action allows
    users to modify alert attributes such as status or other fields directly in the
    external Vorlon platform via a PUT request.


    ### Flow Description

    1. The action extracts the required configuration parameters (API Root, Client
    ID, Client Secret) from the integration settings.

    2. It extracts the `Alert Object` parameter, which contains the JSON payload for
    the update request.

    3. The `VorlonManager` is initialized with the provided credentials.

    4. The action calls the `manager.update_alert` method, passing the `Alert Object`.

    5. The manager performs a `PUT` request to the Vorlon API endpoint (`/rest/v1/alerts/update`)
    with the provided JSON payload.

    6. The result of the API call is returned and added to the action results.


    ### Additional Notes

    The `Alert Object` parameter must be a valid JSON string representing the update
    request. Ensure the JSON structure matches the requirements of the Vorlon API.
