Get Alerts:
  ai_description: >-
    General Description

    Fetches alerts from the Vorlon server based on specified filters. This action
    retrieves alert data from the external Vorlon platform, allowing analysts to review
    alerts within the SOAR environment.


    Flow Description

    1. Initialize the `VorlonManager` using the configured API credentials (API Root,
    Client ID, Client Secret).

    2. Extract the provided action parameters, including service filters, alert IDs,
    time ranges, status, and result limits.

    3. Execute a GET request to the Vorlon API endpoint `/rest/v1/alerts` with the
    specified parameters.

    4. Return the retrieved alert data as a JSON result in the action output using
    `siemplify.result.add_result_json`.


    Additional Notes

    None.
