Get All Services:
  ai_description: >-
    ### General Description

    Retrieves a comprehensive list of all detected and observed services from the
    Vorlon server. This action provides visibility into the services currently monitored
    or managed within the Vorlon environment.


    ### Flow Description

    1. Initialize the `VorlonManager` using the configured API Root, Client ID, and
    Client Secret.

    2. Authenticate with the Vorlon server to obtain a valid access token.

    3. Execute a GET request to the `/rest/v1/services` endpoint.

    4. Return the retrieved list of services as JSON output in the action result.


