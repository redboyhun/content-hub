Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity and configuration of the Team Cymru Scout integration by
    querying the account usage endpoint. This action verifies that the provided credentials
    and connection parameters are valid and that the integration can successfully
    communicate with the Team Cymru Scout API.


    ### Flow Description

    1. Initialize the `SiemplifyAction` and retrieve integration parameters (API key/credentials,
    SSL verification) from the configuration.

    2. Initialize the `ApiManager` with the provided credentials.

    3. Execute the `api_usage` method, which performs a GET request to the `/usage`
    endpoint of the Team Cymru Scout API.

    4. If the API call is successful, the action completes with a success message.

    5. If the API call fails (e.g., due to invalid credentials), the action completes
    with a failure message and logs the error.


    ### Additional Notes

    This action does not perform any data enrichment or entity manipulation; it is
    strictly for verifying that the integration is configured correctly.
