Advanced Query:
  ai_description: >-
    ### General Description

    Fetches summary information from the Team Cymru Scout platform based on a provided
    query string. This action allows users to perform advanced searches using the
    Scout query language to retrieve detailed threat intelligence and network telemetry
    data.


    ### Flow Description

    1. Extracts the `Query` and optional parameters (`Start Date`, `End Date`, `Days`,
    `Size`) from the action settings.

    2. Initializes the `ScoutSearch` manager.

    3. Executes a GET request to the Team Cymru Scout `/search` endpoint via `ApiManager`.

    4. If successful, adds the raw JSON response to the action result.

    5. If IP data is returned, generates and renders multiple data tables (Summary,
    PDNS, Open Ports, Top Peers, Service Counts, Fingerprints, Certs) and an Account
    Usage table.


    ### Additional Notes

    The action supports advanced query syntax as defined by the Scout query language.
    If no IP data is found for the given query, a warning is logged and displayed
    in the output message.
