Account Usage:
  ai_description: >-
    ### General Description

    Fetches the current account usage metrics from the Team Cymru Scout API. This
    action provides visibility into the API quota, including used and remaining queries,
    to help administrators monitor their integration's consumption.


    ### Flow Description

    1. The action initializes the `SiemplifyAction` and retrieves the necessary integration
    configuration parameters (API Key or credentials).

    2. An `ApiManager` instance is created to manage the connection to the Team Cymru
    Scout API.

    3. The action executes a GET request to the `/usage` endpoint of the Team Cymru
    Scout API.

    4. Upon a successful response, the raw JSON data is added to the action's result
    object.

    5. The usage data is transformed into a structured table and rendered in the action
    results for easy viewing.


    ### Additional Notes

    This action is strictly informational and does not interact with alerts, entities,
    or external security controls. It is intended for administrative monitoring of
    the integration's API usage.
  ai_short_description: >-
    Fetches account usage metrics from the Team Cymru Scout API.
