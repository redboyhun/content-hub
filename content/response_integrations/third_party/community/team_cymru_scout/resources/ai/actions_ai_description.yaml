Get Communications Info:
  ai_description: >-
    ### General Description

    Retrieves detailed communication information for specified IP addresses using
    the Team Cymru Scout integration. This action fetches historical telemetry data,
    including peer communications, open ports, and service counts, to provide context
    for network-based investigations.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the required IP addresses and
    optional configuration parameters (Start Date, End Date, Days, Size) from the
    action settings.

    2. **Validation**: It validates the provided IP addresses and date ranges to ensure
    they meet API requirements.

    3. **API Interaction**: It makes a GET request to the Team Cymru Scout API (`/ip/{ip}/details`)
    to retrieve communication details for the valid IP addresses.

    4. **Data Processing**: The action processes the API response, handling any errors
    or invalid IP inputs.

    5. **Result Rendering**: It renders multiple data tables (e.g., Peers, Open Ports,
    Fingerprints) in the SOAR platform and adds the raw JSON response to the action
    results.


    ### Additional Notes

    This action is strictly for data retrieval and does not modify any external systems
    or internal SOAR entities. It requires valid authentication (API Key or Username/Password)
