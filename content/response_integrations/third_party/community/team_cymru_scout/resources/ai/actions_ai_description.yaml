Enrich IPs:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using the Team Cymru Scout platform. This action
    retrieves threat intelligence, including reputation ratings and tags, to provide
    context for IP addresses involved in security alerts.


    ### Flow Description

    1. The action collects all IP Address entities from the current case.

    2. It iterates through each IP entity and checks if it has been enriched by the
    Team Cymru Scout integration within the last 24 hours using the `TCS_last_enriched`
    property. If it has, the entity is skipped.

    3. For entities requiring enrichment, the action fetches summary data from the
    Team Cymru Scout platform via the `ApiManager`.

    4. The action evaluates the returned rating; if the rating is 'malicious' or 'suspicious',
    it marks the entity as suspicious (`entity.is_suspicious = True`).

    5. It updates the entity's `additional_properties` with the retrieved enrichment
    data, prefixed with 'TCS', and marks the entity as enriched (`entity.is_enriched
    = True`).

    6. Finally, it updates the entities in the SOAR platform and adds the raw summary
    data to the action result.


    ### Additional Notes

    This action is designed for threat intelligence enrichment. It does not perform
    any external mutations (e.g., blocking IPs) and is strictly read-only regarding
    external systems.
