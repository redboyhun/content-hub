Account Usage:
  ai_description: >-
    ### General Description

    Fetches account usage metrics from the Team Cymru Scout API. This action provides
    visibility into the current API usage, including query limits and remaining queries,
    to help monitor and manage API consumption.


    ### Flow Description

    1. Initialize the `SiemplifyAction` to interact with the SOAR platform.

    2. Retrieve integration configuration parameters (API credentials) using `get_integration_params`.

    3. Initialize the `ApiManager` with the retrieved credentials.

    4. Call the `/usage` endpoint of the Team Cymru Scout API via `api_manager.api_usage()`.

    5. If the API call is successful, add the raw JSON response to the action result
    using `siemplify.result.add_result_json`.

    6. Transform the usage data into a readable table format using `create_api_usage_table`.

    7. Render the data table in the case wall using `render_data_table`.

    8. End the action with a success message.


    ### Additional Notes

    This action does not require any input parameters. It is a utility action designed
    for administrative monitoring of the Team Cymru Scout integration.
  ai_short_description: >-
    Fetches and displays current account usage metrics, including query limits and
    remaining queries, from the Team Cymru Scout API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to the Team Cymru Scout API to retrieve account
      usage metrics. It does not mutate any external or internal data, nor does it
      update entities, create insights, or modify alert data.
