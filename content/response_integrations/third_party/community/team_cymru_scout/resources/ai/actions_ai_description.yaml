Get Fingerprints Info:
  ai_description: >-
    ### General Description

    Retrieves detailed fingerprint information for specified IP addresses from the
    Team Cymru Scout service. This action allows analysts to gather technical metadata
    and fingerprinting data associated with IP addresses to aid in threat investigation
    and context gathering.


    ### Flow Description

    1. Extracts input parameters (IP addresses, limit, and optional date/size filters).

    2. Validates the provided IP addresses and optional date parameters to ensure
    they meet the required formats and constraints.

    3. Initializes the `ApiManager` to authenticate with the Team Cymru Scout API
    using the configured credentials.

    4. Calls the `/ip/{ip}/details` endpoint for each valid IP address to fetch fingerprint
    data.

    5. Processes the API response to extract fingerprint details and account usage
    statistics.

    6. Adds the raw JSON response to the action results and renders data tables (e.g.,
    Fingerprints, Account Usage) for the analyst to review.


    ### Additional Notes

    The action supports both IPv4 and IPv6 addresses. It includes validation for date
    ranges and IP formats to ensure accurate API requests.
