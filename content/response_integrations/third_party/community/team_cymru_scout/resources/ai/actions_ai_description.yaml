Advanced Query:
  ai_description: >-
    ### General Description

    Performs an advanced search query against the Team Cymru Scout platform using
    the Scout query language. This action retrieves summary information, including
    PDNS, open ports, peer communications, and certificate details, based on the provided
    search criteria.


    ### Flow Description

    1. Extracts the `Query` and optional parameters (`Start Date`, `End Date`, `Days`,
    `Size`) from the action configuration.

    2. Authenticates with the Team Cymru Scout API using the configured credentials.

    3. Executes a GET request to the `/search` endpoint with the provided query and
    optional filters.

    4. Processes the API response to generate and render multiple data tables (Summary,
    PDNS, Open Ports, Top Peers, Service Counts, Fingerprints, Certs) in the action
    result.

    5. Renders an "Account Usage" table to display API consumption metrics.

    6. Adds the raw JSON response to the action result for further analysis.


    ### Additional Notes

    This action does not operate on specific entities; it relies entirely on the provided
    query string to fetch data from the Team Cymru Scout platform.
