Extract Tags:
  ai_description: >-
    ### General Description

    Extracts tags from a specified IP address and its associated peers using the Team
    Cymru Scout API. It searches for specific user-provided tags within the retrieved
    data to identify relevant indicators.


    ### Flow Description

    1. Extracts the `IP Address` and `Tags to Search` parameters.

    2. Validates the provided IP address format.

    3. Calls the Team Cymru Scout API (`get_ip_details`) to retrieve information about
    the IP, including its tags and peer communications.

    4. Processes the API response to map tags to the IP and its peers.

    5. Searches for the specified tags within the retrieved tag sets.

    6. If matches are found, adds the matching IP addresses and their tags to the
    action result using `add_result_json`.

    7. Renders an "Account Usage" data table.

    8. Returns an output message summarizing the findings.


    ### Additional Notes

    This action is read-only and does not modify external systems. It helps identify
    IPs associated with specific threat tags.
