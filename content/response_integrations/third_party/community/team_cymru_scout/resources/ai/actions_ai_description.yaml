Enrich IPs:
  ai_description: >-
    Enriches IP Address entities using the Team Cymru Scout platform. This action
    retrieves threat intelligence, including reputation ratings and tags, for specified
    IP addresses.


    ### Flow Description

    1. Extracts integration parameters (API key/credentials) from the configuration.

    2. Identifies all IP Address entities from the target entities list.

    3. Iterates through the identified IP entities.

    4. Checks if the entity has already been enriched within the last 24 hours by
    inspecting the `TCS_last_enriched` field in the entity's `additional_properties`.

    5. If not recently enriched, queries the Team Cymru Scout API for IP summary data.

    6. Updates the entity's `is_suspicious` status if the rating is "malicious" or
    "suspicious".

    7. Adds enrichment data (tags, rating, etc.) to the entity's `additional_properties`
    with a `TCS` prefix.

    8. Updates the entities in the SOAR platform.


    ### Additional Notes

    The action uses `TCS_last_enriched` to prevent redundant API calls.
