Extract Tags:
  ai_description: >-
    General Description

    This action extracts tags associated with a specified IP address and its peers
    from the Team Cymru Scout service. It compares these tags against a user-provided
    list of tags to identify matches, providing visibility into the threat context
    of the IP and its communication network.


    Flow Description

    1. Extracts the `IP Address` and `Tags to Search` parameters from the action configuration.

    2. Validates the provided IP address format to ensure it is a valid IP.

    3. Calls the Team Cymru Scout API (`get_ip_details`) to retrieve tag and peer
    information for the specified IP.

    4. Processes the API response to map tags to the target IP and its peers.

    5. Identifies which IPs (target or peers) contain any of the tags specified in
    the `Tags to Search` parameter.

    6. If matches are found, adds the matching IP data as a JSON result and generates
    an informative output message detailing the matches.

    7. Renders an "Account Usage" data table to display API consumption metrics.


    Additional Notes

    The action does not modify external systems or internal case data; it is strictly
    an enrichment and analysis action. It does not operate on entities from the case,
    but rather on a user-provided IP address parameter.
