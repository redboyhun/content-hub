Search Hosts:
  ai_description: >-
    ### General Description

    Searches for hosts in the Vectra AI platform based on various filtering criteria
    such as name, state, threat level, certainty, and timestamps. This action allows
    analysts to query the Vectra API to retrieve a list of hosts that match specific
    security parameters, providing visibility into the environment.


