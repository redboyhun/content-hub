    1. Extracts configuration parameters (`API Root`, `API Token`, `Verify SSL`) and
    the `Detection IDs` parameter.

    2. Validates the provided `Detection IDs` as a list of integers.

    3. Initializes the `VectraQUXManager` to interact with the Vectra QUX API.

    4. Sends a `PATCH` request to the Vectra QUX API (`/api/v2.5/detections`) with
    the list of detection IDs and the `mark_as_fixed` flag set to `False`.

    5. Adds the API response to the action results.


