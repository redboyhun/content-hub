Update Assignment:
  ai_description: >-
    ### General Description

    Updates the assigned user for a specific entity (Host or Account) within the Vectra
    AI platform. This action allows analysts to reassign ownership of an entity to
    a different user, facilitating better incident management and tracking.


    ### Flow Description

    1. **Initialization**: The action initializes the `VectraQUXManager` using the
    provided API Root, API Token, and SSL verification settings.

    2. **Parameter Extraction**: It extracts the `Entity ID`, `Entity Type`, and `User
    ID` from the action parameters.

    3. **Validation**: It validates that both `Entity ID` and `User ID` are valid
    integers.

    4. **Entity Retrieval**: The action calls the `describe_entity` API method to
    retrieve the current details and existing assignment information for the specified
    entity.

    5. **Assignment Update**: If an assignment exists for the entity, the action calls
    the `update_assignment` API method to update the assignment to the provided `User
    ID`.

    6. **Result Reporting**: The action adds the JSON response from the API to the
    action results and displays the updated assignment details in a data table.


    ### Additional Notes

    This action performs a state change on the external Vectra AI platform by modifying
    the assignment record of an entity. It requires valid API credentials and appropriate
    permissions to perform updates.
