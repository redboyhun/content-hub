Assign Group:
  ai_description: >-
    ### General Description

    This action assigns a list of members to a specific group within the Vectra QUX
    platform. It allows administrators to manage group memberships by appending new
    members to an existing group.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Token, Verify SSL) and action
    parameters (Group ID, Members).

    2. Validates the `Group ID` as an integer.

    3. Initializes the `VectraQUXManager` to interact with the Vectra API.

    4. Calls the `update_group_members` method on the Vectra API to append the provided
    members to the specified group.

    5. Processes the API response to identify successfully assigned members and those
    that failed.

    6. Generates an HTML view of the updated group details and adds it to the action
    results.

    7. Adds the full JSON response from the API to the action results.


    ### Additional Notes

    The `Members` parameter should be a comma-separated string. The action validates
    that the `Group ID` is a valid integer.
