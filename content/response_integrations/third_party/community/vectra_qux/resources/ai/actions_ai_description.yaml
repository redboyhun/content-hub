    users to define custom outcomes for assignments, which helps in categorizing and
    tracking the resolution status of detections within the Vectra environment.


    ### Flow Description

    1. The action extracts the required configuration parameters (API Root, API Token,
    Verify SSL) and action parameters (Title, Category) from the integration settings.

    2. The `VectraQUXManager` is initialized with the provided credentials.

    3. The action executes a POST request to the VectraQUX API endpoint `/api/v2.5/assignment_outcomes`
    to create the new outcome with the specified title and category.

    4. Upon successful creation, the action adds the outcome details to the result
    data table and JSON output.

    5. The action concludes by returning a success message with the new outcome ID.


