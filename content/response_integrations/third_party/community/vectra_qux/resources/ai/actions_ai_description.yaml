Add Note:
  ai_description: >-
    ### General Description

    Adds a note to a specific entity (Account, Host, or Detection) in the VectraQUX
    platform. This action allows analysts to document findings or context directly
    on an entity within the external VectraQUX system.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Token, Verify SSL).

    2. Extracts action parameters (Note, Entity ID, Entity Type).

    3. Validates the `Entity ID` as an integer.

    4. Initializes the `VectraQUXManager` with the provided credentials.

    5. Calls the `add_note` method on the `VectraQUXManager`, which performs a POST
    request to the VectraQUX API endpoint (`/api/v2.5/{entity_type}s/{entity_id}/notes`)
    to create the note.

    6. Adds the response data to the action's result table and JSON output.


    ### Additional Notes

    The `Entity Type` parameter supports 'Account', 'Host', and 'Detection'.
  ai_short_description: >-
    Adds a note to a specified entity (Account, Host, or Detection) in the VectraQUX
    platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new note on the specified entity within the VectraQUX platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to add a note to an entity in the VectraQUX
      platform. This is an external data mutation. It does not fetch data, update
      internal entities, or modify SecOps alert data.
  entity_usage:
