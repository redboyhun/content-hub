Search Detections:
  ai_description: "### General Description\nSearches for detections within the Vectra\
    \ platform based on a wide range of filter criteria, including detection type,\
    \ category, state, threat score, certainty, and timestamps. This action retrieves\
    \ detection details and presents them in both a structured JSON format and a readable\
    \ data table within the action results.\n\n### Flow Description\n1. **Parameter\
    \ Extraction**: The action extracts configuration parameters (API Root, API Token,\
    \ Verify SSL) and user-provided action parameters (e.g., State, Detection Type,\
    \ Limit, etc.).\n2. **Initialization**: The `VectraQUXManager` is initialized\
    \ with the provided credentials.\n3. **API Interaction**: The action calls the\
    \ `search_detections` method of the `VectraQUXManager`, which performs a GET request\
    \ to the Vectra API endpoint to retrieve detections matching the specified filters.\n\
    4. **Result Processing**: \n   - If no detections are found, an empty JSON result\
    \ is added.\n   - If detections are found, the action processes the data, removes\
    \ API version strings from URLs, extracts relevant fields, and adds the full detection\
    \ list as a JSON object to the action result.\n   - A data table titled 'List\
    \ Of Detections' is constructed and added to the action result for easier viewing.\n\
    \n### Additional Notes\nThis action is a read-only operation and does not perform\
    \ any mutations on external systems or internal SOAR data. It is designed for\
    \ discovery and investigation purposes."
