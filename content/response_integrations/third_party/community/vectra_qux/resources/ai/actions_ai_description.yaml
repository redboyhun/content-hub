Describe Assignment:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific assignment from the VectraQUX
    platform using its unique ID. This action fetches the assignment's metadata, including
    assigned users, resolution status, and associated entities, providing analysts
    with context directly within the SOAR platform.


    ### Flow Description

    1. Extracts the `Assignment ID` from the action parameters.

    2. Initializes the `VectraQUXManager` using the configured API credentials.

    3. Executes a GET request to the VectraQUX API to retrieve the assignment details.

    4. Parses the API response into an assignment object.

    5. Adds the raw JSON response to the action results and displays the assignment
    details in a formatted data table.


    ### Additional Notes

    This action is read-only and does not modify any data in the VectraQUX platform
    or the SOAR case. It is intended for informational purposes to assist in investigation
    and triage.
  ai_short_description: >-
    Retrieves detailed information about a specific assignment from the VectraQUX
    platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
