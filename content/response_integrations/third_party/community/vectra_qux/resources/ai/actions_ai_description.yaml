Add Tags:
  ai_description: >-
    ### General Description

    Adds tags to specified entities (Account, Host, or Detection) within the VectraQUX
    platform. This action allows users to append new tags to existing ones, facilitating
    better organization and categorization of security entities.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Tags` (comma-separated list),
    `Entity IDs` (comma-separated list), and `Entity Type` (Account, Host, or Detection)
    from the action parameters.

    2. **Input Validation**: The action validates the provided Entity IDs to ensure
    they are integers.

    3. **Tag Processing**: It creates a unique list of new tags to be added.

    4. **Entity Iteration**: For each provided Entity ID:
        * **Fetch Existing Tags**: It performs a GET request to the VectraQUX API
    to retrieve the current tags for the specified entity.
        * **Merge Tags**: It merges the new tags with the existing tags, ensuring
    no duplicates.
        * **Update Tags**: It performs a PATCH request to the VectraQUX API to update
    the entity with the new list of tags.
    5. **Result Reporting**: It logs the success or failure of each update and generates
    a data table and JSON result summarizing the status of each entity update.


    ### Additional Notes

    This action requires valid API credentials for the VectraQUX integration. It does
    not modify SOAR entities directly but performs updates on the external VectraQUX
    platform.
