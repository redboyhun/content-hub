    1. Extracts configuration parameters (API Root, API Token, SSL verification) and
    action parameters (Entity ID, Entity Type, User ID).

    2. Initializes the `VectraQUXManager` to interact with the VectraQUX API.

    3. Calls `describe_entity` to retrieve the current assignment details for the
    specified entity.

    4. If an assignment exists, calls `update_assignment` via a `PUT` request to the
    VectraQUX API to update the assigned user ID.

    5. Adds the API response as a JSON result and displays the updated assignment
    details in a data table.


    ### Additional Notes

    Requires a valid Entity ID, Entity Type, and User ID. The action will fail if
    the entity does not have an existing assignment or if the user is not permitted
    to perform the update.
