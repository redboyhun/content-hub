List Outcomes:
  ai_description: >-
    ### General Description

    Lists assignment outcomes from the VectraQUX platform. This action retrieves a
    list of available outcomes, which are used for categorizing or resolving assignments
    within Vectra. It provides visibility into the configured outcomes, allowing analysts
    to understand the available options for assignment resolution.


    ### Flow Description

    1. The action initializes the `SiemplifyAction` and extracts configuration parameters
    (API Root, API Token, Verify SSL) and the action parameter (Limit).

    2. It validates the `Limit` parameter to ensure it is a valid integer.

    3. The `VectraQUXManager` is initialized with the provided credentials.

    4. The action calls the VectraQUX API (GET request to `/api/v2.5/assignment_outcomes`)
    to retrieve the list of outcomes.

