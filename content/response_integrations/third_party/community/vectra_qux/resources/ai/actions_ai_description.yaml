Assign Group:
  ai_description: >-
    ### General Description

    Assigns a list of members to a specified group within the VectraQUX platform.
    This action updates the group's membership by appending the provided members to
    the existing list.


    ### Flow Description

    1. Extracts configuration parameters (`API Root`, `API Token`, `Verify SSL`) and
    action parameters (`Group ID`, `Members`).

    2. Processes the `Members` parameter into a list of strings.

    3. Validates the `Group ID` as a non-zero integer.

    4. Initializes the `VectraQUXManager` to interact with the Vectra API.

    5. Calls the `update_group_members` method, which performs a `PATCH` request to
    the VectraQUX API to append the provided members to the specified group.

    6. Processes the API response to identify successfully assigned members and those
    that failed.

    7. Renders an HTML view of the group details and adds the full API response as
    a JSON result to the action output.


    ### Additional Notes

    The action requires a valid Group ID and a comma-separated list of members. It
    performs an "append" operation on the group's membership.
