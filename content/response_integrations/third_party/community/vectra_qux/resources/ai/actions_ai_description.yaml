Add Tags:
  ai_description: >-
    ### General Description

    Adds tags to specified entities (Account, Host, or Detection) within the VectraQUX
    platform. This action allows users to append new tags to existing entity metadata,
    ensuring that security analysts can categorize and track assets or detections
    effectively.


    ### Flow Description

    1. The action extracts the `Tags`, `Entity IDs`, and `Entity Type` from the provided
    action parameters.

    2. It initializes the `VectraQUXManager` to handle API interactions.

    3. The action iterates through the provided list of `Entity IDs`.

    4. For each entity, it performs a GET request via `vectra_manager.get_entity_tags`
    to retrieve the current tags associated with the entity.

    5. It merges the existing tags with the new tags provided in the parameters, ensuring
    no duplicates.

    6. It performs a PATCH request via `vectra_manager.update_tags` to update the
    entity's tags on the VectraQUX platform.

    7. The action logs the success or failure of each update and generates a JSON
    result and a data table summarizing the status of the tag updates for each entity.


    ### Additional Notes

    This action requires valid API credentials for the VectraQUX integration. It operates
    on entity IDs provided as input parameters rather than the SOAR `target_entities`
    list.
  ai_short_description: >-
    Adds tags to specified Accounts, Hosts, or Detections in the VectraQUX platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
