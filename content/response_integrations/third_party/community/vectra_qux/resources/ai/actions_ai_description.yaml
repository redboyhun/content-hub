    \ to fetch the current list of members for the specified group.\n5. **Mutation**:\
    \ The action calls `vectra_manager.update_group_members(group_id, members, membership_action=\"\
    remove\")` to remove the specified members from the group via a PATCH request\
    \ to the VectraQUX API.\n6. **Result Processing**: The action compares the initial\
    \ member list with the updated list to identify which members were successfully\
    \ removed and which were not.\n7. **Output Generation**: \n    - Renders an HTML\
