Add Note:
  ai_description: >-
    ### General Description

    Adds a note to a specific entity (Account, Host, or Detection) within the Vectra
    AI platform. This action allows analysts to document findings or context directly
    on the relevant entity in the external system.


    ### Flow Description

    1. **Initialization**: The action initializes the `SiemplifyAction` and extracts
    configuration parameters, including the API Root, API Token, and SSL verification
    settings.

    2. **Parameter Extraction**: It retrieves the required action parameters: the
    `Note` content, the `Entity ID`, and the `Entity Type` (Account, Host, or Detection).

    3. **Manager Initialization**: The `VectraQUXManager` is initialized with the
    provided credentials and configuration.

    4. **Validation**: The `Entity ID` is validated to ensure it is a proper integer.

    5. **API Interaction**: The action calls the Vectra API (`POST` request) to add
    the specified note to the target entity.

    6. **Result Reporting**: The response from the API is processed and added to the
    action's result table and JSON output for the analyst to review.


    ### Additional Notes

    This action performs an external mutation on the Vectra AI platform. It does not
    modify any internal SOAR case data or entities.
  ai_short_description: >-
    Adds a note to a specified entity (Account, Host, or Detection) in the Vectra
    AI platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a note to an entity within the Vectra AI platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to add a note to an external system (Vectra
      AI), which constitutes external data mutation. It does not fetch data, nor does
      it modify internal SOAR case data (entities, insights, etc.).
  categories:
