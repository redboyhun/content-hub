    ### General Description

    Resolves an assignment in the VectraQUX platform by updating its status with a
    specified outcome. This action allows analysts to close out assignments by providing
    an outcome ID, optional notes, triage rules, and associated detection IDs.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Token, Verify SSL) and action
    parameters (Assignment ID, Outcome ID, Note Title, Triage As, Detection IDs).

    2. Validates the provided Assignment ID, Outcome ID, and Detection IDs as integers.

    3. Validates the Triage As parameter format to ensure it contains no invalid characters
    and meets length requirements.

    4. Initializes the `VectraQUXManager` to interact with the Vectra API.

    5. Executes a `PUT` request to the Vectra API (`/api/v2.5/assignments/{assignment_id}/resolve`)
    to resolve the assignment with the provided details.

    6. Adds the API response as a JSON result and the assignment details as a data
    table to the SOAR action.


    ### Additional Notes

    This action modifies the state of an assignment in the external VectraQUX system.
    It does not perform any internal SOAR entity updates or insights creation.
