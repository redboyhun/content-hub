Remove Assignment:
  ai_description: >-
    ### General Description

    Removes an existing assignment from a specified entity (Account or Host) within
    the VectraQUX platform.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Token, SSL verification).

    2. Extracts action parameters (Entity ID, Entity Type).

    3. Validates the Entity ID as an integer.

    4. Calls the VectraQUX API to describe the entity and retrieve its current assignment
    details.

    5. If an assignment exists, calls the VectraQUX API to delete the assignment using
