Blocklist - Remove Item:
  ai_description: >-
    ### General Description

    Removes a specific item from the Bitdefender GravityZone blocklist using its unique
    identifier. This action interacts with the Bitdefender GravityZone Control Center
    to update security policies by deleting a previously blocked entry.


    ### Flow Description

    1. The action extracts the required configuration parameters (`API Key`, `Access
    URL`, `Verify SSL`) and the `Hash ID` parameter from the action settings.

    2. It initializes the `BitdefenderGravityZoneManager` with the provided credentials.

    3. The action calls the `blocklist_hashes_remove` method, which sends a JSON-RPC
    `POST` request to the Bitdefender GravityZone API (`removeFromBlocklist` method)
    with the specified `hashItemId`.

    4. The API processes the request to remove the item from the blocklist.

    5. The action logs the outcome and terminates with a success or failure status
    based on the API response.


    ### Additional Notes

    This action performs a direct mutation on the external Bitdefender GravityZone
    platform. Ensure the `Hash ID` provided corresponds to a valid entry in the blocklist
    to avoid errors.
