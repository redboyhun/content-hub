Set Endpoint Label:
  ai_description: >-
    ### General Description

    Sets a custom label for a specific endpoint within the Bitdefender GravityZone
    console. This action allows administrators to tag or categorize endpoints for
    better organization and management directly from the SOAR platform.


    ### Flow Description

    1. The action extracts the necessary configuration parameters, including the API
    Key, Access URL, and SSL verification setting.

    2. It retrieves the `Endpoint ID` and the `Label` string provided as action parameters.

    3. The action initializes the `BitdefenderGravityZoneManager` using the provided
    credentials.

    4. It invokes the `label_endpoint_set` method, which performs a POST request to
    the Bitdefender GravityZone API (`setEndpointLabel` method) to update the label
    for the specified endpoint.

    5. The action concludes by returning the execution status (success or failure)
    to the SOAR platform.


    ### Additional Notes

    The `Label` parameter must be a string with a maximum length of 64 characters.
    Providing an empty string for the `Label` parameter will effectively reset or
    remove any previously set label for the specified endpoint.
