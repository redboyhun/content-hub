Blocklist - Add Hashes:
  ai_description: >-
    ### General Description

    Adds one or more file hashes (SHA256 or MD5) to the Bitdefender GravityZone blocklist.
    This action allows security analysts to proactively block malicious files identified
    during investigations, preventing them from executing on endpoints managed by
    Bitdefender GravityZone.


    ### Flow Description

    1. The action extracts the required configuration parameters (API Key, Access
    URL, Verify SSL) and action parameters (Hash List, Source Info).

    2. The `BitdefenderGravityZoneManager` is initialized to handle communication
    with the Bitdefender GravityZone Control Center.

    3. The provided `Hash List` is parsed and validated. Hashes are categorized into
    SHA256 and MD5 lists.

    4. The action performs a POST request to the Bitdefender GravityZone API using
    the `addToBlocklist` method for each valid hash type.

    5. The result of the operation, including the lists of successfully processed
    hashes and any failed hashes, is returned as a JSON result.


    ### Additional Notes

    This action only supports SHA256 and MD5 hash formats. Any other formats provided
    in the input will result in an error.
  ai_short_description: >-
    Adds file hashes to the Bitdefender GravityZone blocklist.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds file hashes to the Bitdefender GravityZone blocklist.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Bitdefender GravityZone API to add hashes
      to the blocklist (can_mutate_external_data=true). It does not fetch data, nor
      does it modify internal SOAR data (entities, insights, comments).
  categories:
