    3. The action initializes the `BitdefenderGravityZoneManager` to establish a connection
    with the Bitdefender GravityZone Control Center.

    4. It executes the `groups_custom_list` method, which sends a JSON-RPC `POST`
    request to the Bitdefender API to fetch the custom groups list.

    5. The retrieved data is added to the action result as a JSON object.


    ### Additional Notes

    This action is a read-only operation and does not modify any data within Bitdefender
    GravityZone or the Google SecOps platform.
