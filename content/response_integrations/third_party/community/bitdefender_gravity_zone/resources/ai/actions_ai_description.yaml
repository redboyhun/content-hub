    action triggers a network isolation task on the target device, preventing it from
    communicating with the network except for the management console.


    ### Flow Description

    1. The action extracts the required configuration parameters (API Key, Access
    URL, and SSL verification settings) and the `Endpoint ID` from the action parameters.

    2. The `BitdefenderGravityZoneManager` is initialized with the provided credentials.

    3. The action invokes the `createIsolateEndpointTask` method via the Bitdefender
    GravityZone API, passing the `Endpoint ID` to initiate the isolation process.

    4. The API response is processed to determine if the isolation task was successfully
    created.

