Blocklist - List Items:
  ai_description: >-
    ### General Description

    Retrieves the list of hashes currently present in the Bitdefender GravityZone
    blocklist. This action provides visibility into the blocked indicators within
    the Bitdefender environment.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (API Key, Access
    URL, Verify SSL) and optional action parameters (Use JSON Filter, Filter, Parent
    ID, Endpoints).

    2. It initializes the `BitdefenderGravityZoneManager` to handle communication
    with the Bitdefender GravityZone Control Center.

    3. The action calls the `blocklist_hashes_list` method, which executes a paginated
    POST request to the Bitdefender API (`/v1.0/jsonrpc/incidents`) to fetch all items
    currently in the blocklist.

    4. The retrieved blocklist data is added to the action's result JSON using `siemplify.result.add_result_json`.

    5. The action completes and returns a success status.


    ### Additional Notes

    This action is read-only and does not modify the blocklist or any other system
    state.
