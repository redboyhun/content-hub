Blocklist - Add Hashes:
  ai_description: >-
    ### General Description

    Adds one or more file hashes (SHA256 or MD5) to the Bitdefender GravityZone blocklist.
    This action allows security analysts to proactively block malicious files across
    the environment managed by Bitdefender GravityZone.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Key`, `Access
    URL`, and `Verify SSL`.

    2. It retrieves the action parameters: `Hash List` (a comma-separated string of
    hashes) and `Source Info` (a description for the blocklist entry).

    3. The `BitdefenderGravityZoneManager` is initialized to handle communication
    with the Bitdefender API.

    4. The `blocklist_hashes_add` method is called, which:
        * Splits the provided `Hash List` into individual items.
        * Validates each hash to determine if it is SHA256 or MD5.
        * Performs a POST request to the Bitdefender `INCIDENTS_URL` for each hash
    type (SHA256 or MD5) to add them to the blocklist.
    5. The action returns the result of the operation, including lists of successfully
    processed hashes and any failed hashes, and terminates the execution.


    ### Additional Notes

    This action supports both SHA256 and MD5 hash formats. If an unsupported hash
    format is provided, the action will raise an error and fail to submit those specific
    hashes. Ensure the provided API Key has sufficient permissions to modify the blocklist
    in the Bitdefender GravityZone Control Center.
  ai_short_description: >-
    Adds file hashes (SHA256 or MD5) to the Bitdefender GravityZone blocklist.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the provided file hashes (SHA256 or MD5) to the Bitdefender GravityZone
