Ping:
  ai_description: >-
    ### General Description

    Performs a connectivity and configuration validation check for the Workflow Tools
    integration. It verifies user/role settings and sends a test message to a configured
    Slack webhook to ensure the integration is operational.


    ### Flow Description

    1. Extracts configuration parameters: `Siemplify API Key`, `Siemplify API Root`,
    `Siemplify Instance Hostname`, `Slack Webhook URL`, `Approval Manager`, and `Secondary
    Approval Manager`.

    2. Initializes the `WorkflowToolsManager` with the provided configuration.

    3. Calls `manager.check_user` to validate the `Approval Manager` and `Secondary
    Approval Manager` settings. This involves querying the Siemplify API (`API_GET_USER_PROFILES`)
    to verify user roles.

    4. Calls `manager.log_slack_message` to send a test message to the configured
    Slack webhook.

    5. Logs the execution status and completes the action.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying that the integration
    is correctly configured and able to communicate with both the Siemplify API and
    the Slack webhook.
  ai_short_description: >-
    Performs a connectivity and configuration validation check for the Workflow Tools
