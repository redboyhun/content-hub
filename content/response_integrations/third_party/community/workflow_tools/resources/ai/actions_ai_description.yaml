Approval Response:
  ai_description: "### General Description\nThe Approval Response action allows authorized\
    \ users to approve or deny a workflow request within the Google SecOps platform.\
    \ It validates the requesting user's permissions against configured approval managers\
    \ or roles, logs the decision, adds relevant comments to the case, and sends a\
    \ notification to a configured Slack webhook.\n\n### Flow Description\n1. **Configuration\
    \ Extraction**: The action retrieves necessary configuration parameters, including\
    \ API keys, instance hostnames, and Slack webhook URLs.\n2. **Authorization Check**:\
    \ The action verifies if the `original_requesting_user` is authorized to perform\
    \ the approval. This involves an API call to `API_GET_USER_PROFILES` to check\
    \ the user's role or identity against the configured `Approval Manager` or `Secondary\
    \ Approval Manager`.\n3. **Decision Processing**: \n   - If authorized, the action\
    \ processes the `Action Approved` boolean parameter.\n   - It formats an approval\
    \ or denial message based on the result.\n   - If `Response Comments` are provided,\
    \ it appends these notes to the case and alert using `siemplify.add_comment`.\n\
    \   - It sends the formatted message to the configured Slack webhook via an HTTP\
    \ POST request.\n4. **Result Reporting**: The action sets the execution result\
    \ and returns a JSON object containing the approval status, reviewer, and comments.\n\
    \n### Additional Notes\nThis action does not operate on specific entities (e.g.,\
    \ IP, Hash). It is designed to manage case-level workflow approvals. If the user\
    \ is not authorized, the action logs an error and raises a `ValueError`, effectively\
    \ halting the process."
  ai_short_description: >-
    Validates user authorization for workflow approvals, adds case comments, and sends
    Slack notifications based on the approval decision.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends a notification message to a configured Slack webhook.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a comment to the case and alert timeline.
    reasoning: >-
      The action fetches user profile data via API to check authorization (fetches_data=true).
      It sends a message to Slack (can_mutate_external_data=true). It adds a comment
      to the case (can_mutate_internal_data=true, can_create_case_comments=true).
