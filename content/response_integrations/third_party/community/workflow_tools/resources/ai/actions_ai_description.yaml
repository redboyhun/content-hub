Assign Case to Current User:
  ai_description: >-
    ### General Description

    Assigns the current case to the analyst who triggered the playbook action. This
    action is designed to be used at the start of a playbook to automatically assign
    ownership of a case to the user initiating the workflow.


    ### Flow Description

    1. Extracts configuration parameters (API Key, API Root, Hostname) from the integration
    settings.

    2. Initializes the `WorkflowToolsManager` to facilitate interaction with the SOAR
    platform.

    3. Retrieves the current case ID, alert ID, and the username of the user who triggered
    the action.

    4. Validates that the requesting user is not the "System" user to ensure the action
    was triggered by an analyst.

    5. Calls the `assign_case` method on the `WorkflowToolsManager`, which invokes
    the internal `siemplify.assign_case` function to update the case assignment within
    the SOAR platform.


    ### Additional Notes

    This action must be configured for manual execution to ensure the `requesting_user`
    is correctly identified as the analyst.
  ai_short_description: >-
    Assigns the current case to the user who triggered the playbook action.
  capabilities:
