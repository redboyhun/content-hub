Ping:
  ai_description: >-
    ### General Description

    Validates user roles and connectivity by performing a ping test. This action verifies
    if the configured approval managers (primary and optional secondary) are valid
    by querying the SecOps API and sends a test message to a configured Slack webhook
    to confirm integration connectivity.


    ### Flow Description

    1. Extracts configuration parameters: Siemplify API Key, API Root, Instance Hostname,
    Slack Webhook URL, Approval Manager, and Secondary Approval Manager.

    2. Initializes the `WorkflowToolsManager` with the provided configuration.

    3. Validates the primary and secondary approval managers by checking their roles
    via a POST request to the SecOps API (`/api/external/v1/settings/GetUserProfiles`).

    4. Sends a test message to the configured Slack webhook URL via a POST request.

    5. Logs the completion status and ends the action.


    ### Additional Notes

    This action is primarily used for connectivity testing and configuration validation
    within the Workflow Tools integration. It does not perform any remediation or
    enrichment on case entities.
