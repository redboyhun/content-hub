Approval Request:
  ai_description: >-
    ### General Description

    This action manages workflow approvals by assigning cases or alerts to a designated
    reviewer and optionally moving grouped alerts to new cases. It integrates with
    Slack to notify reviewers of pending approvals, ensuring a structured workflow
    process.


    ### Flow Description

    1. The action extracts configuration parameters, including API credentials, Slack
    webhook URLs, and designated approval managers.

    2. It checks the `Move Alert If Grouped` parameter to determine if the alert should
    be isolated from a grouped case.

    3. If `Move Alert If Grouped` is enabled and the case contains multiple alerts,
    the action calls the `MoveAlertToNewCase` API to move the current alert into a
    new, isolated case.

    4. The action assigns the case (or the newly created case) to the specified `Approval
    Manager` using the internal `siemplify.assign_case` method.

    5. Finally, it sends a notification message to the configured Slack webhook to
    alert the reviewer of the pending approval.


    ### Additional Notes

    This action performs internal case management and external notifications. It does
    not perform threat intelligence enrichment or remediation of security threats.
  ai_short_description: >-
    Manages workflow approvals by assigning cases to reviewers, optionally moving
    grouped alerts, and sending Slack notifications.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends a notification message to Slack and calls the MoveAlert API.
    fetches_data: false
    internal_data_mutation_explanation: Assigns the case or alert to a reviewer.
    reasoning: >-
      The action mutates internal data by assigning the case/alert to a user. It mutates
      external data by calling the MoveAlert API and sending a Slack message. It does
      not fetch contextual data for enrichment.
  categories:
    enrichment: false
    reasoning: >-
      The action performs workflow management (case assignment) and external notifications
      (Slack). It does not fetch threat intelligence or perform security remediation
      (e.g., blocking IPs, isolating hosts). Therefore, it is neither an enrichment
      nor a remediation action.
    remediation: false
