Approval Request:
  ai_description: >-
    ### General Description

    This action manages workflow approvals by assigning cases to a designated reviewer
    and optionally moving grouped alerts to new cases. It integrates with the Siemplify
    API for case management and Slack for notifications.


    ### Flow Description

    1. Extract configuration parameters (API credentials, Slack webhook, reviewer
    details).

    2. Retrieve the current case ID and alert ID.

    3. If "Move Alert If Grouped" is enabled and the case contains multiple alerts,
    call the `MoveAlertToNewCase` API to isolate the alert into a new case.

    4. Assign the case (or the new case) to the specified approval manager using the
    Siemplify API.

    5. Send a notification message to the configured Slack webhook URL.

    6. Return the case IDs and approval manager details in the JSON result.


    ### Additional Notes

    Requires valid Siemplify API credentials and a configured Slack webhook.
  ai_short_description: >-
    Manages workflow approvals by assigning cases to reviewers, optionally isolating
    grouped alerts, and sending Slack notifications.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends notifications to Slack via webhook.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Assigns cases to reviewers and moves alerts to new cases within the Siemplify
      platform.
    reasoning: >-
      The action modifies internal case/alert assignments via the Siemplify API and
      sends external notifications via Slack.
