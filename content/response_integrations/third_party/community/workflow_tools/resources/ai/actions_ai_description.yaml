    external_data_mutation_explanation: >-
      Sends a notification message to a configured Slack webhook.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Adds a comment to the case regarding the approval/denial decision.
    reasoning: >-
      The action does not fetch data for enrichment purposes. It mutates internal
