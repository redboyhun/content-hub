Approval Response:
  ai_description: "### General Description\nAllows authorized users to approve or\
    \ deny a workflow request within a case. This action validates the requesting\
    \ user's permissions against configured approval managers, logs the decision to\
    \ the case, and sends a notification to a configured Slack channel.\n\n### Flow\
    \ Description\n1. **Configuration Extraction**: Retrieves necessary configuration\
    \ parameters, including API keys, Slack webhook URL, and authorized approval managers.\n\
    2. **Authorization Check**: Identifies the requesting user and verifies if they\
    \ are authorized to perform the approval/denial by checking against the configured\
    \ approval managers or roles via an internal API call (`API_GET_USER_PROFILES`).\n\
    3. **Decision Processing**: \n    - If authorized, processes the approval or denial\
    \ based on the `Action Approved` parameter.\n    - Constructs a status message\
    \ (Approved/Denied) including the case link and requesting user.\n4. **Internal\
    \ Update**: If `Response Comments` are provided, appends them as a comment to\
    \ the case using `siemplify.add_comment`.\n5. **External Notification**: Sends\
    \ the status message to the configured Slack webhook.\n6. **Result Reporting**:\
    \ Returns the final approval status and details as a JSON result.\n\n### Additional\
    \ Notes\nThis action requires a valid Slack Webhook URL to be configured in the\
    \ integration settings to send notifications. If the requesting user is not authorized,\
    \ the action will fail and raise a ValueError."
  ai_short_description: >-
    Allows authorized users to approve or deny workflow requests, logs the response
    to the case, and sends a notification to Slack.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
