json-adapter:
  ai_description: >-
    ### General Description

    This action parses and transforms raw JSON log data into a standardized format
    suitable for use within Siemplify playbooks. It extracts specific fields provided
    by the user from a JSON input string and maps them to entity types and identifiers,
    facilitating data normalization for downstream automation.


    ### Flow Description

    1. The action retrieves the `fields_to_search` and `raw_json` parameters.

    2. It parses the `raw_json` string into a Python dictionary.

    3. It iterates through the "results" list within the parsed JSON.

    4. For each item in the results, it checks if the specified fields exist.

    5. If a field is found, it creates a mapping of `entityType` (the field name)
    and `entityIdentifier` (the field value).

    6. The collected mappings are aggregated into a result object.

    7. The final JSON result is added to the action output using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action does not interact with external systems or modify internal SOAR data.
    It is a utility action designed for data normalization and does not perform any
    security operations or entity updates.
