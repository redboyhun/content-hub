logzio-get-logs-by-event-id:
  ai_description: >-
    ### General Description

    Fetches logs associated with a specific security event ID from Logz.io. This action
    retrieves detailed log data that triggered a security event, allowing analysts
    to investigate the root cause directly within the SOAR platform.


    ### Flow Description

    1. The action extracts configuration parameters, including the Logz.io security
    token and region or custom API endpoint.

    2. It extracts the `alert_event_id` and `page_size` from the action parameters.

    3. The action constructs a request body containing the `alert_event_id` and pagination
    settings.

    4. It sends a POST request to the Logz.io search API (`v2/security/rules/events/logs/search`)
    to retrieve the logs.

    5. If multiple pages of results exist, the action uses a `ThreadPoolExecutor`
    to concurrently fetch the remaining pages.

    6. The retrieved logs are aggregated and returned as a JSON result using `siemplify.result.add_result_json`.

    7. Finally, the action creates case insights for the retrieved logs using `siemplify.create_case_insight`.


    ### Additional Notes

    This action requires a valid Logz.io security token. It supports custom API endpoints
    if the default regional endpoints are not suitable. The action does not operate
    on specific entities but rather on a provided event ID.
  ai_short_description: >-
    Fetches logs associated with a specific security event ID from Logz.io and creates
    case insights.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
