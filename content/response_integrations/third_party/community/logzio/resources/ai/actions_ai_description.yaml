logzio-get-logs-by-event-id:
  ai_description: >-
    ### General Description

    Fetches logs from Logz.io associated with a specific security event ID. This action
    retrieves the raw log data that triggered a security event, allowing analysts
    to investigate the underlying telemetry. The logs are returned as a paginated
    JSON result and added to the case as insights.


    ### Flow Description

    1. The action extracts the `alert_event_id` and `page_size` from the action parameters,
    along with configuration settings like the `logzio_security_token` and `logzio_region`.

    2. It constructs a POST request body containing the `alertEventId` and pagination
    details.

    3. The action sends a POST request to the Logz.io API endpoint (`v2/security/rules/events/logs/search`).

    4. It handles pagination by using a `ThreadPoolExecutor` to fetch all available
    pages of logs if the initial response indicates more data is available.

    5. The collected logs are aggregated and added to the action result using `siemplify.result.add_result_json`.

    6. Finally, the action creates case insights for the retrieved logs using `siemplify.create_case_insight`.


    ### Additional Notes

    This action requires a valid Logz.io security token configured in the integration
    settings. It does not modify external systems but performs internal data enrichment
    by adding insights to the case.
