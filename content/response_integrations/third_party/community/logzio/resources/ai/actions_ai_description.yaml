Ping:
  ai_description: >-
    ### General Description

    Validates connectivity to Logz.io security and operations accounts by verifying
    the provided API tokens.


    ### Flow Description

    1. Extracts `logzio_security_token`, `logzio_operations_token`, `logzio_region`,
    and `logzio_custom_endpoint` from the integration configuration.

    2. Validates that the tokens are provided and are strings.

    3. Constructs the API endpoint URL based on the region or custom endpoint provided.

    4. Sends a GET request to the Logz.io `whoami` API endpoint for both the security
    and operations tokens.

    5. Verifies the response status code (expects 200).

    6. Logs the account name returned by the API.

    7. Returns a success or failure message based on the connectivity status.


    ### Additional Notes

    This action is strictly for connectivity testing and does not perform any data
    enrichment or remediation.
  ai_short_description: >-
    Validates connectivity to Logz.io by testing the provided security and operations
    API tokens.
