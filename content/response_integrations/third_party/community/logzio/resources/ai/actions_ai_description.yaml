logzio-search-logs:
  ai_description: >-
    ### General Description

    Searches for logs in a Logz.io operations account based on a provided query and
    time range. This action allows analysts to retrieve historical log data to support
    investigations and threat hunting activities within the SOAR platform.


    ### Flow Description

    1. The action extracts configuration parameters, including the Logz.io API token,
    region, and an optional custom endpoint.

    2. It extracts action parameters: `query` (Lucene syntax), `size` (number of logs),
    `from_time`, and `to_time`.

    3. The action constructs a search request body, applying the query and time range
    filters.

    4. It sends a POST request to the Logz.io search API (`v1/search`).

    5. Upon receiving a successful response, the action parses the log hits and returns
    them as a JSON result to the SOAR platform using `add_result_json`.


    ### Additional Notes

    The action requires a valid Logz.io API token. The `from_time` parameter is mandatory
    and supports various formats including Unix timestamps and relative time strings.
