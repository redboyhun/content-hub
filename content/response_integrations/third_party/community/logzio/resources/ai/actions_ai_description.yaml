json-adapter:
  ai_description: >-
    ### General Description

    This action parses raw JSON log data from Logz.io to extract specific fields and
    map them into a standardized format suitable for Siemplify playbooks. It identifies
    entity types and their corresponding identifiers based on user-provided field
    names.


    ### Flow Description

    1. Extracts the `fields_to_search` (comma-separated string) and `raw_json` (JSON
    string) parameters.

    2. Parses the `raw_json` string into a Python dictionary.

    3. Iterates through the `results` list within the parsed JSON object.

    4. For each result, checks if the specified fields exist.

    5. If a field is found, it creates a mapping object containing the field name
    as `entityType` and the field value as `entityIdentifier`.

    6. Aggregates these mappings into an output list.

    7. If any mappings are found, it adds the resulting JSON to the action result
    using `siemplify.result.add_result_json` and marks the execution as completed.


    ### Additional Notes

    This action does not interact with external APIs; it performs local data transformation.
    It is primarily used for data normalization within a playbook.
  ai_short_description: >-
    Parses raw JSON log data to extract and format specific fields for use as entity
    identifiers in playbooks.
