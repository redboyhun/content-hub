Ping:
  ai_description: >-
    ### General Description

    Validates connectivity to Logz.io by testing the provided security and operations
    API tokens. This action ensures that the integration is correctly configured and
    that the SOAR platform can successfully communicate with the Logz.io API.


    ### Flow Description

    1. Extracts the `logzio_security_token`, `logzio_operations_token`, `logzio_region`,
    and `logzio_custom_endpoint` from the integration configuration.

    2. Validates that both the security and operations tokens are provided and are
    valid strings.

    3. Determines the API endpoint URL based on the provided region or custom endpoint.

    4. Sends a GET request to the Logz.io `whoami` API endpoint for both the security
    and operations tokens.

    5. Verifies that the API returns a 200 status code for each request.

    6. Logs the account name returned by the API to confirm successful authentication.

    7. Returns a success or failure message based on the outcome of the connectivity
    tests.


    ### Additional Notes

    This action is a diagnostic tool used to verify integration connectivity. It does
    not perform any data enrichment, entity updates, or modifications to external
    systems.
  ai_short_description: >-
    Validates connectivity to Logz.io by testing the provided security and operations
    API tokens.
