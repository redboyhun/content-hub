logzio-search-logs:
  ai_description: >-
    ### General Description

    This action searches for logs within a Logz.io operations account. It allows users
    to query logs using Lucene syntax, specify the number of results, and define a
    time range for the search. The retrieved logs are returned as a JSON object in
    the action results.


    ### Flow Description

    1. The action retrieves configuration parameters (API token, region, custom endpoint)
    and action parameters (query, size, from_time, to_time).

    2. It validates the input parameters, including the time range and result size,
    ensuring they fall within acceptable limits.

    3. It constructs a JSON request body containing the search query and time filters.

    4. It executes a POST request to the Logz.io search API endpoint.

    5. Upon a successful response, it parses the log data and adds it to the action
    result.


    ### Additional Notes

    The `from_time` parameter is mandatory. The `query` parameter defaults to a wildcard
    (*) if not provided. The action requires a valid Logz.io API token configured
    in the integration settings.
