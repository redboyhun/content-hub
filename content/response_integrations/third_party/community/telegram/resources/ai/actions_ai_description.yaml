Wait for poll results:
  ai_description: "### General Description\nThis action polls the Telegram API to\
    \ retrieve and monitor the results of a specific poll. It allows the user to define\
    \ a vote threshold and a maximum waiting timeframe, enabling the automation to\
    \ wait for poll results asynchronously over multiple execution cycles.\n\n###\
    \ Flow Description\n1. **Initialization**: The action extracts configuration parameters\
    \ (API Token) and action parameters (Poll ID, Answer Votes Threshold, Waiting\
    \ Timeframe, Scan back Limit).\n2. **State Management**: It determines if this\
    \ is the first run or a subsequent run by checking the `additional_data` parameter.\
    \ If it is a subsequent run, it retrieves the `start_time`, `timeframe`, and `last_update`\
    \ ID to maintain continuity.\n3. **Data Retrieval**: The action initializes the\
    \ `TelegramManager` and calls the Telegram API `getUpdates` endpoint to fetch\
    \ poll data.\n4. **Filtering**: It filters the retrieved updates to isolate the\
    \ specific poll matching the provided `Poll ID`.\n5. **Evaluation**: It checks\
    \ if any option in the poll has reached the `Answer Votes Threshold`.\n6. **Completion/Continuation**:\
    \ \n   - If the threshold is met or the `Waiting Timeframe` is exceeded, the action\
    \ completes and returns the poll results.\n   - If the threshold is not met and\
    \ the timeframe has not expired, the action remains in progress, saving the current\
    \ state (start time, timeframe, last update ID) for the next execution.\n\n###\
    \ Additional Notes\nThis action is designed to be asynchronous. It does not perform\
    \ any mutations on external systems or internal SecOps data; it purely functions\
    \ as a polling mechanism to retrieve and evaluate external data."
