Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Telegram API to ensure the integration is configured
    correctly. This action verifies that the provided API Token is valid and that
    the SOAR platform can successfully communicate with the Telegram service.


    ### Flow Description

    1. Initialize the `SiemplifyAction` object.

    2. Extract the `API Token` from the integration configuration.

    3. Initialize the `TelegramManager` with the provided API token.

    4. Execute the `test_connectivity` method, which performs a GET request to the
    Telegram `getMe` API endpoint.

    5. If the API returns a successful response, the action completes with a success
    status. If the connection fails or the API returns an error, the action fails.


    ### Additional Notes

    This action is a diagnostic tool used for troubleshooting integration connectivity.
    It does not perform any data enrichment, entity modification, or remediation tasks.
