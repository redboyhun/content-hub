Get Bot Details:
  ai_description: >-
    ### General Description

    Retrieves configuration details for a Telegram bot using the Telegram API. This
    action allows users to verify the bot's identity and configuration settings by
    querying the Telegram service.


    ### Flow Description

    1. The action extracts the `API Token` from the integration configuration.

    2. It initializes the `TelegramManager` using the provided API token.

    3. The action calls the `get_bot_details` method, which performs an HTTP GET request
    to the Telegram API endpoint `/getMe`.

    4. The retrieved bot details are returned as a JSON result.


    ### Additional Notes

    This action is read-only and does not modify any data in the Telegram service
    or the SOAR platform.
