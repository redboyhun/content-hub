Get Chat Details:
  ai_description: >-
    General Description


    Retrieves details for a specific Telegram chat using the Telegram API.


    Flow Description


    1. Extracts the `API Token` from the integration configuration and the `Chat ID`
    from the action parameters.

    2. Initializes the `TelegramManager` with the provided API token.

    3. Executes a `GET` request to the Telegram API (`/getChat` endpoint) using the
    specified `Chat ID` to retrieve chat metadata.

    4. Parses the response to extract the chat's invite link.

    5. Adds the invite link to the action results and attaches the full JSON response
    from the API.


