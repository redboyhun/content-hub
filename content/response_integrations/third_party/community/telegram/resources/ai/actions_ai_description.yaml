Send Document:
  ai_description: >-
    ### General Description

    Sends a document from a provided URL to a specific Telegram chat. This action
    allows security analysts to share files or reports directly to a Telegram channel
    or private chat for communication and collaboration purposes.


    ### Flow Description

    1. The action extracts the 'API Token' from the Telegram integration configuration.

    2. The action extracts the 'Chat ID' and 'Document URL' from the provided action
    parameters.

    3. The action initializes the `TelegramManager` using the extracted API token.

    4. The `TelegramManager` performs an HTTP GET request to the Telegram API `sendDocument`
    endpoint, passing the 'chat_id' and 'document' (URL) as parameters.

    5. The action captures the API response and adds it to the result JSON.

    6. The action concludes by returning a success or failure status based on the
    API response.


    ### Additional Notes

    This action requires a valid Telegram Bot API Token to be configured within the
    integration settings. The document must be accessible via the provided URL for
