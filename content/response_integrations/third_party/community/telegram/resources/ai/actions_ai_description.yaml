Get Chat Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific Telegram chat using the Telegram
    API. This action allows users to fetch metadata for a given chat, including the
    invite link, which is useful for administrative or auditing purposes within the
    Telegram integration.


    ### Flow Description

    1. Extracts the `API Token` from the integration configuration and the `Chat ID`
    from the action parameters.

    2. Initializes the `TelegramManager` with the provided API token.

    3. Executes a GET request to the Telegram API (`/getChat`) using the provided
    `Chat ID` to fetch chat details.

    4. Parses the response to extract the chat's invite link.

    5. Adds the invite link as a clickable link in the action results and attaches
    the full JSON response for further analysis.


    ### Additional Notes

    This action is read-only and does not modify any external Telegram data. It is
    designed for information retrieval purposes only.
