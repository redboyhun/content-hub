Wait for poll results:
  ai_description: >-
    ### General Description

    Waits for and retrieves poll results from a Telegram bot. This action polls the
    Telegram API to monitor a specific poll for incoming votes. It evaluates the results
    against a defined vote threshold and a maximum waiting timeframe, allowing the
    action to either complete successfully when the threshold is met, continue waiting
    if time remains, or terminate if the timeframe expires without meeting the criteria.


    ### Flow Description

    1. **Initialization**: The action extracts configuration parameters (API Token)
    and action parameters (Poll ID, Answer Votes Threshold, Waiting Timeframe, Scan
    back Limit).

    2. **State Management**: If it is the first run, the action initializes the start
    time. If it is a subsequent run, it retrieves the previous state (start time,
    timeframe, last update ID) from the action's additional data.

    3. **Data Retrieval**: The action calls the Telegram API `getUpdates` method to
    fetch recent updates.

    4. **Filtering**: It filters the retrieved updates to isolate those related to
    the specified `Poll ID`.

    5. **Threshold Evaluation**: It iterates through the poll options to check if
    any option's `voter_count` meets or exceeds the `Answer Votes Threshold`.

    6. **Outcome Determination**:
       - If the threshold is met, the action completes with a success status.
       - If the threshold is not met but the `Waiting Timeframe` has not been reached,
    the action returns an `INPROGRESS` status and saves the current state to continue
    polling in the next run.
       - If the timeframe is reached and the threshold was not met, the action completes
    with a failure status.
    7. **Result Reporting**: The action logs the final status and adds the poll results
    to the action output using `add_result_json`.


    ### Additional Notes

    This action is designed to be asynchronous, allowing it to pause and resume execution
    until the desired poll outcome is achieved or the timeout is reached.
  ai_short_description: >-
    Waits for and retrieves poll results from a Telegram bot based on a specified
    vote threshold and timeframe.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Telegram API to fetch poll updates. It
