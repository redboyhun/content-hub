Get Messages:
  ai_description: >-
    ### General Description

    Retrieves messages from a Telegram chat using the Telegram Bot API. This action
    allows users to pull historical messages from a chat, provided the bot is a member
    of that chat.


    ### Flow Description

    1. The action extracts the `API Token` from the integration configuration.

    2. It retrieves the `Last Message ID` and `Message Types` from the action parameters.

    3. The `TelegramManager` is initialized using the provided API token.

    4. The action executes a GET request to the Telegram `getUpdates` API endpoint,
    passing the `offset` (Last Message ID) and `allowed_updates` (Message Types) as
    parameters.

    5. The retrieved messages are returned as a JSON result to the SecOps platform.


    ### Additional Notes

    Ensure the bot has the necessary permissions and is a member of the target chat
    to successfully retrieve messages.
