Send Document:
  ai_description: >-
    ### General Description

    Sends a document from a specified URL to a Telegram chat using the Telegram Bot
    API. This action allows users to share files or documents directly to a Telegram
    chat by providing the document's URL and the target chat's identifier.


    ### Flow Description

    1. Extract the `API Token` from the integration configuration.

    2. Extract the `Chat ID` and `Document URL` from the action parameters.

    3. Initialize the `TelegramManager` with the provided API token.

    4. Execute the `send_doc` method, which performs a GET request to the Telegram
    API endpoint `/sendDocument` with the `chat_id` and `document` URL.

    5. Return the API response as a JSON result and terminate the action.


