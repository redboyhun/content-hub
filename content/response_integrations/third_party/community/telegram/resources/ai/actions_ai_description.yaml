Get Bot Details:
  ai_description: >-
    ### General Description

    Retrieves configuration details for a Telegram bot using the Telegram API.


    ### Flow Description

    1. Extracts the `API Token` from the integration configuration.

    2. Initializes the `TelegramManager` with the provided token.

    3. Executes a GET request to the Telegram API endpoint `/getMe` to fetch bot information.

    4. Returns the retrieved bot details as a JSON result in the action output.


    ### Additional Notes

    This action is read-only and does not modify any external or internal data.
