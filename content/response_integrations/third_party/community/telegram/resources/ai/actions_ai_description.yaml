Get Messages:
  ai_description: >-
    ### General Description

    Retrieves messages from a specific Telegram chat using the Telegram Bot API. This
    action allows users to pull message history, optionally filtering by message type
    and starting from a specific message ID.


    ### Flow Description

    1. The action extracts the `API Token` from the integration configuration and
    the `Last Message ID` and `Message Types` from the action parameters.

    2. It initializes the `TelegramManager` with the provided API token.

    3. The action calls the `get_messages` method, which performs a GET request to
    the Telegram API endpoint `https://api.telegram.org/bot{token}/getUpdates`.

    4. The retrieved messages are returned as a JSON object and added to the action
    results.


    ### Additional Notes

    - The bot must be a member of the chat to retrieve messages.

    - If no `Last Message ID` is provided, the action will pull messages based on
    the default behavior of the Telegram API.
