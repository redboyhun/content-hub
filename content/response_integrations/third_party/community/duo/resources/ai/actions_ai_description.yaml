Get Authentication Logs for User:
  ai_description: >-
    General Description: Obtains user data and authentication logs from Duo Security
    for a specified user. This action retrieves historical authentication telemetry,
    including access devices, locations, and applications, and aggregates this data
    to identify common authentication sources based on a configurable threshold.


    Flow Description:

    1. The action extracts the required parameters: 'Username', 'Number Days Back',
    and 'Authentication Threshold'.

    2. It initializes the Duo Admin API client using the configured API Hostname,
    Admin Secret Key, and Admin Integration Key.

    3. The action calls the Duo API 'get_users_by_name' method to retrieve the user's
    unique identifier.

    4. Using the retrieved user ID, it calls the Duo API 'get_authentication_log'
    method to fetch authentication logs for the specified number of days.

    5. The action iterates through the authentication logs, filtering for successful
    authentications.

    6. It aggregates the authentication data (IPs, locations, OS, applications, devices)
    and filters out sources that do not meet the 'Authentication Threshold'.

    7. Finally, the aggregated results are returned as a JSON object via the Siemplify
    result handler.


    Additional Notes: This action requires valid Duo Admin API credentials configured
    in the integration settings. It is a read-only operation and does not modify any
    external or internal systems.
  ai_short_description: >-
    Retrieves authentication logs and user metadata from Duo Security for a specific
    user.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs GET requests to the Duo Admin API to retrieve user and log
      data. It does not mutate any external or internal data.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external system (Duo Security) and does not
      perform any mutations on external or internal systems. It is strictly an enrichment/data
      retrieval action.
    remediation: false
