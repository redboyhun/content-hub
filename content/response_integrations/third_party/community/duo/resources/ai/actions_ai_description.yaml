Get Trust Monitor Events:
  ai_description: >-
    ### General Description

    Fetches DUO Trust Monitor events from the DUO Admin API for a specified lookback
    period. This action retrieves historical security events from DUO, allowing analysts
    to review recent activity within the DUO environment.


    ### Flow Description

    1. Extracts configuration parameters (API Hostname, Admin Secret Key, Admin Integration
    Key) from the DUO integration settings.

    2. Extracts the `Number Days Back` parameter to determine the lookback period.

    3. Calculates the time range by subtracting the specified number of days from
    the current timestamp.

    4. Initializes the `duo_client.Admin` client using the provided credentials.

    5. Calls the `admin_api.get_trust_monitor_events_by_offset` method with the calculated
    time range to retrieve the events.

    6. Adds the retrieved events to the action result using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action requires valid DUO Admin API credentials configured in the integration
    settings. It is a read-only operation that retrieves data for analysis.
