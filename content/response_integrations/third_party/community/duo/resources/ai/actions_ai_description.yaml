Ping:
  ai_description: >-
    ### General Description

    Verifies the connectivity and authentication credentials for the DUO integration.
    This action ensures that the configured API Hostname, Auth Secret Key, and Auth
    Integration Key are valid and that the signature generation is functioning correctly.


    ### Flow Description

    1. The action extracts the `API Hostname`, `Auth Secret Key`, and `Auth Integration
    Key` from the integration configuration.

    2. It initializes the `duo_client.Auth` object using these extracted credentials.

    3. It executes the `auth_api.check()` method to validate the connection to the
    DUO API.

    4. The action returns a success message if the credentials are valid or an error
    message if the connection fails.


    ### Additional Notes

    This is a connectivity test action and does not perform any data enrichment or
    remediation.
