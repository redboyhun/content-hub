Ping:
  ai_description: >-
    ### General Description

    This action tests connectivity to the Country Flags service by attempting to retrieve
    a flag image for a specific country code ("us"). It utilizes a local cache file
    to store and retrieve previously fetched flag images in base64 format, reducing
    redundant network requests.


    ### Flow Description

    1. The action initializes the `SiemplifyAction` object.

    2. It attempts to load a local cache file named `flags.json` from the run folder.
    If the file is missing or invalid, it initializes an empty cache.

    3. It defines a hardcoded country code ("us").

    4. It checks if the flag for the country code exists in the cache.

    5. If not found in the cache, it performs an HTTP GET request to `https://www.countryflags.io/us/flat/64.png`.

    6. The retrieved image content is encoded into a base64 string and stored in the
    cache.

    7. The action concludes by returning a success or failure status.


    ### Additional Notes

    This action is primarily used for connectivity testing and does not interact with
    entities or modify external security systems.
