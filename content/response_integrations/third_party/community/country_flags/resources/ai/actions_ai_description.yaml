Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Country Flags service by retrieving a flag image for
    a specific country code. This action is primarily used for connectivity testing
    and does not perform standard enrichment or remediation tasks.


    ### Flow Description

    1. Initialize the `SiemplifyAction`.

    2. Attempt to load a local cache file (`flags.json`) to check for existing flag
    data.

    3. If the cache is missing or invalid, initialize an empty cache.

    4. Define the target country code (hardcoded as "us").

    5. Check if the flag for the country code exists in the cache.

    6. If not in cache, perform an HTTP GET request to `https://www.countryflags.io/{}/flat/64.png`
    to download the flag image.

    7. Encode the downloaded image content to base64 and update the cache.

    8. Terminate the action with a success or failure status.


    ### Additional Notes

    This action is primarily used for connectivity testing and does not perform standard
    enrichment or remediation tasks.
