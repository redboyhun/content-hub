Get Country Flag:
  ai_description: >-
    ### General Description

    Fetches a country flag image from an external service (`countryflags.io`) and
    returns it as a base64 encoded string. This action is designed to provide visual
    context for country-related data, such as IP geolocation or user location, by
    retrieving the corresponding flag image.


    ### Flow Description

    1. The action initializes the `SiemplifyAction` and attempts to load a local cache
    file (`flags.json`) to minimize external API calls.

    2. It iterates through the provided `target_entities` if the `Country Code From
    Entity Field` parameter is specified, extracting the country code from the entity's
    `additional_properties`.

    3. If the `Country Code Two Digit` parameter is provided, it processes this code
    directly.

    4. For each identified country code, the action checks the local cache. If the
    flag is not found, it performs an HTTP GET request to `https://www.countryflags.io/{country_code}/flat/64.png`.

    5. The retrieved image content is encoded into a base64 string and stored in the
    cache.

    6. Finally, the action returns the base64 encoded flag data in the result JSON
    and updates the local cache file if any new flags were fetched.


    ### Additional Notes

    This action uses a local file-based cache to optimize performance and reduce the
    number of requests to the external `countryflags.io` service. It does not modify
    any security-related data or perform any blocking/containment operations.
  ai_short_description: >-
    Fetches a country flag image from an external service and returns it as a base64
    encoded string.
