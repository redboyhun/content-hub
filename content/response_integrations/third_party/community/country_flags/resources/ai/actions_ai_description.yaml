Get Country Flag:
  ai_description: >-
    ### General Description

    Fetches a country flag image in base64 format from `countryflags.io` based on
    a provided country code. This action allows users to retrieve visual representations
    of countries, which can be used for reporting or enrichment purposes. It supports
    both direct input of a country code and extraction of the country code from an
    entity's additional properties.


    ### Flow Description

    1. Initialize the `SiemplifyAction` and load the local cache file `flags.json`
    from the runner's folder.

    2. If `Country Code From Entity Field` is provided, iterate through all target
    entities. For each entity, check if the specified field exists in `entity.additional_properties`.

    3. If a country code is found (either from the entity field or the `Country Code
    Two Digit` parameter), check if it exists in the local cache.

    4. If the flag is not in the cache, perform an HTTP GET request to `https://www.countryflags.io/{country_code}/flat/64.png`.

    5. Encode the retrieved image content into a base64 string and update the local
    cache.

    6. Add the resulting base64 flag data to the action's result JSON.

    7. If the cache was updated, write the new `flags.json` file back to the disk.


    ### Additional Notes

    The action utilizes a local file-based cache to minimize redundant external API
    calls to `countryflags.io`.
  ai_short_description: >-
    Fetches and returns a base64-encoded country flag image based on a provided country
    code.
  capabilities:
    can_create_case_comments: false
