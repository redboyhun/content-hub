Enrich Hash:
  ai_description: >-
    ### General Description

    Enriches File Hash entities using the Cybersixgill Darkfeed Enrichment service.
    This action proactively investigates malware hashes by querying the Sixgill intelligence
    cloud to retrieve threat intelligence, including feed names, actor information,
    confidence scores, severity, and associated MITRE ATT&CK tactics and techniques.
    It helps security analysts gain context on emerging threats and malware detected
    on the dark web.


    ### Flow Description

    1. The action initializes the `SixgillEnrichManager` using the provided `Client
    Id` and `Client Secret` from the integration configuration.

    2. It iterates through the `target_entities` in the current case, filtering specifically
    for entities of type `FILEHASH`.

    3. For each valid file hash, the action queries the Sixgill API to retrieve threat
    intelligence data.

    4. If data is found, the action:
        - Updates the entity's `is_enriched` and `is_suspicious` status.
        - Updates the entity's `additional_properties` with the retrieved intelligence
    (e.g., feed name, actor, confidence, severity, VirusTotal positive rate, and MITRE
    ATT&CK details).
        - Calls `siemplify.update_entities` to save these changes to the SOAR platform.
        - Generates a case insight using `siemplify.create_case_insight` containing
    the detailed threat intelligence.
        - Adds a table of the enrichment results to the action output using `siemplify.result.add_entity_table`.
        - Adds the raw JSON response to the action results using `siemplify.result.add_json`.
        - Creates links to external resources (e.g., Sixgill portal, VirusTotal) using
    `siemplify.result.add_entity_link`.
    5. If no data is found or an error occurs, the action logs the event and continues
    processing other entities.


    ### Additional Notes

    This action is strictly for enrichment and does not perform any state-changing
    operations on external systems. It relies on the `SixgillEnrichManager` to handle
    API communication and the `SixgillActionResultProcessor` to format and attach
    the intelligence to the SOAR case.
