Enrich URL:
  ai_description: >-
    ### General Description

    Enriches URL entities using the Cybersixgill Darkfeed Enrichment service. This
    action queries the Sixgill platform to retrieve threat intelligence, including
    malware associations, actor information, and MITRE ATT&CK mapping for the specified
    URL. It provides actionable context to security analysts by aggregating data from
    underground file-sharing and paste sites.


    ### Flow Description

    1. The action initializes the `SixgillEnrichManager` using the provided `Client
    Id` and `Client Secret` from the integration configuration.

    2. It iterates through the target entities, filtering for those with the `URL`
    entity type.

    3. For each valid URL, the action calls the Sixgill API (`query_sixgill`) to fetch
    threat intelligence data.

    4. If data is retrieved, the action:
        * Updates the entity's `is_enriched` and `is_suspicious` flags.
        * Updates the entity's `additional_properties` with Sixgill-specific metadata
    (e.g., feed name, confidence, severity).
        * Generates a detailed case insight containing the retrieved intelligence.
        * Adds a data table to the entity's results in the SOAR platform.
        * Attaches the raw JSON response to the entity.
    5. Finally, the action updates the entities in the SOAR platform and completes
    the execution.


    ### Additional Notes

    This action is strictly for enrichment purposes and does not perform any blocking
    or remediation actions on external systems. It relies on the Cybersixgill API
    for data retrieval.
