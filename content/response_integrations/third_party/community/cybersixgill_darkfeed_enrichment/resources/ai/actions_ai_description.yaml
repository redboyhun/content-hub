    filtering for `ADDRESS` types.

    4. **Data Retrieval**: For each valid IP entity, it performs a query to the Sixgill
    API to fetch threat intelligence data.

    5. **Entity Update**: If data is found, the action updates the entity's `is_enriched`
    and `is_suspicious` flags and populates `additional_properties` with the retrieved
    threat intelligence.

    6. **Result Generation**: The action creates a case insight, adds an entity table
    with detailed threat information, and attaches the raw JSON result to the action
    output.


