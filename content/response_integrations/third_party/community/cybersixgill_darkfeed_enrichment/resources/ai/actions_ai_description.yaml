Enrich Actor:
  ai_description: >-
    ### General Description

    Enriches Threat Actor entities using the Cybersixgill Darkfeed Enrichment service.
    This action retrieves detailed intelligence regarding threat actors, including
    their activity, targets, and techniques, and updates the SOAR case with this contextual
    information.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the required `Client Id`
    and `Client Secret` from the integration configuration.

    2. **Initialization**: A `SixgillEnrichManager` is initialized to handle API communication
    with the Cybersixgill platform.

    3. **Entity Processing**: The action iterates through the provided `target_entities`,
    specifically filtering for `THREATACTOR` types.

    4. **Data Retrieval**: For each valid entity, the action queries the Sixgill API
    to fetch relevant threat intelligence data.

    5. **Entity Update**: The action updates the entity's `additional_properties`
    with the retrieved Sixgill data (e.g., feed name, confidence, severity, MITRE
    ATT&CK mappings) and marks the entity as enriched and suspicious.

    6. **Insight Creation**: The action generates a case insight containing a summary
    of the actor's activity and adds a table to the entity's results, providing a
    structured view of the intelligence.


    ### Additional Notes

    This action requires valid Cybersixgill API credentials. It specifically targets
    Threat Actor entities to provide deep-web and dark-web context.
  ai_short_description: >-
    Enriches Threat Actor entities with intelligence data from Cybersixgill Darkfeed.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
