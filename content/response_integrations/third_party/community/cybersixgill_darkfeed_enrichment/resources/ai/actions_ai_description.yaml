Enrich IP:
  ai_description: >-
    Enriches IP Address entities using Cybersixgill Darkfeed to retrieve threat intelligence.
    This action queries the Sixgill platform for information regarding C&C servers,
    botnets, DDoS attacks, and other malicious activities associated with the provided
    IP addresses. It updates the entity's profile with relevant threat data, including
    confidence scores, severity, and associated MITRE ATT&CK techniques, and generates
    actionable insights within the case.


