Enrich Hash:
  ai_description: >-
    ### General Description

    Enriches File Hash entities using the Cybersixgill Darkfeed Enrichment service.
    This action proactively analyzes and investigates malware hashes as they emerge
    on the dark web, providing threat intelligence even for samples that may not yet
    be detected by traditional antivirus vendors.


    ### Flow Description

    1. The action extracts the `Client Id` and `Client Secret` from the integration
    configuration.

    2. It initializes the `SixgillEnrichManager` to establish a connection with the
    Sixgill API.

    3. The action iterates through the target entities, specifically filtering for
    `FILEHASH` types.

    4. For each hash, it queries the Sixgill API to retrieve threat intelligence data.

    5. If data is found, the action:
        - Updates the entity's `is_enriched` and `is_suspicious` status.
        - Populates the entity's `additional_properties` with metadata such as feed
    name, source, actor, confidence, severity, and VirusTotal/MITRE references.
        - Creates a case insight containing the detailed analysis.
        - Adds an entity table to the case wall with the retrieved intelligence.
        - Updates the entity within the SOAR platform.

    ### Additional Notes

    This action is strictly for enrichment purposes and does not perform any remediation
    or external system state changes. It relies on the Cybersixgill API to provide
    context for potentially malicious file hashes.
