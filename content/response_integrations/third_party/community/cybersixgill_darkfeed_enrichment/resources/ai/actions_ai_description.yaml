Enrich Actor:
  ai_description: "### General Description\nEnriches Threat Actor, Hostname, File\
    \ Hash, IP Address, and URL entities using Cybersixgill Darkfeed. This action\
    \ retrieves threat intelligence, including actor activity, targets, techniques,\
    \ and associated IOCs from the last 90 days. It updates the entity's profile with\
    \ additional properties, generates a detailed table of findings, and creates a\
    \ case insight to provide context for analysts.\n\n### Flow Description\n1. **Configuration\
    \ Extraction**: The action extracts the `Client Id` and `Client Secret` from the\
    \ integration configuration.\n2. **Initialization**: Initializes the `SixgillEnrichManager`\
    \ to handle API communication with Cybersixgill.\n3. **Entity Processing**: Iterates\
    \ through the target entities provided in the case.\n4. **API Query**: For each\
    \ supported entity type (Threat Actor, Hostname, File Hash, IP Address, URL),\
    \ the action queries the Sixgill API to retrieve relevant threat intelligence.\n\
    5. **Data Enrichment**: \n    - Updates the entity's `additional_properties` with\
    \ retrieved data (e.g., feed name, confidence, severity, MITRE ATT&CK tactics).\n\
    \    - Marks the entity as enriched and suspicious if data is found.\n    - Updates\
    \ the entity within the SOAR platform using `siemplify.update_entities`.\n6. **Result\
    \ Reporting**: \n    - Adds an entity table containing the enrichment details.\n\
    \    - Creates a case insight with the analysis results.\n    - Adds the raw JSON\
    \ result to the action output.\n\n### Additional Notes\nThis action requires valid\
    \ Cybersixgill credentials. It is designed to provide deep context on threat actors\
    \ and associated indicators, aiding in faster incident investigation."
  ai_short_description: >-
    Enriches Threat Actor, Hostname, File Hash, IP Address, and URL entities using
    Cybersixgill Darkfeed threat intelligence.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
