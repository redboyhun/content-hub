Enrich Domain:
  ai_description: "### General Description\nEnriches domain entities using the Cybersixgill\
    \ Darkfeed platform. This action retrieves threat intelligence regarding compromised\
    \ sites, domains for sale on the dark web, and associated threat actor activity.\
    \ It provides analysts with critical context, including confidence scores, severity,\
    \ and MITRE ATT&CK mapping, to help prioritize and investigate potentially malicious\
    \ domains.\n\n### Flow Description\n1. **Configuration Extraction**: The action\
    \ extracts the `Client Id` and `Client Secret` from the integration configuration.\n\
    2. **Initialization**: A `SixgillEnrichManager` is initialized to handle API communication\
    \ with the Cybersixgill platform.\n3. **Data Retrieval**: The action iterates\
    \ through the provided `HOSTNAME` entities and queries the Sixgill API for threat\
    \ intelligence related to each domain.\n4. **Entity Enrichment**: For each domain\
    \ found in the feed, the action updates the entity's `additional_properties` with\
    \ Sixgill-specific data (e.g., feed name, actor, confidence, severity).\n5. **Internal\
    \ Updates**: \n    * The action updates the entity status (`is_enriched = True`,\
    \ `is_suspicious = True`).\n    * It adds a detailed data table to the entity.\n\
    \    * It creates a case insight containing the retrieved threat intelligence,\
    \ including VirusTotal and MITRE ATT&CK references.\n6. **Result Output**: The\
    \ action returns the processed results as a JSON object and updates the case wall\
    \ with the findings.\n\n### Additional Notes\nThis action requires valid Cybersixgill\
    \ API credentials (`Client Id` and `Client Secret`) configured in the integration\
    \ settings. It specifically targets `HOSTNAME` entities and does not perform any\
