Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the SOAR platform and the Cybersixgill Darkfeed
    Enrichment service. This action is designed to verify that the integration is
    correctly configured and that the platform can successfully communicate with the
    external API.


    ### Flow Description

    1. The action extracts the 'Client Id' and 'Client Secret' from the integration
    configuration.

    2. It initializes the `SixgillEnrichManager` using the provided credentials.

    3. It executes a test query (`enrich_ioc`) using a sample IP address ('8.8.8.8')
    to verify the API connection.

    4. The action returns the status of the connectivity test (success or failure)
    to the SOAR platform, which is then displayed as the action result.


    ### Additional Notes

    This action is intended for diagnostic purposes only. It does not process any
    entities from the case and does not perform any enrichment or mutation operations.
  ai_short_description: >-
