Ping:
  ai_description: >-
    General Description

    This action verifies connectivity to the NucleonCyber API by sending a POST request
    to the `activethreats` endpoint. It validates the provided credentials and configuration
    parameters to ensure the integration is correctly set up.


    Flow Description

    1. Extracts configuration parameters: `Username`, `Password`, `client name`, and
    `client id` from the integration configuration.

    2. Extracts the `limit` parameter from the action configuration.

    3. Sends a POST request to `https://api.nucleoncyber.com/feed/activethreats` using
    the provided credentials and parameters.

    4. Checks the HTTP response status code. If the status code is not 200, it raises
    an exception indicating a credential error.

    5. If successful, it terminates the action with a "Successful Connection" message.


    Additional Notes

    This action is primarily used for connectivity testing and does not perform any
    data processing or entity enrichment.
