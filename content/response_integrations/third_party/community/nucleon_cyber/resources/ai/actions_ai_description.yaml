GetIPs:
  ai_description: >-
    ### General Description

    This action retrieves recent cyber intelligence data from the Nucleon Cyber Active
    Threats API. It authenticates using provided credentials and client identifiers,
    then requests a specified number of active threats.


    ### Flow Description

    1. Extracts configuration parameters (Username, Password, client name, client
    id) and the action parameter (limit).

    2. Constructs a POST request to the Nucleon Cyber Active Threats API endpoint
    (https://api.nucleoncyber.com/feed/activethreats).

    3. Sends the request with authentication and the payload containing the client
    details and the limit.

    4. Validates the response status code and checks for authentication errors.

    5. Parses the JSON response to extract the threat data.

    6. Adds the retrieved data to the action results using siemplify.result.add_result_json
    and siemplify.result.add_json for use in subsequent playbook steps.


    ### Additional Notes

    This action does not interact with specific entities in the case; it fetches global
    threat intelligence data.
  ai_short_description: >-
    Retrieves recent cyber intelligence data from the Nucleon Cyber Active Threats
    API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to an external API to fetch threat intelligence
      data. It does not mutate external data (the POST is used for data retrieval)
      or internal data.
