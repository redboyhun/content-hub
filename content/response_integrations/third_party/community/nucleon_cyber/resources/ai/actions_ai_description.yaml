Ping:
  ai_description: >-
    ### General Description

    This action performs a connectivity test (ping) against the NucleonCyber API to
    verify authentication and communication. It ensures that the integration is properly
    configured and can successfully reach the external service.


    ### Flow Description

    1. The action extracts the required configuration parameters: `Username`, `Password`,
    `client name`, and `client id` from the integration settings.

    2. It extracts the `limit` parameter from the action configuration.

    3. It sends a POST request to the NucleonCyber API endpoint (`https://api.nucleoncyber.com/feed/activethreats`)
    using the provided credentials and parameters.

    4. The action validates the response status code. If the status code is not 200,
    it raises an exception indicating a connection error.

    5. If the request is successful, the action terminates with a success message.


    ### Additional Notes

    This action is primarily used for verifying integration connectivity and does
    not perform any data processing or state-changing operations on entities or alerts.
