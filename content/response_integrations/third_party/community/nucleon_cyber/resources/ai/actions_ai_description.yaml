GetIPs:
  ai_description: >-
    ### General Description

    Fetches active threat intelligence data from the Nucleon Cyber Active Threats
    API. This action retrieves a collection of cyber threat indicators for use in
    security analysis and playbook automation.


    ### Flow Description

    1. The action extracts the required configuration parameters: `Username`, `Password`,
    `client name`, and `client id` from the integration settings.

    2. It extracts the `limit` parameter to define the number of results to retrieve.

    3. A `POST` request is sent to the Nucleon Cyber API endpoint (`https://api.nucleoncyber.com/feed/activethreats`)
    using the provided credentials and parameters.

    4. The action validates the response status code; if the request fails, it terminates
    with an authentication error message.

    5. The threat data is extracted from the JSON response.

    6. The retrieved data is added to the action results using `siemplify.result.add_result_json`
    and `siemplify.result.add_json` to make it available for subsequent playbook steps.


    ### Additional Notes

    This action is a data retrieval task and does not modify external systems or internal
    SOAR entities. It is designed to provide threat intelligence for further processing.
  ai_short_description: >-
    Fetches active threat intelligence data from the Nucleon Cyber Active Threats
    API.
  capabilities:
    can_create_case_comments: false
