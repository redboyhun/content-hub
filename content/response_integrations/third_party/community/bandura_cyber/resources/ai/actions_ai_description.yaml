Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Bandura Cyber API by attempting to authenticate and
    then immediately logging out. This action verifies that the provided credentials
    and API endpoint configuration are valid and that the SOAR platform can successfully
    communicate with the Bandura Cyber service.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `Username`,
    `Password`, and the optional `Verify SSL` flag.

    2. It initializes the `BanduraCyberManager` class, which performs an authentication
    request (POST) to the Bandura Cyber API to obtain an access token.

    3. The script immediately calls the `logout` method on the manager to terminate
    the session.

    4. If the `access_token` is present, the action concludes with a success message
    ("Connection Established.") and a result value of "true".

    5. If the authentication fails, the action concludes with a failure message ("Connection
    Failed.").


    ### Additional Notes

    This action is strictly for connectivity verification and does not perform any
    data retrieval or modification operations on the Bandura Cyber platform beyond
    session management.
