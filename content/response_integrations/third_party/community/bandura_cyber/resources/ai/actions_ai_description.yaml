Add Domain to Allowed Lists:
  ai_description: >-
    ### General Description

    Adds a domain to a specified allowed list in the Bandura Cyber platform. This
    action allows security analysts to whitelist domains directly from the SOAR platform,
    ensuring that traffic to these domains is permitted by the Bandura Cyber security
    controls.


    ### Flow Description

    1. **Configuration Initialization**: The action initializes the Bandura Cyber
    manager using the provided API credentials (Username, Password, API Root) and
    SSL verification settings.

    2. **Parameter Extraction**: It extracts the required `List Name` and optional
    `Description` and `Expiration Date` parameters.

    3. **Entity Filtering**: The action iterates through the `target_entities` and
    filters for entities of type `URL`.

    4. **Domain Extraction**: For each valid URL entity, it extracts the domain (netloc)
    using `urlparse`.

    5. **API Interaction**: The action calls `BanduraCyberManager.add_allowed_domain_entity`,
    which performs a GET request to retrieve the list UUID, followed by a POST request
    to the Bandura Cyber API to add the domain to the specified allowed list.

    6. **Result Reporting**: The action updates the result JSON with the operation
    outcome and provides a summary message.


    ### Additional Notes

    The `List Name` parameter is case-sensitive and must match the name of an existing
    allowed list in the Bandura Cyber platform.
  ai_short_description: >-
    Adds a domain to a specified allowed list in the Bandura Cyber platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a domain to the specified allowed list in the Bandura Cyber platform.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches the list UUID from the Bandura Cyber API (fetches_data) and
      then performs a POST request to add the domain to the allowed list (can_mutate_external_data).
