Get Allowed Domain Lists:
  ai_description: >-
    ### General Description

    Retrieves a list of allowed domains from the Bandura Cyber platform. This action
    allows users to query the configured allowed domain lists, optionally filtering
    by a specific list name.


    ### Flow Description

    1. The action initializes the `BanduraCyberManager` using the provided API credentials
    (Username, Password, API Root) and SSL verification settings.

    2. It calls the `show_allowed_domain_list` method, which performs a GET request
    to the Bandura Cyber API to fetch the available allowed domain lists.

    3. If a `List Name` parameter is provided, the action filters the retrieved results
    to return only the list matching the specified name.

    4. If lists are found, the action attaches the raw JSON output to the case, adds
    a data table containing the list details to the action results, and returns the
    JSON data.

    5. If no lists are found, the action returns a message indicating that no allowed
    domain lists were found.


    ### Additional Notes

    This action is a read-only operation and does not modify any data within the Bandura
    Cyber platform or the Google SecOps SOAR environment.
