Add Domain to Allowed Lists:
  ai_description: >-
    ### General Description

    This action adds a domain to a specified allowed list within the Bandura Cyber
    platform. It is designed to manage allowlists by taking URL entities from the
    SOAR case, extracting the domain, and submitting it to the Bandura Cyber API for
    inclusion in the designated list.


    ### Flow Description

    1. The action retrieves the integration configuration (API Root, Username, Password,
    Verify SSL) and action parameters (List Name, Description, Expiration Date).

    2. It initializes the `BanduraCyberManager` to establish a session with the Bandura
    Cyber API.

    3. It filters the target entities in the SOAR case to identify those of type `URL`.

    4. For each identified URL entity:
        - It extracts the domain (netloc) from the URL.
        - It calls the `BanduraCyberManager.add_allowed_domain_entity` method, which
    performs a GET request to retrieve the list UUID and a POST request to add the
    domain to the specified allowed list.
    5. The action aggregates the results and adds a JSON result to the action output.

    6. Finally, it updates the action status and provides a summary message indicating
    which entities were successfully added.


    ### Additional Notes

    - The `List Name` parameter is case-sensitive.

    - The action parses the domain from the URL entity using `urllib.parse.urlparse`.

    - If no entities are processed, the action reports that no entities were added.
  ai_short_description: >-
    Adds a domain extracted from URL entities to a specified allowed list in Bandura
    Cyber.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a domain to the specified allowed list in the Bandura Cyber platform.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches list information (GET) to identify the correct list UUID
      and then performs a POST request to add the domain to the allowlist. This constitutes
      external data mutation. It does not modify internal SOAR data beyond standard
      result reporting.
  categories:
