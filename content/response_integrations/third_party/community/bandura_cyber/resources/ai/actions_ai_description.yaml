Add Domain to Denied Lists:
  ai_description: >-
    ### General Description

    Adds a domain to a specified Denied List in Bandura Cyber. This action allows
    security analysts to block malicious domains by adding them to a pre-configured
    denied list within the Bandura Cyber platform, optionally including a description
    and an expiration date for the entry.


    ### Flow Description

    1. **Initialization**: The action initializes the `BanduraCyberManager` using
    the provided API credentials and configuration.

    2. **Entity Filtering**: It filters the `target_entities` to identify only those
    of type `URL`.

    3. **Domain Extraction**: For each identified URL entity, the action extracts
    the domain (netloc) using `urlparse` (or the `OriginalIdentifier` if available
    in the entity's additional properties).

    4. **List Retrieval**: The action calls the Bandura Cyber API (`GET /denied-lists/domain`)
    to retrieve the list of denied lists and identify the UUID corresponding to the
    provided `List Name`.

    5. **Mutation**: It performs a POST request to the Bandura Cyber API (`POST /denied-lists/domain/{list_uuid}/entries`)
    to add the extracted domain to the specified list, including the optional description
    and expiration date.

    6. **Result Reporting**: The action updates the result JSON with the operation
    status and provides a summary message.


    ### Additional Notes

    The `List Name` parameter is case-sensitive. Ensure the list exists in Bandura
    Cyber before executing this action.
