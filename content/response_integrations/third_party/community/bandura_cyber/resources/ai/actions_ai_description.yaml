Add Domain to Denied Lists:
  ai_description: >-
    ### General Description

    Adds a domain to a specified denied list in Bandura Cyber. This action enables
    security teams to automate the blocking of malicious domains by adding them to
    a pre-configured denied list within the Bandura Cyber platform.


    ### Flow Description

    1. Extracts integration configuration (API credentials, API root, and SSL verification
    settings) and action parameters (List Name, Description, and Expiration Date).

    2. Initializes the `BanduraCyberManager` with the provided credentials to establish
    a session with the Bandura Cyber API.

    3. Filters the target entities to identify those of type `URL`.

    4. For each identified URL entity, extracts the domain (netloc) using `urlparse`.

    5. Calls the `add_denied_domain_entity` method in the `BanduraCyberManager`, which
    performs a POST request to the Bandura Cyber API to add the domain to the specified
    denied list.

    6. Updates the action result with the processed entities and provides a summary
    message indicating which entities were successfully added.


    ### Additional Notes

    The action requires a valid Bandura Cyber API connection. The `List Name` parameter
    is case-sensitive and must match the name of an existing denied list in Bandura
    Cyber.
