Get Denied IP Lists:
  ai_description: >-
    ### General Description

    Retrieves a list of denied IP addresses from the Bandura Cyber platform. This
    action allows users to query the configured denied IP lists, optionally filtering
    by a specific list name to narrow down the results.


    ### Flow Description

    1. The action initializes the `BanduraCyberManager` using the provided API credentials
    (username, password) and SSL verification settings.

    2. It calls the `show_denied_ip_list` method, which performs a GET request to
    the Bandura Cyber API (`/denied-lists/ipv4`) to retrieve the list of denied IPs.

    3. If a `List Name` parameter is provided, the manager filters the retrieved data
    to return only the matching list.

    4. The action processes the results:
       - Attaches the raw JSON response as a file to the case.
       - Adds a data table containing the denied IP list details to the action results.
       - Returns the JSON results to the SOAR platform.
