Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Bandura Cyber platform by attempting to authenticate
    and then immediately terminate the session. This action is used to verify that
    the integration configuration (API Root, Username, and Password) is correct and
    that the SOAR platform can successfully communicate with the Bandura Cyber API.


    ### Flow Description

    1. The action initializes the `BanduraCyberManager` using the provided `API Root`,
    `Username`, and `Password` parameters.

    2. During initialization, the manager performs a POST request to the `/auth/login`
    endpoint to establish an authenticated session.

    3. The action then calls the `logout` method, which performs a POST request to
    the `/auth/logout` endpoint to terminate the session.

    4. If the `access_token` was successfully retrieved during the initialization
    phase, the action outputs a success message; otherwise, it reports a connection
    failure.


    ### Additional Notes

    This action is strictly for connectivity testing and does not perform any data
    enrichment or remediation tasks. It is designed to be used during integration
    setup or troubleshooting.
