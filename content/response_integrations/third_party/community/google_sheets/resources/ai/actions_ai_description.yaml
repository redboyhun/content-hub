Add or Update Rows:
  ai_description: >-
    ### General Description

    This action adds or updates rows in a Google Sheet based on a provided JSON input.
    It searches for existing entries in a specified column and updates them if found;
    otherwise, it appends a new row.


    ### Flow Description

    1. Extracts configuration parameters (Credentials) and action parameters (Sheet
    ID, Worksheet Name, Column Number, Field Name, Start/End Columns, and JSON data).

    2. Initializes a connection to the Google Sheets API using the provided credentials.

    3. Iterates through the provided JSON list of rows.

    4. For each row, attempts to find the value in the specified column using the
    `worksheet.find` API call.

    5. If the value is found, updates the corresponding row range using the `worksheet.update`
    API call.

    6. If the value is not found, appends the row data to the sheet using the `worksheet.append_row`
    API call.

    7. Returns the updated range for each processed row.


    ### Additional Notes

    The action requires valid Google Sheets credentials and appropriate permissions
    to access the specified spreadsheet. The `Json` parameter must be a valid JSON
    array of objects.
