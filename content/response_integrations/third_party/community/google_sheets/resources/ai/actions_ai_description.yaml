Add or Update Rows:
  ai_description: >-
    ### General Description

    Adds or updates rows in a Google Sheet based on a provided JSON payload and column
    criteria. This action allows for automated data management within Google Sheets,
    enabling the synchronization of data from external sources or SOAR workflows into
    a spreadsheet format.


    ### Flow Description

    1. The action authenticates with the Google Sheets API using the provided credentials.

    2. It parses the input JSON string, which contains the data to be added or updated.

    3. For each item in the JSON, the action searches the specified column in the
    worksheet for the value associated with the provided Field Name.

    4. If the value is found, the action updates the corresponding row range with
    the new values.

    5. If the value is not found, the action appends a new row to the worksheet containing
    the provided data.

    6. The action returns the updated range for each processed row as part of the
    execution result.


    ### Additional Notes

    This action requires valid Google Sheets API credentials and appropriate permissions
    to access the target spreadsheet. The `Worksheet Name` parameter is optional;
    if not provided, the action defaults to the first sheet in the spreadsheet.
