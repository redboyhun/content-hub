    ### Flow Description

    1. Extracts the `Credentials Json` from the integration configuration.

    2. Extracts the `Sheet Name` and `Share with emails` parameters.

    3. Initializes a `GoogleSheetFactory` client using the provided credentials.

    4. Calls the Google Sheets API to create a new spreadsheet with the specified
    name.

    5. If email addresses are provided, iterates through them and updates the spreadsheet
    permissions to grant 'writer' access to each user.

    6. Returns the status and the ID of the created sheet.


