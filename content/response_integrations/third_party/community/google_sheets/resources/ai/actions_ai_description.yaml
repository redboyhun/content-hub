Delete Sheet:
  ai_description: >-
    General Description: Deletes a specified Google Spreadsheet from Google Drive.
    This action allows users to remove spreadsheets that are no longer needed or are
    identified as malicious artifacts.


    Flow Description:

    1. The action extracts the `Credentials Json` from the integration configuration.

    2. The action extracts the `Sheet Id` from the action parameters.

    3. The action initializes a `GoogleSheetFactory` with the provided credentials.

    4. The action creates a `gspread` client.

    5. The action calls the `del_spreadsheet` method with the provided `Sheet Id`
    to delete the spreadsheet from Google Drive.

    6. The action returns the execution status.


    Additional Notes: This action is destructive and permanently removes the specified
    spreadsheet from Google Drive. Ensure the `Sheet Id` is correct before execution.
  ai_short_description: >-
    Deletes a specified Google Spreadsheet from Google Drive.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes the specified spreadsheet from Google Drive.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a call to delete a spreadsheet, which is a mutation of external
      data. It does not fetch data, mutate internal data, update entities, create
      insights, modify alert data, or create case comments.
  categories:
    enrichment: false
    reasoning: >-
      The action performs a destructive operation (deletion) on an external system
      (Google Sheets). It is not an enrichment action (it does not fetch data). It
