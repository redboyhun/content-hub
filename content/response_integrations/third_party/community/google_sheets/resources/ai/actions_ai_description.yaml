Add  Permission:
  ai_description: >-
    ### General Description

    This action adds specific permissions (Owner, Writer, or Reader) to a Google Sheet
    for one or more users identified by their email addresses. It interacts with the
    Google Sheets API to update access controls for the specified spreadsheet.


    ### Flow Description

    1. The action extracts the `Sheet Id`, `Role`, and `Emails` parameters from the
    action configuration.

    2. It initializes a Google Sheets client using the provided credentials.

    3. It calls the `insert_permission` method of the Google Sheets client, passing
    the `sheet_id`, `emails`, and `role` to update the document's sharing settings.

    4. The action concludes by reporting the success or failure of the permission
    update.


    ### Additional Notes

    The `Emails` parameter supports multiple email addresses separated by a semicolon.
    The `Role` parameter determines the level of access granted (Owner, Writer, or
    Reader).
