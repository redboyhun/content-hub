Create Sheet:
  ai_description: >-
    General Description: Creates a new Google Sheet and optionally shares it with
    specified email addresses. This action automates the creation of spreadsheets
    within Google Sheets, allowing for immediate collaboration by setting permissions
    for designated users.


    Flow Description:

    1. The action extracts the required configuration parameters (Credentials JSON)
    and action parameters (Sheet Name, Share with emails).

    2. It initializes a Google Sheets client using the provided service account credentials.

    3. The action calls the Google Sheets API to create a new spreadsheet with the
    specified name.

    4. If email addresses are provided in the 'Share with emails' parameter, the action
    iterates through the list and calls the Google Sheets API to share the newly created
    spreadsheet with each user as a 'writer'.

    5. The action concludes by returning the result status and the ID of the created
    sheet.


    Additional Notes: The action requires valid Google Cloud service account credentials
    with appropriate scopes (Spreadsheets and Drive) to function correctly.
