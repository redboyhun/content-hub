    `Sheet Id`.

    5. **Worksheet Selection**: The action selects the target worksheet by name (if
    provided) or defaults to the first sheet (`sheet1`).

    6. **Data Search**: The action performs a search (`findall`) for the `Search value`
    within the worksheet.

    7. **Filtering**: The results are filtered to include only rows where the value
    was found in the specified `Column Number`.

    8. **Result Output**: The matching row numbers and values are added to the action
    result as a JSON object, and the action completes.


    ### Additional Notes

    This action is a read-only operation. It does not modify the Google Sheet, nor
    does it update any entities, insights, or case data within the SOAR platform.
    It is strictly used for data retrieval.
