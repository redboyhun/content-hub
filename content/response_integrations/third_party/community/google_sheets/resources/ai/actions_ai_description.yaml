Add Row:
  ai_description: >-
    ### General Description

    This action adds a new row of data to a specified Google Sheet. It allows users
    to input values and specify the target sheet, worksheet, and row index for the
    insertion.


    ### Flow Description

    1. The action extracts the required configuration parameters, including the Google
    Sheets credentials, and action parameters such as the Sheet Id, Worksheet Name,
    Row Index, and the Values to be added.

    2. It initializes a `GoogleSheetFactory` using the provided credentials to authenticate
    with the Google Sheets API.

    3. It connects to the target spreadsheet using the provided `Sheet Id`.

    4. It identifies the target worksheet by name if provided; otherwise, it defaults
    to the first sheet in the spreadsheet.

    5. It inserts the provided values into the worksheet at the specified `Row Index`
    (or appends the row if no index is specified) using the `insert_row` method.

    6. The action concludes by returning a success status to the SOAR platform.


    ### Additional Notes

    The `Values` parameter must be a comma-separated string of values to be inserted
    into the row. The `Sheet Id` is mandatory and can be extracted from the Google
    Sheets URL.
