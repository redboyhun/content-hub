Add  Permission:
  ai_description: >-
    ### General Description

    Adds permissions to a Google Sheet for one or more users. This action allows administrators
    to manage access control for specific Google Sheets by assigning roles such as
    Owner, Writer, or Reader to a list of email addresses.


    ### Flow Description

    1. The action extracts the `Sheet Id`, `Role`, and `Emails` from the provided
    action parameters.

    2. It initializes a `GoogleSheetFactory` client using the configured credentials.

    3. The action calls the `insert_permission` method of the Google Sheets API to
    grant the specified role to the provided email addresses for the target spreadsheet.

    4. The action completes and returns a success message or fails if an error occurs
    during the API interaction.


    ### Additional Notes

    This action performs a write operation on an external Google Sheet. Ensure that
    the service account used for the integration has the necessary permissions to
    modify the sharing settings of the target spreadsheet.
