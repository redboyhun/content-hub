Check IP Reputation:
  ai_description: >-
    ### General Description

    Checks the reputation of IP address entities using the AbuseIPDB service. This
    action retrieves threat intelligence, including abuse confidence scores, ISP information,
    and usage types, to help analysts assess the risk associated with specific IP
    addresses.


    ### Flow Description

    1. The action extracts configuration parameters (API Key, SSL verification) and
    action-specific parameters (Max Age, Exclude Internal, Create Insight, Threshold).

    2. It filters the `target_entities` to identify only those of type `ADDRESS`.

    3. If the `Exclude Internal Addresses` parameter is enabled, it further filters
    out entities marked as internal.

    4. For each valid IP address, the action performs a GET request to the AbuseIPDB
    API to retrieve reputation data.

    5. If data is found, it updates the entity's `additional_properties` with the
    retrieved attributes.

    6. If the `abuseConfidenceScore` meets or exceeds the configured `Suspicious Threshold`,
    the entity is marked as suspicious.

    7. If `Create Insight` is enabled, an insight is added to the entity containing
    the reputation details.

    8. Finally, the action updates the entities within the SOAR platform.


    ### Additional Notes

    This action requires a valid AbuseIPDB API key. It is designed to reduce noise
    by allowing the exclusion of internal IP addresses and providing automated risk
    assessment via the suspicious threshold.
  ai_short_description: >-
    Checks the reputation of IP address entities using AbuseIPDB and updates them
    with threat intelligence.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties, suspicious status, and adds insights within the SOAR
      platform.
    reasoning: >-
      The action fetches data from an external API (AbuseIPDB) and updates internal
      SOAR entities (properties, suspicious status, and insights). It does not mutate
      external systems.
