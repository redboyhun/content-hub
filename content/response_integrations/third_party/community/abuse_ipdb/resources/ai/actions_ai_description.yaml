    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to the AbuseIPDB API to test connectivity.
      It does not fetch contextual data for alerts or entities, nor does it mutate
      any external or internal data.
