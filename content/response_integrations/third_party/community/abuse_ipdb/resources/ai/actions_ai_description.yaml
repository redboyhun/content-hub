    | Suspicious Threshold | String | Yes | Abuse confidence score (0-100) at or above
    which the entity is marked as suspicious. Set to 0 to disable. |

    | Create Insight | Boolean | No | If true, creates an insight for each analyzed
    IP with the reputation details. |

    | Max Age in Days | String | Yes | The maximum age of reports to consider when
    checking the IP reputation. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the AbuseIPDB API to ensure the integration is configured
    correctly. This action validates the provided API key and SSL settings by performing
    a test request to the AbuseIPDB service.


    ### Flow Description

    1. The action initializes the `AbuseIPDBManager` using the provided `Api Key`
    and `Verify SSL` configuration parameters.

    2. It executes the `test_connectivity` method, which triggers a `check_ip` call
    using a hardcoded dummy IP address (`1.1.1.1`).

    3. The `check_ip` method performs a GET request to the AbuseIPDB API endpoint
    (`https://api.abuseipdb.com/api/v2/check`).

    4. The action validates the API response. If the connection is successful, it
    returns a success message and a result value of "true".

    5. If the API key is invalid or an error occurs, it catches the exception, logs
    the error, and returns a failure message with a result value of "false".


    ### Additional Notes

    This action is strictly for connectivity testing and does not process any entities
    or modify any data within the SOAR platform or external systems.
  ai_short_description: Tests connectivity to the AbuseIPDB API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to test connectivity. It does not mutate external
      data, update internal entities, or create insights.
  categories:
    enrichment: false
    reasoning: >-
      The action is a connectivity test ('Ping'). According to the enrichment rules,
      actions named 'Ping' must not be categorized as enrichment actions. It does
      not perform any remediation tasks.
    remediation: false
