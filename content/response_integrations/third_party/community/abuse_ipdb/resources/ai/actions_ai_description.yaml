Ping:
  ai_description: >-
    General Description

    This action verifies the connectivity between the SOAR platform and the AbuseIPDB
    service. It ensures that the configured API key is valid and that the integration
    can successfully communicate with the AbuseIPDB API endpoints.


    Flow Description

    1. The action retrieves the `Api Key` and `Verify SSL` settings from the integration
    configuration.

    2. An `AbuseIPDBManager` instance is initialized using these credentials.

    3. The action calls the `test_connectivity` method, which triggers a GET request
    to the AbuseIPDB API using a dummy IP address (`1.1.1.1`).

    4. The API response is validated to ensure the request was successful.

    5. The action returns a result of "true" if the connection is established, or
    "false" if an error (such as an invalid API key) occurs.


    Additional Notes

    This action is intended for configuration validation and does not process any
    entities or modify case data.
  ai_short_description: >-
    Tests connectivity to the AbuseIPDB service to verify the validity of the API
    key and network access.
  capabilities:
    can_create_case_comments: false
