Check IP Reputation:
  ai_description: "### General Description\nChecks the reputation of IP address entities\
    \ using the AbuseIPDB service. This action retrieves threat intelligence, including\
    \ confidence scores, ISP information, and usage types, to help analysts assess\
    \ the risk associated with specific IP addresses. It supports configurable thresholds\
    \ to automatically flag suspicious entities and can generate insights directly\
    \ within the case.\n\n### Flow Description\n1. **Initialization**: The action\
    \ extracts configuration parameters (API Key, SSL verification) and action-specific\
    \ parameters (Max Age, Threshold, etc.).\n2. **Filtering**: It filters the current\
    \ case entities to identify those of type `ADDRESS`. If `Exclude Internal Addresses`\
    \ is enabled, it further filters out entities marked as internal.\n3. **Data Retrieval**:\
    \ For each valid IP, the action performs a GET request to the AbuseIPDB API to\
    \ fetch reputation data.\n4. **Enrichment**: \n    - The retrieved data is mapped\
    \ to the entity's `additional_properties`.\n    - If the `abuseConfidenceScore`\
    \ meets or exceeds the `Suspicious Threshold`, the entity's `is_suspicious` status\
    \ is set to `True`.\n    - If `Create Insight` is enabled, an insight containing\
    \ the reputation details is added to the entity.\n5. **Update**: The action updates\
    \ the enriched entities within the SOAR platform.\n\n### Additional Notes\n- The\
    \ action requires a valid AbuseIPDB API key.\n- The `Suspicious Threshold` parameter\
    \ allows for automated risk assessment; setting it to 0 disables this feature.\n\
    - The action respects execution deadlines to prevent timeouts during large batch\
    \ processing."
  ai_short_description: >-
    Checks the reputation of IP address entities using AbuseIPDB, providing threat
    intelligence and automated risk flagging.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with reputation data and creates insights within the
      SOAR case.
    reasoning: >-
      The action fetches data via GET requests (fetches_data=true). It does not mutate
      external systems (can_mutate_external_data=false). It performs internal mutations
      by updating entity attributes and creating insights (can_mutate_internal_data=true).
  categories:
    enrichment: true
    reasoning: >-
      The action retrieves threat intelligence data from an external service (AbuseIPDB)
      and updates internal entity attributes and insights. It does not perform any
      external mutations (e.g., blocking IPs). Therefore, it is classified as an Enrichment
      action.
    remediation: false
