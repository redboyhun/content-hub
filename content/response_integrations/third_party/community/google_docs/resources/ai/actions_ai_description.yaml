Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Google Docs and Google Drive APIs. This action verifies
    that the provided service account credentials are valid and that the integration
    has the necessary permissions to interact with the Google services.


    ### Flow Description

    1. The action extracts the `Credentials Json` configuration parameter.

    2. It initializes the `GoogleDocsManager` using the provided credentials.

    3. The action executes the `test_connectivity` method, which performs a `files().list`
    API call to the Google Drive API to verify authentication and access.

    4. Upon successful execution, the action returns a success message.


    ### Additional Notes

    This action is intended for troubleshooting and verifying the integration configuration.
    It does not perform any data modification or enrichment tasks.
