Create Content:
  ai_description: >-
    ### General Description

    This action creates new content in a specified Google Doc by inserting text at
    defined indices. It leverages the Google Docs API to perform batch updates on
    a document.


    ### Flow Description

    1. Extract the `Document Id` and `Json` content parameters.

    2. Parse the `Json` parameter to extract the list of items, where each item contains
    an `index` and `text`.

    3. Construct a list of `insertText` requests for the Google Docs API, mapping
    each item's index and text.

    4. Execute the `batchUpdate` request via the Google Docs API using the provided
    `Document Id`.

    5. Return the result of the operation as a JSON object.


    ### Additional Notes

    The `Json` parameter must be a valid JSON string containing an "items" key, where
    each item has an "index" and "text" field. This action directly modifies the content
    of the specified Google Doc.
  ai_short_description: >-
    Creates new content in a specified Google Doc by inserting text at defined indices.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Modifies the content of a Google Doc by inserting text at specified indices.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Google Docs API to modify document content
      (can_mutate_external_data=true). It does not fetch context data or update internal
      entities.
  categories:
