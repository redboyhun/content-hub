Create Content:
  ai_description: >-
    ### General Description

    This action creates or appends content to a specific Google Document by interacting
    with the Google Docs API. It allows users to programmatically insert text at specified
    locations within a document, facilitating automated documentation or reporting
    workflows.


    ### Flow Description

    1. The action extracts the `Document Id` and a `Json` payload containing the content
    to be inserted from the action parameters.

    2. The `Json` payload is parsed to extract a list of items, where each item specifies
    an `index` (the location in the document) and the `text` to be inserted.

    3. The action constructs a list of `insertText` requests for the Google Docs API.

    4. The `GoogleDocsManager` is initialized using the provided credentials.

    5. The `execute_request` method is called, which performs a `batchUpdate` operation
    on the specified Google Document via the Google Docs API.

    6. The result of the API operation is added to the action results, and the action
    concludes with a success message.


    ### Additional Notes

    The `Json` parameter must be formatted as a JSON object containing an `items`
    array, where each item includes an `index` (integer) and `text` (string). The
    `Document Id` is the unique identifier found in the Google Docs URL.
  ai_short_description: >-
    Inserts text content into a specified Google Document using the Google Docs API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Modifies a Google Document by inserting text at specified indices using the
      Google Docs API.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a state-changing operation (batchUpdate) on an external
      system (Google Docs API) to insert text. It does not fetch data, update internal
      entities, or modify alert/case data.
