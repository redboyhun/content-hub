Remove Content:
  ai_description: >-
    ### General Description

    Removes specific content ranges from a Google Doc. This action allows users to
    programmatically delete text or elements from a document by specifying the start
    and end indices of the content to be removed.


    ### Flow Description

    1. The action extracts the `Document Id` and the `Json` configuration parameter.

    2. The `Json` parameter is parsed to retrieve a list of items, where each item
    contains a `start_index` and `end_index` defining the range of content to delete.

    3. The action constructs a list of `deleteContentRange` requests based on the
    provided indices.

    4. The `GoogleDocsManager` executes a `batchUpdate` request against the Google
    Docs API using the provided `Document Id` and the constructed requests.

    5. The API response is returned as a JSON result, and the action concludes with
    a success message.


    ### Additional Notes

    This action requires valid Google Docs credentials configured in the integration.
    The `Json` parameter must be provided in the format: `{"items": [{"start_index":
    1, "end_index": 2}, ...]}`.
  ai_short_description: >-
    Removes specified text ranges from a Google Doc.
