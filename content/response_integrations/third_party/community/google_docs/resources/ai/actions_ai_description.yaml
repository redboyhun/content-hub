Create Document:
  ai_description: >-
    ### General Description

    Creates a new Google Document and assigns sharing permissions to specified users.
    This action automates the creation of documents within Google Docs and configures
    access control via Google Drive, allowing for streamlined document generation
    and collaboration setup.


    ### Flow Description

    1. The action extracts the required configuration parameters (Credentials JSON)
    and action parameters (Title, Role, and Emails) from the integration settings.

    2. It initializes the `GoogleDocsManager` using the provided service account credentials
    to authenticate with both the Google Docs and Google Drive APIs.

    3. The action calls the Google Docs API to create a new document with the specified
    title.

    4. It then iterates through the provided list of email addresses and calls the
    Google Drive API to apply the specified sharing role (Owner, Writer, or Reader)
    to each user for the newly created document.

    5. Finally, it retrieves the metadata of the created file using the Google Drive
    API and returns this information as a JSON result.


    ### Additional Notes

    This action requires valid Google Cloud service account credentials with appropriate
    scopes (`https://www.googleapis.com/auth/drive.file`) to interact with Google
    Docs and Drive. The action does not perform any entity-based operations or internal
    SOAR data mutations.
  ai_short_description: >-
    Creates a new Google Document and assigns sharing permissions to specified users.
