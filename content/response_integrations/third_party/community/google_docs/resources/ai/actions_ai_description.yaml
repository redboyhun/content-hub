Remove Content:
  ai_description: >-
    ### General Description

    Removes specific content ranges from a Google Document using the Google Docs API.
    This action allows for precise deletion of text or elements within a document
    by specifying the start and end indices of the content to be removed.


    ### Flow Description

    1. The action extracts the `Document Id` and the `Json` configuration parameter
    from the action settings.

    2. The `Json` parameter is parsed to retrieve a list of items, where each item
    contains the `start_index` and `end_index` defining the range of content to delete.

    3. A list of `deleteContentRange` requests is constructed based on the parsed
    indices.

    4. The `GoogleDocsManager` is initialized using the provided credentials.

    5. The action executes a `batchUpdate` request against the specified Google Document
    via the Google Docs API to perform the deletion.

    6. The result of the API operation is added to the action results.


    ### Additional Notes

    The `Json` parameter must be provided as a valid JSON string containing an `items`
    array, where each object in the array specifies `start_index` and `end_index`
    (e.g., `{"items": [{"start_index": 1, "end_index": 2}]}`).
  ai_short_description: >-
    Removes specific content ranges from a Google Document using the Google Docs API.
