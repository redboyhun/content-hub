Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the Google SecOps platform and the Google Docs
    integration. This action verifies that the provided service account credentials
    are valid and that the integration can successfully communicate with the Google
    Drive API.


    ### Flow Description

    1. The action extracts the "Credentials Json" configuration parameter from the
    integration settings.

    2. It initializes the `GoogleDocsManager` using the provided credentials.

    3. The action executes the `test_connectivity` method, which performs a `files().list`
    API call to the Google Drive API to verify authentication and access.

    4. If the API call succeeds, the action terminates with a success message.


    ### Additional Notes

    This is a standard connectivity test action and does not perform any operational
    tasks or data processing. It is intended for troubleshooting and verifying integration
    setup.
