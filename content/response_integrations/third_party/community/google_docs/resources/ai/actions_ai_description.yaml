Create Document:
  ai_description: >-
    ### General Description

    Creates a new Google Document with a specified title and assigns access permissions
    to a list of email addresses. This action facilitates document management within
    the Google Workspace environment by automating the creation and sharing process.


    ### Flow Description

    1. The action extracts the required parameters: `Title`, `Role`, and `Emails`.

    2. It initializes the `GoogleDocsManager` using the provided credentials.

    3. The `create_document` method is called, which interacts with the Google Docs
    API to create a new document with the specified title.

    4. The action then calls `__insert_permission__`, which iterates through the provided
    email addresses and uses the Google Drive API to set the specified permission
    level (Owner, Writer, or Reader) for each user.

    5. Finally, the action retrieves the file metadata and returns it as a JSON result.


    ### Additional Notes

    This action performs external mutations by creating a new file and modifying permissions
    in Google Drive and Google Docs. It does not interact with SOAR entities or internal
    case data.
