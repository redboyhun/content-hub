Replace Content:
  ai_description: >-
    ### General Description

    Replaces specific text strings within a Google Document using the Google Docs
    API. This action allows for automated document updates by searching for defined
    text patterns and replacing them with new content.


    ### Flow Description

    1. The action extracts the `Document Id` and a `Json` configuration string from
    the action parameters.

    2. The `Json` string is parsed to retrieve a list of replacement items, each containing
    the text to search for, the replacement text, and a boolean flag for case sensitivity.

    3. The action constructs a list of `replaceAllText` requests for the Google Docs
    API based on the parsed items.

    4. The `GoogleDocsManager` is initialized with the provided credentials.

    5. The action executes a `batchUpdate` request via the Google Docs API to apply
    the text replacements to the specified document.

    6. The result of the operation is added to the action results.


    ### Additional Notes

    This action requires valid Google Docs API credentials. The `Json` parameter must
    be a valid JSON object containing an `items` list, where each item includes `text_to_search`,
    `text_to_replace`, and `match_case` fields.
