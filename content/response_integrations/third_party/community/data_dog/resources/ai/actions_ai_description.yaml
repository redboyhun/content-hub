Ping:
  ai_description: >-
    ### General Description

    Tests connectivity with the DataDog API to ensure the integration is configured
    correctly. This action verifies that the provided API and Application keys are
    valid and that the SOAR platform can successfully communicate with the DataDog
    service.


    ### Flow Description

    1. The action extracts the 'API Key' and 'APP Key' from the integration configuration.

    2. It initializes the `DataDogManager` using these credentials.

    3. The action calls the `test_connectivity` method, which performs a GET request
    to the DataDog validation endpoint (`/api/v1/validate`).

    4. Based on the API response, the action returns a success or failure status to
    the SOAR platform.


    ### Additional Notes

    This action is intended for troubleshooting and verifying integration health.
    It does not perform any data retrieval or modification operations on entities
    or external systems.
