Get Logs:
  ai_description: >-
    ### General Description

    Retrieves logs from Datadog for specified Kubernetes namespaces within a defined
    time range. This action allows analysts to query historical log data directly
    from Datadog to support investigation and troubleshooting workflows.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Key` and `APP
    Key`.

    2. It extracts the action parameters: `Namespace` (a comma-separated list), `Start
    Time`, and `End Time`.

    3. The action initializes the `DataDogManager` using the provided credentials.

    4. It iterates through each provided namespace.

    5. For each namespace, it calls the Datadog API (`/api/v1/logs-queries/list`)
    via a POST request to fetch the relevant logs.

    6. The retrieved logs are aggregated into a JSON result object.

    7. Finally, the action outputs the aggregated logs as a JSON result to the SOAR
    platform.


