Get Beautiful Metric:
  ai_description: >-
    ### General Description

    Analyzes a provided metric timeseries dataset to calculate statistical summaries.
    This action processes raw metric data points to derive key insights such as the
    sum, average, minimum, and maximum values, providing a structured JSON output
    for further analysis.


    ### Flow Description

    1. Extracts the `Series` parameter, which is expected to be a JSON string containing
    the metric timeseries data (including a `pointlist`).

    2. Parses the `Series` JSON input.

    3. Iterates through the `pointlist` to extract raw metric values.

    4. Calculates the sum, average, minimum, and maximum of the extracted metric values.

    5. Constructs a result object containing the calculated statistics, unit, aggregation
    type, and the original timeseries data.

    6. Adds the resulting JSON object to the action results using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is a utility tool for processing metric data. It does not perform
    any external API calls, nor does it modify any SOAR entities or case data.
  ai_short_description: >-
    Calculates statistical summaries (sum, average, min, max) for a provided metric
    timeseries dataset.
