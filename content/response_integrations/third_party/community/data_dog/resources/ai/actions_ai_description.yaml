Get Events:
  ai_description: >-
    ### General Description

    Retrieves events from DataDog based on specified time ranges, sources, and filtering
    criteria. This action allows analysts to query historical event data from their
    DataDog environment to support investigation and correlation efforts within the
    SOAR platform.


    ### Flow Description

    1. The action extracts the required configuration parameters (API Key and APP
    Key) to authenticate with the DataDog API.

    2. It retrieves the action-specific parameters: `Sources`, `Start Time`, `End
    Time`, `Tags`, `Priority`, and `Unaggregated`.

    3. The `DataDogManager` is initialized with the provided credentials.

    4. The action calls the `get_datadog_events` method, which performs a GET request
    to the DataDog API (`/api/v1/events`) using the provided query parameters.

    5. The retrieved events are printed to the logs and added to the action result
    using `siemplify.result.add_result_json`.

    6. The action concludes by returning a success message and a boolean status indicating
    whether events were successfully fetched.


    ### Additional Notes

    This action is strictly for data retrieval and does not modify any data within
    DataDog or the SOAR platform.
