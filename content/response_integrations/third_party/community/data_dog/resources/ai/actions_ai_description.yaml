Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the SOAR platform and the DataDog API. This action
    verifies that the provided API Key and APP Key are valid and that the integration
    can successfully communicate with the DataDog service.


    ### Flow Description

    1. The action extracts the 'API Key' and 'APP Key' from the integration configuration.

    2. It initializes the `DataDogManager` using these credentials.

    3. The action calls the `test_connectivity` method, which performs a GET request
    to the DataDog `/api/v1/validate` endpoint.

    4. The action evaluates the JSON response from the API.

    5. If the response contains `valid: true`, the action returns a success message;
    otherwise, it returns a failure message.

    6. The action terminates with the final status and output message.


    ### Additional Notes

    This action is intended for troubleshooting and verifying integration setup. It
    does not perform any data retrieval or modification operations on security entities
    or alerts.
