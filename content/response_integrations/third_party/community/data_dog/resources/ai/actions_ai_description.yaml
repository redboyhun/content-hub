Get Beautiful Metric:
  ai_description: >-
    ### General Description

    This action processes a provided JSON timeseries dataset to calculate statistical
    metrics. It takes a series of data points and computes the sum, average, minimum,
    and maximum values, providing a summarized view of the metric data.


    ### Flow Description

    1. The action extracts the `Series` parameter, which is expected to be a JSON
    string containing timeseries data (including `pointlist`, `start`, `end`, `unit`,
    `aggr`, and `expression`).

    2. It parses the JSON string into a dictionary.

    3. It iterates through the `pointlist` within the series to extract raw metric
    values.

    4. It calculates the sum, average, minimum, and maximum of these values.

    5. It constructs a result object containing the calculated statistics, unit, aggregation
    method, and time range.

    6. It outputs the result as a JSON object to the SOAR platform using `add_result_json`.


    ### Additional Notes

    This action does not interact with external systems or APIs; it performs local
    data processing on the provided input. Although the `DataDogManager` is imported,
    it is not utilized in the execution logic of this action.
  ai_short_description: >-
    Calculates statistical metrics (sum, average, min, max) from a provided JSON timeseries
    dataset.
