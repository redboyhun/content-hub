Get Pod Metric:
  ai_description: >-
    ### General Description

    Fetches performance metrics and process information for a specified Kubernetes
    Pod from DataDog. This action retrieves CPU usage, memory usage, and a list of
    running processes for the given Pod within a defined time range, providing visibility
    into the resource's operational state.


    ### Flow Description

    1. **Initialization**: The action extracts the DataDog API Key and APP Key from
    the integration configuration, along with the 'Pod Name', 'Start Time', and 'End
    Time' from the action parameters.

    2. **Data Retrieval**: The action iterates through the provided list of Pod names
    and performs the following API calls using the DataDogManager:
        * **CPU Metrics**: Calls `get_timeseries_point_metrics_cpu_pod` (GET request)
    to retrieve average CPU usage.
        * **Memory Metrics**: Calls `get_timeseries_point_metrics_memory_pod` (GET
    request) to retrieve average memory usage.
        * **Process List**: Calls `get_processes_by_tags` (GET request) to retrieve
    running processes associated with the Pod.
    3. **Aggregation**: The retrieved data is aggregated into a JSON object.

    4. **Output**: The action adds the aggregated JSON result to the action output
    using `siemplify.result.add_result_json` and terminates with a success status.


    ### Additional Notes

    This action requires valid DataDog API and APP keys to be configured in the integration
    settings. The 'Start Time' and 'End Time' parameters must be provided in Unixtime
    format.
