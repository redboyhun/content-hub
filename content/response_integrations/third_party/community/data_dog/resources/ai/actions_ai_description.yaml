Get Logs:
  ai_description: >-
    ### General Description

    Retrieves Kubernetes logs from Datadog for specified namespaces within a defined
    time range. This action allows analysts to query Datadog's log management system
    directly from the SOAR platform to investigate events associated with specific
    Kubernetes environments.


    ### Flow Description

    1. The action extracts the required configuration parameters (API Key, APP Key)
    and action parameters (Namespace, Start Time, End Time).

    2. The `DataDogManager` is initialized using the provided credentials.

    3. The provided `Namespace` string is parsed into a list of individual namespaces.

    4. For each namespace, the action executes a POST request to the Datadog API (`/api/v1/logs-queries/list`)
    to fetch logs matching the `kube_namespace` query within the specified time window.

    5. The retrieved logs are aggregated into a JSON result object.

    6. The final JSON result is attached to the action output, and the action terminates
    with a success status if logs were found, or an error status if no logs were retrieved.


    ### Additional Notes

    This action requires valid Datadog API and Application keys configured in the
    integration settings. The `Namespace` parameter supports multiple values separated
    by commas.
