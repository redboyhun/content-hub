Ping:
  ai_description: >-
    General Description

    Checks connectivity to the beSECURE platform by querying the API for network information.
    This action is used to verify that the integration is correctly configured and
    that the beSECURE API is accessible.


    Flow Description

    1. Retrieve the integration configuration (API Key and URL) for the beSECURE integration.

    2. Construct the request URL and parameters, including the API key and search
    criteria.

    3. Execute a GET request to the beSECURE API endpoint (`/json.cgi`) to retrieve
    network data.

    4. Validate the response; if an error is returned, mark the action as failed.

    5. Return the result of the connectivity check.


    Additional Notes

    This action does not interact with entities. It is primarily used to verify the
    integration's connectivity and API accessibility.
  ai_short_description: >-
    Checks connectivity to the beSECURE platform by querying the API for network information.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the beSECURE API to verify connectivity and
      retrieve network data. It does not mutate external or internal data, nor does
      it update entities or create insights.
