Ping:
  ai_description: >-
    ### General Description

    This action verifies connectivity to the beSECURE platform by performing a GET
    request to the `/json.cgi` endpoint. It retrieves network information to confirm
    the integration is operational.


    ### Flow Description

    1. Retrieves configuration settings (URL, API Key, SSL verification) for the beSECURE
    integration.

    2. Constructs a GET request to the beSECURE API endpoint (`/json.cgi`) with parameters
    to fetch network data (`action="returnnetworks"`).

    3. Executes the request using the `requests` library.

    4. Validates the response; if an "error" key is present, the action fails.

    5. Terminates the action with a success or failure status.


    ### Additional Notes

    This action is primarily used for connectivity testing and does not perform any
    data enrichment or remediation.
  ai_short_description: >-
    Verifies connectivity to the beSECURE platform by querying the API for network
    information.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to verify connectivity to the beSECURE API.
      It does not mutate external or internal data, nor does it update entities or
      create insights.
  categories:
