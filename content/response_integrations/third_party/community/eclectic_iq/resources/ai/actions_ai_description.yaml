Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities by retrieving threat intelligence and contextual metadata from
    the EclecticIQ platform. This action queries EclecticIQ for information related
    to the provided entities, parses the results, and updates the entities within
    the SOAR platform with the retrieved data. It also provides direct links to the
    EclecticIQ platform and detailed data tables for further analysis.


    ### Flow Description

    1. The action initializes the `EclecticIQManager` using the integration configuration
    (URL, API Token, SSL verification settings).

    2. It retrieves the list of target entities from the current case.

    3. The action performs a batch query to the EclecticIQ API (`/api/v2/observables`)
    to fetch information for the entity identifiers.

    4. It then queries the EclecticIQ API (`/api/v2/entities`) to fetch detailed entity
    information based on the retrieved observable IDs.

    5. The retrieved data is parsed and processed to extract relevant enrichment details,
    such as confidence scores, creation times, and platform links.

    6. The action updates the entities in the SOAR platform with the enrichment data
    using `siemplify.update_entities`.

    7. It adds entity links and data tables to the SOAR result for each enriched entity.

    8. Finally, it reports the status and any missing entities to the SOAR platform.


    ### Additional Notes

    This action does not modify external systems; it is strictly an enrichment action.
    It relies on the integration configuration for connectivity settings.
  ai_short_description: >-
    Enriches entities by retrieving threat intelligence and contextual data from the
    EclecticIQ platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with enrichment data retrieved from EclecticIQ.
    reasoning: >-
      The action fetches data from an external API (EclecticIQ) and updates internal
      SOAR entities. It does not mutate external data, create insights, or modify
      alert data.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external system (EclecticIQ) to enrich entities
      within the SOAR platform. It does not mutate external data or perform remediation
      tasks. Therefore, it is classified as an enrichment action.
    remediation: false
