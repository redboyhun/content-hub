Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the EclecticIQ platform to ensure the integration is correctly
    configured and the API is reachable.


    ### Flow Description

    1. The action retrieves the integration configuration, including the EclecticIQ
    URL, API Token, and SSL verification settings.

    2. It initializes the EclecticIQ manager using these credentials.

    3. The action performs an HTTP GET request to the EclecticIQ API endpoint (`/api/v2/sources`)
    to verify connectivity.

    4. If the request is successful, the action completes with a success status. If
    an exception occurs (e.g., connection error, invalid credentials), the action
    fails and logs the error.


    ### Additional Notes

    This action is a health check and does not perform any data enrichment, entity
    updates, or modifications to external systems.
