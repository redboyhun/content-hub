Enrich Entities:
  ai_description: "### General Description\nEnriches entities by querying the EclecticIQ\
    \ platform for threat intelligence and contextual data. This action retrieves\
    \ observable and entity information from EclecticIQ based on the identifiers of\
    \ the entities present in the current case. It then updates the entities within\
    \ the SOAR platform with the retrieved data, providing analysts with enriched\
    \ context directly on the entity.\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the `EclecticIQManager` using the integration configuration\
    \ (URL, API Token, SSL verification settings).\n2. **Data Retrieval**: The action\
    \ calls the `enrich` method, which performs the following:\n    * Fetches observable\
    \ information from the EclecticIQ `/api/v2/observables` endpoint.\n    * Fetches\
    \ entity information from the EclecticIQ `/api/v2/entities` endpoint based on\
    \ the observable IDs.\n    * Updates the retrieved entities with source information.\n\
    3. **Result Processing**: \n    * Adds the raw enrichment JSON to the action results.\n\
    \    * Adds entity links to the EclecticIQ platform for each enriched entity.\n\
    \    * Adds entity tables containing detailed enrichment data to the action results.\n\
    4. **Entity Update**: Updates the entities in the SOAR platform with the flattened\
    \ enrichment data and marks them as enriched.\n\n### Additional Notes\nThis action\
    \ relies on the EclecticIQ integration configuration being properly set up in\
    \ the SOAR environment. It does not require specific action-level parameters."
  ai_short_description: >-
    Enriches entities by retrieving threat intelligence and contextual data from the
    EclecticIQ platform and updating the entities within the SOAR platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities in the SOAR platform with enrichment data retrieved from EclecticIQ.
    reasoning: >-
      The action fetches data from the EclecticIQ API (fetches_data=true). It does
      not mutate external systems (can_mutate_external_data=false). It updates entities
      within the SOAR platform with the retrieved enrichment data (can_mutate_internal_data=true,
      can_update_entities=true). It does not create insights, modify alerts, or create
      case comments.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: true
      child_process: true
      cluster: false
      container: false
      credit_card: true
