Ping:
  ai_description: >-
    General Description

    This action tests the connectivity between the SOAR platform and the EclecticIQ
    platform. It is used to verify that the integration is correctly configured and
    that the SOAR platform can successfully communicate with the EclecticIQ API.


    Flow Description

    1. The action retrieves the EclecticIQ URL, API Token, and SSL verification settings
    from the integration configuration.

    2. It initializes the `EclecticIQManager` with these credentials.

    3. The action calls the `test_connectivity` method, which performs a `GET` request
    to the EclecticIQ API endpoint (`/api/v2/sources`) to verify authentication and
    network reachability.

    4. If the request is successful, the action completes with a success status and
    returns "true".

    5. If the request fails (e.g., due to invalid credentials or network issues),
    the action logs the error and returns "false".


    Additional Notes

    This action is strictly for troubleshooting and verifying integration health.
    It does not perform any data enrichment, remediation, or modification of entities
    or alerts.
  ai_short_description: >-
    Tests connectivity to the EclecticIQ platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
