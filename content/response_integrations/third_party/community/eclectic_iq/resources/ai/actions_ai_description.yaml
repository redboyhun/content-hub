    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over all `siemplify.target_entities` provided in the case.
      It does not perform explicit filtering by type in the main logic, but the `EclecticIQManager`
      utilizes an `ENTITY_MAP` to handle specific entity types (e.g., Hostname, Address,
      FileHash, etc.) when querying the EclecticIQ API. Therefore, the action supports
