    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity test (GET request) to verify the integration's
      health. It does not fetch contextual data, mutate external or internal data,
      or modify any entities or alerts.
  categories:
    enrichment: false
    reasoning: >-
      The action is a 'Ping' action, which is explicitly excluded from being an enrichment
