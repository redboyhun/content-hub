Send Entities to EclecticIQ:
  ai_description: >-
    ### General Description

    Sends entities from the current case to the EclecticIQ Intelligence Center as
    sightings. This action allows analysts to export relevant indicators and entities
    to their threat intelligence platform for further tracking and correlation. Users
    can optionally configure the action to create an indicator entity in addition
    to a sighting.


    ### Flow Description

    1. The action extracts configuration settings (EclecticIQ URL, API Token) and
    action parameters (Group Name, Create Indicator).

    2. It initializes the `EclecticIQManager` to handle API interactions.

    3. It performs a GET request to fetch the source ID associated with the provided
    EclecticIQ Group Name.

    4. The action iterates through the `target_entities` provided in the case, filtering
    for supported entity types (e.g., IP, Hostname, File Hash, URL).

    5. It constructs a sighting payload (and optionally an indicator payload) containing
    case metadata (title, description, priority, etc.) and the extracted entity information.

    6. It sends a PUT request to the EclecticIQ API (`/api/v2/entities`) to create
    the entities.

    7. Upon success, it adds a comment to the case and links the EclecticIQ platform
    URL to the entities using `siemplify.result.add_entity_link`.


    ### Additional Notes

    This action is an export/integration action and does not perform enrichment or
    reputation lookups. It requires a valid EclecticIQ API token and connectivity
    to the EclecticIQ instance.
  ai_short_description: >-
    Exports case entities to the EclecticIQ Intelligence Center as sightings or indicators.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates sightings and optionally indicators in the EclecticIQ platform.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a comment to the case and links the EclecticIQ platform URL to the entities.
    reasoning: >-
      The action fetches the group source ID (GET request) and creates entities in
      EclecticIQ (PUT request). It also adds a comment to the case and links the EclecticIQ
      platform URL to the entities.
