Send Entities to EclecticIQ:
  ai_description: >-
    ### General Description

    Sends entities from a Google SecOps case to the EclecticIQ Intelligence Center
    as sightings and optionally as indicators. This action facilitates the integration
    between Google SecOps and EclecticIQ by mapping case entities to EclecticIQ observables
    and creating corresponding records.


    ### Flow Description

    1. Extracts configuration (URL, API Token, SSL verification) and action parameters
    (`Group Name`, `Create Indicator`).

    2. Initializes `EclecticIQManager` with the provided credentials.

    3. Retrieves the source ID for the specified `Group Name` from EclecticIQ.

    4. Constructs a sighting object containing case metadata and the target entities.

    5. If `Create Indicator` is enabled, constructs an additional indicator object.

    6. Sends a `PUT` request to the EclecticIQ `/api/v2/entities` endpoint to create
    the sighting (and indicator, if applicable).

    7. Adds a comment to the case confirming the creation and adds a link to the EclecticIQ
    platform in the action results.


    ### Additional Notes

    This action mutates external data in EclecticIQ and modifies the internal case
    by adding comments and links.
  ai_short_description: >-
    Sends entities from a Google SecOps case to the EclecticIQ Intelligence Center
    as sightings and optionally as indicators.
  capabilities:
