Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cybersixgill service by authenticating with the provided
    credentials.


    ### Flow Description

    1. Extracts `Client Id` and `Client Secret` from the integration configuration.

    2. Initializes the `SixgillEnrichManager` with the provided credentials.

    3. Calls the `create_sixgill_client` method, which instantiates a `SixgillBaseClient`.

    4. Attempts to retrieve an access token using `get_access_token()` to verify authentication.

    5. Returns a success or failure status based on the authentication result.


    ### Additional Notes

    This action is a connectivity test and does not perform any data enrichment or
    remediation.
  ai_short_description: >-
    Tests connectivity to the Cybersixgill service by validating authentication credentials.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity test (Ping) to verify authentication credentials
      with the Cybersixgill API. It does not fetch contextual data about alerts or
      entities, nor does it mutate any external or internal data.
  categories:
