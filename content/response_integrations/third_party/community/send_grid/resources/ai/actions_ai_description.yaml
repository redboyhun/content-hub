Send Email:
  ai_description: >-
    ### General Description

    Sends an email notification using the SendGrid API. This action allows users to
    dispatch automated emails with custom subjects and content, facilitating communication
    or reporting workflows within the SOAR platform.


    ### Flow Description

    1. The action initializes the SendGrid API client using the configured API token.

    2. It constructs an email message object using the provided 'From', 'To', 'Subject',
    and 'Content' parameters.

    3. The action sends the email via the SendGrid API.

    4. If the 'Return Message Status' parameter is enabled, the action captures the
    response status code and recipient details, saving them as a JSON result in the
    action output.


    ### Additional Notes

    This action does not operate on specific entities and is intended for general
    notification or reporting purposes. It does not support retry logic.
  ai_short_description: >-
    Sends an email notification via the SendGrid API.
