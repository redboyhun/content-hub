Send Email:
  ai_description: >-
    ### General Description

    Sends an email message using the SendGrid API. This action allows users to dispatch
    notifications or reports to specified recipients with a custom subject and HTML
    content.


    ### Flow Description

    1. The action retrieves the integration configuration, including the SendGrid
    API token, and the action parameters (Email From, Email To, Subject, Content,
    and Return Message Status).

    2. It constructs a `Mail` object using the provided sender, recipient, subject,
    and HTML content.

    3. The action calls the SendGrid API (`sg.send`) to transmit the email.

    4. If the `Return Message Status` parameter is enabled, the action adds a result
    JSON to the SOAR platform containing the response status code and recipient information.

    5. The action logs the outcome and returns the execution status.


    ### Additional Notes

    This action does not process entities and operates independently of the alert's
    entity list.
  ai_short_description: >-
    Sends an email message via the SendGrid API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: Sends an email via the SendGrid API.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Adds result JSON to the SOAR platform if 'Return Message Status' is enabled.
    reasoning: >-
      The action performs an external API call to SendGrid to send an email (can_mutate_external_data=true).
      It also adds result JSON to the SOAR platform if configured (can_mutate_internal_data=true).
      It does not fetch data.
