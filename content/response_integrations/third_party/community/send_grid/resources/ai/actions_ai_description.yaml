Ping:
  ai_description: >-
    ### General Description

    This action verifies connectivity to the SendGrid API by performing a GET request
    to the `/v3/scopes` endpoint. It validates the provided API token by checking
    for the presence of the `mail.send` scope in the response, ensuring the integration
    is correctly configured and authorized.


    ### Flow Description

    1. Initialize the `SiemplifyAction` object.

    2. Retrieve the "API Token" from the SendGrid integration configuration.

    3. Establish an HTTPS connection to `api.sendgrid.com`.

    4. Execute a GET request to the `/v3/scopes` endpoint using the provided API token
    in the authorization header.

    5. Parse the JSON response to extract the available scopes.

    6. Search for the `mail.send` permission within the retrieved scopes.

    7. If the scope is found, return a success message; otherwise, return an error
    message indicating a connection or permission failure.


    ### Additional Notes

    This action is strictly for connectivity testing and validation. It does not perform
    any operations on entities, modify external data, or create insights within the
    SOAR platform.
  ai_short_description: >-
    Verifies connectivity to the SendGrid API and validates the provided API token
    by checking for required permissions.
  capabilities:
