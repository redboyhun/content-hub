Ping:
  ai_description: >-
    ### General Description

    Verifies connectivity to the SendGrid API by validating the provided API token
    and checking for required permissions.


    ### Flow Description

    1. Retrieves the API Token from the SendGrid integration configuration.

    2. Initiates an HTTPS GET request to the SendGrid API endpoint `/v3/scopes` using
    the provided authorization token.

    3. Parses the JSON response to extract the available API scopes.

    4. Checks if the `mail.send` scope is present in the retrieved permissions.

    5. Returns a success message if the scope is found, or an error message if the
    connection fails or the token is invalid.


    ### Additional Notes

    This action is strictly for connectivity testing and does not perform any data
    enrichment, remediation, or entity modification.
  ai_short_description: >-
    Verifies connectivity to the SendGrid API by validating the API token.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to verify API connectivity and permissions.
      It does not modify external or internal data.
  categories:
    enrichment: false
    reasoning: >-
      The action is a connectivity test (Ping). Per the guidelines, actions named
      'Ping' must not be categorized as enrichment actions. It does not perform any
      remediation tasks.
    remediation: false
