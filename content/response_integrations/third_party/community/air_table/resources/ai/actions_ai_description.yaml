Delete:
  ai_description: >-
    ### General Description

    Deletes records from an AirTable table based on a specified field and value match.
    This action performs a destructive operation by removing data from the external
    AirTable system.


    ### Flow Description

    1. Extracts configuration parameters (API key) and action parameters (Base ID,
    Table name, Field name, Field value, Max records).

    2. Initializes the `Airtable` client using the provided credentials and base/table
    information.

    3. Searches the specified table for records where the given field matches the
    provided value, limited by the `Max records` parameter.

    4. Iterates through the retrieved records and deletes each one using the `airtable.delete`
    method.

    5. Returns a summary message indicating the number of records deleted.


    ### Additional Notes

    This action performs a destructive operation by removing data from the external
    AirTable system. Ensure the `Field name` and `Field value` are accurate to avoid
    unintended data loss.
