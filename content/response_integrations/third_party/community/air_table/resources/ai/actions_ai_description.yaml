    ### General Description

    Retrieves records from a specified Airtable base and table. This action allows
    users to query data from Airtable, supporting sorting and limiting the number
    of records returned.


    ### Flow Description

    1. The action initializes the `SiemplifyAction` module.

    2. It retrieves the Airtable API key from the integration configuration.

    3. It extracts the action parameters: `Base Id`, `Table name`, `Max Records`,
    `Sort by`, and `Sort Direction`.

    4. The Airtable client is initialized using the provided credentials and base
    ID.

    5. The action calls the `airtable.get_all` method to fetch records, applying sorting
    criteria if the `Sort by` parameter is provided.

    6. The retrieved records are formatted as JSON and added to the action results.

    7. The action terminates with a success message indicating the total number of
    records retrieved.


    ### Additional Notes

    This action is a read-only operation and does not perform any modifications to
    the data within Airtable.
