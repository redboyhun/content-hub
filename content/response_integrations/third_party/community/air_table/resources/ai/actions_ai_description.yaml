AddOrUpdate:
  ai_description: >-
    General Description: This action synchronizes data with an AirTable table by either
    inserting new records or updating existing ones based on a specified field. It
    allows for automated data management within AirTable directly from the SOAR platform.


    Flow Description:

    1. Extracts configuration parameters (API Key) and action parameters (Base ID,
    Table Name, Field Name, JSON Fields).

    2. Parses the provided JSON string into a list of records.

    3. Initializes the AirTable client.

    4. Iterates through each record in the provided JSON list.

    5. Performs a search in the specified AirTable table using the provided field
    name and value to check for existing records.

    6. If a record is found, it updates the existing record using the `airtable.update`
    method.

    7. If no record is found, it inserts a new record using the `airtable.insert`
    method.

    8. Returns a summary message indicating the number of records inserted and updated.


    Additional Notes: This action does not interact with SOAR entities. It is a utility
    for external data management in AirTable.
  ai_short_description: >-
    Synchronizes data in AirTable by inserting new records or updating existing ones
    based on a specified field.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Inserts new records or updates existing records in the specified AirTable table.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to search for existing records (fetches_data=true)
      and performs POST/PATCH requests to insert or update records in AirTable (can_mutate_external_data=true).
      It does not interact with internal SOAR entities or alert data.
