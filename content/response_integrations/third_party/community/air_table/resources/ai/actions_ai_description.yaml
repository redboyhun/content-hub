Enrich Entities From Table:
  ai_description: >-
    ### General Description

    Enriches entities by searching for matching records in an Airtable database. This
    action retrieves contextual data from a specified Airtable base and table, then
    appends this information to the entity's `additional_properties` within the SOAR
    platform. It is designed to provide analysts with supplemental information stored
    in Airtable, such as asset details, user metadata, or threat intelligence, directly
    within the case.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves configuration parameters including
    the Airtable `Base id`, `Table name`, `Field name` (to search against), `Entity
    Field` (optional, to determine the search value), `Max records`, and an optional
    `Enrichment Prefix`.

    2. **Entity Iteration**: The action iterates through all target entities provided
    in the case.

    3. **Search Value Determination**: For each entity, it determines the search value.
    If `Entity Field` is provided, it attempts to retrieve the value from the entity's
    `additional_properties`. If not provided, it defaults to the entity's `identifier`.

    4. **Airtable Query**: It performs a search against the specified Airtable table
    using the `airtable.search` method with the determined search value.

    5. **Data Processing**: If results are found, the action flattens the nested dictionary
    result, applies the configured `Enrichment Prefix` to the keys, and updates the
    entity's `additional_properties`.

    6. **Entity Update**: Finally, the action updates the enriched entities in the
    SOAR platform using `siemplify.update_entities` and adds the raw JSON results
    to the action output.


    ### Additional Notes

    - The action supports flattening nested dictionary structures returned by Airtable
    to ensure compatibility with entity properties.

    - If `Entity Field` is specified but not found on an entity, that entity is skipped.

    - The action handles both exact matches and case-insensitive matches (by attempting
    a lowercase search if the initial search fails).
  ai_short_description: >-
    Enriches entities by retrieving and appending contextual data from an Airtable
    database based on entity identifiers or specific properties.
  capabilities:
    can_create_case_comments: false
