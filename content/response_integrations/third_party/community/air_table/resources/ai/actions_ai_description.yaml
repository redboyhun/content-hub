Create:
  ai_description: >-
    ### General Description

    Creates new records in a specified AirTable base and table. This action allows
    users to programmatically insert data into an AirTable database by providing the
    base ID, table name, and a JSON-formatted string of fields.


    ### Flow Description

    1. Extracts the API key from the integration configuration.

    2. Retrieves the `Base id`, `Table name`, and `Json fields` from the action parameters.

    3. Initializes the AirTable client using the provided credentials and base ID.

    4. Parses the `Json fields` parameter from a JSON string into a list of records.

    5. Iterates through the list and inserts each record into the specified AirTable
    table using the `airtable.insert` method.

    6. Collects the IDs and field data of the created records.

    7. Adds the result JSON to the action output and terminates the action with a
    success message.


    ### Additional Notes

    This action supports the creation of multiple rows in a single execution. The
    `Json fields` parameter must be a valid JSON array of objects.
