Update:
  ai_description: >-
    General Description


    Updates records in an Airtable database. This action searches for records matching
    a specific field and value, then applies updates to those records using a provided
    JSON object containing the new field values.


    Flow Description


    1. Extracts configuration parameters (API Key) and action parameters (Base ID,
    Table Name, Field Name, Field Value, JSON Fields, Max Records).

    2. Initializes the Airtable client using the provided Base ID and Table Name.

    3. Searches the specified Airtable table for records where the given `Field name`
    matches the `Field value`, limited by the `Max records` parameter.

    4. Iterates through the retrieved records and updates each one with the key-value
    pairs provided in the `Json fields` parameter using the Airtable API.

    5. Returns a summary message indicating the number of records updated.


    Additional Notes


    The action requires valid Airtable credentials and correct identifiers for the
    Base and Table. The `Json fields` parameter must be a valid JSON string representing
    the fields to update.
