Get All Records:
  ai_description: >-
    ### General Description

    This action retrieves records from a specified Airtable base and table. It allows
    users to define the maximum number of records to fetch and provides options for
    sorting the results.


    ### Flow Description

    1. Extracts the Airtable API key from the integration configuration.

    2. Retrieves the `Base Id`, `Table name`, `Max Records`, `Sort by`, and `Sort
    Direction` parameters.

    3. Initializes the Airtable client using the provided credentials and base/table
    information.

    4. Executes the `get_all` method on the Airtable client to fetch the records,
    applying sorting criteria if provided.

    5. Adds the retrieved records to the action result using `add_result_json` and
    `add_json`.

    6. Terminates the action with a summary message indicating the number of records
    fetched.


    ### Additional Notes

    This action is read-only and does not modify any data within Airtable or the SOAR
    platform. It is intended for data retrieval and visibility.
  ai_short_description: >-
    Retrieves records from a specified Airtable base and table.
