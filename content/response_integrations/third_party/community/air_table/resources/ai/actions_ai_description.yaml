AddOrUpdate:
  ai_description: >-
    ### General Description

    This action interacts with Airtable to add or update records in a specified table.
    It searches for existing records based on a provided field name and value, updating
    them if found, or inserting new records if they do not exist.


    ### Flow Description

    1. Extract configuration parameters (API key) and action parameters (Base ID,
    Table Name, Field Name, JSON fields).

    2. Initialize the Airtable client.

    3. Parse the provided JSON fields string into a dictionary.

    4. Iterate through the items in the JSON fields.

    5. For each item, search the Airtable table for existing records matching the
    specified field name and value.

    6. If records are found, update the existing record(s) using `airtable.update`.

    7. If no records are found, insert a new record using `airtable.insert`.

    8. Return a summary message indicating the count of inserted and updated records.


    ### Additional Notes

    This action performs write operations on the Airtable platform. Ensure the provided
    API key has appropriate permissions for the specified Base and Table.
  ai_short_description: >-
    Adds or updates records in an Airtable table based on a specified field and JSON
    data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates existing records or inserts new records into the specified Airtable
      table.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action searches Airtable (fetches data) and performs updates/inserts (mutates
      external data). It does not modify internal SOAR data.
  categories:
    enrichment: false
    reasoning: >-
      The action performs write operations (insert/update) on an external system (Airtable)
      and does not meet the criteria for an enrichment action (which must be read-only
      regarding external systems). It is also not a security remediation action as
      it does not perform containment, blocking, or mitigation.
