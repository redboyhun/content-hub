Delete All Records:
  ai_description: >-
    ### General Description

    Deletes all records from a specified table in an Airtable base. This action is
    designed to clear data from a table, effectively resetting its contents.


    ### Flow Description

    1. Extracts the Airtable API key from the integration configuration.

    2. Retrieves the `Base Id` and `Table name` from the action parameters.

    3. Initializes the Airtable client using the provided credentials and base/table
    identifiers.

    4. Fetches all existing records from the specified Airtable table using `airtable.get_all()`.

    5. Collects the unique identifiers for all retrieved records.

    6. Performs a batch deletion of all collected records using `airtable.batch_delete()`.

    7. Returns a success message indicating the total number of records deleted.


    ### Additional Notes

    This action performs a destructive operation by removing all data within the specified
    table. Ensure the correct table and base are targeted before execution.
