Delete:
  ai_description: >-
    ### General Description

    Deletes records from an AirTable table based on a specified field and value. This
    action allows for automated data cleanup or removal of records within an AirTable
    base.


    ### Flow Description

    1. Extract configuration parameters (API key) and action parameters (Base ID,
    Table name, Field name, Field value, Max records).

    2. Initialize the Airtable client using the provided credentials and table details.

    3. Search for records in the specified table where the `Field name` matches the
    `Field value`, limited by the `Max records` parameter.

    4. Iterate through the found records and delete each one using the Airtable API.

    5. Return a summary message indicating the number of records deleted.


    ### Additional Notes

    This action performs a destructive operation by removing data from the external
    AirTable system. Ensure the correct table and field criteria are provided to avoid
    accidental data loss.
