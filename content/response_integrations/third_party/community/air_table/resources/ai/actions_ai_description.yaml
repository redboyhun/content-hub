    and value. This action allows users to query structured data stored in Airtable
    bases, providing a way to retrieve relevant information for further analysis or
    context.


    ### Flow Description

    1. Extract action parameters: Base ID, Table name, Field name, Field value, and
    Max records.

    2. Initialize the Airtable client using the provided API key (from configuration)
    and the specified base and table identifiers.

    3. Execute the search operation against the Airtable API using the provided field
    name and value to filter records.

    4. Add the retrieved search results to the action's JSON output for further use
    in the SOAR platform.

    5. Terminate the action with a summary message indicating the number of records
    successfully matched.


