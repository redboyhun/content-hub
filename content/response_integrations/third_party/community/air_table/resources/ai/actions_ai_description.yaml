Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the AirTable integration by attempting to retrieve a
    record from the specified table.


    ### Flow Description

    1. Extracts the `Api key`, `Base id`, and `Table name` from the integration configuration.

    2. Initializes the AirTable client using the provided credentials and table details.

    3. Executes a `get_all` API call to AirTable with `maxRecords=1` to verify the
    connection.

    4. Terminates the action with a success message if the connection is established.


    ### Additional Notes

