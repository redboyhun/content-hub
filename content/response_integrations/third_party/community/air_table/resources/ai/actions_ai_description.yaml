    4. Fetch all existing records from the specified Airtable table using `airtable.get_all()`.

    5. Collect the unique identifiers (`id`) for all retrieved records.

    6. Perform a batch deletion of the collected records using `airtable.batch_delete()`.

    7. Return a success message indicating the total number of records deleted.


