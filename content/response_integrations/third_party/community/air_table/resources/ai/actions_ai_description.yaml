Enrich Entities From Table:
  ai_description: >-
    General Description: Enriches entities by searching for matching records in a
    specified Airtable database. This action allows users to map entity identifiers
    or specific entity properties to columns in an Airtable table, retrieving associated
    metadata to augment the entity's information within the SOAR platform.


    Flow Description:

    1. The action extracts configuration parameters, including the Airtable API key,
    Base ID, Table Name, Field Name, and optional settings like Enrichment Prefix
    and Max Records.

    2. An Airtable client is initialized using the provided credentials.

    3. The action iterates through all target entities provided in the context.

    4. For each entity, it determines the search value: either the entity's identifier
    or a value from a specific additional property field if defined.

    5. It performs a search in the specified Airtable table using the `airtable.search`
    method with the determined search value.

    6. If a match is found, the result dictionary is flattened, an optional prefix
    is applied to the keys, and the entity's `additional_properties` are updated with
    the retrieved data.

    7. The action updates the enriched entities in the SOAR platform.

    8. Finally, it returns the count of successful enrichments and any errors encountered
    during the process.


    Additional Notes: The action includes a utility to flatten nested dictionary structures
    returned by Airtable, ensuring that complex data can be easily stored within the
    entity's additional properties.
  ai_short_description: >-
    Enriches entities by retrieving contextual data from a specified Airtable table.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
