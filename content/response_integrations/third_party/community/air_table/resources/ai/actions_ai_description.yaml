Create:
  ai_description: >-
    ### General Description

    This action creates new records in a specified Airtable table. It takes a JSON-formatted
    list of fields and values, allowing for the batch creation of multiple rows within
    the target Airtable base and table.


    ### Flow Description

    1. Extract the Airtable API key from the integration configuration.

    2. Retrieve the Base id, Table name, and Json fields parameters provided by the
    user.

    3. Initialize the Airtable client using the provided credentials, base ID, and
    table name.

    4. Parse the Json fields parameter from a string into a list of dictionaries.

    5. Iterate through each dictionary in the list and perform an insert operation
    via the Airtable API to create a new record.

    6. Collect the IDs and field data of the successfully created records.

    7. Output a success message indicating the number of records created and attach
    the result JSON to the action.


    ### Additional Notes

    The Json fields parameter must be a valid JSON array of objects, where each object
    represents a row to be created in the Airtable table.
