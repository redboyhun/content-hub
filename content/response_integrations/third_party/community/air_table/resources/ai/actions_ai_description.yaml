Update:
  ai_description: >-
    ### General Description

    Updates records in an Airtable database based on a search query. This action allows
    users to modify specific fields within a table by searching for records that match
    a provided field name and value, and then applying a set of updates defined in
    JSON format.


    ### Flow Description

    1. The action extracts configuration parameters, including the Airtable API key,
    and action parameters: Base ID, Table Name, Field Name, Field Value, JSON Fields,
    and Max Records.

    2. The Airtable client is initialized using the provided Base ID, Table Name,
    and API Key.

    3. The action performs a search on the specified Airtable table to retrieve records
    where the specified field matches the provided field value, limited by the Max
    Records parameter.

    4. The action iterates through the retrieved records.

    5. For each record, the action performs an update operation using the provided
    JSON fields.

    6. The action concludes by returning the total count of records updated.


    ### Additional Notes

    This action performs a mutation on external data (Airtable). Ensure that the provided
    API key has the necessary permissions to read and update the target Airtable base
    and table. The action does not interact with SOAR entities or internal case data.
