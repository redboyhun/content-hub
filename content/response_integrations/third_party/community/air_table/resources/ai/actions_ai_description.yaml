Search:
  ai_description: >-
    ### General Description

    Searches for records in an AirTable database table based on a specified field
    name and value. This action allows users to query structured data stored in AirTable
    bases, providing a flexible way to retrieve information for further analysis or
    investigation.


    ### Flow Description

    1. Extracts configuration parameters (API Key) and action parameters (Base ID,
    Table Name, Field Name, Field Value, Max Records) from the action configuration.

    2. Initializes the AirTable client using the provided credentials and base/table
    identifiers.

    3. Executes a search query against the specified AirTable table to find records
    matching the provided field name and value.

    4. Limits the number of returned records based on the `Max records` parameter
    (defaulting to 5 if the parameter is not a valid integer).

    5. Adds the search results to the action result JSON and prints them to the log.

    6. Terminates the action with a summary message indicating the number of matched
    records.


    ### Additional Notes

    The action does not modify any data in AirTable; it is a read-only search operation.
