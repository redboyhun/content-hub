Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the SOAR platform and the Cybersixgill Darkfeed
    service. This action verifies that the provided credentials allow the SOAR platform
    to successfully authenticate with the Cybersixgill API.


    ### Flow Description

    1. The action extracts the `Client Id` and `Client Secret` from the integration
    configuration.

    2. It initializes the `SixgillEnrichManager` using these credentials.

    3. The `create_sixgill_client` method is called, which instantiates a `SixgillBaseClient`.

    4. The action performs an authentication request via `get_access_token()` to verify
    the credentials against the Cybersixgill service.

    5. The connection status and a success message are returned to the SOAR platform.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying that the integration
    is correctly configured and authorized to communicate with the Cybersixgill API.
  ai_short_description: >-
    Tests connectivity to the Cybersixgill Darkfeed service by verifying authentication
    credentials.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs an authentication handshake to verify connectivity. It does
      not fetch contextual data, mutate external or internal data, update entities,
      or modify alert/case data.
