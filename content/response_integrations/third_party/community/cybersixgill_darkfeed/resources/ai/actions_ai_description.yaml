Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cybersixgill Darkfeed service to ensure the integration
    is properly configured and authenticated.


    ### Flow Description

    1. Extracts the `Client Id` and `Client Secret` from the integration configuration.

    2. Initializes the `SixgillEnrichManager` with the provided credentials.

    3. Calls the `create_sixgill_client` method, which instantiates a `SixgillBaseClient`.

    4. Executes the `get_access_token()` method to verify authentication and connectivity
    with the Cybersixgill API.

    5. Returns the connection status and result to the SOAR platform.


    ### Additional Notes

    This action is strictly for connectivity verification and does not perform any
    data enrichment or remediation tasks.
  ai_short_description: >-
    Tests connectivity to the Cybersixgill Darkfeed service.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
