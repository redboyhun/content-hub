    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity check by requesting an access token. It does
      not fetch contextual data, mutate external systems, or modify internal SOAR
      data.
  categories:
