Authorize Security Group Ingress:
  ai_description: >-
    ### General Description

    Adds or updates inbound IP permissions for a specified AWS EC2 security group.
    This action allows users to programmatically modify network access rules within
    an AWS VPC environment by providing a security group ID and the desired ingress
    rules in JSON format.


    ### Flow Description

    1. The action extracts the AWS credentials (Access Key ID, Secret Access Key,
    and Default Region) from the integration configuration.

    2. It retrieves the `Group ID` and `IP Permissions` parameters provided by the
    user.

    3. The `IP Permissions` JSON string is parsed into a dictionary.

    4. An `EC2Manager` instance is initialized with the extracted credentials.

    5. The action calls the `authorize_security_group_ingress` method via the AWS
    SDK to apply the new ingress rules to the specified security group.

    6. The result of the operation is logged, and the JSON response from AWS is added
    to the action results.


    ### Additional Notes

    This action requires valid AWS credentials with appropriate permissions to modify
    security groups. The `IP Permissions` parameter must be a valid JSON string representing
    the ingress rules (e.g., `{"FromPort": 80, "IpProtocol": "tcp", "IpRanges": [{"CidrIp":
    "1.1.1.1/16"}], "ToPort": 80}`).
