Create Instance:
  ai_description: >-
    General Description

    Creates a new Amazon EC2 instance within the AWS environment using the specified
    Amazon Machine Image (AMI) and configuration parameters. This action automates
    the provisioning of cloud resources by interacting directly with the AWS EC2 API.


    Flow Description

    1. The action extracts AWS credentials (Access Key ID, Secret Access Key) and
    the default region from the integration configuration.

    2. It retrieves the required action parameters: Image ID, Instance Type, Max Count,
    Min Count, and Security Group IDs.

    3. The `EC2Manager` initializes a connection to the AWS EC2 service using the
    provided credentials.

    4. The action calls the `create_instance` method (which executes the `run_instances`
    API call) to initiate the creation of the EC2 instance.

    5. The action checks the state of the created instances. If the instances are
    in a 'pending' state, the action sets the execution status to 'In Progress' and
    saves the instance IDs to the additional data for subsequent polling.

    6. If the instances are 'running', the action completes and returns the instance
    details in the result JSON.


    Additional Notes

    This action performs a state-changing operation on the AWS environment. It supports
    asynchronous execution, allowing the action to wait for the instance to transition
    from a 'pending' state to a 'running' state across multiple runs.
  ai_short_description: >-
    Creates a new Amazon EC2 instance in the AWS environment using the provided AMI
    ID and configuration settings.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
