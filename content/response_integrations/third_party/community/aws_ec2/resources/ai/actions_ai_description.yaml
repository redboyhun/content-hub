    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Modifies AWS EC2 security group rules by adding outbound IP permissions.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a state-changing operation on an external system (AWS EC2)
