Find Instance:
  ai_description: >-
    ### General Description

    Fetches detailed information about AWS EC2 instances. This action allows users
    to retrieve metadata for specific instances by providing their IDs or by applying
    filters to narrow down the search results. If no specific criteria are provided,
    the action retrieves information for all available instances (up to a maximum
    of 1000).


    ### Flow Description

    1. **Configuration Extraction**: The action extracts the AWS credentials (Access
    Key ID, Secret Key) and the default region from the integration configuration.

    2. **Parameter Extraction**: It retrieves the action-specific parameters: `Instance
    Ids`, `Filters`, and `Max Results`.

    3. **Manager Initialization**: An `EC2Manager` object is initialized using the
    extracted AWS credentials to facilitate communication with the AWS EC2 API.

    4. **Data Retrieval**: The action calls the `describe_instances` method of the
    `EC2Manager` to query the AWS EC2 service.

    5. **Result Processing**: The retrieved instance details are formatted into a
    JSON object.

    6. **Output Generation**: The action adds the resulting JSON data to the action
    output using `siemplify.result.add_result_json` and terminates with a success
    message.


    ### Additional Notes

    - This action is read-only and does not modify any AWS resources or internal SOAR
    case data.

    - If `Instance Ids` are provided, the action attempts to fetch details for each
    specific ID. If `Filters` are provided, it uses them to query the instances.
  ai_short_description: >-
    Fetches detailed information about AWS EC2 instances based on provided IDs or
