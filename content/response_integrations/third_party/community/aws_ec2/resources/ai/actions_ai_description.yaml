Delete Instance:
  ai_description: >-
    ### General Description

    Deletes specified AWS EC2 instances.


    ### Flow Description

    1. Extracts AWS credentials (Access Key ID, Secret Access Key) and region from
    integration configuration.

    2. Extracts the comma-separated list of `Instance Ids` from the action parameters.

    3. Initializes the `EC2Manager` with the provided credentials.

    4. Iterates through each provided instance ID.

    5. Calls the `terminate_instances` API via `EC2Manager.delete_instance` for each
    ID.

    6. Verifies the instance state (e.g., "shutting-down" or "terminated").

    7. Logs the outcome for each instance and aggregates the results.

    8. Returns the count of successfully deleted instances as the result value and
    attaches the detailed JSON response.


    ### Additional Notes

    Deleted instances remain visible in AWS for approximately one hour after termination.
