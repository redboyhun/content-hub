Authorize Security Group Egress:
  ai_description: >-
    ### General Description

    Authorizes outbound IP permissions for a specific security group in an AWS VPC.
    This action allows users to modify the egress rules of an existing security group
    by providing the group ID and the desired IP permissions in JSON format.


    ### Flow Description

    1. The action extracts the AWS configuration parameters (Access Key ID, Secret
    Key, Default Region) from the integration settings.

    2. It extracts the action parameters (Group ID, IP Permissions) provided by the
    user.

    3. The IP Permissions string is parsed into a JSON object.

    4. The action instantiates an `EC2Manager` to interact with the AWS EC2 API.

    5. It calls the `authorize_security_group_egress` method to apply the new egress
    rules to the specified security group.

    6. The action logs the success or failure of the operation and returns the result
    JSON to the SOAR platform.


    ### Additional Notes

    This action requires valid AWS credentials with appropriate permissions to modify
    security groups. The IP permissions must be provided in the correct JSON format
    as specified in the parameter description.
