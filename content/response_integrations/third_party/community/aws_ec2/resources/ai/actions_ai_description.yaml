Delete Instance:
  ai_description: >-
    Deletes specified AWS EC2 instances. This action interacts with the AWS EC2 API
    to terminate instances based on the provided instance IDs, effectively removing
    them from the cloud environment.


    ### Flow Description

    1. The action extracts the AWS configuration (Access Key ID, Secret Key, and Default
    Region) and the `Instance Ids` parameter.

    2. An `EC2Manager` object is initialized to handle the connection to the AWS EC2
    service.

    3. The action iterates through the provided list of instance IDs.

    4. For each instance, it calls the `terminate_instances` method via the AWS Boto3
    client.

    5. The action logs the status of each termination attempt (e.g., 'shutting-down'
    or 'terminated').

    6. Finally, it adds the result JSON containing the termination details and ends
    the action with a summary message and the count of successfully deleted instances.


    ### Additional Notes

    Deleted instances remain visible in the AWS console for approximately one hour
    after termination. This action performs a destructive operation on cloud infrastructure.
