Create Instance:
  ai_description: >-
    ### General Description

    Creates a new Amazon EC2 instance based on the provided AMI ID and configuration
    parameters. This action interacts with the AWS EC2 API to provision cloud resources,
    allowing for the automated deployment of virtual machines within an AWS environment.


    ### Flow Description

    1. The action extracts AWS credentials (Access Key ID, Secret Access Key, Default
    Region) and action parameters (Image ID, Instance Type, Max Count, Min Count,
    Security Group ID) from the integration configuration.

    2. An `EC2Manager` instance is initialized to handle communication with the AWS
    EC2 API.

    3. The action executes the `run_instances` method via the AWS API to initiate
    the creation of the requested EC2 instance(s).

    4. If the instance state is 'pending', the action enters an asynchronous polling
    state, returning the pending instance IDs and setting the execution state to `INPROGRESS`.

    5. If the instance state is 'running', the action logs the success, returns the
    instance details in a JSON result, and completes the execution.

    6. During subsequent runs (polling), the action uses `describe_instances` to check
    the status of the pending instances until they are running or an error occurs.


    ### Additional Notes

    This action performs an external mutation by provisioning cloud infrastructure.
    It supports asynchronous execution to handle instance initialization delays, ensuring
    the SOAR platform can track the provisioning process until completion.
