Authorize Security Group Egress:
  ai_description: >-
    General Description: Adds or updates outbound IP permissions for a specific AWS
    EC2 security group within a VPC. This action allows users to programmatically
    modify network access rules by specifying the security group ID and the desired
    IP permission configuration in JSON format.


    Flow Description:

    1. The action extracts AWS credentials (Access Key ID, Secret Access Key, Default
    Region) from the integration configuration.

    2. It retrieves the 'Group ID' and 'IP Permissions' (JSON string) from the action
    parameters.

    3. The action initializes an `EC2Manager` instance using the provided AWS credentials.

    4. It calls the `authorize_security_group_egress` method, which utilizes the `boto3`
    library to send an `authorize_security_group_egress` request to the AWS EC2 API.

    5. The action logs the outcome and returns the JSON response from the AWS API
    to the SOAR platform.


    Additional Notes: This action requires appropriate AWS IAM permissions (e.g.,
    `ec2:AuthorizeSecurityGroupEgress`) to modify security group rules. The 'IP Permissions'
    parameter must be provided in a valid JSON format compatible with the AWS EC2
    API structure.
  ai_short_description: >-
    Adds or updates outbound IP permissions for an AWS EC2 security group.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
