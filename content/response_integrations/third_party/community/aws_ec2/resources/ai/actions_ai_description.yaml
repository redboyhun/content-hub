Find Instance:
  ai_description: >-
    General Description

    Fetches detailed information about AWS EC2 instances. This action allows users
    to retrieve metadata for specific instances by providing their IDs, or to query
    for instances based on custom filters. If no specific criteria are provided, it
    retrieves information for all instances up to a specified limit.


    Flow Description

    1. Extract integration configuration parameters, including the AWS Access Key
    ID, Secret Access Key, and Default Region.

    2. Extract action parameters: 'Instance Ids' (optional), 'Filters' (optional),
    and 'Max Results' (optional).

    3. Initialize the `EC2Manager` with the provided AWS credentials and region.

    4. Call the `describe_instances` method via `EC2Manager` using the provided parameters.

    5. If specific Instance IDs are provided, the action fetches details for those
    instances. If not, it fetches instances based on the provided filters or returns
    all instances up to the 'Max Results' limit.

    6. Add the retrieved instance details to the action result JSON.

    7. End the action with a success message and the result value.


    Additional Notes

    If no Instance IDs or filters are specified, the action retrieves information
    for all instances (up to the 'Max Results' limit). The 'Filters' parameter should
    be provided as a JSON object (e.g., `{"Name": "instance-type", "Values": ["t2.micro"]}`).
