Create Tags:
  ai_description: >-
    ### General Description

    Creates tags for specified AWS EC2 resources. This action allows users to apply
    custom metadata tags to one or more EC2 resources, facilitating better resource
    organization and management within the AWS environment.


    ### Flow Description

    1. The action extracts AWS credentials (Access Key ID, Secret Access Key) and
    the default region from the integration configuration.

    2. It retrieves the `Resources ID` (a comma-separated string) and `Tags` (a JSON
    string) from the action parameters.

    3. The `Tags` parameter is parsed into a list of key-value pairs.

    4. The action iterates through the provided list of resource IDs.

    5. For each resource, it calls the AWS EC2 `create_tags` API to apply the specified
    tags.

    6. The action logs the success or failure of the tagging operation for each resource.

    7. Finally, it returns the result JSON containing details of the tagged resources
    and ends the action.


    ### Additional Notes

    This action requires valid AWS credentials with appropriate permissions to modify
    tags on EC2 resources. The `Tags` parameter must be provided in a valid JSON format
    (e.g., `{"tags": [{"Key": "key1", "Value": "value1"}]}`).
