Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Luminar API to verify that the integration is correctly
    configured and authorized. This action performs an authentication handshake with
    the Luminar service using the provided credentials.


    ### Flow Description

    1. The action extracts the required configuration parameters (Luminar API Client
    ID, Client Secret, Account ID, and Base URL) from the integration settings.

    2. It initializes the `LuminarManager` class with these credentials.

    3. The `test_connectivity` method is invoked, which sends a `POST` request to
    the Luminar API token endpoint (`/externalApi/realm/{account_id}/token`).

    4. The action evaluates the HTTP response status code:
       - If the response indicates success (e.g., 200 OK), it confirms the connection
    is established.
       - If the response indicates failure (e.g., 401, 403, 400, 404), it reports
    a connection failure.
    5. The final status and output message are returned to the SOAR platform.


    ### Additional Notes

    This action does not perform any data retrieval, enrichment, or modification of
    entities or alerts. It is strictly used for troubleshooting and verifying integration
    connectivity.
  ai_short_description: >-
    Tests connectivity to the Luminar API to verify integration credentials and service
    availability.
  capabilities:
