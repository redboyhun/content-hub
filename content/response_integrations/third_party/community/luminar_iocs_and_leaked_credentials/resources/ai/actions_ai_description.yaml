Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the SOAR platform and the Luminar API by validating
    the provided credentials. This action ensures that the integration is correctly
    configured and that the SOAR platform can successfully authenticate with the external
    service.


    ### Flow Description

    1. The action extracts the required configuration parameters (Luminar API Client
    ID, Client Secret, Account ID, and Base URL) from the integration settings.

    2. It initializes the `LuminarManager` class with these credentials.

    3. The `test_connectivity` method is invoked, which sends a POST request to the
    Luminar API token endpoint (`/externalApi/realm/{account_id}/token`) using the
    provided credentials.

    4. The action evaluates the HTTP response status code.

    5. If the authentication is successful, it returns a success message; otherwise,
    it returns a failure message indicating that the credentials are invalid or the
    connection failed.


    ### Additional Notes

    This action is strictly for connectivity testing and does not perform any data
    retrieval, entity enrichment, or system mutation. It is intended to be used by
    administrators to verify integration health.
  ai_short_description: >-
    Tests connectivity to the Luminar API by validating the provided credentials.
  capabilities:
