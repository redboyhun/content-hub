Delete User:
  ai_description: >-
    ### General Description

    Deletes a user account from the Zoom platform. This action allows for the permanent
    removal of a user while providing options to transfer their associated meetings,
    webinars, and recordings to another specified user.


    ### Flow Description

    1. The action extracts the target user's email and transfer preferences (recordings,
    webinars, meetings, and transfer email) from the action parameters.

    2. The `ZoomManager` is initialized with the integration configuration.

    3. The action performs GET requests to the Zoom API (`list_recordings`, `list_webinars`,
    `list_meetings`) to verify if the user has data that needs to be transferred,
    provided the transfer options are enabled.

    4. The action executes a DELETE request to the Zoom API to remove the user, passing
    the transfer parameters if applicable.

    5. The action returns the result of the deletion operation (success or failure)
    to the SOAR platform.


    ### Additional Notes

    This action performs a destructive operation on the Zoom platform. Ensure the
    correct user email is provided to avoid accidental data loss or unauthorized account
    deletion.
