Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Zoom API to ensure the integration is configured correctly
    and the credentials are valid. This action is primarily used for troubleshooting
    and verifying the health of the integration connection.


    ### Flow Description

    1. The action initializes the `ZoomManager` using the integration configuration
    (JWT or OAuth credentials).

    2. It calls the `test_connectivity` method.

    3. The `test_connectivity` method performs a GET request to the Zoom API (`/users`
    endpoint) to verify access.

    4. If the request is successful, the action returns a success status and a confirmation
    message.

    5. If the request fails (e.g., due to invalid credentials or network issues),
    the action catches the exception and returns a failure status with the error details.


    ### Additional Notes

