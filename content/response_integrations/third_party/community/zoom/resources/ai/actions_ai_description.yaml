Create Meeting:
  ai_description: >-
    ### General Description

    Creates a scheduled or instant meeting in the Zoom platform. This action allows
    users to automate the scheduling of meetings by providing details such as the
    meeting topic, type, start time, duration, time zone, recording preferences, and
    the host's email address.


    ### Flow Description

    1. The action extracts the required parameters: `Meeting Topic`, `Meeting Type`,
    `Meeting Start Time`, `Meeting Duration`, `Time Zone`, `Auto Recording Type`,
    and `Host Email Address`.

    2. The `ZoomManager` is initialized using the integration configuration credentials
    (OAuth or JWT).

    3. The action performs a `POST` request to the Zoom API endpoint (`/users/{host_email}/meetings`)
    with the provided meeting details.

    4. If the meeting is created successfully, the action adds the meeting's join
    URL as a link to the result and attaches the full JSON response from the Zoom
    API.

    5. If the creation fails, the action logs the error and marks the execution as
    failed.


    ### Additional Notes

    This action requires valid Zoom API credentials (OAuth or JWT) configured in the
    integration settings. The 'Meeting Start Time' must follow the format 'yyyy-mm-dd
    hh:mm:ss' and is only applicable for scheduled meetings.
  ai_short_description: >-
    Creates a scheduled or instant meeting in Zoom.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new meeting in the Zoom platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the Zoom API to create a meeting, which
      constitutes an external data mutation. It does not fetch data, update internal
      entities, or modify alert/case data.
