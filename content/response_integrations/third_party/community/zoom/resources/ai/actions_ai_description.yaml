Create User:
  ai_description: >-
    ### General Description

    Creates a new user account within the Zoom platform. This action allows administrators
    to provision users by specifying their first name, last name, email address, and
    license type (e.g., Basic, Licensed, On-prem).


    ### Flow Description

    1. The action extracts the required parameters: First Name, Last Name, Email,
    and User Type from the action configuration.

    2. It initializes the `ZoomManager` using the provided integration credentials
    (JWT or OAuth).

    3. The action checks if the user already exists by calling the Zoom API `GET /users/{email}`
    endpoint.

    4. If the user does not exist, it proceeds to perform a `POST` request to the
    `https://api.zoom.us/v2/users` endpoint with the provided user details to create
    the account.

    5. The action returns the created user details in the result JSON if successful,
    or fails if the user already exists or if the API request encounters an error.


    ### Additional Notes

    This action is strictly for provisioning new users. It does not modify existing
    user attributes or perform any remediation tasks on the SOAR case.
