Delete User:
  ai_description: >-
    ### General Description

    Deletes a user account from the Zoom platform. This action allows for the optional
    transfer of the deleted user's scheduled meetings, cloud recordings, and webinars
    to another specified user account.


    ### Flow Description

    1. The action extracts the `Deleted User Email` and transfer configuration parameters
    (`Transfer Recordings`, `Transfer Webinar`, `Transfer Meeting`, `Transfer Email`)
    from the action settings.

    2. The `ZoomManager` is initialized using the integration's authentication credentials.

    3. The action checks for the existence of recordings, webinars, and meetings associated
    with the target user if the respective transfer options are enabled. If no data
    is found for a specific category, the transfer flag for that category is set to
    false.

    4. The action makes a DELETE request to the Zoom API (`/Users/{user_email}`) to
    remove the user, passing the transfer settings and the destination email for the
    transferred data.

    5. The action returns the result of the deletion operation, indicating success
    or failure.


    ### Additional Notes

    This action performs a destructive operation on the Zoom platform. Ensure that
    the `Deleted User Email` is correct before execution. If transfer options are
    enabled, a valid `Transfer Email` must be provided to receive the transferred
    data.
  ai_short_description: >-
    Deletes a user account from Zoom and optionally transfers their associated meetings,
    recordings, and webinars to another user.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
