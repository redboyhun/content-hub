Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches User entities with contextual metadata retrieved from Zoom. This action
    queries the Zoom API to fetch detailed user information and updates the corresponding
    entity in the SOAR platform with this data, facilitating better investigation
    and context for analysts.


    ### Flow Description

    1. The action iterates through all target entities provided in the case.

    2. It filters the entities to process only those of type 'USER'.

    3. For each valid user entity, it calls the Zoom API (`get_user_details`) using
    the entity's identifier (email).

    4. The retrieved user data is flattened and prefixed with 'Zoom' to ensure clarity.

    5. The entity's `additional_properties` are updated with the flattened user data.

    6. The entity is marked as enriched (`is_enriched = True`).

    7. Finally, the action updates the entities in the SOAR platform and adds the
    raw JSON result to the action output.


    ### Additional Notes

    This action performs read-only operations on the external Zoom system and does
    not modify any external data. It strictly performs internal mutation by updating
    entity properties within the SOAR platform.
