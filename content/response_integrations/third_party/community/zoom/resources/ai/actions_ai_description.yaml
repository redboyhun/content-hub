Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches User entities with profile information retrieved from Zoom. This action
    queries the Zoom API to fetch detailed user metadata, such as account status,
    department, and other profile attributes, and updates the corresponding entity
    in the SOAR platform with this information.


    ### Flow Description

    1. The action iterates through all target entities provided in the case.

    2. It filters the entities to process only those with the type `USER`.

    3. For each valid user entity, the action calls the `get_user_details` method
    of the `ZoomManager` to retrieve user information from the Zoom API via a GET
    request.

    4. The retrieved user data is flattened and prefixed with "Zoom" to ensure clarity
    in the entity's profile.

    5. The action updates the `additional_properties` of the entity with the enriched
    data and sets the `is_enriched` flag to true.

    6. Finally, the action updates the entities in the SOAR platform and adds the
    full user details as a JSON result to the action output.


    ### Additional Notes

    This action requires valid Zoom credentials (either a JWT token or OAuth credentials
    consisting of Account ID, Client ID, and Client Secret) to be configured in the
    integration settings. It does not modify any data within the Zoom platform.
