Get Meeting Recording:
  ai_description: >-
    ### General Description

    Fetches meeting recording details from Zoom using a provided Meeting ID. This
    action retrieves metadata and the shareable URL for a specific meeting recording
    stored in the cloud, allowing analysts to access meeting content directly from
    the SOAR platform.


    ### Flow Description

    1. The action extracts the `Meeting ID` parameter provided by the user.

    2. The `ZoomManager` is initialized using the integration's configured credentials
    (OAuth or JWT).

    3. The action calls the `get_meeting_recording` method, which performs a GET request
    to the Zoom API endpoint `https://api.zoom.us/v2/meetings/{meeting_id}/recordings`.

    4. The action extracts the `share_url` from the API response.

    5. The `share_url` is added as a link to the action result for easy access.

    6. The full recording details are added to the action's result JSON.


    ### Additional Notes

    This action requires valid Zoom API credentials (either OAuth or JWT) configured
    in the integration settings. It does not modify any data in Zoom or the SOAR platform;
    it is strictly a data retrieval action.
