Ping:
  ai_description: >-
    ### General Description

    Tests connectivity with the Zoom API to ensure the integration is configured correctly.
    This action verifies that the provided authentication credentials (JWT or OAuth)
    are valid by attempting to retrieve a list of active users from the Zoom API.


    ### Flow Description

    1. The action retrieves the Zoom integration configuration (JWT or OAuth credentials).

    2. It initializes the `ZoomManager` with the provided credentials.

    3. It executes a `test_connectivity` method, which performs a GET request to the
    Zoom API (`/users` endpoint) to verify authentication.

    4. If the API returns a successful response, the action completes with a success
    status.

    5. If the API returns an error or the connection fails, the action completes with
    a failure status and the error message.


    ### Additional Notes

    This action does not modify any data and is intended solely for verifying the
    integration's health. It does not interact with entities or alerts.
