Create Meeting:
  ai_description: >-
    ### General Description

    Creates a scheduled or instant meeting in Zoom. This action allows users to automate
    the creation of meetings by specifying details such as the meeting topic, type,
    start time, duration, time zone, and recording preferences. It interacts with
    the Zoom API to provision the meeting under a specified host's account.


    ### Flow Description

    1. The action extracts the required parameters: `Meeting Topic`, `Meeting Type`,
    `Meeting Start Time`, `Meeting Duration`, `Time Zone`, `Auto Recording Type`,
    and `Host Email Address`.

    2. The `ZoomManager` is initialized with the configured authentication credentials
    (OAuth or JWT).

    3. The action calls the `create_meeting` method, which performs a POST request
    to the Zoom API endpoint `https://api.zoom.us/v2/users/{host_email}/meetings`
    with the provided meeting details.

    4. Upon a successful API response, the action adds the meeting's join URL as a
    link to the result and attaches the full JSON response from the API.

    5. If the meeting creation fails, the action sets the execution state to failed
    and returns an error message.


    ### Additional Notes

    This action performs an external mutation by creating a resource in the Zoom platform.
    It requires valid Zoom API credentials (Account ID, Client ID, Client Secret,
    or JWT Token) to be configured in the integration settings.
  ai_short_description: >-
    Creates a scheduled or instant meeting in Zoom.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new meeting resource in the Zoom platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the Zoom API to create a meeting, which
      constitutes an external data mutation. It does not fetch data, nor does it modify
      internal SOAR data or entities.
  categories:
    enrichment: false
    reasoning: >-
      The action creates a new resource (a meeting) in an external system (Zoom).
      It does not fetch data for enrichment, nor does it perform security remediation
      tasks like blocking or isolating assets. Therefore, it is neither an enrichment
      nor a remediation action.
