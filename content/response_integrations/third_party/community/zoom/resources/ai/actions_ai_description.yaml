Get Meeting Recording:
  ai_description: >-
    ### General Description

    Fetches meeting recording details from Zoom using a provided Meeting ID. This
    action retrieves metadata and the shareable URL for a specific meeting recording
    from the Zoom cloud storage.


    ### Flow Description

    1. The action extracts the `Meeting ID` parameter provided by the user.

    2. It initializes the `ZoomManager` using the configured integration credentials
    (JWT or OAuth).

    3. The action calls the `get_meeting_recording` method of the `ZoomManager` to
    query the Zoom API for the specified meeting's recording details.

    4. Upon a successful response, it extracts the `share_url` from the meeting recording
    data.

    5. The action adds the recording URL as a link to the action result for easy access.

    6. The full JSON response containing the meeting recording details is added to
    the action result.


    ### Additional Notes

    This action is a read-only operation and does not modify any entities, alerts,
    or case data within Google SecOps. It is designed to provide analysts with quick
    access to meeting recordings for investigation purposes.
