Create User:
  ai_description: >-
    ### General Description

    Creates a new user account in the Zoom platform. This action allows administrators
    to provision users directly from the SOAR platform by specifying the user's first
    name, last name, email address, and license type.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `First Name`, `Last Name`,
    `Email`, and `User Type` from the action configuration.

    2. **Authentication**: Initializes the `ZoomManager` using the configured integration
    credentials (JWT or OAuth).

    3. **User Existence Check**: Performs a GET request to the Zoom API to check if
    a user with the provided email address already exists.

    4. **User Creation**: If the user does not exist, the action performs a POST request
    to the Zoom API to create the new user account with the specified details.

    5. **Result Reporting**: Returns the details of the created user in the action
    result or reports failure if the creation process fails.


    ### Additional Notes

    This action does not operate on entities and is triggered based on the provided
    input parameters.
