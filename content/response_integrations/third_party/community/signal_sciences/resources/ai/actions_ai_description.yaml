Add IP to Block List:
  ai_description: >-
    ### General Description

    Use the **Add IP to Block List** action to add a specific IP address to the block
    list of a designated site in Signal Sciences. This action helps in mitigating
    threats by blocking malicious IP addresses directly on the Signal Sciences platform.


    ### Flow Description

    1. Extracts action parameters: `Site Name`, `IP Address` (optional), and `Note`.

    2. Parses the `IP Address` parameter and retrieves `ADDRESS` type entities from
    the current case.

    3. Validates the IP addresses (IPv4/IPv6).

    4. Queries the Signal Sciences API (`get_blocklists`) to check if the IPs are
    already blocked.

    5. For each new IP, calls the Signal Sciences API (`add_ip_to_blocklist`) to add
    it to the block list with the provided note.

    6. Constructs a JSON result containing the status of the operation for each IP.


    ### Additional Notes

    The `Note` parameter is mandatory for the Signal Sciences API. The action supports
    both manual IP input and entity-based input.
