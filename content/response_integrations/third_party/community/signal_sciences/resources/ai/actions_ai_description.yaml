    Tests connectivity to the Signal Sciences API to ensure the integration is correctly
    configured and the credentials are valid.


    ### Flow Description

    1. The action initializes the `SignalSciencesManager` using the integration's
    configured credentials (API Root, Email, API Token, Corporation Name).

    2. It executes the `test_connectivity` method, which performs a `GET` request
    to the Signal Sciences API (`/corps/{corp_name}`) to verify the connection.

    3. If the request is successful, the action returns a success message. If the
    request fails (e.g., due to invalid credentials), it logs the error and marks
    the execution as failed.


