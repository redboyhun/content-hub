Add IP to Allow List:
  ai_description: >-
    ### General Description

    Adds one or more IP addresses to the Signal Sciences allow list for a specified
    site. This action helps manage network traffic by explicitly permitting specific
    IP addresses, ensuring they are not blocked by security policies.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Site Name`, `IP Address`
    (optional), and `Note` (mandatory) from the action configuration.

    2. **Entity Identification**: It retrieves `ADDRESS` type entities from the current
    case and combines them with any IP addresses provided in the `IP Address` parameter.

    3. **Validation**: Each identified IP address is validated to ensure it is a correct
    IPv4 or IPv6 format.

    4. **Check Existing**: The action calls the Signal Sciences API (`GET` request)
    to retrieve the current allow list for the specified site to prevent duplicate
    entries.

    5. **API Interaction**: For each IP not already present in the allow list, the
    action performs a `PUT` request to the Signal Sciences API to add the IP address
    with the provided note.

    6. **Result Reporting**: The action compiles a list of successful and failed additions
    and updates the output message accordingly.


    ### Additional Notes

    The `Note` parameter is mandatory as it is required by the Signal Sciences API
    for audit purposes.
  ai_short_description: >-
    Adds specified IP addresses to the Signal Sciences allow list for a given site.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the specified IP address to the allow list configuration in the Signal
      Sciences dashboard.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches existing allow list data to check for duplicates (fetches_data=true)
      and performs a PUT request to add new IPs to the external Signal Sciences system
      (can_mutate_external_data=true). It does not modify internal SecOps data or
