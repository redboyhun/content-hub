Remove IP from Allow List:
  ai_description: >-
    ### General Description

    Removes specified IP addresses from the allow list of a designated site in Signal
    Sciences. This action helps maintain security posture by ensuring that only authorized
    IPs remain on the allow list, effectively re-enabling standard security monitoring
    for removed indicators.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Site Name` and `IP Address`
    (optional) parameters provided by the user.

    2. **Entity Identification**: It identifies all `ADDRESS` entities associated
    with the current SOAR action.

    3. **Data Retrieval**: The action calls the Signal Sciences API (`GET /corps/{corp_name}/sites/{site_name}/whitelist`)
    to fetch the current allow list for the specified site.

    4. **Processing**: It iterates through the combined list of IPs from the parameters
    and the identified entities.

    5. **Removal**: For each IP, if it exists in the retrieved allow list, the action
    executes a DELETE request (`DELETE /corps/{corp_name}/sites/{site_name}/whitelist/{item_id}`)
    to remove the IP from the allow list.

    6. **Result Reporting**: The action logs the outcome for each IP and updates the
    final output message with the status of the removal operations.


    ### Additional Notes

    This action requires valid Signal Sciences API credentials (API Token, Email,
    and Corporation Name) to interact with the dashboard. If an IP is not found in
    the allow list, it is treated as a successful operation.
  ai_short_description: >-
    Removes specified IP addresses from the allow list of a designated site in Signal
    Sciences.
