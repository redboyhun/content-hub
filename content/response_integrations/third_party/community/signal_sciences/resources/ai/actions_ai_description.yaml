Add IP to Block List:
  ai_description: >-
    ### General Description

    Use the **Add IP to Block List** action to add a specific IP address to the block
    list of a designated site within the Signal Sciences platform. This action helps
    in mitigating threats by preventing network traffic from identified malicious
    IP addresses.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Site Name`, `IP Address`
    (optional), and `Note` from the action parameters.

    2. **Entity Identification**: It identifies target IP addresses from the provided
    `IP Address` parameter and any `ADDRESS` type entities attached to the case.

    3. **Validation**: It validates the format of the identified IP addresses.

    4. **State Check**: It calls the Signal Sciences API (`GET /corps/{corp_name}/sites/{site_name}/blacklist`)
    to retrieve the current block list for the specified site to avoid redundant additions.

    5. **Execution**: For each unique, valid IP address not already in the block list,
    the action performs a `PUT` request to the Signal Sciences API (`/corps/{corp_name}/sites/{site_name}/blacklist`)
    to add the IP address with the provided note.

    6. **Result Reporting**: The action updates the execution result with the list
    of successfully added IPs and any failures encountered.


    ### Additional Notes

    - The `Note` parameter is mandatory for the Signal Sciences API.

    - If an IP address is already present in the block list, the action logs this
    and skips the addition process.
