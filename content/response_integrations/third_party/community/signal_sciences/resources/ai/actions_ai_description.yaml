Add IP to Allow List:
  ai_description: >-
    ### General Description

    Adds one or more IP addresses to the Allow List for a specified site within the
    Signal Sciences platform. This action is used to prevent false positives by ensuring
    that trusted IP addresses are not blocked or flagged by security policies.


    ### Flow Description

    1. Extracts the `Site Name`, `IP Address` (optional), and `Note` parameters from
    the action configuration.

    2. Identifies target IP addresses from the provided `IP Address` parameter and
    any `ADDRESS` type entities attached to the alert.

    3. Validates the format of each identified IP address to ensure it is a valid
    IPv4 or IPv6 address.

    4. Queries the Signal Sciences API using the `get_allowlists` method to check
    if the IP addresses already exist in the specified site's allow list.

    5. For each IP address not already present, executes a `PUT` request to the Signal
    Sciences API (`add_ip_to_allowlist`) to add the IP to the allow list with the
    provided note.

    6. Returns the status of the operation, detailing which IPs were successfully
    added and which failed.


    ### Additional Notes

    The `Note` parameter is mandatory for the Signal Sciences API and must be provided
    to justify the addition of the IP to the allow list. If an IP is already present
    in the allow list, the action skips the addition for that specific IP and reports
    it as existing.
  ai_short_description: >-
    Adds specified IP addresses to the Signal Sciences Allow List for a given site
    to prevent false positives.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds IP addresses to the Signal Sciences allow list via API.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches existing allowlist data to check for duplicates (fetches_data=true)
      and performs a PUT request to add new IPs to the allowlist (can_mutate_external_data=true).
      It does not modify internal SOAR case data.
  categories:
    enrichment: false
    reasoning: >-
      The action modifies external security controls by adding IPs to an allow list.
      It is not an enrichment action because it performs a mutation on an external
      system. It qualifies as a remediation action because it updates security policy
      configurations (Allowlist).
    remediation: true
