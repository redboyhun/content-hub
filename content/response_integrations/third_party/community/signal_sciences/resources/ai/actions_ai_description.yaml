    ### General Description

    Tests connectivity to the Signal Sciences API to ensure the integration is configured
    correctly.


    ### Flow Description

    1. The action initializes the Signal Sciences API client using the integration
    configuration parameters (API Root, Email, API Token, Corporation Name).

    2. It performs a GET request to the Signal Sciences API's corporation endpoint
    (`/corps/{corp_name}`) to verify the connection.

    3. If the request is successful, the action returns a success message.

    4. If the request fails, the action logs the error and marks the execution state
    as failed.


    ### Additional Notes

    This action does not require any input parameters and is intended for validating
    the connectivity between the SOAR platform and the Signal Sciences service.
