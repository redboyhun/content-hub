List Sites:
  ai_description: >-
    ### General Description

    Use the **List Sites** action to retrieve a list of all sites available within
    the corporation in Signal Sciences.


    ### Flow Description

    1. Extracts the `Max Sites To Return` parameter.

    2. Initializes the `SignalSciencesManager` with API credentials.

    3. Calls the `get_sites` method, which performs a paginated GET request to the
    Signal Sciences API (`/corps/{corp_name}/sites`).

    4. Processes the retrieved site data into `Site` objects.

    5. Formats the site information into a `TIPDataTable` and updates the action's
    JSON results.

    6. Sets the output message with the list of fetched site names.


    ### Additional Notes

    If `Max Sites To Return` is 0 or empty, the action retrieves all available sites.
