Gather Remote Agent Datapoints:
  ai_description: >-
    ### General Description

    This action gathers diagnostic information and logs from a remote Siemplify/Chronicle
    agent. It collects system load metrics, file information, and error logs from
    the agent's local environment to assist in troubleshooting integration or connector
    issues.


    ### Flow Description

    1. Extracts `IntegrationName` and `ConnectorName` parameters.

    2. Initializes collectors for Agent Logs, Agent Load Info, and File Information.

    3. Executes shell commands (e.g., `cat`, `lscpu`, `uptime`, `free`, `env`, `ls`,
    `date`) on the host machine to retrieve diagnostic data.

    4. Parses and filters logs from `/var/log/SiemplifyAgent/agent.log` and connector-specific
    directories.

    5. Logs all collected information to the Siemplify logger for analyst review.


    ### Additional Notes

    This action runs locally on the agent machine and does not interact with external
    APIs. It is intended for troubleshooting and diagnostic purposes.
  ai_short_description: >-
    Gathers diagnostic logs and system performance metrics from a remote Siemplify/Chronicle
    agent for troubleshooting.
