Gather Remote Agent Datapoints:
  ai_description: >-
    ### General Description

    Gathers diagnostic data from a remote agent machine to assist in troubleshooting.
    This action collects agent status, system load information (CPU, memory, uptime),
    file information from the agent's working directory, and relevant agent/connector
    logs. It outputs all collected information to the execution logs for analysis.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `IntegrationName` (mandatory)
    and `ConnectorName` (optional) from the action parameters.

    2. **Agent Status Collection**: It reads the agent status from `/opt/SiemplifyAgent/Resources/agent_status.json`
    and flattens the JSON output for logging.

    3. **System Load Collection**: It executes system commands (`lscpu`, `uptime`,
    `free -h`, `env`) to gather CPU, memory, and environment information.

    4. **File Information Collection**: It lists files in the `/opt/SiemplifyAgent`
    directory using `ls -lart`.

    5. **Log Collection**: It reads and parses the agent log (`/var/log/SiemplifyAgent/agent.log`)
    and connector runner logs to extract error information.

    6. **Logging**: All collected diagnostic data is written to the execution logger.


    ### Additional Notes

    This is a diagnostic utility action designed for troubleshooting agent and connector
    issues. It does not perform any modifications to the system or the SOAR platform.
  ai_short_description: >-
