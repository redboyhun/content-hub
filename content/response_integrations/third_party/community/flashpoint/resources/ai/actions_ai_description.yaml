IOC_Enrichment:
  ai_description: >-
    ### General Description

    Enriches indicator entities using the Flashpoint API. This action retrieves threat
    intelligence reports for provided entities, such as IP addresses, domains, or
    file hashes, and updates the entity with the retrieved data to provide context
    for security investigations.


    ### Flow Description

    1. Extracts the `Limit` parameter from the action configuration to control the
    number of results.

    2. Iterates through each target entity provided in the case.

    3. Calls the Flashpoint API (`GET /indicators/attribute`) for each entity identifier
    to retrieve enrichment data.

    4. If a report is returned, the action flattens the report dictionary and adds
    a "FlashPoint" prefix to the keys.

    5. Updates the entity's `additional_properties` with the flattened enrichment
    data.

    6. Marks the entity as enriched (`is_enriched = True`) and suspicious (`is_suspicious
    = True`).

    7. Generates an entity insight with the enrichment summary.

    8. Attaches the full JSON report to the entity and adds the results to the action
    output.


    ### Additional Notes

    The action marks all successfully enriched entities as suspicious by default.
    If an entity is not found in Flashpoint, it is added to a list of not-found entities,
    and the action continues to the next entity.
  ai_short_description: >-
    Enriches indicator entities using the Flashpoint API by retrieving threat intelligence
    reports and updating entity properties.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional_properties, sets is_enriched and is_suspicious flags,
      and adds entity insights.
    reasoning: >-
      The action fetches data from an external API (Flashpoint) and updates internal
      entities with the retrieved information, including setting properties and adding
      insights. It does not mutate external data.
