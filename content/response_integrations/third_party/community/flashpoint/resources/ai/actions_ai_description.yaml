IOC_Enrichment:
  ai_description: >-
    ### General Description

    Enriches Indicator of Compromise (IOC) entities using the Flashpoint intelligence
    platform. This action queries the Flashpoint API to retrieve threat intelligence
    data for various entity types, including IP addresses, domains, URLs, CVEs, email
    addresses, and credit card numbers. It helps analysts gain context on potential
    threats by aggregating external intelligence directly into the SOAR platform.


    ### Flow Description

    1. The action iterates through all target entities provided in the SOAR case.

    2. For each entity, it calls the `FlashpointManager.IOC_Enrichment` method, which
    performs a GET request to the Flashpoint `/indicators/attribute` API endpoint.

    3. If enrichment data is returned:
        - The raw report is attached to the entity as a JSON result.
        - The report data is flattened and prefixed with "FlashPoint" to ensure clean
    integration into the entity's additional properties.
        - The entity's `additional_properties` are updated with the enriched data.
        - The entity is marked as enriched (`is_enriched = True`) and suspicious (`is_suspicious
    = True`).
        - An entity insight is created to highlight the enrichment results.
    4. If no data is found for an entity, it is tracked in a list of not-found entities.

    5. Finally, the action outputs a summary of the enrichment process and the collected
    JSON results.


    ### Additional Notes

    This action does not modify external systems; it is strictly an enrichment task.
    It relies on the `Flashpoint` integration configuration to authenticate via an
    API key. The `Limit` parameter controls the maximum number of result objects returned
    by the Flashpoint API.
  ai_short_description: >-
    Enriches IOC entities (IPs, domains, URLs, CVEs, etc.) with threat intelligence
    from the Flashpoint platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties and adds entity insights within the SOAR
      platform.
    reasoning: >-
      The action fetches data from the Flashpoint API (fetches_data=true). It does
      not mutate external systems (can_mutate_external_data=false). It updates internal
      SOAR entities by adding insights and updating additional properties (can_mutate_internal_data=true,
      can_update_entities=true, can_create_insight=true).
  categories:
    enrichment: true
    reasoning: >-
      The action fetches threat intelligence data from an external source (Flashpoint)
      and updates internal SOAR entities (insights, additional properties). It does
      not perform any external mutations (like blocking or deleting). Therefore, it
      is classified as an Enrichment action and not a Remediation action.
