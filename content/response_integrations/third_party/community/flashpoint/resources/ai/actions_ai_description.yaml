Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom query against the Flashpoint API. This action allows users to
    perform arbitrary searches or data retrieval operations by specifying a custom
    API endpoint and a JSON-formatted query body. It is designed for advanced users
    to interact with Flashpoint's data services beyond the standard pre-defined actions.


    ### Flow Description

    1. The action extracts the `Query Content` (JSON string) and `New Query URL` (API
    path) from the action parameters.

    2. It initializes the `FlashpointManager` using the configured API key.

    3. The action calls the `custom_query` method, which performs an HTTP POST request
    to the specified Flashpoint API endpoint using the provided JSON query content.

    4. The resulting data is retrieved from the API response.

    5. The action returns the query results to the SOAR platform using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is highly flexible and depends entirely on the validity of the `Query
    Content` and `New Query URL` provided. Ensure that the query content is a valid
    JSON string and the URL path is compatible with the Flashpoint API structure.
  ai_short_description: >-
    Executes a custom query against the Flashpoint API by sending a POST request with
    a user-defined JSON body to a specified endpoint.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from the Flashpoint API via a POST request. It does
      not mutate external data (it is a query/search operation), nor does it mutate
      internal SOAR data, update entities, or create insights.
