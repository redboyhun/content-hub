Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Flashpoint API to ensure the integration is properly
    configured and can communicate with the service.


    ### Flow Description

    1. The action initializes the `FlashpointManager` using the API Key retrieved
    from the integration configuration.

    2. It calls the `test_connectivity` method, which executes a GET request to the
    Flashpoint `/all/search` endpoint with a sample query.

    3. The action validates the response from the API.

    4. It returns a success or failure message to the SOAR platform based on the connectivity
    result.


    ### Additional Notes

    This action is strictly for connectivity verification and does not perform any
    data enrichment or remediation.
