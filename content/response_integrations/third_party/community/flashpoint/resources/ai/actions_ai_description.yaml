Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the SOAR platform and the Flashpoint API. This
    action verifies that the integration is correctly configured and that the SOAR
    platform can successfully communicate with the Flashpoint service.


    ### Flow Description

    1. The action extracts the API Key from the integration configuration.

    2. It initializes the `FlashpointManager` using the provided API Key.

    3. It calls the `test_connectivity` method, which performs an HTTP GET request
    to the Flashpoint `/all/search` endpoint.

    4. If the API returns a successful response, the action returns a success status;
    otherwise, it raises an exception and fails.


    ### Additional Notes

    This action is intended for diagnostic purposes to ensure the integration is functional.
    It does not perform any data enrichment or state-changing operations.
