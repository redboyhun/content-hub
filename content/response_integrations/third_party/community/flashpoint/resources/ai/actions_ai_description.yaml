Indicators Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom query against the Flashpoint platform to retrieve specific indicators
    of compromise (IOCs), including attributes or events. This action allows analysts
    to search for threat intelligence data based on custom criteria such as time ranges,
    search tags, and specific query strings.


    ### Flow Description

    1. The action extracts configuration parameters, including the Flashpoint API
    Key, and action parameters such as `Limit`, `Start Date`, `End Date`, `Search
    Tags`, `Query`, `Sort By Time`, `Entity Types`, and `Indicator Type`.

    2. An instance of the `FlashpointManager` is initialized using the provided API
    Key.

    3. The action calls the `indicators_custom_query` method, which performs a GET
    request to the Flashpoint API endpoint (`/indicators/{indicator_type}`) with the
    specified query parameters.

    4. If the API returns results, the action adds the retrieved data to the SOAR
    platform as a JSON result.

    5. If no results are found or an error occurs during the API call, the action
    logs the event and terminates with an appropriate message.


    ### Additional Notes

    This action is a read-only operation and does not modify any entities, cases,
    or external systems. It is designed for threat intelligence gathering and historical
    data searching.
