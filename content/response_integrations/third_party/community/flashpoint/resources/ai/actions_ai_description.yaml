Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom query against the Flashpoint API to retrieve threat intelligence
    or search results. This action allows users to perform flexible searches by specifying
    the query content and the target API endpoint URL, providing raw JSON results
    for further analysis within the SOAR platform.


    ### Flow Description

    1. The action extracts the `API Key`, `Query Content`, and `New Query URL` from
    the provided configuration and action parameters.

    2. An instance of the `FlashpointManager` is initialized using the provided API
    Key.

    3. The action executes a POST request to the specified `New Query URL` using the
    `FlashpointManager.custom_query` method, passing the `Query Content` as the JSON
    payload.

    4. The resulting data is returned to the SOAR platform using `siemplify.result.add_result_json`.

    5. If an error occurs during the API request, the action logs the error and terminates
    with a failure status.


    ### Additional Notes

    This is a generic search action. Ensure the `Query Content` is formatted as a
    valid JSON string and the `New Query URL` corresponds to a valid Flashpoint API
    endpoint.
  ai_short_description: >-
    Executes a custom query against the Flashpoint API to retrieve threat intelligence
    or search results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to fetch data from the Flashpoint API. It
      does not mutate external data (it is a search/query operation), nor does it
      modify internal SOAR data (entities, insights, or comments).
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external system (Flashpoint) to provide context
      or search results. It does not modify external state (it is a query/search operation)
      and does not modify internal SOAR data (entities/insights). Therefore, it qualifies
      as an enrichment action.
    remediation: false
