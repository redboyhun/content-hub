Run Query:
  ai_description: >-
    ### General Description

    Executes a custom query against the Flashpoint platform to retrieve threat intelligence
    data. This action allows analysts to perform ad-hoc searches for indicators, blog
    posts, or other intelligence artifacts based on specific criteria such as tags,
    date ranges, and sorting preferences.


    ### Flow Description

    1. The action extracts the input parameters: `Query`, `Results count limit`, `Date
    Range`, `Sort By`, and `Tags`.

    2. The `FlashpointManager` is initialized using the API Key retrieved from the
    integration configuration.

    3. The action invokes the `run_custom_query` method (via the `FlashpointManager`)
    to execute the search against the Flashpoint API using the provided parameters.

    4. The retrieved query results are added to the action's result JSON using `siemplify.result.add_result_json`.

    5. The action concludes by returning a success message.


    ### Additional Notes

    This action is designed for intelligence gathering and does not modify the state
    of the Flashpoint platform or the Google SecOps case. It is a read-only operation
    used to fetch data.
