    external_data_mutation_explanation: >-
      Creates a new incident in PagerDuty via a POST request.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to create an incident in PagerDuty (can_mutate_external_data=true).
      It does not fetch context data or update internal entities.
