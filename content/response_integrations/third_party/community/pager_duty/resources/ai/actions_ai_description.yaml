Filtered Incident List:
  ai_description: >-
    ### General Description

    Retrieves a filtered list of incidents from PagerDuty based on user-provided criteria.
    This action allows analysts to query PagerDuty for specific incidents by applying
    various filters such as urgency, service, team, user, status, and date ranges.


    ### Flow Description

    1. Extracts input parameters (e.g., Urgencies, Service_IDS, Team_IDS, User_IDS,
    Incidents_Statuses, Date_Range, etc.) from the action configuration.

    2. Parses and validates these parameters, converting JSON-formatted strings into
    lists where necessary.

    3. Constructs a filter dictionary containing the specified criteria.

    4. Calls the `list_filtered_incidents` method in the `PagerDutyManager`, which
    performs a GET request to the PagerDuty API (`/incidents`) with the constructed
    query parameters.

    5. Returns the retrieved list of incidents as a JSON result in the action output.


    ### Additional Notes

    This action does not modify any data in PagerDuty or the SOAR platform; it is
    a read-only operation. The `Email` parameter is required for configuration but
    is not utilized in the current implementation of this specific action.
