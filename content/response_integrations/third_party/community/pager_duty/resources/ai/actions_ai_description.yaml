Create Incident:
  ai_description: >-
    ### General Description

    Creates a new incident in PagerDuty using the provided incident details. This
    action allows analysts to trigger automated incident creation in PagerDuty directly
    from the SOAR platform, facilitating streamlined incident response workflows.


    ### Flow Description

    1. The action initializes the `SiemplifyAction` and retrieves the necessary configuration,
    including the PagerDuty API key and Service ID.

    2. It extracts the required parameters: `Title`, `Email`, `Urgency`, and `Details`
    from the action configuration.

    3. The `PagerDutyManager` is instantiated with the provided API key.

    4. The action calls the `create_incident` method, which performs a POST request
    to the PagerDuty API (`/incidents` endpoint) with the incident payload.

    5. The resulting incident data is captured and added to the action result JSON.


    ### Additional Notes

    This action requires a valid PagerDuty API key and a valid Service ID configured
    in the integration settings. The action does not operate on specific entities
    but rather creates a standalone incident record in the external PagerDuty system.
  ai_short_description: Creates a new incident in PagerDuty.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new incident record in the PagerDuty platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to create an incident in PagerDuty, which
      constitutes a mutation of external data. It does not fetch contextual data for
      enrichment, nor does it modify internal SOAR data or entities.
