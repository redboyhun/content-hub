Create Incident:
  ai_description: >-
    General Description

    Creates a new incident in PagerDuty using the provided details. This action allows
    users to programmatically trigger incident creation in PagerDuty, which is useful
    for automating incident response workflows.


    Flow Description

    1. Initialize the `SiemplifyAction` and retrieve configuration (API key, Service
    ID).

    2. Extract parameters: `Title`, `Email`, `Urgency`, and `Details`.

    3. Instantiate `PagerDutyManager` with the API token.

    4. Execute `create_incident` via a POST request to the PagerDuty `/incidents`
    endpoint.

    5. Return the incident details as a JSON result.


    Additional Notes

    Requires a valid PagerDuty API key and Service ID configured in the integration
    settings.
  ai_short_description: Creates a new incident in PagerDuty.
