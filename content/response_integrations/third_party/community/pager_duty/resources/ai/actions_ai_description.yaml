Get User By Email:
  ai_description: >-
    ### General Description

    Retrieves user details from PagerDuty by querying the system with a specific email
    address. This action allows analysts to fetch contextual information about a user,
    such as their ID, name, and role, directly from the PagerDuty platform to assist
    in incident response and user identification.


    ### Flow Description

    1. The action initializes the `SiemplifyAction` and retrieves the PagerDuty API
    token from the integration configuration.

    2. The `Email` parameter is extracted from the action inputs.

    3. The `PagerDutyManager` is instantiated using the provided API token.

    4. The action calls the `get_user_by_email` method, which performs a GET request
    to the PagerDuty `/users` API endpoint with the email as a query parameter.

    5. The API response is processed to find an exact match for the provided email
    address.

    6. If a user is found, the user details are added to the action result as a JSON
    object, and the action completes successfully.

