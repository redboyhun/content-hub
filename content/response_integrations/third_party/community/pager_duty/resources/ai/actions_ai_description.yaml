List All OnCall:
  ai_description: >-
    ### General Description

    Retrieves the current list of on-call users from PagerDuty. This action provides
    visibility into the current on-call schedule, allowing analysts to identify who
    is responsible for incident response at any given time.


    ### Flow Description

    1. **Initialization**: The action initializes the `SiemplifyAction` and retrieves
    the PagerDuty API configuration (API Key) from the integration settings.

    2. **Manager Instantiation**: A `PagerDutyManager` instance is created using the
    retrieved API token.

    3. **Data Retrieval**: The action calls the `list_oncalls()` method, which performs
    a GET request to the PagerDuty API (`/oncalls` endpoint) to fetch the current
    on-call schedule.

    4. **Result Processing**: The retrieved list of on-call users is added to the
    action's result output using `siemplify.result.add_result_json()`.

    5. **Completion**: The action concludes by setting the execution status to completed
    and providing a success message.


    ### Additional Notes

    This action is a read-only operation and does not modify any data within PagerDuty
    or the Google SecOps platform. It is intended for informational purposes to assist
    in incident management workflows.
