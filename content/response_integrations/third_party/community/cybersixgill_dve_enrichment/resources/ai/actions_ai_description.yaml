Enrich CVE:
  ai_description: "### General Description\nEnriches CVE (Common Vulnerabilities and\
    \ Exposures) entities using Cybersixgill\u2019s Dynamic Vulnerability Exploit\
    \ (DVE) intelligence. This action retrieves comprehensive threat intelligence,\
    \ including DVE scores, exploitability probability, and NVD metadata, to help\
    \ analysts prioritize vulnerabilities based on real-world risk.\n\n### Flow Description\n\
    1. The action extracts the `Client Id` and `Client Secret` from the integration\
    \ configuration.\n2. It iterates through the provided `target_entities` and filters\
    \ for entities of type `CVE`.\n3. For each valid CVE entity, the action queries\
    \ the Cybersixgill API via the `SixgillEnrichManager` to retrieve vulnerability\
    \ intelligence.\n4. The retrieved data is processed to update the entity's `additional_properties`\
    \ with relevant fields (e.g., DVE scores, NVD links, CVSS scores) and sets the\
    \ `is_enriched` flag to `True`.\n5. The action calls `siemplify.update_entities`\
    \ to save these changes to the SOAR platform.\n6. A case insight is created using\
    \ `siemplify.create_case_insight` to provide a summary of the vulnerability data\
    \ directly in the case wall.\n7. The action adds a detailed table and the raw\
    \ JSON response to the action results for analyst review.\n\n### Additional Notes\n\
    This action requires valid Cybersixgill API credentials (Client Id and Client\
    \ Secret) configured in the integration settings. It specifically targets CVE\
    \ entities and will skip other entity types."
  ai_short_description: >-
    Enriches CVE entities with Cybersixgill Dynamic Vulnerability Exploit (DVE) intelligence,
    updating entity properties and creating case insights.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties and creates case insights within the SOAR platform.
    reasoning: >-
      The action fetches data from the Cybersixgill API (fetches_data=true). It updates
      internal entities and creates case insights (can_mutate_internal_data=true).
      It does not mutate external systems.
