Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Cybersixgill DVE Enrichment integration by validating
    the provided Client ID and Client Secret. This action ensures that the integration
    is correctly configured and capable of communicating with the external Cybersixgill
    service.


    ### Flow Description

    1. The action extracts the `Client Id` and `Client Secret` from the integration
    configuration.

    2. It initializes the `SixgillEnrichManager` using these credentials.

    3. The action calls the `test_connectivity` method, which performs an API request
    to the Cybersixgill service to verify the authentication.

    4. The action returns the connectivity status (success or failure) and a corresponding
    message to the SOAR platform.


    ### Additional Notes

    This action is strictly for connectivity verification and does not perform any
    data enrichment or remediation tasks.
