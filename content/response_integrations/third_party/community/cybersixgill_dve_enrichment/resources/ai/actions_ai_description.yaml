Enrich CVE:
  ai_description: "### General Description\nEnriches CVE (Common Vulnerabilities and\
    \ Exposures) entities using Cybersixgill\u2019s Dynamic Vulnerability Exploit\
    \ (DVE) Score. This action retrieves comprehensive threat intelligence, including\
    \ DVE scores, exploitability probabilities, and NVD (National Vulnerability Database)\
    \ metadata. By providing this context, the action enables analysts to prioritize\
    \ vulnerabilities based on real-world threat data directly within the SecOps platform.\n\
    \n### Flow Description\n1. **Credential Extraction**: The action extracts the\
    \ `Client Id` and `Client Secret` from the integration configuration.\n2. **Entity\
    \ Processing**: The action iterates through all target entities, filtering specifically\
    \ for those with the type `CVE`.\n3. **Data Retrieval**: For each valid CVE entity,\
    \ the action calls the Cybersixgill API (`enrich_dve`) to fetch vulnerability\
    \ intelligence.\n4. **Entity Update**: The retrieved data is added to the entity's\
    \ `additional_properties`, and the entity is marked as enriched (`is_enriched\
    \ = True`).\n5. **Insight Creation**: The action generates a case insight containing\
    \ the DVE score, exploitability details, and NVD metadata.\n6. **Result Output**:\
    \ The action adds a data table and the raw JSON response to the action results\
    \ for analyst review.\n\n### Additional Notes\nThis action requires valid Cybersixgill\
    \ API credentials. It performs read-only operations on the external Cybersixgill\
    \ platform and modifies internal SOAR data (entities and insights)."
  ai_short_description: >-
    Enriches CVE entities with Cybersixgill Dynamic Vulnerability Exploit (DVE) scores
    and threat intelligence.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties, creates case insights, and adds result
      tables/JSON to the case.
    reasoning: >-
      The action fetches data from the Cybersixgill API (fetches_data=true). It does
      not mutate external systems (can_mutate_external_data=false). It modifies internal
      SOAR data by updating entities, creating insights, and adding result tables
      (can_mutate_internal_data=true).
  categories:
    enrichment: true
    reasoning: >-
      The action fetches threat intelligence data from an external source (Cybersixgill)
      and updates internal SOAR data (entities, insights, and tables). It does not
      perform any external mutations (blocking, deleting, etc.). Therefore, it is
      classified as an Enrichment action and not a Remediation action.
    remediation: false
