Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the SOAR platform and the Cybersixgill service.
    This action verifies that the integration is correctly configured and that the
    provided credentials are valid by attempting to authenticate with the Cybersixgill
    API.


    ### Flow Description

    1. The action extracts the `Client Id` and `Client Secret` from the integration
    configuration.

    2. It initializes the `SixgillEnrichManager` using these credentials.

    3. The action calls the `test_connectivity` method, which utilizes the `SixgillBaseClient`
    to request an access token from the Cybersixgill API.

    4. The action returns the result of the connectivity test (success or failure)
    to the SOAR platform.


    ### Additional Notes

    This action is intended for troubleshooting and verifying the integration setup.
    It does not perform any enrichment or data modification operations.
