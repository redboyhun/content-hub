Spelling Check:
  ai_description: >-
    ### General Description

    This action performs a spelling check on a provided text input. It identifies
    misspelled words and suggests potential corrections based on a predefined frequency
    list and a custom allowlist.


    ### Flow Description

    1. The action retrieves the `Input` string parameter.

    2. The input text is cleaned using regex to remove special characters.

    3. The `SpellCheckerManager` processes the text to identify unknown words.

    4. A JSON result containing the misspelled words and their correction candidates
    is generated.

    5. A data table titled "Found spelling mistakes" is added to the action results.


    ### Additional Notes

    This action is a utility tool and does not interact with external systems or modify
    SOAR case data.
  ai_short_description: >-
    Performs a spelling check on provided text and returns potential corrections.
  capabilities:
    can_create_case_comments: false
