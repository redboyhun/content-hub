Spelling Check:
  ai_description: >-
    ### General Description

    This action performs a spelling check on a provided text input. It identifies
    misspelled words and suggests potential corrections based on word frequency and
    a predefined allowlist.


    ### Flow Description

    1. The action retrieves the `Input` text parameter.

    2. The text is cleaned using regex to remove special characters, keeping only
    alphanumeric characters and spaces.

    3. The cleaned text is split into individual words.

    4. The `SpellCheckerManager` identifies unknown words (misspellings) by comparing
    them against a dictionary and a custom allowlist.

    5. For each identified misspelling, the action retrieves a list of candidate corrections.

    6. The results are formatted into a JSON object and a data table, which are then
    added to the action results.


    ### Additional Notes

    This action operates locally using the `pyspellchecker` library and does not perform
    any external API calls or interact with entities.
  ai_short_description: >-
    Checks a provided text string for spelling errors and suggests corrections.
  capabilities:
