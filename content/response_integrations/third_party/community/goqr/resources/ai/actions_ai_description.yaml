    Default: 0-0-0. |

    | Background Color | String | No | The color of the image background in R-G-B
    format. Default: 255-255-255. |
Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the QR Server API to ensure the integration is properly
    configured and the service is reachable.


    ### Flow Description

    1. The action initializes the API client using the integration's configured `API
    Root` and `Verify SSL` settings.

    2. It sends a ping request to the QR Server API endpoint (`v1/create-qr-code/?data=PingCheck&size=100x100`).

    3. The action validates the response and returns a success message if the connection
    is established, or an error message if the connection fails.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying the health of
    the integration connection.
