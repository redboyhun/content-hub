    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Content | String | Yes | The data, URL, or text string to encode into the QR
    code. |

    | Size | String | No | The dimensions of the generated image in pixels in the
    format {width}x{height}. Max 1000x1000. Default: 200x200. |

    | Image Format | DDL | No | The file format for the output image (png, jpg, gif,
    svg). Default: png. |

    | Error Correction | DDL | No | The level of data redundancy (Low, Medium, Quartile,
    High). Default: Low. |

    | Margin | String | No | The width of the blank border (quiet zone) around the
    QR code in pixels. Default: 1. |

    | Foreground Color | String | No | The color of the QR code modules in R-G-B format.
    Default: 0-0-0. |

    | Background Color | String | No | The color of the image background in R-G-B
    format. Default: 255-255-255. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the QR Server API. This action verifies that the integration
    can successfully communicate with the configured QR Server endpoint.


    ### Flow Description

    1. The action initializes the API client using the configured `API Root` and `Verify
    SSL` settings.

    2. It sends a request to the `v1/create-qr-code/` endpoint with `data=PingCheck`
    and `size=100x100` to verify the server is reachable.

    3. If the request is successful, it returns a success message; otherwise, it returns
    an error message.


    ### Additional Notes

    This action is used for connectivity testing and does not perform any data processing
    or entity enrichment.
