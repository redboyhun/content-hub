Generate QR Code:
  ai_description: >-
    ### General Description

    The Generate QR Code action creates a QR code image based on a provided string,
    URL, or text. This utility allows users to encode data into a visual QR format,
    which is then saved as an image file and attached directly to the current case
    for documentation or further analysis.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the input parameters, including
    the content to encode, image dimensions, format, error correction level, margin,
    and color settings.

    2. **API Interaction**: The action makes an external API call to the GOQR service
    (`v1/create-qr-code/`) to generate the QR code image based on the provided configuration.

    3. **File Handling**: The resulting image bytes are saved to a temporary file.

    4. **Case Update**: The action attaches the generated QR code image to the current
    case using the `add_attachment` method.

    5. **Result Output**: The action returns a JSON object containing the base64-encoded
    image blob and configuration details, and sets the result status to success.


    ### Additional Notes

    This action does not operate on specific Google SecOps entities. It is a utility
    action designed for generating visual artifacts from text data.
  ai_short_description: >-
    Generates a QR code image from a provided string and attaches it to the case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds the generated QR code image as an attachment to the case.
    reasoning: >-
      The action fetches data from an external API to generate a QR code. It does
      not mutate external systems. It mutates internal data by adding an attachment
      to the case, which is not an allowed mutation for enrichment, thus it is not
      an enrichment action.
  categories:
    enrichment: false
    reasoning: >-
      The action is a utility that generates a file and attaches it to a case. It
      does not fetch threat intelligence or context about entities (not enrichment),
      nor does it perform any security remediation or containment (not remediation).
    remediation: false
