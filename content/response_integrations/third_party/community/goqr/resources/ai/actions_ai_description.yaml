Generate QR Code:
  ai_description: >-
    ### General Description

    Generates a QR code image from a provided string of data using the GOQR service.
    This action allows users to customize the QR code's appearance, including size,
    image format, error correction level, margin, and foreground/background colors.
    The resulting image is attached directly to the case wall for analyst review.


    ### Flow Description

    1. The action extracts configuration parameters, including the content string
    and optional formatting settings (size, format, error correction, colors).

    2. It makes an API call to the GOQR service (`v1/create-qr-code/`) to generate
    the QR code image based on the provided parameters.

    3. The received image bytes are saved to a temporary file on the local system.

    4. The action attaches the generated file to the current case wall using the SOAR
    SDK.

    5. It returns a JSON result containing the base64-encoded image blob and configuration
    metadata.

    6. Finally, the temporary folder is cleaned up.


    ### Additional Notes

    This action does not operate on specific Google SecOps entities. It is a utility
    action designed to create visual assets for cases.
  ai_short_description: >-
    Generates a QR code image from a provided string and attaches it to the case wall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Attaches the generated QR code image file to the case wall.
    reasoning: >-
      The action fetches data from an external API to generate the QR code. It mutates
      internal data by attaching the generated file to the case wall. It does not
      mutate external systems, update entities, create insights, modify alert data,
      or create case comments.
