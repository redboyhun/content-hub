Scan QR Code:
  ai_description: >-
    ### General Description

    The Scan QR Code action is a utility designed to extract and decode information
    from QR code images. It accepts a Base64-encoded string representing an image
    file, processes it through the GOQR API, and returns the decoded content found
    within the QR code symbols.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `QR Image Base64 Blob` parameter,
    which contains the Base64-encoded image data.

    2. **Decoding**: The action attempts to decode the provided Base64 string into
    binary image bytes. If decoding fails, a `GOQRError` is raised.

    3. **API Interaction**: The binary image data is sent to the `read_qr_code` API
    endpoint of the GOQR integration to perform the QR code scanning.

    4. **Response Parsing**: The action parses the API response, which contains a
    list of `DecodedQrCode` objects.

    5. **Validation**: The action checks if any symbols were found in the decoded
    results. If no symbols are present or if the primary symbol contains an error,
    an exception is raised.

    6. **Result Generation**: If successful, the action sets the result value to `true`
    and populates the JSON results with the decoded QR code data.


    ### Additional Notes

    - This action requires a valid Base64-encoded image string as input.

    - The action is strictly a read/decode utility and does not perform any security
    analysis or threat intelligence lookups.
  ai_short_description: >-
    Decodes QR code data from a provided Base64-encoded image string using the GOQR
    integration.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
