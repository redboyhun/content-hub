Scan QR Code:
  ai_description: >-
    ### General Description

    Decodes QR code data from a provided Base64-encoded image string using the GOQR
    API. This action allows analysts to extract information embedded within QR codes
    for further investigation.


    ### Flow Description

    1. Extracts the `QR Image Base64 Blob` parameter from the action configuration.

    2. Decodes the provided Base64 string into binary image data.

    3. Sends the binary image data to the GOQR API endpoint (`v1/read-qr-code/`) to
    extract the QR code content.

    4. Parses the API response to retrieve the decoded QR symbol data.

    5. Returns the decoded QR code information in the action results.


    ### Additional Notes

    This action is strictly for data extraction and does not modify any external or
    internal systems.
