Enrich URL:
  ai_description: >-
    ### General Description

    Enriches URL entities using the IPQualityScore (IPQS) API to detect suspicious
    links, phishing, malware, and parked domains. This action retrieves real-time
    threat intelligence, including risk scores, domain age, and categorization, to
    help analysts assess the safety of URLs found in alerts.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Strictness` and `Fast` configuration
    parameters from the integration settings.

    2. **Initialization**: The `IPQSManager` is initialized with the provided API
    key and configuration settings.

    3. **Entity Processing**: The action iterates through all target URL entities
    in the case.

    4. **API Interaction**: For each URL, the action sends a POST request to the IPQS
    API (`https://ipqualityscore.com/api/json/url`) to retrieve reputation and risk
    data.

    5. **Data Parsing & Scoring**: The response is parsed to extract relevant metrics
    (e.g., malware, phishing, risk score). A verdict (Clean, Low Risk, Moderate Risk,
    High Risk, Critical) is calculated based on these metrics.

    6. **Internal Update**: The action updates the entity with additional properties
    (prefixed with 'IPQualityScore'), creates a case insight with the verdict, adds
    a data table to the entity, and attaches the raw JSON response to the entity.


    ### Additional Notes

    This action requires a valid IPQualityScore API key. It is strictly an enrichment
    action and does not perform any blocking or remediation on external systems.
