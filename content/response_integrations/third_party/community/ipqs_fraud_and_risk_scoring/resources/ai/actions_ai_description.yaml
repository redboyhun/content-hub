    1. The action extracts the `Strictness` and `Country` parameters from the configuration.

    2. It iterates through the `target_entities` provided in the case, filtering specifically
    for entities of type `PHONENUMBER`.

    3. For each valid phone number, it performs a POST request to the IPQS API (`https://ipqualityscore.com/api/json/phone`)
    with the phone number and configuration parameters.

    4. Upon receiving the response, the action parses the data to extract key metrics
    such as fraud score, carrier, and line type.

    5. It updates the entity's `additional_properties` with the retrieved data, sets
    the `is_enriched` flag to true, and updates the `is_suspicious` status based on
    the calculated risk score.

    6. The action generates a case insight and adds an entity table to the SOAR platform
    containing the detailed reputation report.

    7. Finally, it updates the entities in the SOAR platform and returns the aggregated
    results.


    ### Additional Notes

    This action requires a valid IPQS API key configured within the integration settings.
    It does not perform any external state-changing operations (mutations) on the
