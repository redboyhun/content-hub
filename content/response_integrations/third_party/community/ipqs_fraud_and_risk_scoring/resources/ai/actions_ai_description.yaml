Enrich IP:
  ai_description: >-
    ### General Description

    This action performs real-time risk assessment and enrichment for various entity
    types (IP addresses, URLs, Hostnames, Email addresses, and Phone numbers) using
    the IPQualityScore (IPQS) API. It retrieves comprehensive threat intelligence,
    including fraud scores, geolocation, ISP details, connection types (VPN/Proxy/TOR),
    and reputation data. This information helps analysts quickly determine the risk
    level of a user, transaction, or network connection.


    ### Flow Description

    1. The action extracts configuration parameters (API Key) and action-specific
    parameters (Strictness, User Agent, etc.) from the SecOps environment.

    2. It iterates through the target entities provided in the case.

    3. For each entity, it validates the type (IP, URL, Hostname, Email, or Phone
    Number).

    4. It makes a POST request to the IPQualityScore API endpoint corresponding to
    the entity type, passing the entity identifier and configuration parameters.

    5. Upon receiving a successful response, the action:
        - Adds a data table to the entity in the SecOps platform containing the retrieved
    metadata.
        - Creates a case insight summarizing the risk verdict (e.g., Clean, Suspicious,
    Critical).
        - Updates the entity's `additional_properties` with the retrieved data.
        - Sets the entity's `is_enriched` flag to true and updates the `is_suspicious`
    status based on the risk score.
    6. Finally, it updates the entities in the SecOps platform and returns a summary
    of processed, failed, or missing data entities.


    ### Additional Notes

    - The action supports multiple entity types and dynamically routes requests to
    the appropriate IPQS endpoint.

    - The `Strictness` parameter is mandatory and dictates the depth of the analysis
    performed by the API.

    - The action does not perform any external remediation or blocking; it is strictly
    for enrichment and risk scoring.
