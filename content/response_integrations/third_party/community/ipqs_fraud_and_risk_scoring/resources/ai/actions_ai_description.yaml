Enrich Email:
  ai_description: >-
    ### General Description

    Enriches email address entities using IPQualityScore (IPQS) to provide real-time
    reputation scoring, fraud risk assessment, and validation. This action helps analysts
    determine if an email address is valid, disposable, or associated with known abuse,
    spam, or fraudulent behavior.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the API Key, Abuse Strictness
    level, Fast mode setting, Timeout duration, and Suggest Domain preference from
    the integration configuration.

    2. **Entity Filtering**: The action iterates over the target entities, filtering
    specifically for `USER` entities.

    3. **Validation**: Each `USER` entity identifier is validated against an email
    regex pattern to ensure it is a valid email address.

    4. **API Interaction**: A POST request is sent to the IPQS API (`/email` endpoint)
    with the email address and configuration parameters.

    5. **Data Processing**: The API response is parsed to extract risk scores, validity,
    and other metadata.

    6. **Internal Update**: The action updates the entity's `additional_properties`
    with the retrieved data, sets the `is_enriched` flag, and updates the `is_suspicious`
    status based on the risk score.

    7. **Insight Creation**: A case insight is generated with the IPQS verdict and
    risk details.

    8. **Result Reporting**: The action adds a result table and JSON output to the
    action results.


    ### Additional Notes

    This action supports advanced email validation, including SMTP checks (unless
    'Fast' mode is enabled), disposable email detection, and fraud scoring. It is
    designed to be used on email addresses identified as `USER` entities within the
    SOAR platform.
