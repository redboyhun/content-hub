Enrich IP:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using the IPQualityScore (IPQS) API. This action
    retrieves comprehensive threat intelligence, including fraud scores, geo-location,
    ISP, connection type, and reputation data, to assess the risk of an IP address.
    It helps analysts quickly identify malicious IPs, proxies, VPNs, or TOR connections.


    ### Flow Description

    1. Extracts configuration parameters (API Key) and action parameters (Strictness,
    User Agent, etc.) from the SOAR platform.

    2. Iterates through the target entities, filtering specifically for IP Address
    entities.

    3. Sends a POST request to the IPQS API with the entity identifier and configured
    parameters.

    4. Processes the API response to extract relevant data points and calculate a
    risk verdict based on the fraud score.

    5. Updates the entity with additional properties (e.g., fraud score, ISP, ASN)
    and sets the `is_enriched` and `is_suspicious` flags if the risk threshold is
    met.

    6. Adds an entity table and a case insight with the analysis results to the SOAR
    platform.


