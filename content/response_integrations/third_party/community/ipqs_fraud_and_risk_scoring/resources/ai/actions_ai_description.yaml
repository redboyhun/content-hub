Enrich Email:
  ai_description: >-
    Enriches email address entities using the IPQualityScore (IPQS) service to provide
    real-time reputation scoring and validation. This action performs syntax and DNS
    checks to determine if an email address exists, is disposable, or has a history
    of abuse.


    ### Flow Description

    1. The action extracts configuration parameters: 'Abuse Strictness', 'Fast', 'Timeout
    in seconds', and 'Suggest Domain'.

    2. It iterates through the target entities, filtering for entities of type 'USER'
    that match a valid email address format using a regex pattern.

    3. For each valid email entity, the action sends a POST request to the IPQS Email
    API (`https://ipqualityscore.com/api/json/email`) with the email address and the
    configured parameters.

    4. The API response is parsed to extract data points such as fraud score, disposable
    status, and deliverability.

    5. The action updates the entity's 'additional_properties' with the retrieved
    data, sets the entity as 'is_enriched', and updates the 'is_suspicious' status
    based on the calculated risk verdict.

    6. It creates a case insight containing the risk verdict and adds a data table
    to the entity in the SOAR platform.


    ### Additional Notes

    This action requires a valid IPQS API key configured in the integration settings.
    It is designed to be used on 'USER' entities that represent email addresses.
