Enrich Domain:
  ai_description: >-
    ### General Description

    Enriches Hostname entities using the IPQS (IPQualityScore) Fraud and Risk Scoring
    service. This action retrieves real-time threat intelligence, including risk scores,
    reputation, and classification data (e.g., malware, phishing, parked domains)
    for the provided hostnames. It evaluates the risk based on the retrieved data
    and updates the entity's status within the SOAR platform.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Strictness` and `Fast` configuration
    parameters.

    2. **Entity Filtering**: The action iterates through the target entities, filtering
    specifically for `HOSTNAME` types.

    3. **API Interaction**: For each valid hostname, the action sends a POST request
    to the IPQS API (`https://ipqualityscore.com/api/json/url`) to retrieve reputation
    and risk data.

    4. **Risk Scoring**: The action parses the API response, calculates a risk verdict
    (e.g., Clean, Low, Moderate, High, Critical), and determines if the entity should
    be marked as suspicious.

    5. **Data Enrichment**: The action updates the entity's `additional_properties`
    with the retrieved intelligence and sets the `is_enriched` and `is_suspicious`
    flags accordingly.

    6. **Insight Creation**: A case insight is generated for each enriched entity,
    summarizing the risk verdict.

    7. **Platform Update**: The action updates the entities in the SOAR platform and
    attaches the full JSON response to the action results.


    ### Additional Notes

    This action requires a valid API key for the IPQS Fraud and Risk Scoring service.
    It treats hostnames as URLs for the purpose of the IPQS API analysis.
  ai_short_description: >-
    Enriches Hostname entities with threat intelligence and risk scores from IPQualityScore.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties (additional_properties, is_enriched, is_suspicious)
      and creates case insights.
    reasoning: >-
      The action fetches data from an external API (IPQS) and updates internal SOAR
      entities with the retrieved information. It does not mutate external systems
      (e.g., blocking).
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
