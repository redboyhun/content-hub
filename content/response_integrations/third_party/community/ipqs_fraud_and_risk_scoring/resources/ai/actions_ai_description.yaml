    Tests connectivity to the IPQualityScore (IPQS) API to ensure the integration
    is configured correctly and the SOAR platform can communicate with the service.


    Flow Description

    1. The action extracts the API Key from the integration configuration.

    2. It initializes the `IPQSManager` with the provided API Key.

    3. It performs a POST request to the IPQS API endpoint using a test email address
