Enrich Domain:
  ai_description: "### General Description\nEnriches domain and hostname entities\
    \ using the IPQualityScore (IPQS) API. This action retrieves comprehensive threat\
    \ intelligence, including risk scores, domain age, and reputation classifications\
    \ (e.g., phishing, malware, parked domains). It helps analysts quickly assess\
    \ the risk associated with domains encountered in alerts.\n\n### Flow Description\n\
    1. **Configuration Extraction**: The action retrieves the API Key from the integration\
    \ configuration and the `Strictness` and `Fast` parameters from the action settings.\n\
    2. **Entity Processing**: The action iterates through all target entities, filtering\
    \ for those of type `HOSTNAME`.\n3. **API Interaction**: For each valid entity,\
    \ the action performs a `POST` request to the IPQualityScore API (`https://ipqualityscore.com/api/json/url`)\
    \ to fetch reputation data.\n4. **Data Parsing & Scoring**: The action parses\
    \ the API response, calculates a risk verdict (e.g., Clean, Low, Medium, High,\
    \ Critical), and formats the data into a table.\n5. **Internal Update**: \n  \
    \  - Creates a case insight with the risk verdict.\n    - Adds an entity table\
    \ containing detailed domain metadata.\n    - Updates the entity's `additional_properties`\
    \ with the retrieved intelligence.\n    - Marks the entity as enriched and updates\
    \ its suspicious status if the risk score exceeds defined thresholds.\n\n### Additional\
    \ Notes\n- The action supports configurable strictness levels (0-2) to balance\
    \ false-positive rates.\n- The `Fast` parameter allows for quicker response times\
    \ using lighter analysis checks."
  ai_short_description: >-
    Enriches domain and hostname entities using IPQualityScore (IPQS) to retrieve
    reputation, risk scores, and threat intelligence.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties, adds entity tables, and creates case insights.
    reasoning: >-
      The action fetches data from an external API (IPQualityScore) to enrich entities.
      It does not mutate external data. It performs internal mutations by updating
      entities, adding tables, and creating insights.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches threat intelligence data from an external API (IPQualityScore)
      and updates internal SOAR entities and insights. It does not modify external
      systems or perform remediation tasks. Therefore, it is classified as an Enrichment
      action.
    remediation: false
