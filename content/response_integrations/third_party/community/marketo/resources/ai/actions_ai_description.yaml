Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Marketo platform by attempting to retrieve a sample
    lead record. This action verifies that the provided integration credentials are
    valid and that the Marketo API is reachable.


    ### Flow Description

    1. Extracts configuration parameters (`Client Id`, `Client Secret`, `Munchkin
    Id`) from the integration settings.

    2. Initializes the `MarketoClient` using the provided credentials.

    3. Executes a `get_lead_by_id` API call with a dummy ID (1) to verify the connection.

    4. Terminates the action with a success status if the API call completes without
    error.


    ### Additional Notes

    This action is a connectivity test and does not perform any meaningful data retrieval
    or modification of entities. It is intended for diagnostic purposes only.
