Request Campaign:
  ai_description: >-
    ### General Description

    Triggers a Marketo campaign for a specific lead. This action interacts with the
    Marketo API to initiate a campaign, allowing for the inclusion of custom tokens.


    ### Flow Description

    1. Extracts Marketo API credentials (Client ID, Client Secret, Munchkin ID) from
    the integration configuration.

    2. Extracts action parameters: `Campaign Id`, `Lead Id`, and `Tokens Json`.

    3. Parses the `Tokens Json` string into a dictionary.

    4. Initializes the `MarketoClient` using the provided credentials.

    5. Executes the `request_campaign` method via the Marketo API, passing the `Campaign
    Id`, `Lead Id`, and parsed tokens.

    6. Returns a success or failure message based on the API response.


    ### Additional Notes

    The action requires valid Marketo API credentials. The `Tokens Json` parameter
    allows passing custom token key-value pairs for the campaign.
