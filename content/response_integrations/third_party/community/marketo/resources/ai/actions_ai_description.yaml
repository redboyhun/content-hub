Get Lead By Entity Email:
  ai_description: >-
    ### General Description

    Retrieves lead information from Marketo for User entities. This action queries
    the Marketo API using the email address associated with a User entity to fetch
    contextual lead details, such as first name, last name, and Marketo Lead ID. The
    retrieved information is then added to the entity's additional properties, enriching
    the entity within the SOAR platform.


    ### Flow Description

    1. **Configuration Extraction**: The action extracts the required Marketo credentials
    (`Client Id`, `Client Secret`, `Munchkin Id`) from the integration configuration.

    2. **Entity Iteration**: The action iterates through all target entities provided
    in the playbook.

    3. **Validation**: For each entity, it validates that the entity type is `USER`
    and that the identifier is a valid email address using a regular expression.

    4. **API Interaction**: For valid entities, the action calls the Marketo API method
    `get_multiple_leads_by_filter_type` using the email address as the filter value.

    5. **Enrichment**: If lead details are returned, the action updates the entity's
    `additional_properties` with the retrieved Marketo data (`firstName`, `lastName`,
    `email`, `id`) and marks the entity as enriched.

    6. **Entity Update**: Finally, the action updates the enriched entities within
    the SOAR platform and returns the results.


    ### Additional Notes

    This action requires valid Marketo API credentials. It specifically targets User
    entities and will skip any entities that do not match the required type or format.
