Get Lead By Email Param:
  ai_description: >-
    ### General Description

    Retrieves lead information from Marketo for a specified email address. This action
    is used for enrichment or verification of user data within Marketo.


    ### Flow Description

    1. Extracts Marketo API credentials (`Client Id`, `Client Secret`, `Munchkin Id`)
    from the integration configuration.

    2. Extracts the `Email` parameter provided by the user.

    3. Initializes the `MarketoClient` with the retrieved credentials.

    4. Executes the `get_multiple_leads_by_filter_type` method using the provided
    email address as the filter.

    5. If a lead is found, the action returns the lead details and the lead ID. If
    no lead is found, it reports that the user does not exist.

    6. The result is added to the action output as JSON.


    ### Additional Notes

