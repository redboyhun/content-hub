Create lead:
  ai_description: >-
    ### General Description

    Creates a new lead in Marketo using the provided user details. This action automates
    the process of adding a new lead to the Marketo platform by sending the user's
    email, first name, last name, and country information.


    ### Flow Description

    1. Extracts Marketo configuration parameters (Client ID, Client Secret, Munchkin
    ID) from the integration settings.

    2. Extracts action parameters (Email, First Name, Last Name, Country) provided
    by the user.

    3. Initializes the `MarketoClient` with the retrieved credentials.

    4. Executes the `create_update_leads` method with `action="createOnly"` to create
    the lead in Marketo.

    5. Processes the API response to determine if the lead creation was successful.

    6. Adds the result JSON to the action output and terminates the action with the
    appropriate status.


    ### Additional Notes

    This action performs a write operation in an external system (Marketo) and does
    not interact with SOAR entities.
  ai_short_description: >-
    Creates a new lead in Marketo using provided user details.
