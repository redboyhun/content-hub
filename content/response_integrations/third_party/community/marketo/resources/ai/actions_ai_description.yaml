Get Lead By Email Param:
  ai_description: >-
    ### General Description

    Fetches lead information from Marketo for a specified email address. This action
    retrieves contextual metadata about a user or lead, such as their ID and other
    profile details, to assist in investigation and enrichment workflows.


    ### Flow Description

    1. The action extracts the required configuration parameters: `Client Id`, `Client
    Secret`, and `Munchkin Id` to authenticate with the Marketo API.

    2. The action extracts the `Email` parameter provided by the user.

    3. The `MarketoClient` is initialized using the extracted credentials.

    4. The action calls the `get_multiple_leads_by_filter_type` method of the Marketo
    API, passing the `Email` as the filter value.

    5. If a lead is found, the action returns the lead details as a JSON result and
    provides a success message. If no lead is found, it returns a failure message.


    ### Additional Notes

    This action is a read-only operation and does not modify any data in Marketo or
    the SOAR platform. It requires valid Marketo API credentials to function.
