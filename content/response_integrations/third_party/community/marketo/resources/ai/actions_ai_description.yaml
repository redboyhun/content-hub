Get Lead By Entity Email:
  ai_description: >-
    ### General Description

    Enriches User entities by retrieving lead information from Marketo. This action
    queries the Marketo API using the entity's email address to fetch associated lead
    details, such as first name, last name, and lead ID. The retrieved information
    is then added to the entity's additional properties within the SOAR platform.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the necessary Marketo API
    credentials (`Client Id`, `Client Secret`, and `Munchkin Id`) from the integration
    configuration.

    2. **Entity Iteration**: The action iterates through all target entities provided
    in the playbook.

    3. **Validation**: For each entity, it validates that the entity type is `USER`
    and that the identifier is a valid email address using a regular expression.

    4. **API Query**: For valid entities, the action calls the Marketo API method
    `get_multiple_leads_by_filter_type` using the email address as the filter.

    5. **Entity Update**: If a lead is found, the action updates the entity's `additional_properties`
    with the retrieved lead data (First Name, Last Name, Email, Lead ID) and marks
    the entity as enriched.

    6. **System Update**: The action calls `siemplify.update_entities` to persist
    the changes to the SOAR platform and returns the results as a JSON object.


    ### Additional Notes

    This action requires a valid Marketo integration configuration with appropriate
    API credentials. It only processes entities of type `USER` that contain a valid
    email address format.
