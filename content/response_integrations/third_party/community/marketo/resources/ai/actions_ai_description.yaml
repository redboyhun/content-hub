Create lead:
  ai_description: >-
    ### General Description

    Creates a new lead in Marketo using provided user details. This action interacts
    with the Marketo API to register a new lead record based on the email, first name,
    last name, and country provided.


    ### Flow Description

    1. Extracts Marketo integration credentials (Client ID, Client Secret, Munchkin
    ID) from the configuration.

    2. Extracts action parameters (Email, First Name, Last Name, Country) from the
    action input.

    3. Initializes the `MarketoClient` with the provided credentials.

    4. Calls the `create_update_leads` method with `action="createOnly"` and `lookupField="email"`
    to create the lead in Marketo.

    5. Processes the response to determine if the lead creation was successful or
    failed.

    6. Adds the result JSON to the action output and ends the action.


    ### Additional Notes

    This action performs a write operation to an external system (Marketo) and does
    not interact with existing entities in the SOAR platform.
  ai_short_description: >-
    Creates a new lead in Marketo using provided user details.
