Request Campaign:
  ai_description: >-
    General Description

    Triggers a specific Marketo campaign for a given lead. This action allows users
    to initiate marketing campaigns directly from the SOAR platform by interacting
    with the Marketo API.


    Flow Description

    1. Extracts configuration parameters (Client ID, Client Secret, Munchkin ID) and
    action parameters (Campaign ID, Lead ID, Tokens JSON).

    2. Parses the provided JSON tokens, ensuring that any keys containing "password"
    are handled appropriately.

    3. Initializes the `MarketoClient` using the extracted configuration.

    4. Executes the `request_campaign` method via the Marketo API, passing the campaign
    ID, lead ID, and the parsed tokens.

    5. Returns the execution status and a success or failure message based on the
    API response.


    Additional Notes

    This action performs a state-changing operation on the external Marketo platform.
    It does not interact with SOAR entities directly, as it relies on parameters provided
