Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Philips HUE Bridge. This action verifies that the SOAR
    platform can successfully communicate with the configured Philips HUE Bridge using
    the provided credentials.


    ### Flow Description

    1. The action extracts the `Bridge IP` and `Authorized Username` from the integration
    configuration.

    2. It initializes the `PhilipsManager` using these credentials.

    3. The action calls the `test_connectivity` method, which performs a GET request
    to the bridge's base URL.

    4. If the request is successful, the action returns `True` and logs a success
    message; otherwise, it returns `False` and logs the error.


    ### Additional Notes

    This action is strictly for connectivity testing and does not perform any data
    enrichment or remediation tasks.
  ai_short_description: >-
    Tests connectivity to the Philips HUE Bridge.
