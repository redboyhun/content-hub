Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to a Philips HUE Bridge by performing a health check request.
    This action verifies that the integration can successfully communicate with the
    bridge using the provided credentials.


    ### Flow Description

    1. The action retrieves the `Bridge IP` and `Authorized Username` from the integration
    configuration.

    2. It initializes the `PhilipsManager` using these credentials.

    3. It executes the `test_connectivity()` method, which sends an HTTP GET request
    to the Philips HUE Bridge API.

    4. The action returns a success or failure status based on the response from the
    bridge and logs the outcome.


    ### Additional Notes

    This action is a diagnostic tool used to verify the integration's connectivity
    and does not perform any data enrichment or state changes.
