Turn On Light and Color:
  ai_description: >-
    ### General Description

    Turns on a Philips Hue light with a specified color and alert effect. This action
    interacts with a Philips Hue bridge to verify the existence of a light and update
    its state, including color and visual effects.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Philips Hue bridge IP and
    authorized username from the integration configuration, and the target `Light
    ID`, `Color`, and `Alert effect` from the action parameters.

    2. **Initialization**: A `PhilipsManager` instance is initialized using the bridge
    IP and username.

    3. **Verification**: The action calls `search_light_id` (GET request) to verify
    that the specified light exists on the bridge.

    4. **Adjustment**: If the light exists, the action calls `adjust_light` (PUT request)
    to set the light's state (on, color, and effect).

    5. **Result Output**: The action outputs the result of the operation, including
    the light's reachability status, via `siemplify.result.add_result_json`.


    ### Additional Notes

    This action performs a state change on an external physical device (Philips Hue
    light). It does not interact with SOAR entities or perform security-related operations.
