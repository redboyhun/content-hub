    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to verify connectivity to the Philips HUE
      Bridge. It does not mutate external or internal data, nor does it update entities
      or create insights.
  categories:
    enrichment: false
    reasoning: >-
      The action is a 'Ping' action designed to test connectivity. Per the instructions,
