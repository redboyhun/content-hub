Turn Off Light:
  ai_description: >-
    ### General Description

    Turns off a specific Philips Hue light by its ID. This action interacts with the
    Philips Hue bridge to modify the state of a light bulb, effectively switching
    it off.


    ### Flow Description

    1. The action extracts the required configuration parameters: `Bridge IP` and
    `Authorized Username`.

    2. The action extracts the `Light ID` parameter provided by the user.

    3. The action initializes the `PhilipsManager` using the extracted configuration.

    4. The action calls `search_light_id` (GET request) to verify the existence of
    the light on the bridge.

    5. If the light exists, the action calls `reachability` (GET request) to check
    if the light is reachable.

    6. If the light is reachable, the action calls `adjust_light` (PUT request) to
    set the light's `on` state to `False`.

    7. The action returns the result of the operation, including the light ID and
    reachability status.


    ### Additional Notes

    This action requires a valid Philips Hue bridge IP and an authorized username.
    It performs a state change on the external device.
  ai_short_description: >-
    Turns off a specific Philips Hue light by its ID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Changes the state of the Philips Hue light to 'off' via a PUT request.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data (GET requests) to verify light existence and reachability,
      and mutates external data (PUT request) to change the light state. It does not
      mutate internal SOAR data.
  categories:
