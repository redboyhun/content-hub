Turn Off Light:
  ai_description: >-
    ### General Description

    This action turns off a specific Philips Hue light by its ID. It interacts with
    the Philips Hue Bridge API to modify the state of the light, allowing for automated
    lighting control within a SOAR workflow.


    ### Flow Description

    1. The action extracts the `Bridge IP` and `Authorized Username` from the integration
    configuration.

    2. It extracts the `Light ID` from the action parameters.

    3. The `PhilipsManager` is initialized to handle communication with the Philips
    Hue Bridge.

    4. The action calls `search_light_id` to verify the existence of the light on
    the bridge via a GET request.

    5. If the light exists, the action calls `adjust_light` with `on_state=False`,
    which sends a PUT request to the Philips Hue Bridge API to update the light's
    state to off.

    6. The action returns the result of the operation, including the light's reachability
    status, and updates the execution status accordingly.


    ### Additional Notes

    This action requires a valid Philips Hue Bridge IP and an authorized username
    configured in the integration settings. It does not operate on SOAR entities;
    it relies entirely on the user-provided `Light ID` parameter.
  ai_short_description: >-
    Turns off a specific Philips Hue light by its ID using the Philips Hue Bridge
    API.
