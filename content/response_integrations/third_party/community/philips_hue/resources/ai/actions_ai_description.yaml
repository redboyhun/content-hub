Turn On Light and Color:
  ai_description: >-
    ### General Description

    This action turns on a specific Philips Hue light and applies a chosen color and
    alert effect. It interacts with the Philips Hue Bridge API to verify the light's
    existence and reachability before applying the requested state changes.


    ### Flow Description

    1. Extracts the `Bridge IP` and `Authorized Username` from the integration configuration.

    2. Extracts the `Light ID`, `Color`, and `Alert effect` from the action parameters.

    3. Initializes the `PhilipsManager` to communicate with the Philips Hue Bridge.

    4. Calls `search_light_id` (GET request) to verify if the specified light exists.

    5. If the light exists, calls `adjust_light` (PUT request) to update the light's
    state (on, color, effect).

    6. Returns the operation status and result details.


    ### Additional Notes

    This action requires a properly configured Philips Hue integration with a valid
    Bridge IP and authorized username.
