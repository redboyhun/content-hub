Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches User entities by querying the Full Contact API to retrieve professional
    and company-related metadata. This action enhances the context of user entities
    within the case by populating their additional properties with information such
    as company name, industry, location, employee count, and personal details like
    job title and LinkedIn profile.


    ### Flow Description

    1. The action iterates through the target entities provided in the case.

    2. It filters for entities of type `USER`.

    3. For each user, it extracts the domain from the email address and the email
    itself.

    4. It makes a POST request to the Full Contact API (`/v3/company.enrich`) to retrieve
    company information based on the domain.

    5. It makes a POST request to the Full Contact API (`/v3/person.enrich`) to retrieve
    personal information based on the email.

    6. The retrieved data is mapped to the entity's `additional_properties`.

    7. The action updates the entities in the SOAR platform using `siemplify.update_entities`.

    8. The final enrichment data is added to the action result.


    ### Additional Notes

    This action requires a valid API Key configured for the Full Contact integration.
    It specifically targets `USER` entities and will only perform enrichment if the
    entity type matches.
  ai_short_description: >-
    Enriches User entities with professional and company metadata retrieved from the
    Full Contact API.
  capabilities:
