Ping:
  ai_description: >-
    ### General Description

    Tests connectivity with the Full Contact product by performing a domain enrichment
    request. This action is primarily used as a diagnostic tool to verify that the
    integration is correctly configured and can communicate with the Full Contact
    API.


    ### Flow Description

    1. The action initializes the `FullContactManager` using the API key retrieved
    from the integration configuration.

    2. It executes a POST request to the Full Contact `company.enrich` endpoint using
    a hardcoded domain ("google.com").

    3. The action validates the response status; if a 401 error is returned, it raises
    an exception to indicate an authentication failure.

    4. If the connectivity test completes successfully, the action returns a success
    message.


    ### Additional Notes

    This action is intended for connectivity testing and does not process entities
    or perform actual enrichment on case data. It is not an enrichment action.
  ai_short_description: >-
    Tests connectivity with the Full Contact product.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Full Contact API to test connectivity.
      It does not fetch contextual data for alerts/entities, nor does it mutate external
      or internal data.
  categories:
    enrichment: false
    reasoning: >-
      The action is named 'Ping' and is designed to test connectivity. It does not
      perform enrichment on entities or remediate threats, so it is not an enrichment
