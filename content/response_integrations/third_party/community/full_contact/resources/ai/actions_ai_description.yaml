Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Full Contact API by performing a domain enrichment request
    for a hardcoded domain. This action is primarily used for diagnostic purposes
    to verify that the integration is correctly configured and can communicate with
    the Full Contact service.


    ### Flow Description

    1. Initialize the `SiemplifyAction` module.

    2. Retrieve the API Key from the "Full Contact" integration configuration.

    3. Instantiate the `FullContactManager` class with the retrieved API Key.

    4. Call the `enrich_domain` method of `FullContactManager` with the hardcoded
    domain "google.com".

    5. The `enrich_domain` method sends a POST request to `https://api.fullcontact.com/v3/company.enrich`.

    6. Check the response status; if the status is 401, raise an exception indicating
    an authentication failure.

    7. End the action with a success message.


    ### Additional Notes

    This action is designed for connectivity testing and does not process any entities
    from the case. It uses a hardcoded domain for the test and does not accept any
    input parameters.
