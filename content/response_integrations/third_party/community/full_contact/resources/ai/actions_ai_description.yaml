Enrich Entities:
  ai_description: >-
    General Description: Enriches User entities using the Full Contact API. It retrieves
    professional and company-related metadata (e.g., company name, industry, location,
    job title, LinkedIn profile) based on the user's email address or associated domain.


    Flow Description:

    1. The action retrieves the API key from the "Full Contact" integration configuration.

    2. It iterates through the target entities, specifically identifying entities
    of type USER.

    3. For each user entity, it extracts the domain from the email address and the
    email itself.

    4. It calls the Full Contact API (/v3/company.enrich) to fetch company details
    using the domain.

    5. It calls the Full Contact API (/v3/person.enrich) to fetch person details using
    the email address.

    6. The retrieved data is mapped to the entity's additional_properties.

    7. The action updates the entities in the SOAR platform with the new enrichment
    data and adds the results to the action output.


    Additional Notes: This action requires a valid Full Contact API key. It specifically
    targets USER entities.
  ai_short_description: >-
    Enriches User entities with professional and company metadata using the Full Contact
    API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional_properties with enrichment data.
    reasoning: >-
      The action makes POST requests to the Full Contact API to fetch enrichment data
      for user entities. It does not mutate external data. It updates internal entities
      by adding enrichment data to their additional properties.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (Full Contact) and updates internal
      entities with the retrieved information. It does not mutate external systems.
      Therefore, it is an enrichment action and not a remediation action.
    remediation: false
