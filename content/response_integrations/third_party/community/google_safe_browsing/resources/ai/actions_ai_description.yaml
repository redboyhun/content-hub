Ping:
  ai_description: >-
    ### General Description

    Verifies connectivity to the Google Safe Browsing service by performing a sample
    URL lookup. This action is intended for health checks and does not perform any
    security operations or entity processing.


    ### Flow Description

    1. The action extracts the `Api Key` from the integration configuration.

    2. It initializes the `SafeBrowsing` manager using the provided API key.

    3. It executes a `lookup_urls` API call using a hardcoded test URL (`http://malware.testing.google.test/testing/malware/`)
    to verify the connection.

    4. It terminates the action with a success message if the connectivity test completes.


    ### Additional Notes

    This action is strictly for connectivity verification and does not process any
    entities or perform security operations.
