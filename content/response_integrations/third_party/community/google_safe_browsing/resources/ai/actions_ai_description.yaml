Lookup:
  ai_description: >-
    ### General Description

    Checks if a specific URL is safe for browsing using the Google Safe Browsing service.
    This action queries the service to determine if a given URL is flagged as malicious,
    providing threat intelligence to help analysts assess the risk of a URL.


    ### Flow Description

    1. Extract the `Api Key` from the integration configuration.

    2. Extract the `Url` parameter from the action input.

    3. Initialize the `SafeBrowsing` manager with the provided API key.

    4. Call the `lookup_urls` method to query the Google Safe Browsing service for
    the status of the provided URL.

    5. Add the raw JSON result to the action output.

    6. Determine if the URL is malicious and terminate the action with a status message
    and boolean result.


    ### Additional Notes

    This action is a lookup/enrichment action. It does not modify external systems
    or internal case data (other than returning results).
  ai_short_description: >-
    Checks if a specific URL is safe for browsing using the Google Safe Browsing service.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Google Safe Browsing API to fetch URL
      reputation data. It does not mutate external data or internal case data.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches reputation data for a URL from Google Safe Browsing. It does
      not modify any external or internal systems, making it an enrichment action.
    remediation: false
