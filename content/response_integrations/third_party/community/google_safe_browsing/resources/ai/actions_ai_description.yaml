Lookup:
  ai_description: >-
    ### General Description

    Checks if a specific URL is safe for browsing using the Google Safe Browsing service.
    This action queries the Google Safe Browsing API to determine if a provided URL
    is flagged as malicious, providing immediate threat intelligence for the indicator.


    ### Flow Description

    1. The action extracts the `Api Key` from the integration configuration.

    2. The action extracts the `Url` parameter provided by the user.

    3. The action initializes the `SafeBrowsing` manager using the provided API key.

    4. The action calls the `lookup_urls` method from the `pysafebrowsing` library
    to query the Google Safe Browsing API for the specified URL.

    5. The action parses the response to determine if the URL is marked as malicious.

    6. The action adds the raw JSON response to the action results using `siemplify.result.add_result_json`.

    7. The action terminates with a summary message indicating whether the URL was
    found to be malicious.


    ### Additional Notes

    This action operates on a direct URL input provided as a parameter and does not
    interact with or filter existing entities within the SOAR platform.
  ai_short_description: >-
    Checks if a specific URL is safe for browsing using the Google Safe Browsing service.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to the Google Safe Browsing API to fetch reputation
      data for a URL. It does not mutate any external or internal data, nor does it
      update entities, create insights, or modify alert data.
