Ping:
  ai_description: >-
    General Description

    Tests connectivity to the Google Safe Browsing service to ensure the integration
    is properly configured and the API key is valid.


    Flow Description

    1. Extracts the 'Api Key' from the integration configuration.

    2. Initializes the `SafeBrowsing` manager using the provided API Key.

    3. Performs a test URL lookup using a hardcoded test URL to verify connectivity.

    4. Returns a success message upon completion.


    Additional Notes

    This action is a connectivity test and does not perform any actual enrichment
    or remediation on entities.
