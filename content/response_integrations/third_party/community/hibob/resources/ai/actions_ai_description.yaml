Get User Image:
  ai_description: >-
    ### General Description

    Retrieves the profile image for a specified employee from the Hibob platform.
    This action allows analysts to fetch an employee's avatar in base64 format and
    its corresponding URL, providing visual context for user-related investigations.


    ### Flow Description

    1. Extract the 'Employee's Email' parameter provided by the user.

    2. Call the Hibob API via `HibobManager.get_user_details` to retrieve the employee's
    unique identifier using the provided email address.

    3. Call the Hibob API via `HibobManager.get_user_image` using the retrieved employee
    identifier to fetch the avatar image content.

    4. Convert the retrieved image content into a base64-encoded string.

    5. Add the base64 string and the image URL to the action's JSON result for display
    in the SOAR platform.


    ### Additional Notes

    This action is strictly for information retrieval and does not modify any data
    in Hibob or the SOAR platform. If the user is not found or does not have an image,
    the action returns a corresponding status in the JSON result.
