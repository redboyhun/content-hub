Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches User entities with employee details retrieved from Hibob. This action
    fetches user-specific information from the Hibob API, flattens the data, and updates
    the entity's additional properties within the SOAR platform to provide better
    context for analysts.


    ### Flow Description

    1. Initialize the `SiemplifyAction` and `HibobManager` using the API token from
    the integration configuration.

    2. Iterate through the target entities provided in the action.

    3. Filter for entities of type `USER`.

    4. For each user entity, call `get_user_details` from the Hibob API using the
    entity's identifier.

    5. If user data is found, flatten the nested dictionary and prefix all keys with
    "Hibob".

    6. Update the entity's `additional_properties` with the flattened user data.

    7. Mark the entity as enriched by setting `is_enriched` to `True`.

    8. Update the enriched entities in the SOAR platform.

    9. Add the raw user data to the action result JSON.


    ### Additional Notes

    This action does not modify data in Hibob; it only retrieves information to enrich
    the SOAR entity. The "Get User Image" parameter is extracted but not utilized
    in the current logic.
  ai_short_description: >-
    Enriches User entities with employee details retrieved from Hibob.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entity's `additional_properties` and `is_enriched` status within
      the SOAR platform.
    reasoning: >-
      The action makes a GET request to the Hibob API to fetch user details. It updates
      the entity's `additional_properties` and `is_enriched` status within the SOAR
      platform, which constitutes internal data mutation.
