Revoke Access:
  ai_description: >-
    ### General Description

    Revokes access for a specific employee in the Hibob HR platform. This action identifies
    the user by their email address, verifies their current status, and performs a
    revocation request to disable their access within the Hibob system.


    ### Flow Description

    1. The action extracts the `Employee's Email` parameter provided by the user.

    2. It initializes the `HibobManager` using the configured API token and root URL.

    3. It calls the `get_user_details` API (GET request) to retrieve the employee's
    unique identifier and current status from Hibob.

    4. If the user is not found, the action terminates and reports that the employee
    does not exist.

    5. If the user is found, it checks the `state` of the employee. If the employee
    is already uninvited (revoked), the action terminates with a status message.

    6. If the employee is active, it calls the `revoke_access_to_hibob` API (POST
    request) using the employee's identifier to revoke their access.

    7. The action returns a JSON result indicating whether the user existed and if
    the revocation was successful.


    ### Additional Notes

    This action performs a state-changing operation on an external HR system. Ensure
    that the provided API token has sufficient permissions to perform user revocation
    actions in Hibob.
  ai_short_description: >-
    Revokes access for an employee in the Hibob HR platform based on their email address.
  capabilities:
    can_create_case_comments: false
