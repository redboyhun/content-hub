    ### General Description

    Searches for a specific user in the Hibob HR system using their email address.
    This action retrieves detailed user information, such as employment status, department,
    and personal details, to assist in identity verification or context gathering
    during an investigation.


    ### Flow Description

    1. The action extracts the 'Employee's Email' parameter provided by the user.

    2. It initializes the `HibobManager` using the configured API token.

    3. The action calls the `get_user_details` method, which performs a GET request
    to the Hibob API (`/v1/people/{employee_identifier}`) to retrieve the user's profile.

    4. If the user is found, the action returns the user details in the result JSON
    and sets the action status to success.

    5. If the user is not found, the action returns a failure message indicating the
    user was not found.


