Send Invitation:
  ai_description: >-
    ### General Description

    Sends an invitation to a new employee in the Hibob system to initiate their onboarding
    process or to re-invite a user who has been previously disabled. This action interacts
    with the Hibob API to verify the user's existence and then triggers an invitation
    using a specified welcome wizard.


    ### Flow Description

    1. The action extracts the `Employee's Email` and `Welcome Wizard Name` from the
    action parameters.

    2. It calls the Hibob API (`GET /v1/people/{employee_identifier}`) to retrieve
    the details of the specified employee.

    3. It verifies if the employee exists and checks their current invitation status.

    4. If the employee is not already invited, it calls the Hibob API (`GET /v1/onboarding/wizards`)
    to retrieve a list of all available welcome wizards.

    5. It matches the provided `Welcome Wizard Name` to the corresponding `wizard_id`.

    6. Finally, it sends the invitation by making a POST request to the Hibob API
    (`POST /v1/employees/{employee_identifier}/invitations`) with the selected wizard
    ID.


    ### Additional Notes

    The `Welcome Wizard Name` parameter is case-sensitive and must match the configuration
    defined in the Hibob system (Settings -> Flows). If the employee is already in
    an 'invited' state, the action will not send a duplicate invitation.
