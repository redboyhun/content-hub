Upload User Image:
  ai_description: >-
    ### General Description

    Uploads a user image to the Hibob HR platform for a specified employee. This action
    retrieves the employee's unique identifier using their email address and then
    updates their profile avatar with the provided image URL.


    ### Flow Description

    1. The action extracts the `Employee's Email` and `Url Image` parameters.

    2. It calls the `HibobManager.get_user_details` method (GET request) to retrieve
    the employee's details, specifically their unique identifier.

    3. If the user exists, it calls the `HibobManager.upload_user_image` method (PUT
    request) to update the user's avatar in the Hibob HR platform.

    4. The action returns a success or failure message based on the outcome of the
    API call.


    ### Additional Notes

    This action requires a valid Hibob API integration configuration. It performs
    a state change on the external Hibob platform by updating user profile data.
