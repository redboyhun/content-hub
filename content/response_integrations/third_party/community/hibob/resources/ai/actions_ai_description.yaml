Get User Image:
  ai_description: >-
    ### General Description

    Fetches the profile image for a specific employee from the Hibob HR platform.
    This action retrieves the user's avatar, converts it to a base64 string, and returns
    both the image URL and the base64 data as part of the action results.


    ### Flow Description

    1. The action extracts the 'Employee's Email' parameter provided by the user.

    2. It calls the Hibob API (`GET /v1/people/{email}`) to retrieve the employee's
    unique identifier.

    3. Using the retrieved identifier, it calls the Hibob API (`GET /v1/avatars/{id}`)
    to fetch the user's image content.

    4. If the image is found, the action converts the binary image content into a
    base64-encoded string.

    5. The action returns the image URL and the base64 string in the result JSON.


    ### Additional Notes

    This action is strictly read-only and does not modify any data in Hibob or the
    SOAR platform. It is intended for gathering contextual information about users.
