Send Invitation:
  ai_description: >-
    ### General Description

    Sends an invitation to a new or existing employee in the Hibob system to initiate
    their onboarding or re-invite them. This action interacts with the Hibob API to
    verify the user's existence, retrieve the appropriate onboarding wizard, and trigger
    the invitation process.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Employee's Email` and `Welcome
    Wizard Name` from the action parameters.

    2. **User Verification**: It calls the Hibob API (`GET /v1/people/{email}`) to
    retrieve the employee's details and current status.

    3. **Wizard Retrieval**: If the user exists and is not already invited, it fetches
    the list of available onboarding wizards (`GET /v1/onboarding/wizards`) to identify
    the correct `welcome_wizard_id` corresponding to the provided wizard name.

    4. **Invitation Execution**: It sends a POST request (`POST /v1/employees/{employee_identifier}/invitations`)
    to Hibob with the employee ID and the selected wizard ID to send the invitation.

    5. **Result Reporting**: The action returns a JSON result indicating whether the
    employee exists and if the invitation was successfully sent.


    ### Additional Notes

    This action requires a valid Hibob API token configured in the integration settings.
    It performs external state changes by triggering invitations within the Hibob
    platform.
