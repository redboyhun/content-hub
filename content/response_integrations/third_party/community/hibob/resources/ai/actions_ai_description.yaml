Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the SOAR platform and the Hibob API to ensure the
    integration is configured correctly and the API token is valid.


    ### Flow Description

    1. The action initializes the `SiemplifyAction` and retrieves the Hibob integration
    configuration, specifically the API token.

    2. An instance of the `HibobManager` is created using the API root and the retrieved
    token.

    3. The action calls the `test_connectivity` method, which performs an HTTP GET
    request to the Hibob `/api/user` endpoint.

    4. The action validates the HTTP response status code (checking for 401 Unauthorized
    or 404 Not Found errors) and ensures the response contains valid JSON data.

    5. Based on the response, the action returns a success or failure message to the
    SOAR platform.


    ### Additional Notes

    This action is intended for administrative verification of the integration setup.
    It does not perform any data enrichment, entity updates, or external system mutations.
