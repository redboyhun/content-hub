Revoke Access:
  ai_description: >-
    ### General Description

    Revokes access for an employee in Hibob by uninviting them from the platform.
    This action is designed to disable user access based on their email address, ensuring
    that the employee can no longer authenticate or access Hibob resources.


    ### Flow Description

    1. The action extracts the 'Employee's Email' parameter provided by the user.

    2. It initializes the HibobManager and performs a GET request to retrieve the
    employee's details from the Hibob API using the provided email.

    3. The action verifies if the employee exists in the system.

    4. If the employee exists and is not already 'uninvited', the action proceeds
    to call the Hibob API's uninvite endpoint via a POST request to revoke their access.

    5. The action returns a success or failure status based on the outcome of the
    API call.


    ### Additional Notes

    This action performs a state-changing operation on the external Hibob platform.
    It does not operate on SOAR entities directly but relies on a provided email parameter.
