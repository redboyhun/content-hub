    General Description

    Tests the connectivity between the SOAR platform and the Hibob service to ensure
    the integration is configured correctly and the service is reachable.


    Flow Description

    1. The action initializes the Hibob manager using the API token retrieved from
    the integration configuration.

    2. It executes the `test_connectivity` method, which performs a GET request to
    the Hibob API endpoint (`/api/user`).

    3. The action validates the HTTP response status code.

    4. If the connection is successful, it returns a success message; otherwise, it
    returns a failure message.


