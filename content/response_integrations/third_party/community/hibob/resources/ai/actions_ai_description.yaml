Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches User entities with employee profile data retrieved from the Hibob platform.
    This action fetches detailed user information, such as department, job title,
    and contact details, and maps them to the entity's additional properties within
    Google SecOps. This provides analysts with immediate context regarding the user
    involved in an alert.


    ### Flow Description

    1. The action initializes the HibobManager using the provided API token from the
    integration configuration.

    2. It iterates through all target entities in the current case.

    3. For each entity, it checks if the entity type is 'USER'.

    4. If it is a user, the action calls the Hibob API (`/v1/people/{employee_identifier}`)
    to retrieve the user's details.

    5. Upon receiving the data, the action flattens the nested dictionary structure
    and applies a 'Hibob' prefix to all keys to ensure clarity.

    6. The action updates the entity's `additional_properties` with the flattened
    user data and sets the `is_enriched` flag to true.

    7. Finally, the action updates the entities in the SecOps platform and adds the
    raw user data to the action's JSON result.


    ### Additional Notes

    This action is strictly read-only regarding the Hibob platform. It does not modify
    any external data; it only updates internal entity attributes within Google SecOps
    to provide better context for investigations.
  ai_short_description: >-
    Enriches User entities with employee profile data retrieved from Hibob.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entity's 'additional_properties' and 'is_enriched' status within
      Google SecOps.
    reasoning: >-
      The action fetches data from the Hibob API (fetches_data=true). It does not
      mutate external data (can_mutate_external_data=false). It updates internal entity
      attributes (can_mutate_internal_data=true, can_update_entities=true). It does
      not create insights, modify alerts, or add case comments.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches user data from an external system (Hibob) and updates internal
      entity attributes (additional_properties) within Google SecOps. It does not
      modify external systems or perform remediation tasks. Therefore, it is classified
      as an Enrichment action.
