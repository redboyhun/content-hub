Upload User Image:
  ai_description: >-
    ### General Description

    Uploads a profile image to an employee's account in the Hibob HR system. This
    action allows administrators to update user avatars by providing the employee's
    email address and the URL of the image to be uploaded.


    ### Flow Description

    1. The action extracts the 'Employee's Email' and 'Url Image' parameters from
    the action configuration.

    2. It initializes the HibobManager and calls the `get_user_details` method (GET
    request) to retrieve the employee's internal ID associated with the provided email.

    3. If the user is found, the action calls the `upload_user_image` method (PUT
    request) using the retrieved employee ID and the provided image URL to update
    the profile image.

    4. The action returns a success or failure message based on the API response.


    ### Additional Notes

    This action requires a valid Hibob API token configured in the integration settings.
    It assumes the user exists in the Hibob system; if the user is not found, the
    action will fail.
