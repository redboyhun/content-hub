Async Action Example:
  ai_description: "### General Description\nThis action orchestrates asynchronous\
    \ workflows within the SOAR platform by monitoring cases for a specific tag. It\
    \ pauses execution until the specified cases are updated with the target tag or\
    \ a timeout occurs, allowing for complex, multi-stage automation flows that depend\
    \ on external or manual case updates.\n\n### Flow Description\n1. **Parameter\
    \ Extraction**: The action extracts the `Case IDs` (or defaults to the current\
    \ case) and the `Case Tag To Wait For` (defaulting to \"Async\").\n2. **Validation**:\
    \ It validates the provided Case IDs.\n3. **Case Tag Check**: The action calls\
    \ the `get_case_overview_details` API to retrieve the current tags for the specified\
    \ cases.\n4. **Status Evaluation**: \n    * If a case has the required tag, it\
    \ is marked as processed.\n    * If a case lacks the tag, it is added to a waiting\
    \ list.\n5. **Iteration**: If not all cases have the tag, the action sets its\
    \ state to `IN_PROGRESS` and waits for the next execution cycle.\n6. **Completion**:\
    \ Once all specified cases have the required tag, the action completes successfully.\n\
    \n### Additional Notes\nThis is an asynchronous action designed to handle long-running\
    \ processes. It does not modify external systems or internal entities; it strictly\
    \ monitors case metadata to control workflow progression."
  ai_short_description: >-
    Orchestrates asynchronous workflows by waiting for specific cases to be tagged.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches case details from the SOAR platform to check for tags. It
      does not mutate external data, nor does it modify internal entities, insights,
      or alert data.
  categories:
    enrichment: false
    reasoning: >-
      The action is a workflow orchestration tool that monitors case tags. It does
      not fetch external threat intelligence (Enrichment) nor does it perform any
      security remediation or infrastructure control (Remediation).
    remediation: false
