Ping:
  ai_description: >-
    Tests connectivity to the API Service. This action verifies that the integration
    can successfully communicate with the configured API endpoint using the provided
    authentication parameters.


    ### Flow Description

    1. The action initializes the API client using the provided configuration parameters
    (API Root, Password, Verify SSL).

    2. It establishes an authenticated session with the API Service.

    3. It calls the `test_connectivity` method on the API client to verify the connection.

    4. It returns a success or error message based on the connectivity result.


    ### Additional Notes

    This action is a standard connectivity test and does not perform any data retrieval
    or modification.
