Enrich Entity Action Example:
  ai_description: >-
    ### General Description

    This action enriches entities by adding custom metadata and a data table to the
    entity within the Google SecOps platform. It allows users to select specific entity
    types (IP, Hash, User, or All) to process, providing contextual information directly
    to the entity.


    ### Flow Description

    1. The action extracts the `Entity Type` parameter to determine which entities
    to process.

    2. It validates the parameter against supported entity types (IP, Hash, User,
    or All).

    3. For each target entity, it generates enrichment data containing a success flag
    and a timestamp.

    4. It constructs a data table with this enrichment information.

    5. The enrichment data and data table are attached to the entity within the SOAR
    platform.


    ### Additional Notes

    This action does not interact with external APIs; it performs internal enrichment
    by updating entity metadata and adding data tables.
