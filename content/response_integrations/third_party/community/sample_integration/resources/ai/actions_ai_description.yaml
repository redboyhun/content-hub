Enrich Entity Action Example:
  ai_description: >-
    General Description

    Enriches entities by adding a timestamp and enrichment status to the entity's
    profile. This action is designed to update entity metadata within the Google SecOps
    platform without interacting with external systems.


    Flow Description

    1. Extracts the "Entity Type" parameter to determine which entities to process.

    2. Validates the parameter against supported types (IP, Hash, User, All).

    3. Iterates through the target entities matching the selected type.

    4. For each entity, generates enrichment data (timestamp and status).

    5. Adds the enrichment data to the entity's profile and creates a data table with
    the results.


    Additional Notes

    This action does not perform external API calls; it performs internal enrichment
    of the entity data within the SOAR platform.
