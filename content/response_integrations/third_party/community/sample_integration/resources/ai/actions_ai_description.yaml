Simple Action Example:
  ai_description: >-
    ### General Description

    Fetches currency exchange rate data from the `api.vatcomply.com` service based
    on user-defined currencies and time frames. This action retrieves historical or
    current exchange rates, processes them into structured data tables and links,
    and attaches the raw JSON results to the current case for further analysis.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts and validates input parameters,
    including currencies (via CSV string or DDL), time frame, and optional start/end
    dates.

    2. **Data Retrieval**: The action performs a GET request to the `api.vatcomply.com`
    API to retrieve exchange rate data for the specified currencies and date range.

    3. **Data Processing**: The retrieved data is processed to generate data tables
    and links for the case wall.

    4. **Case Attachment**: The action saves the raw JSON results to a temporary file
    and attaches this file to the current case.


    ### Additional Notes

    This action does not interact with Google SecOps entities. It is a utility action
    designed for financial data retrieval and case documentation.
  ai_short_description: >-
    Fetches currency exchange rate data from api.vatcomply.com and attaches the results
    to the current case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
