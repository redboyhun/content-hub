    ### General Description

    Tests the connectivity to the API Service to ensure the integration is configured
    correctly. This action validates the connection parameters by attempting to reach
    the API endpoint.


    ### Flow Description

    1. The action initializes the API client using the provided configuration parameters
    (API Root, Password, Verify SSL).

    2. It invokes the `test_connectivity` method on the API client to verify the connection.

    3. The action returns a success or failure message based on the connectivity result.


    ### Additional Notes

    This action is intended for troubleshooting and verifying the integration's connection
    settings.
