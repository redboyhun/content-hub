Async Action Example:
  ai_description: "### General Description\nThis asynchronous action monitors specific\
    \ cases within Google SecOps to wait until they are assigned a designated tag.\
    \ It periodically checks the status of the provided case IDs and continues execution\
    \ only when the required tag is present on all specified cases or until a timeout\
    \ occurs. This is useful for orchestrating workflows that depend on manual or\
    \ automated case categorization.\n\n### Flow Description\n1. **Parameter Extraction**:\
    \ The action extracts the \"Case IDs\" and \"Case Tag To Wait For\" parameters.\
    \ If \"Case IDs\" are not provided, it defaults to the current case ID.\n2. **Case\
    \ Tag Verification**: In each iteration, the action calls `get_case_overview_details`\
    \ to fetch the current tags for the specified cases.\n3. **Status Evaluation**:\
    \ It checks if the specified tag is present in the case's tag list.\n4. **State\
    \ Management**: \n    - If the tag is found, the case is marked as processed.\n\
    \    - If the tag is missing, the case is added to a waiting list.\n5. **Execution\
    \ Control**: \n    - If all cases have the tag, the action completes successfully.\n\
    \    - If cases are still missing the tag, the action sets its execution state\
    \ to `IN_PROGRESS` and saves the current progress (cases with tag and waiting\
    \ cases) to be resumed in the next iteration.\n\n### Additional Notes\nThis is\
    \ an asynchronous action designed to pause workflow execution until a specific\
    \ condition (case tagging) is met. It relies on the SOAR platform's async execution\
    \ capabilities and will exit gracefully if the action timeout is approached."
  ai_short_description: >-
    Monitors cases for a specific tag and pauses workflow execution until the tag
    is applied to all target cases or a timeout is reached.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches case details from the SOAR platform to check for specific
      tags. It does not mutate external or internal data, nor does it update entities
      or create insights.
