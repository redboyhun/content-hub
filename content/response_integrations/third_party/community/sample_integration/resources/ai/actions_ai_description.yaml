Simple Action Example:
  ai_description: >-
    ### General Description

    Fetches currency exchange rates from the `api.vatcomply.com` service based on
    specified currencies and time frames. This action is a utility for retrieving
    financial data and does not interact with Google SecOps entities.


    ### Flow Description

    1. Extracts and validates input parameters (`Currencies String`, `Currencies DDL`,
    `Time Frame`, `Start Time`, `End Time`, `Return JSON Result`).

    2. Validates currency and time parameters to ensure they meet constraints (e.g.,
    date delta <= 7 days).

    3. Calls the `api.vatcomply.com` API (`GET /rates`) to retrieve exchange rates
    for the specified currencies and date range.

    4. Constructs data tables and links for the retrieved rates.

    5. Optionally returns a JSON result if `Return JSON Result` is enabled.

    6. Saves the JSON results as a temporary file and attaches it to the current case.


    ### Additional Notes

    This action does not interact with Google SecOps entities. It is a utility action
    for retrieving financial data.
  ai_short_description: >-
    Fetches currency exchange rates from `api.vatcomply.com` and attaches the results
