Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Microsoft Graph Security API by attempting to authenticate
    and establish a session. This action verifies that the integration configuration
    (Client ID, Secret ID, Tenant ID, and Certificate details) is correct and that
    the SOAR platform can successfully communicate with the Microsoft Graph Security
    service.


    ### Flow Description

    1. The action extracts the required integration configuration parameters: Client
    ID, Secret ID, Tenant ID, Certificate Password, and Certificate Path.

    2. It initializes the `MicrosoftGraphSecurityManager` class using these credentials.

    3. The manager attempts to generate an access token via the Microsoft identity
    platform (using either client secret or certificate-based authentication).

    4. If the authentication request is successful, the action logs the success, sets
    the result value to "true", and returns a "Connection Established" message.

    5. If an exception occurs during the authentication process, the action catches
    the error, logs the failure details, sets the result value to "false", and returns
    an error message.


    ### Additional Notes

    This action does not perform any data retrieval or modification operations on
    the target system; it is strictly used for troubleshooting and verifying integration
    connectivity.
