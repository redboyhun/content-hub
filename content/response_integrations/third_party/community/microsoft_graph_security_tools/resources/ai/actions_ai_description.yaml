Get User MFA:
  ai_description: >-
    ### General Description

    Retrieves Multi-Factor Authentication (MFA) registration statistics for a specified
    user and optionally for any email-based entities present in the current case.
    This action leverages the Microsoft Graph API to provide visibility into a user's
    MFA status, including registration, capability, and enabled status, which is critical
    for assessing account security posture.


    ### Flow Description

    1. The action initializes a connection to the Microsoft Graph Security API using
    the provided integration credentials (Client ID, Secret ID, Tenant ID, and optional
    Certificate details).

    2. It fetches MFA statistics for the user specified in the 'User Email' parameter
    by making a GET request to the `credentialUserRegistrationDetails` endpoint.

    3. The action iterates through all entities currently associated with the case.

    4. For each entity containing an '@' symbol (indicating an email address or user
    principal name), it performs an additional lookup to retrieve MFA statistics.

    5. If the 'Create Insight' parameter is enabled, the action generates a case insight
    for each user checked, detailing their MFA registration status, display name,
    and authentication methods.

    6. Finally, the action returns the aggregated MFA statistics as a JSON result
    and terminates.


    ### Additional Notes

    This action is read-only regarding external systems and does not modify user accounts
    or authentication settings. It is designed for investigative purposes to assist
    analysts in identifying users with weak or missing MFA configurations.
