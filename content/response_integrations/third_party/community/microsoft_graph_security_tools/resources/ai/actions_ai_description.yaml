Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Microsoft Graph Security API by attempting to authenticate
    and retrieve an access token. This action verifies that the integration configuration
    (Client ID, Secret ID, Tenant ID, and Certificate details) is valid and that the
    SOAR platform can successfully communicate with the Microsoft identity platform.


    ### Flow Description

    1. The action extracts the required integration configuration parameters, including
    Client ID, Secret ID, Tenant ID, and certificate details, from the integration
    settings.

    2. It initializes the `MicrosoftGraphSecurityManager` class.

    3. The manager performs a POST request to the Microsoft identity platform (`https://login.microsoftonline.com/{tenant}/oauth2/v2.0/token`)
    to obtain an OAuth2 access token.

    4. If the authentication request is successful, the action logs the success, sets
    the result value to "true", and returns a "Connection Established" message.

    5. If an exception occurs during the authentication process, the action catches
    the error, logs the exception, sets the result value to "false", and returns the
    error message.


    ### Additional Notes

    This action is strictly a connectivity test (Ping) and does not perform any data
    retrieval or system modifications. It is intended for troubleshooting and verifying
    integration health.
