Delete Attachment:
  ai_description: >-
    ### General Description

    Deletes a specific attachment from an email message within a user's mailbox using
    the Microsoft Graph API. This action allows security analysts to remove malicious
    or sensitive files directly from a user's inbox to prevent further interaction
    or propagation.


    ### Flow Description

    1. The action extracts the necessary Microsoft Graph API configuration parameters
    (Client ID, Secret ID, Tenant ID, Certificate details) and the action-specific
    parameters (User ID, Message ID, Attachment ID).

    2. The `MicrosoftGraphSecurityManager` is initialized to establish an authenticated
    session with the Microsoft Graph API.

    3. The action calls the `delete_attachment` method, which performs an HTTP DELETE
    request to the Microsoft Graph API endpoint: `https://graph.microsoft.com/v1.0/users/{user_id}/messages/{message_id}/attachments/{attachment_id}`.

    4. The API response is processed to determine if the deletion was successful (HTTP
    204).

    5. The final status and result message are returned to the SOAR platform.


    ### Additional Notes

    This action requires the Microsoft Graph API application to have the appropriate
    permissions (e.g., `Mail.ReadWrite`) to modify user mailboxes. Ensure the provided
    User ID, Message ID, and Attachment ID are valid and accessible by the configured
    service principal.
  ai_short_description: >-
    Deletes a specific attachment from a user's email message using the Microsoft
    Graph API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
