Get User MFA:
  ai_description: >-
    ### General Description

    Retrieves Multi-Factor Authentication (MFA) registration statistics for a specified
    user or email entities using the Microsoft Graph API. This action provides visibility
    into a user's MFA status, including registration, capability, and authentication
    methods, which is critical for assessing account security posture.


    ### Flow Description

    1. **Initialization**: The action initializes the `MicrosoftGraphSecurityManager`
    using the provided integration configuration (Client ID, Secret ID, Tenant ID,
    and optional Certificate details).

    2. **Parameter Processing**: It fetches MFA statistics for the user specified
    in the `User Email` parameter by calling the Microsoft Graph API endpoint `https://graph.microsoft.com/beta/reports/credentialUserRegistrationDetails`.

    3. **Optional Insight Creation**: If the `Create Insight` parameter is set to
    true, it generates a case insight containing the MFA details for the primary user.

    4. **Entity Processing**: The action iterates through all `target_entities` in
    the case. It filters for entities containing an '@' symbol in their identifier
    (treating them as user/email entities).

    5. **Enrichment**: For each matching entity, it fetches the corresponding MFA
    statistics from Microsoft Graph.

    6. **Insight Generation**: If `Create Insight` is enabled, it creates a case insight
    for each processed entity.

    7. **Result Output**: The aggregated MFA statistics for all processed users are
    returned as a JSON result.


    ### Additional Notes

    This action requires valid Microsoft Graph API credentials. It performs read-only
    operations on the external Microsoft Graph system but creates internal case insights
    within the SOAR platform.
  ai_short_description: >-
    Retrieves MFA registration statistics for specified users or email entities via
    the Microsoft Graph API and optionally creates case insights.
