Delete Attachment:
  ai_description: >-
    ### General Description

    Deletes a specific attachment from an email message within a user's mailbox using
    the Microsoft Graph API. This action is designed to remove potentially malicious
    or unwanted files from email messages to mitigate security risks.


    ### Flow Description

    1. The action extracts configuration parameters (Client ID, Secret ID, Tenant
    ID, Certificate details) and action parameters (User ID, Message ID, Attachment
    ID).

    2. It initializes the `MicrosoftGraphSecurityManager` to authenticate with the
    Microsoft Graph API.

    3. The action calls the `delete_attachment` method, which performs a `DELETE`
    request to the Microsoft Graph API endpoint: `https://graph.microsoft.com/v1.0/users/{user_id}/messages/{message_id}/attachments/{attachment_id}`.

    4. The action processes the API response. An HTTP 204 status code indicates that
    the deletion request was completed successfully.

    5. The result of the operation is added to the action output using `siemplify.result.add_result_json`,
    and the action terminates with the appropriate status.


    ### Additional Notes

    This action requires valid Microsoft Graph API credentials with the necessary
    permissions to access and modify user mailboxes. Ensure the application has the
    appropriate scopes configured in Azure AD.
  ai_short_description: >-
    Deletes a specific attachment from a user's email message via the Microsoft Graph
    API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes an attachment from an email message in the user's mailbox via Microsoft
      Graph API.
    fetches_data: false
