List Messages:
  ai_description: >-
    ### General Description

    Lists email messages from a specific user's mailbox using the Microsoft Graph
    API. This action allows analysts to retrieve and inspect email metadata based
    on custom filters and query parameters, facilitating investigation into suspicious
    email activity.


    ### Flow Description

    1. The action extracts configuration parameters (Client ID, Secret ID, Tenant
    ID, Certificate details) and action parameters (User ID, Select Filter, Query
    Parameters).

    2. It initializes the `MicrosoftGraphSecurityManager` to authenticate with Microsoft
    Graph using the provided credentials.

    3. The action calls the `list_messages` method, which constructs and executes
    a GET request to the Microsoft Graph API endpoint: `https://graph.microsoft.com/v1.0/users/{user_email}/messages`.

    4. The API returns the list of messages matching the provided filters and selection
    criteria.

    5. The retrieved message data is added to the action's result JSON, and the execution
    is completed.


    ### Additional Notes

    This action is a read-only operation and does not modify any data in the Microsoft
    Graph environment or the SOAR platform.
