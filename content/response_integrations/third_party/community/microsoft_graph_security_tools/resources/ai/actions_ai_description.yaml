Delete Message:
  ai_description: >-
    ### General Description

    Deletes a specific email message from one or more user mailboxes using the Microsoft
    Graph API. This action is typically used for incident response to remove malicious
    or unauthorized emails from user inboxes.


    ### Flow Description

    1. The action extracts the `User ID` (or a CSV list of User IDs) and the `Message
    ID` from the action parameters.

    2. The `MicrosoftGraphSecurityManager` is initialized using the integration's
    credentials (Client ID, Secret ID, Tenant ID, and certificate details).

    3. The action calls the `delete_message` method, which iterates through the provided
    User IDs.

    4. For each user, the manager performs a `DELETE` request to the Microsoft Graph
    API endpoint: `https://graph.microsoft.com/v1.0/users/{user_id}/messages/{message_id}`.

    5. The action captures the response status and returns a success or failure message
    to the SOAR platform.


    ### Additional Notes

    The `User ID` parameter supports CSV input, allowing the action to delete the
    specified message from multiple mailboxes in a single execution.
