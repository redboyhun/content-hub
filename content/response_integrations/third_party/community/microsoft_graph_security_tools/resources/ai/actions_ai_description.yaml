List Messages:
  ai_description: >-
    ### General Description

    Lists email messages from a specified user's mailbox using the Microsoft Graph
    API. This action allows analysts to retrieve email metadata and content for investigation
    purposes, supporting optional OData filtering to refine the results.


    ### Flow Description

    1. The action extracts configuration parameters (Client ID, Secret ID, Tenant
    ID, Certificate Path, and Certificate Password) to authenticate with Microsoft
    Graph.

    2. It extracts the action parameters: `User ID` (mandatory), `Select Filter` (optional),
    and `Query Parameters` (optional).

    3. The `MicrosoftGraphSecurityManager` is initialized to establish a session with
    Microsoft Graph.

    4. The action calls the `list_messages` method, which constructs a GET request
    to the Microsoft Graph API endpoint (`https://graph.microsoft.com/v1.0/users/{user_id}/messages`)
    using the provided filters and query parameters.

    5. The retrieved message data is returned as a JSON result using `siemplify.result.add_result_json`.


    ### Additional Notes

    The `User ID` parameter must be a valid email address or userPrincipalName. The
    `Query Parameters` and `Select Filter` parameters allow for advanced OData filtering
    as supported by the Microsoft Graph API.
