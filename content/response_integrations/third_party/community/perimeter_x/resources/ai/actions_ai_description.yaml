Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Slack API to ensure the integration is correctly configured
    and authenticated. This action verifies that the provided Slack API credentials
    are valid and that the system can communicate with the Slack service.


    ### Flow Description

    1. The action extracts the 'Slack API Key' and 'Slack Channel' from the integration
    configuration.

    2. It initializes the `PerimeterXManager` with the provided credentials.

    3. The action calls the `auth()` method, which performs a POST request to the
    Slack `https://slack.com/api/auth.test` endpoint.

    4. If the API returns a successful response, the action completes with a success
    status. If the authentication fails, the action returns a failure status with
    the corresponding error message.


    ### Additional Notes

    This action is strictly a connectivity test and does not perform any data enrichment,
    remediation, or modification of entities or cases.
  ai_short_description: Tests connectivity to the Slack API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity test (auth.test) which is a read-only operation.
      It does not fetch contextual data, mutate external systems, or modify internal
      SOAR data.
  categories:
    enrichment: false
    reasoning: >-
      The action is a 'Ping' action designed solely to test connectivity. Per the
