Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Slack API to ensure the integration is correctly configured.
    This action verifies that the provided Slack API key and channel are valid and
    accessible.


    ### Flow Description

    1. Extracts the `Slack API Key` and `Slack Channel` from the integration configuration.

    2. Initializes the `PerimeterXManager` with the provided credentials.

    3. Calls the `auth()` method, which performs a `POST` request to the Slack `auth.test`
    API endpoint.

    4. Validates the response from Slack to confirm if the authentication is successful.

    5. Returns a success or failure status message to the SOAR platform.


    ### Additional Notes

    This action is strictly for connectivity testing and does not perform any data
    retrieval or modification.
  ai_short_description: >-
    Tests connectivity to the Slack API using the configured credentials.
  capabilities:
