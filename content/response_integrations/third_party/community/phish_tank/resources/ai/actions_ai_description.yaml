Check Url:
  ai_description: >-
    ### General Description

    Checks if a specific URL is marked as suspicious by the PhishTank Community. This
    action retrieves threat intelligence regarding the URL's verification status and
    validity from the PhishTank database. It provides visibility into whether a URL
    is known to be malicious, helping analysts prioritize their investigation.


    ### Flow Description

    1. The action iterates through all provided URL entities in the current scope.

    2. For each URL, it sends a POST request to the configured PhishTank service URL
    with the URL and format parameters.

    3. The action parses the XML response from PhishTank to extract details such as
    the phish detail page, verification status, and validity.

    4. If the URL is found in the database, an entity insight is added to the entity
    with the retrieved properties.

    5. If the URL is verified as malicious, the action updates the entity's suspicious
    status to true.

    6. Finally, the action adds the raw result data to the action results and updates
    the entities in the SOAR platform.


    ### Additional Notes

    This action performs enrichment by fetching data from an external service. It
    does not modify any external systems. It only updates internal entity attributes
    and adds insights within the SOAR platform.
  ai_short_description: >-
    Checks if a URL is marked as suspicious by the PhishTank Community and updates
    the entity status if verified.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity suspicious status and adds entity insights.
    reasoning: >-
      The action fetches data from an external API (PhishTank) to enrich URL entities.
      It does not mutate external data. It performs internal mutations by updating
      entity attributes and adding insights.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches threat intelligence data from an external service (PhishTank)
      and updates internal entities (insights and suspicious status). It does not
      modify external systems, making it a classic enrichment action.
    remediation: false
