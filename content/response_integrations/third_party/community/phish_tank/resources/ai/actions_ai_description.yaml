Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the PhishTank service by sending a test request to the configured
    service URL.


    ### Flow Description

    1. The action retrieves the `Service Url` from the integration configuration.

    2. It executes a POST request to the provided URL with a test payload (`url=google.com`,
    `format=json`).

    3. It validates the response using `raise_for_status()` to ensure the service
    is reachable.

    4. It completes the action by returning a success message indicating the connection
    status.


    ### Additional Notes

    This action is intended for connectivity verification and does not perform any
    data processing or remediation.
