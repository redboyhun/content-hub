Ping:
  ai_description: >-
    General Description

    Tests the connectivity between the SOAR platform and the PhishTank service. This
    action verifies that the integration is correctly configured and that the service
    is reachable.


    Flow Description

    1. Extracts the "Service Url" configuration parameter from the integration settings.

    2. Sends a POST request to the configured service URL with a test payload (`url=google.com`).

    3. Validates the response using `raise_for_status` to ensure the service is reachable.

    4. Terminates the action with a success message if the connection is established.


    Additional Notes

    This action is intended for health checks and connectivity verification only.
  ai_short_description: >-
    Tests connectivity to the PhishTank service.
