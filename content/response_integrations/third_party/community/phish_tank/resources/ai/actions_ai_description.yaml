Check Url:
  ai_description: >-
    ### General Description

    Checks if a specific URL is marked as suspicious by the PhishTank Community. This
    action queries the PhishTank API to retrieve reputation data and verification
    status for URL entities, providing actionable intelligence to the analyst.


    ### Flow Description

    1. Extracts the `Service Url` configuration parameter from the PhishTank integration
    settings.

    2. Iterates through all `URL` type entities in the current scope.

    3. For each URL, sends a POST request to the PhishTank service with the URL and
    format parameters.

    4. Parses the XML response to determine if the URL exists in the database and
    if it is verified.

    5. If the URL is found, adds an insight to the entity with details including the
    link, verification status, and validity.

    6. If the URL is verified as suspicious, marks the entity as suspicious and updates
    it in the SOAR platform.

    7. Aggregates the results and adds a JSON result to the action output.


    ### Additional Notes

    This action specifically targets URL entities. It requires a valid `Service Url`
    to be configured in the integration settings to successfully communicate with
    the PhishTank API.
  ai_short_description: >-
    Checks if a URL is marked as suspicious by the PhishTank Community and updates
    the entity status if verified.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entity's 'is_suspicious' status within the SOAR platform based on
      the PhishTank verification results.
    reasoning: >-
      The action fetches data from the PhishTank API (fetches_data=true). It updates
      the entity's 'is_suspicious' status and adds insights within the SOAR platform
      (can_mutate_internal_data=true, can_update_entities=true, can_create_insight=true).
      It does not mutate external data.
