Superna Zero Trust User Un Lock:
  ai_description: >-
    ### General Description

    Unlocks a user account that was previously locked out from Superna protected NAS
    storage using the Superna Zero Trust API. This action restores access for the
    specified user by interacting with the Eyeglass appliance.


    ### Flow Description

    1. Extracts configuration parameters (`api_token`, `eyeglass_ip`, `Verify SSL`)
    and the `UserName` action parameter.

    2. URL-encodes the provided `UserName` to ensure safe transmission.

    3. Constructs the API endpoint URL using the `eyeglass_ip` and the encoded username.

    4. Executes a POST request to the Superna Zero Trust API (`/sera/v2/ransomware/unlock/`)
    with the required authentication headers.

    5. Processes the response, handling potential timeouts, connection errors, or
    HTTP errors, and terminates the action with the appropriate status and result
    message.


    ### Additional Notes

    This action interacts with the Superna Eyeglass Zero Trust API to restore access
    for a user. It requires valid API credentials and connectivity to the Eyeglass
    appliance.
