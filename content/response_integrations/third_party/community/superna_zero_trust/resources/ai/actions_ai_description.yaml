Superna Zero Trust User Lockout:
  ai_description: >-
    ### General Description

    This action locks out a suspected user from all Superna-protected NAS storage
    by applying a deny read permission to SMB shares.


    ### Flow Description

    1. Extract configuration parameters (`api_token`, `eyeglass_ip`, `Verify SSL`)
    and the `UserName` action parameter.

    2. URL-encode the `UserName` to ensure it is correctly formatted for the API request.

    3. Construct the API endpoint URL for the lockout request using the `eyeglass_ip`
    and the `/sera/v2/ransomware/lockout/{user}` route.

    4. Execute a `POST` request to the Superna Eyeglass API with the provided credentials
    and headers.

    5. Handle the response, logging success or failure, and terminate the action with
    the appropriate status.


    ### Additional Notes

    This action performs a state change on the external Superna Eyeglass system to
    restrict user access. It does not interact with internal SecOps entities or alerts.
  ai_short_description: >-
    Locks out a user from Superna-protected NAS storage by applying deny read permissions
    to SMB shares.
