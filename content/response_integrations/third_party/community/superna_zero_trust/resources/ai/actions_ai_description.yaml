Superna Zero Trust User Lockout:
  ai_description: >-
    General Description: This action locks out a specified user from Superna protected
    NAS storage by interacting with the Superna Eyeglass API. It applies a deny read
    permission to SMB shares for the user.


    Flow Description:

    1. Extracts configuration parameters: `api_token`, `eyeglass_ip`, and `Verify
    SSL`.

    2. Extracts the `UserName` parameter from the action input.

    3. URL-encodes the `UserName`.

    4. Constructs the API request URL using the provided `eyeglass_ip` and the lockout
    endpoint path.

    5. Sends a POST request to the Superna Eyeglass API with the required headers
    (including the `api_key`).

    6. Handles the response, logging success or specific error states (Timeout, ConnectionError,
    HTTPError, RequestException).

    7. Ends the action with the appropriate status and result message.


    Additional Notes: This action performs a state-changing operation on the external
    Superna Eyeglass system. Ensure the provided `api_token` has sufficient permissions
    to perform user lockouts.
