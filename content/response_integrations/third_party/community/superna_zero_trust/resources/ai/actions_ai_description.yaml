Superna Snapshot Critical NAS Data:
  ai_description: >-
    ### General Description

    This action triggers a snapshot of critical NAS data within the Superna Eyeglass
    Zero Trust environment. It communicates with the Superna Eyeglass API to initiate
    the snapshot process for critical paths.


    ### Flow Description

    1. Extracts configuration parameters (`api_token`, `eyeglass_ip`, `Verify SSL`)
    from the integration settings.

    2. Constructs the API endpoint URL using the provided Eyeglass IP and the predefined
    API route (`/sera/v2/ransomware/criticalpaths`).

    3. Prepares the request headers, including the `api_key`.

    4. Executes a `POST` request to the Superna Eyeglass API.

    5. Handles the response, logging the outcome and setting the execution state (Completed,
    Failed, or Timed Out).

    6. Returns the API response text as the result value.


    ### Additional Notes

    This action does not operate on specific entities within the SOAR platform; it
    performs a global operation on the configured Superna Eyeglass instance.
