Superna Zero Trust User Un Lock:
  ai_description: >-
    ### General Description

    Unlocks a user account that was previously locked out from Superna protected NAS
    storage using the Superna Zero Trust API. This action restores access to the protected
    storage by communicating with the Eyeglass Zero Trust system.


    ### Flow Description

    1. Extract configuration parameters (`api_token`, `eyeglass_ip`, `Verify SSL`)
    and the `UserName` action parameter.

    2. URL-encode the `UserName` to ensure it is correctly formatted for the API request.

    3. Construct the API endpoint URL (`https://{eyeglass_ip}/sera/v2/ransomware/unlock/{user}`).

    4. Execute a POST request to the Superna Zero Trust API with the provided credentials
    and headers.

    5. Handle potential errors, including timeouts, connection issues, and HTTP errors,
    and log the outcome.

    6. Return the execution status and result message to the SOAR platform.


    ### Additional Notes

    This action performs a state change on the external Superna system to restore
    user access. It does not interact with entities from the SOAR platform directly,
    relying instead on the provided `UserName` parameter.
