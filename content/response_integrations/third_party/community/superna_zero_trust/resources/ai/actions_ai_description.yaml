Ping:
  ai_description: >-
    ### General Description

    Performs a connectivity test (ping) to the Superna Zero Trust appliance to verify
    API accessibility. This action ensures that the integration can successfully communicate
    with the target appliance by executing a health check request.


    ### Flow Description

    1. Extracts configuration parameters: `api_token`, `eyeglass_ip`, and `Verify
    SSL`.

    2. Constructs the API URL using the provided IP address and the health check route
    (`/sera/v1/healthcheck`).

    3. Executes a GET request to the constructed URL with the provided API token in
    the headers.

    4. Logs the response and terminates the action with a success or failure status
    based on the HTTP response.


    ### Additional Notes

    This action is used for connectivity verification and does not perform any data
    enrichment or remediation.
  ai_short_description: >-
    Performs a connectivity test to the Superna Zero Trust appliance.
  capabilities:
