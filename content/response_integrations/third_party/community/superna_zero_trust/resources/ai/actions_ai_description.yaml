    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to verify connectivity to the Superna Zero
      Trust appliance. It does not mutate external or internal data, nor does it update
      entities or create insights.
  categories:
    enrichment: false
    reasoning: >-
      The action is a connectivity test (Ping). Per the guidelines, actions named
      'Ping' are not enrichment actions. It does not perform any remediation tasks.
    remediation: false
