Superna Snapshot Critical NAS Data:
  ai_description: >-
    ### General Description

    This action triggers a snapshot of critical NAS data via the Superna Eyeglass
    Zero Trust API. It sends a POST request to the configured Eyeglass instance to
    initiate the critical path snapshot process.


    ### Flow Description

    1. Extracts configuration parameters: `api_token`, `eyeglass_ip`, and `Verify
    SSL` from the integration settings.

    2. Constructs the API endpoint URL using the provided IP address and the `/sera/v2/ransomware/criticalpaths`
    route.

    3. Prepares the request headers, including the `api_key`.

    4. Executes a `POST` request to the Superna Eyeglass API.

    5. Handles potential errors (timeout, connection, HTTP errors) and logs the outcome.

    6. Returns the API response or error message to the SOAR platform using `siemplify.end`.


    ### Additional Notes

    This action is a direct API interaction and does not perform any entity-based
    operations or internal SOAR data mutations.
