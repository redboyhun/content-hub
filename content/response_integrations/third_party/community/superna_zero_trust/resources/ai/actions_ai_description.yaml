Ping:
  ai_description: >-
    General Description

    Performs a health check against the Superna Zero Trust API to verify connectivity
    and service availability.


    Flow Description

    1. Extracts configuration parameters: `api_token`, `eyeglass_ip`, and `Verify
    SSL` from the integration settings.

    2. Constructs the API endpoint URL using the provided IP address and the health
    check route (`/sera/v1/healthcheck`).

    3. Sends an HTTP GET request to the constructed URL with the required API key
    in the headers.

    4. Handles the response, logging success or specific error states (Timeout, Connection
    Error, HTTP Error, Request Exception).

    5. Terminates the action with the appropriate execution status and the API response
    text.


    Additional Notes

    This action is a connectivity test and does not perform any data enrichment or
    state mutation on entities or external systems.
