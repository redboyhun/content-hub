Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Docker Hub API to ensure the integration is configured
    correctly. This action validates the provided credentials by attempting to retrieve
    the catalog from the Docker Hub service.


    ### Flow Description

    1. Retrieves the Docker Hub integration configuration, specifically the Username
    and Password.

    2. Initializes the Docker Hub client using the retrieved credentials.

    3. Executes a connectivity test by performing a GET request to the Docker Hub
    API catalog endpoint.

    4. Handles potential HTTP errors, specifically ignoring 404 errors if encountered
    during the test.

    5. Returns a success status if the connectivity test completes without raising
    an unhandled exception.


    ### Additional Notes

    This action is intended for verifying integration settings and connectivity. It
    does not perform any data modification or entity enrichment.
