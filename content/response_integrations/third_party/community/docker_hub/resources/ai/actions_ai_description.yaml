Invite User:
  ai_description: >-
    ### General Description

    Invites a user to a specific team within a Docker Hub organization. This action
    automates the administrative task of adding new members to team groups, facilitating
    access management directly from the SOAR platform.


    ### Flow Description

    1. The action retrieves the necessary Docker Hub credentials (Username and Password)
    from the integration configuration.

    2. It extracts the required parameters: `Organization`, `Team`, and `Email` from
    the action input.

    3. The action initializes the `DockerHub` client using the provided credentials.

    4. It executes the `send_invite` method, which performs a POST request to the
    Docker Hub API endpoint `orgs/{org}/groups/{team}/members` with the target email
    address.

    5. The action returns the execution status and a success or failure message to
    the SOAR platform.


    ### Additional Notes

    This action requires valid Docker Hub credentials with sufficient administrative
    permissions to invite users to the specified organization and team. The action
    does not perform any entity-based operations.
  ai_short_description: >-
    Invites a user to a specific team within a Docker Hub organization.
  capabilities:
