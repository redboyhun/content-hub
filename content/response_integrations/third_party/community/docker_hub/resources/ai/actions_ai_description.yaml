Invite User:
  ai_description: >-
    General Description

    Invites a user to a specific team within a Docker Hub organization. This action
    facilitates administrative access management by programmatically sending invitations
    to specified email addresses for designated teams.


    Flow Description

    1. The action initializes the `DockerHub` client using the credentials (username
    and password) retrieved from the integration configuration.

    2. It extracts the `Organization`, `Team`, and `Email` parameters provided by
    the user.

    3. The action calls the `send_invite` method, which executes a POST request to
    the Docker Hub API endpoint `/orgs/{organization}/groups/{team}/members`.

    4. Upon successful execution, the action returns a confirmation message indicating
    the user has been invited.


    Additional Notes

    This action requires valid Docker Hub credentials with sufficient permissions
    to manage organization members and teams. The action does not perform any data
    retrieval or entity enrichment.
  ai_short_description: >-
    Invites a user to a specific team within a Docker Hub organization.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Invites a user to a team in Docker Hub, modifying the organization's membership
      configuration.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the Docker Hub API to invite a user, which
      mutates external data. It does not fetch data, nor does it modify internal SOAR
      data or entities.
  categories:
    enrichment: false
    reasoning: >-
      The action performs an administrative task (inviting a user to a team) and does
      not fetch data for enrichment or perform threat remediation (neutralizing threats).
      Therefore, it is neither an enrichment nor a remediation action.
    remediation: false
