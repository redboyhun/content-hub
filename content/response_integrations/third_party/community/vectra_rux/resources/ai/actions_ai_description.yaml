Add Tags:
  ai_description: >-
    ### General Description

    Adds specified tags to entities (Account, Host, or Detection) in the VectraRUX
    platform. This action allows analysts to categorize and label entities by appending
    new tags to their existing tag set.


    ### Flow Description

    1. Extracts configuration (API Root, Client ID, Client Secret) and action parameters
    (Tags, Entity IDs, Entity Type).

    2. Parses the input `Tags` and `Entity IDs` into lists, removing any duplicates.

    3. Initializes the `VectraRUXManager` to handle API communication.

    4. Iterates through each provided `Entity ID`:
        a. Calls the VectraRUX API (GET) to retrieve existing tags for the entity.
        b. Merges the existing tags with the new tags, ensuring no duplicates are
    added.
        c. Calls the VectraRUX API (PATCH) to update the entity with the new tag list.
    5. Logs the status of each update and returns a result table and JSON summary
    of the operation.


    ### Additional Notes

    The action requires valid API credentials for VectraRUX. It supports adding tags
    to Accounts, Hosts, or Detections. If an entity is not found, the action logs
    an error and continues processing the remaining entities.
  ai_short_description: >-
    Adds specified tags to entities (Account, Host, or Detection) in the VectraRUX
    platform.
