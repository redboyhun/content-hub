Add Note:
  ai_description: >-
    ### General Description

    Adds a note to a specific entity (Account, Host, or Detection) within the Vectra
    RUX platform. This action allows analysts to document findings or observations
    directly on the relevant entity in the external system.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Client ID, Client Secret) and
    action parameters (Note, Entity ID, Entity Type).

    2. Initializes the `VectraRUXManager` with the provided credentials.

    3. Validates the `Entity ID` as an integer.

    4. Calls the `add_note` method of the `VectraRUXManager`, which performs a `POST`
    request to the Vectra RUX API (`/entities/{entity_id}/notes`) to create the note.

    5. Adds the response data to the action's result table and JSON output.


    ### Additional Notes

    This action interacts directly with the Vectra RUX API and requires valid API
    credentials. It does not modify any data within the Google SecOps platform itself.
  ai_short_description: >-
    Adds a note to a specified entity (Account, Host, or Detection) in the Vectra
    RUX platform.
