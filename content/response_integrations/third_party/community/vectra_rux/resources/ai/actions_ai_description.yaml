Mark Detection Fixed:
  ai_description: >-
    ### General Description

    Marks specific detections as fixed in the Vectra RUX platform. This action allows
    analysts to update the status of one or more detections, effectively resolving
    them within the external Vectra RUX system.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the required configuration parameters
    (API Root, Client ID, Client Secret) and the action parameter (Detection IDs)
    from the integration settings.

