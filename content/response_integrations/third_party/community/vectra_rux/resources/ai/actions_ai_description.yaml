Update Assignment:
  ai_description: >-
    ### General Description

    Updates the assigned user for a specific entity (Account or Host) within the VectraRUX
    platform. This action allows analysts to reassign an entity to a different user
    ID, facilitating the management of investigations and assignments directly from
    the SOAR platform.


    ### Flow Description

    1. The action extracts the required configuration parameters (API Root, Client
    ID, Client Secret) and action parameters (Entity ID, Entity Type, User ID).

    2. It validates that the provided Entity ID and User ID are valid integers.

    3. The action initializes the `VectraRUXManager` to interact with the VectraRUX
    API.

    4. It calls the `get_specific_entity_info` API method to retrieve the current
    details of the specified entity.

    5. It extracts the `assignment_id` from the retrieved entity information.

    6. The action calls the `update_assignment` API method to update the assignment
    with the new User ID.

    7. Finally, it adds the response data to the action result and a data table summarizing
    the updated assignment.


    ### Additional Notes

    This action requires valid API credentials for the VectraRUX integration. It performs
    a mutation on the external VectraRUX platform by updating assignment records.
