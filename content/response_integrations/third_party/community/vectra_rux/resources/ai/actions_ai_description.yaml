Update Assignment:
  ai_description: >-
    ### General Description

    Updates the assigned user for an assignment associated with a specific entity
    (Account or Host) in the VectraRUX platform. This action allows analysts to reassign
    tasks or investigations to different users directly from the SOAR platform.


    ### Flow Description

    1. Extracts configuration parameters (`API Root`, `Client ID`, `Client Secret`)
    and action parameters (`Entity ID`, `Entity Type`, `User ID`).

    2. Validates `Entity ID` and `User ID` as integers.

    3. Initializes the `VectraRUXManager` to communicate with the VectraRUX API.

    4. Calls `vectra_manager.get_specific_entity_info` to retrieve the current assignment
    details for the specified entity.

    5. Extracts the `assignment_id` from the retrieved entity information.

    6. Calls `vectra_manager.update_assignment` (PUT request) to update the assignment
    with the provided `User ID`.

    7. Adds the JSON response to the action results and a CSV data table to the action
    output.


    ### Additional Notes

    This action requires valid API credentials for VectraRUX. It validates that the
    entity has an existing assignment before attempting an update.
