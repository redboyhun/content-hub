    external_data_mutation_explanation: >-
      Creates a note on the specified entity in the Vectra RUX platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the Vectra RUX API to add a note to an
