Assign Group:
  ai_description: >-
    ### General Description

    Assigns a list of members to a specific group within the Vectra RUX platform.
    This action enables administrators to manage group memberships by appending new
    members to an existing group.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Client ID, Client Secret) and
    action parameters (Group ID, Members).

    2. Validates the `Group ID` as an integer.

    3. Initializes the `VectraRUXManager` with the provided credentials.

    4. Calls the `update_group_members` API method (PATCH request) to append the specified
    members to the group.

    5. Compares the requested members with the updated group members to identify which
    were successfully assigned and which were not.

    6. Generates an HTML view of the group details and adds the raw JSON response
    to the action results.


