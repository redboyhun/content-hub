    credentials to establish a connection to the Vectra RUX API.

    3. **Validation**: The provided `Detection IDs` string is parsed and validated
    to ensure all IDs are valid integers.

    4. **API Interaction**: The action executes a `PATCH` request to the Vectra RUX
    API endpoint (`/api/v3.4/detections`) to update the status of the specified detections
    to 'fixed'.

