Assign Group:
  ai_description: >-
    General Description

    Adds members to a specified group within the Vectra RUX platform. This action
    allows administrators to manage group membership by appending new members to an
    existing group, facilitating automated access control and group management workflows.


    Flow Description

    1. The action extracts configuration parameters (API Root, Client ID, Client Secret)
    and action parameters (Group ID, Members) from the environment.

    2. It validates the provided Group ID to ensure it is a valid integer.

    3. The action initializes the `VectraRUXManager` to establish a connection with
    the Vectra RUX API.

    4. It executes a PATCH request via `vectra_manager.update_group_members` to append
    the specified members to the target group.

    5. The action processes the API response to distinguish between successfully assigned
    members and those that were not assigned.

    6. It generates an HTML view of the updated group details and attaches the raw
    JSON response to the action results.


    Additional Notes

    This action modifies external system state by updating group membership. Ensure
