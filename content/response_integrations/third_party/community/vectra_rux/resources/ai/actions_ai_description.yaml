Add Tags:
  ai_description: >-
    ### General Description

    Adds tags to specified entities (Account, Host, or Detection) within the Vectra
    RUX platform. This action allows analysts to enrich entity metadata by appending
    custom tags, facilitating better organization and tracking of entities within
    the Vectra environment.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, Client ID, Client Secret)
    and action parameters (Tags, Entity IDs, Entity Type).

    2. It parses the provided comma-separated list of tags and entity IDs.

    3. For each entity ID provided, the action performs the following steps:
        - Fetches the existing tags for the entity using the Vectra RUX API (GET request).
        - Merges the existing tags with the new tags provided in the action parameters.
        - Updates the entity's tags in the Vectra RUX platform using the Vectra RUX
    API (PATCH request).
    4. The action logs the status of each update operation.

    5. Finally, it outputs a result JSON and a data table summarizing the success
    or failure of the tag update for each entity.


    ### Additional Notes

    - This action requires valid Vectra RUX API credentials.

    - The action supports updating tags for 'Account', 'Host', and 'Detection' entity
    types.

    - If an entity is not found, the action logs an error and continues processing
    the remaining entities.
  ai_short_description: >-
    Adds tags to specified entities (Account, Host, or Detection) in Vectra RUX.
