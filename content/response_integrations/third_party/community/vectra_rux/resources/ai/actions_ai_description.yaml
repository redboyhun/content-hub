List Entity Detections:
  ai_description: >-
    ### General Description

    Lists detections for a specified entity (Account or Host) from the Vectra RUX
    platform. This action retrieves detailed detection information associated with
    a given entity ID, allowing analysts to review the security posture and active
    threats related to specific hosts or user accounts.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the necessary API credentials
    (API Root, Client ID, Client Secret) from the integration configuration.

    2. **Parameter Extraction**: The action extracts the required parameters: `Entity
    ID`, `Entity Type` (Account or Host), `Limit`, and `State` (Active, Inactive,
    Fixed).

    3. **Validation**: The action validates the provided `Entity ID` and `Limit` parameters
    to ensure they are valid integers.

    4. **Entity Retrieval**: The action calls the `describe_entity` API endpoint to
    retrieve the entity's details, specifically the list of associated detection IDs.

    5. **Detection Retrieval**: If detections are found, the action calls the `list_entity_detections`
    API endpoint to fetch the full details for those detections, filtered by the specified
    state and limit.

    6. **Output**: The action outputs the retrieved detection data as a JSON result
    and populates a data table in the SOAR platform for analyst review.


