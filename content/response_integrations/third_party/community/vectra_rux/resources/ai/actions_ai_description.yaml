Resolve Assignment:
  ai_description: >-
    ### General Description

    Resolves an assignment in the Vectra RUX platform by updating its status with
    a specified outcome. This action allows analysts to close out investigations or
    assignments by providing an outcome ID, optional notes, triage status, and associated
    detection IDs.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Client ID, Client Secret) and
    action parameters (Assignment ID, Outcome ID, Note Title, Triage As, Detection
    IDs).

    2. Validates the provided Assignment ID, Outcome ID, and Triage As parameters
    to ensure they meet format requirements.

    3. Initializes the `VectraRUXManager` with the provided credentials to establish
    a connection to the Vectra RUX API.

    4. Executes a `PUT` request to the Vectra RUX API endpoint (`/assignments/{assignment_id}/resolve`)
    to update the assignment status with the provided details.

    5. Adds the API response JSON and a data table containing the resolved assignment
    details to the action results for analyst review.


    ### Additional Notes

    This action requires valid API credentials for the Vectra RUX integration. It
    performs a state-changing operation on the external Vectra RUX platform.
