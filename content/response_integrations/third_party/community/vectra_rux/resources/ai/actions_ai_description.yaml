Add Note:
  ai_description: >-
    ### General Description

    Adds a note to a specified entity (Account, Host, or Detection) in the Vectra
    RUX platform. This action allows analysts to append contextual information directly
    to an entity within the external Vectra RUX system.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Client ID, Client Secret) to authenticate
    with the Vectra RUX API.

    2. Extracts action parameters: `Note` (the content to add), `Entity ID` (the target
    entity's identifier), and `Entity Type` (the category of the entity).

    3. Initializes the `VectraRUXManager` to handle API communication.

    4. Validates the `Entity ID` to ensure it is a valid integer.

    5. Executes the `add_note` method, which performs a POST request to the Vectra
    RUX API endpoint `api/v3.4/entities/{entity_id}/notes`.

    6. Adds the API response to the action result as a data table and JSON object
    for analyst review.


    ### Additional Notes

    This action requires valid API credentials for the Vectra RUX integration. The
    `Entity Type` parameter must be one of the supported types: Account, Host, or
    Detection.
  ai_short_description: >-
    Adds a note to a specified entity (Account, Host, or Detection) in the Vectra
    RUX platform.
