Assign Entity:
  ai_description: >-
    ### General Description

    Assigns a specific entity (Host or Account) to a user within the VectraRUX platform.
    This action facilitates the management of assignments by linking an entity to
    a designated user ID, enabling tracking and ownership of entities within the VectraRUX
    environment.


    ### Flow Description

    1. The action extracts the required API credentials (API Root, Client ID, Client
    Secret) and action parameters (Entity ID, Entity Type, User ID).

    2. It validates that both the Entity ID and User ID are provided as valid integers.

    3. The action initializes the `VectraRUXManager` to establish a connection with
    the VectraRUX API.

    4. It executes a POST request to the VectraRUX assignment endpoint to create the
    link between the specified entity and the user.

    5. Upon success, the action adds the assignment details to the result as a data
    table and a JSON object for analyst review.


