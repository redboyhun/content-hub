Unmark Detection Fixed:
  ai_description: >-
    ### General Description

    Unmarks specified detections as "fixed" in the Vectra RUX platform. This action
    allows analysts to revert the status of detections that were previously marked
    as fixed, enabling further investigation or monitoring.


    ### Flow Description

    1. Extracts configuration parameters (API Root, Client ID, Client Secret) and
    action parameters (Detection IDs) from the integration settings.

    2. Validates the provided Detection IDs to ensure they are valid integers.

    3. Initializes the `VectraRUXManager` to handle API communication with the Vectra
    RUX platform.

    4. Sends a `PATCH` request to the Vectra RUX API (`/api/v3.4/detections`) with
    the list of detection IDs and the `mark_as_fixed` flag set to `False`.

    5. Adds the API response to the action results using `siemplify.result.add_result_json`.


