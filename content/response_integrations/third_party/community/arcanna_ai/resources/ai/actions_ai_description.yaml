Export full event:
  ai_description: >-
    ### General Description

    Exports the full event details from the Arcanna.ai platform for a specified job
    and event ID. This action retrieves comprehensive event data, which is then attached
    to the action result for further analysis or reporting within the SOAR platform.


    ### Flow Description

    1. The action extracts the necessary configuration parameters, including the Arcanna.ai
    URL, API Key, and SSL verification settings.

    2. It extracts the required action parameters: `Job ID` and `Event ID`.

    3. An `ArcannaClient` instance is initialized using the provided credentials.

    4. The action calls the `export_event` method of the `ArcannaClient`, which performs
    an HTTP GET request to the Arcanna.ai API endpoint `/api/v1/events/{job_id}/{event_id}/export`.

    5. The resulting JSON response is captured and added to the action's result using
    `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is a read-only operation. It does not modify any data within Arcanna.ai
    or the Google SecOps platform. It is intended for data retrieval and forensic
    export purposes.
