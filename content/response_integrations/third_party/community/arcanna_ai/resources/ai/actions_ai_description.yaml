Update alert priority:
  ai_description: >-
    ### General Description

    Updates the priority of the current alert within the Google SecOps platform. This
    action allows analysts to programmatically adjust the severity level of an alert
    based on automated analysis or external inputs.


    ### Flow Description

    1. The action validates the provided `Priority` parameter against a list of allowed
    values: 'Informative', 'Low', 'Medium', 'High', or 'Critical'.

    2. It verifies that the current SOAR platform version is 5.6 or higher, as this
    functionality is not supported in earlier versions.

    3. It retrieves the current alert identifier and case ID from the execution context.

    4. The action performs a POST request to the internal SOAR API endpoint (`/external/v1/sdk/UpdateAlertPriority`)
    with the `caseId`, `alertIdentifier`, `alertName`, and the new `priority`.

    5. The action concludes by confirming the update status.


    ### Additional Notes

    This action modifies the alert metadata directly within the Google SecOps platform.
    It requires the platform version to be 5.6 or higher to function correctly.
