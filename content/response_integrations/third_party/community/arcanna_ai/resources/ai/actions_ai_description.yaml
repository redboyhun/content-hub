Get Arcanna decision:
  ai_description: >-
    ### General Description

    Retrieves an AI-generated decision from Arcanna.ai for a specific job and event.
    This action polls the Arcanna API to check the status of an event inference and
    returns the final decision JSON once available.


    ### Flow Description

    1. The action extracts configuration parameters (URL, API Key, SSL verification)
    and action parameters (Job ID, Event ID, retry settings).

    2. It initializes the `ArcannaClient` to communicate with the Arcanna.ai API.

    3. The action enters a retry loop, calling `client.get_event_status` to check
    the status of the specified event.

    4. If the status is `pending_inference`, the action waits for the configured duration
    and retries.

    5. If the status is `OK`, the action retrieves the decision JSON and adds it to
    the action results using `siemplify.result.add_result_json`.

    6. If the status is `ERROR` or the maximum retry count is reached, the action
    fails and logs the error.


    ### Additional Notes

    This action is designed to be used in workflows where an event has been submitted
    to Arcanna.ai for analysis, and the analyst needs to retrieve the resulting decision
    asynchronously.
