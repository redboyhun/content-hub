Get Arcanna decision:
  ai_description: >-
    ### General Description

    Retrieves an AI-generated decision from Arcanna.ai for a specific job and event.
    This action polls the Arcanna.ai API to check the status of an asynchronous inference
    task and returns the final decision once available.


    ### Flow Description

    1. Extracts configuration parameters (URL, API Key, SSL verification) and action
    parameters (Job Id, Event Id, Retry count, Seconds per retry).

    2. Initializes the `ArcannaClient` with the provided credentials.

    3. Enters a retry loop based on the configured retry count and interval.

    4. Calls `client.get_event_status(job_id, event_id)` to check the status of the
    Arcanna decision.

    5. If the status is `pending_inference`, the action waits for the configured interval
    and retries.

    6. If the status is `ERROR`, the action logs the error and fails.

    7. If the status is `OK`, the action adds the response JSON to the action results
    and completes successfully.

    8. If the retry limit is reached without a successful decision, the action logs
    a warning and fails.


    ### Additional Notes

    This action is used to poll for asynchronous AI decisions from Arcanna.ai. Ensure
    the retry count and interval are configured appropriately for the expected processing
    time of the AI job.
