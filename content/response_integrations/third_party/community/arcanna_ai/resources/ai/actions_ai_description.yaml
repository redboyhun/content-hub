Export full event:
  ai_description: >-
    ### General Description

    Exports the full event details from the Arcanna.ai platform for a specified job
    and event ID. This action retrieves raw event data, which is then added to the
    action results for further analysis or reporting.


    ### Flow Description

    1. The action extracts the required configuration parameters: `Url`, `Api Key`,
    and `SSL Verification`.

    2. It extracts the action-specific parameters: `Job ID` and `Event ID`.

    3. An `ArcannaClient` instance is initialized using the provided configuration.

    4. The action calls the `export_event` method, which performs a GET request to
    the Arcanna.ai API endpoint `/api/v1/events/{job_id}/{event_id}/export`.

    5. The resulting JSON response is added to the action's result using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is a read-only operation and does not modify any external systems
    or internal SOAR data. It is intended for data retrieval and forensic analysis
    purposes.
