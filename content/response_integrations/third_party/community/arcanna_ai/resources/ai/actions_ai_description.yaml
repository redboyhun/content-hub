Update alert priority:
  ai_description: >-
    ### General Description

    Updates the priority of the current alert within the Google SecOps platform. This
    action allows analysts to programmatically adjust the severity level of an alert
    based on automated decisions or manual input.


    ### Flow Description

    1. The action validates the provided `Priority` parameter against a list of allowed
    values: Informative, Low, Medium, High, and Critical.

    2. It verifies that a valid alert identifier is present in the current context.

    3. It checks the system version to ensure it is 5.6 or higher, as this functionality
    is not supported in older versions.

    4. The action constructs a POST request to the internal SecOps API endpoint `/external/v1/sdk/UpdateAlertPriority`.

    5. It sends the `caseId`, `alertIdentifier`, `alertName`, and the new `priority`
    to the platform to apply the change.


    ### Additional Notes

    This action performs an internal API call to the SecOps platform to modify alert
    metadata. It requires Siemplify version 5.6 or higher to function correctly.
