Trigger AI Model training:
  ai_description: >-
    ### General Description

    Triggers an AI model training job within the Arcanna.AI platform. This action
    initiates the training process for a specified job ID, allowing users to update
    the model with the latest data. It requires authentication via an API key and
    configuration of the Arcanna.AI instance URL.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Arcanna.AI integration
    configuration, including the base URL, API key, and SSL verification settings.

    2. **Parameter Extraction**: The action extracts the `Job ID` and `Username` provided
    as input parameters.

    3. **Client Initialization**: An `ArcannaClient` is initialized using the extracted
    configuration to establish a connection to the Arcanna.AI API.

    4. **Trigger Training**: The action calls the `train_model` method, which executes
    a POST request to the Arcanna.AI API endpoint `/api/v1/jobs/{job_id}/train` with
    the provided username.

    5. **Result Handling**: The API response is captured and added to the action results
    using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action performs a state-changing operation on the external Arcanna.AI platform.
    Ensure that the provided `Job ID` is valid and that the user has the necessary
    permissions to trigger training jobs.
