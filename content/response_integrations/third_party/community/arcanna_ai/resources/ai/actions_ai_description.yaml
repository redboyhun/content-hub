    \ field`, and `Send individual alerts from case`.\n3. **Case Retrieval**: The\
    \ action retrieves the full case details from the SOAR platform.\n4. **Data Processing**:\
    \ \n   - If `Send individual alerts from case` is enabled, the action iterates\
    \ through the case's cyber alerts, matches the current alert identifier, and sends\
    \ the alert payload to Arcanna.ai via a POST request.\n   - If disabled, the action\
    \ sends the full case payload, including target entities, to Arcanna.ai via a\
    \ POST request.\n5. **API Interaction**: The `ArcannaClient` executes a POST request\
