Add User To Workspace:
  ai_description: >-
    ### General Description

    Adds a user to a specific Asana workspace. This action facilitates user access
    management by programmatically adding a user to a designated workspace within
    the Asana platform.


    ### Flow Description

    1. The action extracts the Asana API token and base URL from the integration configuration.

    2. It retrieves the `Workspace Name` and `User's Email` from the action parameters.

    3. It initializes the `AsanaManager` to handle API interactions.

    4. It performs a GET request to the Asana API to retrieve the workspace ID corresponding
    to the provided `Workspace Name`.

    5. It performs a POST request to the Asana API (`/workspaces/{workspace_id}/addUser`)
    to add the specified user to the identified workspace.

    6. It returns a success or failure message based on the API response and attaches
    the full API response as a JSON result to the action.


    ### Additional Notes

    The `Workspace Name` parameter is case-sensitive. Ensure the name matches the
    workspace exactly as it appears in Asana.
  ai_short_description: >-
    Adds a user to a specific Asana workspace.
