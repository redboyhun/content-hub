List My Tasks:
  ai_description: >-
    ### General Description

    Retrieves a list of tasks assigned to a specific user within a designated Asana
    workspace. This action allows analysts to query task information for a given user,
    optionally filtering by completion status, and provides direct links to the tasks
    in Asana.


    ### Flow Description

    1. Extracts configuration parameters (Token, Base URL) and action parameters (User's
    Email, Workspace Name, Completed Status).

    2. Initializes the `AsanaManager` to interact with the Asana API.

    3. Retrieves the user's ID using the provided email address via the `get_user_id`
    API call.

    4. Retrieves the workspace ID using the provided workspace name via the `get_workspace_id_by_name`
    API call.

    5. Fetches the user's task list ID using the user ID and workspace ID via the
    `get_users_tasks_list_id` API call.

    6. Retrieves all tasks associated with the user's task list via the `get_tasks_from_a_user_tasks_list`
    API call.

    7. Iterates through the tasks, fetching detailed information for each task using
    the `get_a_task` API call.

    8. Filters tasks based on the `Completed Status` parameter.

    9. Adds matching tasks to the JSON result and adds links to the SOAR result using
    `siemplify.result.add_link`.


    ### Additional Notes

    The workspace name is case-sensitive. The action returns a JSON result containing
    task details and adds links to the SOAR result for each matching task.
