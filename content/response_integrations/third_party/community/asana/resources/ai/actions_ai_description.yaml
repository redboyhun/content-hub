List Project Tasks:
  ai_description: >-
    ### General Description

    Lists all tasks associated with a specific project in Asana. This action retrieves
    project tasks from the Asana platform, allowing users to filter results based
    on the completion status of the tasks. It provides visibility into project progress
    by returning detailed task information and direct links to the tasks within Asana.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (Token, Base URL)
    and action parameters (Project Name, Completed Status).

    2. An `AsanaManager` instance is initialized to handle API communication.

    3. The action calls the `get_project_id` method to retrieve the unique identifier
    for the specified project name.

    4. It then calls `get_tasks_from_a_project` to fetch the list of all tasks associated
    with that project ID.

    5. For each task found, the action calls `get_a_task` to retrieve detailed information.

    6. The action filters the tasks based on the `Completed Status` parameter provided
    by the user.

    7. For matching tasks, it adds a link to the task using `siemplify.result.add_link`
    and includes the task details in the final JSON result.

    8. Finally, the action returns the aggregated JSON result and a status message.


    ### Additional Notes

    This action is a read-only operation and does not perform any modifications to
    the data within Asana or the Google SecOps platform.
