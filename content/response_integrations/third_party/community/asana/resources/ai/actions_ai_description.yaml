Remove User From Workspace:
  ai_description: >-
    ### General Description

    Removes a specified user from an Asana workspace. This action interacts with the
    Asana API to identify the target workspace by name and subsequently revoke the
    user's access to that workspace.


    ### Flow Description

    1. The action extracts the necessary configuration parameters, including the Asana
    API Token and Base URL, and the action-specific parameters: 'Workspace Name' and
    'User's Email'.

    2. An `AsanaManager` instance is initialized to handle API communication.

    3. The action calls the `get_workspace_id_by_name` method to retrieve the unique
    identifier for the specified workspace.

    4. The action executes the `remove_user_from_workspace` method, which performs
    a POST request to the Asana API to remove the user from the identified workspace.

    5. The action returns a success or failure message based on the API response.


    ### Additional Notes

    The 'Workspace Name' parameter is case-sensitive. Ensure the workspace name matches
    exactly as it appears in Asana to avoid errors.
