Create Task:
  ai_description: >-
    ### General Description

    Creates a new task in Asana within a specified project. This action automates
    the task creation process by interacting with the Asana API, allowing users to
    define task subjects, descriptions, assignees, and due dates directly from the
    SOAR platform.


    ### Flow Description

    1. The action extracts configuration parameters (Token, Base URL) and action parameters
    (Task Subject, Assignee, Due Date, Description, Project Name).

    2. It initializes the `AsanaManager` with the provided credentials.

    3. It calls `asana_manager.get_project_id(project_name)` to retrieve the unique
    identifier for the target project.

    4. If an assignee is provided, it calls `asana_manager.get_user_id(task_assignees)`
    to resolve the user's unique identifier.

    5. It executes `asana_manager.create_task` to create the task in Asana with the
    provided details.

    6. If the task creation is successful, it adds a link to the created task in the
    action results and returns the task details as a JSON object.


    ### Additional Notes

    The project name and assignee (if provided) are case-sensitive. Ensure the provided
    Due Date follows the YYYY-MM-DD format.
