Create Task:
  ai_description: >-
    ### General Description

    Creates a new task within a specified project in Asana. This action allows users
    to define task details such as the subject, description, assignee, and due date,
    facilitating project management and workflow tracking directly from the SOAR platform.


    ### Flow Description

    1. The action extracts the required parameters: `Task Subject`, `Assignee`, `Due
    Date`, `Description`, and `Project Name`.

    2. It initializes the `AsanaManager` using the provided API token and base URL.

    3. It performs a GET request to retrieve the `Project ID` associated with the
    provided `Project Name`.

    4. If an `Assignee` is provided, it performs a GET request to retrieve the corresponding
    `User ID`.

    5. It executes a POST request to the Asana API to create the task with the specified
    details.

    6. Upon successful creation, it adds a link to the new task in the action results
    and returns the task details as a JSON object.


    ### Additional Notes

    - The `Project Name` and `Assignee` parameters are case-sensitive.

    - The `Due Date` must be provided in the format YYYY-MM-DD.
  ai_short_description: >-
    Creates a new task in Asana with specified details such as subject, description,
    assignee, and due date.
