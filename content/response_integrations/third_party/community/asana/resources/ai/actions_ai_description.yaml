Get Task:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific task from Asana using the provided
    Task ID. This action fetches the task's metadata, including its name, due date,
    and a permalink, and attaches the full JSON response to the action results.


    ### Flow Description

    1. Extract configuration parameters (Token, Base URL) and the action parameter
    (Task ID).

    2. Initialize the `AsanaManager` with the provided credentials.

    3. Execute a `GET` request to the Asana API endpoint `/tasks/{task_id}` to fetch
    task details.

    4. If the task is found, add a link to the task in the action results and return
    success.

    5. If the task is not found, return failure.

    6. Attach the full JSON response from the API to the action results.


    ### Additional Notes

    The Task ID can be found in the URL of the Asana task (e.g., `https://app.asana.com/0/{project_id}/{task_id}`).
