    external_data_mutation_explanation: >-
      Adds a user to an Asana workspace via a POST request.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data (workspace ID) and mutates external data (adds a user
      to the workspace). It does not mutate internal SecOps data beyond standard result
      reporting.
  categories:
