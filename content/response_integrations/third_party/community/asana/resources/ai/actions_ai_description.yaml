Update Task:
  ai_description: >-
    ### General Description

    Updates an existing task within the Asana project management platform. This action
    allows users to modify task details, including the assignee, due date, and description,
    by interacting with the Asana API.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the necessary Asana API
    token and base URL from the integration configuration.

    2. **Parameter Extraction**: The action extracts the `Task ID`, `Assignee` (email),
    `Due Date`, and `Description` from the action parameters.

    3. **User Resolution**: The action calls the Asana API (`GET /users/{email}`)
    to resolve the provided assignee email address into a valid Asana user ID.

    4. **Task Update**: The action performs a `PUT` request to the Asana API (`/tasks/{task_id}`)
    to update the task with the new assignee ID, due date, and description.

    5. **Result Reporting**: The updated task information is returned as a JSON result
    to the SOAR platform.


    ### Additional Notes

    - The `Task ID` is mandatory and must be retrieved from the Asana task URL.

    - The `Assignee` parameter is case-sensitive.

    - This action requires a valid Personal Access Token (PAT) configured in the Asana
    integration settings.
