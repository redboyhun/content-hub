    Tests the connectivity between the SOAR platform and the Asana integration. This
    action verifies that the provided API credentials and base URL are valid and that
    the SOAR platform can successfully communicate with the Asana API.


    ### Flow Description

    1. The action extracts the `Token` and `Base URL` from the Asana integration configuration.

    2. An `AsanaManager` instance is initialized using these credentials.

    3. The action calls the `test_connectivity` method, which executes an HTTP `GET`
    request to the Asana API endpoint `/users/me`.

    4. The action validates the API response.

    5. If the request is successful, the action returns a success message; otherwise,
    it returns a failure message.


    ### Additional Notes

    This action does not modify any data and is intended solely for troubleshooting
    and verifying integration health.
