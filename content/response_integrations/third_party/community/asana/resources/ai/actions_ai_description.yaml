  ai_description: >-
    ### General Description

    Removes a specified user from an Asana workspace. This action interacts with the
    Asana API to revoke a user's access to a designated workspace.


    ### Flow Description

    1. Extracts the Asana API token and base URL from the integration configuration.

    2. Retrieves the 'Workspace Name' and 'User's Email' from the action parameters.

    3. Initializes the 'AsanaManager' to interact with the Asana API.

    4. Calls the 'get_workspace_id_by_name' method to resolve the workspace name to
    its unique ID.

    5. Executes a 'POST' request via 'remove_user_from_workspace' to the Asana API
    endpoint '/workspaces/{workspace_id}/removeUser' to remove the specified user.

    6. Returns a success or failure message based on the API response.


