Add User To Workspace:
  ai_description: >-
    ### General Description

    Adds a user to a specified Asana workspace. This action facilitates user management
    by programmatically adding a user to an existing workspace within the Asana platform.


    ### Flow Description

    1. The action extracts the required configuration parameters, including the Asana
    API Token and Base URL, and the action parameters, including the Workspace Name
    and the User's Email.

    2. It initializes the `AsanaManager` with the provided credentials to interact
    with the Asana API.

    3. The action retrieves the unique identifier (GID) for the specified workspace
    by calling the Asana API (`GET /workspaces`) and matching the provided workspace
    name.

    4. It then adds the specified user to the identified workspace by performing a
    `POST` request to the Asana API (`POST /workspaces/{workspace_id}/addUser`).

    5. Finally, the action returns a success or failure message and attaches the API
    response as a JSON result to the action.


    ### Additional Notes

    The workspace name provided in the parameters is case-sensitive. Ensure the name
    matches exactly as it appears in Asana.
  ai_short_description: >-
    Adds a user to a specified Asana workspace by their email address.
