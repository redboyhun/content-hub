Update Task:
  ai_description: >-
    ### General Description

    Updates an existing task in Asana by modifying its assignee, due date, and description.
    This action allows users to manage task details directly from the security platform.


    ### Flow Description

    1. Extract configuration parameters (Token, Base URL) and action parameters (Task
    ID, Assignee, Due Date, Description).

    2. Initialize the `AsanaManager` with the provided credentials.

    3. Resolve the provided `Assignee` email to a user ID using the Asana API (`GET
    /users/{email}`).

    4. Perform a `PUT` request to the Asana API (`/tasks/{task_id}`) to update the
    task's assignee, due date, and description.

    5. Return the updated task information as a JSON result.


