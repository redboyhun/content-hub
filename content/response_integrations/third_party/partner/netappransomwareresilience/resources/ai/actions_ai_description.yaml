Block User:
  ai_description: >-
    ### General Description

    Blocks a user from accessing resources protected by the NetApp Ransomware Resilience
    service. This action interacts with the NetApp Ransomware Resilience API to enforce
    access restrictions on a specified user account and optionally blocks associated
    IP addresses.


    ### Flow Description

    1. Extracts the `User ID`, `User IPs`, and `Duration` from the action parameters.

    2. Initializes the `ApiManager` to handle authentication and API communication
    with the NetApp Ransomware Resilience service.

    3. Sends a `POST` request to the NetApp Ransomware Resilience API (`users/block-user`
    endpoint) with the provided user details and block duration.

    4. Processes the API response and reports the outcome (success or failure) to
    the SOAR platform.


    ### Additional Notes

    This action performs a state-changing operation on the external NetApp Ransomware
    Resilience service. It does not interact with internal SOAR entities directly.
  ai_short_description: >-
    Blocks a user from accessing resources protected by the NetApp Ransomware Resilience
    service.
