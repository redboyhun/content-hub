Block User:
  ai_description: >-
    ### General Description

    Blocks a user from accessing resources protected by NetApp Ransomware Resilience.
    This action interacts with the NetApp Ransomware Resilience Service (RRS) API
    to restrict user access based on the provided user identifier, optional client
    IP addresses, and block duration.


    ### Flow Description

    1. The action initializes the `ApiManager` using the configured integration credentials
    (Client ID, Client Secret, Account ID).

    2. It extracts the `User ID`, `User IPs`, and `Duration` parameters from the action
    configuration.

    3. The action constructs a POST request to the `users/block-user` endpoint of
    the NetApp RRS API.

    4. The API call is executed, and the response is processed to determine the success
    or failure of the operation.

    5. The result is added to the action output, and the action concludes by reporting
    the status to the SOAR platform.


    ### Additional Notes

    This action requires valid NetApp Ransomware Resilience credentials. The `User
    IPs` parameter is required for NFS and optional for CIFS configurations.
  ai_short_description: >-
    Blocks a user from accessing resources protected by NetApp Ransomware Resilience.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Blocks the specified user from accessing resources protected by NetApp Ransomware
      Resilience.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to an external API to block a user, which
      constitutes external data mutation. It does not fetch data, nor does it modify
      internal SOAR data (entities, insights, etc.).
  categories:
    enrichment: false
    reasoning: >-
      The action performs a mutation on an external system (blocking a user) and does
      not retrieve data for enrichment purposes. Therefore, it is a remediation action
      and not an enrichment action.
    remediation: true
