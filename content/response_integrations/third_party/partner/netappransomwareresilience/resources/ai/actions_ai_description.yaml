Take Snapshot:
  ai_description: >-
    ### General Description

    Triggers a volume snapshot creation via the NetApp Ransomware Resilience Service
    (RRS). This action is used to create a point-in-time copy of a storage volume,
    which is a critical step in ransomware resilience and data recovery workflows.


    ### Flow Description

    1. The action extracts the `Volume ID`, `Agent ID`, and `System ID` from the action
    parameters.

    2. The `ApiManager` initializes and authenticates with the RRS API using OAuth
    credentials.

    3. The action calls the `take_snapshot` method, which sends a `POST` request to
    the RRS API endpoint `storage/take-snapshot` with the provided volume, agent,
    and system identifiers.

    4. The API response is captured and added to the action results using `siemplify.result.add_result_json`.

    5. The action concludes by reporting the success or failure status to the SOAR
    platform.


    ### Additional Notes

    This action requires valid NetApp RRS credentials configured in the integration
    settings. It performs a state-changing operation on the storage system.
