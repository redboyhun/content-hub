Enrich IP Address:
  ai_description: >-
    ### General Description

    Enrich an IP address with threat intelligence data using the NetApp Ransomware
    Resilience Service (RRS). This action queries the RRS API to retrieve contextual
    information about a specified IP address, providing valuable insights for security
    analysis.


    ### Flow Description

    1. Extract the `IP Address` parameter from the action configuration.

    2. Initialize the `ApiManager` to handle OAuth authentication and API communication
    with the NetApp RRS service.

    3. Execute a POST request to the RRS API endpoint (`enrich/ip-address`) with the
    provided IP address.

    4. Retrieve the enrichment data from the API response.

    5. Add the retrieved JSON data to the action result using `siemplify.result.add_result_json`.

    6. Terminate the action with a success or failure status.


