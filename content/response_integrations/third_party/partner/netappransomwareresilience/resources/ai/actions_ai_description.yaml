    1. Extracts the `Volume ID`, `Agent ID`, and `System ID` from the action parameters.

    2. Initializes the `ApiManager` to handle authentication and API communication.

    3. Sends a `POST` request to the RRS API endpoint `storage/take-volume-offline`
    with the provided volume, agent, and system identifiers.

    4. Reports the success or failure of the operation back to the SOAR platform.


    ### Additional Notes

    This action performs a state-changing operation on the external storage system.
    Ensure the provided identifiers are correct to avoid unintended service disruption.
