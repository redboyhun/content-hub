Check Job Status:
  ai_description: >-
    General Description: Checks the status of an asynchronous job within the NetApp
    Ransomware Resilience Service (RRS). This action allows analysts to monitor the
    progress of previously triggered RRS operations by querying the service for the
    current job state.


    Flow Description:

    1. Extracts the 'Source', 'Agent ID', and 'Job ID' from the action parameters.

    2. Initializes the 'ApiManager' to handle authentication and API connectivity
    to the RRS service.

    3. Calls the RRS API endpoint 'job/status' using a GET request with the provided
    parameters.

    4. Retrieves and parses the job status response from the API.

    5. Adds the JSON result to the action output and terminates the action with a
    success or failure status.


