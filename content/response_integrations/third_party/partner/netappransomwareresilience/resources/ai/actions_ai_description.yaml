Volume Offline:
  ai_description: >-
    General Description: Takes a storage volume offline using the NetApp Ransomware
    Resilience Service. This action interacts with the Ransomware Resilience Service
    API to modify the state of a storage volume, effectively taking it offline.


    Flow Description:

    1. Initialize `ApiManager` to handle authentication and API communication.

    2. Extract `Volume ID`, `Agent ID`, and `System ID` from the action parameters.

    3. Call the `volume_offline` API endpoint (`storage/take-volume-offline`) via
    a POST request with the provided parameters.

