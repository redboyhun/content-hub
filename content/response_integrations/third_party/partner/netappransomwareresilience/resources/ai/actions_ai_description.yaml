Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the NetApp Ransomware Resilience service by validating the
    authentication token. This action ensures that the integration is properly configured
    and that the service is reachable.


    ### Flow Description

    1. Initialize the `SiemplifyAction` and `ApiManager`.

    2. The `ApiManager` checks the current OAuth token status.

    3. If the token is missing or expired, it generates a new token using the configured
    credentials.

    4. The action calls `is_token_valid()` to verify the connection status.

    5. The action logs the result and terminates with a success or failure status.


    ### Additional Notes

    This action is used for connectivity testing and does not perform any data enrichment
    or mutation.
