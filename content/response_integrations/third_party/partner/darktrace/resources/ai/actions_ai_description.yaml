Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Darktrace server using the provided API credentials.
    This action verifies that the integration is correctly configured and can communicate
    with the Darktrace API.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `API
    Token`, `API Private Token`, and `Verify SSL` from the integration settings.

    2. It initializes the `DarktraceManager` using these credentials.

    3. The action calls the `test_connectivity` method, which performs a GET request
    to the Darktrace status endpoint.

    4. The response is validated to confirm successful communication.

    5. The action returns a success or failure message based on the outcome of the
