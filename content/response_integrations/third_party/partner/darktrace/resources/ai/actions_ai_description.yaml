Add Comment To Model Breach:
  ai_description: >-
    ### General Description

    Adds a comment to a specific model breach in the Darktrace platform. This action
    allows analysts to append notes directly to a model breach record within Darktrace,
    facilitating better documentation and collaboration on security incidents.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Token, API Private Token,
    Verify SSL) and action parameters (Model Breach ID, Comment).

    2. Initializes the `DarktraceManager` with the provided credentials.

    3. Executes the `add_comment_to_model_breach` method, which performs a POST request
    to the Darktrace API endpoint `/modelbreaches/{model_breach_id}/comments` with
    the specified comment.

    4. If successful, the action returns the result JSON and completes. If the model
    breach ID is not found, it logs a failure.


    ### Additional Notes

    Requires valid Darktrace API credentials. This action interacts directly with
    the Darktrace API to update external records.
