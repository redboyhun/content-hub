Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Darktrace server using the provided API credentials.
    This action verifies that the integration is correctly configured and can successfully
    communicate with the Darktrace platform.


    ### Flow Description

    1. Extracts the required configuration parameters (`API Root`, `API Token`, `API
    Private Token`, and `Verify SSL`) from the integration settings.

    2. Initializes the `DarktraceManager` with the provided credentials and logger.

    3. Executes the `test_connectivity` method, which performs a GET request to the
    `/status` endpoint of the Darktrace API.

    4. Validates the HTTP response to ensure the server is reachable and the credentials
    are valid.

    5. Returns a success or failure message based on the connectivity result.


    ### Additional Notes

    This action is a diagnostic tool used to confirm that the SOAR platform can authenticate
    and communicate with the Darktrace API. It does not perform any data retrieval
    or state-changing operations beyond the initial connectivity check.
