    Verify SSL) and action parameters (Event Type, Time Frame, Start Time, End Time,
    Max Events To Return).

    2. Filters target entities to include only IP, Hostname, and MAC Address types.

    3. Initializes the `DarktraceManager` and performs a connectivity test.

    4. For each valid entity, searches for the corresponding device in Darktrace using
    the appropriate identifier (IP, Hostname, or MAC).

    5. If the device is found, retrieves events for the specified event types within
    the defined time frame.

    6. Constructs CSV tables for each event type and adds them to the action results.

    7. Aggregates all results into a JSON object and returns the final output.


