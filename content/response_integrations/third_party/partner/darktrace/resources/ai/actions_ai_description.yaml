Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities (IP, Hostname, MAC Address, URL) using Darktrace threat intelligence
    and device data. This action retrieves detailed information about devices and
    endpoints, including connection data, and updates the entity profile within the
    SOAR platform.


    ### Flow Description

    1. Extracts configuration (API credentials) and action parameters.

    2. Filters target entities by supported types (IP, Hostname, MAC, URL).

    3. Queries the Darktrace API for device or endpoint details based on the entity
    type.

    4. Optionally fetches connection data if the 'Fetch Connection Data' parameter
    is enabled.

    5. Updates entity additional properties and marks them as enriched.

    6. Adds insights and data tables to the SOAR case if configured.

    7. Updates the entities in the SOAR platform with the retrieved information.


    ### Additional Notes

    URL entities are parsed to extract the domain before querying Darktrace.
