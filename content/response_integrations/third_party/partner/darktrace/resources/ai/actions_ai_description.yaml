List Similar Devices:
  ai_description: >-
    ### General Description

    This action retrieves a list of devices similar to the specified endpoint from
    the Darktrace platform. It allows security analysts to identify related assets
    based on an initial indicator (IP, Hostname, or MAC Address), facilitating broader
    investigation into potentially compromised or related infrastructure.


    ### Flow Description

    1. The action initializes the Darktrace manager using the provided API credentials
    and configuration parameters.

    2. It filters the `target_entities` to include only supported types: `ADDRESS`,
    `HOSTNAME`, and `MACADDRESS`.

    3. For each valid entity, the action performs a search in Darktrace to resolve
    the entity to a specific device ID (`did`):
       - If the entity is an IP address, it calls the `/devices` endpoint.
       - If the entity is a hostname, it calls the `/devicesearch` endpoint.
       - If the entity is a MAC address, it calls the `/devices` endpoint.
    4. Once a device ID is retrieved, the action calls the `/similardevices` endpoint
    to fetch a list of similar devices, limited by the `Max Devices To Return` parameter.

    5. The results are formatted into a table and a JSON object, which are then added
    to the action results for the analyst to review.


    ### Additional Notes

    - The action requires valid Darktrace API credentials (API Root, API Token, API
    Private Token).

    - If no similar devices are found for an entity, the action logs the failure and
    continues processing other entities.

    - The `Max Devices To Return` parameter defaults to 50 if not specified.
  ai_short_description: >-
    Retrieves a list of devices similar to a specified endpoint (IP, Hostname, or
    MAC Address) from the Darktrace platform to assist in asset investigation.
  capabilities:
    can_create_case_comments: false
