    ### General Description

    Lists endpoint events from Darktrace for specified entities (IP, Hostname, MAC
    Address). This action retrieves historical event data from Darktrace for the provided
    entities and presents them in a structured format within the case.


    ### Flow Description

    1. Extracts configuration parameters (API credentials, SSL verification).

    2. Extracts action parameters (Event Type, Time Frame, Start/End Time, Max Events).

    3. Filters target entities to include only IP, Hostname, and MAC Address.

    4. For each entity, searches for the corresponding device in Darktrace using `get_devices`
    or `search_devices_by_hostname`.

    5. If the device is found, retrieves events of the specified types within the
    defined time frame using the `get_events_for_endpoint` API call.

    6. Formats the retrieved events into data tables and a JSON result.


    ### Additional Notes

    Events are returned in UTC.
