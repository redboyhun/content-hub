Execute Custom Search:
  ai_description: >-
    ### General Description

    Executes a custom search query against the Darktrace platform to retrieve relevant
    data based on specified criteria. This action allows users to perform advanced
    searches using Darktrace's query language, with support for configurable time
    frames and result limits.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Token, API Private Token,
    Verify SSL) and action parameters (Query, Time Frame, Start Time, End Time, Max
    Results To Return).

    2. Calculates the search time range (`start_time`, `end_time`) based on the provided
    `Time Frame` and the current alert's start/end times.

    3. Initializes the `DarktraceManager` with the provided credentials.

    4. Executes the custom query via a GET request to the Darktrace `/advancedsearch/api/search/`
    endpoint.

    5. Parses the results and adds them to the action result JSON.


    ### Additional Notes

    If "Custom" is selected for the Time Frame, "Start Time" is mandatory. The action
    uses the current alert's context to determine time ranges if relative time frames
    are selected. If no results are found, the action returns an appropriate message.
