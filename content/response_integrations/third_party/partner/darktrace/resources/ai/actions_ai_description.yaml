Update Model Breach Status:
  ai_description: >-
    ### General Description

    Updates the status of a model breach in Darktrace. This action allows analysts
    to acknowledge or unacknowledge a specific model breach, ensuring that security
    incidents are tracked and managed appropriately within the Darktrace platform.


    ### Flow Description

    1. Extract configuration parameters (API Root, API Token, API Private Token, Verify
    SSL) and action parameters (Status, Model Breach ID).

    2. Initialize the `DarktraceManager` with the provided credentials.

    3. Fetch the current details of the specified model breach using the `get_model_breach`
    method (GET request).

    4. Validate if the requested status is already applied to the model breach. If
    it is, raise an `AlreadyAppliedException`.

    5. If the status is not applied, perform a POST request to either `acknowledge_model_breach`
    or `unacknowledge_model_breach` based on the input status.

    6. Return a success message indicating the status update or handle any errors
    encountered during the process.


    ### Additional Notes

    This action requires valid Darktrace API credentials. It performs a check before
    updating to prevent redundant API calls if the status is already set to the desired
    value.
