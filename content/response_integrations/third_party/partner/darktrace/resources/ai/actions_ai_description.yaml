Execute Custom Search:
  ai_description: >-
    ### General Description

    Executes a custom search query within the Darktrace platform to retrieve relevant
    data based on user-defined criteria. This action allows analysts to perform ad-hoc
    investigations by querying Darktrace's search API, providing flexibility to search
    for specific events or patterns within a defined time frame.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (API Root, API Token,
    API Private Token, and SSL verification settings) to establish a connection with
    the Darktrace API.

    2. It retrieves the action parameters: `Query`, `Time Frame`, `Start Time`, `End
    Time`, and `Max Results To Return`.

    3. The action calculates the appropriate start and end timestamps based on the
    selected `Time Frame` and the context of the current alert (if applicable).

    4. It initializes the `DarktraceManager` and executes the `execute_custom_query`
    method, which performs a GET request to the Darktrace `/advancedsearch/api/search/{base64_query}`
    endpoint.

    5. The retrieved search results are processed and added to the action's output
    as a JSON object using `siemplify.result.add_result_json`.

    6. Finally, the action completes with a success or failure message based on the
    outcome of the query.


    ### Additional Notes

    - If the "Custom" time frame is selected, both `Start Time` and `End Time` (or
    current time) must be provided in ISO 8601 format.

    - The action does not modify any data within the SOAR platform or the external
    Darktrace system; it is strictly a read-only search operation.
  ai_short_description: >-
    Executes a custom search query in Darktrace and returns the results.
