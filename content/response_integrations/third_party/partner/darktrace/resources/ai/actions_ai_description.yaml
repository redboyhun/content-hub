Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities (IP, Hostname, MAC Address, and URL) using threat intelligence
    and device information from Darktrace. This action retrieves device details, endpoint
    information, and connection history to provide context for security investigations.
    It supports parsing URL entities to extract the domain for enrichment.


    ### Flow Description

    1. Extracts configuration parameters (API credentials) and action parameters (e.g.,
    `Fetch Connection Data`, `Max Hours Backwards`, `Create Endpoint Insight`).

    2. Filters the `target_entities` list to include only supported types: `ADDRESS`,
    `HOSTNAME`, `MACADDRESS`, and `URL`.

    3. For each supported entity, queries the Darktrace API (via `DarktraceManager`)
    to retrieve device or endpoint details.

    4. If `Fetch Connection Data` is enabled, retrieves connection history for the
    device for the specified `Max Hours Backwards`.

    5. Updates the entity with enrichment data (additional properties) and marks it
    as enriched.

    6. If `Create Endpoint Insight` is enabled, generates an insight for the entity
    containing device details.

    7. Adds result tables (e.g., device details, connection data) to the action output
    and updates the entities in the SOAR platform.


    ### Additional Notes

    URL entities are parsed using `urlparse` to extract the domain part before querying
    Darktrace. The action handles both device and endpoint detail lookups depending
    on the entity type.
  ai_short_description: >-
    Enriches IP, Hostname, MAC Address, and URL entities with device and connection
    information from Darktrace.
