Add Comment To Model Breach:
  ai_description: >-
    ### General Description

    Adds a comment to a specific model breach in the Darktrace platform. This action
    allows analysts to document findings or provide context directly within the external
    system.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Token, API Private Token,
    Verify SSL).

    2. Extracts action parameters (Model Breach ID, Comment).

    3. Initializes the `DarktraceManager` with the provided credentials.

    4. Executes the `add_comment_to_model_breach` method, which sends a POST request
    to the Darktrace API endpoint `/modelbreaches/{model_breach_id}/comments` with
    the comment in the payload.

    5. Returns the result of the API call as a JSON object.


    ### Additional Notes

    This action requires valid Darktrace API credentials. If the specified Model Breach
    ID is not found, the action will fail.
