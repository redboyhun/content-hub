List Similar Devices:
  ai_description: >-
    ### General Description

    This action retrieves a list of similar devices for a given endpoint (IP, Hostname,
    or MAC Address) from the Darktrace platform. It helps security analysts identify
    related assets or potential lateral movement by providing contextual device information
    based on the provided entity.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts configuration parameters (API
    Root, API Token, API Private Token, Verify SSL) and the action parameter `Max
    Devices To Return` (default: 50).

    2. **Connectivity Test**: It initializes the `DarktraceManager` and performs a
    connectivity test to ensure the Darktrace API is reachable.

    3. **Entity Processing**: The action iterates through the provided target entities,
    filtering for `ADDRESS`, `HOSTNAME`, and `MACADDRESS` types.

    4. **Device Search**: For each valid entity, it queries the Darktrace API to find
    the corresponding device and retrieve its unique Device ID (`did`).

    5. **Similar Device Retrieval**: Using the retrieved `did`, it calls the Darktrace
    API to fetch a list of similar devices, limited by the `Max Devices To Return`
    parameter.

    6. **Result Presentation**: If similar devices are found, the action adds an entity
    table to the action result and stores the device details in a JSON result object.
    If no devices are found or an error occurs, the entity is marked as failed.


    ### Additional Notes

    - The action does not modify existing case data or entity attributes; it strictly
    provides enrichment data in the form of action results.

    - If the `Max Devices To Return` parameter is set to a value less than or equal
    to 0, the action will fail.
  ai_short_description: >-
