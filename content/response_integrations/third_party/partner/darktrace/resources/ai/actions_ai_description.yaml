Update Model Breach Status:
  ai_description: >-
    ### General Description

    Updates the status of a model breach in the Darktrace platform. This action allows
    analysts to acknowledge or unacknowledge specific model breaches, ensuring that
    security incidents are tracked and managed appropriately within the Darktrace
    environment.


    ### Flow Description

    1. Extracts configuration parameters (API credentials, SSL verification) from
    the integration settings.

    2. Extracts action parameters (`Status`, `Model Breach ID`) provided by the user.

    3. Initializes the `DarktraceManager` to establish a connection with the Darktrace
    API.

    4. Retrieves the current details of the specified model breach using the `get_model_breach`
    method.

    5. Checks if the requested status is already applied to the model breach; if so,
    the action terminates with a success message indicating no changes were needed.

    6. If the status differs, the action calls either `acknowledge_model_breach` or
    `unacknowledge_model_breach` based on the input status.

    7. Returns the final execution status and a descriptive message confirming the
    update or noting that it was already applied.


    ### Additional Notes

    The action requires valid Darktrace API credentials (API Root, Token, and Private
    Token) to be configured in the integration settings.
  ai_short_description: >-
    Updates the status of a model breach in Darktrace to either 'Acknowledged' or
    'Unacknowledged'.
