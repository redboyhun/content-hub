Ping:
  ai_description: >-
    General Description: This action tests the connectivity between the Google SecOps
    SOAR server and the Rubrik Security Cloud instance to ensure the integration is
    properly configured and authenticated.


    Flow Description:

    1. The action initializes the `SiemplifyAction` and retrieves the required integration
    configuration parameters (Service Account JSON and SSL verification settings).

    2. It instantiates the `APIManager` class, which handles authentication and API
    communication.

    3. The action executes a GraphQL query (`TEST_CONNECTIVITY_QUERY`) against the
    Rubrik Security Cloud API to verify that the integration can successfully authenticate
    and communicate with the server.

    4. If the connectivity test is successful, the action returns a success message
    and a `True` result.

    5. If the connectivity test fails, the action catches the exception, logs the
    error, and returns a failure message with a `False` result.


    Additional Notes: This action is a read-only connectivity check and does not perform
    any mutations or data processing.
