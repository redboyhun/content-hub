    1. The action extracts the `Hunt ID` parameter provided by the user.

    2. It initializes the Rubrik Security Cloud client using the configured service
    account credentials.

    3. The action calls the Rubrik API to retrieve the threat hunt details and metrics
    associated with the provided `Hunt ID`.

    4. The retrieved data is parsed and formatted into a data table, which is then
    added to the action results for display in the SOAR interface.

    5. The action returns a status message and execution state (COMPLETED or IN_PROGRESS
    if the hunt is still running).


