    Retrieves the connection state information for a specific Cloud Data Management
    (CDM) cluster from Rubrik Security Cloud. This action provides visibility into
    the connectivity status of all nodes within the specified cluster, assisting in
    infrastructure health monitoring and troubleshooting.


    ### Flow Description

    1. The action extracts the `Cluster ID` parameter provided by the user.

    2. It initializes the `APIManager` using the configured service account credentials
    to establish a connection to the Rubrik Security Cloud GraphQL API.

    3. The action executes a GraphQL query (`CDM_CLUSTER_CONNECTION_STATE_QUERY`)
    to fetch the connection state for the specified cluster.

    4. The response is parsed, and the connection state data is formatted into a data
    table.

    5. The results are returned to the SOAR platform via `siemplify.result.add_data_table`
    and `siemplify.result.add_result_json`.


