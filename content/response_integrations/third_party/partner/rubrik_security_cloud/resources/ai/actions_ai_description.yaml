Turbo IOC Scan:
  ai_description: >-
    ### General Description

    Initiates a new Turbo Threat Hunt scan across the Rubrik Security Cloud infrastructure.
    This action allows users to scan for specific Indicators of Compromise (IOCs)
    across designated clusters, with optional configurations for snapshot time ranges
    and snapshot limits per object.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the required `IOC` parameter
    and optional parameters such as `Scan Name`, `Cluster ID`, `Start Time`, `End
    Time`, and `Max Snapshots Per Object` from the action configuration.

    2. **Validation**: The action validates the provided parameters, ensuring dates
    are in the correct format and that the `Start Time` is not after the `End Time`.

    3. **Client Initialization**: The action initializes the `APIManager` with the
    provided service account credentials to interact with the Rubrik Security Cloud
    GraphQL API.

    4. **Scan Execution**: The action executes the `startTurboThreatHunt` GraphQL
    mutation to initiate the threat hunt scan on the Rubrik platform.

    5. **Result Processing**: The action retrieves the `hunt_id` from the API response,
    creates a `TurboIOCScanDatamodel` to structure the output, and adds the results
    to the SOAR action output as a JSON result and a data table.


    ### Additional Notes

    This action triggers an asynchronous threat hunt scan on the Rubrik platform.
    The `hunt_id` returned can be used in subsequent actions to retrieve the status
    and results of the scan.
