Turbo IOC Scan:
  ai_description: >-
    ### General Description

    Initiates a Turbo IOC (Indicator of Compromise) scan across Rubrik infrastructure
    to identify potential threats. This action allows users to scan multiple IOCs
    across specific clusters with configurable time ranges and snapshot limits.


    ### Flow Description

    1. Extracts action parameters, including the list of IOCs, optional scan name,
    cluster IDs, start/end times for snapshot filtering, and the maximum number of
    snapshots to scan per object.

    2. Initializes the Rubrik Security Cloud client using the provided service account
    credentials.

    3. Executes the `startTurboThreatHunt` GraphQL mutation via the Rubrik API to
    trigger the scan.

    4. Parses the API response to retrieve the `huntId` of the newly created threat
    hunt.

    5. Adds the scan results (Hunt ID) to the SOAR result JSON and creates a data
    table in the SOAR interface for analyst review.


