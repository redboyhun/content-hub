    separated values. |

    | Paths To Exclude | String | No | Paths to exclude from the scan. Supports comma
    separated values. |

    | Paths To Exempt | String | No | Paths to exempt from exclusion. Supports comma
    separated values. |
Get CDM Cluster Connection State:
