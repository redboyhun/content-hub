  ai_description: >-
    ### General Description

    Retrieves sensitive data hits detected by Rubrik Sonar for a specific object within
    a configurable lookback period. Sonar is Rubrik's data classification and sensitive
    data discovery engine.


    ### Flow Description

    1. Extracts the `Object Name` and `Lookback Days` parameters from the action configuration.

    2. Calculates the search date based on the provided `Lookback Days`.

    3. Initializes the Rubrik Security Cloud client using the provided service account
    credentials.

    4. Executes a GraphQL query to retrieve object details and sensitive hits from
    Rubrik Security Cloud.

    5. Parses the response and formats the sensitive hits data using the `SonarSensitiveHitsDatamodel`.

    6. Adds the retrieved data to the action results as a table and JSON for analyst
    review.


    ### Additional Notes

    This action is read-only and does not modify external systems or internal entities.
    It is designed to provide visibility into sensitive data discovery results for
    specific objects.
