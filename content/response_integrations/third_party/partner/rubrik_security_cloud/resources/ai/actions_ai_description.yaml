IOC Scan Results:
  ai_description: >-
    ### General Description

    Retrieves the results of an IOC (Indicator of Compromise) scan or threat hunt
    from Rubrik Security Cloud using a specific Hunt ID. This action provides visibility
    into the scan status, object metrics, and scan metrics, allowing analysts to monitor
    the progress and outcomes of threat hunting activities.


    ### Flow Description

    1. The action extracts the `Hunt ID` parameter provided by the user.

    2. It initializes the `APIManager` to establish a connection with the Rubrik Security
    Cloud API.

    3. The action executes the `get_ioc_scan_results` method, which performs a GraphQL
    query to fetch the threat hunt details and metrics associated with the provided
    `Hunt ID`.

    4. The raw JSON response from the API is added to the action results.

    5. The action parses the response to extract `threatHuntDetailV2` and `threatHuntObjectMetrics`.

    6. A data table containing the scan results (Hunt Name, Type, Status, IOC Details,
    Metrics, etc.) is constructed and added to the action output.

    7. The action determines the execution state (COMPLETED or IN_PROGRESS) based
    on the status of the threat hunt and terminates the action.


    ### Additional Notes

    This action is designed for monitoring and reporting purposes. It does not modify
    any data within Rubrik Security Cloud or the SOAR platform. If the threat hunt
    is still running, the action will return an `IN_PROGRESS` status.
