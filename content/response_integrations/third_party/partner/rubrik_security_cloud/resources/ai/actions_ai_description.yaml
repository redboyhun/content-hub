Advanced IOC Scan:
  ai_description: >-
    ### General Description

    Initiates an advanced Indicator of Compromise (IOC) scan on specified Rubrik objects.
    This action allows users to trigger a threat hunt across Rubrik snapshots, supporting
    various configurations such as IOC types, date ranges, file size filters, and
    path inclusions or exclusions.


    ### Flow Description

    1. The action extracts configuration parameters, including Object IDs, IOC details,
    and scan-specific settings (e.g., date ranges, file size limits).

    2. It validates all input parameters, ensuring dates are in the correct format
    and numeric values meet required constraints.

    3. The action initializes the Rubrik Security Cloud client using the provided
    service account credentials.

    4. It executes a GraphQL mutation (`startBulkThreatHunt`) to trigger the advanced
    threat hunt scan on the specified Rubrik objects.

    5. The action processes the response to retrieve the details of the started hunts.

    6. Finally, it adds the raw JSON response and a data table containing the hunt
    information to the SOAR action results.


    ### Additional Notes

    This action performs a mutation on the Rubrik platform by starting a new threat
    hunt. It does not perform any data retrieval or enrichment on existing entities
    within the SOAR platform.
  ai_short_description: >-
    Initiates an advanced Indicator of Compromise (IOC) scan on specified Rubrik objects.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Triggers a new advanced threat hunt scan on the Rubrik Security Cloud platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action triggers a threat hunt scan on the Rubrik platform (mutation). It
      does not fetch contextual data about entities, nor does it modify internal SOAR
      data beyond displaying results.
  categories:
    enrichment: false
    reasoning: >-
      The action triggers a threat hunt scan on the Rubrik platform. It does not fetch
      data for enrichment, nor does it perform remediation (containment/blocking).
      Therefore, it is neither an enrichment nor a remediation action.
