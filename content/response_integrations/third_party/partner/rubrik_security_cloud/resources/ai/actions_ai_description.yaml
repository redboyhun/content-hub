List Object Snapshots:
  ai_description: >-
    ### General Description

    Retrieves a list of snapshots for a specific object from Rubrik Security Cloud.
    This action allows users to query snapshot history for a given object ID, with
    support for filtering by date range, snapshot type, and sorting. The results are
    returned as a structured data table within the SOAR platform.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Object ID` (mandatory) and
    optional parameters such as `Start Date`, `End Date`, `Snapshot Type`, `Limit`,
    `Next Page Token`, and `Sort Order` from the action configuration.

    2. **Validation**: Validates the provided parameters, including date formats and
    integer constraints for the limit.

    3. **API Interaction**: Initializes the Rubrik API manager and executes a GraphQL
    query to fetch snapshot data from Rubrik Security Cloud.

    4. **Data Processing**: Parses the API response, extracting snapshot details such
    as Snapshot ID, Creation Date, Cluster Name, and SLA Domain Name.

    5. **Output**: Formats the retrieved snapshot data into a CSV-compatible table
    and adds it to the action results using `siemplify.result.add_data_table`. It
    also attaches the raw JSON response.


    ### Additional Notes

    This action is a read-only operation and does not modify any data in Rubrik or
