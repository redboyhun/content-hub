    ### General Description

    Tests connectivity between the Google SecOps SOAR server and the Rubrik Security
    Cloud instance. This action verifies that the integration is correctly configured
    and that the SOAR platform can successfully authenticate and communicate with
    the Rubrik Security Cloud API.


    ### Flow Description

    1. The action initializes the integration parameters, specifically the Service
    Account JSON and SSL verification settings.

    2. It instantiates the `APIManager` to handle authentication and API communication.

    3. The action executes a connectivity test by sending a GraphQL query (`TEST_CONNECTIVITY_QUERY`)
    to the Rubrik Security Cloud API.

    4. Based on the API response, the action returns a success or failure message
    indicating the status of the connection.


    ### Additional Notes

    This action is strictly a connectivity test and does not perform any data retrieval,
    enrichment, or remediation tasks. It is intended for troubleshooting and configuration
    validation.
