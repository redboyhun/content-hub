Advanced IOC Scan:
  ai_description: >-
    ### General Description

    Initiates an advanced threat hunt scan on specified Rubrik objects. This action
    allows users to configure various scan parameters, including IOC types, date ranges,
    file size filters, and path inclusions/exclusions, to detect indicators of compromise
    within Rubrik snapshots.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts configuration parameters, including
    the required `Object ID` and optional scan configurations (IOC details, date ranges,
    file size limits, and path filters).

    2. **Validation**: The action validates the provided parameters, ensuring dates
    are in the correct format, integers are within valid ranges, and JSON strings
    are properly formatted.

    3. **Client Initialization**: The action initializes the Rubrik Security Cloud
    client using the provided service account credentials.

    4. **API Execution**: The action calls the `start_advance_ioc_scan` method, which
    performs a POST request to the Rubrik Security Cloud GraphQL API to initiate the
    bulk threat hunt.

    5. **Result Processing**: The action processes the API response, adds the hunt
    details to the SOAR action output as a JSON result, and displays a summary table
    of the started hunts.


    ### Additional Notes

    This action performs a state-changing operation on the Rubrik Security Cloud platform
    by triggering a new threat hunt scan. It does not interact with the SOAR platform's
    entity list directly, as it relies on the `Object ID` parameter provided by the
    user.
  ai_short_description: >-
    Initiates an advanced threat hunt scan on specified Rubrik objects.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates an advanced threat hunt scan on specified Rubrik objects.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the Rubrik Security Cloud API to initiate
      a threat hunt scan, which constitutes a mutation of external data. It does not
      fetch additional contextual data, nor does it modify internal SOAR data or entities.
