IP Lookup:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using the GreyNoise API. This action retrieves comprehensive
    threat intelligence, including classification, actor information, tags, CVE associations,
    and business service intelligence, to provide context for IP-based indicators.


    ### Flow Description

    1. The action retrieves the GreyNoise API key from the integration configuration.

    2. It identifies all IP Address entities from the current case.

    3. It determines the API tier (Community or Enterprise) to select the appropriate
    lookup method.

    4. For Enterprise users, it performs a batch lookup of all IP entities. For Community
    users, it performs individual lookups for each IP.

    5. For each IP found, it updates the entity's `additional_properties` with enrichment
    data, marks the entity as enriched, and sets the suspicious status based on the
    classification.

    6. It generates an HTML insight for each enriched IP and attaches it to the entity.

    7. Finally, it updates the entities in the SOAR platform and adds the raw JSON
    results to the action output.


    ### Additional Notes

    This action supports both Community and Enterprise GreyNoise API tiers. Batch
    processing is automatically utilized for Enterprise keys to improve performance
    and reduce API request overhead.
