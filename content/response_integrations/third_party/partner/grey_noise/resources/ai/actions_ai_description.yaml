    ### Flow Description

    1. The action retrieves the configured GreyNoise API key from the integration
    settings.

    2. It initializes the GreyNoise API manager using the provided credentials.

    3. The action executes a connectivity test against the GreyNoise server.

    4. If the connection is successful, it returns a success message. If the connection
    fails (e.g., due to rate limits, invalid credentials, or network issues), it catches
    the exception and returns a failure message.


