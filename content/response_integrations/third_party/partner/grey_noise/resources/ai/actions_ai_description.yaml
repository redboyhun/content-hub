Get CVE Details:
  ai_description: >-
    ### General Description

    Enriches CVE entities with threat intelligence data from GreyNoise. This action
    retrieves critical vulnerability information, including CVSS scores, EPSS scores,
    and active threat exploitation data, to help analysts assess the risk associated
    with specific CVEs.


    ### Flow Description

    1. **Configuration**: The action initializes the GreyNoise API manager using the
    configured API key.

    2. **Entity Retrieval**: It retrieves all CVE-type entities from the current case.

    3. **Validation**: For each CVE entity, the action validates the identifier format
    (e.g., CVE-YYYY-NNNN).

    4. **API Lookup**: It performs a lookup against the GreyNoise API for each valid
    CVE ID.

    5. **Enrichment**: If data is found, the action updates the entity's `additional_properties`
    with enrichment data (e.g., `GN_CVSS_Score`, `GN_EPSS_Score`, `GN_Exploit_Found`)
    and marks the entity as enriched.

    6. **Insight Generation**: It generates an HTML insight containing the retrieved
    threat intelligence and adds it to the entity.

    7. **Case Update**: Finally, it updates the entities in the case and adds the
    raw JSON results to the action output.


    ### Additional Notes

    This action is read-only regarding external systems and performs internal mutations
    only to update entity attributes and create insights within the SOAR platform.
