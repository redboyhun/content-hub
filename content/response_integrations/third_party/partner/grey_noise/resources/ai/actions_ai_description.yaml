Quick IP Lookup:
  ai_description: >-
    ### General Description

    Performs a lightweight IP classification lookup using the GreyNoise API to retrieve
    trust levels, internet scanner status, and business service intelligence. This
    action enriches IP Address entities with threat intelligence data, helping analysts
    quickly identify potentially malicious or benign infrastructure.


    ### Flow Description

    1. **Initialization**: The action retrieves the GreyNoise API key from the integration
    configuration.

    2. **Entity Extraction**: It identifies all IP Address entities within the current
    case.

    3. **API Interaction**: It makes a bulk request to the GreyNoise `quick_lookup`
    API endpoint for the identified IP addresses.

    4. **Data Processing**: For each IP found in the GreyNoise dataset:
        * It updates the entity's `additional_properties` with enrichment data (e.g.,
    classification, trust level, business service status).
        * It sets the entity's `is_enriched` flag to true.
        * It determines the entity's `is_suspicious` status based on the classification
    (e.g., 'malicious' or 'suspicious').
        * It generates an HTML insight containing the intelligence summary and adds
    it to the entity.
    5. **Entity Update**: The action updates the enriched entities within the SOAR
    platform.

    6. **Result Reporting**: It adds the raw JSON results to the action output and
    completes the execution.


    ### Additional Notes

    This action requires a valid GreyNoise API key configured in the integration settings.
    It is designed for high-speed, lightweight lookups and does not perform deep historical
    analysis.
