IP Timeline Lookup:
  ai_description: >-
    ### General Description

    Retrieves the activity timeline for IP address entities using the GreyNoise API.
    This action provides historical context on how an IP has been classified over
    a specified period, helping analysts understand the behavior and reputation of
    the indicator. It enriches the entity with timeline data and generates a visual
    insight within the case.


    ### Flow Description

    1. The action extracts configuration parameters (API Key) and action parameters
    (Days, Field, Granularity).

    2. It retrieves all IP address entities from the current case.

    3. For each IP entity, the action calls the GreyNoise `ip_timeline` API endpoint
    to fetch historical activity data.

    4. If data is retrieved, it creates an `IPTimelineResult` model and updates the
    entity's `additional_properties` with the enrichment data.

    5. The action generates an HTML insight containing the timeline breakdown and
    adds it to the entity using `siemplify.add_entity_insight`.

    6. Finally, it updates the entities in the SOAR platform and adds the raw JSON
    results to the action output.


    ### Additional Notes

    This action is strictly for enrichment purposes and does not perform any blocking
    or remediation. It requires a valid GreyNoise API key. The `Field` parameter allows
    customization of the activity breakdown (e.g., classification, destination_port),
    and the `Granularity` and `Days` parameters control the scope of the timeline
    data.
