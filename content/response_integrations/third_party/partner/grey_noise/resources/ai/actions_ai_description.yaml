IP Timeline Lookup:
  ai_description: >-
    General Description: Retrieves the activity timeline for IP addresses from GreyNoise,
    providing historical context on how an IP's classification or other attributes
    have changed over a specified period. This action enriches IP entities with timeline
    data and generates a visual insight for analysts.


    Flow Description:

    1. Extracts configuration parameters: 'Days' (duration), 'Field' (attribute to
    track), and 'Granularity' (time interval).

    2. Retrieves all IP address entities from the current case.

    3. Iterates through each IP entity and calls the GreyNoise API (`ip_timeline`)
    to fetch historical activity data.

    4. If data is successfully retrieved, updates the entity's `additional_properties`
    with the timeline information and marks the entity as enriched.

    5. Generates an HTML insight containing the timeline breakdown and attaches it
    to the entity using `siemplify.add_entity_insight`.

    6. Updates the entities in the SOAR platform and adds the raw JSON results to
    the action output.


    Additional Notes: This action requires a valid GreyNoise API key. The 'Field'
    parameter allows users to specify which attribute (e.g., classification, destination_port)
    to analyze for activity trends. The action handles API rate limits and errors
    gracefully, reporting failures per entity.
