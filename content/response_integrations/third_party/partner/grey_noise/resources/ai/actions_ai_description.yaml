Execute GNQL Query:
  ai_description: >-
    General Description: Executes custom GNQL (GreyNoise Query Language) queries against
    the GreyNoise threat intelligence platform. This action allows users to search
    for IP addresses based on specific criteria (e.g., classification, tags, activity)
    using the GreyNoise Query Language.


    Flow Description:

    1. Extracts action parameters: `GNQL Query`, `Max Results`, `Quick`, and `Exclude
    Raw`.

    2. Validates the `Max Results` parameter to ensure it is a positive integer.

    3. Initializes the `APIManager` to establish a connection with the GreyNoise API.

    4. Executes the GNQL query via the `greynoise_manager.execute_gnql_query` method.

    5. Handles pagination automatically by looping through result pages until all
    data is retrieved or the `Max Results` limit is reached.

    6. Collects the retrieved data into a list.

    7. Adds the final collected data to the action result as a JSON object.


    Additional Notes: This action does not interact with specific entities in the
    case; it operates on the provided query string. It supports pagination to handle
    large result sets.
  ai_short_description: >-
    Executes custom GNQL queries against the GreyNoise threat intelligence platform
    to retrieve IP address data based on specified search criteria.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
