Execute GNQL Query:
  ai_description: >-
    ### General Description

    Executes custom GreyNoise Query Language (GNQL) queries against the GreyNoise
    API to search and retrieve threat intelligence data. This action allows users
    to perform broad searches across the GreyNoise dataset, supporting pagination
    to handle large result sets.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `GNQL Query`, `Max Results`,
    `Quick`, and `Exclude Raw` parameters.

    2. **Validation**: The `Max Results` parameter is validated to ensure it is a
    positive integer.

    3. **API Initialization**: An instance of the `APIManager` is initialized using
    the configured GreyNoise API key.

    4. **Query Execution**: The action calls the GreyNoise API to execute the provided
    GNQL query. It automatically handles pagination using scroll tokens until the
    requested number of results is reached or no more data is available.

    5. **Data Aggregation**: Fetched records are aggregated into a list.

    6. **Result Output**: The final dataset is returned as a JSON result, and an output
    message summarizing the execution is provided.


    ### Additional Notes

    This action is intended for general threat intelligence searching and data retrieval.
    It does not perform enrichment on specific entities within the case, nor does
    it modify any external or internal system state.
  ai_short_description: >-
    Executes custom GNQL queries to search and retrieve threat intelligence data from
    GreyNoise.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
