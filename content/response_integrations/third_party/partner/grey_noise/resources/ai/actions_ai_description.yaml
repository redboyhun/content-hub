Get CVE Details:
  ai_description: >-
    ### General Description

    Enriches CVE entities using GreyNoise intelligence. This action retrieves detailed
    threat intelligence for specified CVE identifiers, including CVSS scores, EPSS
    scores, and active threat data. It updates the entity's properties with this information
    and generates an HTML insight for the analyst to review directly within the case.


    ### Flow Description

    1. Retrieve all CVE entities from the current case.

    2. Validate the format of each CVE identifier (expected format: CVE-YYYY-NNNN).

    3. Query the GreyNoise API for detailed CVE information using the `cve_lookup`
    method.

    4. If data is found, update the entity's `additional_properties` with enrichment
    data (e.g., CVSS score, EPSS score, threat activity).

    5. Mark the entity as enriched (`is_enriched = True`).

    6. Generate an HTML insight containing the retrieved CVE details and attach it
    to the entity using `siemplify.add_entity_insight`.

    7. Update the entities in the case using `siemplify.update_entities`.

    8. Add the raw result JSON to the action results.


    ### Additional Notes

    This action requires a valid GreyNoise API key configured in the integration settings.
    It specifically targets entities of type 'CVE' and will skip or report failures
    for invalid formats or entities not found in the GreyNoise dataset.
