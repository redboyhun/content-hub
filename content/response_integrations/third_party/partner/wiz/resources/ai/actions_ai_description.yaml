Ignore Issue:
  ai_description: >-
    ### General Description

    Ignores a specified issue in Wiz by updating its status to 'REJECTED'. This action
    allows users to mark issues as false positives, exceptions, or 'won't fix' with
    an accompanying note, effectively managing the issue lifecycle within the Wiz
    platform.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Issue ID`, `Resolution Reason`,
    and `Resolution Note` from the provided input.

    2. **Validation**: The `Resolution Reason` is validated against the allowed values
    (False Positive, Exception, Won't Fix).

    3. **API Initialization**: The action initializes the Wiz API client using the
    provided integration configuration.

    4. **Mutation Execution**: The action performs a GraphQL mutation (`updateIssue`)
    to the Wiz API, setting the issue status to 'REJECTED' and applying the provided
    resolution reason and note.

    5. **Result**: The action returns the updated issue details and provides a success
    message.


    ### Additional Notes

    This action only works on Graph Control or Cloud Configuration issues within Wiz.
