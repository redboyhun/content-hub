Ignore Issue:
  ai_description: >-
    ### General Description

    This action ignores a specified issue in the Wiz platform by updating its status
    to 'REJECTED'. It allows users to provide a resolution reason and an optional
    note to document why the issue is being ignored.


    ### Flow Description

    1. Extracts the `Issue ID`, `Resolution Reason`, and `Resolution Note` from the
    action parameters.

    2. Validates the `Resolution Reason` against allowed values.

    3. Initializes the Wiz API client using the provided integration configuration.

    4. Constructs a GraphQL mutation to update the issue status to 'REJECTED' in the
    Wiz platform.

    5. Executes the mutation via an HTTP POST request to the Wiz API.

    6. Returns the updated issue details as a JSON result.


    ### Additional Notes

    This action is specifically designed for Graph Control or Cloud Configuration
    issues within Wiz.
