Add Comment To Issue:
  ai_description: >-
    General Description

    Adds a comment to a specified issue in the Wiz platform.


    Flow Description

    1. Extracts the `Issue ID` and `Comment` parameters from the action configuration.

    2. Initializes the Wiz API client using the provided integration credentials.

    3. Constructs a GraphQL mutation (`CreateIssueComment`) containing the `Issue
    ID` and the `Comment` text.

    4. Executes a POST request to the Wiz API endpoint to apply the comment to the
    specified issue.

    5. Returns the result of the mutation, confirming the comment has been added.


    Additional Notes

    This action performs a direct mutation on the Wiz platform. Ensure the `Issue
    ID` is valid and the API credentials have sufficient permissions to modify issues.
