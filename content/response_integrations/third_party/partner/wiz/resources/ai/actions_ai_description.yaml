    external_data_mutation_explanation: >-
      Adds a comment to an existing issue in the Wiz platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the Wiz API to add a comment to an issue,
      which constitutes an external data mutation. It does not fetch data, update
      internal entities, or modify alert data.
  categories:
