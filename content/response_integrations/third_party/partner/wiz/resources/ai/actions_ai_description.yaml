Add Comment To Issue:
  ai_description: >-
    ### General Description

    Adds a comment to a specified issue within the Wiz platform. This action allows
    analysts to append notes or updates directly to existing issues in Wiz, facilitating
    better communication and tracking of security findings.


    ### Flow Description

    1. The action extracts the `Issue ID` and `Comment` parameters provided by the
    user.

    2. An API client is initialized to authenticate and communicate with the Wiz API.

    3. The action constructs a GraphQL mutation using the `AddCommentThreadMutationBuilder`
    to target the specified issue.

    4. A POST request is sent to the Wiz GraphQL endpoint to execute the mutation
    and add the comment.

    5. The result of the operation is returned, confirming the comment has been added
    to the issue.


    ### Additional Notes

    This action performs a mutation on an external system (Wiz) and does not modify
    any internal Google SecOps data or entities.
  ai_short_description: >-
    Adds a comment to a specified issue in the Wiz platform.
