URL-Reject:
  ai_description: >-
    General Description: Rejects DRP (Digital Risk Protection) violation URLs associated
    with the current alert. This action interacts with the Group-IB DRP API to update
    the status of identified violations.


    Flow Description:

    1. Initializes the DRP connector using integration credentials.

    2. Parses the current alert's security events to map violation URLs to their corresponding
    violation UIDs.

    3. Iterates through the target entities, filtering for `DestinationURL` types.

    4. For each valid entity, retrieves the associated violation UID.

    5. Sends a POST request to the DRP API (`violation/change-approve`) with `approve=False`
    to reject the violation.

    6. Aggregates results and completes the action.


    Additional Notes: Requires valid DRP API credentials. Failures for individual
    entities are logged but do not stop the processing of other entities.
