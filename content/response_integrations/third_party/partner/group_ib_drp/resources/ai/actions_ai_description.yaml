Ping:
  ai_description: >-
    ### General Description

    Verifies connectivity to the Group-IB DRP API. This action ensures that the integration
    is correctly configured and can successfully communicate with the external Group-IB
    DRP service.


    ### Flow Description

    1. Initializes the `SiemplifyAction` and `GIBConnector`.

    2. Retrieves configuration parameters (API login, API key, API URL, Verify SSL)
    from the integration settings.

    3. Configures a `DRPPoller` instance using the retrieved parameters.

    4. Executes a `GET` request to the `violation/list` endpoint to test connectivity.

    5. Logs the result and terminates the action with a success or failure status.


    ### Additional Notes

    This action is used to validate that the integration is correctly configured and
    can communicate with the external Group-IB DRP service. It does not perform any
    data processing or entity enrichment.
