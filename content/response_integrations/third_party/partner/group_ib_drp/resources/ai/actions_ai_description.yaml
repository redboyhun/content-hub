Ping:
  ai_description: >-
    ### General Description

    Verifies connectivity to the Group-IB DRP API. This action is a diagnostic tool
    used to ensure that the integration is correctly configured and can communicate
    with the external Group-IB DRP service.


    ### Flow Description

    1. Initializes the `SiemplifyAction` and the `GIBConnector`.

    2. Retrieves the integration configuration parameters, including the API login,
    API key, API URL, and SSL verification settings.

    3. Configures the DRP poller using the retrieved credentials.

    4. Executes a GET request to the `violation/list` endpoint to test the connection.

    5. Logs the outcome of the request and terminates the action with either a success
    or failure status.


    ### Additional Notes

    This action does not perform any data processing or modification. It is strictly
    used for troubleshooting and verifying the integration's connectivity.
