Get Violation Details:
  ai_description: >-
    ### General Description

    Fetches detailed violation information from the Group-IB DRP platform for `DestinationURL`
    entities. This action retrieves comprehensive data regarding brand protection
    violations, including status, risk scores, and detection dates, and presents this
    information as a case insight.


    ### Flow Description

    1. Initializes the `GIBConnector` to establish a connection to the Group-IB DRP
    API using configured integration credentials.

    2. Parses the current alert's security events to build a mapping of violation
    URLs to their corresponding violation UIDs.

    3. Iterates through all `DestinationURL` entities in the case.

    4. For each entity, retrieves the associated violation UID from the previously
    built map.

    5. Calls the `search_feed_by_id` API method to fetch detailed violation data (e.g.,
    status, risk scores, detection dates).

    6. Generates a case insight containing the retrieved violation details.

    7. Aggregates all successful results into a JSON list and attaches it to the action
    result.


    ### Additional Notes

    The action requires valid Group-IB DRP integration configuration (API login, API
    key, API URL). It specifically targets `DestinationURL` entities and relies on
    `violation_url` and `violation_uid` properties within the alert's security events.
  ai_short_description: >-
    Fetches detailed violation information from Group-IB DRP for DestinationURL entities
    and creates case insights.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates case insights for each processed entity.
    reasoning: >-
      The action makes a GET request to the Group-IB DRP API to fetch violation data.
      It does not mutate external data but creates internal case insights for each
      processed entity.
