URL-Approve:
  ai_description: >-
    ### General Description

    Approves DRP violation URLs in the Group-IB DRP system. This action allows analysts
    to confirm and approve detected violations directly from the SOAR platform, facilitating
    the management of digital risk protection alerts.


    ### Flow Description

    1. Initialize the DRP connector using provided configuration parameters (API login,
    API key, API URL, and Verify SSL).

    2. Retrieve the list of target entities from the current alert.

    3. Parse the alert's security events to build a mapping of URLs to their corresponding
    violation UIDs.

    4. Iterate through the target entities, filtering specifically for 'DestinationURL'
    types.

    5. For each valid URL, send a POST request to the DRP API (`violation/change-approve`)
    to approve the violation.

    6. Aggregate the results (approved, failed, or unmapped) and update the action
    output with a summary message.


    ### Additional Notes

    Failures of individual entities do not abort the action; they are aggregated into
    the final output message. The action exits with a failed status only if at least
    one entity could not be approved.
  ai_short_description: >-
    Approves DRP violation URLs in the Group-IB DRP system.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
