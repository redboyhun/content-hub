URL-Reject:
  ai_description: >-
    ### General Description

    Rejects DRP (Digital Risk Protection) violation URLs by interacting with the Group-IB
    DRP API. This action allows analysts to programmatically reject violations that
    have been identified as false positives or are otherwise deemed safe, directly
    from the SOAR platform.


    ### Flow Description

    1. **Initialization**: The action initializes the `GIBConnector` using the configured
    API credentials (API login, API key, API URL, and SSL verification settings).

    2. **Data Parsing**: It parses the current alert's security events to build a
    mapping between violation URLs and their corresponding violation UIDs.

    3. **Entity Processing**: The action iterates over the target entities, filtering
    specifically for `DestinationURL` types.

    4. **API Interaction**: For each matching entity, it sends a POST request to the
    DRP API endpoint `violation/change-approve` with the payload `{"violationId":
    uid, "approve": False}` to reject the violation.

    5. **Result Aggregation**: The action aggregates the outcomes (rejected, failed,
    or unmapped) and updates the execution status. If any entity fails to be rejected,
    the action exits with a failed status.


    ### Additional Notes

    This action requires valid API credentials for the Group-IB DRP platform. It assumes
    that the alert contains the necessary violation metadata (violation_url and violation_uid)
    within its security events.
