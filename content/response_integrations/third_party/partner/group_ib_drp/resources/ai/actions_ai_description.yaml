URL-Approve:
  ai_description: >-
    ### General Description

    Approves DRP (Digital Risk Protection) violation URLs within the Group-IB DRP
    platform. This action allows analysts to programmatically approve violations that
    have been identified as threats, facilitating the management of brand protection
    alerts.


    ### Flow Description

    1. Initialize the DRP connector using integration credentials.

    2. Retrieve target entities from the current alert.

    3. Parse the alert's security events to map URLs to their corresponding violation
    UIDs.

    4. Iterate through the target entities, filtering for `DestinationURL` types.

    5. For each matching entity, send a POST request to the DRP API (`violation/change-approve`)
    to approve the violation.

    6. Aggregate the results and terminate the action with a status based on success/failure.


    ### Additional Notes

    This action requires the Group-IB DRP integration to be configured with valid
    API credentials. It does not perform any internal modifications to the SOAR case
    data.
