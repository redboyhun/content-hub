Get Violation Details:
  ai_description: >-
    ### General Description

    Fetches Digital Risk Protection (DRP) violation details for `DestinationURL` entities
    using the Group-IB DRP API. This action retrieves comprehensive metadata regarding
    identified violations, such as status, risk scores, brand information, and detection
    dates, to provide analysts with context on potential threats.


    ### Flow Description

    1. **Initialization**: Initializes the `GIBConnector` to establish a connection
    with the Group-IB DRP API.

    2. **Data Mapping**: Builds a lookup map (`url_to_uid`) by parsing `additional_properties`
    from the current alert's security events to associate URLs with their respective
    violation UIDs.

    3. **Entity Processing**: Iterates through the target entities, filtering specifically
    for those of type `DestinationURL`.

    4. **API Interaction**: For each valid entity, retrieves the corresponding violation
    UID from the map and calls the `DRPPoller.search_feed_by_id` method to fetch detailed
    violation data from the external Group-IB DRP service.

    5. **Insight Creation**: Generates a case insight for each successfully fetched
    violation, summarizing key details like status, violation type, and risk scores.

    6. **Result Aggregation**: Compiles all retrieved violation data into a JSON list
    and attaches it to the action result.


    ### Additional Notes

    This action relies on the presence of `violation_url` and `violation_uid` within
    the alert's security event properties. If a `DestinationURL` entity does not have
    a corresponding UID in the alert data, the action will fail for that specific
    entity. No direct user-input parameters are required for this action as it operates
    on existing alert and entity data.
  ai_short_description: >-
    Fetches detailed violation information for DestinationURL entities from the Group-IB
    DRP platform and creates case insights.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates case insights within the SOAR platform.
    reasoning: >-
      The action performs a GET request to the Group-IB DRP API to fetch violation
