Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ANY.RUN TI Feeds service by verifying the provided API
    key and configuration. This action ensures that the integration is correctly authenticated
    and able to communicate with the external service.


    ### Flow Description

    1. Extracts configuration parameters: API key, SSL verification setting, and proxy
    settings.

    2. If proxy is enabled, validates the proxy configuration by attempting a connection.

    3. Initializes the `FeedsConnector` with the provided API key and settings.

    4. Calls `connector.check_authorization()` to verify the connection to the ANY.RUN
    service.

    5. Logs the result and terminates the action with a success or failure status.


    ### Additional Notes

    This action is used for troubleshooting and verifying integration configuration.
  ai_short_description: >-
    Tests connectivity to the ANY.RUN TI Feeds service by verifying the provided API
    key and configuration.
