Ping:
  ai_description: >-
    ### General Description

    Tests connectivity between the Google SecOps environment and the ANY.RUN TI Feeds
    service. This action verifies that the provided API credentials are valid and
    that the network configuration (including proxy settings, if applicable) allows
    for successful communication with the external service.


    ### Flow Description

    1. The action extracts configuration parameters, including the ANY.RUN TI Feeds
    API key, SSL verification preference, and proxy settings.

    2. If 'Enable proxy' is configured, the action validates the proxy host and port,
    then attempts to establish a connection to the proxy using the `FeedsConnector`
    to verify proxy reachability.

    3. If no proxy is used, or after proxy validation, the action initializes the
    `FeedsConnector` with the provided API key and SSL settings.

    4. The action calls the `connector.check_authorization()` method to perform an
    authentication handshake with the ANY.RUN service.

    5. Based on the outcome of the connection attempt, the action logs the result
    and terminates with either a success or failure status.


    ### Additional Notes

    This action is strictly a connectivity test (Ping) and does not perform any data
    retrieval, enrichment, or remediation tasks. It is intended for troubleshooting
    integration configuration issues.
  ai_short_description: >-
    Tests connectivity to the ANY.RUN TI Feeds service.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
