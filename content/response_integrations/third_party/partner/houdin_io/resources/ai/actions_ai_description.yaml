Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches compatible entities (Public IPv4/IPv6, URL, Domain, MD5, SHA1, SHA256)
    by initiating and retrieving scan results from the Houdin.io platform. This action
    automates the process of gathering threat intelligence and AI-driven analysis
    for indicators found in the case, updating the entities with relevant threat scores
    and analysis summaries.


    ### Flow Description

    1. The action extracts the API key and the optional `scanOn` parameter (a list
    of scanners to use).

    2. It iterates through the target entities and filters for compatible types: URL,
    external IP addresses, Domain, and File Hashes.

    3. For each compatible entity, it initiates a scan by sending a POST request to
    the Houdin.io API (`scan/launch`).

    4. The action collects the scan IDs and polls the Houdin.io API (`scan/result`)
    via GET requests to retrieve the analysis results.

    5. Once results are retrieved, it updates the entity's `additional_properties`
    with the `Houdin-io_Threat_Score`, `Houdin-io_AI_Analysis`, and `Houdin-io_Analysis_sources`.

    6. Finally, it updates the entities in the SOAR platform and returns the results
    as a JSON object.


    ### Additional Notes

    This action is designed to run asynchronously. Users should adjust the script
    timeout value in the Google SecOps IDE if necessary to accommodate the polling
    duration.
  ai_short_description: >-
    Enriches entities by initiating and retrieving threat intelligence scans from
    Houdin.io.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: >-
      Initiates a new scan job on the Houdin.io platform via a POST request.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action fetches data from Houdin.io (GET requests for results). It performs
      a state-changing operation on the external system by initiating a scan (POST
      request). It updates internal entities with the retrieved data using `siemplify.update_entities`.
  entity_usage:
