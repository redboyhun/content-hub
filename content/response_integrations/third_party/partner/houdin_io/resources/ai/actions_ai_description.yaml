Scan Artifact:
  ai_description: >-
    ### General Description

    Launch a scan on a given artifact (IPv4, IPv6, URL, Domain, MD5, SHA1, SHA256)
    using the Houdin.io platform and retrieve the results. This action allows analysts
    to perform automated threat analysis on various indicators of compromise.


    ### Flow Description

    1. Extracts the `artifact` and optional `scanOn` parameters from the action configuration.

    2. Initializes the `HoudinManager` with the provided API key.

    3. Calls `launch_scan` (POST request) to initiate the scan on the Houdin.io platform.

    4. Polls for the scan result using `poll_scan_result` (GET request) until the
    scan is completed.

    5. Adds the retrieved scan result to the SOAR platform using `add_result_json`
    and `add_json`.


    ### Additional Notes

    This action is asynchronous. Adjust the script timeout in the Google SecOps IDE
    as needed.
  ai_short_description: >-
    Launches a scan on a specified artifact using the Houdin.io platform and retrieves
    the analysis results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Triggers a new scan on the Houdin.io platform via a POST request.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds scan results to the SOAR platform using add_result_json.
    reasoning: >-
      The action makes a POST request to trigger a scan (can_mutate_external_data=true)
      and a GET request to poll for results (fetches_data=true). It also adds results
      to the SOAR platform (can_mutate_internal_data=true).
  categories:
    enrichment: false
    reasoning: >-
      The action triggers a scan on an external platform (Houdin.io) via a POST request,
      which constitutes an external data mutation. Therefore, it cannot be classified
      as an Enrichment action. It is classified as a Remediation action because it
      includes the `submit_file` capability, which is explicitly listed in the remediation
      criteria.
    remediation: true
