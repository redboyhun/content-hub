Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities (Public IP, URL, Domain, File Hash) using the Houdin.io platform.
    This action scans the provided entities to retrieve threat intelligence, including
    threat scores, AI analysis summaries, and analysis sources. The results are then
    updated as additional properties on the entities within Google SecOps.


    ### Flow Description

    1. The action extracts the API key and the `scanOn` parameter (a list of scanners
    to use) from the configuration.

    2. It iterates through the target entities and filters for compatible types: URL,
    External IP, Domain, File Hash, and DestinationURL.

    3. For each compatible entity, the action initiates a scan by sending a POST request
    to the Houdin.io `scan/launch` endpoint.

    4. The action collects the `scanID` for each initiated scan.

    5. It then polls the Houdin.io `scan/result` endpoint (GET request) for each `scanID`
    until the results are retrieved.

    6. The retrieved threat score, AI analysis, and sources are parsed and added to
    the entity's `additional_properties`.

    7. Finally, the action updates the entities in Google SecOps and adds the full
    JSON results to the action output.


    ### Additional Notes

    This action is asynchronous. If the scan takes longer than the default timeout,
    the script timeout value in the Google SecOps IDE should be adjusted accordingly.
  ai_short_description: >-
    Enriches entities (IP, URL, Domain, File Hash) by launching and polling scans
    on the Houdin.io platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Creates a scan job on the Houdin.io platform.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with threat intelligence data.
    reasoning: >-
      The action fetches data by polling for scan results (GET). It mutates external
      data by creating a scan job (POST). It mutates internal data by updating entity
      additional properties.
  categories:
    enrichment: false
    reasoning: >-
      The action initiates a scan job on an external platform (Houdin.io) via a POST
      request, which constitutes creating data (a scan job) on an external system.
      Therefore, it does not meet the strict 'Read-Only' criteria for an Enrichment
      action. It also does not perform any remediation actions like blocking or isolating.
      Thus, both enrichment and remediation flags are set to false.
    remediation: false
