Scan Artifact:
  ai_description: >-
    ### General Description

    Launches a scan on a specified artifact using the Houdin.io platform. This action
    allows users to submit various types of artifacts (such as IP addresses, URLs,
    domains, or file hashes) for analysis by multiple security scanners. It operates
    asynchronously, initiating the scan and polling for results until completion.


    ### Flow Description

    1. The action extracts the `artifact` and optional `scanOn` parameters from the
    action configuration.

    2. It initiates a scan request to the Houdin.io API via a POST request to the
    `/scan/launch` endpoint.

    3. The action then polls the Houdin.io API via a GET request to the `/scan/result`
    endpoint until the scan status indicates completion.

    4. Finally, the retrieved scan results are added to the action output using `add_result_json`
    and `add_json`.


    ### Additional Notes

    This action is asynchronous and may require adjusting the script timeout in the
    Google SecOps IDE to accommodate the scan duration.
  ai_short_description: >-
    Launches a scan on a specified artifact using the Houdin.io platform and retrieves
    the results.
