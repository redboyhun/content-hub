Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Houdin.io API to ensure the integration is configured
    correctly. This action verifies that the provided API credentials are valid and
    that the SOAR platform can successfully communicate with the Houdin.io service.


    ### Flow Description

    1. The action initializes the `HoudinManager` using the provided `API Key` and
    `Verify SSL` configuration parameters.

    2. It calls the `test_connectivity` method, which performs a POST request to the
    Houdin.io API ping endpoint (`/api/v1/ping`).

    3. If the API returns a 200 OK status, the connection is confirmed as established.

    4. If the API returns a 500 status, the action performs a single retry attempt.

    5. If the connection fails or an error occurs, the action catches the exception,
    logs the error, and marks the execution as failed.


    ### Additional Notes

    This action is intended for troubleshooting and verifying the health of the integration.
    It does not perform any data enrichment or state-changing operations on entities
    or external systems.
  ai_short_description: >-
    Tests the connectivity to the Houdin.io API to verify integration health.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a network request to verify connectivity. It does not fetch
      contextual data, mutate external or internal data, update entities, create insights,
      or modify alerts.
