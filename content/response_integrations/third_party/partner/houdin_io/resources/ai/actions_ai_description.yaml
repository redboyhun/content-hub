Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Houdin.io API to ensure the integration is configured
    correctly and the service is reachable. This action validates the provided API
    credentials and network connectivity.


    ### Flow Description

    1. The action extracts the 'API Key' and 'Verify SSL' parameters from the integration
    configuration.

    2. It initializes the `HoudinManager` using the provided credentials.

    3. The action calls the `test_connectivity` method, which performs a POST request
    to the Houdin.io API ping endpoint (`/api/v1/ping`).

    4. If the API returns a 200 status code, the action reports a successful connection.

    5. If the connection fails or returns an error, the action catches the exception
    and reports the failure.


    ### Additional Notes

    This action is strictly for connectivity testing and does not perform any data
    enrichment or remediation tasks. It is intended for administrative use to verify
    integration health.
  ai_short_description: Tests connectivity to the Houdin.io API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a network request to verify connectivity but does not fetch
      contextual data for entities, nor does it mutate any external or internal data.
  categories:
    enrichment: false
    reasoning: >-
      The action is a 'Ping' action designed solely to test connectivity. According
      to the provided guidelines, actions named 'Ping' must not be categorized as
      enrichment actions. It does not perform any remediation or state-changing operations.
    remediation: false
