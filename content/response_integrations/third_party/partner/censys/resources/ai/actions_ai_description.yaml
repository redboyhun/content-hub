Initiate Rescan:
  ai_description: >-
    General Description: Initiates a live rescan for a known host service or web origin
    using the Censys API. This action triggers a scan on a specified IP or domain
    at a given port, allowing users to obtain up-to-date information about the target.


    Flow Description:

    1. Extract action parameters: `IOC Type`, `IOC Value`, `Port`, `Protocol`, and
    `Transport Protocol`.

    2. Validate the provided parameters, ensuring the port is within the valid range
    (1-65535) and required fields are present based on the `IOC Type`.

    3. Initialize the `APIManager` with the configured API key and organization ID.

    4. Call the Censys API (`POST /v3/global/scans/rescan`) to initiate the rescan.

    5. Process the API response to extract the `tracked_scan_id` and task details.

    6. Add the raw API response to the action results and return a status message
    indicating success or failure.


    Additional Notes:

    The scan may take several minutes to complete. The returned `tracked_scan_id`
    can be used to monitor the scan's status using the `Get Rescan Status` action.
