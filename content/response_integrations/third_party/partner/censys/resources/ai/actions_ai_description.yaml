Get Related Infrastructure Job Status:
  ai_description: >-
    ### General Description

    Retrieves the current status of a CensEye job from the Censys platform using a
    provided Job ID. This action is designed for asynchronous workflows, allowing
    playbooks to poll for job completion.


    ### Flow Description

    1. Extracts the `Job ID` parameter from the action configuration.

    2. Initializes the `APIManager` with integration credentials.

    3. Calls the Censys API (`GET /v3/threat-hunting/censeye/jobs/{job_id}`) to retrieve
    the current status of the specified job.

    4. Parses the API response to determine the job state (`COMPLETED`, `FAILED`,
    or `INPROGRESS`).

    5. Adds the raw API response to the action results for further processing.

    6. Sets the final execution status and output message based on the job state.


    ### Additional Notes

    This action is intended for use in polling loops to monitor long-running CensEye
    threat hunting jobs. It does not perform any modifications to the job or external
    systems.
