Enrich Certificates:
  ai_description: >-
    ### General Description

    Enriches FILEHASH entities (specifically SSL/TLS certificate SHA-256 fingerprints)
    using the Censys Platform API. This action retrieves comprehensive certificate
    intelligence, including issuer, subject, validity periods, and Subject Alternative
    Names (SANs), to provide context for security investigations.


    ### Flow Description

    1. The action extracts all FILEHASH entities from the current case scope.

    2. It validates the certificate IDs, ensuring they are 64-character SHA-256 fingerprints.

    3. It calls the Censys API (`/v3/global/asset/certificate`) to fetch intelligence
    for the valid certificate IDs.

    4. The API response is processed to extract relevant certificate metadata.

    5. The action updates the entity's `additional_properties` with the retrieved
    enrichment data and marks the entity as enriched.

    6. Finally, the action adds the detailed JSON results to the action output and
    updates the entities in the SOAR platform.


    ### Additional Notes

    This action requires a valid Censys API Key and Organization ID configured in
    the integration settings. It does not perform any external mutations and is strictly
    used for enrichment purposes.
