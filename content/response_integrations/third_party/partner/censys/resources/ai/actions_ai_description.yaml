Get Related Infrastructure Results:
  ai_description: >-
    ### General Description

    Retrieves the detailed pivot results from a completed CensEye job in Censys, formats
    them into a table, and generates Censys search URLs for each pivot.


    ### Flow Description

    1. Extracts the `Job ID` parameter from the action configuration.

    2. Initializes the `APIManager` with integration credentials.

    3. Calls the Censys API (`GET /v3/threat-hunting/censeye/jobs/{job_id}/results`)
    to retrieve job results.

    4. Adds the raw JSON response to the action results.

    5. Processes the results into a data table (CSV format) containing pivot fields,
    values, asset counts, and Censys search URLs.

    6. Returns a summary message indicating the number of pivots retrieved and total
    assets.


