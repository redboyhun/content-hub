Get Related Infrastructure Results:
  ai_description: >-
    ### General Description

    This action retrieves the detailed pivot results from a completed CensEye job,
    formats them into a table with 5 columns, and generates Censys search URLs for
    each pivot.


    ### Flow Description

    1. Extracts the `Job ID` parameter.

    2. Initializes `APIManager` with integration credentials.

    3. Calls the Censys API (`GET /v3/threat-hunting/censeye/jobs/{job_id}/results`)
    to retrieve job results.

    4. Adds the raw JSON response to the action results.

    5. Processes the results into a `RelatedInfraResultModel` to format data (fields,
    values, asset counts) and generate clickable Censys search URLs.

    6. Adds a data table titled "Related Infrastructure Pivots" to the action results.

    7. Returns a summary message indicating success or failure.


