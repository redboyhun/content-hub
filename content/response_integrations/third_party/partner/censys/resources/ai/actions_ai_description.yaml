Get Host History:
  ai_description: >-
    ### General Description

    Retrieves historical event data for a specific host (IP address) from Censys.
    This action allows users to view historical scan data, track infrastructure changes
    over time, and identify when services were added, removed, or modified.


    ### Flow Description

    1. Extract `Host ID`, `Start Time`, and `End Time` parameters from the action
    configuration.

    2. Validate the `Host ID` (IP address) and ensure `Start Time` and `End Time`
    are valid RFC3339 timestamps.

    3. Initialize the `APIManager` and perform a GET request to the Censys API endpoint
    (`/v3/global/asset/host/{host_id}/timeline`).

    4. Handle pagination to retrieve historical events, ensuring the time range is
    correctly processed (API expects reverse chronological order).

    5. Add the raw JSON response to the action results using `siemplify.result.add_result_json`.

    6. Format the event data into a data table and generate a descriptive output message.


    ### Additional Notes

    This action requires valid Censys API credentials (API Key and Organization ID).
    The action handles pagination automatically and provides warnings if partial data
    is collected or if record limits are reached.
