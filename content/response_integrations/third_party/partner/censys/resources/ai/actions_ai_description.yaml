Ping:
  ai_description: >-
    ### General Description

    This action tests the connectivity between the Google SecOps SOAR server and the
    Censys platform by performing a GET request to the Censys API.


    ### Flow Description

    1. The action initializes the `SiemplifyAction` and retrieves the required configuration
    parameters (`API Key`, `Organization Id`, `Verify SSL`).

    2. It instantiates the `APIManager` with the provided credentials.

    3. The action calls the `test_connectivity` method, which performs an authenticated
    GET request to the Censys API endpoint (`/v3/accounts/organizations/{organization_id}`).

    4. If the request is successful, it sets the connectivity result to `True` and
    returns a success message.

    5. If the request fails (e.g., authentication error, network issue), it catches
    the exception, sets the connectivity result to `False`, and returns an error message.


    ### Additional Notes

    This action does not interact with any entities and is used solely for verifying
    integration configuration.
