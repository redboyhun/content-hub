Enrich Certificates:
  ai_description: >-
    ### General Description

    Enriches `FILEHASH` entities (specifically SSL/TLS certificate fingerprints) using
    the Censys Platform API. It retrieves detailed certificate intelligence, including
    issuer, subject, validity periods, and Subject Alternative Names (SANs).


    ### Flow Description

    1. The action retrieves `FILEHASH` entities from the current scope.

    2. It validates the certificate IDs (SHA-256 fingerprints) to ensure they meet
    the required format.

    3. It calls the Censys API (`/v3/global/asset/certificate`) to fetch enrichment
    data for the valid certificate IDs.

    4. For each entity, it matches the API response to the entity identifier.

    5. It updates the entity's `additional_properties` with the retrieved certificate
    intelligence and marks the entity as enriched.

    6. Finally, it updates the entities in the SOAR platform and adds the results
    to the action output.


    ### Additional Notes

    Requires a valid Censys API Key and Organization ID. Only `FILEHASH` entities
    are processed by this action.
