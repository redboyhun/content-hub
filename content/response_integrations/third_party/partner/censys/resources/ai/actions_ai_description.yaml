    ### Flow Description

    1. Extracts `Host ID`, `Start Time`, and `End Time` parameters.

    2. Validates the IP address and RFC3339 timestamps.

    3. Initializes the `APIManager` and calls the Censys API to fetch host history
    events via a GET request to `/v3/global/asset/host/{host_id}/timeline`.

    4. Handles pagination if necessary, collecting up to 1000 records.

    5. Adds the raw JSON response to the action results.

    6. Processes events into a table format and adds it to the action results.

    7. Constructs and returns an output message summarizing the findings.


    ### Additional Notes

