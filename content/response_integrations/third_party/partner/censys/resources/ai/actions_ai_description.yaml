Create Related Infrastructure Job:
  ai_description: >-
    ### General Description

    Initiates a CensEye job to discover related infrastructure for a specified target
    (host, web property, or certificate). This action allows users to trigger asynchronous
    threat hunting jobs on the Censys platform.


    ### Flow Description

    1. Extracts `Target Type` and `Target Value` from action parameters.

    2. Validates the `Target Value` based on the selected `Target Type` (IP for Host,
    domain:port for Web Property, or SHA-256 for Certificate).

    3. Initializes the `APIManager` with integration credentials.

    4. Makes a `POST` request to the Censys API (`/v3/threat-hunting/censeye/jobs`)
    to create the job.

    5. Stores the API response in the action results using `siemplify.result.add_result_json`.

    6. Returns the job ID, state, and creation time in the output message.


    ### Additional Notes

    The job runs asynchronously. The returned job ID can be used in subsequent actions
    to monitor status and retrieve results.
  ai_short_description: >-
    Initiates a CensEye job to discover related infrastructure for a specified target
    (host, web property, or certificate).
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a new CensEye job on the Censys platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to create a job on the Censys platform (can_mutate_external_data=true).
      It does not fetch context data or update internal entities.
  categories:
    enrichment: false
    reasoning: >-
      The action initiates a job on an external platform (Censys). It does not retrieve
      data (enrichment) or perform remediation (blocking/containment).
    remediation: false
