Get Related Infrastructure Job Status:
  ai_description: >-
    ### General Description

    Retrieves the current status of a CensEye job from the Censys platform. This action
    is designed to support asynchronous workflows by allowing playbooks to poll for
    the status of a long-running threat hunting job until it reaches a terminal state
    (Completed or Failed).


    ### Flow Description

    1. The action extracts the `Job ID` parameter provided by the user.

    2. It initializes the `APIManager` to authenticate with the Censys platform using
    the configured API credentials.

    3. The action performs a `GET` request to the Censys API endpoint `/v3/threat-hunting/censeye/jobs/{job_id}`
    to retrieve the current job status.

    4. The API response is parsed to determine the job state (`completed`, `failed`,
    or other).

    5. The action updates the execution state of the playbook accordingly:
        - If the job is completed, it returns a success status with the result count.
        - If the job failed, it returns a failure status.
        - If the job is still in progress, it returns an in-progress status.
    6. The full API response is added to the action results for further analysis.


    ### Additional Notes

    This action does not modify any data in Censys or the SOAR platform. It is strictly
    a utility action for monitoring the progress of CensEye threat hunting jobs.
  ai_short_description: >-
    Retrieves the current status of a CensEye threat hunting job from the Censys platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to retrieve job status information. It does
      not mutate any external or internal data, nor does it update entities or create
      insights.
  categories:
