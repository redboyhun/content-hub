Create Related Infrastructure Job:
  ai_description: >-
    ### General Description

    Initiates a CensEye job to discover related infrastructure for a specified target
    (Host, Web Property, or Certificate) using the Censys platform. This action allows
    users to trigger asynchronous discovery tasks and retrieve a job identifier for
    monitoring.


    ### Flow Description

    1. Extracts `Target Type` and `Target Value` from the action parameters.

    2. Validates the `Target Value` based on the selected `Target Type` (IP address
    for Host, domain:port for Web Property, or SHA-256 fingerprint for Certificate).

    3. Initializes the `APIManager` with integration credentials.

    4. Sends a POST request to the Censys API (`/v3/threat-hunting/censeye/jobs`)
    to create the infrastructure discovery job.

    5. Adds the API response JSON to the action results.

    6. Returns a status message containing the Job ID, state, and creation time.


    ### Additional Notes

    This action runs asynchronously on the Censys platform. The returned Job ID should
    be used with subsequent actions to monitor status and retrieve results.
  ai_short_description: >-
    Initiates a CensEye job to discover related infrastructure for a specified host,
    web property, or certificate.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a new infrastructure discovery job in the Censys platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Censys API to initiate a job, which constitutes
      an external data mutation. It does not fetch contextual data, mutate internal
      data, or update entities/insights.
