    and the optional `At Time` parameter.

    2. Retrieves all `ADDRESS` type entities from the current case.

    3. Validates the IP addresses and filters out invalid formats.

    4. Calls the Censys API (`/v3/global/asset/host`) to fetch host intelligence for
    the valid IP addresses, optionally using the provided historical timestamp.

    5. Parses the API response and maps the data to internal `HostDatamodel` objects.

    6. Updates each entity's `additional_properties` with the retrieved enrichment
    data (e.g., services, ports, location, vulnerabilities) and marks the entity as
    enriched.

    7. Updates the entities within the SOAR platform and adds the raw JSON results
