Initiate Rescan:
  ai_description: >-
    ### General Description

    Initiates a live rescan for a known host service or web origin using the Censys
    API. This action triggers a scan on the specified target (IP or domain) and port,
    returning a scan ID for monitoring.


    ### Flow Description

    1. Extract action parameters: `IOC Type`, `IOC Value`, `Port`, `Protocol`, and
    `Transport Protocol`.

    2. Validate parameters (e.g., port range, IP format if Service type).

    3. Initialize `APIManager` with integration credentials.

    4. Call the Censys API `POST /v3/global/scans/rescan` endpoint with the provided
    target details.

    5. Add the API response to the action results using `siemplify.result.add_result_json`.

    6. Return a status message containing the `tracked_scan_id` and task details.


    ### Additional Notes

    The scan may take several minutes to complete. The returned scan ID can be used
    with the `Get Rescan Status` action to monitor progress.
