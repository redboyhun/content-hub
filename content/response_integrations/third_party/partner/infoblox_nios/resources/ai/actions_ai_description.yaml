Create RPZ CNAME Rule:
  ai_description: >-
    ### General Description

    This action creates a CNAME rule within a specified Response Policy Zone (RPZ)
    on an Infoblox NIOS appliance. It allows users to define DNS behavior overrides,
    such as blocking domains or substituting names, by interacting with the Infoblox
    WAPI.


    ### Flow Description

    1. Extracts configuration parameters (API root, credentials) and action parameters
    (Name, RP Zone, Rule Type, Object Type, etc.).

    2. Validates required inputs (`Name`, `RP Zone`).

    3. Initializes the `APIManager` to communicate with the Infoblox NIOS API.

    4. Constructs the API request payload based on the provided `Rule Type` and `Object
    Type`.

    5. Executes a POST request to the appropriate Infoblox WAPI endpoint (`/record:rpz:cname`,
    `/record:rpz:cname:ipaddress`, or `/record:rpz:cname:clientipaddress`).

    6. Adds the raw API response to the action results using `add_result_json`.

    7. Formats the created rule details into a data table and adds it to the action
    results using `add_data_table`.


    ### Additional Notes

    This action modifies the external Infoblox configuration by adding a new RPZ rule.
    It does not perform any data retrieval or enrichment of existing entities.
