Create Host Record:
  ai_description: >-
    ### General Description

    Creates a host record in Infoblox NIOS. This action allows users to register a
    new host in the IPAM system, optionally configuring DNS records (A/AAAA/PTR) and
    setting extended attributes.


    ### Flow Description

    1. Extracts configuration parameters (API root, credentials) from the integration
    settings.

    2. Extracts action parameters (Name, IPv4/IPv6 addresses, View, Comment, Aliases,
    etc.) from the action configuration.

    3. Validates required inputs and formats parameters, including parsing IP address
    objects and extended attributes.

    4. Initializes the `APIManager` and calls `create_host_record` to perform a POST
    request to the Infoblox API.

    5. Adds the resulting host record data to the action result as JSON and a data
    table.


    ### Additional Notes

    Requires Infoblox NIOS integration configuration. The 'Name' parameter must be
    in FQDN format and belong to an existing DNS zone.
  ai_short_description: >-
    Creates a host record in Infoblox NIOS with associated IP addresses and DNS configurations.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new host record in the Infoblox NIOS system.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the Infoblox API to create a host record,
      which is an external data mutation. It does not fetch data, update internal
      entities, or modify alert data.
