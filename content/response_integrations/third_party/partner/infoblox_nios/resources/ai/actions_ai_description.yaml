    ### General Description

    Creates an RPZ (Response Policy Zone) A rule in Infoblox NIOS. This action maps
    a domain name or an IPv4 address to a substitute IPv4 address, facilitating DNS
    redirection or blocking capabilities within the Infoblox environment.


    ### Flow Description

    1. Extracts action parameters: `Object Type`, `Name`, `RP Zone`, `IPv4 Address`,
    `Comment`, and `Additional Parameters`.

    2. Validates the required parameters and ensures the provided `IPv4 Address` is
    in a valid format.

    3. Initializes the `APIManager` to establish a connection with the Infoblox NIOS
    API.

    4. Determines the appropriate API endpoint and record type based on the selected
    `Object Type` (Domain Name or IP Address).

    5. Executes a POST request to the Infoblox API to create the RPZ A rule.

    6. Adds the raw API response as a JSON object to the action result.

    7. Constructs a data table containing the details of the created rule and adds
    it to the action result.


    ### Additional Notes

    This action is primarily used for DNS-based security enforcement, such as sinkholing
    malicious domains or redirecting traffic from specific IP addresses.
