Create Host Record:
  ai_description: >-
    ### General Description

    Creates a new host record in the Infoblox NIOS system. This action allows users
    to define a host name, associate it with IPv4 and IPv6 addresses, specify the
    DNS view, and add metadata such as comments, aliases, and extended attributes.
    It is primarily used for IPAM and DNS inventory management.


    ### Flow Description

    1. The action extracts the provided parameters: Name, IPv4 Addresses, IPv6 Addresses,
    View, Comment, Aliases, Configure for DNS, Extended Attributes, and Additional
    Parameters.

    2. It validates the input parameters, ensuring the host name is provided and that
    IP address objects and additional parameters are correctly formatted.

    3. The action initializes the `APIManager` with the integration's API credentials.

    4. It executes a `POST` request to the Infoblox API endpoint `/record:host` to
    create the host record with the specified details.

    5. The action adds the resulting JSON response to the action's output.

    6. If the creation is successful, it constructs a data table containing the host
    record details and adds it to the action results.


    ### Additional Notes

    This action performs a mutation on the external Infoblox NIOS system by creating
    a new record. It does not modify any internal Google SecOps entities or case data.
