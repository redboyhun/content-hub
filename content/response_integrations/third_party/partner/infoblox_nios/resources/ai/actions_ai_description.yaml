Create RPZ NAPTR Rule:
  ai_description: >-
    ### General Description

    Creates a NAPTR (Naming Authority Pointer) rule within a specified Response Policy
    Zone (RPZ) in Infoblox NIOS. This action is used to configure DNS-based service
    discovery overrides by defining NAPTR records that dictate how service discovery
    requests are processed.


    ### Flow Description

    1. Extracts configuration parameters (API root, credentials) and action parameters
    (RP Zone, Name, Order, Preference, Replacement, Comment, Additional Parameters).

    2. Validates the required parameters and ensures numeric fields (Order, Preference)
    are valid non-negative integers.

    3. Initializes the `APIManager` to communicate with the Infoblox NIOS API.

    4. Executes a `POST` request to the Infoblox API endpoint (`/record:rpz:naptr`)
    to create the NAPTR rule.

    5. Adds the result to the action output as a JSON object and a data table containing
    the created rule details.


    ### Additional Notes

    This action modifies the external Infoblox configuration. Ensure the provided
