Ping:
  ai_description: >-
    ### General Description

    This action performs a connectivity check (ping) against the Resolution Intelligence
    Cloud API. It validates the integration configuration by sending a POST request
    to the configured webhook URL to ensure the service is reachable.


    ### Flow Description

    1. Extract configuration parameters: `RI Inbound Webhook URL`, `Token`, and `Verify
    SSL` from the integration settings.

    2. Construct the target URL by replacing the `{token}` placeholder in the webhook
    URL with the provided token.

    3. Execute an HTTP POST request to the constructed URL.

    4. If the response status code is 200 or 400, the action concludes as successful.

    5. If the request fails or returns an unexpected status code, the action concludes
    as failed and returns the error details.


    ### Additional Notes

    This action does not interact with entities or modify any data; it is strictly
    for connectivity verification.
  ai_short_description: >-
    Performs a connectivity check (ping) against the Resolution Intelligence Cloud
    API to verify integration settings.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to verify connectivity. It does not fetch data,
      mutate external data, or update internal data.
