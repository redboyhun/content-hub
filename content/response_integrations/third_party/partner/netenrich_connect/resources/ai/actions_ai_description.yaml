Ping:
  ai_description: >-
    ### General Description

    Verifies connectivity to the Resolution Intelligence Cloud by sending a POST request
    to the configured inbound webhook URL. This action validates the connection and
    returns a success or failure status based on the HTTP response.


    ### Flow Description

    1. Extracts configuration parameters: `RI Inbound Webhook URL`, `Token`, and `Verify
    SSL`.

    2. Constructs the request URL by replacing the `{token}` placeholder in the webhook
    URL.

    3. Executes a POST request to the constructed URL.

    4. Checks the HTTP response status code.

    5. If the status code is 200 or 400, the action concludes as successful.

    6. If the status code is anything else, or if an exception occurs, the action
    concludes as failed, providing the error details.


    ### Additional Notes

    This is a connectivity test action and does not perform any data enrichment or
    remediation.
  ai_short_description: >-
    Verifies connectivity to the Resolution Intelligence Cloud by sending a POST request
    to the configured inbound webhook URL.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to verify connectivity. It does not fetch
      data for entities, mutate external system state, or modify internal SOAR data.
  categories:
    enrichment: false
    reasoning: >-
