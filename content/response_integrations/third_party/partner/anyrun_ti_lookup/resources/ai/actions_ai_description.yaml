  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Lookup Depth | String | Yes | Specify the number of days from the current date
    for which you want to lookup. |

    | Query | String | No | Raw query with necessary filters. Supports condition concatenation
    with AND, OR, NOT and Parentheses (). |

    | Identifiers | String | Yes | The target case entity identifiers. |

    | Types | String | Yes | The target case entity types. |
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ANY.RUN TI Lookup service by verifying the provided
    API key and optional proxy settings. This action ensures that the integration
    is correctly configured and can communicate with the external service.


    ### Flow Description

    1. Extracts the `ANYRUN TI Lookup API KEY` and `Verify SSL` configuration parameters.

    2. Checks if `Enable proxy` is configured. If enabled, it extracts the `Proxy
    host` and `Proxy port` and validates the proxy connection using the `LookupConnector`.

    3. Initializes the `LookupConnector` with the provided API key and SSL settings.

    4. Calls `connector.check_authorization()` to verify the API key's validity.

    5. Returns a success or failure message based on the outcome of the connectivity
    check.


    ### Additional Notes

    This action is a connectivity test and does not perform any data enrichment or
    remediation.
  ai_short_description: >-
    Tests connectivity to the ANY.RUN TI Lookup service.
  capabilities:
