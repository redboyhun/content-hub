    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity check (Ping) to verify the API key and proxy
      settings. It does not fetch data, mutate external systems, or modify internal
      SOAR data.
  categories:
    enrichment: false
    reasoning: >-
      The action is a 'Ping' action designed to test connectivity. Per the guidelines,
