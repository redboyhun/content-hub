    update_identity: false
    update_ticket: false
  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Lookup Depth | String | Yes | Specify the number of days from the current date
    for which you want to lookup. |

    | Query | String | No | Raw query with necessary filters. Supports condition concatenation
    with AND, OR, NOT and Parentheses (). |

    | Identifiers | String | Yes | The target case entity identifiers. |

    | Types | String | Yes | The target case entity types. |
Ping:
  ai_description: >-
    ### General Description

    This action tests the connectivity and authentication status of the ANY.RUN TI
    Lookup integration. It verifies the provided API key and, if configured, validates
    the proxy settings to ensure the integration can communicate with the ANY.RUN
    service.


    ### Flow Description

    1. Extracts configuration parameters: `ANYRUN TI Lookup API KEY`, `Verify SSL`,
    `Enable proxy`, `Proxy host`, and `Proxy port`.

    2. If `Enable proxy` is enabled, it attempts to connect to the proxy using the
    provided host and port via `LookupConnector.check_proxy()`.

    3. Calls `LookupConnector.check_authorization()` to validate the API key against
    the ANY.RUN service.

    4. Logs the outcome (success or failure) and terminates the action with the appropriate
    status.


    ### Additional Notes

    This action does not perform any data enrichment or entity processing; it is strictly
    for connectivity verification.
  ai_short_description: >-
    Tests connectivity and validates authentication for the ANY.RUN TI Lookup integration.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
