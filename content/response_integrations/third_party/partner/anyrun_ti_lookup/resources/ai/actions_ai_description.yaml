    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a connectivity check (ping) to verify the integration's
      configuration (API key and proxy settings). It does not fetch contextual data,
      mutate external/internal systems, or interact with entities.
