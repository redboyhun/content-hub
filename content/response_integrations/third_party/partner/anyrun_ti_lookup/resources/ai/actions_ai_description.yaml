ANYRUN TI Lookup:
  ai_description: >-
    ### General Description

    Performs threat intelligence lookups using the ANY.RUN platform for specified
    entities or custom queries. This action retrieves threat intelligence data, provides
    a summary verdict, and attaches the full JSON report to the case wall for further
    analysis.


    ### Flow Description

    1. The action extracts configuration parameters, including the API Key, Lookup
    Depth, and proxy settings.

    2. It identifies the target entities or custom query provided in the input parameters.

    3. The `LookupConnector` is initialized with the provided credentials and proxy
    configuration.

    4. The action calls the `get_intelligence` method to fetch threat data from the
    ANY.RUN platform.

    5. A comment is added to the case containing a direct link to the ANY.RUN lookup
    reference.

    6. The full JSON report is saved as an attachment to the case wall.

    7. The action returns a summary verdict (e.g., Suspicious, Malicious, Unknown)
    based on the threat level.


    ### Additional Notes

    This action supports multiple entity types, including IP addresses, domains, URLs,
    and file hashes, which are mapped to appropriate query parameters for the ANY.RUN
    platform.
  ai_short_description: >-
    Performs threat intelligence lookups on entities using the ANY.RUN platform and
    attaches the detailed report to the case.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds comments and attachments to the case wall.
    reasoning: >-
      The action makes a GET request to the ANY.RUN API to fetch threat intelligence.
      It does not mutate external data. It mutates internal data by adding comments
      and attachments to the case wall.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches threat intelligence data from an external source (ANY.RUN)
      and adds it to the case as a comment and attachment. It does not modify external
      systems or perform remediation. Therefore, it is classified as an enrichment
      action.
    remediation: false
