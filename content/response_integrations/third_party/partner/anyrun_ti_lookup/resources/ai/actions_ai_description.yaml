ANYRUN TI Lookup:
  ai_description: >-
    ### General Description

    Performs threat intelligence lookups against the ANY.RUN platform for specified
    entities or raw queries. This action retrieves threat intelligence data, including
    threat levels and summaries, to assist in security analysis and incident investigation.


    ### Flow Description

    1. Extracts configuration parameters (`Lookup Depth`, `Query`, `Identifiers`,
    `Types`) and API credentials from the integration settings.

    2. If a `Query` is provided, it executes a lookup directly using the query string.

    3. If no `Query` is provided, it parses the `Identifiers` and `Types` parameters
    to identify the target entities.

    4. For each entity, it maps the entity type to the corresponding ANY.RUN lookup
    type using the internal configuration.

    5. Calls the `LookupConnector.get_intelligence` API to fetch threat intelligence
    data from ANY.RUN.

    6. Adds a comment to the case containing a link to the lookup reference.

    7. Saves the raw JSON report as an attachment to the case wall.

    8. Appends a summary comment to the case detailing the results (Type, Value, Verdict)
    for all processed items.


    ### Additional Notes

    The action supports both direct queries and entity-based lookups. It requires
    an API key configured in the integration settings. The action does not modify
    the entities themselves but provides enrichment via case comments and attachments.
  ai_short_description: >-
    Performs threat intelligence lookups on entities or raw queries using the ANY.RUN
    platform and attaches the results to the case.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds comments and saves attachments to the case wall.
    reasoning: >-
      The action fetches threat intelligence data from an external API (fetches_data=true).
      It does not mutate external data. It mutates internal data by adding comments
      and saving attachments to the case wall (can_mutate_internal_data=true). It
      does not update entities, create insights, or modify alert data.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: true
      email_message: false
      event: false
      file_hash: true
      file_name: false
      generic: false
      host_name: false
      ip_set: true
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: true
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: true
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action extracts entity identifiers and types from action parameters, which
      are typically populated by the SOAR platform from the selected entities in the
      case. It iterates over these lists and performs lookups based on the entity
      type mapping defined in the configuration. It does not perform filtering on
      the `target_entities` list itself, so all filter flags are false.
  outcome_categories:
    add_alert_comment: true
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: true
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action fetches threat intelligence data from ANY.RUN, which matches the
      'Enrich IOC' category. It also adds comments and attachments to the case, which
      matches the 'Add Alert Comment' category.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
    search_email: false
    search_events: false
    send_email: false
