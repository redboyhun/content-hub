    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds computers to a computer group in Jamf Pro.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a PUT request to update a computer group in Jamf Pro (can_mutate_external_data=true).
      It does not fetch context data or update internal entities.
  categories:
