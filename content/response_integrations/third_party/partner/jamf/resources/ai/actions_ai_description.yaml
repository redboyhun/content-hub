Update Protect Prevent List:
  ai_description: >-
    ### General Description

    Updates an existing prevent list in Jamf Protect to block specified indicators,
    such as file hashes or signing information. This action allows security teams
    to dynamically manage blocklists by adding new indicators and tags to an existing
    list, ensuring that malicious artifacts are prevented from executing on managed
    endpoints.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Jamf Protect API credentials
    (API Root, Client ID, Client Secret) and SSL verification settings from the integration
    configuration.

    2. **Parameter Parsing**: It extracts action parameters, including the target
    prevent list name, description, prevent type, indicator data, and tags. The indicator
    data and tags are parsed from comma-separated strings into lists.

    3. **List Retrieval**: The action initializes the `JamfProtectManager` and fetches
    all existing prevent lists to locate the one matching the provided `Prevent List
    Name`.

    4. **Validation**: It validates that the prevent list exists, ensures the `Prevent
    Type` matches the existing list's type, and validates the format of the provided
    indicators (e.g., SHA-1/SHA-256 hashes, Team IDs).

    5. **Data Merging**: It merges the new indicators and tags with the existing ones,
    ensuring no duplicates are added.

    6. **Mutation**: The action executes a GraphQL mutation via the Jamf Protect API
    to update the prevent list with the combined values and tags.

    7. **Result Reporting**: The action returns the updated prevent list details in
    the result JSON.


    ### Additional Notes

    This action requires valid Jamf Protect API credentials. The `Prevent Type` must
    match the existing list's type, as it cannot be changed during an update. At least
    one indicator and one tag must be provided.
