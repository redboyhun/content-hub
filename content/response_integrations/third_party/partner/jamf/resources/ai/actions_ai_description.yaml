    1. Extracts integration configuration (API root, credentials) and action parameters
    (Mobile Device ID, device settings) from the action configuration.

    2. Initializes the `JamfManager` to handle API communication with the Jamf Pro
    server.

    3. Sends an `ERASE_DEVICE` MDM command to the specified mobile device via the
    Jamf Pro API, including optional parameters like data plan preservation and return-to-service
    settings.

    4. Logs the command initiation and adds the result details to the action output
    for analyst review.


