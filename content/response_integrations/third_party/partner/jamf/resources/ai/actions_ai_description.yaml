Assign to Group:
  ai_description: >-
    ### General Description

    Adds computers to a specific computer group in Jamf Pro. This action allows administrators
    to manage computer group memberships by providing computer IDs, names, or serial
    numbers. It supports bulk operations using comma-separated lists of identifiers.


    ### Flow Description

    1. Extracts Jamf Pro API configuration (API root, client ID, client secret, and
    SSL verification settings) and action parameters (Group ID, Computer IDs, Computer
    Names, and Computer Serial Numbers).

    2. Validates that at least one computer identifier (ID, Name, or Serial Number)
    is provided.

    3. Parses the provided comma-separated lists of identifiers into lists.

    4. Initializes the `JamfManager` and authenticates with the Jamf Pro API to obtain
    an access token.

    5. Calls the `assign_to_group` method, which sends a `PUT` request to the Jamf
    Classic API endpoint (`/JSSResource/computergroups/id/{id}`) with an XML payload
    containing the computer identifiers.

    6. Processes the API response and updates the action result with the number of
    computers processed and the group details.


    ### Additional Notes

    This action modifies the state of the Jamf Pro environment by updating computer
    group memberships. It supports bulk operations using comma-separated lists. Ensure
    the provided API credentials have sufficient permissions to modify computer groups.
  ai_short_description: >-
    Adds computers to a specific computer group in Jamf Pro using computer IDs, names,
    or serial numbers.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds computers to a specified computer group in Jamf Pro via the Jamf Classic
      API.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a `PUT` request to the Jamf Classic API to update computer
      group membership, which is an external data mutation. It does not fetch data,
      update internal entities, or modify alert data.
