Get Computer Inventory:
  ai_description: >-
    ### General Description

    Retrieves paginated computer inventory records from Jamf Pro. This action allows
    users to query the Jamf Pro API for computer inventory data, supporting pagination,
    sorting, and filtering by specific fields. It is designed to provide comprehensive
    asset visibility by allowing the selection of specific data sections (e.g., hardware,
    software, security).


    ### Flow Description

    1. Extracts configuration parameters (API root, client API ID, client API secret,
    and SSL verification settings) from the integration configuration.

    2. Extracts action parameters (Page, Page Size, Filter, Filter Value, Section,
    and Sort) from the action input.

    3. Validates the provided parameters, ensuring page and page size are valid integers.

    4. Constructs the API query string based on the provided filter field and value,
    and determines the appropriate data sections to request.

    5. Initializes the `JamfManager` and calls the `get_computer_inventory` method,
    which performs a `GET` request to the Jamf Pro API (`/api/v1/computers-inventory`).

    6. Processes the API response, calculates pagination information, and adds the
    resulting inventory data to the action's output using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is an enrichment-type action that does not modify any data in Jamf
    Pro or the SOAR platform. It is intended for data retrieval and visibility purposes.
    The action supports filtering by fields such as `general.name`, `hardware.serialNumber`,
    `udid`, `userAndLocation.username`, and `userAndLocation.email`.
  ai_short_description: >-
    Retrieves paginated computer inventory records from Jamf Pro with support for
    filtering, sorting, and section selection.
