Wipe Managed Device:
  ai_description: >-
    ### General Description

    Remotely erases/wipes a managed computer using the Jamf Pro ERASE_DEVICE MDM command.
    This action is designed specifically for computers. For mobile device wipe functionality,
    use the "Wipe Mobile Device" action instead.


    ### Flow Description

    1. Extracts Jamf Pro API configuration (API root, client ID, client secret, SSL
    verification).

    2. Extracts action parameters (Computer ID, PIN, Obliteration Behavior, Return
    to Service, MDM/WiFi profile data).

    3. Initializes the `JamfManager` to handle API authentication and communication.

    4. Calls the `erase_computer` method, which retrieves the device's `managementId`
    and sends a POST request to the Jamf Pro `/api/v2/mdm/commands` endpoint to initiate
    the `ERASE_DEVICE` command.

    5. Adds the command execution result to the action output and logs the status.


    ### Additional Notes

    This action is specifically for computers. For mobile devices, use the "Wipe Mobile
    Device" action.
