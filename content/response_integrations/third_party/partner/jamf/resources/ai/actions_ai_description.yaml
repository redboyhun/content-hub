Wipe Managed Device:
  ai_description: >-
    General Description

    This action remotely erases or wipes a managed computer using the Jamf Pro ERASE_DEVICE
    MDM command. It is designed to facilitate device containment by triggering a factory
    reset or wipe operation on a specified managed computer.


    Flow Description

    1. The action extracts configuration parameters (API root, client credentials,
    and SSL verification settings) and action parameters (Computer ID, PIN, obliteration
    behavior, and return-to-service settings).

    2. It initializes the `JamfManager` to handle API communication.

    3. The action calls `jamf_manager.get_device_info` to retrieve the `managementId`
    associated with the provided `Computer ID`.

    4. It constructs the `ERASE_DEVICE` command payload, including optional parameters
    like PIN, obliteration behavior, and return-to-service profiles.

    5. The action sends a POST request to the Jamf Pro MDM commands endpoint (`/api/v2/mdm/commands`)
    to initiate the wipe operation.

    6. The result of the command initiation is added to the action's result JSON,
    and the execution status is logged.


    Additional Notes

    This action is specifically for computers. For mobile devices, use the corresponding
    mobile device wipe action. The `Return to Service` option requires valid MDM or
    WiFi profile data to be provided if enabled.
