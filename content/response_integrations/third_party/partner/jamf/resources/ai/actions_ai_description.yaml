Get Mobile Device Inventory:
  ai_description: >-
    ### General Description

    Retrieves mobile device inventory data from Jamf Pro. This action allows users
    to query mobile device information with support for pagination, sorting, and filtering
    to optimize data retrieval. It interacts with the Jamf Pro API to fetch device
    details based on specified criteria.


    ### Flow Description

    1. **Configuration Extraction**: The action extracts necessary Jamf Pro API credentials
    (API Root, Client ID, Client Secret) and SSL verification settings from the integration
    configuration.

    2. **Parameter Extraction**: It extracts action-specific parameters including
    `Page`, `Page Size`, `Filter`, `Filter Value`, `Section`, and `Sort` criteria.

    3. **Validation**: The action validates that `Page` and `Page Size` are valid
    integers and that `Page` is non-negative and `Page Size` is positive.

    4. **API Request Preparation**: It constructs the filter string and determines
    the required API sections based on the filter field. It then initializes the `JamfManager`.

    5. **Data Retrieval**: The action calls the `JamfManager.get_mobile_device_inventory`
    method, which performs a GET request to the Jamf Pro API (`/api/v2/mobile-devices/detail`)
    with the provided parameters.

    6. **Result Processing**: If devices are found, the action formats the inventory
    data into a JSON object and adds it to the action results using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is strictly for data retrieval and does not modify any external or
    internal system state. It supports filtering by `serialNumber`, `udid`, `username`,
    and `emailAddress`.
