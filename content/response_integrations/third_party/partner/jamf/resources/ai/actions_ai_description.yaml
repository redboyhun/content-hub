Update Protect Prevent List:
  ai_description: >-
    ### General Description

    Updates an existing prevent list in Jamf Protect by adding new indicators (hashes,
    domains, IPs) and tags. This action allows security teams to dynamically manage
    blocklists within Jamf Protect, ensuring that malicious indicators are effectively
    blocked across managed endpoints.


    ### Flow Description

    1. Extracts configuration parameters (API root, credentials) and action parameters
    (Prevent List Name, Description, Type, Data, Tags).

    2. Parses the provided `Prevent List Data` and `Prevent List Tags` from comma-separated
    strings into lists.

    3. Initializes the `JamfProtectManager` to interact with the Jamf Protect API.

    4. Retrieves the list of existing prevent lists using `list_prevent_lists` to
    find the one matching the provided `Prevent List Name`.

    5. Validates that the `Prevent Type` matches the existing list type; if not, the
    action fails.

    6. Merges the new tags and values with the existing ones, ensuring no duplicates.

    7. Executes a GraphQL mutation via `update_protect_prevent_list` to update the
    prevent list in Jamf Protect.

    8. Returns the updated prevent list details as a JSON result.


    ### Additional Notes

    This action performs a mutation on the external Jamf Protect system. It requires
    valid API credentials and assumes the target prevent list already exists in Jamf
    Protect.
