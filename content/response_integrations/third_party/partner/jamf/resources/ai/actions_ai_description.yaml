Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Jamf Pro and Jamf Protect APIs. This action verifies
    that the integration can successfully authenticate and communicate with the configured
    Jamf Pro server and, if provided, the Jamf Protect GraphQL API. It serves as a
    diagnostic tool to ensure that API credentials and network configurations are
    correctly set up.


    ### Flow Description

    1. The action initializes the Jamf Pro manager using the provided API Root, Client
    API ID, and Client API Secret.

    2. It performs an authentication request to obtain an access token from the Jamf
    Pro API.

    3. It executes a connectivity test by making a GET request to the Jamf Pro version
    endpoint (`/api/v1/jamf-pro-version`).

    4. If Jamf Protect configuration parameters (API Root, Client API ID, and Client
    API Secret) are provided, the action initializes the Jamf Protect manager.

    5. It performs an authentication request to obtain an access token from the Jamf
    Protect API.

    6. It executes a connectivity test for Jamf Protect to verify communication with
    the GraphQL API.

    7. The action returns a success or failure status based on the outcome of these
    connectivity tests.


    ### Additional Notes

    This action does not modify any data in Jamf or Google SecOps. It is strictly
    a read-only connectivity check used for troubleshooting integration configurations.
