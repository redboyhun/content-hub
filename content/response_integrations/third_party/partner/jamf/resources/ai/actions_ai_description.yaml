Assign to Group:
  ai_description: >-
    ### General Description

    Assigns computers to a specific computer group in Jamf Pro. This action adds computers
    to a computer group using various identifiers: computer IDs, computer names, or
    serial numbers. It supports bulk operations with comma-separated lists of identifiers.


    ### Flow Description

    1. Extracts configuration parameters (API root, credentials) for the Jamf Pro
    integration.

    2. Extracts action parameters: 'Group ID', 'Computer IDs', 'Computer Names', and
    'Computer Serial Numbers'.

    3. Validates that at least one computer identifier (ID, Name, or Serial Number)
    is provided.

    4. Parses the comma-separated lists of identifiers into lists.

    5. Initializes the `JamfManager` and calls the `assign_to_group` method.

    6. The `assign_to_group` method constructs an XML payload and performs a `PUT`
    request to the Jamf Pro API to update the specified computer group.

    7. Returns the result of the operation, including the number of computers processed
    and the group name.


    ### Additional Notes

    Supports bulk operations. Computer names are not required to be unique in Jamf;
    using Computer IDs or Serial Numbers is recommended for reliable identification.
  ai_short_description: >-
    Assigns computers to a specific computer group in Jamf Pro using IDs, names, or
    serial numbers.
