Get Activity Status:
  ai_description: >-
    ### General Description

    Checks the status of a remediation operation in Abnormal Security. This action
    retrieves the current status of a specific remediation activity using its unique
    Activity Log ID, allowing analysts to monitor the progress of remediation tasks
    initiated by the 'Remediate Messages' action.


    ### Flow Description

    1. **Initialization**: The action initializes the `AbnormalManager` using the
    provided API URL and API Key.

    2. **Parameter Extraction**: It extracts the `Activity Log ID` and `Tenant IDs`
    from the action parameters.

    3. **API Request**: The action performs a GET request to the Abnormal Security
    API endpoint `/v1/search/activities/{activity_log_id}/status` with the provided
    `tenant_ids` as query parameters.

    4. **Result Processing**: The JSON response from the API is added to the action
    results using `siemplify.result.add_result_json`.

    5. **Status Evaluation**: The action checks if the activity status is in a terminal
    state (success, partial_success, or error). It logs the status and completes the
    action with a success or failure state based on the outcome.


    ### Additional Notes

    This action is intended to be used for polling the status of remediation tasks.
    It does not modify any data in Abnormal Security or the SOAR platform.
  ai_short_description: >-
    Checks the status of a remediation operation in Abnormal Security.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
