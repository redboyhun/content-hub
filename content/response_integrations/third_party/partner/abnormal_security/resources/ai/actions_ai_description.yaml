  ai_description: >-
    General Description

    Tests connectivity and authentication to the Abnormal Security API. This action
    is designed to be run after configuring the integration to ensure that the provided
    API URL and API Key are valid and that the SOAR platform can successfully communicate
    with the Abnormal Security service.


    Flow Description

    1. The action extracts the required configuration parameters: `API URL`, `API
    Key`, and the optional `Verify SSL` setting.

    2. It initializes the `AbnormalManager` using the provided credentials.

    3. The action calls the `test_connectivity` method, which performs a GET request
    to the Abnormal Security API threats endpoint (`/v1/threats`) with a page size
    of 1 to verify authentication and network reachability.

    4. If the request is successful, the action logs a success message and returns
    a completed status.

    5. If the request fails (e.g., due to authentication errors or network issues),
    the action logs the error and returns a failed status.


