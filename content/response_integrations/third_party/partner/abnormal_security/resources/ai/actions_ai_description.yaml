Search Messages:
  ai_description: >-
    ### General Description

    Searches for email messages across the organization using the Abnormal Security
    API. This action allows analysts to query for specific emails based on time ranges,
    sender addresses, and subjects, providing a list of matching messages that can
    be used for further investigation or remediation.


    ### Flow Description

    1. The action extracts configuration parameters, including the API URL, API Key,
    and SSL verification settings.

    2. It extracts action-specific parameters: `Start Time`, `End Time`, `Sender Email`,
    `Subject`, and `Tenant IDs`.

    3. If `Start Time` or `End Time` are not provided, the action defaults to a 24-hour
    window ending at the current time.

    4. The `AbnormalManager` is initialized with the provided credentials.

    5. The action executes a POST request to the `/v1/search` endpoint via `manager.search_messages`
    using the provided filters.

    6. The retrieved message list is stored in the action result using `siemplify.result.add_result_json`.


    ### Additional Notes

    The output of this action is structured to be compatible with the 'Remediate Messages'
    action, allowing for seamless automated response workflows.
