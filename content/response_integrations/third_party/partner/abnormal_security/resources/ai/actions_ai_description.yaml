Get Activity Status:
  ai_description: >-
    ### General Description

    Checks the status of a remediation operation in Abnormal Security using the provided
    Activity Log ID. This action allows analysts to monitor the progress of previously
    initiated remediation tasks until they reach a terminal state (success, partial_success,
    or error).


    ### Flow Description

    1. The action extracts configuration parameters, including the API URL, API Key,
    and SSL verification settings.

    2. It extracts the required `Activity Log ID` and the optional `Tenant IDs` from
    the action parameters.

    3. The action initializes the `AbnormalManager` to handle API communication.

    4. It makes a GET request to the Abnormal Security API endpoint `/v1/search/activities/{activity_log_id}/status`
    to retrieve the current status of the specified remediation activity.

    5. The raw JSON response from the API is added to the action results.

    6. The action logs the current status and terminates, indicating whether the remediation
    is still in progress or has completed.


    ### Additional Notes

    The `Tenant IDs` parameter is optional and is ignored by the status endpoint,
    as the tenant scope is automatically resolved from the API key. This action is
    intended to be used for polling the status of remediation tasks initiated by other
    actions.
