Submit Messages To D360:
  ai_description: >-
    General Description

    Submits email messages to Abnormal Security's Detection 360 (D360) service for
    re-analysis. This is typically used to report false negatives or trigger re-evaluation
    of specific messages.


    Flow Description

    1. Extracts configuration parameters (API URL, API Key, SSL verification).

    2. Extracts action parameters (Source, Messages JSON, Remediation Reason, Tenant
    IDs).

    3. Parses the `Messages JSON` input to ensure it contains the required message
    objects.

    4. Initializes the `AbnormalManager` and calls the `remediate_messages` method
    with the action `submit_to_d360`.

    5. The `AbnormalManager` performs a `POST` request to the Abnormal Security API
    (`/v1/search/remediate`) with the provided message details and remediation reason.

    6. The action logs the activity ID and adds the API response to the SOAR result.


    Additional Notes

    This action requires a JSON array of message objects, typically obtained from
    a prior `Search Messages` action. It does not operate on individual message IDs
    directly.
