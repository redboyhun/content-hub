Submit Inquiry:
  ai_description: >-
    ### General Description

    Submits a false-positive or false-negative report to the Abnormal Security detection
    team. This action is intended for use when a SOAR analyst disagrees with an Abnormal
    Security verdict, allowing them to challenge the classification and provide context
    for further investigation by the vendor.


    ### Flow Description

    1. The action extracts configuration parameters, including the API URL, API Key,
    and SSL verification settings.

    2. It extracts the required action parameters: `Report Type` and `Reporter`, along
    with optional fields such as `Subject`, `Sender Email`, `Sender Display Name`,
    `Recipient Email`, `Recipient Display Name`, `Received Time`, and `Description`.

    3. The `AbnormalManager` is initialized with the provided credentials.

    4. The action calls the `submit_inquiry` method, which performs a POST request
    to the Abnormal Security API (`/v1/inquiry`) with the provided report details.

    5. The API response is added to the action results using `siemplify.result.add_result_json`.

    6. The action terminates with a success or failure status based on the API response.


    ### Additional Notes

    This action does not interact with entities within the SOAR platform; it is a
    standalone submission to the Abnormal Security platform.
