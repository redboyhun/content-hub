Unremediate Threat:
  ai_description: >-
    ### General Description

    Reverses a previously applied remediation action on a threat within the Abnormal
    Security platform. This action is used to restore messages or entities that were
    incorrectly remediated, effectively undoing the remediation process for a specific
    threat ID.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the API URL, API Key, and
    SSL verification settings from the integration configuration.

    2. **Parameter Extraction**: It extracts the `Threat ID` and optional `Message
    IDs` from the action parameters.

    3. **Entity Identification**: The action identifies target threats. It checks
    for `THREATSIGNATURE` entities in the current scope. If found, it uses their identifiers
    as the `Threat ID`. If no entities are present, it falls back to the `Threat ID`
    parameter.

    4. **API Interaction**: For each identified threat, the action makes a `POST`
    request to the Abnormal Security API (`/v1/threats/{threat_id}`) with the action
    set to `unremediate` and the optional `message_ids` included in the request body.

    5. **Result Aggregation**: The action aggregates the responses from the API and
    adds the result to the SOAR execution context.

    6. **Completion**: It outputs a success or failure message based on the outcome
    of the API calls.


    ### Additional Notes

    - This action requires a valid `Threat ID` to function. If running on `THREATSIGNATURE`
    entities, the entity identifier is used as the `Threat ID`.

    - The `Message IDs` parameter is optional; if provided, the unremediation action
    is scoped only to those specific messages within the threat.
  ai_short_description: >-
    Reverses a remediation action on a threat within the Abnormal Security platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
