Remediate Threat:
  ai_description: >-
    ### General Description

    Remediates a specific threat within the Abnormal Security platform. This action
    allows analysts to trigger remediation workflows for identified threats, either
    by providing a specific Threat ID or by running the action on one or more `THREATSIGNATURE`
    entities.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the necessary API configuration
    (API URL, API Key, and SSL verification settings) from the integration settings.

    2. **Parameter Extraction**: The action extracts the `Threat ID` and `Message
    IDs` (optional) from the action parameters.

    3. **Entity Identification**: The action identifies target entities of type `THREATSIGNATURE`
    from the current context. If entities are found, their identifiers are collected
    as threat IDs. If no entities are present, the `Threat ID` parameter is used.

    4. **Remediation Execution**: The action initializes the `AbnormalManager` and
    iterates through the collected threat IDs. For each threat, it makes a POST request
    to the Abnormal Security API (`/v1/threats/{threat_id}`) with the action set to
    `remediate`.

    5. **Result Aggregation**: The action aggregates the results of the remediation
    attempts, logs successes and failures, and outputs the final status as a JSON
    result.


    ### Additional Notes

    This action supports batch processing when scoped to multiple `THREATSIGNATURE`
    entities. If no entities are provided, the `Threat ID` parameter is required to
    execute the action.
  ai_short_description: >-
    Remediates a threat in the Abnormal Security platform by triggering the remediation
    workflow for a specific Threat ID or a set of ThreatSignature entities.
  capabilities:
    can_create_case_comments: false
