Resolve Case:
  ai_description: >-
    ### General Description

    Acknowledges an Abnormal Security case as resolved by sending a request to the
    Abnormal Security API. This action updates the status of a specific case to 'resolved'
    within the Abnormal Security platform, allowing analysts to close out investigations
    directly from the SOAR platform.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API URL`, `API
    Key`, and `Verify SSL`.

    2. It extracts the `Case ID` parameter provided by the user.

    3. It identifies target entities from the current context, specifically filtering
    for `THREATCAMPAIGN` entities, or uses the provided `Case ID` parameter if no
    entities are present.

    4. It iterates through the identified case IDs.

    5. For each case ID, it calls the `post_case_action` method of the `AbnormalManager`
    with the action `acknowledge_resolved`.

    6. The action aggregates the results of these API calls and logs the success or
    failure of each operation.

    7. Finally, it adds the aggregated result JSON to the action output and terminates
    with the appropriate execution status.


    ### Additional Notes

    This action is intended for use with Abnormal Security cases. It supports batch
    processing when scoped to `THREATCAMPAIGN` entities. If no entities are provided,
    the `Case ID` parameter is mandatory.
