    ### General Description

    Remediates email messages identified as threats using the Abnormal Security platform.
    This action allows users to perform specific remediation operations such as deleting
    messages, moving them to the inbox, or submitting them to D360 for analysis.


    ### Flow Description

    1. Extract configuration parameters (API URL, API Key, SSL verification) from
    the integration settings.

    2. Extract action parameters (Action, Source, Messages JSON, Remediation Reason,
    Tenant IDs) provided by the user.

    3. Parse the `Messages JSON` input string into a list of message objects.

    4. Initialize the `AbnormalManager` and call the `remediate_messages` method.

    5. The `remediate_messages` method performs a POST request to the `/v1/search/remediate`
    endpoint of the Abnormal Security API with the specified remediation details.

    6. Capture the `activity_log_id` from the API response.

    7. Add the full API response to the action result and complete the execution.


    ### Additional Notes

    The action returns an Activity Log ID, which can be used with the 'Get Activity
    Status' action to track the progress and completion status of the remediation
    request.
