Delete Messages:
  ai_description: >-
    ### General Description

    Deletes specified email messages from recipient mailboxes using the Abnormal Security
    API. This action is designed to remediate threats by removing malicious or unwanted
    emails directly from the mail environment.


    ### Flow Description

    1. The action extracts configuration parameters (API URL, API Key, Verify SSL)
    and action parameters (Source, Messages JSON, Remediation Reason, Tenant IDs).

    2. The `Messages JSON` input is parsed to validate the structure of the message
    objects.

    3. The action invokes the `remediate_messages` method of the `AbnormalManager`,
    which performs a POST request to the `/v1/search/remediate` endpoint of the Abnormal
    Security API.

    4. The request specifies `action="delete"` along with the provided source, message
    details, and remediation reason.

    5. The API response, including an `activity_log_id`, is added to the action result,
    and the action status is updated to completed.


    ### Additional Notes

    This action requires a JSON array of message objects as input, which is typically
    obtained from the output of a prior 'Search Messages' action. A single message
    ID is insufficient for this operation.
  ai_short_description: >-
    Deletes specified email messages from recipient mailboxes via the Abnormal Security
    API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes specified email messages from recipient mailboxes via the Abnormal Security
      API.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Abnormal Security API to delete messages,
      which constitutes an external data mutation. It does not fetch data, update
      internal entities, or modify alert data.
