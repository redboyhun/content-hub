Get Threat:
  ai_description: >-
    ### General Description

    Retrieves comprehensive details for a specific Abnormal Security threat using
    its unique identifier. This action queries the Abnormal Security API to fetch
    information such as attack type, confidence score, disposition, affected messages,
    and available remediation actions, providing analysts with the necessary context
    to investigate and respond to threats.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API URL`, `API
    Key`, and `Verify SSL`.

    2. The `Threat ID` is extracted from the action parameters. If the action is executed
    within the scope of a ThreatSignature entity, this ID is automatically resolved
    from the entity's identifier.

    3. The `AbnormalManager` is initialized with the provided credentials and configuration.

    4. The action calls the `get_threat` method, which performs a GET request to the
    `/v1/threats/{threat_id}` endpoint of the Abnormal Security API.

    5. The retrieved threat details are added to the action's result using `siemplify.result.add_result_json`.

    6. The action concludes by setting the execution status to completed and returning
    the output message.


    ### Additional Notes

    This action is read-only and does not perform any modifications to the threat
    status or external systems. It is intended for enrichment and investigation purposes.
