    case IDs.

    6. For each case ID, it makes a POST request to the Abnormal Security API (`/v1/cases/{case_id}`)
    with the action set to `action_required`.

    7. The action aggregates the results (successes and failures) and logs the outcome.

    8. Finally, it returns the aggregated JSON result and terminates the action.


    ### Additional Notes

    This action supports both manual input of a single Case ID and batch processing
    when scoped to `THREATCAMPAIGN` entities. If no Case ID is provided and no valid
    entities are present, the action will fail.
