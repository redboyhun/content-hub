Remediate Messages:
  ai_description: >-
    ### General Description

    This action remediates email messages identified as threats within the Abnormal
    Security platform. It allows analysts to perform actions such as deleting messages,
    moving them to the inbox, or submitting them to D360.


    ### Flow Description

    1. Extract configuration parameters (API URL, API Key, SSL verification).

    2. Extract action parameters (Action, Source, Messages JSON, Remediation Reason,
    Tenant IDs).

    3. Parse the `Messages JSON` input into a list of message objects.

    4. Call the Abnormal Security API (`POST /v1/search/remediate`) with the provided
    remediation details.

    5. Retrieve the `activity_log_id` from the API response.

    6. Add the API response to the action results and terminate the action with a
    success or failure status.


    ### Additional Notes

    The `Messages JSON` parameter must contain a valid JSON array of message objects
    (typically obtained from a prior `Search Messages` action). A single message ID
    is insufficient.
  ai_short_description: >-
    Remediates email messages in the Abnormal Security platform by performing actions
    like deletion, moving to inbox, or submission to D360.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Remediates email messages (e.g., deletes or moves them) within the Abnormal
      Security platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to the Abnormal Security API to remediate messages,
      which is an external mutation. It does not fetch data, nor does it update internal
      SecOps entities or alerts.
