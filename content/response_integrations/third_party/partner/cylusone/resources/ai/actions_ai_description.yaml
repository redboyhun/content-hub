Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the Google SecOps platform and the CylusOne platform
    using the provided configuration parameters. This action verifies that the integration
    is correctly configured and that the API credentials are valid.


    ### Flow Description

    1. The action extracts the integration parameters (`Base URL`, `Cylus API Key`,
    and `Verify SSL`) from the configuration.

    2. It initializes the `ApiManager` with the provided credentials and settings.

    3. The action performs a connectivity test by making a GET request to the CylusOne
    API endpoint (`/rest/v1/assets/by-ip?ip=10.0.0.5`).

    4. It validates the response status code: a 200 or 404 status indicates a successful
    connection, while 401 or 403 indicates authentication or permission issues.

    5. The action returns the connectivity status and a descriptive message to the
    user.


    ### Additional Notes

    This action does not modify any data and is used solely for verifying that the
    integration is correctly configured.
