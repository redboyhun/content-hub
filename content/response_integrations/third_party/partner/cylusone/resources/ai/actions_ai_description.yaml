Ping:
  ai_description: >-
    General Description: Tests connectivity to the CylusOne platform by verifying
    API credentials and network reachability. This action ensures that the integration
    is correctly configured and can communicate with the CylusOne API.


    Flow Description:

    1. The action extracts the integration parameters (Base URL, API Key, and Verify
    SSL) from the configuration.

    2. It initializes the `ApiManager` with these parameters.

    3. It performs a connectivity test by making a `GET` request to the `/rest/v1/assets/by-ip`
    endpoint using a test IP address.

    4. It validates the response status code (200 or 404 indicates success).

    5. It returns a success or failure message based on the connectivity result.


    Additional Notes: This action is a diagnostic tool and does not perform any data
    enrichment or remediation tasks.
  ai_short_description: >-
    Tests connectivity to the CylusOne platform by verifying API credentials and network
    reachability.
  capabilities:
