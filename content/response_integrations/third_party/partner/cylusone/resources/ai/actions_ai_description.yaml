    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to test connectivity to the CylusOne platform.
      It does not mutate external or internal data, nor does it update entities or
      create insights.
  categories:
    enrichment: false
    reasoning: >-
      The action is a connectivity test (Ping). According to the guidelines, actions
