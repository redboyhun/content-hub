EnrichAssetInformation:
  ai_description: >-
    ### General Description

    Enriches IP address entities with asset information retrieved from the CylusOne
    platform. This action queries the CylusOne API to obtain detailed asset metadata
    associated with a specific IP address, such as properties and network identifiers.
    The retrieved data is flattened and added to the entity's profile within the SOAR
    platform, enhancing the context available to analysts.


    ### Flow Description

    1. The action initializes the `ApiManager` using the configured Base URL, API
    Key, and SSL verification settings.

    2. It iterates through all target entities provided in the case, filtering for
    those with the type `ADDRESS`.

    3. For each valid IP address, the action validates the format and performs a `GET`
    request to the CylusOne API endpoint `/rest/v1/assets/by-ip?ip={ip}`.

    4. If asset data is returned, the action processes the response by flattening
    nested properties and formatting list fields (e.g., MAC addresses).

    5. The processed data is added to the entity's `additional_properties` attribute,
    and the entity's `is_enriched` status is set to `True`.

    6. Finally, the action updates the enriched entities in the SOAR platform and
    returns a summary of successful and failed enrichments.


    ### Additional Notes

    This action is strictly read-only regarding the external CylusOne system. It performs
    internal mutations by updating entity attributes within the SOAR platform. If
    an asset is not found for a given IP, the action logs the event and continues
    processing other entities.
  ai_short_description: >-
    Enriches IP address entities with asset information retrieved from the CylusOne
    platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity 'additional_properties' and 'is_enriched' status within the SOAR
      platform.
    reasoning: >-
      The action performs a GET request to fetch asset data (fetches_data=true). It
      does not modify external systems (can_mutate_external_data=false). It updates
      entity attributes within the SOAR platform (can_mutate_internal_data=true, can_update_entities=true).
  categories:
    enrichment: true
    reasoning: >-
      The action fetches asset data from an external source (CylusOne) and updates
      internal entity profiles. It does not modify any external system state, nor
      does it perform any remediation tasks. Therefore, it is classified as an Enrichment
      action.
    remediation: false
