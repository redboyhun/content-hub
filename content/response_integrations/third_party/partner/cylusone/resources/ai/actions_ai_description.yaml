EnrichAssetInformation:
  ai_description: >-
    ### General Description

    Enriches IP address entities with asset information retrieved from the CylusOne
    platform. This action retrieves contextual metadata, such as device properties,
    MAC addresses, and associated IP information, to provide better visibility into
    the assets involved in an investigation.


    ### Flow Description

    1. The action initializes the `ApiManager` using the provided configuration parameters
    (Base URL, API Key, and SSL verification settings).

    2. It iterates through the `target_entities` provided in the SOAR case.

    3. For each entity, it validates that the entity type is an IP address (`EntityTypes.ADDRESS`)
    and that the identifier is a valid IPv4 address.

    4. It performs a GET request to the CylusOne API endpoint `/rest/v1/assets/by-ip`
    to fetch asset details for the specific IP.

    5. If asset data is found, the action flattens and formats the properties into
    a namespaced dictionary (prefixed with `Cylus_`).

    6. The entity's `additional_properties` are updated with this enriched data, and
    the `is_enriched` flag is set to true.

    7. Finally, the action updates the enriched entities within the SOAR platform
    and returns a summary of the operation.


    ### Additional Notes

    This action does not perform any threat intelligence lookups (e.g., reputation
    scores) and focuses strictly on asset inventory enrichment.
  ai_short_description: >-
    Enriches IP address entities with asset information retrieved from the CylusOne
    platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity 'additional_properties' and 'is_enriched' status within the SOAR
      platform.
    reasoning: >-
      The action fetches data from an external API (fetches_data=true). It updates
      entity properties and the 'is_enriched' status within the SOAR platform (can_mutate_internal_data=true,
      can_update_entities=true). It does not mutate external data.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: false
      file_name: false
      generic: false
      host_name: false
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: false
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over `siemplify.target_entities` and explicitly filters
      for entities where `entity_type == EntityTypes.ADDRESS`. It also performs a
      validation check on the IP address format. No other entity attributes (like
      creation time, case ID, etc.) are used for filtering.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
    disable_identity: false
    download_file: false
    enable_identity: false
    enrich_asset: true
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action retrieves contextual metadata (asset properties) for an IP address
      from an external source and updates the entity within the SOAR platform. This
      aligns with the 'Enrich Asset' category. It does not provide threat intelligence
      (reputation/prevalence), so 'Enrich IOC' is false.
    remove_ioc_from_allowlist: false
