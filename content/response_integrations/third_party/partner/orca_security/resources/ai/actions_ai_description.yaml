Get Vulnerability Details:
  ai_description: >-
    ### General Description

    Retrieves detailed vulnerability information from Orca Security for a specified
    list of CVE IDs. This action queries the Orca Security API to fetch vulnerability
    data, including affected assets and severity levels. It supports outputting results
    in JSON or CSV format and can optionally generate case insights for each enriched
    vulnerability.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts configuration parameters (API
    Root, API Key/Token, SSL verification) and action parameters (CVE IDs, Fields
    To Return, Output type, Create Insight flag, Max Assets To Return).

    2. **Initialization**: Initializes the `OrcaSecurityManager` to handle API communication.

    3. **Data Retrieval**: Iterates through the provided list of CVE IDs. For each
    ID, it calls the `manager.get_vulnerability_results` method to fetch vulnerability
    data from the Orca Security API.

    4. **Insight Generation**: If the `Create Insight` parameter is enabled, the action
    generates a case insight for each vulnerability, summarizing affected assets and
    severity.

    5. **Result Formatting**: Aggregates the results. If `Output` is set to JSON,
    it adds the result JSON to the action output. If set to CSV, it writes the data
    to a CSV file and provides the path.

    6. **Finalization**: Adds a data table containing the vulnerability details to
    the action results and completes the execution.


    ### Additional Notes

    - The action does not modify external systems; it is a read-only operation regarding
    the Orca Security platform.

    - The action supports pagination for vulnerability results up to a maximum limit
    of 10,000 assets.
