    ### General Description

    Retrieves compliance information from Orca Security for specified frameworks.
    This action allows users to query compliance details, such as scores and test
    results, for one or more frameworks and optionally generate a case insight within
    the SOAR platform.


    ### Flow Description

    1. Extracts configuration parameters (API credentials) and action parameters (framework
    names, insight creation flag, and result limit).

    2. Initializes the `OrcaSecurityManager` to handle API communication with Orca
    Security.

    3. Calls the Orca Security API (`/api/serving-layer/compliance/frameworks/overview`)
    to fetch compliance details for the requested frameworks.

    4. If `Create Insight` is enabled, generates a case insight containing the compliance
    data.

    5. Adds the compliance details to the action result as a data table and a JSON
    object.


