Update Alert:
  ai_description: >-
    ### General Description

    Updates an alert in Orca Security by modifying its verification status, snooze
    state, or alert status. This action allows analysts to manage the lifecycle of
    alerts directly from the SOAR platform, ensuring that changes are synchronized
    with the Orca Security environment.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts configuration parameters (API
    Root, API Key/Token, Verify SSL) and action parameters (Alert ID, Verify Alert,
    Snooze State, Snooze Days, Status).

    2. **Validation**: It validates that at least one update parameter (Status, Verify
    Alert, or Snooze State) is provided. If "Snooze State" is set to "Snooze", it
    ensures "Snooze Days" is provided.

    3. **Initialization**: Initializes the `OrcaSecurityManager` to handle API communication.

    4. **Verification**: If the `Verify Alert` parameter is enabled, it calls the
    Orca Security API to initiate the verification process for the specified alert.

    5. **Snooze**: If the `Snooze State` is set to "Snooze", it calls the API to snooze
    the alert for the specified number of days.

    6. **Status Update**: If the `Snooze State` is "Unsnooze" (and no status is provided)
    or if a new `Status` is provided, it calls the API to update the alert status
    in Orca Security.

    7. **Data Retrieval**: Fetches the updated alert data from Orca Security using
    the `Alert ID`.

    8. **Result Output**: Adds the updated alert data as a JSON result to the action
    output.


    ### Additional Notes

    This action performs external mutations on the Orca Security platform. It does
    not modify internal SOAR entities or case data, but it does return the updated
    alert information for review.
  ai_short_description: >-
    Updates the status, snooze state, or verification status of an alert in Orca Security.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
