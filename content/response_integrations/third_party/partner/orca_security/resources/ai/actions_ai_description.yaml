Update Alert:
  ai_description: >-
    ### General Description

    Updates an alert in Orca Security by modifying its status, snooze state, or verification
    status. This action allows analysts to manage alert lifecycles directly from the
    SOAR platform by interacting with the Orca Security API.


    ### Flow Description

    1. Extract configuration parameters (API Root, API Key, API Token, Verify SSL)
    and action parameters (Alert ID, Verify Alert, Snooze State, Snooze Days, Status).

    2. Initialize the `OrcaSecurityManager` with the provided credentials.

    3. If the `Verify Alert` parameter is enabled, call `manager.verify_alert(alert_id)`
    to initiate the verification process.

    4. If the `Snooze State` parameter is set to "Snooze", call `manager.snooze_alert(alert_id,
    snooze_days)` to snooze the alert.

    5. If the `Snooze State` is "Unsnooze" or a new `Status` is provided, call `manager.update_alert_status(alert_id,
    status)` to update the alert's status.

    6. Fetch the updated alert data using `manager.get_alert_data(alert_id)`.

    7. Add the updated alert data to the action result using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action requires a valid `Alert ID` to perform any operations. It does not
    modify alert data within the Google SecOps platform itself, but rather synchronizes
    changes to the external Orca Security system.
  ai_short_description: >-
    Updates an alert's status, snooze state, or verification status in Orca Security.
