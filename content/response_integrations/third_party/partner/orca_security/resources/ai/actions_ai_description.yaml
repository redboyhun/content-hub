Get Asset Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about assets from Orca Security, including optional
    vulnerability data. This action allows users to query specific assets by their
    IDs, fetch associated vulnerabilities based on severity thresholds, and optionally
    generate case insights for each enriched asset.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts configuration parameters (API
    root, credentials, SSL verification) and action-specific parameters (Asset IDs,
    vulnerability settings, insight creation preference).

    2. **Initialization**: An `OrcaSecurityManager` instance is initialized to handle
    API communication.

    3. **Asset Processing**: The action iterates through the provided list of `Asset
    IDs`.

    4. **Data Retrieval**: For each asset ID, the action calls `manager.get_asset_details`
    to retrieve asset metadata.

    5. **Vulnerability Fetching**: If `Return Vulnerabilities Information` is enabled,
    the action calls `manager.get_vulnerability_details` to retrieve vulnerabilities
    associated with the asset, filtered by the specified `Lowest Severity For Vulnerabilities`
    and limited by `Max Vulnerabilities To Fetch`.

    6. **Insight Generation**: If `Create Insight` is enabled, the action creates
    a case insight for the asset using `siemplify.create_case_insight`.

    7. **Output**: The action compiles the results into a JSON object and a data table,
    which are added to the action output.


    ### Additional Notes

    This action does not modify external systems. It is designed to enrich the case
    context with asset and vulnerability data from Orca Security.
  ai_short_description: >-
    Retrieves asset details and associated vulnerability information from Orca Security.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
