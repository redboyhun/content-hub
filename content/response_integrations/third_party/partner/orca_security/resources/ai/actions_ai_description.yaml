Add Comment To Alert:
  ai_description: >-
    ### General Description

    Adds a comment to a specific alert within the Orca Security platform. This action
    allows analysts to append notes or context directly to an existing alert in the
    external system, facilitating better collaboration and documentation of investigation
    steps.


    ### Flow Description

    1. The action extracts the `Alert ID` and `Comment` parameters provided by the
    user.

    2. It initializes the `OrcaSecurityManager` using the configured API credentials
    (API Key or Token) and API root URL.

    3. The action calls the `add_alert_comment` method, which performs a `PUT` request
    to the Orca Security API endpoint `/api/alerts/{alert_id}/comment` with the provided
    comment in the request body.

    4. The response from the API is validated, and the resulting `AlertComment` object
    is returned as a JSON result in the action output.


    ### Additional Notes

    This action requires valid API credentials (API Key or Token) configured for the
    Orca Security integration. The `Alert ID` must be a valid identifier existing
    within the Orca Security platform.
  ai_short_description: >-
    Adds a comment to a specific alert in the Orca Security platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
