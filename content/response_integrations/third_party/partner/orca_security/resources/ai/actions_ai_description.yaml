Scan Assets:
  ai_description: >-
    ### General Description

    Initiates and monitors security scans for specified assets within the Orca Security
    platform. This action allows users to trigger vulnerability or security scans
    on specific assets by providing their IDs.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, API Key/Token, SSL
    verification) and the `Asset IDs` parameter.

    2. It initializes the `OrcaSecurityManager` to interact with the Orca Security
    API.

    3. On the first run, it iterates through the provided `Asset IDs` and calls the
    `start_scan` API endpoint for each asset.

    4. It tracks the status of these scans using `pending_assets`.

    5. In subsequent runs (asynchronous execution), it calls the `get_scan_status`
    API endpoint to check if the scans have completed.

    6. Once scans are completed, it aggregates the results and adds them to the action
    output using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is designed to run asynchronously. Please ensure the action timeout
    is configured appropriately in the Siemplify IDE to allow sufficient time for
    the scans to complete.
  ai_short_description: >-
    Initiates and monitors security scans for specified assets in Orca Security.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a security scan on the specified assets within the Orca Security platform.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action initiates a scan (mutation of external state) and fetches the status
      of the scan (fetches data). It does not modify internal SecOps data or entities.
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
