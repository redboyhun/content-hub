    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a comment to an existing alert in the Orca Security platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a PUT request to an external API (Orca Security) to add
      a comment. It does not fetch data, mutate internal SecOps data, or update entities.
