Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Orca Security API using the provided configuration parameters
    (API Root, API Key/Token, SSL verification). This action verifies that the integration
    is correctly configured and can communicate with the Orca Security server.


    ### Flow Description

    1. The action extracts the required configuration parameters (`API Root`, `API
    Key`, `API Token`, `Verify SSL`) from the integration settings.

    2. It initializes the `OrcaSecurityManager` with these credentials.

    3. The action calls the `test_connectivity()` method, which sends a POST request
    to the `vulnerability_details` endpoint to verify the connection.

    4. The API response is validated to ensure the connection is successful.

    5. The action returns a success or failure message based on the connectivity test
    result.


    ### Additional Notes

    This action is used to verify the integration configuration and does not perform
    any data retrieval or modification.
