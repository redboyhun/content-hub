Add Comment To Alert:
  ai_description: >-
    ### General Description

    Adds a comment to a specific alert within the Orca Security platform. This action
    facilitates communication and documentation by appending notes directly to the
    external alert record, ensuring that relevant information is captured within the
    Orca Security environment.


    ### Flow Description

    1. The action extracts the `Alert ID` and `Comment` from the provided action parameters.

    2. The `OrcaSecurityManager` is initialized using the configured API credentials
    (API Root, API Key/Token) and SSL verification settings.

    3. The action executes a PUT request to the Orca Security API endpoint (`/api/alerts/{alert_id}/comment`)
    with the provided comment payload.

    4. The response from the API is parsed and added to the action results as a JSON
    object.


    ### Additional Notes

    This action performs a mutation on the external Orca Security platform. It does
    not modify any entities, insights, or case data within the Google SecOps (SOAR)
    platform.
