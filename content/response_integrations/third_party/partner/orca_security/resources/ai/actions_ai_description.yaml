Get Asset Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about assets from Orca Security. This action fetches
    asset metadata, including state, category, and risk levels, and optionally retrieves
    associated vulnerability data based on severity thresholds. It provides visibility
    into the security posture of specific assets and can optionally generate insights
    within the SOAR platform for each enriched asset.


    ### Flow Description

    1. **Initialization**: The action initializes the `OrcaSecurityManager` using
    the provided API credentials (API Key or Token) and configuration settings.

    2. **Parameter Processing**: It parses the input parameters, including the list
    of `Asset IDs`, vulnerability retrieval preferences, severity thresholds, and
    insight creation settings.

    3. **Data Retrieval**: For each provided `Asset ID`, the action performs the following:
        - Calls the Orca Security API to retrieve detailed asset information.
        - If `Return Vulnerabilities Information` is enabled, it queries the API for
    vulnerability details associated with the asset, filtered by the specified `Lowest
    Severity` and `Max Vulnerabilities To Fetch` limit.
    4. **Data Aggregation**: The retrieved asset and vulnerability data are aggregated
    into a JSON result and a CSV data table.

    5. **Insight Generation**: If `Create Insight` is enabled, the action creates
    a case insight for each successfully enriched asset, containing the asset's details
    and a link to the Orca Security inventory.

    6. **Result Output**: The action returns the aggregated JSON data and a data table
    to the SOAR platform and updates the execution status.


    ### Additional Notes

    - The action requires a valid Orca Security API Key or Token.

    - The `Max Vulnerabilities To Fetch` parameter is validated to ensure it is a
    positive integer and does not exceed the system's defined maximum limit.

    - If no assets are successfully enriched, the action will report a failure status.
  ai_short_description: >-
    Retrieves detailed asset information and associated vulnerabilities from Orca
    Security, with optional insight generation.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action creates case insights within the SOAR platform.
    reasoning: >-
      The action fetches data from the Orca Security API (fetches_data=true). It creates
      insights within the SOAR platform (can_create_insight=true), which constitutes
      an internal data mutation (can_mutate_internal_data=true). It does not mutate
      external systems or update entities directly.
