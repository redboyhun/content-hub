Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Orca Security API by attempting to fetch vulnerability
    details. This action verifies that the integration is correctly configured and
    can communicate with the Orca Security platform.


    ### Flow Description

    1. Extracts configuration parameters (`API Root`, `API Key`, `API Token`, `Verify
    SSL`) from the integration settings.

    2. Initializes the `OrcaSecurityManager` with the provided credentials and SSL
    verification settings.

    3. Executes the `test_connectivity` method, which constructs a query payload using
    `VulnerabilityQueryBuilder` (limit=1).

    4. Sends a `POST` request to the `vulnerability_details` endpoint.

    5. Validates the API response.

    6. Returns a success or failure message based on the connectivity test result.


    ### Additional Notes

    This action is used to verify that the integration is correctly configured and
    can communicate with the Orca Security platform.
