Scan Assets:
  ai_description: >-
    General Description


    Scans specified assets in Orca Security. This action initiates a scan for the
    provided assets and retrieves the scan status and results.


    Flow Description


    1. The action receives a comma-separated list of Asset IDs.

    2. It initializes the `OrcaSecurityManager` to interact with the Orca Security
    API.

    3. It iterates through the provided Asset IDs and initiates a scan for each using
    the `start_scan` API endpoint.

    4. If the action is running asynchronously, it checks the status of the initiated
    scans using the `get_scan_status` API endpoint.

    5. Once scans are completed, it adds the scan results to the action's output using
    `add_result_json`.


    Additional Notes


    This action is designed to run asynchronously. Ensure the script timeout in the
    Siemplify IDE is adjusted to accommodate the scan duration.
  ai_short_description: >-
    Scans specified assets in Orca Security and retrieves the scan status and results.
