Get Compliance Info:
  ai_description: >-
    ### General Description

    Retrieves compliance framework information from Orca Security. This action allows
    users to query specific compliance frameworks or retrieve a list of all available
    frameworks to assess the security posture of the environment.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts configuration parameters (API
    Root, API Key/Token, SSL verification) and action-specific parameters (Framework
    Names, Create Insight, Max Frameworks To Return).

    2. **Initialization**: Initializes the `OrcaSecurityManager` to handle communication
    with the Orca Security API.

    3. **Data Retrieval**: Calls the `get_frameworks` method of the `OrcaSecurityManager`,
    which performs a POST request to the Orca Security API (`/api/serving-layer/compliance/frameworks/overview`)
    to fetch compliance data based on the provided framework names and limits.

    4. **Insight Creation**: If the `Create Insight` parameter is enabled, the action
    generates a case insight containing the retrieved compliance information (score,
    passed/failed tests).

    5. **Output Generation**: Adds a data table and a JSON result containing the compliance
    details to the action output.


    ### Additional Notes

    This action is read-only regarding external systems and does not modify any external
    data. It supports optional filtering by framework names and limits the number
    of frameworks returned.
