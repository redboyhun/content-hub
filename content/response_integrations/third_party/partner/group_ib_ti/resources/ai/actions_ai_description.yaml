Get-Collection-Info-Async:
  ai_description: >-
    ### General Description

    Extracts threat intelligence data from the Group-IB TI database for a specified
    collection. This action allows users to retrieve fresh updates from various threat
    intelligence feeds, such as malware signatures, threat actors, or compromised
    data, and optionally parse the output using predefined mapping configurations.


    ### Flow Description

    1. **Initialization**: The action initializes the Google SecOps environment and
    extracts configuration parameters, including the target collection, portion limit,
    and mapping parser settings.

    2. **Connector Setup**: A `GIBConnector` is initialized to establish communication
    with the Group-IB Threat Intelligence API.

    3. **Sequence Retrieval**: The action fetches the last sequence update number
    from storage. If unavailable, it determines the starting point based on the provided
    `Start date` or defaults to one day prior.

    4. **Data Generation**: An update generator is created using the poller to fetch
    data portions from the API based on the sequence update number and the specified
    limit.

    5. **Data Processing**: The action iterates through the retrieved data portions.
    If `Enable mapping parser` is set to true, the data is parsed using mapping keys;
    otherwise, the raw dictionary items are collected.

    6. **Result Aggregation**: The processed data is aggregated into a JSON structure
    and added to the action result.


    ### Additional Notes

    This action operates independently of any entities present in the case. It is
    designed for data ingestion and enrichment purposes and does not perform any mutations
    on external systems or internal case data.
  ai_short_description: >-
    Extracts threat intelligence data from the Group-IB TI database for a specified
    collection.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
