Get-Collection-Info-Async:
  ai_description: >-
    ### General Description

    Extracts threat intelligence data from the Group-IB Threat Intelligence (TI) database
    for a specified collection. This action is designed to retrieve structured threat
    data, such as indicators of compromise (IOCs), threat actor profiles, or malware
    information, and can be configured to perform incremental updates to ensure only
    fresh data is processed.


    ### Flow Description

    1. **Initialization**: The action initializes the Group-IB connector and poller
    using the provided API credentials and configuration.

    2. **Sequence Retrieval**: It attempts to fetch the last sequence update number
    from the system storage to determine the starting point for data retrieval.

    3. **Initial Setup**: If no previous sequence number is found, it uses the provided
    'Start date' parameter (or a default value) to request the initial sequence update
    number from the Group-IB API.

    4. **Data Generation**: An update generator is created to fetch data portions
    from the API based on the collection name, sequence update number, and the specified
    'Portion limit'.

    5. **Data Parsing**: The action iterates through the retrieved data portions.
    If 'Enable mapping parser' is set to true, it parses the data using predefined
    mapping keys; otherwise, it collects the raw dictionary items.

    6. **Result Aggregation**: The parsed or raw data is aggregated into a JSON object
    and added to the action result using `siemplify.result.add_result_json`.

    7. **Completion**: The action concludes by logging the status and ending the playbook
    execution.


    ### Additional Notes

    This action is intended for periodic execution to maintain up-to-date threat intelligence.
    It does not process specific entities directly but relies on configuration parameters
    to define the scope of the data retrieval. The action is read-only regarding external
    systems and does not modify case data, making it a pure enrichment/data-gathering
    task.
  ai_short_description: >-
    Extracts threat intelligence data from the Group-IB TI database for a specified
    collection, supporting incremental updates and optional data parsing.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to the Group-IB API to fetch threat intelligence
      data. It does not mutate external data or modify internal case data (entities,
      insights, etc.).
  categories:
    enrichment: true
    reasoning: >-
      The action fetches threat intelligence data from an external source (Group-IB
      TI) without modifying any external systems or internal case data (entities,
      insights, etc.). It is strictly a data-gathering/enrichment action.
    remediation: false
