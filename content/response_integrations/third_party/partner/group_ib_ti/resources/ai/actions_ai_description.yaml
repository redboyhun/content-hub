Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between the Google SecOps platform and the Group-IB Threat
    Intelligence service. This action verifies that the integration is correctly configured
    and that the platform can successfully communicate with the external API.


    ### Flow Description

    1. The action initializes the `GIBConnector` to establish a secure connection
    with the Group-IB Threat Intelligence API using the configured credentials.

    2. It sends a GET request to the `user/granted_collections` endpoint to retrieve
    a list of collections available under the current subscription.

    3. The retrieved JSON response is added to the action results, allowing the user
    to verify the connection status and view the available data collections.


    ### Additional Notes

    This action is strictly for connectivity testing and does not process any entities
    or perform any data enrichment or remediation tasks.
