Get-Graph-Info:
  ai_description: >-
    ### General Description

    Retrieves WHOIS and graph information for IP addresses and domains using the Group-IB
    Threat Intelligence platform. This action provides contextual intelligence to
    help analysts understand the infrastructure and associations related to specific
    indicators.


    ### Flow Description

    1. Initialize the Group-IB connector using the configured API credentials and
    URL.

    2. Gather all target entities from the current case.

    3. Validate and filter the entities to ensure only IP addresses and domains are
    processed.

    4. For each valid entity, perform an API request to the Group-IB endpoint `utils/graph/{entity_type}`.

    5. Aggregate the retrieved graph data into a JSON result object.

    6. Add the final JSON result to the action output for use in the playbook.


    ### Additional Notes

    This action is strictly for data retrieval (enrichment) and does not perform any
    mutations on external systems or internal case data. It relies on the Group-IB
    Threat Intelligence integration configuration for connectivity.
