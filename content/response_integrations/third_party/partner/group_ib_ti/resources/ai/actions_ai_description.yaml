Get-TI-Search-Info-By-Collection:
  ai_description: >-
    ### General Description

    Searches for indicators (Domain, IP Address, URL, File Hash, Bank Card, Email)
    within a specific Group-IB Threat Intelligence (TI) collection. This action allows
    analysts to query the Group-IB database for threat intelligence related to entities
    found in the case, optionally using a search tag to refine the query.


    ### Flow Description

    1. Initialize the `SiemplifyAction` and extract the required parameters: `Collection`,
    `Enable mapping parser`, and `Search tag`.

    2. Initialize the Group-IB TI poller using the provided configuration.

    3. Gather all target entities from the current case.

    4. Iterate through each entity:
        * Identify the entity type using the `EntityValidator`.
        * Construct a search query string. If a `Search tag` is provided, the query
    is formatted as `{tag}:{entity}`; otherwise, it is just the entity identifier.
        * Execute the search against the selected TI collection using the poller's
    `create_update_generator` method.
        * Parse the results (if `Enable mapping parser` is set to true) or collect
    raw items.
        * Aggregate the results into a JSON object.
    5. Add the final aggregated JSON results to the action's output.

    6. Terminate the action with a success status.


    ### Additional Notes

    This action is strictly for enrichment purposes. It does not modify any external
    systems or internal case data (such as entities, insights, or comments). It relies
    on the Group-IB TI API to fetch threat intelligence data.
