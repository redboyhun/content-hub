Get-Graph-Info:
  ai_description: >-
    ### General Description

    Retrieves graph-based threat intelligence, including WHOIS and related graph data,
    for IP addresses and domains using the Group-IB Threat Intelligence platform.
    This action provides contextual information to assist analysts in investigating
    indicators of compromise.


    ### Flow Description

    1. Initialize the Group-IB connector and API poller using integration-level credentials.

    2. Gather all target entities from the current case.

    3. Validate each entity to ensure it is either an IP address or a domain.

    4. For each valid entity, send a request to the Group-IB API endpoint `utils/graph/{entity_type}`.

    5. Aggregate the retrieved graph data into a JSON result object.

    6. Add the final result JSON to the action's output for use in the playbook.


    ### Additional Notes

    This action is strictly read-only and does not modify any external systems or
    internal case data. It relies on integration-level configuration parameters (API
    login, API key, and API URL) rather than action-specific parameters.
