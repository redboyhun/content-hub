Ping:
  ai_description: >-
    ### General Description

    This action performs a connectivity test to the Group-IB Threat Intelligence API.
    It verifies the integration's configuration by requesting the list of granted
    collections available under the user's subscription.


    ### Flow Description

    1. Initialize the `SiemplifyAction` and the `GIBConnector` to set up the API poller
    using the configured integration parameters.

    2. Perform an API request to the `user/granted_collections` endpoint to verify
    connectivity.

    3. If the request is successful, add the resulting JSON data (the list of granted
    collections) to the action result.

    4. Log the connection status and terminate the action with the appropriate execution
    state.


    ### Additional Notes

    This action does not require any entities and is primarily used for troubleshooting
    or verifying the integration's connectivity and subscription status.
