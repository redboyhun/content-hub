Change Policy State:
  ai_description: >-
    ### General Description

    Enables or disables an authentication policy within the Silverfort platform. This
    action provides a quick way to toggle a policy's active state without modifying
    its underlying configuration.


    ### Flow Description

    1. Extracts the `Policy ID` and `Enable Policy` (boolean) parameters from the
    action configuration.

    2. Initializes the Silverfort Policy API client using the provided credentials.

    3. Executes a POST request to the Silverfort `/v1/public/changePolicyState` endpoint
    with the specified `policy_id` and `state`.

    4. Returns the status of the operation and updates the action output message.


    ### Additional Notes

    This action directly modifies the configuration state of an external Silverfort
    policy. It is a state-changing (mutation) action on an external system.
  ai_short_description: >-
    Enables or disables an authentication policy in Silverfort.
