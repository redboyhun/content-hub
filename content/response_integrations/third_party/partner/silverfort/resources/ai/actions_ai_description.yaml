Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Silverfort API. This action validates that the provided
    External API Key and any configured API credentials (Risk, Service Accounts, or
    Policies) are valid and functional.


    ### Flow Description

    1. The action retrieves the integration parameters from the SOAR configuration.

    2. It identifies which API types (Risk, Service Accounts, or Policies) have credentials
    configured.

    3. For each configured API type, the action initializes the respective client
    and executes a connectivity test:
        - **Risk API**: Performs a GET request to the `get_entity_risk` endpoint.
        - **Service Accounts API**: Performs a POST request to the `list_service_accounts`
    endpoint with minimal data.
        - **Policies API**: Performs a GET request to the `get_rules_names_and_ids`
    endpoint.
    4. The action aggregates the results of these tests.

    5. It returns a success message if all tests pass, a partial success message if
    some pass, or raises an error if no connections are successful.


    ### Additional Notes

    This action is a diagnostic tool and does not perform any state-changing operations
    or data modifications on external systems or internal SOAR data.
