    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Changes the enabled/disabled state of an authentication policy in the Silverfort
      platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the Silverfort API to change the state
      of a policy. This is a mutation of external data (can_mutate_external_data=true).
      It does not fetch data or modify internal SOAR data.
  categories:
