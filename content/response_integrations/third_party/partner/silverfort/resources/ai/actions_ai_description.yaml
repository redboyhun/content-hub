Change Policy State:
  ai_description: >-
    ### General Description

    Enables or disables an authentication policy within the Silverfort platform. This
    action allows administrators to toggle the active state of a specific policy without
    modifying its underlying configuration, providing a quick mechanism to respond
    to security events or policy requirements.


    ### Flow Description

    1. The action extracts the `Policy ID` and `Enable Policy` parameters from the
    action configuration.

    2. The Silverfort Policy API client is initialized using the configured integration
    credentials.

    3. The action executes a POST request to the Silverfort API endpoint `/v1/public/changePolicyState`
    with the provided `policy_id` and the desired `state` (enabled or disabled).

    4. The API response is validated, and the action returns a success message confirming
    the policy state change.


    ### Additional Notes

    This action directly modifies the configuration state of the Silverfort platform.
    Ensure the `Policy ID` is correct before execution, as this change takes effect
    immediately.
  ai_short_description: >-
    Enables or disables an authentication policy in Silverfort by updating its active
    state.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Modifies the active state (enabled/disabled) of an authentication policy within
      the Silverfort platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the Silverfort API to change the state
      of a policy. This is a state-changing operation on an external system (Silverfort),
      thus `can_mutate_external_data` is true. It does not fetch data, update entities,
      or modify internal SOAR data.
