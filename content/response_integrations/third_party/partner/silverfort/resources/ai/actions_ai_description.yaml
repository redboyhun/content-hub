Get Entity Risk:
  ai_description: >-
    ### General Description

    Retrieves risk information for a user or resource from Silverfort. This action
    fetches the current risk score, severity level, and associated risk factors for
    the specified entity, providing valuable context for security investigations.


    ### Flow Description

    1. The action extracts the `User Principal Name` and `Resource Name` parameters
    from the action configuration.

    2. It validates that at least one of these parameters is provided; otherwise,
    it raises a `SilverfortInvalidParameterError`.

    3. The action initializes the Silverfort Risk API client using the configured
    integration credentials.

    4. It performs a GET request to the Silverfort API endpoint `/v1/public/getEntityRisk`
    with the provided identifier.

    5. The retrieved risk data is parsed and set as the action's JSON result, and
    a success message is generated.


    ### Additional Notes

    This action requires valid API credentials (Risk App User ID and Risk App User
    Secret) to be configured in the Silverfort integration settings. It does not modify
    any data in Silverfort or the SOAR platform.
