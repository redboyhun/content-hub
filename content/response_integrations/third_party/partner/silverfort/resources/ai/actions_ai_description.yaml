    Retrieves risk information for a user or resource from Silverfort. This action
    fetches the current risk score, severity, and risk factors associated with a specific
    user or resource, providing valuable context for security investigations.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `User Principal Name` or
    `Resource Name` from the provided action parameters.

    2. **Validation**: It validates that at least one of the two identifiers is provided
    to ensure a valid API request.

    3. **API Interaction**: The action initializes the Silverfort Risk API client
    and performs a GET request to the `/v1/public/getEntityRisk` endpoint.

    4. **Result Processing**: The retrieved risk data is parsed and set as the JSON
    result for the action.


