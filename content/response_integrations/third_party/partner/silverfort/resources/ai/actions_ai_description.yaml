Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Silverfort API by validating the configured credentials.
    This action ensures that the integration can successfully communicate with the
    Silverfort platform by testing the connection for each configured API type (Risk,
    Service Accounts, and Policies).


    ### Flow Description

    1. The action retrieves the integration parameters, including the API Root, External
    API Key, and any optional App User credentials (Risk, Service Accounts, Policies).

    2. It identifies which API types have credentials configured.

    3. For each configured API type, the action calls the corresponding API client's
    `test_connectivity` method:
        - **Risk API**: Performs a GET request to `/v1/public/getEntityRisk`.
        - **Service Accounts API**: Performs a POST request to `/v1/public/serviceAccounts/index`.
        - **Policies API**: Performs a GET request to `/v1/public/getRulesNamesAndIds`.
    4. The action aggregates the results of these connectivity tests.

    5. It returns a success or partial success message indicating which APIs are connected
    and which failed.


    ### Additional Notes

    This action is strictly for connectivity verification and does not perform any
    data retrieval or modification of entities or cases. It is essential for troubleshooting
    integration configuration issues.
