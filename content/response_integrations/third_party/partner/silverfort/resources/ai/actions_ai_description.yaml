List Policies:
  ai_description: >-
    ### General Description

    Retrieves a list of authentication policies from the Silverfort platform. This
    action allows users to fetch policy configurations, optionally filtering the returned
    fields to include only specific attributes such as enabled status, policy name,
    authentication type, and protocols.


    ### Flow Description

    1. The action initializes the `PolicyApiClient` to establish a connection with
    the Silverfort Policies API.

    2. It parses the optional `Fields` parameter, which is a comma-separated string
    of desired policy attributes.

    3. The action validates the requested fields against the supported `POLICY_INDEX_FIELDS`
    list, ignoring any invalid entries.

    4. It executes a `POST` request to the Silverfort `/v2/public/policies/index`
    endpoint to retrieve the policy data.

    5. The retrieved policy list is stored as JSON results within the action output,
    and a success message indicating the count of retrieved policies is generated.


    ### Additional Notes

    This action is read-only and does not modify any policies or external system states.
    If no fields are specified, the action returns all available policy fields by
    default.
