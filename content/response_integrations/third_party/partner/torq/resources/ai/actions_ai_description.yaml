Run a Workflow:
  ai_description: >-
    ### General Description

    Triggers a Torq workflow by sending a JSON payload to a configured Torq webhook.
    It optionally includes the current alert's context and polls the Torq Public API
    for the workflow's execution status and output.


    ### Flow Description

    1. Reads integration configuration (Webhook URL, Secret) and action parameters
    (Workflow Input, Include Alert Payload, Poll settings).

    2. Constructs a JSON payload containing the `workflow_input` and, if enabled,
    the current alert's metadata (entities, severity, etc.).

    3. Sends a POST request to the Torq webhook URL.

    4. Extracts the `execution_id` from the webhook response.

    5. Polls the Torq Public API (`/executions/{id}`) using the `execution_id` to
    retrieve the final workflow execution status and output.

    6. Updates the SecOps result pane with the execution details and final output.


    ### Additional Notes

    Requires valid Torq webhook credentials. Polling behavior is configurable via
    `Poll Max Seconds` and `Poll Interval Seconds`.
