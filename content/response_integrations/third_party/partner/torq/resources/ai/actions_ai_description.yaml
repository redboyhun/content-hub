    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Triggers a Torq workflow via webhook, which results in the creation of a case
      in the external system.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action triggers a workflow in Torq via webhook (can_mutate_external_data=true)
      and polls the Torq Public API for the execution result (fetches_data=true).
      It does not mutate internal data or perform operations on entities.
