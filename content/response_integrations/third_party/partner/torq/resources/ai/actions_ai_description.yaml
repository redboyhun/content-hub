Create a Case:
  ai_description: >-
    ### General Description

    Triggers a Torq workflow via a webhook to create a case, passing alert and case
    context. It supports optional deduplication and correlation keys to manage case
    creation and grouping.


    ### Flow Description

    1. Reads integration settings (URL, secret) and action parameters (Deduplication
    Key, Correlation Key, Poll Max Seconds, Poll Interval Seconds).

    2. Collects alert and case context (e.g., identifier, name, entities) from the
    current SOAR environment.

    3. Constructs a JSON payload containing the context and alert data.

    4. Sends a POST request to the configured Torq webhook URL.

    5. Polls the Torq Public API for the execution status until completion or timeout.

    6. Returns the final execution output and status to the SOAR result pane.


    ### Additional Notes

    Requires a Torq webhook URL and secret. Polling behavior is configurable via action
    parameters.
  ai_short_description: >-
    Triggers a Torq workflow via webhook to create a case, including alert context,
    and polls for the final execution result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
