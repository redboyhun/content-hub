Create a Case:
  ai_description: >-
    ### General Description

    This action triggers a Torq workflow by sending a webhook request containing the
    current alert's context and metadata. It supports optional deduplication and correlation
    keys to manage case creation. If configured with API credentials, it polls the
    Torq Public API to retrieve and display the final execution output within the
    SOAR platform.


    ### Flow Description

    1. The action retrieves integration configuration (URL, Secret, Region) and action
    parameters (Deduplication Key, Correlation Key, Polling settings).

    2. It serializes the current alert data, including entities and alert properties,
    into a JSON payload.

    3. It sends a POST request to the configured Torq Webhook URL with the serialized
    payload.

    4. If API credentials are provided, the action polls the Torq Public API (`/executions/{id}`)
    to monitor the workflow execution status.

    5. The final execution output and status are added to the SOAR result pane, and
    the action concludes with a status message.


    ### Additional Notes

    This action is primarily for triggering external automation workflows in Torq.
    It does not modify internal SOAR entities or alert data directly, but it does
    report the outcome of the external workflow execution.
  ai_short_description: >-
    Triggers a Torq workflow via webhook and polls for the final execution output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Triggers a workflow in the external Torq platform.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to trigger a Torq workflow (can_mutate_external_data=true)
      and polls the Torq Public API for execution status (fetches_data=true). It does
      not modify internal SOAR data.
  categories:
