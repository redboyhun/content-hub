Run a Workflow:
  ai_description: >-
    ### General Description

    Triggers a Torq workflow by sending a JSON payload to a configured webhook. This
    action optionally includes the current alert's context and polls the Torq Public
    API to retrieve the final execution output, providing visibility into the workflow's
    completion status.


    ### Flow Description

    1. Reads integration configuration (URL, Secret) and action parameters (Workflow
    Input, Include Alert Payload, Poll settings).

    2. Constructs a JSON payload containing the `workflow_input` and, if enabled,
    the current alert's metadata and entities.

    3. Sends a POST request to the Torq webhook URL.

    4. Extracts the execution ID from the response.

    5. Polls the Torq Public API (`/executions/{id}`) until the workflow reaches a
    terminal state (e.g., SUCCESS, FAILED) or the polling timeout is reached.

    6. Returns the final execution output and status in the action result.


    ### Additional Notes

    This action is a generic workflow runner. The actual outcome depends on the logic
    defined within the Torq workflow being triggered. It acts as a gateway for external
    automation and mitigation workflows.
