Ping:
  ai_description: >-
    ### General Description

    This action triggers a workflow in Torq by sending a webhook request and optionally
    polls the Torq Public API to retrieve the execution status and output of the triggered
    workflow. It is designed to integrate Google SecOps with Torq automation workflows.


    ### Flow Description

    1. The action retrieves configuration parameters (Webhook URL, Secret) and action-specific
    parameters (Poll Max Seconds, Poll Interval Seconds).

    2. It constructs a JSON payload containing context information, including the
    Case ID, Case Name, and Environment.

    3. The action sends a POST request to the configured Torq Webhook URL.

    4. If an execution ID is returned in the response, the action polls the Torq Public
    API (`/executions/{id}`) to monitor the workflow status until completion or the
    maximum polling time is reached.

    5. The final execution status and output are returned as a JSON result in the
    SecOps platform.


    ### Additional Notes

    This action does not interact with specific entities in the SecOps case; it operates
    globally. It requires a valid Torq Webhook URL and Secret to function.
