Ping:
  ai_description: >-
    ### General Description

    Sends a ping to a Torq workflow via a webhook and optionally polls the Torq Public
    API for the execution result. This action is used to trigger external automation
    workflows in Torq and wait for their completion.


    ### Flow Description

    1. Retrieves integration configuration (URL, secret, etc.) from the server.

    2. Constructs a JSON payload containing context (case ID, name, environment).

    3. Sends a POST request to the configured Torq webhook URL.

    4. If configured, polls the Torq Public API (GET request) to retrieve the execution
    status and output.

    5. Adds the final execution result to the action output using `si.result.add_result_json`.


    ### Additional Notes

    This action is used to trigger external automation workflows in Torq and wait
    for their completion. It does not modify entities, create insights, or add case
    comments.
