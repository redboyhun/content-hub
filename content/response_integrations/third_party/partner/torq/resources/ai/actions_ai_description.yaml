    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: Triggers a workflow execution in Torq.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action triggers an external workflow (can_mutate_external_data=true) and
      fetches the execution result (fetches_data=true). It does not modify internal
