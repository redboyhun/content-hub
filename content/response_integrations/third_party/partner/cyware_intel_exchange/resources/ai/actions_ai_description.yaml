Create Task for IOCs:
  ai_description: >-
    ### General Description

    Creates a task for threat data objects (IOCs) within the Cyware Intel Exchange
    platform. This action allows analysts to track and manage investigations by generating
    tasks associated with specific indicators, supporting prioritization, status tracking,
    and assignment to specific users.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the task description (`Text`),
    `Priority`, `Status`, `Deadline` (in days), and an optional `Assignee Email ID`
    from the configuration.

    2. **Entity Retrieval**: It retrieves all target entities from the current case.

    3. **User Validation**: If an `Assignee Email ID` is provided, the action calls
    the Cyware API (`get_user_by_email`) to resolve the email to a valid user ID.
    If the user is not found, the action fails.

    4. **IOC Lookup**: The action performs a bulk lookup (`lookup_iocs`) in Cyware
    Intel Exchange to resolve the entity identifiers to Cyware object IDs. Entities
    not found in Cyware are skipped.

    5. **Task Creation**: For each valid IOC, the action calls the Cyware API (`create_task`)
    to create a new task with the specified parameters (text, priority, status, deadline,
    and optional assignee).

    6. **Result Reporting**: The action returns a JSON result containing the details
    of the created tasks and updates the case with a summary message.


    ### Additional Notes

    - The `Deadline` parameter is converted from days to an epoch timestamp.

    - If no valid IOCs are found, the action completes successfully but reports that
    no tasks were created.

    - The action does not modify the entities themselves, only creates external task
    records.
