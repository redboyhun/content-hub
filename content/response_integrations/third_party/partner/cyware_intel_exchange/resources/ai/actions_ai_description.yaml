Mark IOCs False Positive:
  ai_description: >-
    ### General Description

    Marks multiple Indicators of Compromise (IOCs) as false positives within the Cyware
    Intel Exchange platform. This action helps reduce noise by updating the status
    of indicators that have been identified as benign or incorrectly flagged, ensuring
    that security teams can focus on genuine threats.


    ### Flow Description

    1. **Initialization**: The action retrieves integration configuration parameters
    (Base URL, Access ID, Secret Key, Verify SSL) and extracts all target entities
    from the current case.

    2. **Lookup**: It performs a bulk lookup of the extracted entity identifiers against
    the Cyware Intel Exchange API to retrieve their corresponding internal object
    IDs.

    3. **Filtering**: Indicators that are not found within the Cyware Intel Exchange
    are filtered out and skipped.

    4. **Mutation**: For all valid indicators found, the action executes a POST request
    to the `bulk-action/false_positive/` endpoint to update their status to 'false
    positive'.

    5. **Result**: The action returns the API response and updates the case with the
    outcome of the operation.


    ### Additional Notes

    This action requires valid Cyware Intel Exchange credentials. It operates on all
    provided entities and does not require specific action-level parameters.
