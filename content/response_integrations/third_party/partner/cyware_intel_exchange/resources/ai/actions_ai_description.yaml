Add Note to IOCs:
  ai_description: >-
    ### General Description

    Adds a custom note to existing threat data objects (IOCs) within the Cyware Intel
    Exchange platform. This action allows analysts to append contextual information,
    such as investigation findings or analyst comments, directly to indicators managed
    in Cyware.


    ### Flow Description

    1. The action extracts integration parameters (Base URL, Access ID, Secret Key)
    and the list of target entities (IOCs) from the case.

    2. It retrieves the action parameters: `Note`, `Note Type`, and `Is the Note in
    Json format`.

    3. If `Is the Note in Json format` is enabled, the action validates and parses
    the provided note string to ensure it is valid JSON.

    4. The action performs a bulk lookup of the provided IOCs against the Cyware Intel
    Exchange API (`POST /ingestion/openapi/bulk-lookup/indicator/`) to retrieve their
    internal object IDs.

    5. For each valid IOC found, the action executes an API call (`POST /ingestion/notes/`)
    to attach the specified note to the indicator.

    6. The action logs the success or failure of each operation and returns the results
    to the SOAR platform.


    ### Additional Notes

    This action requires valid Cyware Intel Exchange credentials. If the note content
    is provided in JSON format, ensure the 'Is the Note in Json format' parameter
    is set to true to avoid formatting errors.
