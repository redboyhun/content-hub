Add IOCs to Allowed list:
  ai_description: >-
    ### General Description

    Adds indicators to the allowlist (whitelist) in the Cyware Intel Exchange platform.
    This action is used to mark specific indicators as 'known good' to prevent future
    security alerts or false positives within the Cyware ecosystem.


    ### Flow Description

    1. The action extracts the required parameters: `IOC Type` and `Reason` from the
    action configuration.

    2. It retrieves the target entities (IOCs) from the current case.

    3. The `APIManager` is initialized with the integration credentials (Base URL,
    Access ID, Secret Key).

    4. The action calls the `add_allowed_iocs` method, which performs a POST request
    to the Cyware Intel Exchange API (`/conversion/allowed_indicators/`) to add the
    provided indicators to the allowlist.

    5. The response from the API is parsed to identify which indicators were successfully
    added, which already existed, and which were invalid.

    6. The action logs the results and updates the output message with the processing
    summary.


    ### Additional Notes

    This action performs a mutation on the external Cyware Intel Exchange platform
    by updating its allowlist configuration. It does not modify internal SOAR case
    data or entities.
