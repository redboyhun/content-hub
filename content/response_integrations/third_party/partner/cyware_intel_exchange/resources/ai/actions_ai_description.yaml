  ai_description: >-
    ### General Description

    Retrieves a list of allowed (whitelisted) indicators from the Cyware CTIX platform.
    This action allows users to query the Cyware system for indicators that have been
    marked as allowed, with optional filtering by indicator type and creation time.


    ### Flow Description

    1. The action extracts integration configuration parameters (Base URL, Access
    ID, Secret Key, Verify SSL) and action parameters (IOC Type, Created From).

    2. It initializes the `APIManager` to establish a connection with the Cyware CTIX
    API.

    3. The action calls the `get_allowed_iocs` method, passing the optional filters
    (`ioc_type` and `created_from`) to the API.

    4. The API response is processed to extract the list of allowed IOCs.

    5. A CSV table containing the retrieved IOCs is constructed and added to the action
    results.

    6. The raw JSON response from the API is added to the action results.

    7. The action concludes by returning a success message and the retrieved data.


    ### Additional Notes

    This action is a read-only operation and does not modify any data in the Cyware
    CTIX platform or the SOAR environment. It is designed for visibility and auditing
    of allowed indicators.
