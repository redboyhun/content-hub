Get IOC Details:
  ai_description: >-
    ### General Description

    This action retrieves detailed threat intelligence for indicators (IOCs) from
    the Cyware Intel Exchange platform. It fetches information such as analyst scores,
    confidence scores, TLP, and tags, and optionally includes enrichment data and
    relations to provide comprehensive context for security investigations.


    ### Flow Description

    1. Extracts configuration parameters (Base URL, Access ID, Secret Key) and action
    parameters (Enrichment Data, Relation Data, Fields).

    2. Retrieves all target entities from the current case.

    3. Calls the Cyware Intel Exchange API (via the `/ingestion/openapi/bulk-lookup/{object_type}/`
    endpoint) to fetch details for the provided IOCs.

    4. Processes the API response to extract IOC details and formats them into a data
    table for the action results.

    5. Filters the original entities to match those found in the API response.

