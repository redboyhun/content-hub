Add IOCs to Allowed list:
  ai_description: >-
    ### General Description

    Adds indicators (IOCs) to the allowlist in the Cyware Intel Exchange platform.
    This action allows security teams to mark specific indicators as trusted, preventing
    them from triggering future security alerts or false positives within the integrated
    environment.


    ### Flow Description

    1. Extracts the `IOC Type` and `Reason` from the action parameters.

    2. Retrieves all target entities from the current case using the `get_entities`
    utility.

    3. Initializes the `APIManager` with the integration's base URL, access ID, and
    secret key.

    4. Executes the `add_allowed_iocs` method, which performs a POST request to the
    Cyware API endpoint `/conversion/allowed_indicators/` with the provided IOC type,
    entity values, and reason.

    5. Processes the API response to determine the count of new, existing, and invalid
    indicators.

    6. Updates the action result with the processed details and logs the response.


    ### Additional Notes

    This action requires valid Cyware Intel Exchange credentials. It processes all
    target entities provided in the case without specific type-based filtering, relying
    on the `IOC Type` parameter to define the indicator category for the API request.
  ai_short_description: >-
    Adds indicators (IOCs) to the allowlist in the Cyware Intel Exchange platform.
