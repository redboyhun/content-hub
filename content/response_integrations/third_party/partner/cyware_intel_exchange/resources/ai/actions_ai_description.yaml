Remove IOCs from Allowed list:
  ai_description: >-
    ### General Description

    Removes specified Indicators of Compromise (IOCs) from the allowlist within the
    Cyware Intel Exchange platform. This action resolves entity identifiers to Cyware
    indicator IDs and performs a bulk removal operation to un-whitelist them, effectively
    restoring standard security monitoring for these indicators.


    ### Flow Description

    1. The action retrieves integration configuration parameters (Base URL, Access
    ID, Secret Key, Verify SSL) to establish a connection to the Cyware Intel Exchange
    API.

    2. It retrieves the list of target entities from the current case.

    3. The action performs a bulk lookup via the `APIManager.lookup_iocs` method to
    resolve the entity identifiers to their corresponding Cyware indicator IDs.

    4. Indicators that are not found in the Cyware Intel Exchange are filtered out
    and skipped.

    5. The action executes a bulk removal request using the `APIManager.remove_allowed_iocs`
    method, sending the valid indicator IDs to the `/ingestion/threat-data/bulk-action/un_whitelist/`
    endpoint.

    6. The action returns the result of the operation, including a success message
    or error details, and updates the script result.


    ### Additional Notes

    This action does not require any specific action-level parameters, as it operates
    directly on the target entities provided in the case. It relies on the integration
    configuration for authentication.
