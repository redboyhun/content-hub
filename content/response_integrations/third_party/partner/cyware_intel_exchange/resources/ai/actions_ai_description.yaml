    ### General Description

    This action verifies the connectivity between the Google SecOps SOAR platform
    and the Cyware Intel Exchange server. It is primarily used to validate that the
    integration configuration (Base URL, Access ID, and Secret Key) is correct and
    that the API is reachable.


    ### Flow Description

    1. The action retrieves the integration configuration parameters (Base URL, Access
    ID, Secret Key, and Verify SSL) from the environment.

    2. It initializes the `APIManager` using these credentials.

    3. The action performs a `GET` request to the `/ping/` endpoint of the Cyware
    API.

    4. If the request is successful, it returns a success message indicating the connection
    is established.

    5. If the request fails (e.g., due to invalid credentials or network issues),
    it catches the exception, logs the error, and marks the action as failed.


