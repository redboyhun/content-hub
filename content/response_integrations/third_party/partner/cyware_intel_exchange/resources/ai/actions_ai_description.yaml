Manage Tags in IOCs:
  ai_description: "### General Description\nThis action manages tags for Indicators\
    \ of Compromise (IOCs) within the Cyware Intel Exchange platform. It allows analysts\
    \ to either add or remove specific tags from a set of IOCs, facilitating better\
    \ organization and categorization of threat intelligence data.\n\n### Flow Description\n\
    1. **Parameter Extraction**: The action extracts the `Tags` (comma-separated list)\
    \ and `Operation Type` (Add or Remove) from the action parameters.\n2. **Entity\
    \ Retrieval**: It retrieves all target entities (IOCs) associated with the current\
    \ case.\n3. **API Initialization**: It initializes the `APIManager` to communicate\
    \ with the Cyware Intel Exchange API.\n4. **Tag Resolution**: It fetches the list\
    \ of existing tags from Cyware to map the provided tag names to their corresponding\
    \ IDs.\n5. **IOC Resolution**: It resolves the provided IOC values to their internal\
    \ object IDs in Cyware using the `lookup_iocs` method.\n6. **Execution**: \n \
    \  - If **Add Tag** is selected: It creates any missing tags if necessary and\
    \ then calls the `add_tags_to_ioc` API endpoint to associate the tags with the\
    \ resolved IOC IDs.\n   - If **Remove Tag** is selected: It calls the `remove_tags_from_ioc`\
    \ API endpoint to dissociate the tags from the resolved IOC IDs.\n7. **Result\
    \ Reporting**: The action logs the outcome and returns the JSON response from\
    \ the API to the SOAR platform.\n\n### Additional Notes\n- The action requires\
    \ valid API credentials for Cyware Intel Exchange.\n- If an IOC is not found in\
    \ Cyware Intel Exchange, it is skipped, and the action continues processing the\
    \ remaining valid IOCs.\n- When adding tags, if a tag name does not exist in Cyware,\
    \ the action attempts to create it automatically."
