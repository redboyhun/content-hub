Manage Tags in IOCs:
  ai_description: >-
    ### General Description

    This action manages tags on Indicators of Compromise (IOCs) within the Cyware
    Intel Exchange platform. It allows analysts to either add or remove specific tags
    from a set of IOCs identified in the case. The action resolves IOC values to their
    corresponding object IDs in Cyware, handles the creation of missing tags if necessary,
    and performs the requested bulk tag operation.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Tags` (comma-separated string)
    and `Operation Type` (Add Tag or Remove Tag) from the configuration.

    2. **Entity Retrieval**: It retrieves all target entities from the current case
    to be processed as IOCs.

    3. **Tag Resolution**: It fetches the list of existing tags from Cyware Intel
    Exchange to map the provided tag names to their respective IDs.

    4. **IOC Lookup**: It resolves the entity identifiers to Cyware object IDs using
    the `lookup_iocs` method.

    5. **Operation Execution**:
       - If **Add Tag** is selected: It creates any missing tags in Cyware if they
    do not exist, then calls the `add_tags_to_ioc` API endpoint to associate the tags
    with the resolved IOCs.
       - If **Remove Tag** is selected: It calls the `remove_tags_from_ioc` API endpoint
    to dissociate the tags from the resolved IOCs.
    6. **Result Reporting**: The action logs the outcome and adds the API response
    to the script results.


    ### Additional Notes

    - The action supports bulk operations on multiple IOCs.

    - If an IOC is not found in Cyware Intel Exchange, it is skipped, and the action
    continues processing the remaining valid IOCs.

    - The action requires valid API credentials for Cyware Intel Exchange to perform
    tag management operations.
