Create Intel in Cyware Intel Exchange:
  ai_description: >-
    ### General Description

    Creates a new intelligence record in the Cyware Intel Exchange platform. This
    action allows analysts to push indicator data, along with associated metadata
    such as TLP, confidence scores, tags, and descriptions, directly into the Cyware
    platform for threat intelligence management.


    ### Flow Description

    1. Extract action parameters (Title, TLP, Confidence, Tags, Expiration, Description,
    IOC Type).

    2. Retrieve all target entities from the case.

    3. For each entity, construct a payload containing the indicator value and the
    provided metadata.

    4. Execute a POST request to the Cyware API (`/conversion/quick-intel/create-stix/`)
    to initiate intel creation.

    5. Poll the Cyware API (`/conversion/quick-intel/receive-report/`) using the returned
    `task_id` to monitor the processing status.

    6. Append the creation and status results to the action's result JSON.


    ### Additional Notes

    This action performs a mutation on the external Cyware platform. It does not modify
    internal case data or entities.
