Add Note to IOCs:
  ai_description: >-
    ### General Description

    Adds a note to an existing threat data object (IOC) within the Cyware Intel Exchange
    platform. This action allows analysts to append contextual information or investigation
    findings directly to indicators stored in the external system.


    ### Flow Description

    1. The action retrieves integration configuration parameters and the list of target
    entities (IOCs) from the current case.

    2. It extracts the action parameters: 'Note', 'Note Type', and 'Is the Note in
    Json format'.

    3. If 'Is the Note in Json format' is enabled, the action validates and parses
    the provided note string as JSON.

    4. The action performs a bulk lookup via the Cyware API to resolve the provided
    IOC values to their corresponding internal object IDs.

    5. For each successfully resolved IOC, the action sends a POST request to the
    Cyware API to add the specified note.

    6. The action logs the success or failure of each operation and returns the results
    to the SOAR platform.


    ### Additional Notes

    This action performs a mutation on the external Cyware Intel Exchange platform
    by creating new note records. It does not modify any internal SOAR case data or
    entities.
