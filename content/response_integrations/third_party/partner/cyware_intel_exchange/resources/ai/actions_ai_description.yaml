    the Cyware Intel Exchange platform.


    ### Flow Description

    1. Extracts the `IOC Type` and `Created From` parameters from the action configuration.

    2. Initializes the `APIManager` to establish a connection with the Cyware CTIX
    API.

    3. Calls the `get_allowed_iocs` method of the `APIManager` to fetch the allowed
    indicators, optionally filtering by type and creation time.

    4. Processes the API response, converting the raw data into `AllowedIOC` data
    models.

    5. Constructs a CSV table of the retrieved IOCs and adds it to the action results.

    6. Adds the full JSON response to the action results and completes the execution.


    ### Additional Notes

    The action supports filtering by indicator type and creation time (epoch format).
    It limits the number of records displayed in the table to 10.
