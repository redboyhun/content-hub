Get IOC Details:
  ai_description: >-
    ### General Description

    Retrieves threat intelligence details for Indicators of Compromise (IOCs) from
    the Cyware Intel Exchange platform. This action allows analysts to fetch comprehensive
    data, including analyst scores, confidence levels, and TLP, to better understand
    the context of indicators present in a case.


