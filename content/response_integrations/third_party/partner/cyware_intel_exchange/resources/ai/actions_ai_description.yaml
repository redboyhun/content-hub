Create Intel in Cyware Intel Exchange:
  ai_description: >-
    ### General Description

    This action creates a new intelligence record in the Cyware Intel Exchange platform.
    It allows users to submit indicators (IOCs) along with metadata such as TLP, confidence
    scores, tags, and expiration dates.


    ### Flow Description

    1. Retrieve integration parameters (Base URL, Access ID, Secret Key) from the
    configuration.

    2. Extract all target entities from the current case.

    3. Validate input parameters, including Title, Description, Confidence Score,
    and Deprecates After.

    4. Iterate through each entity and construct a payload containing the indicator
    value, metadata, and title.

    5. Call the Cyware API (`POST /conversion/quick-intel/create-stix/`) to create
    the intelligence record.

    6. Poll the Cyware API (`GET /conversion/quick-intel/receive-report/`) using the
    returned `task_id` to monitor the status of the intel creation until completion
    or failure.

    7. Aggregate the results and update the action output.


    ### Additional Notes

    The action supports various IOC types as defined in the `IOC Type` parameter.
    It includes retry logic for API calls and handles rate limiting. If no entities
    are found, the action completes without performing any operations.
