Create Task for IOCs:
  ai_description: >-
    ### General Description

    Creates tasks for indicators (IOCs) within the Cyware Intel Exchange platform.
    This action allows analysts to track remediation or investigation efforts by generating
    structured tasks associated with specific threat data objects found in the case.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves configuration parameters (Base
    URL, Access ID, Secret Key) and action-specific inputs (Text, Priority, Status,
    Deadline, Assignee Email).

    2. **Entity Retrieval**: It retrieves all target entities attached to the current
    case.

    3. **Input Validation**: Validates the task description length and calculates
    the deadline epoch based on the provided number of days.

    4. **User Lookup**: If an 'Assignee Email ID' is provided, it makes a GET request
    to the Cyware API to retrieve the corresponding user ID.

    5. **IOC Lookup**: Performs a bulk lookup of the retrieved entities in Cyware
    to map indicator values to their internal object IDs.

    6. **Task Creation**: Iterates through the valid IOCs and makes a POST request
    to the Cyware API to create a task for each indicator, including the specified
    priority, status, deadline, and optional assignee.

    7. **Result Reporting**: Aggregates the results of the task creation process and
    adds them to the action's output JSON.


    ### Additional Notes

    This action requires valid Cyware Intel Exchange credentials. If an IOC is not
    found in the Cyware platform, it is skipped. The action supports assigning tasks
    to specific users if their email is provided and found in the system.
