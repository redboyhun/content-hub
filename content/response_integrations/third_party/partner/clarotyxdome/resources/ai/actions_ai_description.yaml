AddVulnerabilities:
  ai_description: >-
    ### General Description

    Enriches device entities with vulnerability information retrieved from the Claroty
    xDome platform. This action identifies devices based on their IP address, MAC
    address, or UID, queries the xDome API for associated vulnerabilities, and updates
    the entity's additional properties with the findings.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Claroty xDome host URL,
    API token, and SSL verification settings from the integration configuration.

    2. **Entity Processing**: The action iterates through all target entities provided
    in the case.

    3. **Device Identification**: For each entity, the action determines if the identifier
    is a UID. If not, it attempts to resolve the entity to a device UID by sending
    a POST request to the `/api/v1/devices/` endpoint, filtering by IP or MAC address.

    4. **Vulnerability Retrieval**: If a device is successfully identified, the action
    sends a POST request to the `/api/v1/device_vulnerability_relations/` endpoint
    to fetch all associated vulnerability records.

    5. **Entity Enrichment**: The retrieved vulnerability data (including IDs, names,
    scores, and descriptions) is added to the entity's `additional_properties`. The
    entity is marked as enriched (`is_enriched = True`).

    6. **Platform Update**: The action updates the enriched entities within the SOAR
    platform and returns the results as a JSON object.


    ### Additional Notes

    This action requires valid API credentials for the Claroty xDome instance. If
    a device cannot be resolved or no vulnerabilities are found, the entity is not
    enriched, and the failure is logged in the results.
  ai_short_description: >-
    Enriches device entities with vulnerability information retrieved from Claroty
    xDome.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties and enrichment status within the SOAR platform.
    reasoning: >-
      The action fetches vulnerability data from an external API (Claroty xDome) and
      updates internal entities with this information. It does not mutate external
      data (no POST/PUT/DELETE to external systems that change state) or modify alert
      data/case comments.
  entity_usage:
