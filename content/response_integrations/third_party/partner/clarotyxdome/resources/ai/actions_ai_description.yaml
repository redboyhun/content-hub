    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with vulnerability data and sets the is_enriched
      flag.
    reasoning: >-
      The action fetches data from Claroty xDome (fetches_data=true). It does not
      mutate external data. It updates internal entities with the retrieved information
      (can_update_entities=true).
  categories:
