AddVulnerabilities:
  ai_description: "### General Description\nEnriches entities (IP addresses or MAC\
    \ addresses) with vulnerability information retrieved from the Claroty xDome platform.\
    \ This action identifies the corresponding device in xDome and fetches its associated\
    \ vulnerability data, including CVE IDs, risk scores, and remediation recommendations.\
    \ The retrieved data is then added to the entity's additional properties within\
    \ the SOAR platform.\n\n### Flow Description\n1. **Configuration Extraction**:\
    \ The action retrieves the Claroty xDome API host, API token, and SSL verification\
    \ settings from the integration configuration.\n2. **Entity Processing**: The\
    \ action iterates through the provided target entities.\n3. **Device Identification**:\
    \ \n    - If the entity identifier is a UID, it proceeds directly to vulnerability\
    \ lookup.\n    - If the identifier is an IP or MAC address, it calls the Claroty\
    \ xDome `/api/v1/devices/` endpoint to search for the device and retrieve its\
    \ UID.\n4. **Vulnerability Lookup**: Using the device UID, the action calls the\
    \ Claroty xDome `/api/v1/device_vulnerability_relations/` endpoint to fetch all\
    \ associated vulnerabilities.\n5. **Entity Update**: The action updates the entity's\
    \ `additional_properties` with the vulnerability data and sets the `is_enriched`\
    \ flag to true.\n6. **SOAR Update**: Finally, the action updates the entities\
    \ in the SOAR platform and adds the raw JSON results to the action output.\n\n\
    ### Additional Notes\nThis action is read-only regarding the external Claroty\
    \ xDome system. It performs internal mutations by updating entity attributes within\
    \ the SOAR platform."
  ai_short_description: >-
    Enriches IP and MAC address entities with vulnerability data from Claroty xDome.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
