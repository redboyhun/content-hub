Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Claroty xDome platform by attempting to retrieve a sample
    alert. This action verifies that the integration configuration is correct and
    that the SOAR platform can successfully communicate with the Claroty xDome instance.


    ### Flow Description

    1. Extracts configuration parameters: `xdomeHost`, `xdomeApiToken`, and `Verify
    SSL`.

    2. Constructs the API request URL using the provided host.

    3. Sends a POST request to the Claroty xDome API (`/api/v1/alerts/`) with authentication
    headers and a minimal payload to verify connectivity.

    4. Validates the response status.

    5. Returns a success or failure message based on the API response.


    ### Additional Notes

    This action is used to verify that the integration configuration is correct and
    that the SOAR platform can communicate with the Claroty xDome instance.
