EnrichAlerts:
  ai_description: >-
    General Description

    This action enriches the current Siemplify alert with detailed information from
    a Claroty xDome alert. It retrieves alert metadata, including status, description,
    and MITRE ATT&CK mapping, and updates the Siemplify alert's additional properties
    and security results.


    Flow Description

    1. Extract configuration parameters (`xdomeHost`, `xdomeApiToken`) and the `clarotyAlertId`
    action parameter.

    2. Send a POST request to the Claroty xDome API (`/api/v1/alerts/`) to fetch alert
    details for the specified ID.

    3. Parse the response to extract alert fields and MITRE mapping information.

    4. Update the current Siemplify alert's `additional_properties` with the retrieved
    Claroty alert data.

    5. Update the Siemplify alert's `security_result` with MITRE tactic and technique
    information if available.

    6. Add the raw alert JSON to the action result and terminate the action.


    Additional Notes

    This action operates on the current alert context and does not require specific
    entity selection.
