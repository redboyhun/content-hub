EnrichXDomeAssetInformation:
  ai_description: >-
    ### General Description

    Enriches IP and MAC address entities with asset and vulnerability information
    retrieved from Claroty xDome. This action queries the Claroty xDome API to gather
    device metadata, such as device name, site, risk score, and associated vulnerabilities,
    and updates the corresponding entities within the SOAR platform with this context.


    ### Flow Description

    1. The action extracts the `xdomeHost` and `xdomeApiToken` from the integration
    configuration.

    2. It iterates through the provided target entities, filtering for those with
    types `ADDRESS` or `MACADDRESS`.

    3. For each valid entity, it performs a POST request to the Claroty xDome `/api/v1/devices/`
    endpoint to retrieve device details based on the IP or MAC address.

    4. If a device is found, it performs a subsequent POST request to the `/api/v1/device_vulnerability_relations/`
    endpoint to fetch associated vulnerabilities.

    5. The action compiles the device metadata and vulnerability summary into a dictionary.

    6. It updates the entity's `additional_properties` with the gathered information
    and sets the `is_enriched` flag to true.

    7. Finally, it updates the entities in the SOAR platform and adds the result JSON
    to the action output.


    ### Additional Notes

    This action requires a valid Claroty xDome instance URL and an API token with
    appropriate permissions to query device and vulnerability data. It performs read-only
    operations on the external system and does not modify external data.
