EnrichXDomeAssetInformation:
  ai_description: >-
    ### General Description

    Enriches IP and MAC address entities with asset and vulnerability information
    retrieved from the Claroty xDome platform. This action enhances the context of
    network assets within the SOAR platform by pulling device metadata and associated
    vulnerability data, allowing analysts to better assess the risk profile of the
    entities involved in an investigation.


    ### Flow Description

    1. **Entity Validation**: The action iterates through the provided entities, filtering
    for those with types `ADDRESS` or `MACADDRESS`.

    2. **Device Lookup**: For each valid entity, the action performs a POST request
    to the Claroty xDome `/api/v1/devices/` endpoint to retrieve device details based
    on the entity's identifier (IP or MAC).

    3. **Vulnerability Retrieval**: If a matching device is found, the action performs
    a second POST request to the `/api/v1/device_vulnerability_relations/` endpoint
    using the device's UID to fetch associated vulnerability information.

    4. **Entity Update**: The action compiles the retrieved device metadata (e.g.,
    device name, risk score, manufacturer) and vulnerability summary (count and top
    CVEs) into the entity's `additional_properties` and marks the entity as enriched.

    5. **Result Reporting**: The action updates the entities in the SOAR platform
    and returns a JSON summary of the enrichment results.


    ### Additional Notes

    This action requires a valid Claroty xDome host URL and an API token for authentication.
    It is strictly an enrichment action and does not perform any modifications to
    external systems.
