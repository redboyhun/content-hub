EnrichAlerts:
  ai_description: >-
    ### General Description

    Enriches the current Google SecOps alert with detailed information and MITRE ATT&CK
    mapping retrieved from Claroty xDome. This action allows analysts to pull specific
    alert data using a unique Claroty alert ID and automatically populate the SecOps
    alert's additional properties and security results.


    ### Flow Description

    1. The action extracts the required configuration parameters (`xdomeHost`, `xdomeApiToken`)
    and the `clarotyAlertId` from the action input.

    2. It performs a POST request to the Claroty xDome API endpoint (`/api/v1/alerts/`)
    to fetch the alert details corresponding to the provided ID.

    3. Upon receiving the response, the action parses the alert data, including fields
    such as alert name, status, description, and MITRE technique information.

    4. It updates the current Google SecOps alert's `additional_properties` with the
    retrieved Claroty alert fields.

    5. It updates the current Google SecOps alert's `security_result` with the mapped
    MITRE tactic and technique information (IDs and names).

    6. Finally, the action adds the raw alert JSON to the result and completes the
    execution.


    ### Additional Notes

    This action modifies the current alert's metadata and security results within
    the Google SecOps platform. It does not perform any external system mutations
    or entity updates.
