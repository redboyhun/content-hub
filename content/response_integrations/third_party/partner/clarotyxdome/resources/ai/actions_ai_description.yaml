Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Claroty xDome platform by attempting to retrieve a sample
    alert. This action verifies that the provided configuration parameters, such as
    the host URL and API token, are valid and that the integration can successfully
    communicate with the Claroty xDome API.


    ### Flow Description

    1. Extracts configuration parameters: `xdomeHost`, `xdomeApiToken`, and `Verify
    SSL`.

    2. Constructs the API URL using the provided `xdomeHost`.

    3. Sends a POST request to the Claroty xDome API endpoint (`/api/v1/alerts/`)
    with a payload to fetch a single alert (`limit: 1`).

    4. Validates the API response to ensure connectivity.

    5. Returns a success or failure message based on the connectivity test result.


    ### Additional Notes

    This action is designed for connectivity verification and does not modify any
    data in the Claroty xDome platform or the SOAR environment.
