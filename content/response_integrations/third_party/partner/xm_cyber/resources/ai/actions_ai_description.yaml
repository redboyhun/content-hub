Calculate Risk Score:
  ai_description: >-
    ### General Description

    Calculates a risk score for alerts and entities based on XM Cyber-specific properties
    and user-defined configuration parameters. This action is designed to assist in
    alert filtration and prioritization within the SOAR platform.


    ### Flow Description

    1. Collects configuration parameters (e.g., risk weights for critical assets,
    admin status, MFA status) from the action settings.

    2. Iterates through the alert's security events and target entities.

    3. Filters entities based on supported types (User, Hostname) and the presence
    of XM Cyber-specific attributes.

    4. Calculates risk scores for each entity and event using the provided configuration
    weights.

    5. Aggregates the calculated scores into a final JSON object.

    6. Outputs the resulting JSON object to the action results using the `siemplify.result.add_result_json`
    method.


    ### Additional Notes

    This action is purely analytical and does not perform external API calls or modify
    external systems. It is designed to assist in alert filtration and prioritization
    within the SOAR platform.
  ai_short_description: >-
    Calculates a risk score for alerts and entities based on XM Cyber-specific properties
    and user-defined configuration parameters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
