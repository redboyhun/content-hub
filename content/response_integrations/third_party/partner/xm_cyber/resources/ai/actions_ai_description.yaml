Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches `HOSTNAME` and `USER` entities using the XM Cyber platform. This action
    retrieves contextual metadata, such as risk scores and labels, to provide deeper
    insights into the security posture of assets and users within the environment.


    ### Flow Description

    1. Extracts `HOSTNAME` and `USER` entities from the alert's security events.

    2. Filters out entities that are not supported or have been enriched within the
    last 24 hours by checking the `XMC_last_enriched` property.

    3. Calls the XM Cyber API (`GET /api/secopsPublisher/entities`) to retrieve enrichment
    data for the remaining entities.

    4. Processes the API response to extract relevant attributes (e.g., labels, risk
    scores).

    5. Updates the entities in Google SecOps with the retrieved enrichment data and
    a `last_enriched` timestamp.

    6. Marks the entities as enriched (`is_enriched = True`) and saves the changes.


    ### Additional Notes

    This action requires valid XM Cyber API credentials (API Key or OAuth) configured
    in the integration settings. It specifically targets `HOSTNAME` and `USER` entity
    types.
