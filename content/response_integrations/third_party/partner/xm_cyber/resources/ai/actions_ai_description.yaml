Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity and authentication credentials for the XM Cyber integration.
    This action verifies that the provided Base URL and API Key (or OAuth credentials)
    are valid and that the SOAR platform can successfully communicate with the XM
    Cyber instance.


    ### Flow Description

    1. The action retrieves the integration configuration parameters (Base URL, API
    Key, and Authentication Type) using the `get_integration_params` utility.

    2. An `ApiManager` instance is initialized with these credentials.

    3. The `ApiManager` performs a POST request to the `/api/auth/` endpoint to verify
    the connection.

    4. If the connection is successful, the action returns a success status and a
    confirmation message.

    5. If the connection fails (e.g., due to invalid credentials or network issues),
    the action returns a failure status with the error details.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying that the integration
    is correctly configured before running other operational actions.
