Ping:
  ai_description: >-
    General Description: This action tests the connectivity and configuration credentials
    of the XM Cyber integration. It verifies that the provided Base URL and API Key
    (or OAuth credentials) are valid by attempting to authenticate with the XM Cyber
    server.


    Flow Description:

    1. Extracts integration parameters (Base URL, API Key, and Authentication Type)
    from the configuration.

    2. Initializes the `ApiManager` with the provided credentials.

    3. If using API Key authentication, it performs a POST request to the `/api/auth/`
    endpoint to verify connectivity.

    4. If using OAuth, it initializes the OAuth manager and attempts to authenticate.

    5. If the connection is successful, the action completes with a success message.

    6. If the connection fails, the action reports the failure with the error details.


    Additional Notes: This action does not perform any data enrichment or mutation;
    it is strictly for connectivity testing.
