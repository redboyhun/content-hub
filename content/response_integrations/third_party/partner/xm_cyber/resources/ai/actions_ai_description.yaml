Push Breach Point Data:
  ai_description: >-
    ### General Description

    This action pushes a specific breach point label to entities within the XM Cyber
    platform. It evaluates entities (from both security events and the current case)
    against user-defined criteria (parameter, operator, and value) to determine which
    entities should receive the label. This allows for automated tagging of assets
    or users based on their risk profile or other attributes.


    ### Flow Description

    1. The action retrieves configuration parameters (Attribute Name, Parameter, Operator,
    Value) and authenticates with the XM Cyber API.

    2. It iterates through the current alert's security events and the case's target
    entities.

    3. For each entity, it checks if the entity matches the specified criteria (e.g.,
    checking if a specific property equals a value).

    4. It collects the IDs of all entities that satisfy the criteria.

    5. Finally, it sends a POST request to the XM Cyber API (`/api/entityInventory/applyImportedLabelsOnEntities`)
    to apply the specified breach point label to the identified entities.


    ### Additional Notes

    This action requires valid XM Cyber API credentials. It supports filtering entities
    based on various properties like risk scores, labels, and asset details. The action
    does not perform any internal SecOps data mutation, focusing solely on updating
    external entity metadata in XM Cyber.
