    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Adds a JSON result object to the action output, which is used by playbooks for
      alert filtration.
    reasoning: >-
      The action processes existing alert and entity data to calculate risk scores.
