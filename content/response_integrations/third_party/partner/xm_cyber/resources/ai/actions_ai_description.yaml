Get Event Data JSON:
  ai_description: >-
    ### General Description

    This action aggregates entity details (such as user and asset information) from
    security events and target entities associated with the current alert. It specifically
    filters for XM Cyber-enriched data, formats it into a structured JSON object,
    and includes direct URLs to the XM Cyber entity overview page.


    ### Flow Description

    1. The action retrieves the current alert's security events and the list of target
    entities from the SecOps platform.

    2. It iterates through the security events, extracting entity IDs for users and
    assets from the event's `additional_properties`.

    3. It validates if the entities are XM Cyber-enriched by checking specific attribute
    labels.

    4. It iterates through the target entities, filtering for supported types (User,
    Hostname) and verifying XM Cyber enrichment.

    5. For each identified entity, it compiles a JSON object containing relevant attributes
    and a generated URL to the XM Cyber instance.

    6. The final aggregated JSON object is added to the action results.


    ### Additional Notes

    This action does not perform external API calls; it relies on data already present
