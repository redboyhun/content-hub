Push Breach Point Data:
  ai_description: >-
    ### General Description

    This action pushes breach point labels to entities (users or hosts) in the XM
    Cyber platform based on configured criteria. It allows analysts to tag specific
    assets or users with a breach point attribute, facilitating better visibility
    and risk management within XM Cyber.


    ### Flow Description

    1. **Fetch Parameters**: The action retrieves the `Attribute Name`, `Parameter`,
    `Operator`, and `Value` from the action configuration.

    2. **Validate Inputs**: It validates the provided parameters against allowed sets
    and formats (e.g., checking date formats or operator compatibility).

    3. **Identify Entities**: It iterates through the current alert's security events
    and the case's target entities. It filters these entities based on supported types
    (User, Hostname).

    4. **Evaluate Criteria**: For each identified entity, it checks if the entity's
    properties match the configured criteria (e.g., checking if a specific attribute
    equals a value).

    5. **Push Data**: If an entity matches the criteria, the action performs a POST
    request to the XM Cyber `/api/entityInventory/applyImportedLabelsOnEntities` endpoint
    to apply the specified breach point label.


    ### Additional Notes

    This action does not modify any internal Google SecOps data (e.g., it does not
    update entity insights or add case comments). It is strictly an external mutation
    action that pushes metadata to the XM Cyber platform.
