Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches HOSTNAME and USER entities using XM Cyber platform data. This action
    retrieves contextual metadata for these entities from the XM Cyber platform and
    updates the entity profiles within Google SecOps.


    ### Flow Description

    1. Extracts integration parameters (Base URL, API Key, Auth Type) from the integration
    configuration.

    2. Filters target entities to include only HOSTNAME and USER types, as supported
    by the XM Cyber integration.

    3. Checks if entities were already enriched in the last 24 hours or are present
    in the event, skipping them if so.

    4. Makes a GET request to the XM Cyber `/api/secopsPublisher/entities` endpoint
    to retrieve enrichment data for the remaining entities.

    5. Updates the entities' `additional_properties` with the retrieved data and marks
    them as enriched.

    6. Updates the entities in the SecOps platform with the new enrichment data.


    ### Additional Notes

    This action requires valid XM Cyber credentials to be configured in the integration
    instance. It does not perform any external mutations, focusing solely on data
    enrichment and internal entity updates.
