    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with enrichment data and sets the is_enriched
      flag.
    reasoning: >-
      The action makes a GET request to the XM Cyber API to fetch enrichment data.
