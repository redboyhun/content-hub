Calculate Risk Score:
  ai_description: >-
    ### General Description

    Calculates a risk score for alerts and entities based on XM Cyber configuration
    parameters. This action processes existing event and entity properties to compute
    a normalized risk score, enabling analysts to prioritize alerts based on calculated
    risk levels.


    ### Flow Description

    1. Collects configuration parameters (e.g., AD Risk, MFA status, Critical Asset
    status) from the action settings.

    2. Iterates through the current alert's security events and target entities.

    3. Filters entities based on supported types (User, Hostname).

    4. Calculates risk scores for each event and entity using the provided configuration
    and internal scoring logic.

    5. Aggregates the calculated scores into a final JSON object.

    6. Adds the resulting JSON object to the action results using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action does not perform external API calls; it relies entirely on data already
    present within the alert and entity properties. It is a data processing and transformation
    utility.
  ai_short_description: >-
    Calculates a risk score for alerts and entities based on XM Cyber configuration
    parameters and existing event/entity properties.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action processes existing data within the alert and entities to calculate
      a risk score. It does not fetch external data, mutate external or internal systems,
      update entities, create insights, or modify alert data.
