Ping:
  ai_description: >-
    ### General Description

    This action verifies the connectivity and validity of the API token for the IPInfo
    integration by performing a test request.


    ### Flow Description

    1. The action initializes the `IPInfoManager` using the configured API root and
    token.

    2. It executes a `GET` request to the IPInfo API using a test IP address ("8.8.8.8").

    3. The response is validated to ensure the API token is authorized and the service
    is reachable.

    4. The action concludes by returning a success message if the connection is established.


    ### Additional Notes

    This is a connectivity test action and does not process any entities or perform
    data enrichment.
