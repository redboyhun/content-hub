    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional_properties and sets is_enriched to True within the
      SecOps platform.
    reasoning: >-
      The action fetches data from an external API (fetches_data=true). It updates
      internal entities with the fetched information (can_mutate_internal_data=true,
      can_update_entities=true). It does not mutate external data, create insights,
