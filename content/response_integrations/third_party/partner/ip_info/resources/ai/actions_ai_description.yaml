Get Domain Information:
  ai_description: >-
    ### General Description

    Fetches domain information for hostname entities using the IPInfo service. This
    action retrieves contextual domain details, updates the entity's additional properties,
    and marks the entity as enriched.


    ### Flow Description

    1. Initialize the `IPInfoManager` using the provided API configuration (API Root,
    Token, and SSL verification settings).

    2. Filter the target entities to identify those of type `HOSTNAME`.

    3. For each identified hostname, call the `get_domains_information` method via
    the IPInfo API.

    4. Update the entity's `additional_properties` with the retrieved domain data.

    5. Set the entity's `is_enriched` flag to true.

    6. Update the entities in the SOAR platform and add the results to the action
    output as a table and JSON.


    ### Additional Notes

    This action requires a valid IPInfo API token and API root URL configured in the
    integration settings. It does not perform any external mutations.
  ai_short_description: >-
    Fetches domain information for hostname entities using the IPInfo service.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity `additional_properties` and `is_enriched` status within the SOAR
      platform.
    reasoning: >-
      The action makes a GET request to the IPInfo API to fetch domain information.
      It does not mutate external data but updates internal entities by adding additional
      properties and setting the enriched status.
