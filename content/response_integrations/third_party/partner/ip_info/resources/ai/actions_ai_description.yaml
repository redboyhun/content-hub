Ping:
  ai_description: >-
    ### General Description

    This action validates the connectivity and API token validity for the IPInfo integration
    by performing a test request to the IPInfo API.


    ### Flow Description

    1. The action initializes the `IPInfoManager` using the configured API root, token,
    and SSL verification settings.

    2. It executes the `ping()` method, which sends a GET request to the IPInfo API
    using a test IP address ("8.8.8.8").

    3. The response is validated to ensure the API token is authorized and the service
    is reachable.

    4. The action concludes by returning a success message if the connection is established.


    ### Additional Notes

    This action does not interact with any entities in the case. It is strictly for
    connectivity testing.
