Get Domain Information:
  ai_description: >-
    ### General Description

    Fetches domain information for hostname entities using the IPInfo service. This
    action retrieves comprehensive domain details, updates the entity's profile with
    this information, and provides a structured table for analysis.


    ### Flow Description

    1. Initialize the `IPInfoManager` using the provided API root and token from the
    integration configuration.

    2. Filter the target entities to identify those of type `HOSTNAME`.

    3. For each identified hostname, call the `get_domains_information` method of
    the `IPInfoManager` to retrieve domain details.

    4. If information is successfully retrieved:
        - Flatten the domain information dictionary.
        - Update the entity's `additional_properties` with the retrieved data, prefixed
    with `IPInfo`.
        - Mark the entity as enriched (`is_enriched = True`).
        - Add the domain information to the entity's table using `siemplify.result.add_entity_table`.
    5. Update the entities in the SOAR platform using `siemplify.update_entities`.

    6. Add the aggregated results to the action's JSON result.


    ### Additional Notes

    This action requires valid IPInfo API credentials (API Root and Token) to be configured
    in the integration settings. It is designed to enrich hostname entities with external
    domain intelligence.
  ai_short_description: >-
    Fetches domain information for hostname entities using the IPInfo service.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties and adds entity tables.
    reasoning: >-
      The action fetches data from an external API (IPInfo) and updates internal entities
      (via `update_entities` and `add_entity_table`). It does not mutate external
      data.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external service (IPInfo) and updates internal
      entities with this information. It does not mutate external data or perform
      remediation tasks. Therefore, it is classified as an enrichment action.
    remediation: false
