Get IP Information:
  ai_description: >-
    ### General Description

    This action retrieves detailed information for IP address entities using the IPInfo
    service. It enriches the entities within the Google SecOps platform by fetching
    external threat intelligence or geolocation data, updating the entity's properties,
    and providing a structured result for the analyst.


    ### Flow Description

    1. **Initialization**: The action initializes the `IPInfoManager` using the configured
    API Root, Token, and SSL verification settings.

    2. **Filtering**: It filters the `target_entities` to identify only those of type
    `ADDRESS`.

    3. **Data Retrieval**: For each identified IP address, the action performs an
    HTTP GET request to the IPInfo API to fetch associated information.

    4. **Enrichment**: The retrieved data is flattened and added to the entity's `additional_properties`
    with the `IPInfo` prefix. The entity is marked as enriched (`is_enriched = True`).

    5. **Platform Update**: The action updates the entities in the SecOps platform
    and adds a result table and JSON output containing the fetched information.


    ### Additional Notes

    This action requires the IPInfo integration to be configured with a valid API
    Root and Token. It does not perform any state-changing operations on external
    systems.
  ai_short_description: >-
    Enriches IP address entities by fetching information from the IPInfo service.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
