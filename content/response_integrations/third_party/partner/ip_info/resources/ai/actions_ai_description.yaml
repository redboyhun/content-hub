Get IP Information:
  ai_description: >-
    General Description

    Fetches IP address information from the IPInfo service to provide context for
    security investigations.


    Flow Description

    1. The action initializes the `SiemplifyAction` and `IPInfoManager` using the
    configured API root and token.

    2. It filters the target entities to identify those of type `ADDRESS`.

    3. For each identified IP address, the action performs a GET request to the IPInfo
    API to retrieve associated information.

    4. The retrieved data is flattened and added to the entity's `additional_properties`.

    5. The entity is marked as enriched (`is_enriched = True`).

    6. An entity table containing the IP information is added to the action results.

    7. The updated entities are saved back to the SOAR platform.

    8. The full result set is added as a JSON object to the action output.


    Additional Notes

    This action is strictly for enrichment and does not modify any external systems.
