Ping:
  ai_description: >-
    ### General Description

    Verifies connectivity to the Thinkst Canary Console by calling the `/ping` API
    endpoint. This action ensures that the provided API Key and Console Hash are valid
    and that the SOAR integration can successfully communicate with the external service.


    ### Flow Description

    1. The action extracts the `API Key`, `Console Hash`, and `Verify SSL` settings
    from the integration configuration.

    2. It validates that the `API Key` and `Console Hash` are not set to their default
    placeholder values.

    3. The action initializes the `ThinkstActionManager` using the provided credentials.

    4. It executes a GET request to the `/ping` endpoint of the Canary Console API.

    5. If the API returns a success response, the action completes successfully; otherwise,
    it reports a failure.


    ### Additional Notes

    This action is strictly for connectivity verification and does not perform any
    data enrichment, remediation, or modification of internal SOAR data.
  ai_short_description: >-
    Verifies connectivity to the Thinkst Canary Console by calling the /ping API endpoint.
  capabilities:
