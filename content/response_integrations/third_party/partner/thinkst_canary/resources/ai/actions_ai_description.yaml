    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to verify connectivity. It does not mutate
      external data, nor does it modify internal SOAR data (entities, insights, or
      comments).
  categories:
    enrichment: false
    reasoning: >-
      The action is a connectivity check ('Ping'). Per the instructions, actions named
      'Ping' must not be categorized as enrichment actions. It does not perform any
      remediation or state changes.
    remediation: false
