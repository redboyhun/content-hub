Ping:
  ai_description: >-
    ### General Description

    Verifies connectivity to the Thinkst Canary Console by calling the `/ping` endpoint.
    This action is used to validate that the provided API Key and Console Hash are
    correct and that the SOAR platform can successfully communicate with the Canary
    Console.


    ### Flow Description

    1. The action extracts the integration configuration parameters: 'API Key', 'Console
    Hash', and 'Verify SSL'.

    2. It validates that the 'API Key' and 'Console Hash' are provided and not set
    to their default placeholder values.

    3. The action initializes the `ThinkstActionManager` using the provided credentials
    and SSL verification setting.

    4. It executes a GET request to the `/ping` endpoint of the Canary Console API.

    5. If the API returns a success status, the action completes successfully; otherwise,
    it reports a failure.


    ### Additional Notes

    This action does not perform any data enrichment or state changes. It is strictly
    a health check for the integration configuration.
