Acknowledge Console Alert:
  ai_description: >-
    ### General Description

    Acknowledges an alert on the Thinkst Canary Console. This action interacts with
    the external Canary Console API to update the status of a specific incident to
    'acknowledged', effectively marking it as reviewed within the external system.


    ### Flow Description

    1. The action extracts the required configuration parameters (API Key, Console
    Hash, and SSL verification settings) from the integration configuration.

    2. It accesses the `current_alert` object within the SOAR platform to retrieve
    the `security_events`.

    3. It extracts the `AlertId` from the `additional_properties` of the first security
    event associated with the alert.

    4. The action sends a POST request to the Canary Console API endpoint `/incident/acknowledge`
    using the extracted `AlertId`.

    5. The action returns the execution status and a success or failure message based
    on the API response.


    ### Additional Notes

    This action requires that the alert was originally created by the Thinkst connector,
    as it relies on the `AlertId` being present in the `additional_properties` of
    the alert's security events. If the `AlertId` cannot be found, the action will
    fail.
  ai_short_description: >-
    Acknowledges an alert on the external Thinkst Canary Console by sending an API
    request to update the incident status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status of an incident to 'acknowledged' on the external Thinkst
      Canary Console.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to an external API to acknowledge an incident.
      It does not fetch data, mutate internal SOAR data, or update entities.
  categories:
    enrichment: false
    reasoning: >-
      The action performs an external API call to update the status of an incident
      on the Thinkst Canary Console. It does not fetch data (not enrichment) and does
      not perform remediation (blocking, isolating, or eradicating threats).
    remediation: false
