Acknowledge Console Alert:
  ai_description: >-
    ### General Description

    Acknowledges an incident on the Thinkst Canary Console. This action updates the
    status of an incident on the external Canary Console to acknowledged, effectively
    marking it as addressed within the external system.


    ### Flow Description

    1. Extracts the `API Key` and `Console Hash` from the integration configuration.

    2. Retrieves the `AlertId` from the `additional_properties` of the first security
    event in the current alert.

    3. Sends a POST request to the Canary Console API (`/incident/acknowledge`) using
    the `AlertId` to acknowledge the incident.


    ### Additional Notes

    Requires a valid API Key and Console Hash configured in the integration settings.
    This action does not modify the alert status within the SecOps platform.
  ai_short_description: >-
    Acknowledges an incident on the Thinkst Canary Console.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Acknowledges an incident on the Thinkst Canary Console by sending a POST request
      to the /incident/acknowledge endpoint.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to acknowledge an incident on the Canary Console
      (can_mutate_external_data=true). It does not fetch context data, update internal
      entities, or modify alert data.
