    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new feed in the Silent Push platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to create a feed in the Silent Push platform
      (can_mutate_external_data=true). It does not fetch data, nor does it modify
      internal SOAR data or entities.
  categories:
