Forward Padns Lookup:
  ai_description: >-
    ### General Description

    Performs a forward Passive DNS (PADNS) lookup using the Silent Push platform.
    This action allows analysts to query DNS records based on specific criteria such
    as record type, netmask, and time-based filters to gather threat intelligence
    and infrastructure context.


    ### Flow Description

    1. The action initializes the `SilentPushManager` using the configured Silent
    Push Server URL and API Key.

    2. It extracts the required `Qname` (DNS record name) and optional filtering parameters
    (e.g., `Qtype`, `Netmask`, `Regex`, `First Seen After`, `Limit`) from the action
    configuration.

    3. The action executes the `forward_padns_lookup` method, which makes an HTTP
    GET request to the Silent Push API endpoint `explore/padns/lookup/query/{qtype}/{qname}`
    with the provided filters.

    4. The API response is validated for errors. If the API returns an error, the
    action fails.

    5. If records are found, the action returns the DNS records as the result. If
    no records are found, the action logs an error and terminates.


    ### Additional Notes

    This action is primarily used for threat intelligence enrichment and infrastructure
    analysis. It does not modify any data within the SOAR platform or external systems.
