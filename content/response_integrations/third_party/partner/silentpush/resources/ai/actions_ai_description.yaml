  ai_description: >-
    ### General Description

    Performs a forward Passive DNS (PADNS) lookup using the Silent Push platform to
    retrieve DNS record information. This action allows users to query DNS records
    with various filtering parameters, such as record type, netmask, and time-based
    filters.


    ### Flow Description

    1. Extract configuration parameters (Server URL, API Key) from the integration
    settings.

    2. Extract action parameters (Qtype, Qname, filters, etc.) provided by the user.

    3. Initialize the `SilentPushManager` with the provided credentials.

    4. Call the `forward_padns_lookup` method via the Silent Push API (GET request)
    using the specified query parameters.

    5. Validate the API response for errors.

    6. Log the retrieved records or error messages.

    7. End the action with the result status.


    ### Additional Notes

    This action is read-only and retrieves DNS record information based on the provided
