Add Feed:
  ai_description: >-
    ### General Description

    Adds a new feed to the Silent Push platform. This action allows users to register
    a new feed by providing its name, type, and optional metadata such as category,
    vendor, description, and tags.


    ### Flow Description

    1. Extracts integration configuration (Server URL, API Key).

    2. Extracts action parameters (Name, Type, Category, Vendor, Feed Description,
    Tags).

    3. Initializes `SilentPushManager`.

    4. Calls `sp_manager.add_feed` with the provided parameters, which performs a
    `POST` request to the Silent Push API.

    5. Logs the outcome and ends the action.


    ### Additional Notes

    This action does not perform any operations on entities, even though it iterates
    over them for logging purposes.
