    Updates the tags associated with a specific feed in the Silent Push platform.
    This action allows users to manage feed metadata by appending or modifying tags
    for a given Feed UUID.


    ### Flow Description

    1. The action extracts the `Feed UUID` and `Tags` from the provided action parameters.

    2. It initializes the `SilentPushManager` using the configured Silent Push server
    URL and API key.

    3. The action calls the `add_feed_tags` method, which performs a POST request
    to the Silent Push API endpoint `/api/v1/feeds/{feed_uuid}/tags/` to update the
    tags for the specified feed.

    4. The result of the API operation is returned, and the action status is set to
    completed or failed based on the response.


