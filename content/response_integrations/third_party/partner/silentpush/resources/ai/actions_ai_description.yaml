Density Lookup:
  ai_description: >-
    ### General Description

    Queries granular DNS/IP parameters (e.g., NS servers, MX servers, IP addresses,
    ASNs) from the Silent Push platform to retrieve density information. This action
    provides contextual intelligence regarding the infrastructure associated with
    a specific query, aiding in threat analysis and investigation.


    ### Flow Description

    1. The action extracts the required configuration parameters, including the Silent
    Push Server URL and API Key.

    2. It retrieves the action-specific parameters: `Qtype` (the type of query), `Query`
    (the value to look up), and `Scope` (the match level).

    3. The action initializes the `SilentPushManager` to interface with the Silent
    Push API.

    4. It executes a GET request to the Silent Push density lookup endpoint using
    the provided `Qtype` and `Query`.

    5. The retrieved records are processed and logged. If no records are found, the
    action logs an error and fails.


    ### Additional Notes

    This action is strictly read-only and does not modify any internal Google SecOps
    data or external system states.
