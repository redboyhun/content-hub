    1. **Configuration Extraction**: The action extracts the Silent Push server URL
    and API key from the integration configuration.

    2. **Parameter Extraction**: It retrieves action parameters, including the list
    of domains, clustering preference, mode, match criteria, and optional timestamps.

    3. **API Request**: The action calls the `list_domain_infratags` method of the
    Silent Push Manager, which performs a POST request to the Silent Push API to fetch
    infrastructure tags for the provided domains.

    4. **Response Processing**: The action parses the API response. If clustering
    is enabled, it formats the tag clusters into a readable table.

    5. **Result Output**: The final infrastructure tags and optional cluster data
    are added to the action result, and the execution status is updated.


