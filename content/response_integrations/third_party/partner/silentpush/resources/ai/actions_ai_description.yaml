Density Lookup:
  ai_description: >-
    ### General Description

    Queries the Silent Push platform for granular DNS and IP density information,
    such as Name Servers (NS), Mail Exchange (MX) servers, IP addresses, and Autonomous
    System Numbers (ASNs). This action provides contextual intelligence by performing
    a lookup based on a specified query type and value.


    ### Flow Description

    1. Extract configuration parameters (Server URL, API Key) and action parameters
    (Qtype, Query, Scope).

    2. Initialize the `SilentPushManager` with the provided credentials.

    3. Execute the `density_lookup` method via the Silent Push API using the specified
    query type and value.

    4. Retrieve and parse the density records from the API response.

    5. Log the results or error messages and terminate the action with the appropriate
    execution state.


    ### Additional Notes

    This action performs a read-only lookup and does not modify any external or internal
    system data. While the action iterates over target entities to print their identifiers,
    it does not use these entities as input for the API call or perform any entity-based
    filtering.
