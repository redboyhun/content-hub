Add Feed:
  ai_description: >-
    ### General Description

    Adds a new feed to the Silent Push platform. This action allows users to register
    a new feed by providing details such as the feed name, type, category, vendor,
    description, and associated tags.


    ### Flow Description

    1. The action extracts the required configuration parameters, including the Silent
    Push Server URL and API Key.

    2. It retrieves the action-specific parameters: Name, Type, Category, Vendor,
    Feed Description, and Tags.

    3. The action initializes the `SilentPushManager` with the provided credentials.

    4. It calls the `add_feed` method, which executes a POST request to the Silent
    Push API to create the new feed.

    5. The action logs the outcome and returns the result of the operation.


    ### Additional Notes

    This action performs an external mutation by creating a new resource (feed) in
    the Silent Push platform. It does not interact with or modify any entities within
    the Google SecOps case.
  ai_short_description: >-
    Adds a new feed to the Silent Push platform.
