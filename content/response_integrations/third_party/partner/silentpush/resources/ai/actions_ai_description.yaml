    \ `Regex`, and various time-based filters (`First Seen After`, `Last Seen Before`,\
    \ etc.).\n3. **API Request**: The action calls the `SilentPushManager` to execute\
    \ a reverse PADNS lookup via the Silent Push API (`explore/padns/lookup/answer/{qtype}/{qname}`).\n\
    4. **Response Handling**: \n    * If the API returns an error, the action raises\
    \ a `ValueError`.\n    * If no records are found, the action logs an error and\
    \ fails.\n    * If records are found, the action outputs the retrieved DNS records.\n\
    \n### Additional Notes\nThis action is a read-only operation and does not modify\
    \ any internal Google SecOps data or external system states. It is strictly used\
