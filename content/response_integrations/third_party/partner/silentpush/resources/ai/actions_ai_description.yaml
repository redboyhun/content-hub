  ai_description: "### General Description\nPerforms a reverse Passive DNS (PADNS)\
    \ lookup using the Silent Push platform to retrieve historical DNS records associated\
    \ with a specific DNS record name and type. This action allows analysts to query\
    \ historical DNS data to identify infrastructure, associations, and potential\
    \ threat indicators.\n\n### Flow Description\n1. **Configuration Extraction**:\
