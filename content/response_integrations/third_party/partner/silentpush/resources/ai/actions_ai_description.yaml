List Domain Information:
  ai_description: >-
    ### General Description

    Retrieves comprehensive domain information, including risk scores and WHOIS data,
    from the Silent Push platform. This action allows analysts to query multiple domains
    simultaneously to gather threat intelligence and contextual metadata, aiding in
    the investigation of potentially malicious domains.


    ### Flow Description

    1. The action extracts the required configuration parameters (Silent Push Server
    URL and API Key) and action parameters (Domains, Fetch Risk Score, and Fetch Whois
    Info).

    2. The `SilentPushManager` is initialized with the provided credentials.

    3. The action calls the `list_domain_information` method, which performs the following
    API interactions:
