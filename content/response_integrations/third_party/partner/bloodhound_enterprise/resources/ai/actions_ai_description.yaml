Get Object Id:
  ai_description: >-
    ### General Description

    Fetches object IDs from BloodHound Enterprise for a provided list of object names.
    This action allows analysts to retrieve unique identifiers for various objects
    (such as users, computers, or groups) within the BloodHound environment to facilitate
    further investigation or correlation.


    ### Flow Description

    1. The action extracts the `Object Names` parameter, which is a comma-separated
    string of names to look up.

    2. It initializes the `BloodhoundManager` using the configured integration credentials
    (tenant domain, token ID, and token key).

    3. The action iterates through each provided object name.

    4. For each name, it performs a GET request to the BloodHound Enterprise API endpoint
    `/api/v2/search` to retrieve the corresponding object details, including the object
    ID.

    5. The results are consolidated into a JSON payload and returned as the action
    result.


    ### Additional Notes

    This action is a read-only operation and does not modify any data in BloodHound
    Enterprise or the SOAR platform. It is intended for data retrieval and enrichment
    purposes.
