Does Path Exists:
  ai_description: >-
    ### General Description

    Checks for the existence of an attack path between two specified principals (nodes)
    within BloodHound Enterprise. This action allows security analysts to verify if
    a potential attack path exists between a source principal and a destination principal,
    aiding in the assessment of lateral movement risks.


    ### Flow Description

    1. Extracts configuration parameters, including the BloodHound Enterprise Server
    URL, Token ID, and Token Key.

    2. Parses the `Event Details` parameter, which is expected to contain a JSON string
    or a comma-separated list of JSON objects defining `FromPrincipal` and `ToPrincipal`
    pairs.

    3. Iterates through each principal pair extracted from the input.

    4. For each pair, the action calls the BloodHound Enterprise API (`/api/v2/graphs/shortest-path`)
    to determine if a path exists between the specified nodes.

    5. Consolidates the results for all pairs into a single response payload.

    6. Updates the action result with the path information and terminates the action
    with a success or failure status based on whether paths were found for all provided
    pairs.


    ### Additional Notes

    The `Event Details` parameter must be provided as a valid JSON string or a comma-separated
    list of JSON objects containing the keys `FromPrincipal` and `ToPrincipal`.
  ai_short_description: >-
    Checks for the existence of an attack path between two specified principals (nodes)
    within BloodHound Enterprise.
