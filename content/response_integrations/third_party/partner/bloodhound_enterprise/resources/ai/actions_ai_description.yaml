Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the BloodHound Enterprise server using the provided
    integration credentials. This action verifies that the SOAR platform can successfully
    authenticate and communicate with the BloodHound Enterprise API.


    ### Flow Description

    1. The action extracts the required configuration parameters: BloodHound Enterprise
    Server, Token ID, and Token Key.

    2. It initializes the `BloodhoundManager` with these credentials.

    3. The action executes a `test_connection()` method, which performs an HTTP GET
    request to the BloodHound Enterprise `/api/v2/available-domains` endpoint.

    4. If the request is successful, the action logs the success and terminates with
    a completed status.

    5. If the request fails (e.g., due to invalid credentials or network issues),
    the action logs the error and terminates with a failed status.


    ### Additional Notes

    This action is intended for troubleshooting and verifying the integration setup.
    It does not perform any data enrichment or state changes.
