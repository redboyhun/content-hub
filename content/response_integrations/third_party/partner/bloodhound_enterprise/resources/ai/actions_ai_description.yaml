Fetch Assets:
  ai_description: >-
    ### General Description

    Fetches detailed asset information from BloodHound Enterprise based on provided
    Object IDs. This action retrieves primary asset details and, for Azure-specific
    objects, gathers additional related entity counts to provide a comprehensive view
    of the asset's security context.


    ### Flow Description

    1. Extracts configuration parameters (tenant domain, token ID, token key) from
    the integration settings.

    2. Parses the `additional_data` parameter to manage iterative execution state,
    allowing the action to resume partial executions.

    3. If no state exists, parses the `Object IDs` parameter into a list of IDs to
    process.

    4. Iteratively processes one Object ID per execution to prevent timeouts, using
    the `BloodhoundManager` to interact with the BloodHound Enterprise API.

    5. Performs a search request (GET) to identify the object type and retrieve its
    primary details.

    6. If the object is an Azure type, performs additional API requests (GET) to fetch
    related entity counts (e.g., group memberships, roles, inbound/outbound controls).

    7. Stores the retrieved information and updates the execution state.

    8. If more IDs remain, returns an `INPROGRESS` state with the updated `additional_data`;
    otherwise, returns `COMPLETED` with the consolidated asset information in the
    result JSON.


    ### Additional Notes

    This action supports iterative execution, enabling the processing of large lists
    of Object IDs without exceeding execution time limits. It relies on the BloodHound
    Enterprise API for all data retrieval and does not modify any external or internal
    system state.
  ai_short_description: >-
    Fetches detailed asset information from BloodHound Enterprise for specified Object
    IDs.
