Domain monitor:
  ai_description: >-
    ### General Description

    Retrieves domain monitoring information from Cyjax, tracking brands against newly
    registered global domains and certificate transparency logs (CTL). This action
    allows users to search for specific domains or patterns within a defined timeframe.


    ### Flow Description

    1. The action extracts the provided parameters: `Query`, `Since`, and `Until`.

    2. It validates the date formats for `Since` and `Until` and ensures that the
    `Since` date is not after the `Until` date.

    3. The action initializes the Cyjax API client using the configured credentials.

    4. It executes a paginated GET request to the Cyjax Domain Monitor API endpoint
    (`/domain-monitor/potential-malicious-domain`) using the provided search criteria.

    5. The retrieved domain data is processed into structured results.

    6. The action adds a data table containing the domain monitor results to the action
    output and saves the raw JSON results.


    ### Additional Notes

    The action supports automatic pagination and will retrieve up to a maximum of
    1000 records from the API.
  ai_short_description: >-
    Retrieves domain monitoring information from Cyjax, tracking brands against newly
    registered global domains and certificate transparency logs.
