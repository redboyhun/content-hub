Enrich IOCs:
  ai_description: "### General Description\nEnriches Indicators of Compromise (IOCs)\
    \ using Cyjax threat intelligence. This action retrieves contextual data such\
    \ as GeoIP information, ASN details, and sighting counts for various IOC types,\
    \ including domains, emails, hostnames, file hashes, IP addresses, URLs, and CVEs.\
    \ It updates the entities within the case with this enrichment data to assist\
    \ analysts in threat investigation.\n\n### Flow Description\n1. **Initialization**:\
    \ The action retrieves integration configuration parameters, specifically the\
    \ API Token and SSL verification setting.\n2. **Entity Retrieval**: It fetches\
    \ all target entities associated with the current case.\n3. **API Interaction**:\
    \ The action initializes the Cyjax API client and iterates through the retrieved\
    \ entities.\n4. **Enrichment Request**: For each entity, it performs a GET request\
    \ to the Cyjax API endpoint `/indicator-of-compromise/enrichment` to fetch threat\
    \ intelligence data.\n5. **Data Processing**: \n    - If enrichment data is found,\
    \ it parses the response, removes any existing Cyjax enrichment data from the\
    \ entity, and updates the entity's `additional_properties` with the new data.\n\
    \    - It sets the `is_enriched` flag to `True` for successfully enriched entities.\n\
    6. **Entity Update**: The action calls `siemplify.update_entities` to save the\
    \ changes to the entities in the case.\n7. **Result Reporting**: It adds a data\
    \ table containing the enrichment results to the action output and returns a JSON\
    \ summary of the processed entities.\n\n### Additional Notes\nThis action does\
    \ not require any user-provided parameters as it operates directly on the entities\
    \ attached to the case. It handles pagination and rate limiting internally via\
    \ the `APIManager`."
  ai_short_description: >-
    Enriches Indicators of Compromise (IOCs) with threat intelligence data (GeoIP,
    ASN, sightings) from Cyjax.
