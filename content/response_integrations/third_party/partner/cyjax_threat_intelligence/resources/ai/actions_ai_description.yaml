List Data Breaches:
  ai_description: >-
    ### General Description

    Retrieves a list of data breaches from the Cyjax platform based on optional search
    criteria. This action allows analysts to query for specific email addresses or
    patterns within a defined timeframe, providing visibility into historical data
    leaks.


    ### Flow Description

    1. The action extracts the `Query`, `Since`, and `Until` parameters provided by
    the user.

    2. It validates the date formats for `Since` and `Until` to ensure they conform
    to the required ISO8601 format.

    3. The action initializes the Cyjax API client using the configured API token.

    4. It performs a GET request to the Cyjax `/data-leak/credentials` endpoint, utilizing
    automatic pagination to retrieve up to 1000 records.

    5. The retrieved data is processed into `DataBreachListResult` objects.

    6. The results are formatted into a CSV table and added to the action results,
    and the raw JSON data is attached to the action output.


    ### Additional Notes

    This action is a data retrieval tool and does not modify any external systems
    or internal SOAR entities. It operates independently of specific entities attached
    to a case.
