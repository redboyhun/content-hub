Ping:
  ai_description: >-
    ### General Description

    This action tests the connectivity between Google SecOps SOAR and the Cyjax instance.
    It validates the provided asset configuration parameters and verifies that the
    credentials have the necessary permissions to access the Cyjax API.


    ### Flow Description

    1. The action retrieves the integration configuration parameters, specifically
    the API Token and the Verify SSL setting, using the `get_integration_params` utility.

    2. An `APIManager` instance is initialized with the retrieved credentials.

    3. The action performs a `GET` request to the Cyjax API ping endpoint (`/indicator-of-compromise`)
    to verify connectivity.

    4. If the API call is successful, the action returns a success message and sets
    the connectivity result to true.

    5. If the API call fails (e.g., due to invalid credentials or network issues),
    the action catches the exception, logs the error, and returns a failure message
    with the connectivity result set to false.


    ### Additional Notes

    This action is intended for troubleshooting and verifying the integration setup.
    It does not perform any data enrichment or modification of entities or alerts.
