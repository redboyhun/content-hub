Ping:
  ai_description: >-
    General Description: This action tests the connectivity between Google SecOps
    SOAR and the Cyjax instance by making an authenticated API call. It validates
    the provided asset configuration parameters and verifies that the credentials
    have the necessary permissions.


    Flow Description:

    1. The action initializes the `SiemplifyAction` and retrieves the integration
    configuration parameters (`API Token`, `Verify SSL`).

    2. It instantiates the `APIManager` with the provided credentials.

    3. The action executes a `GET` request to the Cyjax API `PING_ENDPOINT` (`/indicator-of-compromise`)
    to verify connectivity.

    4. If the API call is successful, the action reports a successful connection.

    5. If the API call fails (e.g., due to invalid credentials or network issues),
    the action catches the exception, logs the error, and reports a failed connection
    status.


    Additional Notes: This action is used for connectivity testing and does not perform
    any data enrichment or remediation.
  ai_short_description: >-
    Tests connectivity between Google SecOps SOAR and the Cyjax instance by performing
    an authenticated API call.
