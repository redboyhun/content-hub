    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional_properties and sets is_enriched to True.
    reasoning: >-
      The action performs a GET request to fetch data from the Cyjax API. It updates
      internal entity profiles (`additional_properties` and `is_enriched`) and adds
      a data table to the result. It does not mutate external data.
  categories:
