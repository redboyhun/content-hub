    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to the Cyjax API to fetch domain monitoring data.
      It does not mutate external data, nor does it modify any internal SOAR data
      (entities, insights, comments).
  categories:
