Enrich IOCs:
  ai_description: >-
    ### General Description

    Enriches Indicators of Compromise (IOCs) using Cyjax threat intelligence. This
    action retrieves threat intelligence data, including GeoIP, ASN, and sighting
    information, for various IOC types such as domains, emails, hostnames, file hashes,
    IP addresses, URLs, and CVEs.


    ### Flow Description

    1. Retrieves the API token and SSL verification settings from the integration
    configuration.

    2. Identifies all target entities (Domain, Email, Hostname, FileHash, IP, URL,
    CVE) from the case.

    3. Iterates through each entity and performs a GET request to the Cyjax API (`/indicator-of-compromise/enrichment`)
    to fetch threat intelligence data.

    4. Processes the retrieved data, including GeoIP, ASN, and sighting information.

    5. Updates the entity's `additional_properties` with the new enrichment data and
    marks the entity as enriched.

    6. Updates the entities in the SOAR platform and adds a data table with the enrichment
    results to the action output.


    ### Additional Notes

    This action is read-only regarding external systems and performs internal updates
    to entity profiles. It does not perform any external mutations.
  ai_short_description: >-
    Enriches IOC entities (Domain, Email, Hostname, FileHash, IP, URL, CVE) with threat
    intelligence data from Cyjax, including GeoIP, ASN, and sighting information.
