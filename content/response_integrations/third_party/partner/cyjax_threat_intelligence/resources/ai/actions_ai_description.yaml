List Data Breaches:
  ai_description: >-
    ### General Description

    Lists data breaches from the Cyjax platform based on optional search criteria.
    This action retrieves breach information, including ID, name, data classes, and
    discovery date, and presents the results in a data table and raw JSON format.


    ### Flow Description

    1. Extracts `Query`, `Since`, and `Until` parameters from the action configuration.

    2. Validates the provided date formats (ISO8601) and ensures the `Since` date
    is not after the `Until` date.

    3. Initializes the Cyjax API client using the provided API token.

    4. Executes a GET request to the Cyjax `/data-leak/credentials` endpoint with
    automatic pagination to retrieve breach records.

    5. Processes the retrieved data into a structured list of breach results.

    6. Adds the results to the action output as a data table and raw JSON.


    ### Additional Notes

    This action is read-only and does not modify any external or internal systems.
    It is designed for searching and reporting on historical data breach information.
