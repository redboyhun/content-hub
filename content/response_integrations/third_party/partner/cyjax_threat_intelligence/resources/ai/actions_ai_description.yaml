Domain monitor:
  ai_description: >-
    General Description: Retrieves domain monitoring information from Cyjax, tracking
    brands against newly registered global domains and certificate transparency logs
    (CTL).


    Flow Description:

    1. Extracts configuration parameters (API Token, Verify SSL) and action parameters
    (Query, Since, Until).

    2. Validates the date parameters (Since and Until).

    3. Initializes the APIManager to interact with the Cyjax API.

    4. Calls process_domain_monitor which performs a GET request to the /domain-monitor/potential-malicious-domain
    endpoint.

    5. Handles pagination to retrieve up to 1000 records.

    6. Formats the results into a data table and adds it to the action results.

    7. Adds the raw JSON results to the action output.


    Additional Notes: This action is read-only and does not modify any entities or
    case data.
  ai_short_description: >-
    Retrieves domain monitoring data from Cyjax, including newly registered domains
    and certificate transparency logs.
