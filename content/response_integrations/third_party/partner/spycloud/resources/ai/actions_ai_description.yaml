    | Filter Logic | DDL | No | Specify the filter logic to apply (Equal or Contains).
    |

    | Filter Value | String | No | The value to use for filtering. 'Equal' matches
    the title, 'Contains' searches all response fields. |

    | Time Frame | DDL | Yes | The time range for the search (Last Week, Last Month,
    Last Year, or Custom). |

    | Start Time | String | No | The start time for the search in ISO 8601 format.
    Mandatory if 'Custom' is selected for Time Frame. |

    | End Time | String | No | The end time for the search in ISO 8601 format. Defaults
    to current time if not provided. |

    | Max Catalogs To Return | String | No | The maximum number of catalogs to return.
    Default is 50. |
List Entity Breaches:
  ai_description: "### General Description\nThis action retrieves breach information\
    \ for specific entities (IP Addresses, Users, and URLs) from the SpyCloud platform.\
    \ It allows analysts to query breach catalogs within a specified timeframe to\
    \ identify if an entity has been compromised. The action enriches the entities\
    \ with breach data, providing visibility into potential security incidents associated\
    \ with the entity.\n\n### Flow Description\n1. **Initialization**: The action\
    \ extracts configuration parameters (API Root, API Key, SSL verification) and\
    \ action parameters (Catalog Filter, Time Frame, Start/End Time, Max Breaches).\n\
    2. **Entity Filtering**: It filters the provided entities to include only those\
    \ of type IP Address, User, or URL.\n3. **Data Retrieval**: \n    - It calculates\
    \ the search timeframe.\n    - It optionally fetches catalog information from\
    \ SpyCloud if a filter is provided.\n    - For each valid entity, it determines\
    \ the appropriate breach type (IPs, Emails, Usernames, or Domains) and queries\
    \ the SpyCloud API for breach records.\n4. **Enrichment**: If breaches are found,\
    \ the action updates the entity's `additional_properties` with the breach data\
    \ and marks the entity as enriched.\n5. **Output**: It updates the entities in\
    \ the SOAR platform and adds a JSON result containing the breach details to the\
    \ action output.\n\n### Additional Notes\n- The action supports filtering by specific\
    \ breach catalogs.\n- If no breaches are found for an entity, it is not updated.\n\
    - The action handles pagination for API requests to ensure all relevant breach\
    \ data is retrieved."
  ai_short_description: >-
    Retrieves and enriches entities with breach information from the SpyCloud platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
