Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the SpyCloud server to ensure the integration is correctly
    configured and the API credentials are valid. This action performs a simple health
    check against the SpyCloud API.


    ### Flow Description

    1. The action extracts the required integration configuration parameters: API
    Root, API Key, and Verify SSL.

    2. It initializes the `SpyCloudManager` with these credentials.

    3. The action calls the `test_connectivity` method, which executes a GET request
    to the SpyCloud ping endpoint.

    4. If the request is successful, the action returns a success message; otherwise,
    it logs the error and returns a failure status.


    ### Additional Notes

    This action is intended for troubleshooting and verifying the integration setup.
    It does not perform any data enrichment or remediation tasks.
