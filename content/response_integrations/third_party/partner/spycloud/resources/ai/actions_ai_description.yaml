List Catalogs:
  ai_description: >-
    ### General Description

    Lists available breach catalogs from the SpyCloud platform based on specified
    time frames and filtering criteria. This action allows users to query breach data
    sources, providing visibility into available catalogs for further investigation.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, API Key, Verify SSL)
    and action parameters (Filter Logic, Filter Value, Time Frame, Start Time, End
    Time, Max Catalogs To Return).

    2. It calculates the appropriate start and end timestamps based on the selected
    'Time Frame'.

    3. It makes a GET request to the SpyCloud API (`/enterprise-v1/breach/catalog`)
    to retrieve the list of catalogs.

    4. If 'Filter Logic' is set to 'Equal', it filters the retrieved catalogs locally
    based on the 'Filter Value'.

    5. It limits the number of results based on the 'Max Catalogs To Return' parameter.

    6. The action outputs the results as a JSON list and a formatted data table in
    the action results.


    ### Additional Notes

    This action is a read-only utility and does not modify any external systems or
    internal case data. It does not operate on specific entities.
  ai_short_description: >-
    Lists available breach catalogs from SpyCloud based on time frames and filtering
    criteria.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to fetch data from the SpyCloud API. It does
      not mutate any external or internal data.
  categories:
    enrichment: false
    reasoning: >-
      The action is a utility to list data from an external service. It does not act
      on entities to provide context (Enrichment) nor does it perform any state-changing
      operations (Remediation).
    remediation: false
