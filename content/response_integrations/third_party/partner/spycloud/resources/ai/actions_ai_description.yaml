Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the SpyCloud server to ensure the integration is correctly
    configured and can communicate with the API. This action validates the provided
    connection parameters, including the API root, API key, and SSL verification settings.


    ### Flow Description

    1. The action extracts the required integration configuration parameters: `API
    Root`, `API Key`, and `Verify SSL`.

    2. It initializes the `SpyCloudManager` using these parameters.

    3. The action calls the `test_connectivity` method, which performs a GET request
    to the SpyCloud ping endpoint.

    4. The response is validated to ensure the connection is successful.

    5. The action concludes by returning a success or failure message based on the
    connectivity result.


    ### Additional Notes

    This action is intended for troubleshooting and verifying the integration setup.
    It does not perform any data retrieval or modification operations on entities
    or external systems.
