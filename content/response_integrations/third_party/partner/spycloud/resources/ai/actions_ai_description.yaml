List Catalogs:
  ai_description: >-
    ### General Description

    Lists available catalogs from the SpyCloud platform based on specified search
    criteria. This action allows users to retrieve a list of breach catalogs, providing
    visibility into available data sources within the SpyCloud environment.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Key, Verify SSL) and action
    parameters (Filter Logic, Filter Value, Time Frame, Start Time, End Time, Max
    Catalogs To Return).

    2. Calculates the search time range based on the selected 'Time Frame' (e.g.,
    Last Week, Last Month, Last Year, or Custom).

    3. Initializes the `SpyCloudManager` to establish a connection with the SpyCloud
    API.

    4. Executes a GET request to the SpyCloud API to retrieve the list of catalogs.

    5. Applies optional filtering logic (Equal or Contains) to the results if a filter
    value is provided.

    6. Limits the number of returned catalogs based on the 'Max Catalogs To Return'
    parameter.

    7. Outputs the final list of catalogs as a JSON object and a formatted data table
    in the action results.


    ### Additional Notes

    This action is read-only and does not modify any data in SpyCloud or the SOAR
    platform. It is intended for information retrieval and discovery of available
    breach catalogs.
  ai_short_description: >-
    Lists available catalogs from the SpyCloud platform based on specified search
    criteria.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a GET request to fetch data from the SpyCloud API. It does
      not mutate any external or internal data, nor does it update entities or create
      insights.
