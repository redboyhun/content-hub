    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with breach information and marks them
      as enriched.
    reasoning: >-
      The action fetches data from the SpyCloud API (fetches_data=true). It does not
      mutate external systems. It mutates internal SOAR data by updating entity properties
      and adding result JSON (can_mutate_internal_data=true). It updates entities
      but does not create insights or modify alert data.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches data from an external source (SpyCloud) to enrich entities
      within the SOAR platform. It does not perform any external mutations (blocking,
      deleting, etc.) and only modifies internal SOAR data (entities). Therefore,
      it is classified as an Enrichment action and not a Remediation action.
    remediation: false
