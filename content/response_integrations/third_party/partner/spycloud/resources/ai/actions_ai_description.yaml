List Entity Breaches:
  ai_description: >-
    ### General Description

    This action retrieves breach information for specified entities (IP Addresses,
    Usernames/Emails, and Domains/URLs) from the SpyCloud service. It allows filtering
    by catalog and time frame to narrow down the search results.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Key, SSL verification) and
    action parameters (Catalog Filter, Time Frame, Start/End Time, Max Breaches).

    2. Filters target entities to include only supported types (IP Address, User,
    URL).

    3. Initializes the `SpyCloudManager` to interact with the SpyCloud API.

    4. Retrieves catalog information if a filter is provided.

    5. Iterates through each supported entity:
        * Determines the appropriate breach type (IP, Email, Username, or Domain).
        * Calls the SpyCloud API (`get_breaches`) to fetch breach data.
        * Updates the entity's `additional_properties` with enrichment data (e.g.,
    `was_breached: True`) and marks the entity as enriched.
    6. Updates the entities in the SOAR platform and adds the breach results as a
    JSON result.


    ### Additional Notes

    The action supports filtering by specific catalogs and time frames. It handles
    different entity types by mapping them to the corresponding SpyCloud breach types.
  ai_short_description: >-
    Retrieves and enriches entities with breach information from SpyCloud.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities with breach enrichment data.
    reasoning: >-
      The action fetches breach data from the SpyCloud API (fetches_data=true). It
      updates the entities within the SOAR platform with enrichment data (can_mutate_internal_data=true,
      can_update_entities=true). It does not perform any state-changing operations
      on external systems.
