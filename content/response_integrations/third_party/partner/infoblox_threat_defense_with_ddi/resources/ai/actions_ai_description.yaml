Get Custom List:
  ai_description: >-
    ### General Description

    Retrieves custom lists from Infoblox Threat Defense. This action allows users
    to query and display custom lists based on specific criteria such as ID, name,
    type, and tag filters. It provides both a raw JSON output and a formatted data
    table for easier analysis within the SOAR platform.


    ### Flow Description

    1. Extract configuration parameters (API root, API key, verify SSL) to establish
    the connection.

    2. Extract action parameters (Custom List ID, Name, Type, Tag Filter, Tag Sort
    Filter, Offset, Limit).

    3. Validate the provided integer parameters (Offset, Limit, and Custom List ID)
    to ensure they meet API requirements.

    4. Initialize the `APIManager` to handle communication with the Infoblox API.

    5. Execute the `get_custom_list` API call using the provided filters and pagination
    settings.

