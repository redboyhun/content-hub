Get Custom List:
  ai_description: >-
    ### General Description

    Retrieves custom lists from Infoblox Threat Defense. This action allows users
    to query and display custom lists based on specific identifiers, names, types,
    or tag-based filters. It provides visibility into the configured custom lists
    within the Infoblox environment.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the necessary integration
    parameters (API Root, API Key, Verify SSL) from the SOAR configuration.

    2. **Parameter Extraction**: It extracts action-specific parameters, including
    `Custom List ID`, `Name`, `Type`, `Tag Filter`, `Tag Sort Filter`, `Offset`, and
    `Limit`.

    3. **Validation**: The action validates the integer parameters (`Offset`, `Limit`,
    and `Custom List ID`) to ensure they meet the required format.

    4. **API Interaction**: The action utilizes the `APIManager` to perform a GET
    request to the Infoblox API endpoint to retrieve the custom list data.

    5. **Data Processing**: The retrieved results are processed, converted into `CustomList`
    data models, and formatted into a CSV-compatible structure.

    6. **Output Generation**: The action adds the raw JSON response to the result
    and displays the custom list details in a data table within the SOAR platform.


    ### Additional Notes

    This action is a read-only operation and does not perform any modifications to
    the Infoblox environment or the SOAR case data.
  ai_short_description: >-
    Retrieves custom lists from Infoblox Threat Defense based on provided filters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
