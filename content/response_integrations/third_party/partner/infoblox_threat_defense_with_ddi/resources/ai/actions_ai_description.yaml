"Initiate Indicator Intel Lookup With Dossier":
  ai_description: >-
    ### General Description

    Initiates an indicator (IP, URL, Host, Email, or Hash) investigation using Infoblox
    Dossier. This action triggers a threat intelligence lookup to gather contextual
    information about the specified indicator.


    ### Flow Description

    1. Extracts parameters: `Indicator Type`, `Indicator Value`, `Source`, and `Wait
    for Results`.

    2. Calls the Infoblox API (`GET /tide/api/services/intel/lookup/indicator/{type}`)
    via `APIManager` to initiate the lookup.

    3. If `Wait for Results` is true, processes the returned dossier data and adds
    it to a data table.

    4. If `Wait for Results` is false, returns the Job ID and status in a data table.

    5. Adds the raw API response as JSON to the action results.


    ### Additional Notes

    This action is used to start an investigation; it does not modify external security
    controls.
