    3. Executes a GET request to the Infoblox TIDE API (`/tide/api/data/threats`)
    using the provided parameters to fetch threat intelligence.

    4. Processes the returned threat records, limiting the number of records displayed
    in the table to `MAX_TABLE_RECORDS` (20).

    5. Adds the raw JSON response to the action results using `siemplify.result.add_result_json`.

    6. If threat records are found, constructs and adds a data table titled "TIDE
    Indicator Threat Lookup Results" to the action results.


    ### Additional Notes

    This action is a read-only enrichment task. It does not modify any external systems
