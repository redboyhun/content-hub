Create Custom List:
  ai_description: >-
    ### General Description

    Creates a new custom list within the Infoblox Threat Defense system. This action
    allows security teams to programmatically define and initialize custom lists (often
    used for allowlisting or blocklisting) by specifying a name, type, and optional
    metadata such as description, confidence levels, threat levels, and tags.


    ### Flow Description

    1. **Configuration Initialization**: The action retrieves the necessary integration
    parameters, including the API root, API key, and SSL verification settings.

    2. **Parameter Extraction**: It extracts the action-specific parameters: `Name`,
    `Type`, `Items`, `Description`, `Confidence Level`, `Threat Level`, and `Tags`.

    3. **Validation**: The action validates the required fields (`Name`, `Type`) and
    ensures that any provided items (IPs or domains) are correctly formatted.

    4. **Payload Construction**: It constructs a JSON payload containing the list
    details and optional fields.

    5. **API Interaction**: The action makes a `POST` request to the Infoblox Threat
    Defense API endpoint (`/api/atcfw/v1/named_lists`) to create the custom list.

    6. **Result Processing**: Upon success, it adds the API response as a JSON result
    and generates a data table summarizing the created custom list details for the
    analyst.


    ### Additional Notes

    This action is primarily used for security policy management. The created custom
    list can subsequently be referenced in security policies to enforce allow or block
    actions on the specified indicators.
  ai_short_description: >-
    Creates a new custom list in the Infoblox Threat Defense system for use in security
    policies.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new custom list in the Infoblox Threat Defense system.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the Infoblox API to create a new custom
      list, which constitutes an external data mutation. It does not fetch data, mutate
      internal SecOps data, or update entities/insights.
