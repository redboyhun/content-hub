Create Custom List:
  ai_description: >-
    ### General Description

    Creates a new custom list in the Infoblox Threat Defense with DDI platform. This
    action allows users to define a custom list with specific items, descriptions,
    confidence levels, threat levels, and tags for use in security policies.


    ### Flow Description

    1. Extracts configuration parameters (API root, API key, SSL verification) from
    the integration settings.

    2. Extracts action parameters (Name, Type, Items, Description, Confidence Level,
    Threat Level, Tags) from the user input.

    3. Validates the provided name, type, and items (IPs/domains) to ensure they meet
    the required format.

    4. Constructs a payload containing the custom list details.

    5. Sends a POST request to the Infoblox API to create the custom list.

    6. Adds the result JSON and a data table to the action output for visibility.


    ### Additional Notes

    This action requires valid Infoblox API credentials. The items parameter should
    be a comma-separated list of indicators.
