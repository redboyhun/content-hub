    of the specified security policy.

    3. It constructs a new payload by merging the existing policy data with the new
    values provided in the action parameters.

    4. It performs a `PUT` request to the Infoblox API to update the security policy
    with the constructed payload.

    5. Upon success, it adds the updated policy details to the action result as a
    JSON object and a data table.


