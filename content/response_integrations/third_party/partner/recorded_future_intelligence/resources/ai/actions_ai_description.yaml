      Adds entities to a list in Recorded Future.
    fetches_data: true
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a GET request to fetch the list and a POST/PUT request to add
      entities to the list (can_mutate_external_data=true). It does not fetch context
