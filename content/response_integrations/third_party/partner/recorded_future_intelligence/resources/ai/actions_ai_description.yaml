Create List:
  ai_description: >-
    ### General Description

    Creates a new entity list in the Recorded Future platform. This action allows
    users to organize entities into custom lists for better management and tracking
    within Recorded Future.


    ### Flow Description

    1. Extracts configuration parameters (`ApiKey`, `Verify SSL`) to authenticate
    and configure the connection to Recorded Future.

    2. Extracts action parameters (`List Name`, `List Type`) to define the properties
    of the new list.

    3. Initializes the `psengine` configuration using the provided API key and SSL
    settings.

    4. Initializes the `EntityListMgr` to manage list operations.

    5. Calls the `list_mgr.create` method to create the new list in Recorded Future.

    6. Adds the response JSON from the creation request to the action results.


    ### Additional Notes

    This action interacts with the Recorded Future API to create a list. It does not
    perform any operations on existing case entities.
