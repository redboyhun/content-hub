Detonate File:
  ai_description: >-
    ### General Description

    Submits a file to the Recorded Future Sandbox for detonation and analysis. This
    action allows users to analyze potentially malicious files by uploading them to
    the Recorded Future Sandbox, which provides a detailed behavior report and threat
    score.


    ### Flow Description

    1. Extracts configuration parameters (Sandbox API URL, API Key) and action parameters
    (File Path, File Source, Profile, Password).

    2. Retrieves the file from the specified source (GCP Bucket or Local File System).

    3. Submits the file to the Recorded Future Sandbox for analysis.

    4. Monitors the submission status asynchronously.

    5. Once analysis is complete, retrieves the sandbox report.

    6. Generates a case insight with the detonation results and adds the report data
    to the action results.


    ### Additional Notes

    This action is asynchronous and may require multiple runs to complete if the sandbox
    analysis takes time.
