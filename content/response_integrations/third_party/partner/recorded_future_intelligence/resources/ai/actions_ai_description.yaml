Add Analyst Note:
  ai_description: >-
    ### General Description

    Publishes an analyst note to the Recorded Future platform. This action allows
    analysts to document findings and context directly within Recorded Future, associating
    the note with relevant entities from the current case.


    ### Flow Description

    1. Extracts configuration parameters (API Key, SSL verification).

    2. Extracts action parameters (Note Title, Note Text, Topic).

    3. Collects identifiers from all target entities in the case.

    4. Appends the collected entity identifiers to the note text.

    5. Initializes the `AnalystNoteMgr` with the provided API credentials.

    6. Calls the `publish` method of the `AnalystNoteMgr` to create the note in Recorded
    Future.

    7. Adds the API response to the action result.


    ### Additional Notes

    This action interacts with the Recorded Future API to create external records.
    It does not modify entities or insights within Google SecOps.
  ai_short_description: >-
    Publishes an analyst note to Recorded Future, including a list of case entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Publishes an analyst note to the Recorded Future platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to publish an analyst note to Recorded Future
      (can_mutate_external_data=true). It does not fetch context data or update internal
      entities.
  categories:
    enrichment: false
    reasoning: >-
      The action publishes an analyst note to an external system (Recorded Future).
      It does not fetch data (not enrichment) and does not perform any remediation
      actions (not remediation).
    remediation: false
