    1. Extracts configuration parameters (API Key, Verify SSL) and action parameters
    (List ID, Entity ID, Entity Name, Entity Type).

    2. Determines the target entities to remove:
       - If `Entity ID` is provided, uses it.
       - If `Entity Name` and `Entity Type` are provided, uses them.
       - Otherwise, maps current case entities to Recorded Future format using `map_secops_entities_to_rf`.
    3. Initializes `EntityListMgr` with the provided API key.

    4. Fetches the list using `list_mgr.fetch(list_=list_id)`.

    5. Performs a bulk removal of the identified entities using `fetch_resp.bulk_remove(entities=entities)`.

    6. Adds the result JSON to the action output.


