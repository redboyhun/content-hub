Enrich CVE:
  ai_description: >-
    ### General Description

    Enriches CVE entities using Recorded Future intelligence. This action queries
    the Recorded Future API to retrieve threat intelligence, risk scores, and vulnerability
    details for specified CVEs, helping analysts assess the risk associated with vulnerabilities
    found in their environment.


    ### Flow Description

    1. Extracts configuration parameters (API URL, API Key, SSL verification, Collective
    Insights global setting) and action parameters (Risk Score Threshold, Include
    Links, Enable Collective Insights).

    2. Initializes the `RecordedFutureManager` with the provided credentials.

    3. Iterates through the target entities, filtering for `CVE` types.

    4. For each CVE, calls the Recorded Future API to fetch enrichment data, including
    risk scores and evidence details.

    5. If the risk score exceeds the configured `Risk Score Threshold`, marks the
    entity as suspicious.

    6. Updates the entity with enrichment data (e.g., risk score, risk string, rules)
    and sets `is_enriched` to true.

    7. Generates a case insight containing the vulnerability details and risk evidence
    if the entity is deemed risky.

    8. Adds the enrichment results to the action's JSON output and updates the entities
    in the case.


    ### Additional Notes

    This action supports submitting detection data back to Recorded Future via Collective
    Insights if enabled. The action will only process entities of type `CVE`.
