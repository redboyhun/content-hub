Enrich URL:
  ai_description: >-
    ### General Description

    Enriches URL entities using Recorded Future Intelligence. This action queries
    the Recorded Future API to retrieve comprehensive threat intelligence, including
    risk scores, triggered risk rules, and associated links for the provided URL entities.
    It evaluates the risk against a configurable threshold to determine if the URL
    should be marked as suspicious.


    ### Flow Description

    1. Extract configuration parameters (API URL, API Key, SSL verification, and global
    Collective Insights setting).

    2. Extract action parameters (Risk Score Threshold, Include Links, and Enable
    Collective Insights).

    3. Initialize the `RecordedFutureCommon` manager to handle API interactions.

    4. Iterate over the target entities, filtering specifically for URL entities.

    5. For each URL, call the Recorded Future API to fetch enrichment data, optionally
    including links.

    6. If the retrieved risk score exceeds the configured threshold, mark the entity
    as suspicious.

    7. Update the entity with enrichment data, including risk score, risk string,
    and other metadata.

    8. Generate a case insight containing the detailed risk analysis, including evidence
    details and location data if applicable.

    9. Add the enrichment results to the action's JSON output.


    ### Additional Notes

    The action supports submitting detections back to Recorded Future via the Collective
    Insights feature, which can be enabled or disabled via action parameters. If no
    score is returned for an entity, a default score of 0 is used.
