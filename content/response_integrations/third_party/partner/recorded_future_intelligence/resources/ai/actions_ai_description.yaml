Add Analyst Note:
  ai_description: >-
    ### General Description

    Adds an analyst note to the Recorded Future platform. This action takes a title,
    text, and optional topic, and appends the identifiers of all entities currently
    in the case to the note text before publishing it to Recorded Future.


    ### Flow Description

    1. Extracts configuration parameters (`ApiKey`, `Verify SSL`) and action parameters
    (`Note Title`, `Note Text`, `Topic`).

    2. Collects identifiers from all `target_entities` in the current case.

    3. Appends the collected entity identifiers to the `Note Text`.

    4. Initializes the `AnalystNoteMgr` from the `psengine` library using the provided
    API key.

    5. Calls `note_mgr.publish(title=note_title, text=note_text, topic=topic)` to
    send the note to Recorded Future.

    6. Adds the API response to the action results.


    ### Additional Notes

    This action interacts with the Recorded Future API. It does not modify the entities
    themselves but creates a record in the external Recorded Future system.
  ai_short_description: >-
    Publishes an analyst note to Recorded Future, including a list of entities from
    the current case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Publishes an analyst note to the Recorded Future platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action publishes a note to the Recorded Future platform via an API call.
      It does not fetch data, mutate internal data, or update entities.
