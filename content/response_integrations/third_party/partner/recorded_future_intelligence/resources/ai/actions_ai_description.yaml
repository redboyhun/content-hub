Detonate File:
  ai_description: >-
    ### General Description

    Submits a file to the Recorded Future Sandbox for automated detonation and analysis.
    This action allows analysts to upload files from either a Google Cloud Storage
    bucket or the local file system to the sandbox for deep inspection, helping to
    identify malicious behavior and extract indicators of compromise.


    ### Flow Description

    1. Extracts action parameters: `File Path`, `File Source`, `Profile`, and `Password`.

    2. Retrieves the file from the specified source (GCP Bucket or Local File System).

    3. Submits the file to the Recorded Future Sandbox API for detonation.

    4. Monitors the submission status asynchronously, as sandbox analysis may take
    time to complete.

    5. Once analysis is complete, retrieves the detailed detonation report.

    6. Adds a case insight with the analysis results and updates the action result
    with the report data.


    ### Additional Notes

    This action is asynchronous and may require multiple runs to complete if the sandbox
    analysis takes time. The action context is used to track the status of pending
    submissions.
  ai_short_description: >-
    Submits a file to the Recorded Future Sandbox for automated detonation and analysis.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits a file to the Recorded Future Sandbox for analysis, which creates a
      new analysis job in the external system.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates case insights with the analysis results.
    reasoning: >-
      The action makes a POST request to submit a file to the Recorded Future Sandbox
      (can_mutate_external_data=true). It fetches the analysis report (fetches_data=true)
      and creates a case insight (can_mutate_internal_data=true).
  categories:
