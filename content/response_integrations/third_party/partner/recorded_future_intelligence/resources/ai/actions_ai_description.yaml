Enrich CVE:
  ai_description: >-
    ### General Description

    Queries Recorded Future to retrieve threat intelligence for CVE entities. This
    action enriches CVE entities by fetching risk scores, evidence details, and associated
    intelligence from Recorded Future, helping analysts assess the severity and potential
    impact of vulnerabilities.


    ### Flow Description

    1. Extracts configuration parameters (API URL, API Key, SSL verification, Collective
    Insights global setting).

    2. Extracts action parameters (Risk Score Threshold, Include Links, Enable Collective
    Insights).

    3. Iterates through target entities, filtering for CVE type.

    4. Calls the Recorded Future API to fetch enrichment data for each CVE.

    5. If enabled, submits detection data to Recorded Future's Collective Insights.

    6. Updates the entity with enrichment data (e.g., risk score, risk string).

    7. If the risk score exceeds the threshold, marks the entity as suspicious and
    creates a case insight.

    8. Adds data tables and links to the action results.


    ### Additional Notes

    This action is read-only regarding external systems (it fetches data) but performs
    internal mutations (updates entities, creates insights).
  ai_short_description: >-
    Queries Recorded Future to retrieve threat intelligence for CVE entities and updates
    them with risk scores and insights.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes (e.g., risk score, suspicious status) and creates
      case insights with the retrieved intelligence.
    reasoning: >-
      The action fetches data from the Recorded Future API (fetches_data=true). It
      does not mutate external data. It performs internal mutations by updating entity
      attributes and creating case insights (can_mutate_internal_data=true).
  categories:
    enrichment: true
    reasoning: >-
      The action fetches CVE intelligence from Recorded Future, which is an enrichment
      task. It does not perform any remediation actions.
    remediation: false
  entity_usage:
