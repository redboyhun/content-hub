Add List Entities:
  ai_description: >-
    ### General Description

    Adds entities to a specified Recorded Future list. This action allows users to
    manage list contents by adding individual entities or bulk adding entities from
    the current SecOps case.


    ### Flow Description

    1. Extract parameters: `List ID` (mandatory), `Entity ID`, `Entity Name`, and
    `Entity Type` (optional).

    2. Determine the target entities to add:
        * If `Entity ID` is provided, use it.
        * If `Entity Name` and `Entity Type` are provided, use them.
        * Otherwise, map the current case entities using `map_secops_entities_to_rf`.
    3. Initialize the `EntityListMgr` using the provided API key.

    4. Fetch the target list from Recorded Future using `list_mgr.fetch`.

    5. Perform a bulk add operation on the list using `fetch_resp.bulk_add`.

    6. Add the result JSON to the action output and generate an appropriate success
    or error message.


    ### Additional Notes

    This action interacts with the Recorded Future API to modify list contents. It
    supports both manual entity specification and automatic mapping of case entities.
  ai_short_description: >-
    Adds entities to a specified Recorded Future list.
  capabilities:
    can_create_case_comments: false
