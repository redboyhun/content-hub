Enrich URL:
  ai_description: >-
    ### General Description

    Enriches URL entities using Recorded Future threat intelligence. This action retrieves
    comprehensive risk data, including risk scores, triggered rules, and associated
    links, to help analysts evaluate the threat level of a URL.


    ### Flow Description

    1. The action extracts configuration parameters (API URL, API Key) and action-specific
    parameters (Risk Score Threshold, Include Links, Enable Collective Insights).

    2. It iterates through the target URL entities provided in the case.

    3. For each URL, it queries the Recorded Future API to retrieve threat intelligence.

    4. The action evaluates the URL's risk score against the user-defined 'Risk Score
    Threshold'.

    5. If the score exceeds the threshold, the entity is marked as suspicious.

    6. The action updates the entity's profile with enrichment data and creates a
    case insight containing the risk details.

    7. Finally, it adds data tables and web report links to the action results for
    analyst review.


    ### Additional Notes

    This action is strictly for enrichment and does not perform any external remediation
    or blocking.
