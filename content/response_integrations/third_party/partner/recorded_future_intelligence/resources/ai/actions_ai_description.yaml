Add List Entities:
  ai_description: >-
    ### General Description

    Adds entities to a specified Recorded Future list. This action allows users to
    manage entity lists in Recorded Future by adding entities from a Google SecOps
    case or by providing specific entity details.


    ### Flow Description

    1. Extract configuration parameters (API Key, Verify SSL).

    2. Extract action parameters (List ID, Entity ID, Entity Name, Entity Type).

    3. Determine target entities: If parameters are provided, use them; otherwise,
    map existing case entities using `map_secops_entities_to_rf`.

    4. Initialize Recorded Future `EntityListMgr`.

    5. Fetch the target list from Recorded Future using `list_mgr.fetch`.

    6. Perform a bulk add operation to the list using `fetch_resp.bulk_add`.

    7. Return the result of the operation.


    ### Additional Notes

    This action mutates external data in Recorded Future.
