Detonate URL:
  ai_description: >-
    ### General Description

    Submits a URL to the Recorded Future Sandbox for detonation and analysis. This
    action allows security analysts to investigate potentially malicious URLs by executing
    them in a controlled sandbox environment to observe behavior, network activity,
    and threat indicators.


    ### Flow Description

    1. The action parses the target entities to identify those of type 'URL'.

    2. It submits each identified URL to the Recorded Future Sandbox API for analysis.

    3. The action tracks the submission status asynchronously, as sandbox analysis
    takes time to complete.

    4. Once the analysis is finished, the action retrieves the detailed detonation
    report from the Recorded Future Sandbox.

    5. Finally, it creates a case insight containing the detonation report, including
    the sandbox score, tags, and network activity, to provide context to the analyst.


    ### Additional Notes

    This is an asynchronous action. If the analysis is not complete, the action will
    report that it is waiting for results. Ensure the action timeout is configured
    appropriately in the SOAR platform to allow sufficient time for the sandbox analysis
    to complete.
