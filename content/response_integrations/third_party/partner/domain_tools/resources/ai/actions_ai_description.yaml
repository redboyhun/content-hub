Investigate Domain:
  ai_description: >-
    ### General Description

    Enriches domain, hostname, and URL entities with threat intelligence data from
    DomainTools Iris Investigate. This action retrieves comprehensive contextual information,
    including risk scores, registration details, and hosting information, to assist
    in threat analysis and investigation.


    ### Flow Description

    1. Extracts configuration parameters (Username, API Token, and SSL verification
    settings) from the integration configuration.

    2. Identifies target entities (Domain, Hostname, or URL) from the case or uses
    the provided domain parameter.

    3. Filters the target entities to include only supported types (Domain, Hostname,
    URL).

    4. Calls the DomainTools Iris Investigate API to retrieve threat intelligence
    data for the identified domains.

    5. Parses the API response into a structured model.

    6. Updates the entity's additional properties with the retrieved data and marks
    the entity as enriched.

    7. Adds an entity table and a summary data table to the action results for analyst
    review.

    8. Updates the entity status in the SOAR platform.


    ### Additional Notes

    This action requires a valid DomainTools API key and a license that includes access
    to the Iris Investigate product. If no domain parameter is provided, the action
    will attempt to enrich all supported entities found in the current case.
