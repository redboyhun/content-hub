Get Domain Rdap:
  ai_description: >-
    ### General Description

    Enriches domain entities with threat intelligence data from DomainTools using
    the RDAP (Registration Data Access Protocol) service. This action retrieves detailed
    registration information, including registrar details, creation and expiration
    dates, domain status, and contact information, to provide context for security
    investigations.


    ### Flow Description

    1. Extracts configuration parameters (`Username`, `ApiToken`, `Verify SSL`) from
    the integration settings.

    2. Determines the target entities: if a `Domain` parameter is provided, it creates
    a single `DomainEntityInfo` object; otherwise, it iterates through the `target_entities`
    list, filtering for `URL`, `HOSTNAME`, and `DOMAIN` types.

    3. For each target entity, extracts the domain name using `extract_domain_from_string`.

    4. Calls the `DomainToolsManager.get_parsed_domain_rdap` method to fetch RDAP
    data from the DomainTools API.

    5. If data is found, flattens the result, updates the entity's `additional_properties`
    with the RDAP data (prefixed with 'DT'), and adds a table result to the action
    output.

    6. Updates the entities in the SOAR platform using `siemplify.update_entities`.

    7. Returns the JSON results and a summary table of the enriched data.


    ### Additional Notes

    This action requires a valid DomainTools API key and an active license for the
    'parsed-domain-rdap' product. If no RDAP record is found for a domain, the action
    logs the event and continues processing other entities.
  ai_short_description: >-
    Enriches domain entities with RDAP threat intelligence data from DomainTools.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity 'additional_properties' with RDAP data.
    reasoning: >-
      The action fetches data from the DomainTools API and updates the internal entities
      with the retrieved RDAP information. It does not mutate external data or create
      insights/comments.
  entity_usage:
    entity_types:
      address: false
