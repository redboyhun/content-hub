Get WhoIs History:
  ai_description: >-
    ### General Description

    Enriches domain, hostname, or URL entities with Whois history data from DomainTools.
    This action retrieves historical Whois records for the specified domain, providing
    insights into registration details, registrar information, and historical changes.


    ### Flow Description

    1. Extracts configuration parameters (Username, ApiToken, Verify SSL) from the
    integration settings.

    2. Identifies target entities (Domain, Hostname, URL) from the current case or
    uses the provided optional 'Domain' parameter to create a single entity.

    3. Queries the DomainTools API for Whois history for each identified domain.

    4. If data is found, flattens the result, updates the entity's `additional_properties`
    with prefixed keys (e.g., 'DT_'), and adds the data to the entity table and result
    JSON.

    5. Updates the entities in the SOAR platform with the enriched information.


    ### Additional Notes

    Requires a valid DomainTools API key and a license that includes access to the
    Whois history API.
