Get Domain Rdap:
  ai_description: >-
    ### General Description

    Enriches domain, hostname, or URL entities with RDAP (Registration Data Access
    Protocol) information using the DomainTools API. This action retrieves registration
    details, contact information, and domain status to provide context for security
    investigations.


    ### Flow Description

    1. Extracts configuration parameters: `Username`, `ApiToken`, and `Verify SSL`.

    2. Identifies target entities (Domain, Hostname, URL) from the current case or
    uses the provided `Domain` parameter if specified.

    3. For each target entity, queries the DomainTools API for parsed RDAP data.

    4. If data is found, flattens the result and updates the entity's `additional_properties`
    with prefixed keys (e.g., `DT...`).

    5. Adds entity-specific tables and a summary data table to the action results.

    6. Updates the entities within the SOAR platform with the enriched information.


    ### Additional Notes

    This action requires a valid DomainTools API subscription with access to the 'parsed-domain-rdap'
    product. If no RDAP record is found for a domain, the action logs this and continues
    processing other entities.
  ai_short_description: >-
    Enriches domain, hostname, and URL entities with RDAP data from DomainTools.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties and adds data tables to the SOAR case.
    reasoning: >-
      The action fetches data from the DomainTools API (fetches_data=true). It updates
      internal entities with the retrieved data (can_update_entities=true) and adds
      data tables to the SOAR case (can_mutate_internal_data=true). It does not mutate
      external data.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches contextual data (RDAP) from an external source (DomainTools)
      and updates internal entities without modifying external systems. This fits
      the definition of an Enrichment action.
    remediation: false
  entity_usage:
