Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the DomainTools API. This action verifies that the provided
    integration credentials are valid and that the SOAR platform can successfully
    communicate with the DomainTools service.


    ### Flow Description

    1. The action initializes the `DomainToolsManager` using the credentials (Username,
    API Token) retrieved from the integration configuration.

    2. During initialization, the manager performs an API call to fetch account information
    to validate the connection.

    3. The action evaluates the success of the manager initialization.

    4. The action returns a success or failure message to the SOAR platform based
    on the connectivity status.


    ### Additional Notes

    This action does not process any entities or perform data enrichment. It is strictly
    used for verifying integration health and connectivity.
