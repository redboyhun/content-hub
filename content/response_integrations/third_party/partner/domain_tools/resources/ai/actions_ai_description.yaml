    the integration settings.

    2. Identifies target entities (Domain, Hostname, URL) from the case or uses the
    provided `Domain` parameter if specified.

    3. Calls the DomainTools Iris Investigate API to fetch threat intelligence data
    for the identified domains.

    4. Processes the API response, flattening the data and updating the entity's `additional_properties`
    with the retrieved intelligence.

    5. Updates the entities in the SOAR platform with the enriched data.

