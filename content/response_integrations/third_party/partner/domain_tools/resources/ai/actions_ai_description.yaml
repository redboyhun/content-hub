Get WhoIs History:
  ai_description: >-
    Enriches domain, hostname, and URL entities with historical WHOIS data using DomainTools.
    This action retrieves historical registration information, including registrar
    details, creation/expiration dates, and registrant information, to provide context
    for threat investigations.


    ### Flow Description

    1. Extracts configuration parameters (Username, API Token, SSL verification) from
    the integration settings.

    2. Identifies target entities (Domain, Hostname, or URL) from the case or the
    provided `Domain` parameter.

    3. Queries the DomainTools API for WHOIS history for each identified entity.

    4. If data is found, it flattens the result, adds it to the entity's additional
    properties, and creates a summary table in the case.

    5. Updates the entities in the SOAR platform with the enriched data.


    ### Additional Notes

    Requires a valid DomainTools API key and appropriate license. If no `Domain` parameter
    is provided, the action will process all supported entities (Domain, Hostname,
    URL) found in the case.
