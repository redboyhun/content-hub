Ping:
  ai_description: >-
    General Description

    This action tests the connectivity between the Google SecOps SOAR platform and
    the DomainTools API. It verifies that the provided credentials (Username and API
    Token) are valid and that the integration can successfully communicate with the
    DomainTools service.


    Flow Description

    1. The action retrieves the configuration parameters (`Username`, `ApiToken`,
    `Verify SSL`) from the integration settings.

    2. It initializes the `DomainToolsManager` using these credentials.

    3. During initialization, the manager attempts to fetch account information from
    the DomainTools API to validate the connection.

    4. If the initialization and account information retrieval are successful, the
    action returns a "Connection Established" message.

    5. If an error occurs during initialization or account information retrieval,
    the action returns a "Connection Failed" message.


    Additional Notes

    This action does not interact with any entities or perform any data enrichment.
    It is strictly used for verifying the integration's configuration.
  ai_short_description: >-
    Tests connectivity between the Google SecOps SOAR platform and the DomainTools
    API by validating credentials.
