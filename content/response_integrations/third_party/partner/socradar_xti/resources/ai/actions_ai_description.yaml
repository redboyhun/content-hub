Enrich Indicator:
  ai_description: >-
    ### General Description

    Enriches an indicator (IP, domain, hash, or URL) using the SOCRadar IOC Enrichment
    API. This action retrieves comprehensive threat intelligence, including threat
    scores, severity levels, categorization, and historical data. It allows optional
    inclusion of AI-generated insights to provide deeper context regarding the indicator's
    risk.


    ### Flow Description

    1. The action extracts configuration parameters, including the API Root, API Key,
    Company ID, and the required IOC Enrichment API Key.

    2. It extracts action parameters: the `Indicator` to be enriched, the `Include
    AI Insight` toggle, and specific `Fields` to retrieve.

    3. The action calls the `SOCRadarManager.enrich_indicator` method, which performs
    a POST request to the SOCRadar IOC Enrichment API (`ioc_enrichment/get/indicator_details`)
    to fetch the threat intelligence data.

    4. Upon receiving the response, the action calculates a severity label (CRITICAL,
    HIGH, MEDIUM, LOW) based on the returned risk score.

    5. The full result is added to the action's output using `siemplify.result.add_result_json`.

    6. Finally, the action generates a summary string containing the indicator, risk
    score, severity, and categorization, and terminates the action.


    ### Additional Notes

    This action requires a valid IOC Enrichment API Key configured in the integration
    settings. The `Include AI Insight` parameter may increase response time and credit
    usage.
