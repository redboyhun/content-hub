Rapid Reputation:
  ai_description: >-
    General Description\n\nPerforms a quick reputation lookup for an entity (IP, hostname,
    URL, or hash) using the SOCRadar Rapid Reputation API. This action retrieves threat
    intelligence, including risk scores, severity levels, and whitelisting status,
    to assist in security analysis.\n\nFlow Description\n\n1. Extracts configuration
    parameters (API credentials, SSL verification settings).\n2. Extracts action parameters
    (`Entity Value`, `Entity Type`).\n3. Validates the `Entity Type` against allowed
    values (ip, hostname, url, hash).\n4. Calls the `SOCRadarManager.rapid_reputation`
    method to fetch reputation data from the SOCRadar API.\n5. Calculates the severity
    level (CRITICAL, HIGH, MEDIUM, LOW) based on the returned risk score.\n6. Adds
    the full result JSON to the action results.\n7. Finalizes the action with a summary
    string indicating the entity, score, severity, and whitelisting status.\n\nAdditional
    Notes\n\nRequires a valid Rapid Reputation API Key configured in the integration
    settings.
