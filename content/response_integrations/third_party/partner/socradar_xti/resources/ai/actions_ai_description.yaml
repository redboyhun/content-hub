Rapid Reputation:
  ai_description: >-
    ### General Description

    Performs a rapid reputation lookup for an entity (IP, hostname, URL, or hash)
    using the SOCRadar Rapid Reputation API. This action retrieves threat intelligence,
    including risk scores, whitelisting status, and finding sources, to assist in
    security investigations.


    ### Flow Description

    1. Extracts configuration parameters (API credentials) and action parameters (Entity
    Value, Entity Type).

    2. Validates the provided entity type against supported types (ip, hostname, url,
    hash).

    3. Calls the SOCRadar Rapid Reputation API to retrieve reputation data, including
    risk score, whitelisting status, and threat intelligence sources.

    4. Calculates the severity level based on the returned risk score (CRITICAL: 75-100,
    HIGH: 50-74, MEDIUM: 25-49, LOW: 0-24).

    5. Adds the detailed reputation data to the action result JSON.

    6. Returns a summary of the findings and ends the action.


    ### Additional Notes

    This action is an enrichment/lookup tool and does not modify any external or internal
    system state. It relies on user-provided parameters rather than iterating over
    case entities.
