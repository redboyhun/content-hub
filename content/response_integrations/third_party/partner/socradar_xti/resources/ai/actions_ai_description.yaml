Add Tag:
  ai_description: >-
    ### General Description

    Adds a tag to a specific SOCRadar alarm. This action allows users to categorize
    or label alarms within the SOCRadar platform to improve incident management and
    tracking.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (API Root, API Key,
    Company ID, Verify SSL) and action parameters (Alarm ID, Tag).

    2. The `SOCRadarManager` is initialized with the provided credentials.

    3. The action calls the `get_alarm_details` method to retrieve the current state
    of the specified alarm, including its existing tags.

    4. The action checks if the requested tag is already present in the alarm's tag
    list to ensure idempotency.

    5. If the tag is not present, the action performs a `POST` request to the SOCRadar
    API (`alarm/tag` endpoint) to add the tag to the alarm.

    6. The result of the operation is added to the action results, and the action
    concludes with a success message.


    ### Additional Notes

    This action performs an idempotency check by fetching the alarm details before
    attempting to add the tag, preventing duplicate tag entries.
  ai_short_description: Adds a tag to a specific SOCRadar alarm.
  capabilities:
    can_create_case_comments: false
