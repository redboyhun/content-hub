Ask Analyst:
  ai_description: >-
    ### General Description

    This action allows analysts to request assistance or clarification from the SOCRadar
    analyst team regarding a specific alarm. It facilitates communication between
    the SOAR platform and the SOCRadar service by submitting a comment directly to
    the relevant incident.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Key, Company ID, Verify SSL)
    and action parameters (Alarm ID, Comment).

    2. Initializes the `SOCRadarManager` with the provided credentials.

    3. Calls the `ask_analyst` method of the `SOCRadarManager`, which sends a `POST`
    request to the SOCRadar API endpoint `incidents/ask/analyst/v2` with the `alarm_id`
    and `comment`.

    4. Adds the API response to the action results using `siemplify.result.add_result_json`.

    5. Ends the action with a success message indicating the question was sent.


    ### Additional Notes

    This action requires a valid SOCRadar Alarm ID and a comment to be provided. It
    interacts with the SOCRadar API to facilitate analyst-to-analyst communication.
