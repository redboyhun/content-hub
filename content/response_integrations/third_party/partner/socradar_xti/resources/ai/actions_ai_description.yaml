Add Tag:
  ai_description: >-
    ### General Description

    Adds a tag to a specific SOCRadar alarm. This action allows analysts to categorize
    or label alarms within the SOCRadar platform to improve incident tracking and
    organization.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (API Root, API Key,
    Company ID, and SSL verification settings) from the integration configuration.

    2. It extracts the required action parameters: `Alarm ID` and `Tag`.

    3. The action initializes the `SOCRadarManager` to handle API communication.

    4. It calls the `get_alarm_details` method (GET request) to retrieve the current
    state of the specified alarm and verify its existence.

    5. It checks if the provided tag is already associated with the alarm to ensure
    idempotency.

    6. If the tag is not present, it performs a POST request to the SOCRadar API (`alarm/tag`
    endpoint) to add the tag to the alarm.

    7. The result of the operation is added to the action output, and the action concludes
    with a success or failure message.


    ### Additional Notes

    This action performs a mutation on an external system (SOCRadar). It is not considered
    an enrichment action because it modifies external data, nor is it a remediation
    action as it does not neutralize threats.
