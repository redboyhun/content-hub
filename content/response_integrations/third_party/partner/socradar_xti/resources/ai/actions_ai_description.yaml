    the `enrich_indicator_stix` method, which performs a POST request to the SOCRadar
    `ioc_enrichment/get/indicator_details_stix` endpoint.

    4. **Result Output**: The retrieved STIX bundle is added to the action results
    using `siemplify.result.add_result_json`.

    5. **Completion**: The action concludes by providing a summary of the enrichment
    process, including the number of STIX objects returned.


