Remove Tag:
  ai_description: "### General Description\nRemoves a specified tag from a SOCRadar\
    \ alarm. This action interacts with the SOCRadar REST API to manage alarm metadata,\
    \ ensuring that the specified tag is removed from the target alarm if it exists.\n\
    \n### Flow Description\n1. **Configuration Extraction**: The action retrieves\
    \ necessary integration configuration parameters, including the API Root, API\
    \ Key, Company ID, and SSL verification settings.\n2. **Parameter Extraction**:\
    \ The action extracts the `Alarm ID` and `Tag` parameters provided by the user.\n\
    3. **Manager Initialization**: An instance of `SOCRadarManager` is initialized\
    \ with the retrieved configuration.\n4. **Alarm Retrieval**: The action calls\
    \ `manager.get_alarm_details(alarm_id)` to fetch the current details of the alarm,\
    \ including its existing tags.\n5. **Tag Removal**: \n    * The action checks\
    \ if the specified `Tag` exists in the alarm's current tags.\n    * If the tag\
    \ is present, it sends a POST request to the `alarm/tag` endpoint to remove the\
    \ tag from the alarm.\n6. **Result Output**: The action outputs the result of\
    \ the operation using `siemplify.result.add_result_json` and terminates with a\
    \ success message.\n\n### Additional Notes\nThis action performs a mutation on\
    \ the external SOCRadar platform by modifying the alarm's tag list. It is not\
    \ an enrichment action as it modifies external data."
