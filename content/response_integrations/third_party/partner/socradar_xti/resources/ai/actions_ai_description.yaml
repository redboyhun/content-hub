Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the SOCRadar API by performing a GET request to the incidents
    endpoint. This action verifies that the provided API credentials and configuration
    parameters are valid and that the SOCRadar platform is reachable.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `API
    Key`, `Company ID`, and `Verify SSL`.

    2. It initializes the `SOCRadarManager` with these credentials.

    3. The action calls the `test_connectivity` method, which executes a GET request
    to the `incidents/v4` endpoint with a page limit of 1.

    4. If the request is successful, the action terminates with a success message.
    If an exception occurs (e.g., authentication failure, network error), it terminates
    with a failure message.


    ### Additional Notes

    This action is strictly for connectivity testing and does not perform any data
    retrieval, enrichment, or remediation tasks.
