Change Severity:
  ai_description: >-
    ### General Description

    Changes the severity level of a specific alarm within the SOCRadar platform. This
    action allows analysts to update the priority of an incident directly from the
    SOAR platform by interacting with the SOCRadar REST API.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (API Root, API Key,
    Company ID, Verify SSL) to establish a connection to the SOCRadar API.

    2. It retrieves the `Alarm ID` and the new `Severity` level from the action parameters.

    3. The `SOCRadarManager` is initialized with the provided credentials.

    4. The action calls the `change_severity` method, which sends a `POST` request
    to the SOCRadar API endpoint `alarm/severity` with the specified `alarm_id` and
    `severity`.

    5. The result of the API operation is added to the action results, and the action
    concludes with a success or failure message.


    ### Additional Notes

    The `Severity` parameter must be one of the following values: 'CRITICAL', 'HIGH',
    'MEDIUM', or 'LOW'. The action validates this input before sending the request
    to the API.
