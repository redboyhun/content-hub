Change Severity:
  ai_description: >-
    ### General Description

    Updates the severity level of a SOCRadar alarm. This action allows analysts to
    modify the priority of an existing alarm within the SOCRadar platform to better
    reflect its current risk or status.


    ### Flow Description

    1. Extract configuration parameters (API Root, API Key, Company ID, Verify SSL).

    2. Extract action parameters (Alarm ID, Severity).

    3. Initialize the `SOCRadarManager` with the provided credentials.

    4. Call the `change_severity` method, which sends a `POST` request to the SOCRadar
    API endpoint `alarm/severity` with the `alarm_id` and the new `severity` value.

    5. Add the API response to the action results.

    6. Terminate the action with a status message indicating success or failure.


    ### Additional Notes

    The action requires a valid SOCRadar Alarm ID and a severity level (CRITICAL,
    HIGH, MEDIUM, or LOW).
