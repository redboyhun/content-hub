Change Assignee:
  ai_description: >-
    ### General Description

    Assigns one or more users to a specific SOCRadar alarm by updating the assignee
    field within the SOCRadar platform. This action allows security analysts to delegate
    or reassign incidents directly from the SOAR platform to the appropriate personnel
    in SOCRadar.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (API Root, API Key,
    Company ID) to establish a connection to the SOCRadar API.

    2. It retrieves the `Alarm ID`, `User Emails`, and `User IDs` from the action
    parameters.

    3. The action parses the provided `User Emails` and `User IDs` into lists.

    4. It invokes the `SOCRadarManager.change_assignee` method, which performs a `POST`
    request to the `/alarm/{alarm_id}/assignee` endpoint of the SOCRadar API.

    5. The result of the API operation is added to the action results, and the action
    concludes with a success or failure message.


    ### Additional Notes

    This action requires a valid SOCRadar API Key and Company ID. Either `User Emails`
    or `User IDs` (or both) must be provided to successfully update the assignee.
