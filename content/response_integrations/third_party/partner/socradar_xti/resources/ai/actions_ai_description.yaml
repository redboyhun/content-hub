Enrich Indicator:
  ai_description: >-
    ### General Description

    Enriches indicators (IP, domain, hash, URL) using the SOCRadar IOC Enrichment
    API. This action retrieves comprehensive threat intelligence, including threat
    scores, severity, categorization, classifications, and history. Optionally, it
    can include AI-generated threat insights.


    ### Flow Description

    1. Extracts configuration parameters (API credentials, Company ID, SSL verification
    settings) and action parameters (Indicator, AI insight preference, and requested
    fields).

    2. Validates the presence of the required IOC Enrichment API Key.

    3. Calls the SOCRadar API (`ioc_enrichment/get/indicator_details`) to retrieve
    threat intelligence for the specified indicator.

    4. Processes the API response to calculate a severity label (CRITICAL, HIGH, MEDIUM,
    LOW) based on the returned risk score.

    5. Adds the detailed JSON result to the action output for further analysis.

    6. Finalizes the action with a summary string containing the indicator, risk score,
    severity, and categorization.


