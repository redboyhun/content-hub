Add Comment:
  ai_description: >-
    ### General Description

    Adds a comment to a specific alarm in the SOCRadar platform. This action enables
    analysts to append notes or context directly to an existing alarm, facilitating
    better collaboration and documentation within the SOCRadar environment.


    ### Flow Description

    1. The action extracts the necessary configuration parameters: `API Root`, `API
    Key`, `Company ID`, and `Verify SSL`.

    2. It extracts the required action parameters: `Alarm ID`, `Comment`, and the
    optional `User Email`.

    3. The `SOCRadarManager` is initialized with the provided credentials.

    4. The action calls the `add_comment` method, which performs a `POST` request
    to the SOCRadar API endpoint `alarm/add/comment/v2` with the alarm ID, comment,
    and user email.

    5. The result of the API call is added to the action's output using `siemplify.result.add_result_json`.

    6. The action concludes by ending with a success or failure message.


    ### Additional Notes

    This action modifies the state of an external SOCRadar alarm by adding a comment.
    It does not perform any modifications to the internal Google SecOps case or alert
    data.
  ai_short_description: Adds a comment to a SOCRadar alarm.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a comment to an alarm in the SOCRadar platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action makes a POST request to add a comment to an external SOCRadar alarm
      (can_mutate_external_data=true). It does not fetch context data or update internal
      entities.
  categories:
