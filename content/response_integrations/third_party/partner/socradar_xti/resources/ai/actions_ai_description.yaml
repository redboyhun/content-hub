Remove Tag:
  ai_description: >-
    ### General Description

    Removes a specified tag from a SOCRadar alarm. This action interacts with the
    SOCRadar REST API to modify the metadata of an existing alarm by removing a tag.


    ### Flow Description

    1. The action extracts the `Alarm ID` and `Tag` from the provided action parameters.

    2. The `SOCRadarManager` is initialized using the configured API credentials.

    3. The action calls `manager.remove_tag(alarm_id, tag)`.

    4. Inside the manager, the action first calls `get_alarm_details` to retrieve
    the current state of the alarm.

    5. It checks if the specified tag exists in the alarm's current tag list.

    6. If the tag is present, the action performs a POST request to the `alarm/tag`
    endpoint to remove the tag from the alarm.

    7. The result of the operation is returned as a JSON object, and the action concludes
    with a success or failure message.


    ### Additional Notes

    This action performs a state-changing operation on the SOCRadar platform. It includes
    an idempotency check by verifying the tag's existence before attempting removal.
  ai_short_description: >-
    Removes a specified tag from a SOCRadar alarm.
