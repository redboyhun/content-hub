Get Threat Feed:
  ai_description: >-
    ### General Description

    Fetches Indicators of Compromise (IOCs) from one or more SOCRadar Threat Feed
    collections using their unique identifiers (UUIDs). This action retrieves threat
    intelligence data, including IOC values, types, confidence scores, and timestamps,
    allowing analysts to ingest external threat data into the SOAR platform.


    ### Flow Description

    1. The action extracts configuration parameters (API Root, API Key, Company ID,
    and SSL verification settings) to initialize the `SOCRadarManager`.

    2. It extracts action parameters: `Collection UUIDs` (mandatory), `Max IOCs Per
    Feed` (optional), and `IOC Type Filter` (optional).

    3. The action calls the `SOCRadarManager.get_multiple_ioc_feeds` method to retrieve
    data from the SOCRadar API for the provided UUIDs.

    4. The retrieved feed data is filtered based on the `IOC Type Filter` (e.g., hash,
    ip, domain, url) if provided.

    5. The results are truncated to the `Max IOCs Per Feed` limit.

    6. The final processed IOC data is added to the action result JSON, and the action
    concludes with a summary of the total IOCs fetched.


    ### Additional Notes

    This action does not operate on specific entities within the case. It is designed
    to retrieve bulk threat intelligence data for ingestion or further analysis.
  ai_short_description: >-
    Fetches IOCs from SOCRadar Threat Feed collections by UUID.
