Get Threat Feed:
  ai_description: >-
    ### General Description

    Fetches IOCs from one or more SOCRadar Threat Feed collections by UUID. This action
    retrieves threat intelligence data, including IOC values, types, confidence scores,
    and timestamps, from the specified collections.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Key, Company ID, Verify SSL)
    from the integration settings.

    2. Extracts action parameters (Collection UUIDs, Max IOCs Per Feed, IOC Type Filter)
    from the action configuration.

    3. Calls `SOCRadarManager.get_multiple_ioc_feeds` to retrieve data from the specified
    collections using the provided UUIDs.

