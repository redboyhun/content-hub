Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the SOCRadar API by attempting to retrieve a sample incident.
    This action verifies that the provided API credentials, Company ID, and API Root
    are valid and that the SOAR platform can successfully communicate with the SOCRadar
    service.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Root`, `API
    Key`, `Company ID`, and `Verify SSL` from the integration settings.

    2. The `SOCRadarManager` is initialized with these credentials.

    3. The action calls the `test_connectivity` method, which executes a GET request
    to the `incidents/v4` endpoint with a page limit of 1.

    4. If the API returns a successful response, the action terminates with a success
    message.

    5. If the API request fails (e.g., due to authentication issues or network errors),
    the action terminates with a failure message containing the error details.


    ### Additional Notes

    This action does not perform any data processing or modifications. It is strictly
    intended for troubleshooting and verifying the integration configuration.
