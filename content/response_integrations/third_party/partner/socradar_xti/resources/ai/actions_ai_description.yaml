Add Comment:
  ai_description: >-
    ### General Description

    Adds a comment to a specific SOCRadar alarm. This action allows analysts to append
    notes or information directly to an existing alarm within the SOCRadar platform,
    facilitating better communication and documentation of investigation steps.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (API Root, API Key,
    Company ID, and SSL verification settings) from the integration configuration.

    2. It extracts the action-specific parameters: `Alarm ID` (the identifier of the
    target alarm), `Comment` (the text to be added), and `User Email` (optional, the
    email of the user posting the comment).

    3. The action initializes the `SOCRadarManager` with the provided credentials.

    4. It calls the `add_comment` method, which performs a POST request to the SOCRadar
    API endpoint `alarm/add/comment/v2` with the alarm ID, comment, and optional user
    email.

    5. The result of the API call is returned to the SOAR platform, and the action
    concludes with a success message or an error if the request fails.


    ### Additional Notes

    This action performs a state-changing operation on the external SOCRadar platform.
    It does not interact with SOAR entities or modify internal case data.
  ai_short_description: >-
    Adds a comment to a specific SOCRadar alarm.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a comment to a specific alarm in the SOCRadar platform.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a POST request to the SOCRadar API to add a comment to an
      alarm, which constitutes an external data mutation. It does not fetch data,
      update internal entities, or modify SOAR alert data.
