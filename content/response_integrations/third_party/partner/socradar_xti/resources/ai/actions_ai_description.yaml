Change Alarm Status:
  ai_description: >-
    ### General Description

    Updates the status of an alarm within the SOCRadar platform. This action allows
    analysts to modify the lifecycle state of an incident (e.g., changing to 'RESOLVED'
    or 'FALSE_POSITIVE') directly from the SOAR platform, ensuring synchronization
    between SOCRadar and the security operations workflow.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (API Root, API Key,
    Company ID, and SSL verification settings) from the integration configuration.

    2. It extracts the action-specific parameters: Alarm ID, Status, Comments, Email,
    and the 'Update Related Findings' flag.

    3. The action initializes the `SOCRadarManager` to handle communication with the
    SOCRadar REST API.

    4. It invokes the `change_status` method, which performs a `POST` request to the
    `/alarms/status/change` endpoint of the SOCRadar API with the provided alarm details
    and status update.

    5. The API response is captured and added to the action results using `add_result_json`.

    6. The action concludes by logging the outcome and terminating with a success
    or failure message.


    ### Additional Notes

    This action performs a state change on an external system (SOCRadar). It does
    not interact with SOAR entities or modify internal case data. The 'Update Related
    Findings' parameter is automatically disabled if an email is not provided, as
    required by the API logic.
