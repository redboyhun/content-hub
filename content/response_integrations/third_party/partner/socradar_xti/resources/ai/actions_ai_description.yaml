Ask Analyst:
  ai_description: >-
    ### General Description

    Requests assistance from a SOCRadar analyst for a specific alarm. This action
    allows security analysts to send a message or question directly to the SOCRadar
    analyst team regarding an existing alarm, facilitating collaboration and incident
    investigation.


    ### Flow Description

    1. The action extracts the necessary configuration parameters (API Root, API Key,
    Company ID, and SSL verification settings) from the integration configuration.

    2. It extracts the required action parameters: `Alarm ID` and `Comment`.

    3. The action initializes the `SOCRadarManager` with the provided credentials.

    4. It executes a POST request to the SOCRadar API endpoint `incidents/ask/analyst/v2`
    with the `alarm_id` and `comment`.

    5. The result of the API call is added to the action's result JSON.

    6. The action concludes with a success message indicating the request was sent.


    ### Additional Notes

    This action requires a valid SOCRadar API Key and an existing Alarm ID. It is
    an operational action used for communication with the SOCRadar analyst team and
    does not perform automated remediation or data enrichment.
