Create Abuse Alert:
  ai_description: >-
    ### General Description

    Creates an abuse alert for a specified entity (e.g., URL) within the DoppelVision
    platform. This action allows analysts to trigger an automated abuse alert creation
    process for a given target.


    ### Flow Description

    1. Extracts configuration parameters (API Key, User API Key, Organization Code)
    and the target `Entity` from the action parameters.

    2. Initializes the `DoppelManager` with the provided credentials.

    3. Executes a `POST` request to the DoppelVision API endpoint `/alert/abuse` with
    the target entity.

    4. If the request is successful, the response is stored in the action's result
    JSON.

    5. If the request fails, the action reports a failure status.


    ### Additional Notes

    This action performs a mutation on the external DoppelVision system by creating
    a new alert record. It does not modify any internal SOAR case data or entities.
