    to retrieve alerts based on various filters such as search keys, product categories,
    creation dates, and tags, providing visibility into the security alerts managed
    within the DoppelVision environment.


    ### Flow Description

    1. The action extracts the required configuration parameters (API Key, User API
    Key, and Organization Code) to authenticate with the DoppelVision API.

    2. It extracts optional filtering parameters provided by the user, including Search
    Key, Product, Created Before/After dates, Sort Type, Sort Order, Page, Queue State,
    and Tags.

    3. A filter dictionary is constructed from the provided parameters, excluding
    any empty values.

