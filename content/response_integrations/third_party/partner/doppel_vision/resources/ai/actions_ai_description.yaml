Create Abuse Alert:
  ai_description: >-
    ### General Description

    Creates an abuse alert in the DoppelVision system for a specified entity (e.g.,
    a URL). This action allows analysts to report suspicious entities directly to
    the DoppelVision platform for further investigation or tracking.


    ### Flow Description

    1. The action extracts the required configuration parameters: `API Key`, `User
    API Key`, and `Organization Code` from the DoppelVision integration settings.

    2. It extracts the `Entity` parameter (the URL or identifier to be alerted) from
    the action configuration.

    3. The `DoppelManager` is initialized with the provided credentials.

    4. The action calls the `create_abuse_alert` method, which performs a `POST` request
    to the DoppelVision API endpoint (`/alert/abuse`) with the entity in the request
    payload.

    5. If the API request is successful, the response is stored in the action's result
    JSON.

    6. If the request fails, an error is logged, and the action execution state is
    set to failed.


    ### Additional Notes

    This action performs a state-changing operation on the external DoppelVision system
    by creating a new abuse alert record.
  ai_short_description: >-
    Creates an abuse alert in the DoppelVision system for a specified entity.
  capabilities:
