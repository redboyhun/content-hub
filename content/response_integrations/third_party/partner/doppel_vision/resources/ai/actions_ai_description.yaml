Update Alert:
  ai_description: >-
    ### General Description

    Updates the state of an alert within the Doppel system. This action allows analysts
    to modify the 'Queue State' and 'Entity State' of a specific alert, facilitating
    workflow management and status tracking directly from the SOAR platform.


    ### Flow Description

    1. The action extracts the required configuration parameters (API Key, User API
    Key, Organization Code) and action parameters (Alert_ID, Entity, Queue_State,
    Entity_State).

    2. It validates that either 'Alert_ID' or 'Entity' is provided, but not both,
    to identify the target alert.

    3. The action instantiates the `DoppelManager` and invokes the `update_alert`
    method.

    4. The `DoppelManager` performs a PUT request to the Doppel API (`https://api.doppel.com/v1/alert`)
    with the provided state updates.

    5. If the update is successful, the action stores the updated alert JSON in the
    result and completes successfully. If the update fails, the action terminates
    with an error message.


    ### Additional Notes

    This action performs an external mutation (PUT request) to update alert metadata.
    It does not perform any internal SOAR entity enrichment or modification. Either
    'Alert_ID' or 'Entity' must be provided as a parameter to identify the target
    alert.
  ai_short_description: >-
    Updates the status and state of an alert in the Doppel system.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the state of an alert in the Doppel system via a PUT request.
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs a PUT request to update an alert in the external Doppel
      system (can_mutate_external_data=true). It does not fetch data, nor does it
      modify internal SOAR data (entities, insights, etc.).
  categories:
    enrichment: false
    reasoning: >-
      The action performs a state change on an external system (Doppel) by updating
      an alert's status. It does not fetch data for enrichment, nor does it modify
      internal SOAR data. Because it modifies the state of an external security object
      (the alert), it is classified as a remediation action.
    remediation: true
