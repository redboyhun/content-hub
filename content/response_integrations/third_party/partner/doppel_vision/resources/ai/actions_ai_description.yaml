    1. The action extracts the `Entity` and `Alert_ID` parameters provided by the
    user.

    2. It initializes the `DoppelManager` using the configured API credentials.

    3. The action validates that exactly one of the two parameters (`Entity` or `Alert_ID`)
    is provided; if both or neither are provided, the action fails.

    4. It executes a GET request to the DoppelVision API (`/alert` endpoint) using
    the provided identifier.

    5. If the alert is found, the JSON response is stored in the action's result using
    `siemplify.result.add_result_json`.

    6. If the request fails or the alert is not found, the action reports a failure.


