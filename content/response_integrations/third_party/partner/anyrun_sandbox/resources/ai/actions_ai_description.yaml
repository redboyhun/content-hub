File Linux Analysis:
  ai_description: >-
    ### General Description

    Performs automated file analysis using the ANY.RUN Linux sandbox. This action
    retrieves an attachment from the current case, submits it to the ANY.RUN sandbox
    for dynamic analysis, and retrieves the resulting report, verdict, and indicators
    of compromise (IOCs). The action provides visibility into the file's behavior
    and potential maliciousness.


    ### Flow Description

    1. Extracts the ANY.RUN Sandbox API Key and SSL verification settings from the
    integration configuration.

    2. Retrieves the file attachment from the current case.

    3. Submits the file to the ANY.RUN Linux sandbox for analysis using the provided
    configuration parameters (OS, folder, command line, network settings, etc.).

    4. Adds a comment to the case containing a link to the interactive ANY.RUN analysis
    task.

    5. Monitors the task status until completion.

    6. Downloads the HTML analysis report and saves it as an attachment to the case
    wall.

    7. Retrieves identified IOCs and adds a summary comment to the case.

    8. Retrieves the final analysis verdict and completes the action.


    ### Additional Notes

    This action requires an active ANY.RUN Sandbox API Key. It performs external data
    mutation by creating a new analysis task in the ANY.RUN platform and internal
