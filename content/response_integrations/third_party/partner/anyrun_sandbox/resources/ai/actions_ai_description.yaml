Ping:
  ai_description: >-
    Tests connectivity between the Google SecOps platform and the ANY.RUN Sandbox
    service. This action validates the integration configuration, including API keys
    and proxy settings, to ensure the SOAR platform can successfully communicate with
    the external service.


    ### Flow Description

    1. The action extracts the required configuration parameters: `ANYRUN Sandbox
    API KEY`, `Verify SSL`, and `Enable proxy`.

    2. If `Enable proxy` is configured, the action extracts the `Proxy host` and `Proxy
    port` and attempts to establish a connection to the ANY.RUN service via the specified
    proxy using the `connector.check_proxy()` method.

    3. If `Enable proxy` is disabled, the action initializes the `BaseSandboxConnector`
    with the provided API key and calls `connector.check_authorization()` to verify
    the credentials.

    4. The action logs the outcome of the connection attempt and terminates with a
    success or failure status.


    ### Additional Notes

    This action does not interact with any entities or cases. It is strictly a diagnostic
    tool for verifying integration connectivity.
