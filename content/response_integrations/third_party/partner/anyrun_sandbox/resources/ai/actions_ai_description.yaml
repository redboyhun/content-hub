File Android Analysis:
  ai_description: >-
    ### General Description

    Performs Android file analysis using the ANY.RUN sandbox. This action submits
    a case attachment to the ANY.RUN platform for dynamic analysis, retrieves the
    resulting HTML report, and extracts suspicious or malicious indicators of compromise
    (IOCs). The action provides visibility into the file's behavior and potential
    threats within an Android environment.


    ### Flow Description

    1. Extracts configuration parameters (API Key, SSL verification) and action parameters
    (timeout, network settings, privacy, etc.).

    2. Retrieves the first available attachment from the case.

    3. Submits the attachment to the ANY.RUN Android sandbox for analysis using the
    `SandboxConnector`.

    4. Adds a comment to the case containing a link to the interactive ANY.RUN analysis
    task.

    5. Monitors the task status and retrieves the final analysis report in HTML format.

    6. Saves the HTML report as an attachment to the case wall using `save_attachment_to_case_wall`.

    7. Extracts IOCs from the analysis report and adds a summary comment to the case.

    8. Retrieves and reports the final analysis verdict.


    ### Additional Notes

    This action requires a valid ANY.RUN API key. It supports extensive configuration
    for the sandbox environment, including network connectivity, proxy settings, and
    geolocation options. The action operates on case attachments rather than specific
    entities.
  ai_short_description: >-
    Submits a case attachment to the ANY.RUN Android sandbox for analysis and retrieves
    the resulting report and IOCs.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits a file to the ANY.RUN sandbox, creating a new analysis task.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Saves the analysis report as an attachment to the case wall and adds comments
      to the case.
    reasoning: >-
      The action fetches analysis reports and IOCs from the ANY.RUN sandbox (fetches_data=true).
      It creates an analysis task in the external sandbox (can_mutate_external_data=true).
      It modifies internal case data by saving an attachment and adding comments (can_mutate_internal_data=true,
      can_create_case_comments=true).
