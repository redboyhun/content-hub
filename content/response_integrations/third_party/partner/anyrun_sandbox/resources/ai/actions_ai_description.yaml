    1. Extracts the API key and SSL verification settings from the integration configuration.

    2. Retrieves the first attachment from the current case.

    3. Submits the file to the ANY.RUN sandbox using the `SandboxConnector.windows`
    method, applying user-defined parameters like OS version, bitness, and network
    settings.

    4. Adds a comment to the case containing the link to the interactive ANY.RUN analysis.

    5. Polls the task status until completion.

