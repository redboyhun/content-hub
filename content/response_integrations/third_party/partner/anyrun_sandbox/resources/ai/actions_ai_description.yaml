File Linux Analysis:
  ai_description: >-
    ### General Description

    Performs automated file analysis using the ANY.RUN Linux sandbox. This action
    retrieves a file attachment from the current case, submits it to the ANY.RUN sandbox
    for dynamic analysis within a Linux environment, and retrieves the resulting analysis
    report and indicators of compromise (IOCs).


    ### Flow Description

    1. The action extracts configuration parameters, including the ANY.RUN API key
    and SSL verification settings.

    2. It retrieves the file attachment from the current case.

    3. The file is submitted to the ANY.RUN Linux sandbox for analysis using the specified
    environment settings (OS, folder, root privileges, network configurations, etc.).

    4. A comment is posted to the case containing a link to the interactive ANY.RUN
    analysis task.

    5. The action polls for the task status and retrieves the final analysis report
    in HTML format.

    6. The HTML report is saved as an attachment to the case wall.

    7. The action extracts suspicious and malicious IOCs from the analysis report
    and appends a summary of these indicators to the case comments.

    8. The final analysis verdict is retrieved and the action completes.


    ### Additional Notes

    This action requires a valid ANY.RUN API key configured in the integration settings.
    It relies on the presence of a file attachment in the case to function.
