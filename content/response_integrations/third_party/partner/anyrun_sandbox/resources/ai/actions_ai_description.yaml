File Android Analysis:
  ai_description: >-
    ### General Description

    Performs automated malware analysis on an Android file attachment using the ANY.RUN
    sandbox. This action submits the file to the sandbox, retrieves the analysis report,
    saves the report as a case attachment, and adds comments to the case with the
    analysis link and any identified suspicious or malicious indicators (IOCs).


    ### Flow Description

    1. Retrieve the file attachment from the current case.

    2. Initialize the ANY.RUN Sandbox connector using the provided API key and configuration.

    3. Submit the file to the ANY.RUN Android sandbox for analysis, applying user-defined
    parameters (e.g., timeout, network settings, language).

    4. Add a comment to the case containing the URL to the interactive analysis report.

    5. Wait for the analysis to complete and retrieve the analysis report in HTML
    format.

    6. Save the HTML report as a new attachment to the case wall.

    7. Retrieve identified IOCs from the report and add a summary comment to the case.

    8. Retrieve and return the final analysis verdict.


    ### Additional Notes

    This action requires an active ANY.RUN API key. It processes file attachments
    and does not directly operate on entity types like IP or Hash, though it identifies
    IOCs within the file.
  ai_short_description: >-
    Performs automated malware analysis on an Android file attachment using the ANY.RUN
    sandbox.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds comments to the case and saves the analysis report as a case attachment.
    reasoning: >-
      The action fetches analysis reports and IOCs from the ANY.RUN sandbox (fetches_data=true).
      It does not mutate external security systems (can_mutate_external_data=false).
      It mutates internal SOAR data by adding comments and saving attachments (can_mutate_internal_data=true).
