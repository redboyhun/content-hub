    ### General Description

    Analyzes URLs using the ANY.RUN Linux sandbox environment. This action submits
    a specified URL to the ANY.RUN sandbox, configures the analysis environment (OS,
    browser, network settings), and retrieves the resulting analysis report, indicators
    of compromise (IOCs), and the final verdict. The action provides visibility into
    the behavior of the URL within a controlled Linux environment.


    ### Flow Description

    1. **Configuration Extraction**: The action extracts the ANY.RUN API key and SSL
    verification settings from the integration configuration.

    2. **Parameter Extraction**: It retrieves the target URL(s) and environment settings
    (OS, browser, network options, etc.) from the action parameters.

    3. **Sandbox Submission**: For each URL, the action initializes a `SandboxConnector`
    and submits the URL for analysis using the specified environment parameters.

    4. **Status Monitoring**: The action polls the ANY.RUN API to monitor the task
    status until completion.

    5. **Report Retrieval**: It downloads the HTML analysis report and saves it as
    an attachment to the case wall.

    6. **IOC Extraction**: It retrieves any identified IOCs from the report and appends
    them as a comment to the case.

    7. **Verdict Reporting**: It fetches the final analysis verdict and appends it
    as a comment to the case.


