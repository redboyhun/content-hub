URL Android Analysis:
  ai_description: >-
    ### General Description

    Analyzes URLs using the ANY.RUN Android sandbox. This action submits a specified
    URL to the ANY.RUN platform for dynamic analysis, retrieves the resulting report,
    and extracts indicators of compromise (IOCs) and the final verdict. The action
    provides visibility into the behavior of the URL within an Android environment,
    helping analysts assess potential threats.


    ### Flow Description

    1. The action extracts the API key and configuration settings.

    2. It extracts the target URL(s) from the action parameters.

    3. For each URL, it submits the task to the ANY.RUN Android sandbox using the
    `SandboxConnector`.

    4. It adds a comment to the case containing a link to the interactive ANY.RUN
    analysis.

    5. It waits for the analysis task to complete.

    6. It downloads the HTML analysis report and saves it as an attachment to the
    case wall.

    7. It fetches any identified IOCs and adds them to the case as a comment.

    8. It fetches the final analysis verdict and adds it to the case as a comment.


    ### Additional Notes

    This action requires a valid ANY.RUN API key. It performs external analysis and
    updates the case with findings, but does not modify external security controls.
