URL Windows Analysis:
  ai_description: >-
    ### General Description

    Performs URL analysis using a Windows VM in the ANY.RUN sandbox. This action submits
    a specified URL to the ANY.RUN platform for dynamic analysis, allowing security
    analysts to observe the behavior of the URL in a controlled environment. It retrieves
    the analysis report, extracts indicators of compromise (IOCs), and provides a
    verdict on the URL's safety.


    ### Flow Description

    1. **Configuration Extraction**: The action extracts the ANY.RUN API key and SSL
    verification settings from the integration configuration.

    2. **Parameter Extraction**: The target URL(s) are extracted from the action parameters.
    If no URL is provided, the action fails.

    3. **Analysis Submission**: For each URL, the action initializes a `SandboxConnector`
    and calls `run_url_analysis` to submit the URL to the ANY.RUN Windows sandbox,
    applying user-defined settings such as browser type, network configurations, and
    privacy settings.

    4. **Task Monitoring**: The action adds a comment to the case with a link to the
    interactive analysis task and monitors the task status until completion.

    5. **Report Retrieval**: The action retrieves the HTML analysis report and saves
    it as an attachment to the case wall.

    6. **IOC Extraction**: The action retrieves the analysis report in IOC format,
    parses it, and adds a summary comment to the case containing any identified suspicious
    or malicious indicators.

    7. **Verdict Reporting**: The action retrieves the final analysis verdict and
    adds a concluding comment to the case.


    ### Additional Notes

    The action supports various advanced configuration options, including network
    simulation (FakeNet, Tor, Proxy), browser selection, and system language settings,
    providing a highly customizable analysis environment.
