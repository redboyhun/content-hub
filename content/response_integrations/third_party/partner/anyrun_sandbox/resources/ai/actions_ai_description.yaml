Ping:
  ai_description: >-
    General Description: Tests the connectivity between the Google SecOps platform
    and the ANY.RUN Sandbox service. This action verifies that the integration is
    correctly configured and that the platform can successfully communicate with the
    external sandbox API. Flow Description: 1. The action extracts the required ANY.RUN
    Sandbox API Key and SSL verification settings from the integration configuration.
    2. If proxy settings are enabled, the action extracts the proxy host and port,
    then attempts to validate the proxy connection using the BaseSandboxConnector.check_proxy
    method. 3. The action initializes the BaseSandboxConnector with the provided API
    key and settings. 4. It calls the connector.check_authorization method to verify
    the API key and connectivity to the ANY.RUN service. 5. The action returns a success
    or failure status based on the outcome of the connectivity check. Additional Notes:
    This action is strictly for connectivity testing and does not perform any data
    enrichment, remediation, or entity manipulation.
