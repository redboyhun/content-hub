Enrich Hostname:
  ai_description: >-
    ### General Description

    Enriches Hostname entities using the Stairwell platform. This action retrieves
    threat intelligence, including verdicts, opinions, and DNS records (A, AAAA, MX)
    for a given hostname, providing context to security analysts.


    ### Flow Description

    1. Extracts configuration parameters: `API Root`, `API Key`, `Organization ID`,
    and `User ID`.

    2. Filters the target entities to identify those of type `HOSTNAME`.

    3. Iterates through each identified hostname entity.

    4. Performs a GET request to the Stairwell API (`/labs/appapi/enrichment/v1/hostname_event/{hostname}`)
    to retrieve host data.

    5. Updates the entity's `additional_properties` with the retrieved enrichment
    data.

    6. Sets the entity's `is_enriched` flag to true.

    7. Evaluates the entity's suspicious status based on the verdict and updates the
    `is_suspicious` flag.

    8. If the entity is determined to be suspicious, adds an entity insight containing
    the analysis results.

    9. Adds a data table to the action result containing the host report.

    10. Updates the entities in the SOAR platform with the new information.


    ### Additional Notes

    This action performs read-only operations on the external Stairwell system (enrichment)
    and updates internal SOAR entity data. It does not modify external system states.
