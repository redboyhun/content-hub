Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Stairwell API by performing a sample request. This action
    verifies that the provided API credentials and endpoint configuration are valid
    and that the SOAR platform can successfully communicate with the Stairwell service.


    ### Flow Description

    1. Extracts the required configuration parameters: `API Root`, `API Key`, `Organization
    ID`, and `User ID`.

    2. Initializes the `StairwellManager` with the provided credentials and API root.

    3. Executes the `test_connectivity` method, which performs a GET request to the
    Stairwell API using a dummy hostname to verify the connection.

    4. Validates the API response to ensure the connection is established.

    5. Returns a success or failure status based on the API response.


    ### Additional Notes

    This action is strictly for connectivity testing and does not perform any data
    enrichment or remediation tasks. It is intended to be used during integration
    setup to validate configuration.
