Enrich Hostname:
  ai_description: "### General Description\nEnriches Hostname entities with threat\
    \ intelligence and contextual data retrieved from the Stairwell platform. This\
    \ action queries the Stairwell API to gather information about a specific host,\
    \ including verdict, DNS records (A, AAAA, MX), and recent opinions or comments.\
    \ The retrieved data is used to update the entity's profile within Google SecOps,\
    \ mark it as enriched, and flag it as suspicious if the Stairwell verdict indicates\
    \ malicious activity.\n\n### Flow Description\n1. **Configuration Extraction**:\
    \ The action retrieves the necessary API credentials (`API Root`, `API Key`, `Organization\
    \ ID`, and `User ID`) from the integration settings.\n2. **Entity Filtering**:\
    \ It identifies and filters the target entities to process only those of type\
    \ `HOSTNAME`.\n3. **Data Retrieval**: For each valid hostname, the action performs\
    \ a `GET` request to the Stairwell API endpoint (`/labs/appapi/enrichment/v1/hostname_event/{hostname}`)\
    \ to fetch the host's report.\n4. **Enrichment & Analysis**: \n    * The retrieved\
    \ report is parsed to extract enrichment data.\n    * The entity's `additional_properties`\
    \ are updated with this data.\n    * The entity is marked as `is_enriched = True`.\n\
    \    * The action evaluates the host's verdict to determine if it is suspicious.\n\
    5. **Internal Updates**: \n    * If the host is deemed suspicious, an insight\
    \ is created on the entity.\n    * A data table containing the enrichment details\
    \ is added to the action results.\n    * The entity is updated in the Google SecOps\
    \ platform.\n6. **Result Reporting**: The action compiles the results and updates\
    \ the execution status.\n\n### Additional Notes\nThis action is strictly for enrichment\
    \ purposes and does not modify any external systems. It requires valid API credentials\
    \ for the Stairwell platform to function correctly."
