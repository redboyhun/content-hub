Enrich IP:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using the Stairwell platform. This action retrieves
    threat intelligence, including verdict information, opinions, and comments, to
    help analysts assess the risk associated with specific IP addresses.


    ### Flow Description

    1. Extracts configuration parameters (API Root, API Key, Organization ID, User
    ID) from the integration settings.

    2. Initializes the Stairwell Manager to handle API communication.

    3. Filters the target entities to process only those of type 'ADDRESS'.

    4. Iterates through each IP entity and performs an API GET request to the Stairwell
    `/labs/appapi/enrichment/v1/ip_event/{ip}` endpoint.

    5. Updates the entity's additional properties with the retrieved enrichment data
    and marks the entity as enriched.

    6. Evaluates the entity's suspicious status based on the verdict; if malicious,
    creates an entity insight.

    7. Adds a data table to the action results containing the enrichment details.

