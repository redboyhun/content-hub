Enrich Hash:
  ai_description: >-
    ### General Description

    Enriches File Hash entities using the Stairwell threat intelligence platform.
    This action retrieves comprehensive file metadata, including reputation, prevalence,
    and detection labels, to assist analysts in evaluating the risk associated with
    specific file hashes found in the environment.


    ### Flow Description

    1. The action initializes the StairwellManager using the provided API credentials
    (API Root, API Key, Organization ID, and User ID).

    2. It filters the target entities to identify those of type `FILEHASH`.

    3. For each identified file hash, the action performs a GET request to the Stairwell
    API (`/labs/appapi/enrichment/v1/object_event/{file_hash}`) to retrieve enrichment
    data.

    4. The retrieved data is parsed into a structured report.

    5. The action updates the entity's `additional_properties` with the enrichment
    data and marks the entity as enriched.

    6. If the file is determined to be suspicious based on the Stairwell verdict or
    malicious probability, the action creates an entity insight containing the analysis
    results.

    7. A data table containing the enrichment details is added to the case wall for
    each processed entity.

    8. Finally, the action updates the entities within the SOAR platform and returns
    a JSON result containing the full report for each processed hash.


    ### Additional Notes

    This action is strictly for enrichment purposes and does not perform any remediation
    or external system modifications. It relies on the Stairwell API to provide threat
    intelligence context.
  ai_short_description: >-
    Enriches File Hash entities with threat intelligence data from Stairwell.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties, sets entity enrichment status, creates
      entity insights, and adds data tables to the case wall.
    reasoning: >-
      The action fetches data from an external API (Stairwell) to enrich file hash
      entities. It does not mutate external data. It performs internal mutations by
      updating entities, adding insights, and adding data tables to the case wall.
  categories:
    enrichment: true
    reasoning: >-
      The action fetches threat intelligence data from an external source (Stairwell)
      and updates internal SOAR entities and insights. It does not perform any external
      mutations or remediation tasks. Therefore, it is classified as an enrichment
      action.
    remediation: false
