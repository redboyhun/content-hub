Enrich Hash:
  ai_description: >-
    ### General Description

    Enriches file hash entities with threat intelligence data from the Stairwell platform.
    This action queries the Stairwell API to retrieve detailed file information, including
    verdict, malicious probability, and detection labels, and updates the entity with
    this contextual data.


    ### Flow Description

    1. **Configuration Extraction**: The action extracts the `API Root`, `API Key`,
    `Organization ID`, and `User ID` from the integration configuration.

    2. **Entity Filtering**: The action filters the `target_entities` to process only
    those with the `FILEHASH` entity type.

    3. **API Interaction**: For each valid file hash entity, the action makes a `GET`
    request to the Stairwell API endpoint: `/labs/appapi/enrichment/v1/object_event/{file_hash}`.

    4. **Data Processing**: The response is parsed into a `File` object. The entity's
    `additional_properties` are updated with the enrichment data, and the `is_enriched`
    flag is set to `True`.

    5. **Suspicion Evaluation**: The action evaluates the file's suspicious status
    using the Stairwell parser. If the file is deemed suspicious, an insight is added
    to the entity using `siemplify.add_entity_insight`.

    6. **Result Reporting**: A data table containing the enrichment details is added
    to the action result, and the updated entities are saved back to the SOAR platform
    using `siemplify.update_entities`.


    ### Additional Notes

    This action requires valid API credentials for the Stairwell platform. It only
    processes entities of type `FILEHASH` and does not perform any external mutations
    (e.g., blocking or deleting files).
  ai_short_description: >-
    Enriches file hash entities with threat intelligence data from Stairwell.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties and adds insights to the entity within
      the SOAR platform.
    reasoning: >-
      The action fetches data from an external API (Stairwell) to enrich entities.
      It does not mutate external data. It mutates internal data by updating entity
      properties and adding insights to the SOAR platform.
  entity_usage:
    entity_types:
      address: false
      alert: false
      application: false
      child_hash: false
      child_process: false
      cluster: false
      container: false
      credit_card: false
      cve: false
      cve_id: false
      database: false
      deployment: false
      destination_domain: false
      domain: false
      email_message: false
      event: false
      file_hash: true
      file_name: false
      generic: false
      host_name: false
      ip_set: false
      mac_address: false
      parent_hash: false
      parent_process: false
      phone_number: false
      pod: false
      process: false
      service: false
      source_domain: false
      threat_actor: false
      threat_campaign: false
      threat_signature: false
      url: false
      usb: false
      user: false
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
