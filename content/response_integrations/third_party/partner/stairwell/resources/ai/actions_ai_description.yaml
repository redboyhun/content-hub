Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Stairwell API to ensure the integration is properly
    configured and can communicate with the service.


    ### Flow Description

    1. Extract configuration parameters: `API Root`, `API Key`, `Organization ID`,
    and `User ID`.

    2. Initialize the `StairwellManager` with the provided credentials.

    3. Execute `test_connectivity` which performs a GET request to the Stairwell API
    using a dummy hostname.

    4. If the request is successful, the action returns a success message. If it fails,
    it logs the error and returns a failure status.


    ### Additional Notes

    This action is used to verify that the integration is correctly configured and
    can communicate with the Stairwell service.
