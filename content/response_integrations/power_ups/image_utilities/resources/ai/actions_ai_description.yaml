OCR Image:
  ai_description: >-
    General Description: Performs Optical Character Recognition (OCR) on an image
    file to extract text. This action is useful for parsing images, such as screenshots
    or scanned documents, to retrieve textual information for further analysis.


    Flow Description:

    1. The action validates that either the 'Base64 Encoded Image' or 'File Path'
    parameter is provided.

    2. It verifies that the action is running on a Remote Agent.

    3. If 'Base64 Encoded Image' is provided, the action decodes the base64 string
    and saves it to a temporary file.

    4. The action uses the Tesseract OCR engine to process the image file (either
    the temporary file or the provided file path).

    5. The extracted text is returned in the action results.


    Additional Notes: This action requires a Remote Agent with the `tesseract-ocr`
    package installed.
