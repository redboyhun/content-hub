OCR Image:
  ai_description: >-
    ### General Description

    The OCR Image action performs optical character recognition (OCR) on an image
    file to extract text content. This utility is useful for parsing text from screenshots,
    documents, or other image-based artifacts provided to the SOAR platform.


    ### Flow Description

    1. The action validates that either a "Base64 Encoded Image" or a "File Path"
    is provided as an input parameter.

    2. It verifies that the action is running on a Remote Agent, as the Tesseract
    OCR engine must be installed in the agent's environment.

    3. If a "Base64 Encoded Image" is provided, the action decodes the string and
    saves the image data to a temporary file.

    4. The action invokes the `pytesseract` library to perform OCR on the image file
    (either the temporary file or the provided file path).

    5. The extracted text is returned in the action's JSON results.


    ### Additional Notes

    This action requires the `tesseract-ocr` package to be installed on the Remote
    Agent container. If the package is missing, the action will raise an `OcrImageSetupError`.
  ai_short_description: >-
    Extracts text from an image file using OCR.
