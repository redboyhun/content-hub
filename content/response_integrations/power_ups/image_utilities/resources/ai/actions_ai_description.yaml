    | URLs or Body | string | Yes | The input content to be rasterized. For URL, provide
    a comma-separated list. For HTML/Email, provide the full content body. |

    | Output Type | ddl | No | The resulting output format (PNG, PDF, or Both). Default:
    PNG. |

    | Export Method | ddl | No | The method to output the generated content (Case
    Attachment, File Path, or Both). Default: Case Attachment. |

    | Width | string | Yes | The width (in pixels) for the generated content. Default:
