Ping:
  ai_description: >-
    ### General Description

    Validates the environment configuration for the Image Utilities integration by
    checking for the presence and functionality of Tesseract OCR and Playwright browser
    binaries on the Remote Agent. This action is intended for troubleshooting and
    environment setup verification.


    ### Flow Description

    1. The action verifies that it is running on a Remote Agent using the `ensure_remote_agent`
    utility.

    2. It attempts to retrieve the Tesseract OCR version using `pytesseract.get_tesseract_version()`.
    If Tesseract is not found, it raises an `ActionSetupError` with detailed installation
    instructions.

    3. It attempts to launch a headless Chromium browser using Playwright. If the
    browser binaries are missing or fail to launch, it raises an `ActionSetupError`
    with detailed installation instructions.


    ### Additional Notes

    This action is a diagnostic tool and does not perform any data processing, external
    API calls, or modifications to the system state.
