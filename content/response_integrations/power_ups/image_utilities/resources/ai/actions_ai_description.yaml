    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs file conversion on the local filesystem of the Remote Agent.
      It does not fetch data from external APIs, nor does it mutate external systems
      or internal SOAR data.
  categories:
    enrichment: false
    reasoning: >-
      The action is a utility for file format conversion. It does not fetch threat
      intelligence or contextual data (Enrichment), nor does it perform security remediation
      or infrastructure control (Remediation).
