Ping:
  ai_description: >-
    ### General Description

    Validates the connectivity and environment setup for the Image Utilities integration
    on a Remote Agent. This action ensures that the necessary dependencies, specifically
    the Tesseract OCR engine and the Playwright browser automation library, are correctly
    installed and functional within the Remote Agent container.


    ### Flow Description

    1. Validates that the action is running on a Remote Agent.

    2. Verifies that the Tesseract OCR engine is installed and accessible by attempting
    to retrieve its version.

    3. Verifies that the Playwright browser automation library is installed and functional
    by launching a headless Chromium browser.


    ### Additional Notes

    This action is used for troubleshooting and ensuring the environment is correctly
    configured for OCR and rasterization tasks. If any dependency is missing, the
    action will raise an error with instructions on how to install the required components.
