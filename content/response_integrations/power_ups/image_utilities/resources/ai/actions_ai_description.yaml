Convert File:
  ai_description: "### General Description\nConverts files between PNG and PDF formats\
    \ using a Remote Agent. This action facilitates file format transformation, allowing\
    \ analysts to convert documents or images into a desired format for further analysis\
    \ or reporting.\n\n### Flow Description\n1. **Validation**: The action verifies\
    \ that it is executing on a Remote Agent, as this is a mandatory requirement for\
    \ file processing.\n2. **Parameter Validation**: It validates the provided `Input\
    \ File Path` to ensure the file exists and checks that the `Input File Format`\
    \ and `Output File Format` are valid and distinct.\n3. **Conversion**: \n    -\
    \ If converting from PDF to PNG, the action utilizes the `pdf2image` library (which\
    \ requires `pdftoppm` to be installed on the Remote Agent).\n    - If converting\
    \ from PNG to PDF, the action utilizes the `PIL` (Pillow) library.\n4. **Output**:\
    \ The converted file is saved to the system's temporary directory, and the path\
    \ to the new file is returned in the action's JSON results.\n\n### Additional\
    \ Notes\nThis action requires a Remote Agent to function. Ensure that the necessary\
    \ dependencies (`poppler-utils` for PDF to PNG conversion) are installed on the\
    \ Remote Agent host."
  ai_short_description: >-
    Converts files between PNG and PDF formats using a Remote Agent.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
