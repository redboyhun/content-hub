Rasterize Content:
  ai_description: >-
    ### General Description

    Rasterizes web content (URLs, HTML, or Email bodies) into visual formats (PNG
    or PDF) using a headless browser (Playwright). This action is designed to capture
    visual evidence of web-based content for forensic analysis or documentation within
    a case.


    ### Flow Description

    1. Validates parameters and ensures execution on a Remote Agent.

    2. Prepares the input based on the selected `Input Type` (URL, HTML, or Email).

    3. Initializes a Playwright browser instance.

    4. Navigates to the URL or sets the HTML content in the browser.

    5. Waits for the specified state (`Wait For`) or CSS selector (`Wait for Selector`)
    to ensure content is loaded.

    6. Captures a screenshot (PNG) or generates a PDF based on the `Output Type`.

    7. Exports the resulting files as case attachments or returns file paths based
    on the `Export Method`.

    8. Closes the browser instance.


    ### Additional Notes

    This action requires a Remote Agent to function correctly. Playwright must be
    installed in the agent environment. If the browser binaries are missing, the action
    will raise an `ActionSetupError` with instructions on how to install them.
  ai_short_description: >-
    Rasterizes web content (URLs, HTML, or Email) into PNG or PDF formats using a
    headless browser.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Adds rasterized images (PNG/PDF) as attachments to the current case.
    reasoning: >-
      The action performs a utility task (rasterization) and modifies internal data
