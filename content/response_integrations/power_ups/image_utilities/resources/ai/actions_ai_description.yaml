    DOM_CONTENT_LOADED, NETWORK_IDLE, COMMIT). Default: NETWORK_IDLE. |

    | Wait for Selector | string | No | A CSS selector to wait for before capturing
    the screenshot. Highly recommended for dynamic content. |
