Convert File:
  ai_description: >-
    ### General Description

    Converts files between PNG and PDF formats using a Remote Agent. This action is
    designed to facilitate file format transformation for documents or images within
    the SOAR environment.


    ### Flow Description

    1. Extracts input parameters: `Input File Format`, `Input File Path`, and `Output
    File Format` from the action configuration.

    2. Validates that the action is running on a Remote Agent and that the source
    file exists at the specified path.

    3. Determines the conversion method based on the requested output format (PDF
    to PNG or PNG to PDF).

    4. Performs the conversion using `pdf2image` (for PDF to PNG) or `PIL` (for PNG
    to PDF).

    5. Saves the converted file to a temporary directory on the Remote Agent.

    6. Returns the path of the new file and the output format in the action results.


    ### Additional Notes

    This action requires a Remote Agent to execute, as it performs local file system
    operations.
  ai_short_description: >-
    Converts files between PNG and PDF formats using a Remote Agent.
