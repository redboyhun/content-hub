Rasterize Content:
  ai_description: >-
    ### General Description

    Use the Rasterize Content action to convert vector or complex content into a fixed,
    bitmap image format. This action leverages a headless browser (Playwright) to
    render the provided input (URL, HTML, or Email body) and capture it as a PNG image
    or PDF document. This is useful for preserving the visual state of web content
    for forensic analysis or documentation within a case.


    ### Flow Description

    1. **Validation**: The action validates all input parameters and ensures it is
    running on a Remote Agent, as it requires a browser environment.

    2. **Preparation**: It prepares the input content based on the selected `Input
    Type` (URL, HTML, or Email).

    3. **Initialization**: A Playwright browser instance is initialized.

    4. **Rendering**: The action navigates to the provided URL or sets the HTML/Email
    content in the browser.

    5. **Wait Logic**: It waits for the specified state (`Wait For`) or a CSS selector
    (`Wait for Selector`) to ensure the content is fully loaded before proceeding.

    6. **Rasterization**: The content is captured as a PNG screenshot and/or a PDF
    document based on the `Output Type`.

    7. **Export**: The generated files are exported as case attachments or returned
    as file paths based on the `Export Method`.


    ### Additional Notes

    This action requires a Remote Agent with Playwright and Chromium dependencies
    installed. If the browser binaries are missing, the action will fail with instructions
    on how to install them.
  ai_short_description: >-
    Rasterizes web content (URLs, HTML, or Email) into PNG images or PDF documents
    using a headless browser.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
