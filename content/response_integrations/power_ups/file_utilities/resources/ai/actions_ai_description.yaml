Extract Archive:
  ai_description: >-
    ### General Description

    Extracts archive files (such as zip, tar, gztar, bztar, and xtar) to a designated
    directory on the local server. This action is designed to facilitate the processing
    of compressed files within the SOAR environment, providing a structured JSON output
    of the extracted file hierarchy.


    ### Flow Description

    1. The action parses the `Archive` parameter, which accepts a comma-delimited
    list of file paths.

    2. For each archive path provided, the action creates a corresponding output directory
    within the predefined extraction path (`/opt/siemplify/siemplify_server/Scripting/FileUtilities/Extract`).

    3. The action utilizes the `shutil.unpack_archive` method to extract the contents
    of the archive into the created directory.

    4. It then recursively scans the extracted directory to build a dictionary representation
    of the file structure, including file names, types, extensions, and paths.

    5. The final result, containing the success status, folder path, and lists of
    extracted files, is returned via `siemplify.result.add_result_json`.


    ### Additional Notes

    This action performs local filesystem operations only. It does not interact with
    external APIs, modify SOAR case data, or update entities. It is strictly a utility
    action for file handling.
