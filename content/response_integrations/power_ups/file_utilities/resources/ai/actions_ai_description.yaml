    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds extracted files as attachments to the case wall and creates new FILENAME
      entities within the case.
    reasoning: >-
      The action fetches attachment data from the SOAR platform (fetches_data=true).
      It mutates internal data by adding attachments to the case wall and creating
      new entities (can_mutate_internal_data=true). It updates entities (can_update_entities=true).
      It does not mutate external systems.
