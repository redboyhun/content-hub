Save Base64 to File:
  ai_description: >-
    ### General Description

    Saves a base64-encoded string to a file on the local disk or agent. This utility
    action allows users to convert base64 data into files, supporting multiple files
    via comma-separated inputs. It is primarily used for file reconstruction or artifact
    handling within the SOAR environment.


    ### Flow Description

    1. The action parses the `Base64 Input`, `Filename`, and optional `File Extension`
    parameters.

    2. It determines the target directory path based on whether the action is running
    locally or on a remote agent.

    3. The action iterates through the provided inputs, decoding the base64 strings
    into binary data.

    4. It writes the decoded binary data to the specified file path on the disk.

    5. Finally, it generates a JSON result containing the details of the saved files
    (name, path, and extension) and returns this to the SOAR platform.


    ### Additional Notes

    This is a utility action that performs local file system operations. It does not
    interact with external APIs, nor does it modify SOAR case data, entities, or insights.
