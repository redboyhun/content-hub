  ai_description: >-
    General Description: Extracts archive files (zip, tar, gztar, bztar, xtar) from
    the provided file paths to a designated directory on the SOAR server. This utility
    action facilitates the processing of compressed files for further analysis.


    Flow Description:

    1. The action parses the input 'Archive' parameter, which accepts a comma-delimited
    list of file paths.

    2. It iterates through each specified archive file.

    3. For each archive, it creates a dedicated output directory within the local
    filesystem.

    4. It uses the 'shutil.unpack_archive' method to extract the contents of the archive
    into the created directory.

    5. It generates a JSON structure containing metadata about the extracted files,
    including names, paths, and types.

    6. The resulting JSON is added to the action results using 'siemplify.result.add_result_json'.


    Additional Notes: This action operates strictly on the local filesystem of the
    SOAR server. It does not interact with external APIs, modify SOAR case entities,
    or perform any network-based operations.
  ai_short_description: >-
    Extracts specified archive files to a local directory on the SOAR server and returns
    metadata about the extracted contents.
