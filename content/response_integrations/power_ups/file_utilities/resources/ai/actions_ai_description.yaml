Remove Entity from File:
  ai_description: >-
    ### General Description

    This action removes specific entity identifiers from a local file on the SOAR
    server. It is designed to manage custom allowlists or tracking files by ensuring
    that entities passed to the action are purged from the specified file.


    ### Flow Description

    1. The action extracts the `Filename` parameter to determine the target file path.

    2. It initializes an `EntityFileManager` instance, which acquires a file lock
    to ensure thread-safe access to the file.

    3. The action iterates through all `target_entities` provided by the SOAR platform.

    4. For each entity, it checks if the entity's identifier exists within the file's
    current content.

    5. If the entity is found, it is removed from the internal list.

    6. Upon completion of the iteration, the `EntityFileManager` writes the updated
    list of entities back to the file and releases the lock.


    ### Additional Notes

    This action performs local file system operations. It does not interact with external
    APIs, nor does it modify any internal SOAR case data (such as insights, comments,
    or entity attributes).
  ai_short_description: >-
    Removes entity identifiers from a specified local file on the SOAR server.
