  ai_description: >-
    ### General Description

    This action saves base64-encoded strings as files on the local filesystem of the
    SOAR engine or agent. It is a utility action designed to convert encoded data
    into physical files for further processing or analysis.


    ### Flow Description

    1. The action parses the `Base64 Input` and `Filename` parameters, supporting
    comma-separated lists for batch processing.

    2. It determines the target directory path based on whether the action is running
    locally or on a remote agent.

    3. It iterates through the provided inputs, decoding each base64 string.

    4. The decoded data is written to the specified file path on the filesystem.

    5. The action returns a JSON result containing the file name, path, and extension
    for each saved file.


    ### Additional Notes

    This action performs local file system operations and does not interact with external
    security systems, APIs, or modify SOAR case data (entities, insights, or comments).
  ai_short_description: >-
    Saves base64-encoded strings as files on the local filesystem of the SOAR engine
    or agent.
