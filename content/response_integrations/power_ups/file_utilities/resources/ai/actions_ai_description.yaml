Add Entity to File:
  ai_description: >-
    General Description

    This action adds the identifier of target entities to a specified local file on
    the SOAR server. It ensures that each entity is added only once, preventing duplicates.


    Flow Description

    1. The action extracts the `Filename` parameter provided by the user.

    2. It initializes an `EntityFileManager` instance, which manages file access using
    a lock to ensure thread safety.

    3. The action iterates through all `target_entities` associated with the current
    case or alert.

    4. For each entity, it checks if the identifier already exists in the target file.

    5. If the identifier is not present, it adds the entity identifier to the file.

    6. If the identifier is already present, it logs the event and skips the addition.

    7. Finally, the action completes and returns the status of the operation.


    Additional Notes

    The file is stored in the `/tmp/` directory on the SOAR server. This action is
    useful for maintaining lists of entities across different automation workflows.
