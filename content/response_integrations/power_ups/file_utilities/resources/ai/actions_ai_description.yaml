Add Attachment:
  ai_description: >-
    General Description

    This action adds a new file attachment to the case wall within the Google SecOps
    platform. It allows analysts to upload files (provided as Base64 encoded strings)
    directly to a case, facilitating evidence management and collaboration.


    Flow Description

    1. The action retrieves the required parameters: Name, Description, Type, Base64
    Blob, and the optional IsFavorite flag.

    2. It initializes a `CaseWallAttachment` object with the provided file details
    and the current case identifier.

    3. The action calls the `save_attachment_to_case_wall` function from the `TIPCommon`
    library to upload the attachment to the Google SecOps case wall.

    4. Upon successful upload, the action formats the response data and adds it to
    the action result.


    Additional Notes

    This action does not interact with specific entities; it operates at the case
    level. The Base64 Blob parameter must contain the valid encoded file content.
  ai_short_description: >-
    Adds a file attachment to the Google SecOps case wall.
  capabilities:
