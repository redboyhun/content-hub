Extract Zip Files:
  ai_description: >-
    Extracts files from a ZIP archive attached to a case. This action processes ZIP
    files associated with FILENAME entities, supporting password-protected archives
    via a provided password list or brute-force attempts. It retrieves the ZIP file
    content from the case wall, extracts the contents, and provides options to include
    the data in the result, add extracted files to the case wall, or create new FILENAME
    entities for the extracted files.


    ### Flow Description

    1. Extracts action parameters including password settings, brute-force configuration,
    and file handling preferences.

    2. Iterates through the provided FILENAME entities, identifying those with an
    `attachment_id` attribute.

    3. Retrieves the ZIP file content from the SOAR platform using the `attachment_id`.

    4. Validates if the content is a valid ZIP archive.

    5. Extracts the files from the ZIP archive, utilizing provided passwords or a
    brute-force mechanism if the archive is password-protected.

    6. Optionally adds the extracted files to the case wall as new attachments.

    7. Optionally creates new FILENAME entities for the extracted files and links
    them to the parent file.

    8. Returns the extracted file metadata and content (if requested) in the action
    result.


    ### Additional Notes

    This action requires the FILENAME entities to have an `attachment_id` attribute
    populated in their additional properties to successfully retrieve the file from
    the case wall.
