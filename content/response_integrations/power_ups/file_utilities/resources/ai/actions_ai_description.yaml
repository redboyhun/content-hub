Create Archive:
  ai_description: >-
    General Description

    Creates an archive file (e.g., zip, tar) from a list of files or a directory on
    the SOAR server.


    Flow Description

    1. Extracts parameters: `Archive Type`, `Archive Input`, and `Archive Base Name`.

    2. Validates/Prepares the destination directory (`/opt/siemplify/siemplify_server/Scripting/FileUtilities/Archives`).

    3. If the input is a directory, it archives the directory directly using `shutil.make_archive`.

    4. If the input is a file (or list of files), it copies them to a temporary directory
    and archives that directory.

    5. Returns the path of the created archive file in the result JSON and output
    message.


    Additional Notes

    The action operates on the local filesystem of the SOAR server.
