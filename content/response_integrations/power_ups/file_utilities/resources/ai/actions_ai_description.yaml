Create Hash From Base64:
  ai_description: >-
    ### General Description

    Calculates cryptographic hashes for provided base64-encoded strings. This utility
    action allows users to generate hashes (e.g., MD5, SHA256) from raw base64 data,
    optionally associating them with specific names (such as filenames) for better
    organization in the output.


    ### Flow Description

    1. The action receives base64-encoded strings and configuration parameters, including
    the desired hash algorithm, separators for input parsing, and optional identifiers.

    2. It splits the input base64 strings based on the provided `Base64 Separator`.

    3. If `Names` are provided, it pairs them with the corresponding base64 strings
    using the `Names Separator`.

    4. The action decodes each base64 string into binary data.

    5. It computes the requested cryptographic hash using the Python `hashlib` library.

    6. The results, including the hash, algorithm, and optional name/original base64
    string, are aggregated into a JSON list.

    7. The final JSON result is added to the action output using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action performs local computation and does not interact with external APIs
    or modify SOAR case data (entities, insights, or comments). It is strictly a data
    processing utility.
