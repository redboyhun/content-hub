Add Attachment:
  ai_description: >-
    ### General Description

    Adds a file attachment to the Google SecOps case wall. This action allows analysts
    to upload files directly to a case, providing necessary evidence or documentation
    for investigation.


    ### Flow Description

    1. Retrieves input parameters: `Name`, `Type`, `Base64 Blob`, `Description`, and
    `IsFavorite`.

    2. Constructs a `CaseWallAttachment` object using the provided parameters and
    the current case identifier.

    3. Executes `save_attachment_to_case_wall` to upload the file to the case wall.

    4. Processes the API response and adds the result to the action's output JSON.


    ### Additional Notes

    This action modifies the internal case state by adding an attachment to the case
    wall. It does not perform any external system mutations or data enrichment.
