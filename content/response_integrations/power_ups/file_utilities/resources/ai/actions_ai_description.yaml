Get Attachment:
  ai_description: >-
    General Description: Retrieves file attachments from the Google SecOps case or
    alert wall. This action allows users to fetch attachments associated with a specific
    alert or the entire case, returning the file content as a Base64-encoded string.


    Flow Description:

    1. Retrieves the `Attachment Scope` parameter to determine whether to fetch attachments
    from the current 'Case' or 'Alert'.

    2. Determines the execution scope (Alert or Case).

    3. Fetches attachment metadata from the case/alert wall using the `AttachmentsManager`.

    4. Filters the attachments based on the provided scope.

    5. Retrieves the binary content of each attachment using `siemplify.get_attachment`.

    6. Encodes the binary content into a Base64 string.

    7. Returns the list of attachments with their metadata and Base64-encoded content
    as a JSON result.


    Additional Notes: The action returns the file content as a Base64 string. This
    action is intended for retrieving files for further analysis or processing within
    the SOAR platform.
