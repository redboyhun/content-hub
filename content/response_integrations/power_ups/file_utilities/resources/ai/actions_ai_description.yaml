Create Hash From Base64:
  ai_description: >-
    ### General Description

    This action calculates cryptographic hashes for provided base64-encoded strings.
    It supports various hashing algorithms (e.g., SHA1, SHA256, MD5) and allows for
    optional naming of the inputs.


    ### Flow Description

    1. The action receives base64-encoded strings and a specified hashing algorithm
    as input parameters.

    2. It splits the input base64 strings and optional names using the provided separators.

    3. For each base64 string, it decodes the content and computes the hash using
    the selected algorithm via the `hashlib` library.

    4. The resulting hashes, along with the algorithm name and optional original base64
    string/name, are compiled into a list.

    5. The final result is added to the action's output using `siemplify.result.add_json`
    and `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is a utility tool and does not interact with external systems or modify
    case entities.
