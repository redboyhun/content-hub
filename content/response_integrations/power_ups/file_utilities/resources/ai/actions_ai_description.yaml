Count Files:
  ai_description: >-
    ### General Description

    Counts the number of files in a specified directory on the local file system of
    the SOAR worker, filtered by a specific file extension. This utility action is
    designed to assist in file system auditing or verification tasks within the SOAR
    environment.


    ### Flow Description

    1. The action extracts the `Folder` path, `Is Recursive` flag, and `File Extension`
    from the action parameters.

    2. It constructs the full search path by combining the folder path and the file
    extension.

    3. The action utilizes the `glob` library to perform a file system search based
    on the constructed path and the recursion setting.

    4. It calculates the total number of files found matching the criteria.

    5. The action concludes by returning the total count of files as the execution
    result.


    ### Additional Notes

    This action operates strictly on the local file system of the SOAR worker node.
    It does not interact with external APIs or modify any case data, entities, or
    alerts.
