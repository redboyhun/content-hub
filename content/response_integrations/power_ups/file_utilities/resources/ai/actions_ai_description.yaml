Count Files:
  ai_description: >-
    ### General Description

    Counts files in a specified directory based on an optional file extension. This
    action is useful for verifying the presence or quantity of files within a given
    path.


    ### Flow Description

    1. The action extracts the `Folder`, `Is Recursive`, and `File Extension` parameters
    provided by the user.

    2. It constructs the search path by combining the folder path and the file extension.

    3. The action utilizes the `glob` library to perform a file system search within
    the specified directory, respecting the recursive flag if enabled.

    4. The total number of files matching the criteria is calculated and returned
    as the action result.


    ### Additional Notes

    This action operates on the local file system of the integration environment.
    Ensure the provided folder path is accessible to the integration.
