Extract Zip Files:
  ai_description: >-
    ### General Description

    Extracts files from ZIP archives attached to the case. This action processes FILENAME
    entities that contain an 'attachment_id' attribute, retrieves the corresponding
    ZIP file from the case wall, and extracts its contents. It supports password-protected
    archives using either a provided password or a brute-force mechanism.


    ### Flow Description

    1. The action iterates through the provided FILENAME entities.

    2. For each entity, it checks for the presence of an 'attachment_id' in the entity's
    additional properties.

    3. It retrieves the ZIP file content from the SOAR platform using the `attachment_id`
    via the `siemplify.get_attachment` method.

    4. It attempts to extract the ZIP contents, utilizing provided passwords or a
    brute-force method if configured.

    5. If 'Add to Case Wall' is enabled, it uploads the extracted files back to the
    case wall using `add_attachment_to_case_wall`.

    6. If 'Create Entities' is enabled, it creates new FILENAME entities for the extracted
    files and links them to the parent file using `create_entity` and `siemplify.update_entities`.

    7. It returns the extracted file information in the action result.


    ### Additional Notes

    Requires FILENAME entities to have an 'attachment_id' attribute. The action interacts
    with the SOAR platform to retrieve and upload attachments.
  ai_short_description: >-
    Extracts files from ZIP archives attached to the case, supporting password-protected
    files and optional entity creation.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
