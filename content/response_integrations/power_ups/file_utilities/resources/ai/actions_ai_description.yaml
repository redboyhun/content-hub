Create Archive:
  ai_description: >-
    ### General Description

    Creates an archive file (e.g., zip, tar, gztar, bztar, xztar) from a specified
    list of files or a directory on the local server. This utility action is designed
    to bundle files for easier transport or storage.


    ### Flow Description

    1. The action extracts the `Archive Type`, `Archive Input` (comma-delimited list
    of files or directory path), and `Archive Base Name` from the provided parameters.

    2. It verifies the existence of the destination directory `/opt/siemplify/siemplify_server/Scripting/FileUtilities/Archives`
    and creates it if it does not exist.

    3. If the input is a directory, the action uses `shutil.make_archive` to create
    the archive directly.

    4. If the input is a file or a list of files, the action copies the files into
    a temporary directory, archives the temporary directory, and then removes the
    temporary directory.

    5. The path to the created archive is returned as the result value.


    ### Additional Notes

    This action performs local file system operations on the SOAR server. It does
    not interact with external APIs or modify SOAR case data.
