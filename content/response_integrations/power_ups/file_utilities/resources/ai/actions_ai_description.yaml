Add Entity to File:
  ai_description: >-
    ### General Description

    This action adds the identifier of a target entity to a local file on the SOAR
    server. It ensures that each entity is added only once, returning a failure status
    if the entity already exists in the file.


    ### Flow Description

    1. Extract the 'Filename' parameter from the action configuration.

    2. Initialize the `EntityFileManager` with the specified file path (located in
    `/tmp/`).

    3. Iterate through all `target_entities` provided to the action.

    4. For each entity, check if its identifier already exists in the file.

    5. If the identifier is not present, append it to the file.

    6. If the identifier is already present, log the event and set the result to False.

    7. Complete the action execution.


    ### Additional Notes

    This is a utility action for local file management and does not interact with
    external services or modify SOAR case data.
