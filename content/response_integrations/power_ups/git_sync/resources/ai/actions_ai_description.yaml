Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the GitSync repository and the Chronicle SOAR server. This
    action verifies that the configured credentials and connection settings are valid
    for both the Git server and the SOAR platform.


    ### Flow Description

    1. Extracts configuration parameters from the GitSync integration, including the
    Repo URL, branch, credentials, and SSL verification settings.

    2. Initializes the `GitSyncManager` with the provided credentials and settings.

    3. Executes `test_connectivity` to verify the connection to the Chronicle SOAR
    server via the `SiemplifyApiClient`.

    4. If a Git server fingerprint is provided, executes `connect_to_git_server_to_verify_fingerprint`
    to verify the Git server connection and fingerprint.

    5. Returns a success message if all connectivity tests pass.


    ### Additional Notes

    This action is a diagnostic tool and does not perform any data synchronization
    or modifications. It is intended to validate the integration configuration.
  ai_short_description: >-
    Tests connectivity to the GitSync repository and the Chronicle SOAR server.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs connectivity tests (API calls) to verify the connection
      to the Git server and the Chronicle SOAR server. It does not fetch contextual
      data, nor does it mutate any data.
