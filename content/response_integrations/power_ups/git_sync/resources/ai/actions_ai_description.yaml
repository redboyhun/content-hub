  parameters_description: >-
    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Repo URL | String | Yes | The URL of the Git repository. |

    | Branch | String | Yes | The target branch to connect to. |

    | Git Server Fingerprint | String | No | SSH fingerprint for Git server verification
    (SHA256 or MD5). |

    | Git Password/Token/SSH Key | String | Yes | The password, token, or base64-encoded
    SSH key for Git authentication. |

    | Git Username | String | No | The username for Git authentication. |

    | Commit Author | String | No | The author name and email for commits (Format:
    Name <email@example.com>). |

    | SOAR Username | String | No | The username for SOAR API authentication. |

    | SOAR Password | String | Yes | The password for SOAR API authentication. |

    | Siemplify Verify SSL | Boolean | No | Whether to verify SSL for the SOAR API
    connection. |

    | Git Verify SSL | Boolean | No | Whether to verify SSL for the Git server connection.
    |
