Create Entity Insight From JSON:
  ai_description: >-
    ### General Description

    The action creates entity insights in the SOAR platform based on a provided JSON
    input string. It parses the JSON to extract data associated with specific entities
    and formats this data into a message template.


    ### Flow Description

    1. The action receives a JSON string, an identifier key path, and a message template
    as parameters.

    2. It iterates through the target entities in the current case.

    3. For each entity, it searches the provided JSON for a matching identifier using
    the specified key path.

    4. If a match is found, it parses the message template, replacing placeholders
    with values from the JSON (supporting pipe functions like `str`, `join`, etc.).

    5. It creates an entity insight for the matched entity using the formatted message.


    ### Additional Notes

    This action does not perform external API calls. It relies entirely on the provided
    JSON input to generate insights.
