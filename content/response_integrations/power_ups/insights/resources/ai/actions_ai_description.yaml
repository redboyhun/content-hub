"Create Entity Insight From Multiple JSONs":
  ai_description: >-
    ### General Description

    The 'Create Entity Insight From Multiple JSONs' action is a utility tool designed
    to format and display structured data as insights within a Google SecOps case.
    It allows analysts to parse up to five distinct JSON strings, extract specific
    fields using dot-notation paths, and present the information in a clean, readable
    HTML table format directly on the target entities.


    ### Flow Description

    1. **Input Processing**: The action retrieves up to five sets of parameters, each
    containing a `Title`, `Fields` (a comma-separated list of display names and JSON
    paths), and a `JSON` string.

    2. **Data Parsing**: It iterates through the provided JSON strings, attempting
    to parse them. It uses a helper function to extract values based on the provided
    key paths.

    3. **Entity Matching**: The action iterates through all target entities in the
    current case. For each entity, it attempts to find a matching record within the
    parsed JSON data (matching based on an 'Entity' field).

    4. **Insight Generation**: If matching data is found, it constructs an HTML table
    containing the extracted fields and values. It then calls `siemplify.add_entity_insight`
    to attach this formatted table as an insight to the specific entity.

    5. **Output**: The action concludes by returning a summary message indicating
    which entities received the new insights.


    ### Additional Notes

    This action does not perform external API calls or fetch new data. It is strictly
    a formatting and presentation utility for data already available within the playbook
    context. If the provided JSON strings are malformed or if the specified key paths
    do not exist, the action will handle these gracefully, potentially resulting in
    missing data indicators within the insight.
  ai_short_description: >-
    Formats and adds structured data from multiple JSON inputs as HTML insights to
    target entities.
