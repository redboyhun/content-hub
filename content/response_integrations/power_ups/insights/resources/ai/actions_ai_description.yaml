Create Entity Insight From Enrichment:
  ai_description: >-
    General Description

    Creates an entity insight for target entities within the SOAR platform. This action
    allows analysts to generate custom insights by populating a message template with
    data extracted from the entity's `additional_properties`.


    Flow Description

    1. Retrieve the `Message` template and the `Triggered By` integration name from
    the action parameters.

    2. Iterate through all `target_entities` provided to the action.

    3. For each entity, parse the `Message` template by replacing placeholders (e.g.,
    `{key.path}`) with corresponding values found in the entity's `additional_properties`
    using the internal `ToolsCommon` parsing logic.

    4. If a message is successfully generated, call `siemplify.add_entity_insight`
    to attach the insight to the entity, associating it with the specified `Triggered
    By` source.

    5. Return a summary of the entities for which insights were successfully added.


    Additional Notes

    This action does not perform external API calls or interact with external systems.
    It relies entirely on existing entity data within the SOAR platform to generate
    insights.
  ai_short_description: >-
    Creates entity insights by populating a message template with data from the entity's
    additional properties.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Adds entity insights to the SOAR platform.
    reasoning: >-
      The action does not fetch data from external sources. It mutates internal SOAR
      data by adding insights to entities. It does not update entity fields directly,
      modify alert data, or create case comments.
