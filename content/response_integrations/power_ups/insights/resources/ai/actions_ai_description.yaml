Create Entity Insight From Enrichment:
  ai_description: >-
    ### General Description

    Creates an entity insight based on existing enrichment data stored within an entity's
    `additional_properties`. This action allows analysts to format and display specific
    data points from previous enrichment steps as a readable insight on the entity's
    profile within the SOAR platform.


    ### Flow Description

    1. The action retrieves the `Message` template and the `Triggered By` source parameter.

    2. It iterates through all target entities provided in the action context.

    3. For each entity, it parses the `Message` template using the entity's `additional_properties`
    (via the `ToolsCommon` utility).

    4. If the message is successfully parsed, the action calls `siemplify.add_entity_insight`
    to attach the formatted message as an insight to the entity.

    5. The action concludes by returning a list of entities for which insights were
    successfully created.


    ### Additional Notes

    This action does not perform any external API calls or data fetching. It relies
    entirely on data already present in the entity's `additional_properties` attribute.
    It is a utility action designed to improve the visibility of existing enrichment
    data.
  ai_short_description: >-
    Creates entity insights by formatting existing entity enrichment data into a readable
    message.
