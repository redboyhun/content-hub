"Create Entity Insight From Multiple JSONs":
  ai_description: >-
    ### General Description

    This action creates an entity insight by parsing multiple JSON strings provided
    as input parameters. It extracts specific fields from these JSONs based on defined
    paths and formats them into an HTML table, which is then attached to the target
    entities. This allows analysts to visualize complex data structures directly within
    the entity's insight section.


    ### Flow Description

    1. The action retrieves the input parameters (Titles, Fields, and JSON strings)
    for up to five data sets.

    2. It iterates through all target entities provided in the case.

    3. For each entity, it attempts to find matching data within the provided JSON
    strings using the entity identifier.

    4. It parses the JSON data using the provided field paths and separators.

    5. It formats the extracted data into an HTML table.

    6. It calls `siemplify.add_entity_insight` to attach the formatted information
    to the entity.


    ### Additional Notes

    The action does not perform external API calls. It relies entirely on the JSON
    data provided in the action parameters. If no matching data is found for an entity
    in the provided JSONs, the action will indicate that data is missing for that
    specific title.
