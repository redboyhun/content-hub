Create Entity Insight From JSON:
  ai_description: >-
    ### General Description

    This action creates entity insights by parsing a provided JSON string and mapping
    it to target entities. It uses a specified key path to identify the entity within
    the JSON and a message template to format the insight content.


    ### Flow Description

    1. Load the provided JSON string.

    2. Parse the `Identifier KeyPath` to determine how to match entities.

    3. Iterate through the `target_entities` in the current case.

    4. For each entity, search the JSON data for a matching identifier using the provided
    key path.

    5. If a match is found, parse the `Message` template, replacing placeholders with
    values from the JSON.

    6. Call `siemplify.add_entity_insight` to attach the formatted message as an insight
    to the entity.


    ### Additional Notes

    The action supports pipe functions (e.g., `default`, `str`, `join`) within the
    message template placeholders to manipulate the data before insertion.
