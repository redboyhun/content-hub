Is String In Custom List:
  ai_description: >-
    ### General Description

    Checks if a provided list of strings exists within a specified custom list category
    in the current environment. This action is useful for validating indicators against
    internal watchlists or allowlists.


    ### Flow Description

    1. The action parses the `IdentifierList` parameter, accepting either a JSON-formatted
    string or a comma-separated list of strings.

    2. It iterates through each identifier provided in the list.

    3. For each identifier, it constructs a `CustomList` object using the specified
    `Category` and the current environment context.

    4. It calls the `siemplify.any_entity_in_custom_list` method to verify if the
    identifier exists within the specified custom list.

    5. It compiles the results into a dictionary mapping each identifier to a boolean
    value (True if found, False otherwise).

    6. The action adds the resulting JSON to the execution output and returns the
    total count of found items as the result value.


    ### Additional Notes

    This action is a read-only operation and does not modify any data within the system
    or external platforms. It is primarily used for decision-making logic within playbooks.
