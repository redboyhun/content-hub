Add String to Custom List:
  ai_description: >-
    ### General Description

    Adds a specified string item to a designated custom list category within the Google
    SecOps SOAR platform.


    ### Flow Description

    1. Retrieve the `Category` and `ListItem` parameters from the action configuration.

    2. Create a `CustomList` object using the provided string and category name, associated
    with the current environment.

    3. Call `siemplify.add_entities_to_custom_list` to persist the new item into the
    specified custom list.

    4. Finalize the action execution with a success or failure status and an appropriate
    output message.


    ### Additional Notes

    This action modifies internal SOAR data by updating custom lists. It does not
    interact with external systems.
