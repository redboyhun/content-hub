Add String to Custom List:
  ai_description: >-
    ### General Description

    Adds a specified string item to a designated custom list category within the Google
    SecOps SOAR platform. This action allows for the dynamic management of custom
    lists by appending new entries to existing categories.


    ### Flow Description

    1. The action retrieves the `ListItem` (the string to add) and `Category` (the
    target custom list) from the action parameters.

    2. It constructs a `CustomList` object using the provided string, category, and
    the current environment.

    3. It calls `siemplify.add_entities_to_custom_list` to persist the item into the
    specified custom list.

    4. The action concludes by returning a success or failure status and an output
    message.


    ### Additional Notes

    This action modifies internal SOAR data (custom lists). It does not interact with
    external systems.
