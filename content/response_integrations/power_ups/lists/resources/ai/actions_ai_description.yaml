Search Custom Lists:
  ai_description: >-
    ### General Description

    Searches for specific records within Google SecOps custom lists. This action allows
    users to query custom lists by providing a search string and optional category
    filters to identify matching records.


    ### Flow Description

    1. Extract the `Categories` and `String to Search` parameters from the action
    configuration.

    2. Retrieve all custom list records using the `get_traking_list_record` utility.

    3. If `Categories` are provided, filter the retrieved records to include only
    those matching the specified categories.

    4. If a `String to Search` is provided, filter the records to find those where
    the `entityIdentifier` contains the search string.

    5. If matching records are found, return the results as a JSON object using `add_result_json`.


    ### Additional Notes

    This action is a read-only operation and does not modify any external systems
    or internal case data.
