Is String In Custom List:
  ai_description: >-
    ### General Description

    Checks if a provided list of strings exists within a specified custom list category
    in the Google SecOps environment. This action is a utility tool used to validate
    the presence of identifiers against pre-configured custom lists.


    ### Flow Description

    1. Parses the `IdentifierList` parameter, which can be provided as a JSON-formatted
    list or a comma-separated string.

    2. Iterates through each identifier in the list.

    3. For each identifier, calls `siemplify.any_entity_in_custom_list` to check if
    the identifier exists within the specified `Category` for the current environment.

    4. Constructs a dictionary mapping each identifier to a boolean value indicating
    its presence in the custom list.

    5. Adds the resulting dictionary as a JSON result to the action output.

    6. Returns the total count of found items as the action result value.


    ### Additional Notes

    This action is read-only and does not modify any external or internal data. It
    is used for validation and lookup purposes.
