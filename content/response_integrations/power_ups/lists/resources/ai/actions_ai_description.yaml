Search Custom Lists:
  ai_description: >-
    ### General Description

    Searches for specific records within Google SecOps custom lists. This action allows
    users to filter records by category and perform a string-based search within the
    entity identifier field of the list records. It is a read-only operation designed
    to retrieve and display relevant list data.


    ### Flow Description

    1. The action extracts the `Categories` and `String to Search` parameters provided
    by the user.

    2. It calls the `get_traking_list_record` function to retrieve the available records
    from the custom lists.

    3. If `Categories` are provided, the action filters the retrieved records to include
    only those matching the specified categories.

    4. If a `String to Search` is provided, the action further filters the records
    to include only those where the `entityIdentifier` contains the search string.

    5. The final list of matching records is returned as a JSON result using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action does not modify any data in external systems or within the SOAR platform.
    It is strictly a retrieval and filtering utility.
