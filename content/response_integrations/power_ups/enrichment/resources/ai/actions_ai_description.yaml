Whois:
  ai_description: >-
    ### General Description

    Queries WHOIS servers and GeoIP services to retrieve registration and location
    information for domains, URLs, email addresses, and IP addresses. This action
    enriches entities with contextual metadata, such as domain age and geolocation,
    and supports the creation of linked domain entities.


    ### Flow Description

    1. The action iterates through the provided target entities.

    2. For IP address entities, it queries `IPWhois` and the `DbIpCity` service (via
    `api.db-ip.com`) to retrieve geolocation and registration data.

    3. For other entity types (e.g., domains, URLs, emails), it queries `whois_alt`
    to retrieve WHOIS registration details.

    4. It calculates the domain age in days and compares it against the `Domain Age
    Threshold` parameter.

    5. Retrieved data is added to the entity's `additional_properties` (prefixed with
    'WHOIS').

    6. If `Create Entities` is enabled, the action creates and links new domain entities
    where applicable.

    7. Entities are marked as suspicious if their age is below the configured threshold.

    8. Finally, the action updates the entities in the SecOps platform and adds the
    full result JSON to the action output.


    ### Additional Notes

    This action requires network connectivity to external WHOIS and GeoIP services.
    It performs read-only operations on external systems and modifies internal entity
    data within the SecOps platform.
