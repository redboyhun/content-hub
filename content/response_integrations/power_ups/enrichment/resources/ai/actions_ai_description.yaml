Whois:
  ai_description: >-
    ### General Description

    This action queries WHOIS servers to retrieve registration information for various
    entity types, including IP addresses, URLs, email addresses, and domains. It provides
    contextual enrichment by adding WHOIS data to the entity's additional properties
    and can optionally create new domain entities linked to the original target. It
    also supports identifying potentially suspicious domains based on a configurable
    age threshold.


    ### Flow Description

    1. The action iterates through the provided `target_entities`.

    2. For `ADDRESS` entities, it performs an IP WHOIS lookup using `IPWhois` and
    retrieves geolocation data via the `DbIpCity` utility.

    3. For other entity types (e.g., domains, URLs, emails), it extracts the registered
    domain using `tldextract` and queries WHOIS data using `whois_alt`.

    4. If the `Create Entities` parameter is enabled, the action creates new `DOMAIN`
    entities linked to the original entity if the extracted domain differs from the
    original identifier.

    5. It calculates the domain age in days and compares it against the `Domain Age
    Threshold` parameter.

    6. If the domain age is below the threshold, the entity is marked as suspicious.

    7. The action updates the entities with the retrieved WHOIS data in their `additional_properties`
    and marks them as enriched.

    8. Finally, it saves the updated entities and adds the JSON result to the action
    output.


    ### Additional Notes

    The action relies on external libraries (`whois_alt`, `ipwhois`, `tldextract`)
    and the `DbIpCity` utility for geolocation. It performs internal updates to the
    case data by modifying entity properties and creating new entities.
  ai_short_description: >-
    Enriches IP addresses, domains, URLs, and email entities with WHOIS registration
    data, geolocation, and domain age analysis, with options to create linked domain
    entities and flag suspicious domains.
