Enrich FileName Entity with Path:
  ai_description: >-
    ### General Description

    Parses file path strings from entities to extract the file name, directory path,
    and file extension. This action enhances entity metadata by populating additional
    properties with structured file details, facilitating better context for investigation.


    ### Flow Description

    1. The action iterates through all provided target entities.

    2. For each entity, it determines if the path format is Windows-based (using `ntpath`)
    or standard (using `os.path`).

    3. It splits the entity identifier into `file_name`, `file_path`, and `file_extension`.

    4. The extracted details are added to the entity's `additional_properties`.

    5. The action updates the entities in the SOAR platform with the new metadata.

    6. Finally, it adds the parsed details to the action result JSON.


    ### Additional Notes

    This action performs local string manipulation and does not interact with external
    services. It is intended to be used on entities representing file paths or file
    names.
