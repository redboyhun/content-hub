Enrich Entities from List with Field:
  ai_description: >-
    ### General Description

    This action enriches entities within a case by adding a custom field and value
    to their additional properties. It allows users to manually inject context into
    specific entities identified by a provided list, facilitating manual enrichment
    workflows within the SOAR platform.


    ### Flow Description

    1. Retrieve all entities from the current case alerts.

    2. Parse the provided 'List of Entities' string using the specified 'Entity Delimiter'.

    3. Iterate through the parsed list and match each entity against the case entities
    based on the provided 'Entity Type' and identifier.

    4. For each matched entity, update its 'additional_properties' dictionary with
    the specified 'Enrichment Field' and 'Enrichment Value'.

    5. Update the entities in the SOAR platform using `siemplify.update_entities`.


    ### Additional Notes

    This is a utility action for manual enrichment and does not interact with external
    services. It is designed to allow analysts to bulk-update entity metadata based
    on a provided list.
  ai_short_description: >-
    Enriches entities within a case by adding a custom field and value to their additional
    properties based on a provided list.
