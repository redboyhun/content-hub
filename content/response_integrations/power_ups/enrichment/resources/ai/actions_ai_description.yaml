Enrich Source and Destinations:
  ai_description: >-
    ### General Description

    Enriches IP Address and Hostname entities by identifying their roles as sources
    or destinations within an alert. This action parses alert data to determine which
    entities participated in the event as a source or destination and updates their
    entity profiles accordingly.


    ### Flow Description

    1. The action retrieves the current alert or all open alerts within the case.

    2. It calls the internal `get_investigator_data` API to fetch detailed alert information.

    3. It parses the alert data to extract lists of source and destination identifiers.

    4. It iterates through the entities associated with the alert, filtering for `ADDRESS`
    and `HOSTNAME` types.

    5. For each matching entity, it checks if the identifier exists in the extracted
    source or destination lists.

    6. If a match is found, it updates the entity's `additional_properties` with `isSource:
    "true"` or `isDest: "true"`.

    7. Finally, it calls `siemplify.update_entities` to persist these changes in the
    SOAR platform.


    ### Additional Notes

    This action relies exclusively on internal SOAR data and does not interact with
    external third-party services. It is designed to provide context to analysts by
    highlighting the role of specific assets within an alert.
