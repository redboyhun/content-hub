Enrich Entity from Explorer Attributes:
  ai_description: >-
    ### General Description

    Enriches entities by retrieving historical attributes from the Entity Explorer.
    This action allows users to customize the enrichment process by specifying which
    fields to include or exclude using a whitelist or denylist approach, ensuring
    that only relevant historical data is applied to the entities.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Field Name` (a comma-delimited
    string of fields) and `Use Field Name as Whitelist` (a boolean flag) parameters.

    2. **Entity Iteration**: The action iterates through all `target_entities` provided
    in the current case.

    3. **Data Retrieval**: For each entity, it calls the `get_entity_data` function
    (from `TIPCommon`) to fetch historical attributes from the Entity Explorer.

    4. **Filtering**: It filters the retrieved fields based on the `Field Name` parameter.
    If `Use Field Name as Whitelist` is true, it treats the fields as a whitelist;
    otherwise, it treats them as a denylist.

    5. **Entity Update**: It updates the entity's properties (either standard attributes
    or `additional_properties`) with the retrieved values, explicitly skipping system-reserved
    fields.

    6. **Commit Changes**: The action calls `siemplify.update_entities` to save the
    updated properties back to the SOAR platform.

    7. **Result Reporting**: The action adds the enrichment results to the action
    output in JSON format.


    ### Additional Notes

    This action performs internal enrichment by updating entity properties within
    the SOAR platform. It does not interact with external third-party threat intelligence
    services directly, but rather leverages internal historical data stored within
    the Entity Explorer.
  ai_short_description: >-
    Enriches entities by retrieving and applying historical attributes from the Entity
