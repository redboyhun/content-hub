Enrich Entity From JSON:
  ai_description: >-
    ### General Description

    Enriches entities by extracting data from a provided JSON structure and mapping
    it to the entity's `additional_properties`. This action allows for flexible enrichment
    by parsing JSON data based on a specified key path and separator, enabling the
    integration of custom data sources into the entity profile.


    ### Flow Description

    1. **Input Parsing**: The action retrieves the `Enrichment JSON` (a stringified
    JSON list), `Identifier KeyPath`, `Separator`, and optional `PrefixForEnrichment`
    and `Enrichment JSONPath` parameters.

    2. **Entity Iteration**: The action iterates through all `target_entities` present
    in the case.

    3. **Data Matching**: For each entity, the action searches the provided JSON data
    to find a match for the entity's identifier using the specified `Identifier KeyPath`
    and `Separator`.

    4. **Data Extraction & Flattening**: If a match is found:
        - If `Enrichment JSONPath` is provided, it extracts the specific subset of
    the JSON.
        - The extracted JSON is flattened into a dictionary.
        - If a `PrefixForEnrichment` is provided, it is prepended to the keys of the
    flattened dictionary.
    5. **Entity Update**: The entity's `additional_properties` are updated with the
    flattened data.

    6. **Finalization**: The action updates the entities in the SOAR platform and
    returns the count of successfully enriched entities.


    ### Additional Notes

    This is a generic enrichment action. It does not perform external API calls; instead,
    it relies on the JSON data provided via the `Enrichment JSON` parameter. It supports
    all entity types as it does not filter by entity type during execution.
