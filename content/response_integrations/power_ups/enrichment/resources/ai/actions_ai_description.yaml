Enrich Entity From Event Field:
  ai_description: >-
    General Description

    This action enriches entities by extracting specific fields from an alert's event
    data and adding them to the entity's `additional_properties`. This allows analysts
    to populate entity profiles with relevant contextual information directly from
    the event logs.


    Flow Description

    1. The action determines the execution scope (Alert or Case).

    2. It retrieves the target alerts based on the scope.

    3. For each alert, it accesses the first security event's `additional_properties`.

    4. It extracts the user-specified fields from these properties.

    5. It identifies the entities associated with the alert.

    6. It updates each entity's `additional_properties` with the extracted fields.

    7. It calls `siemplify.update_entities` to persist these changes.

    8. It adds the enriched data to the action result.


    Additional Notes

