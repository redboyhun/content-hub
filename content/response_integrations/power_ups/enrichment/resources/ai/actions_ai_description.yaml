Enrich Entity From Event Field:
  ai_description: >-
    ### General Description

    This action enriches entities by extracting specific fields from the associated
    security event's additional properties and appending them to the entity's metadata.
    This allows analysts to propagate relevant event context directly onto the entities
    involved in an alert or case.


    ### Flow Description

    1. The action determines the execution scope (Alert or Case) to identify the target
    alerts.

    2. For each target alert, it retrieves the first available security event.

    3. It extracts the requested fields (provided via the 'Fields to enrich' parameter)
    from the event's `additional_properties` dictionary.

    4. It identifies all entities associated with the alert.

    5. It updates the `additional_properties` of each identified entity with the extracted
    field values.

    6. It updates the entities within the SOAR platform using `siemplify.update_entities`.

    7. It adds the enriched data to the action's result JSON for reporting.


    ### Additional Notes

    This action performs internal enrichment only. It does not interact with external
    services or APIs. It is designed to map existing event data to entities to improve
    visibility and context.
