    be a JSON-formatted string containing a list of key/value pairs.

    2. The action iterates through all entities currently targeted in the case (`siemplify.target_entities`).

    3. For each entity, it iterates through the provided list of fields and updates
    the entity's `additional_properties` dictionary with the specified key/value pairs.

    4. The action calls `siemplify.update_entities` to persist these changes to the
    Google SecOps platform.

