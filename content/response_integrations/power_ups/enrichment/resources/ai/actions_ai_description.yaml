Enrich Entity from Explorer Attributes:
  ai_description: >-
    ### General Description

    Enriches entities within the Google SecOps SOAR platform by retrieving historic
    enrichment data from the Entity Explorer. This action allows analysts to pull
    specific attributes associated with an entity and apply them to the current entity
    profile, ensuring that historical context is readily available for investigation.


    ### Flow Description

    1. The action retrieves the target entities from the current case.

    2. For each entity, it calls the internal `get_entity_data` API to fetch historical
    attributes stored in the Entity Explorer.

    3. It processes the retrieved fields based on the provided `Field Name` parameter
    and the `Use Field Name as Whitelist` configuration:
       - If `Use Field Name as Whitelist` is true, it only includes fields specified
    in `Field Name` (or all fields if `Field Name` is empty).
       - If `Use Field Name as Whitelist` is false, it excludes fields specified in
    `Field Name`.
    4. It filters out system-reserved fields (e.g., Type, Environment, IsInternalAsset)
    to prevent overwriting core entity metadata.

    5. It updates the entity's attributes or `additional_properties` with the retrieved
    data.

    6. Finally, it updates the entities in the SOAR platform and adds the enrichment
    results to the action output.


    ### Additional Notes

    This action performs internal data enrichment by updating entity attributes. It
    does not interact with external third-party services, relying solely on the internal
    Entity Explorer data store.
