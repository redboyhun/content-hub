Enrich FileName Entity with Path:
  ai_description: >-
    ### General Description

    Parses file path strings to extract the file name, directory path, and file extension.
    This action processes entity identifiers to break down complex file paths into
    structured components, which are then added to the entity's additional properties
    for better visibility and analysis.


    ### Flow Description

    1. The action iterates through all provided target entities.

    2. For each entity, it determines if the path format is Windows-based (using `ntpath`)
    or standard (using `os.path`).

    3. It splits the identifier into `file_path`, `file_name`, and `file_extension`
    components.

    4. The extracted details are added to the entity's `additional_properties` attribute.

