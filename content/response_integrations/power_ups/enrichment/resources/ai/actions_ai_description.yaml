Enrich Source and Destinations:
  ai_description: >-
    ### General Description

    This action enriches `ADDRESS` and `HOSTNAME` entities by identifying whether
    they act as sources or destinations within an alert. It retrieves alert data from
    the investigator, parses the security event cards or fields to extract source
    and destination identifiers, and updates the corresponding entities with `isSource`
    or `isDest` properties.


    ### Flow Description

    1. Determine the execution scope (Alert or Case) to identify the target alerts.

    2. For each target alert, retrieve the full alert data from the investigator using
    the `get_investigator_data` API call.

    3. Parse the retrieved alert data to extract lists of source and destination identifiers.

    4. Retrieve the entities associated with the alert.

    5. Filter the entities to include only `ADDRESS` and `HOSTNAME` types.

    6. Compare entity identifiers against the extracted source and destination lists.

    7. Update the `additional_properties` of matching entities with `isSource: "true"`
    or `isDest: "true"`.

    8. Save the updated entities back to the platform using the `siemplify.update_entities`
    API call.


    ### Additional Notes

    This action does not require external API keys as it relies on internal investigator
    data. It specifically targets `ADDRESS` and `HOSTNAME` entity types and modifies
    their internal properties to provide context for analysts.
