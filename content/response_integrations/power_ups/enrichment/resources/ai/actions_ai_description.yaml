Enrich Entity From JSON:
  ai_description: >-
    ### General Description

    This action enriches entities by extracting data from a provided JSON structure
    and appending it to the entity's `additional_properties`. It allows users to map
    specific JSON fields to entity identifiers and optionally apply a prefix or use
    JSONPath for targeted extraction. This is a utility action designed to ingest
    external data (provided as a parameter) into the SOAR platform's entity model.


    ### Flow Description

    1. Retrieve the `Enrichment JSON`, `Identifier KeyPath`, `Separator`, `PrefixForEnrichment`,
    and `Enrichment JSONPath` parameters.

    2. Parse the `Enrichment JSON` string into a list of objects.

    3. Iterate through all `target_entities` in the current case.

    4. For each entity, search the provided JSON data to find a match based on the
    `Identifier KeyPath`.

    5. If a match is found, optionally apply a `JSONPath` filter to extract specific
    data.

    6. Flatten the resulting JSON object into a dictionary.

    7. If a `PrefixForEnrichment` is provided, prepend it to the keys of the flattened
    dictionary.

    8. Update the entity's `additional_properties` with the new data.

    9. Call `siemplify.update_entities` to save the changes to the platform.


    ### Additional Notes

    This action does not perform external API calls; it relies entirely on the data
    provided in the `Enrichment JSON` parameter. It supports nested JSON structures
    and automatically flattens them for storage in entity properties.
