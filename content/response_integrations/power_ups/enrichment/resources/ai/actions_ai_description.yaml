Enrich Entities from List with Field:
  ai_description: >-
    ### General Description

    Enriches entities within a case by adding custom fields and values based on a
    provided list. This action allows analysts to bulk-update entity metadata by matching
    a list of identifiers against the entities currently present in the alert.


    ### Flow Description

    1. The action parses the input `List of Entities` string using the specified `Entity
    Delimiter`.

    2. It retrieves all entities associated with the current case alerts.

    3. It iterates through the provided list and matches them against the alert entities
    based on a case-insensitive identifier match and the specified `Entity Type`.

    4. For each matched entity, it updates the `additional_properties` dictionary
    with the provided `Enrichment Field` and `Enrichment Value`.

    5. Finally, it calls `siemplify.update_entities` to persist the changes to the
    SOAR platform.


    ### Additional Notes

    This action does not interact with any external systems. It is strictly a utility
    for internal SOAR data enrichment and entity management.
