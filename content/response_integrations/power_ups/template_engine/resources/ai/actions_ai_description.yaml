Entity Insight:
  ai_description: >-
    General Description

    This action renders a Jinja2 template using a provided JSON object and attaches
    the result as an Entity Insight to the target entities within the SOAR platform.
    It serves as a flexible utility for formatting and displaying complex data structures
    directly on entities.


    Flow Description

    1. Extracts action parameters: 'JSON Object', 'Template', 'Triggered By', 'Remove
    BRs', and 'Create Insight'.

    2. Iterates through all target entities, excluding those with an additional property
    type of 'ALERT'.

    3. Initializes a Jinja2 environment, loading standard and custom filters.

    4. Renders the template for each entity using the provided JSON data, which includes
    the entity's own additional properties.

    5. Stores the rendered result in the entity's JSON results using `siemplify.result.add_entity_json`.

    6. If 'Create Insight' is enabled, calls `siemplify.add_entity_insight` to attach
    the rendered content to the entity.


    Additional Notes

    This action does not perform external API calls or data enrichment. It is strictly
    a template rendering engine used to visualize data within the SOAR interface.
  ai_short_description: >-
    Renders a Jinja2 template using provided JSON data and attaches the result as
    an Entity Insight to target entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Creates entity insights within the SOAR platform.
    reasoning: >-
      The action does not fetch external data or mutate external systems. It mutates
      internal data by creating entity insights within the SOAR platform.
  entity_usage:
    entity_types:
      address: true
      alert: false
      application: true
      child_hash: true
      child_process: true
      cluster: true
      container: true
      credit_card: true
      cve: true
      cve_id: true
      database: true
      deployment: true
      destination_domain: true
      domain: true
      email_message: true
      event: true
      file_hash: true
      file_name: true
      generic: true
      host_name: true
      ip_set: true
      mac_address: true
      parent_hash: true
      parent_process: true
      phone_number: true
      pod: true
      process: true
      service: true
      source_domain: true
      threat_actor: true
      threat_campaign: true
      threat_signature: true
      url: true
      usb: true
      user: true
    filters_by_additional_properties: true
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
    reasoning: >-
      The action iterates over all `target_entities` provided to the script. It explicitly
      filters out entities where `additional_properties['Type']` is 'ALERT'. Therefore,
      it supports all entity types except 'alert', and it filters based on the 'additional_properties'
      attribute.
  outcome_categories:
    add_alert_comment: false
    add_ioc_to_allowlist: false
    add_ioc_to_blocklist: false
    contain_host: false
    create_ticket: false
    delete_email: false
