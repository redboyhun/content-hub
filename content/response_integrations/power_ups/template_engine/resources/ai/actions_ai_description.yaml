Entity Insight:
  ai_description: >-
    ### General Description

    This action generates and displays custom entity insights within Google SecOps
    by rendering a provided JSON object through a Jinja2 template. It allows users
    to format complex data into human-readable insights for specific entities, enhancing
    the visibility of contextual information within the SOAR platform.


    ### Flow Description

    1. Extracts action parameters: `JSON Object` (data), `Template` (Jinja2 string),
    `Triggered By` (source identifier), `Remove BRs` (boolean), and `Create Insight`
    (boolean).

    2. Parses the `JSON Object` string into a dictionary.

    3. Initializes a Jinja2 environment and loads standard and custom filters.

    4. Iterates through the `target_entities` provided in the playbook.

    5. Filters out entities where `additional_properties['Type']` is 'ALERT'.

    6. For each remaining entity, matches the entity identifier against the input
    JSON data.

    7. Renders the Jinja2 template using the matched entity data.

    8. Stores the rendered result in the action's JSON result output.

    9. If `Create Insight` is enabled, it calls `siemplify.add_entity_insight` to
    post the rendered content to the entity's profile in the SOAR platform.


    ### Additional Notes

    The action supports custom Jinja2 filters and provides flexibility in how entity
    data is presented. It does not interact with external APIs; it purely processes
    internal data and modifies the SOAR case by adding insights.
  ai_short_description: >-
    Generates and displays custom entity insights in Google SecOps by rendering JSON
    data through a Jinja2 template.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Creates entity insights within the SOAR platform.
    reasoning: >-
      The action does not fetch data from external systems (fetches_data=false). It
      does not mutate external data. It mutates internal data by creating entity insights
      (can_mutate_internal_data=true, can_create_insight=true).
  categories:
    enrichment: false
    reasoning: >-
      The action is a utility for formatting and displaying data as entity insights.
      It does not fetch data from external systems (enrichment) or perform remediation
      actions (remediation).
    remediation: false
  entity_usage:
