    download_file: false
    enable_identity: false
    enrich_asset: false
    enrich_ioc: false
    execute_command_on_the_host: false
    get_alert_information: false
    reasoning: >-
      The action is a generic template rendering utility. It does not perform enrichment,
      containment, ticketing, or alert management. It creates internal insights, but
      there is no specific category for 'Create Insight' in the provided list.
    remove_ioc_from_allowlist: false
    remove_ioc_from_blocklist: false
    reset_identity_password: false
    search_asset: false
