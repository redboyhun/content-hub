Render Template:
  ai_description: >-
    ### General Description

    Renders a Jinja2 template using a provided JSON object as input. This utility
    action allows users to format data into HTML or other text formats, optionally
    incorporating case and alert context data. It is primarily used for generating
    reports, notifications, or formatted summaries based on available case information.


    ### Flow Description

    1. Extracts action parameters: `JSON Object`, `Template` (or `Jinja`), and `Include
    Case Data`.

    2. If `Include Case Data` is enabled, the action extracts security events and
    entity data from the current alert or case context.

    3. Parses the provided `JSON Object` string into a dictionary or list.

    4. Initializes a Jinja2 environment and registers custom filters (e.g., `json2tbl`,
    `epochTimeToHuman`).

    5. Renders the template using the input JSON data (and case data if applicable).

    6. Returns the final rendered output as a JSON result containing the `html_output`
    key.


    ### Additional Notes

    This action is a utility tool for data transformation and templating. It does
    not perform external API calls, modify system state, or interact with external
    security controls.
  ai_short_description: >-
    Renders a Jinja2 template using a provided JSON object as input, optionally including
    case and alert context data.
