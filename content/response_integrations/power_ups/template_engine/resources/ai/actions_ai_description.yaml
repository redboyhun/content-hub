Render Template from Array:
  ai_description: >-
    ### General Description

    This action renders a Jinja2 template for each item in a provided JSON array.
    It serves as a utility for data transformation, allowing users to convert structured
    JSON inputs into custom string formats (such as HTML, text, or CSV) using Jinja2
    templating syntax. This is useful for formatting data for reports, notifications,
    or other downstream playbook actions.


    ### Flow Description

    1. The action extracts the `Array input` (JSON array), `Jinja` template string,
    `join` separator, `prefix`, and `suffix` parameters.

    2. It parses the `Array input` string into a JSON object or list. If a single
    object is provided, it is wrapped in a list to ensure consistent iteration.

    3. A Jinja2 environment is initialized, and available filters (including custom
    filters) are loaded into the environment.

    4. The action iterates through each item in the input array.

    5. For each item, the provided Jinja template is rendered using the item's data.

    6. The rendered outputs are concatenated using the specified `join` character,
    with the `prefix` and `suffix` applied to the final result.

    7. The final rendered string is returned as a JSON result via `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is a pure data transformation utility. It does not interact with external
    systems, modify case data, or perform any state-changing operations within the
    SOAR platform.
  ai_short_description: >-
    Renders a Jinja2 template for each item in a provided JSON array to generate a
    formatted string output.
