Render Template from Array:
  ai_description: >-
    ### General Description

    Renders a Jinja2 template for each item in a provided JSON array. This utility
    action allows users to format structured data into custom strings, HTML, or other
    text formats by applying a Jinja template to every element of an input list. It
    is useful for generating reports, notifications, or formatted logs from complex
    data structures.


    ### Flow Description

    1. Extracts action parameters: `Array input` (JSON string), `Jinja` (template),
    `join` (separator), `prefix`, and `suffix`.

    2. Parses the `Array input` into a Python list. If the input is a single JSON
    object, it wraps it in a list to ensure consistent processing.

    3. Initializes a Jinja2 environment and loads available filters, including standard
    and custom filters defined in the environment.

    4. Iterates through each item in the input list, rendering the provided Jinja
    template for that item.

    5. Concatenates the rendered outputs using the specified `join` character, then
    adds the `prefix` and `suffix` to the final string.

    6. Returns the final rendered string as a JSON result.


    ### Additional Notes

    This action is purely a data transformation utility and does not interact with
    external systems, modify SOAR case data, or perform any security operations. It
    is designed for playbook logic to format data for downstream actions.
  ai_short_description: >-
    Renders a Jinja2 template for each item in a provided JSON array to generate formatted
    text output.
