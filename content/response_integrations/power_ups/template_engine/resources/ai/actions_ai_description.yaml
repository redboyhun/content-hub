Render Template:
  ai_description: >-
    ### General Description

    Renders a Jinja2 template using a provided JSON object and optional case or alert
    context data. This action is designed for generating dynamic reports, email bodies,
    or formatted output strings by combining structured JSON input with security context
    data (events and entities) available within the Google SecOps platform.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `JSON Object`, `Template`,
    `Jinja` (template code), and `Include Case Data` parameters.

    2. **Context Retrieval**: If `Include Case Data` is enabled, the action extracts
    security events and entity information from the current alert or case context.

    3. **Environment Setup**: Initializes a Jinja2 environment, loading standard filters
    (e.g., `json2tbl`, `to_json`) and any available `CustomFilters`.

    4. **Data Processing**: Parses the `JSON Object` input. If `Include Case Data`
    is enabled, it merges the extracted context data into the input JSON.

    5. **Template Rendering**: Renders the template using the Jinja2 environment and
    the prepared data.

    6. **Result Output**: Returns the rendered HTML or text output as the action result.


    ### Additional Notes

    This action supports advanced templating features, including custom Jinja filters
    and standard filters like `json2tbl` for converting JSON to HTML tables. When
    `Include Case Data` is enabled, the variables `input_json['SiemplifyEvents']`
    and `input_json['SiemplifyEntities']` are available within the template.
  ai_short_description: >-
    Renders a Jinja2 template using a provided JSON object and optional alert or case
    context data.
