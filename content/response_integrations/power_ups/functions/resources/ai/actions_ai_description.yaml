Detect IP Type:
  ai_description: >-
    ### General Description

    Detects and classifies IP addresses as either IPv4 or IPv6. This action processes
    a list of provided IP addresses or existing IP Address entities within the case,
    updating their additional properties with the detected IP type.


    ### Flow Description

    1. The action receives an optional list of IP addresses via the 'IP Addresses'
    parameter.

    2. It iterates through the provided IP addresses, validating them against IPv4
    and IPv6 regex patterns to determine their type.

    3. It iterates through the target entities in the case.

    4. For each entity of type 'ADDRESS', it validates the identifier against the
    regex patterns.

    5. It updates the entity's `additional_properties` with the detected IP type ('IPV4',
    'IPV6', or 'UNDETECTED').

    6. It updates the entities in the SOAR platform using `siemplify.update_entities`.

    7. It returns the results as a JSON object.


    ### Additional Notes

    This action does not perform external API calls. It relies on local regex-based
    pattern matching to classify IP addresses.
  ai_short_description: >-
    Classifies IP addresses as IPv4 or IPv6 and updates entity properties with the
    detected type.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Updates the 'additional_properties' of IP Address entities with the detected
      IP type (IPV4, IPV6, or UNDETECTED).
    reasoning: >-
      The action performs local regex-based classification of IP addresses. It does
      not fetch data from external sources (fetches_data=false). It updates internal
      entity properties (can_update_entities=true), which constitutes internal data
      mutation.
  categories:
    enrichment: false
