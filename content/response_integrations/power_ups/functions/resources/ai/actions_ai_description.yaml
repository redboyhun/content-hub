Time Duration Calculator:
  ai_description: >-
    ### General Description

    The Time Duration Calculator is a utility action designed to compute the elapsed
    time or difference between two provided datetime strings. It supports flexible
    input formats and the use of "now" to represent the current UTC time, making it
    useful for calculating time deltas within playbooks.


    ### Flow Description

    1. The action extracts four parameters: two datetime strings and their corresponding
    strftime format strings.

    2. It parses the input strings into datetime objects. If "now" is provided, it
    uses the current UTC time.

    3. If the parsed datetime objects are not timezone-aware, the action localizes
    them to UTC.

    4. It calculates the duration between the two datetime objects.

    5. The duration is broken down into years, days, hours, minutes, and seconds.

    6. The results are returned as a JSON object, and the total duration in seconds
    is set as the action's result value.


    ### Additional Notes

    This action is a pure utility function. It does not interact with any external
    APIs, modify case data, or perform any remediation tasks. It is intended solely
    for data transformation and calculation within a playbook workflow.
