    when Input Type is set to 'Custom Timestamp'.
Convert Time Format:
  ai_description: >-
    General Description: This action converts a datetime string from one format to
    another. It supports parsing various input formats, applying time shifts (in seconds),
    and converting to a specific timezone before formatting the output.


    Flow Description:

    1. Retrieve input parameters: `Input`, `From Format`, `To Format`, `Time Delta
    In Seconds`, and `Timezone`.

    2. Parse the input string. If it's a number, it treats it as a timestamp (10 or
    13 digits). Otherwise, it uses the provided `From Format` to parse the string.

    3. Adjust the time by the specified `Time Delta In Seconds` (if provided).

    4. Convert the time to the specified `Timezone` (if provided).

    5. Format the resulting datetime object into the desired `To Format`.

    6. Return the formatted string as the action result.


    Additional Notes: This is a utility action and does not interact with external
    systems or entities.
