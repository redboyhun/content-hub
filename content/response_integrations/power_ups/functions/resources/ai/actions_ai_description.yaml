Detect IP Type:
  ai_description: >-
    ### General Description

    This action classifies IP addresses as either IPv4 or IPv6. It processes both
    a provided list of IP addresses (via input parameters) and existing IP Address
    entities within the current case. The action enriches IP Address entities by adding
    an 'IPType' field to their additional properties, facilitating easier filtering
    and analysis in playbooks.


    ### Flow Description

    1. Retrieve the 'IP Addresses' parameter string.

    2. If provided, split the string by commas and iterate through each IP to classify
    it as IPv4, IPv6, or UNDETECTED using regex patterns.

    3. Iterate through all `target_entities` in the current case.

    4. Filter for entities where the `entity_type` is 'ADDRESS'.

    5. Classify the entity identifier as IPv4 or IPv6 using regex.

    6. Update the entity's `additional_properties` with the detected `IPType`.

    7. Call `siemplify.update_entities` to save the changes to the SOAR platform.

    8. Output the results as a JSON object containing the classification for both
    the parameter-provided IPs and the case entities.


    ### Additional Notes

    This action performs internal enrichment of IP entities by adding metadata to
    their properties. It does not interact with external APIs or services.
  ai_short_description: >-
    Classifies IP addresses as IPv4 or IPv6 and enriches IP Address entities with
