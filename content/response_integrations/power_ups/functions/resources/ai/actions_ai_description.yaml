Calculate Timestamp:
  ai_description: >-
    ### General Description

    Calculates new timestamps by applying time offsets (deltas) to a base timestamp.
    The base timestamp can be derived from the current time, the alert creation time,
    the case creation time, or a custom provided timestamp. This action is useful
    for generating relative time markers for investigations or automation workflows.


    ### Flow Description

    1. Extracts action parameters including Input Type, Custom Timestamp, Timestamp
    Delta, and Output Format.

    2. Validates the provided parameters to ensure the Input Type and Custom Timestamp
    are compatible.

    3. Determines the base timestamp based on the selected Input Type (Current Time,
    Alert Creation Time, Case Creation Time, or Custom Timestamp).

    4. Parses the Timestamp Delta string to identify the time units and operators
    (e.g., +30M, -1d).

    5. Calculates the shifted timestamps by applying the deltas to the base timestamp
    using the arrow library.

    6. Formats the resulting timestamps according to the specified Output Timestamp
    Format.

    7. Returns the original and calculated timestamps in the action results.


    ### Additional Notes

    This action is a utility function and does not interact with external systems,
    nor does it modify internal case data or entities. It operates entirely within
    the execution context of the SOAR platform.
  ai_short_description: >-
    Calculates new timestamps by applying time offsets to a base timestamp derived
    from system context or user input.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
