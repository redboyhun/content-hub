Detect Hash Type:
  ai_description: >-
    ### General Description

    This action detects the most likely hash type (SHA256, MD5, SHA1, or SHA-512)
    for provided hash strings or FileHash entities. It performs local computation
    using the `hashid` library to identify the hash type and updates the entity's
    additional properties with the result.


    ### Flow Description

    1. The action parses the optional `Hashes` input parameter if provided.

    2. It identifies the hash type for each provided hash string using the `hashid`
    library.

    3. It iterates through all `FILEHASH` entities in the current case.

    4. For each `FILEHASH` entity, it identifies the hash type based on the entity's
    identifier.

    5. It updates the `additional_properties` of the `FILEHASH` entities with the
    detected hash type.

    6. It updates the entities in the SOAR platform with the new properties.

    7. It adds the results to the action output as a JSON object.


    ### Additional Notes

    This action performs local computation and does not interact with any external
    APIs or services. It is a utility action designed to enrich entity metadata within
    the SOAR platform.
