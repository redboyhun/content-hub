Convert Time Format:
  ai_description: >-
    ### General Description

    Converts a datetime string from one format to another, supporting timezone adjustments
    and time shifting. This utility action is designed to normalize time formats for
    use in playbooks or reports.


    ### Flow Description

    1. The action retrieves the input parameters: `Input`, `From Format`, `To Format`,
    `Time Delta In Seconds`, and `Timezone`.

    2. It parses the `Input` string. If the input is a numeric timestamp, it attempts
    to parse it as an epoch (10 or 13 digits). Otherwise, it uses the provided `From
    Format` to parse the string into a datetime object.

    3. If `Time Delta In Seconds` is provided, the action shifts the datetime object
    by the specified number of seconds.

    4. If `Timezone` is provided, the action converts the datetime object to the target
    timezone.

    5. The action formats the resulting datetime object into the requested `To Format`.

    6. The final formatted string is returned as the action result.


    ### Additional Notes

    This is a pure utility function. It does not interact with external APIs, nor
    does it modify any SOAR case data, entities, or alerts.
