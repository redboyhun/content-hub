Defang Text:
  ai_description: >-
    General Description: This action defangs input text by modifying potentially malicious
    indicators (URLs, IPs, and emails) to make them safe for display or logging. It
    replaces 'http' with 'hxxp', dots with '[.]', and '@' with '[at]'.


    Flow Description:

    1. The action retrieves the 'Input' parameter containing the text to be defanged.

    2. It uses regular expressions to identify and replace 'http' with 'hxxp' and
    dots with '[.]' in URLs.

    3. It identifies IPv4 addresses and replaces dots with '[.]'.

    4. It identifies email addresses and replaces '@' with '[at]' and dots with '[.]'.

    5. The resulting defanged text is returned in the 'converted_text' JSON result.


    Additional Notes: This is a utility action that does not interact with external
    systems or modify SOAR entities.
  ai_short_description: >-
