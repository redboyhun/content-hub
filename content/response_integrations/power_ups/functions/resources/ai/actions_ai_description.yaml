Defang Text:
  ai_description: >-
    General Description

    This action defangs input text by modifying potentially malicious indicators (URLs,
    IPs, and email addresses) to make them safe for display or reporting. It replaces
    `http` with `hxxp`, dots with `[.]`, and `@` symbols with `[at]`.


    Flow Description

    1. The action receives the `Input` string parameter.

    2. It validates that the input is not empty.

    3. It uses regular expressions to identify and replace `http`/`https` with `hxxp`/`hxxps`
    and replaces dots in the domain part with `[.]`.

    4. It identifies IPv4 addresses and replaces dots with `[.]`.

    5. It identifies email addresses and replaces the `@` symbol with `[at]` and dots
    in the domain part with `[.]`.

    6. The resulting defanged string is returned in the `converted_text` JSON result.


    Additional Notes

    This is a utility action and does not interact with external systems or modify
    internal SOAR data.
  ai_short_description: >-
    Defangs input text by modifying URLs, IP addresses, and email addresses to prevent
    accidental execution or clicking.
