Create Thumbnail:
  ai_description: >-
    ### General Description

    This action generates a thumbnail from a provided Base64 image string. It allows
    users to specify the desired thumbnail dimensions and can optionally extract image
    data from a provided JSON input using a specified key path.


    ### Flow Description

    1. Extract action parameters: `Base64 Image`, `Thumbnail Size`, `Input JSON`,
    and `Image Key Path`.

    2. If `Input JSON` is provided, parse the JSON and iterate through the items to
    find the image data using the `Image Key Path`.

    3. If `Input JSON` is not provided, use the `Base64 Image` parameter directly.

    4. Decode the Base64 string into an image object.

    5. Resize the image to the dimensions specified in `Thumbnail Size`.

    6. Encode the resized image back to a Base64 string.

    7. Return the resulting Base64 thumbnail string in the action result.


    ### Additional Notes

    This action performs local image processing and does not require external connectivity.
    It relies on the `PIL` (Pillow) library for image manipulation.
