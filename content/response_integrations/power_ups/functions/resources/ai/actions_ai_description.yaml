Detect Hash Type:
  ai_description: >-
    ### General Description

    Detects the cryptographic hash type (SHA-256, MD5, SHA-1, SHA-512) for provided
    hash strings or FileHash entities. This action uses the `hashid` library to perform
    local identification of hash formats.


    ### Flow Description

    1. Retrieves the optional `Hashes` parameter (a comma-separated string).

    2. Uses the `hashid` library to identify the type of each provided hash string
    from the parameter.

    3. Iterates through `target_entities` and filters for `FILEHASH` types.

    4. Identifies the hash type for each `FILEHASH` entity identifier using the `hashid`
    library.

    5. Updates the `additional_properties` of the `FILEHASH` entities with the detected
    hash type.

    6. Persists entity updates using `siemplify.update_entities`.

    7. Outputs the results as a JSON object containing the hash and its detected type.


    ### Additional Notes

    This action performs local computation using the `hashid` library and does not
    interact with external APIs. It enriches `FILEHASH` entities by adding the detected
    hash type to their additional properties.
  ai_short_description: >-
    Detects and identifies the cryptographic hash type (SHA-256, MD5, SHA-1, SHA-512)
