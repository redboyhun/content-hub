Calculate Timestamp:
  ai_description: >-
    General Description


    The 'Calculate Timestamp' action computes new timestamps by applying specified
    time offsets (deltas) to a baseline time. This utility allows users to generate
    future or past timestamps relative to the current time, alert creation time, case
    creation time, or a custom provided timestamp.


    Flow Description


    1. The action extracts configuration parameters, including the input type, custom
    timestamp (if applicable), delta offsets, and output format.

    2. It determines the baseline timestamp based on the selected 'Input Type' (Current
    Time, Alert Creation Time, Case Creation Time, or Custom Timestamp).

    3. It parses the 'Timestamp Delta' parameter into individual operations (e.g.,
    +30M, -1d).

    4. For each delta, the action calculates the new timestamp using the `arrow` library.

    5. The calculated timestamps are formatted according to the 'Output Timestamp
    Format' (or epoch).

    6. The final results, including the original and calculated timestamps, are returned
    as a JSON object.


    Additional Notes


    This action is a utility function and does not interact with external systems
    or modify case data. It relies on the `arrow` library for time manipulation.
  ai_short_description: >-
    Calculates shifted timestamps based on a provided base time and offset deltas.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
    reasoning: >-
      The action performs internal calculations based on provided inputs and SOAR
