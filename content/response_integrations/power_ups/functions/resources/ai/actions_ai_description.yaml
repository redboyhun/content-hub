  ai_description: >-
    ### General Description

    Extracts Indicators of Compromise (IOCs) such as URLs, domains, IP addresses,
    and email addresses from a provided input string. This utility function parses
    text to identify potential threats, facilitating further analysis within the SOAR
    platform.


