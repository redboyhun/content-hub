Create Thumbnail:
  ai_description: >-
    ### General Description

    Creates a Base64 thumbnail of an image. This utility action processes an image
    provided either as a direct Base64 string or extracted from a JSON object using
    a specified key path. It resizes the image to the requested dimensions and returns
    the new Base64 encoded thumbnail.


    ### Flow Description

    1. The action extracts the input parameters: `Base64 Image`, `Thumbnail Size`,
    `Input JSON`, and `Image Key Path`.

    2. If `Input JSON` is provided, the action parses the JSON and traverses it using
    the `Image Key Path` to locate the Base64 image string.

    3. The action decodes the Base64 image string into an image object.

    4. The image is resized to the dimensions specified in `Thumbnail Size` (e.g.,
    250x250).

    5. The resized image is encoded back into a Base64 string.

    6. The resulting thumbnail is returned as a JSON object using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is a pure data transformation utility. It does not interact with external
    APIs, modify case data, or update entities. It is intended for use in playbooks
    where image processing is required for reporting or analysis.
