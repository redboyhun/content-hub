Time Duration Calculator:
  ai_description: >-
    ### General Description

    The Time Duration Calculator is a utility action designed to compute the elapsed
    time or difference between two specified date-time values. It supports custom
    date formats and the "now" keyword for dynamic time calculations.


    ### Flow Description

    1. The action extracts the two input date-time strings and their corresponding
    format strings from the action parameters.

    2. It processes each input: if the input is "now", it uses the current UTC time;
    otherwise, it parses the string using the provided format.

    3. If the parsed datetime objects are not timezone-aware, the action localizes
    them to UTC.

    4. The action calculates the duration between the two datetime objects.

    5. It breaks down the duration into years, days, hours, minutes, and seconds.

    6. The calculated results are returned as a JSON object, and the total duration
    is provided in the output message.


    ### Additional Notes

    This action is a pure calculation utility and does not perform any external API
    calls, entity modifications, or system state changes.
