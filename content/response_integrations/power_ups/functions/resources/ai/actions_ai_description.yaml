String Functions:
  ai_description: >-
    ### General Description

    This action provides a suite of utility functions for manipulating and analyzing
    strings. It supports operations like case conversion, whitespace removal, pattern
    matching (regex), encoding/decoding, and splitting.


    ### Flow Description

    1. The action retrieves the `Input` string, the selected `Function`, and optional
    parameters `Param 1` and `Param 2` from the configuration.

    2. It executes the logic corresponding to the selected `Function` (e.g., `lower()`,
    `upper()`, `replace()`, `re.sub()`, `base64.b64decode()`, etc.).

    3. For functions like `Replace` and `Regex Replace`, it processes placeholders
    (e.g., `_SPACE_`).

    4. For `Split`, it adds the result as a JSON object to the action result using
    `siemplify.result.add_result_json`.

    5. The final processed string or result message is returned via `siemplify.end()`.


