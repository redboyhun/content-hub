  ai_description: >-
    ### General Description

    Sanitizes an HTML fragment to remove disallowed tags, attributes, and styles,
    preventing potential XSS or malformed HTML issues. This action is a utility function
    that processes input text locally using the `bleach` library.


    ### Flow Description

    1. Extracts configuration parameters (`Tags`, `Attributes`, `Styles`, `Allow All
    Attributes`, etc.) from the action settings.

    2. Initializes the `bleach` library with the provided configuration, including
    a CSS sanitizer for style attributes.

    3. Processes the `Input HTML` string using the `bleach.clean` method based on
    the provided allowlists.

    4. Returns the sanitized HTML string as the action result.


