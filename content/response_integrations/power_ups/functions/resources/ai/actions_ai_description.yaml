SanitizeHTML:
  ai_description: >-
    ### General Description

    Sanitizes a provided HTML fragment to remove disallowed tags, attributes, and
    styles, preventing potential XSS or malformed HTML issues. This action is a utility
    function designed to clean input data before further processing or display.


    ### Flow Description

    1. Extracts the `Input HTML` fragment and configuration parameters (`Tags`, `Attributes`,
    `Styles`, `Allow All Attributes`) from the action settings.

    2. Initializes the `bleach` library with the specified configuration.

    3. Processes the HTML fragment using the `bleach.clean` method based on the provided
    allow-lists.

    4. Returns the sanitized HTML string as the action result.


    ### Additional Notes

