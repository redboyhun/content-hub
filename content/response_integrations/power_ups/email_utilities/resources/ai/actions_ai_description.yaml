Analyze EML Headers:
  ai_description: >-
    ### General Description

    Analyzes email headers from a provided EML file or JSON header list to identify
    potential spoofing, misconfigurations, or suspicious email characteristics.


    ### Flow Description

    1. The action receives input as either a Base64-encoded EML file or a JSON-formatted
    list of headers.

    2. It parses the input to extract individual email headers.

    3. It performs static analysis on the headers, checking for anomalies such as
    mismatches between 'Return-Path', 'From', and 'Reply-To' headers, missing 'Message-ID',
    or the presence of suspicious headers like 'Bcc' or 'X-Distribution'.

    4. It extracts domain and IP address information from 'Received' headers.

    5. It generates a structured JSON result containing an HTML table of all headers,
    a list of recommendations with severity scores, and a summary of findings.

    6. The final result is returned to the platform using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action performs static analysis and does not interact with external services
    or modify case data.
  ai_short_description: >-
    Analyzes email headers from EML files or JSON input to identify spoofing indicators
    and suspicious email characteristics.
