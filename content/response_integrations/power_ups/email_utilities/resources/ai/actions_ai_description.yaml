Analyze Headers:
  ai_description: >-
    ### General Description

    Analyzes email headers to validate authentication mechanisms (SPF, DMARC, ARC,
    DKIM) and assess the reputation of relay servers. This action parses email headers
    to extract key information, validates domain authentication records, and enriches
    relay server information with reputation, geo-location, and Whois data.


    ### Flow Description

    1. Accepts a JSON object containing email headers as input.

    2. Parses the headers to extract key information such as sender, recipient, subject,
    and message ID.

    3. Validates SPF, DMARC, and MX records for the sender's domain using `checkdmarc`.

    4. Verifies DKIM and ARC signatures using `EmailUtilitiesManager`.

    5. Parses "Received" headers to trace the email's path.

    6. For each relay server (IP or domain) identified in the path, it queries RBLs
    (Real-time Blackhole Lists) to check for denylisting.

    7. Enriches relay server information with geo-location and IP Whois data.

    8. Returns a comprehensive JSON result containing all validation and enrichment
    data.


    ### Additional Notes

    This action is purely analytical and does not modify external systems or internal
    case data beyond returning the analysis results.
  ai_short_description: >-
    Analyzes email headers to validate authentication (SPF, DMARC, ARC, DKIM) and
    enrich relay server information with reputation, geo-location, and Whois data.
