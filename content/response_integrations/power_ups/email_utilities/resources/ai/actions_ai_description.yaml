Parse Base64 Email:
  ai_description: >-
    General Description

    Parses a base64-encoded EML or MSG email file into a structured JSON format. This
    action is a utility for email analysis and does not perform external lookups or
    system mutations.


    Flow Description

    1. The action receives a base64-encoded string representing an EML or MSG file
    via the `EML/MSG Base64 String` parameter.

    2. The base64 string is decoded into raw bytes.

    3. The script determines the file type (OLE/MSG or EML) and uses the appropriate
    parser.

    4. Headers, body content, and attachments are parsed and extracted.

    5. The script extracts IOCs (URLs, domains, emails, IPs) from the email body and
    headers.

    6. The final structured data is returned as a JSON result using `siemplify.result.add_result_json`.


    Additional Notes

    This action is a local parsing utility and does not perform external API calls
    or modify system state.
