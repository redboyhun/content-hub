Parse EML Base64 Blob:
  ai_description: >-
    ### General Description

    This action decodes a base64-encoded EML file and parses its contents, including
    headers, body, and attachments. It is designed to extract structured information
    from raw email data for further analysis.


    ### Flow Description

    1. Accepts a base64-encoded string as input via the 'Base64 EML Blob' parameter.

    2. Decodes the base64 string into raw EML content.

    3. Parses the EML content using the Python `email` library.

    4. Extracts metadata (sender, recipients, subject, date) and body content (text
    and HTML).

    5. Recursively processes multipart messages to identify attachments.

    6. Returns the parsed email structure as a JSON result using `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is purely for parsing and data extraction; it does not perform any
    external API calls or modify SOAR case data.
