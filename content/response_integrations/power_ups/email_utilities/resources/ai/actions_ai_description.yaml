Analyze EML Headers:
  ai_description: >-
    ### General Description

    Analyzes EML file headers or a provided list of headers to identify potential
    email spoofing, configuration issues, or suspicious patterns. This action parses
    the input to extract header key-value pairs and performs a series of checks to
    validate email integrity.


    ### Flow Description

    1. Accepts either a Base64-encoded EML file or a JSON-formatted list of headers
    as input parameters.

    2. Parses the input to extract header key-value pairs, handling potential duplicate
    keys.

    3. Analyzes specific headers (e.g., Return-Path, From, Reply-To, Message-ID) for
    inconsistencies or suspicious patterns, such as mismatches between sender-related
    headers.

    4. Extracts domains and IP addresses from "Received" headers.

    5. Generates a structured JSON result containing the extracted headers, analysis
    recommendations, and an HTML-formatted summary table.

    6. Returns the analysis results as a JSON object to the action result.


    ### Additional Notes

    This action is purely analytical and does not modify external systems or internal
    case data. It is designed to assist analysts in evaluating email headers for potential
    threats.
  ai_short_description: >-
    Analyzes EML headers to detect potential email spoofing and configuration anomalies.
