Parse Case Wall Email:
  ai_description: >-
    ### General Description

    This action parses EML or MSG files attached to the case wall. It extracts email
    metadata, body content, and attachments, and optionally creates entities (User,
    Email Subject, URLs, Emails, IPs, Hashes) based on the email content.


    ### Flow Description

    1. **Retrieve Attachments**: The action fetches all attachments from the case
    wall using the `AttachmentsManager`.

    2. **Identify Target**: It identifies the target email attachment (either the
    original EML or an attached email) based on the `Original EML Only` parameter.

    3. **Parse Email**: It parses the email content (headers, body, and attachments)
    using the `EmailManager`.

    4. **Create Entities**: If enabled, it creates entities (User, Email Subject,
    URLs, Emails, IPs, Hashes) from the parsed email content. It supports filtering
    entities using a regex (`Exclude Entities Regex`) and can defang/fang entities.

    5. **Save Attachments**: If enabled, it saves extracted attachments to the case
    wall and updates the corresponding file entities with the new attachment ID.

    6. **Finalize**: It returns the parsed email data and a list of created entities
    in the action result.


    ### Additional Notes

    - Supports custom regex for entity extraction via the `Custom Entity Regexes`
    parameter.

    - Can be configured to create entities from the To/From headers and the Subject
    field.

    - Supports filtering of observed entities based on the `Create Observed Entities`
    parameter.
  ai_short_description: >-
    Parses EML or MSG files attached to the case wall, extracts entities, and saves
    attachments.
