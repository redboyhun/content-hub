Parse Base64 Email:
  ai_description: >-
    ### General Description

    Parses EML and MSG files provided as a base64-encoded string. It extracts comprehensive
    email metadata, including headers, body content, attachments, and embedded indicators
    (URLs, domains, email addresses, and IP addresses).


    ### Flow Description

    1. Accepts a base64-encoded EML/MSG string as input.

    2. Decodes the base64 string into binary content.

    3. Detects the file type (EML or MSG) using `olefile`.

    4. Parses the email structure, including headers, body (text/plain and text/html),
    and attachments.

    5. Extracts indicators (URLs, domains, emails, IPs) from the body and headers
    using regex and URL extraction libraries.

    6. Processes attachments recursively if they are nested emails.

    7. Aggregates all extracted data into a structured JSON object.

    8. Returns the parsed email data as a JSON result in the action output.


    ### Additional Notes

    This action is a utility for email analysis and does not perform external lookups
    or modify case data.
