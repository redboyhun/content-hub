Parse Case Wall Email:
  ai_description: >-
    ### General Description

    This action parses EML or MSG files that are attached to the case wall. It extracts
    email metadata (such as headers and body content), identifies attachments, and
    extracts potential indicators of compromise (IOCs) like URLs, IP addresses, email
    addresses, and file hashes. The action can optionally create these extracted IOCs
    as entities within the case and save attachments back to the case wall for further
    analysis.


    ### Flow Description

    1. **Initialization**: Initializes the `EmailManager` and `AttachmentsManager`
    to handle email parsing and case wall interactions.

    2. **Attachment Retrieval**: Retrieves all attachments associated with the current
    alert or case from the case wall.

    3. **Target Identification**: Identifies the target EML or MSG file based on the
    provided parameters (e.g., 'Original EML Only').

    4. **Email Parsing**: Reads the content of the identified attachment and parses
    it using the `EmailManager` to extract headers, body, and nested attachments.

    5. **Entity Creation**: If enabled, creates new entities (e.g., User, Email Subject,
    URL, IP, Hash) in the case based on the parsed email content and the 'Create Observed
    Entities' parameter.

    6. **Attachment Management**: If 'Save Attachments to Case Wall' is enabled, saves
    extracted attachments to the case wall and updates the corresponding file entities
    with the new attachment IDs.

    7. **Result Generation**: Adds the parsed email data and a list of created entities
    to the action results.


    ### Additional Notes

    This action is part of the Email Utilities integration and is designed to automate
    the initial triage and extraction of IOCs from email-based alerts. It does not
    require external API keys as it operates entirely on data already present within
    the Google SecOps SOAR platform.
  ai_short_description: >-
    Parses EML or MSG files from the case wall, extracts metadata and IOCs, and optionally
    creates entities and saves attachments.
