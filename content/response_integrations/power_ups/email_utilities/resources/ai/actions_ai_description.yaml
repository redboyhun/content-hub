Analyze Headers:
  ai_description: >-
    ### General Description

    Analyzes email headers to validate authentication mechanisms (SPF, DMARC, ARC,
    DKIM) and assess the reputation of relay servers. This action is designed to parse
    email header data provided in a JSON format, perform security checks, and provide
    a detailed analysis of the email's authenticity and the reputation of the servers
    involved in its delivery.


    ### Flow Description

    1. Accepts a JSON object containing email headers as input via the 'Headers JSON'
    parameter.

    2. Parses the headers to extract authentication results and routing information.

    3. Validates SPF, DMARC, ARC, and DKIM records using domain-specific checks.

    4. Analyzes relay servers by querying DNS-based Blackhole Lists (DNSBL) and retrieving
    geo-location and WHOIS data for IP addresses.

    5. Constructs a comprehensive JSON result containing the analysis, which is then
    added to the action results.


    ### Additional Notes

    This action is purely analytical and does not modify any external systems or internal
    SOAR entities. It relies on external DNS and geolocation services to provide context
    for the email headers.
