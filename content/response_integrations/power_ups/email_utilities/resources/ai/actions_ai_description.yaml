Parse EML Base64 Blob:
  ai_description: >-
    ### General Description

    This action decodes a base64-encoded string representing an EML file and parses
    its contents to extract metadata and body information. It is designed to facilitate
    the analysis of email content by converting raw base64 data into a structured
    JSON format.


    ### Flow Description

    1. The action retrieves the `Base64 EML Blob` parameter.

    2. It decodes the provided base64 string into raw EML content.

    3. The raw content is parsed using the email library to extract metadata (sender,
    recipients, subject, date) and body content (text and HTML).

    4. The action recursively processes multipart attachments to identify and extract
    nested EML content.

    5. All extracted information is aggregated into a JSON structure.

    6. The final JSON result is added to the action output.


    ### Additional Notes

    This action is purely analytical and does not modify any external or internal
    systems. It does not interact with external APIs or modify SOAR case data.
