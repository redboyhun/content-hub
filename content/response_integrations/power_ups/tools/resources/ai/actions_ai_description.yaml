Change Case Name:
  ai_description: >-
    ### General Description

    Renames a case within the Google SecOps SOAR platform. This action allows users
    to update the title of a case, optionally restricting the change to only occur
    if the action is executed on the first alert within the case.


    ### Flow Description

    1. The action determines the execution scope (Alert or Case) to understand the
    context of the operation.

    2. If the execution scope is set to Alert and the "Only If First Alert" parameter
    is enabled, the action retrieves all alerts associated with the case.

    3. It sorts the retrieved alerts by their detection time to identify the first
    alert.

    4. It verifies if the current alert's identifier matches the identifier of the
    first alert in the case.

    5. If the condition is met (or if the "Only If First Alert" parameter is disabled),
    the action calls the `rename_case` function to update the case title in the SOAR
    platform.

    6. The action sets the final output message and result value based on whether
    the case title was successfully updated.


    ### Additional Notes

    This action performs a platform-level mutation to update the case name. It does
    not interact with external systems outside of the Google SecOps SOAR platform.
