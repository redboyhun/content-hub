Delay Playbook Synchronous:
  ai_description: >-
    ### General Description

    This action pauses the execution of a playbook for a specified number of seconds.
    It is designed to introduce a controlled delay in automated workflows, allowing
    for synchronization or waiting for external processes to complete.


    ### Flow Description

    1. The action extracts the `Seconds` parameter from the configuration.

    2. It validates that the `Seconds` value is a positive number and falls within
    the allowed range (0 to 30 seconds).

    3. The action calculates the target end time by adding the specified delay to
    the current time.

    4. It enters a loop, sleeping for up to 1 second at a time until the target end
    time is reached.

    5. Upon completion, it returns a success message indicating the delay has been
    reached.


    ### Additional Notes

    This action is intended for short-term synchronization delays. If a longer delay
    is required, please use the "Delay Playbook V2" action.
