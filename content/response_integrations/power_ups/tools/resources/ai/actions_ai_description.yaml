Attach Playbook to Alert:
  ai_description: >-
    ### General Description

    This action attaches one or more specified playbooks to an alert or a set of alerts
    within a case. It allows users to automate the association of workflows with alerts,
    optionally permitting duplicate attachments.


    ### Flow Description

    1. Extracts the `Playbook Name` (comma-separated list) and `Allow Duplicates`
    parameters.

    2. Determines the execution scope (Alert or Case) to identify the target alerts.

    3. For each target alert, retrieves the list of currently attached workflows using
    the `get_workflow_instance_card` API call.

    4. Iterates through the provided playbook names.

    5. If a playbook is not already attached (or if `Allow Duplicates` is true), it
    calls `Siemplify.attach_workflow_to_case` to associate the playbook with the alert.

    6. Compiles a summary of successful and failed attachments and returns the result.


    ### Additional Notes

    The action supports both single-alert and case-wide execution scopes. It validates
    the existence of playbooks and handles potential duplicate attachments based on
    the configuration.
