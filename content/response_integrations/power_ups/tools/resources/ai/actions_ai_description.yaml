    This action retrieves comprehensive data from a Google SecOps case, including
    comments, entity information, insights, playbooks, alert details, and events.
    It provides a flexible way to extract specific case data by allowing users to
    filter the returned JSON structure using a list of fields and a custom delimiter
    for nested keys.


