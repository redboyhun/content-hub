Add Comment to Entity Log:
  ai_description: >-
    ### General Description

    This action adds a custom comment to the Entity Log for each entity currently
    in scope. It allows analysts to document findings or actions directly on the entity's
    activity timeline within the SOAR platform.


    ### Flow Description

    1. Extracts the `Comment` and `User` parameters from the action configuration.

    2. Iterates through all entities present in the `target_entities` list.

    3. For each entity, calls the `add_comment_to_entity` function from the `TIPCommon`
    library.

    4. This function performs an API call to the SOAR platform to append the specified
    comment, attributed to the provided user, to the entity's log.

    5. Logs the success of the operation for each entity and updates the action output
    message.


    ### Additional Notes

    This action does not interact with external systems; it strictly modifies internal
    SOAR entity logs.
