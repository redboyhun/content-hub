Add Or Update Alert Additional Data:
  ai_description: >-
    ### General Description

    Updates the `additional_data` field of one or more alerts within the SecOps platform
    by merging provided JSON content. This action allows for the dynamic addition
    or modification of structured metadata (dictionaries, lists, or raw data) associated
    with an alert, facilitating state management across playbook executions.


    ### Flow Description

    1. Retrieve the `Json Fields` parameter from the action configuration.

    2. Attempt to parse the input as JSON; if parsing fails, treat the input as a
    raw string.

    3. Determine the execution scope (Alert or Case) to identify the target alert(s).

    4. For each target alert, retrieve the existing `additional_data` payload.

    5. Merge the incoming data into the existing structure:
        * If the input is a list, extend the existing `list` key.
        * If the input is a dictionary, update the existing `dict` key.
        * Otherwise, set the `data` key to the input value.
    6. Call `siemplify.update_alerts_additional_data` to persist the changes to the
    platform.

    7. Return the updated data as a JSON result for the action.


    ### Additional Notes

    This action is designed to maintain persistent state or custom metadata across
    multiple playbook steps. It ensures that existing data is preserved while new
    information is appended or updated based on the data type provided.
