    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Attaches playbooks (workflows) to alerts or cases within the SOAR platform.
    reasoning: >-
      The action fetches existing workflow data to check for duplicates and mutates
