Re-Attach Playbook:
  ai_description: >-
    ### General Description

    This action removes a specified playbook from a case, deletes its associated result
    data from the SOAR platform's internal databases, and re-attaches the playbook
    to trigger a fresh execution. This is a maintenance utility designed to reset
    the state of a specific playbook within a case.


    ### Flow Description

    1. The action connects to the SOAR platform's internal PostgreSQL databases (Orchestration
    and System DBs) using configured credentials.

    2. It queries the `WorkflowInstances` table to identify the specific workflow
    instance associated with the provided `Playbook Name` and the current `CaseId`.

    3. It deletes the identified workflow instance from the `WorkflowInstances` table
    in the orchestration database.

    4. It deletes the corresponding action results from the `ActionResults` table
    in the system database.

    5. It identifies the alert associated with the workflow instance.

    6. Finally, it uses the `attach_playbook_to_the_case` utility to re-attach the
    playbook to the case, which triggers the playbook to run again.


    ### Additional Notes

    This action requires the PostgreSQL integration to be installed and configured
    to the Shared Environment with an instance name of 'Siemplify'. It performs direct
    database mutations on the SOAR platform's internal storage, which should be used
    with caution.
  ai_short_description: >-
    Resets a playbook's execution state by removing its workflow instances and action
    results from the SOAR platform's internal database and re-attaching it to the
    case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
