Re-Attach Playbook:
  ai_description: >-
    ### General Description

    This action removes a specified playbook from a case, deletes its associated execution
    history and result data from the PostgreSQL orchestration database, and re-attaches
    the playbook to the case to trigger a fresh execution. This is useful for resetting
    the state of a playbook that may have failed or requires a re-run.


    ### Flow Description

    1. Extracts the 'Playbook Name' parameter provided by the user.

    2. Retrieves the PostgreSQL integration instance configuration (named 'Siemplify')
    to establish a connection to the orchestration and system databases.

    3. Queries the 'WorkflowInstances' table in the PostgreSQL database to identify
    existing instances of the specified playbook associated with the current case.

    4. For each identified workflow instance:
       - Deletes the record from the 'WorkflowInstances' table.
       - Deletes the corresponding records from the 'ActionResults' table.
       - Identifies the associated alert within the case.
       - Calls the 'attach_playbook_to_the_case' function to re-attach the playbook
    to the case, configured to run automatically.

    ### Additional Notes

    This action requires the PostgreSQL integration to be installed and configured
    in the Shared Environment with an instance name of 'Siemplify'. It directly modifies
    the orchestration database to clear playbook history.
  ai_short_description: >-
    Removes a playbook from a case, clears its execution history from the PostgreSQL
    database, and re-attaches it to trigger a new execution.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes workflow instances and action results from the PostgreSQL orchestration
      database.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Re-attaches the playbook to the case, modifying the case's workflow state.
    reasoning: >-
