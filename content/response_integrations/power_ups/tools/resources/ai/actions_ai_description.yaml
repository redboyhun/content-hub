    ### General Description

    This action sets a key-value pair in the specified context scope (Alert, Case,
    or Global) within the Google SecOps platform. It is a utility action designed
    for managing internal state and passing data between playbook steps.


    ### Flow Description

    1. Extract the `Scope`, `Key`, and `Value` parameters from the action configuration.

    2. Determine the target scope based on the `Scope` parameter.

    3. If the scope is "Alert", call `siemplify.set_alert_context_property` to store
    the key-value pair in the current alert's context.

    4. If the scope is "Case", call `siemplify.set_case_context_property` to store
    the key-value pair in the current case's context.

    5. If the scope is "Global", call `siemplify.set_context_property` to store the
    key-value pair in the global context.

    6. End the action with a success message.


