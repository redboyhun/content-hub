Delay Playbook:
  ai_description: >-
    ### General Description

    This action pauses the execution of a playbook for a specified duration. It is
    a utility action used to introduce delays in automated workflows, allowing for
    asynchronous processing or waiting for external conditions to be met before proceeding
    with subsequent playbook steps.


    ### Flow Description

    1. The action accepts duration parameters: `Seconds`, `Minutes`, `Hours`, and
    `Days`.

    2. It calculates a `target_date` by adding the specified durations to the current
    UTC time using the `arrow` library.

    3. The action compares the current UTC time against the calculated `target_date`.

    4. If the current time is greater than or equal to the `target_date`, the action
    completes successfully with an `EXECUTION_STATE_COMPLETED` status.

    5. If the current time is less than the `target_date`, the action sets the execution
    state to `EXECUTION_STATE_INPROGRESS` and returns the `target_date` as the result.
    This signals the SOAR platform to pause the playbook and re-trigger the action
    at a later time.

    6. Upon re-execution, the `wait` function is invoked, which retrieves the `target_date`
    from the `additional_data` parameter and repeats the comparison logic until the
    target time is reached.


    ### Additional Notes

    This action is strictly for playbook orchestration and does not interact with
    external systems, modify case data, or perform entity enrichment. It relies on
    the SOAR platform's ability to handle asynchronous job states.
  ai_short_description: >-
    Pauses playbook execution for a specified duration by scheduling a future re-execution.
  capabilities:
