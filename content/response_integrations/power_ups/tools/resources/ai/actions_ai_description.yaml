Add Alert Scoring Information:
  ai_description: >-
    ### General Description

    This action adds an entry to the alert scoring database within the alert context.
    It calculates an overall alert score based on the severity of individual checks
    and their categories, using predefined thresholds.


    ### Flow Description

    1. Extracts action parameters: `Name`, `Description`, `Category`, `Severity`,
    and `Source`.

    2. Retrieves the current alert scoring information from the alert context property
    `ALERT_SCORE_INFO`.

    3. Creates a new score entry based on the provided parameters.

    4. Updates the scoring data, recalculating scores for the specific category and
    the overall alert score based on defined thresholds (e.g., 5 Low = 1 Medium, 3
    Medium = 1 High, 2 High = 1 Critical).

    5. Saves the updated scoring information back to the alert context properties
    `ALERT_SCORE_INFO`, `ALERT_SCORE`, and `ALERT_SEVERITY`.

    6. Adds the updated scoring JSON to the action results.


    ### Additional Notes

    The action uses internal alert context properties to maintain state and does not
    interact with external systems.
  ai_short_description: >-
    Adds a scoring entry to the alert context and recalculates the overall alert severity
    based on defined thresholds.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
