Append to Context Value:
  ai_description: "### General Description\nThis action manages internal SOAR context\
    \ data by appending a specified value to an existing context property or creating\
    \ a new property if it does not exist. It supports three scopes: Alert, Case,\
    \ and Global, allowing for flexible data persistence across different levels of\
    \ the orchestration environment.\n\n### Flow Description\n1. **Parameter Extraction**:\
    \ The action extracts the `Scope` (Alert, Case, or Global), `Key` (the context\
    \ property name), `Value` (the data to append), and `Delimiter` (the separator\
    \ used for appending) from the action parameters.\n2. **Context Retrieval**: Based\
    \ on the selected `Scope`, the action attempts to retrieve the current value of\
    \ the specified `Key` using the corresponding Siemplify SDK method (`get_alert_context_property`,\
    \ `get_case_context_property`, or `get_global_context`).\n3. **Value Processing**:\
    \ \n   - If the key exists, the action appends the new `Value` to the existing\
    \ data using the provided `Delimiter`.\n   - If the key does not exist, the action\
    \ initializes the property with the provided `Value`.\n4. **Context Update**:\
    \ The action saves the updated or new value back to the SOAR context using the\
    \ corresponding setter method (`set_alert_context_property`, `set_case_context_property`,\
    \ or `set_global_context`).\n5. **Result Reporting**: The action concludes by\
    \ returning a success message indicating whether the field was updated or created.\n\
    \n### Additional Notes\nThis action is a utility tool for state management within\
    \ playbooks. It does not interact with external systems or modify alert metadata,\
    \ entities, or case comments directly."
