Append to Context Value:
  ai_description: >-
    ### General Description

    Appends a value to a specified context property (Alert, Case, or Global scope)
    or creates a new property if it does not exist. This action is a utility designed
    to manage state and data persistence within the SOAR platform.


    ### Flow Description

    1. The action extracts the required parameters: `Scope` (Alert, Case, or Global),
    `Key` (the context property name), `Value` (the data to append), and `Delimiter`
    (the separator to use).

    2. Based on the selected `Scope`, the action retrieves the current value of the
    specified `Key` from the corresponding context (Alert, Case, or Global).

    3. If the context property already exists, the action appends the new `Value`
    to the existing data using the provided `Delimiter`.

    4. If the context property does not exist, the action creates the property and
    sets it to the provided `Value`.

    5. The updated context property is saved back to the SOAR platform.


    ### Additional Notes

    This action performs internal state management only. It does not interact with
    external systems, fetch external threat intelligence, or modify alert status/severity.
    It is strictly a utility for maintaining context data across playbooks.
