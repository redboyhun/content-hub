Lock Playbook:
  ai_description: >-
    ### General Description

    This action pauses the current playbook execution to ensure sequential processing
    of alerts within a case. It checks the status of playbooks associated with previous
    alerts (or all alerts in the case) and locks the current execution until dependencies
    are met.


    ### Flow Description

    1. Determines the execution scope (Alert or Case).

    2. If `Alert` scope:
        * Identifies the current alert's index within the case.
        * If it is the first alert, the playbook proceeds immediately.
        * If it is not the first alert, it retrieves the workflow status of the previous
    alert using the `get_workflow_instance_card` API call.
        * If the previous alert's playbook is not complete, it sets the execution
    state to `INPROGRESS` (locking the playbook).
        * If the previous alert's playbook is complete, it releases the lock.
    3. If `Case` scope:
        * Iterates through all open alerts in the case.
        * Checks the workflow status for each alert using the `get_workflow_instance_card`
    API call.
        * If any playbook is incomplete, it locks the current execution.
    4. Updates the action status and output message accordingly.


    ### Additional Notes

    This action is intended for orchestration flow control and does not interact with
    external security systems. It relies on internal SecOps workflow status data.
  ai_short_description: >-
    Pauses playbook execution to enforce sequential processing of alerts within a
    case.
  capabilities:
    can_create_case_comments: false
