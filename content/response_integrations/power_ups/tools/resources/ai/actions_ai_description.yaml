    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Updates alert context properties `ALERT_SCORE_INFO`, `ALERT_SCORE`, and `ALERT_SEVERITY`
      to track and calculate alert scoring.
    reasoning: >-
      The action modifies internal alert context properties to track and calculate
      alert scoring. It does not fetch external data or mutate external systems.
  categories:
    enrichment: false
    reasoning: >-
      The action does not fetch data from external systems, nor does it perform remediation
