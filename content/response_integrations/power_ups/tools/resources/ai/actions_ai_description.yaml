Add Or Update Alert Additional Data:
  ai_description: >-
    ### General Description

    This action updates the `additional_data` field of one or more alerts within Google
    SecOps. It allows users to inject custom JSON data (dictionaries or lists) or
    free text into the alert's metadata, facilitating the storage of arbitrary information
    for later use in playbooks or reporting.


    ### Flow Description

    1. The action retrieves the "Json Fields" parameter provided by the user.

    2. It attempts to parse the input as JSON; if parsing fails, it treats the input
    as a raw string.

    3. It determines the execution scope (Alert or Case) to identify the target alert(s).

    4. For each target alert, it retrieves the existing `additional_data` payload.

    5. It merges the new data into the existing payload: lists are extended, dictionaries
    are updated, and raw strings are stored in a "data" field.

    6. The action updates the alert(s) in Google SecOps using `update_alerts_additional_data`.

    7. Finally, it adds the processed data to the action result.


    ### Additional Notes

    This action modifies the internal state of the alert by updating its `additional_data`
    field. It does not interact with external systems.
