Set Context Value:
  ai_description: >-
    ### General Description

    This action allows users to store custom key-value pairs within the Google SecOps
    platform context. It supports setting properties at the Alert, Case, or Global
    level, enabling data persistence across playbook executions.


    ### Flow Description

    1. Extracts the `Scope`, `Key`, and `Value` parameters from the action configuration.

    2. Determines the target scope based on the `Scope` parameter (Alert, Case, or
    Global).

    3. If `Scope` is "Alert", calls `siemplify.set_alert_context_property` to store
    the key-value pair in the current alert's context.

    4. If `Scope` is "Case", calls `siemplify.set_case_context_property` to store
    the key-value pair in the current case's context.

    5. If `Scope` is "Global", calls `siemplify.set_context_property` to store the
    key-value pair globally.

    6. Ends the action with a success message.


    ### Additional Notes

    This action is useful for passing data between different playbooks or steps by
    leveraging the platform's context storage capabilities.
