Add Alert Scoring Information:
  ai_description: >-
    ### General Description

    This action adds a scoring entry to the alert's context, allowing for automated
    alert severity calculation based on defined thresholds. It maintains a structured
    scoring database within the alert context properties, enabling consistent severity
    management across playbooks.


    ### Flow Description

    1. Extract action parameters: `Name`, `Description`, `Category`, `Severity`, and
    `Source`.

    2. Retrieve existing scoring data from the alert context property `ALERT_SCORE_INFO`.

    3. Create a new score entry object with the provided details.

    4. Update the scoring data by adding the new entry to the appropriate category
    or creating a new category if it doesn't exist.

    5. Recalculate the score for the specific category and the overall alert score
    based on predefined severity ratios (Informational=0, Low=1, Medium=2, High=3,
    Critical=4).

    6. Update the alert context properties `ALERT_SCORE_INFO`, `ALERT_SCORE`, and
    `ALERT_SEVERITY` with the new values.

    7. Add the updated scoring data as a JSON result.

    8. Terminate the action with a summary message.


    ### Additional Notes

    The action uses internal alert context properties to persist scoring information
    across playbook executions. It does not interact with external systems.
  ai_short_description: >-
    Adds a scoring entry to the alert context and recalculates the overall alert severity
    based on defined thresholds.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: true
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: >-
      Updates alert context properties `ALERT_SCORE_INFO`, `ALERT_SCORE`, and `ALERT_SEVERITY`
      to reflect the new alert score and severity.
    reasoning: >-
      The action modifies internal alert context properties to update the alert's
      score and severity. It does not interact with external systems or entities.
