Delay Playbook V2:
  ai_description: >-
    General Description

    This action pauses the execution of a playbook for a specified duration or until
    a cron-scheduled time is reached. It is an orchestration utility designed to introduce
    delays in automated workflows, allowing for asynchronous processing or waiting
    for specific conditions to be met before proceeding.


    Flow Description

    1. The action retrieves the delay parameters (Seconds, Minutes, Hours, Days) or
    the Cron Expression from the playbook configuration.

    2. It calculates the target date/time based on the provided inputs.

    3. It compares the current UTC time with the calculated target date.

    4. If the current time is before the target date, the action terminates with an
    `EXECUTION_STATE_INPROGRESS` status, effectively pausing the playbook execution.

    5. If the current time is at or after the target date, the action terminates with
    an `EXECUTION_STATE_COMPLETED` status, allowing the playbook to proceed to the
    next step.


    Additional Notes

    This action does not interact with external systems, modify case data, or perform
    entity enrichment. It is strictly an orchestration utility for controlling playbook
    timing and flow.
