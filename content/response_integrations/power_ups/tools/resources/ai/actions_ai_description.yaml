Add Comment to Entity Log:
  ai_description: >-
    ### General Description

    Adds a user-defined comment to the Entity Log for all entities in the current
    scope. This action is useful for documenting analyst findings or automated observations
    directly within the entity's activity history.


    ### Flow Description

    1. Extract the `User` and `Comment` parameters from the action configuration.

    2. Iterate through all entities present in `siemplify.target_entities`.

    3. For each entity, call the `add_comment_to_entity` function (from `TIPCommon`)
    to append the specified comment to the entity's log.

    4. Log the processing status for each entity.

    5. End the action with a summary message detailing the operations performed.


    ### Additional Notes

    This action modifies internal SOAR data (entity logs) but does not interact with
    or mutate any external systems.
