DNS Lookup:
  ai_description: >-
    ### General Description

    Performs DNS lookups on IP Address and Hostname entities using specified DNS servers.
    This action allows analysts to gather network context by querying DNS records
    for hostnames or performing reverse DNS lookups for IP addresses.


    ### Flow Description

    1. Retrieve the `DNS Servers` and `Data Type` parameters from the action configuration.

    2. Iterate through the `target_entities` provided in the case or alert.

    3. If the entity is an IP Address (`ADDRESS`), perform a reverse DNS lookup (PTR
    record) using the provided DNS servers.

    4. If the entity is a Hostname (`HOSTNAME`), perform a DNS query for the specified
    record type (e.g., A, AAAA, MX) using the provided DNS servers.

    5. Collect all successful DNS responses and store them in a structured JSON format.

    6. Output the results as a JSON object and terminate the action with a success
    or failure status.


