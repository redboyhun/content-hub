    ### General Description

    Normalizes entity enrichment data by remapping existing `additional_properties`
    keys to new, standardized key names. This action ensures consistency in entity
    data across different integrations by standardizing field names within the SOAR
    platform.


    ### Flow Description

    1. Retrieve the `Normalization Data` parameter, which contains a JSON list of
    mapping pairs (old field name to new field name).

    2. Iterate through all target entities provided in the action context.

    3. For each entity, iterate through the provided mapping pairs.

    4. If the `entitiy_field_name` exists in the entity's `additional_properties`,
    copy its value to the `new_name` key.

    5. If the `new_name` key does not exist, initialize it with an empty string.

    6. Update the entities in the SOAR platform using `siemplify.update_entities`.


