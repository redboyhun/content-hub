Wait for Playbook to Complete:
  ai_description: >-
    ### General Description

    This action pauses the current playbook execution until a specified target playbook
    or block completes its execution on the current alert or across the entire case.
    It is used for orchestration flow control, ensuring that dependent playbooks do
    not proceed until required prerequisites are met.


    ### Flow Description

    1. The action retrieves the `Playbook Name` parameter provided by the user.

    2. It determines the execution scope (Alert or Case) based on the current orchestration
    context.

    3. It calls the internal `get_workflow_instance_card` API to retrieve the status
    of the specified playbook for the relevant alert(s).

    4. The action evaluates the retrieved status:
        * If the target playbook is in progress, pending for user, or pending in queue,
    the action returns an `INPROGRESS` status, effectively pausing the current playbook.
        * If the target playbook has completed, failed, or terminated, or if it is
    not found, the action returns a `COMPLETED` status, allowing the current playbook
    to proceed.
    5. The action terminates with the appropriate result value and status.


    ### Additional Notes

    This action is strictly for orchestration flow control. It does not modify external
    systems, update alert data, or create insights. It relies on internal SOAR platform
    APIs to check workflow states.
