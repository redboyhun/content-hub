Get Original Alert Json:
  ai_description: >-
    ### General Description

    Retrieves the raw JSON content of the original alert(s) from the entity's additional
    properties. This action is useful for accessing the full, original alert data
    that may have been ingested into the SOAR platform.


    ### Flow Description

    1. Initialize the `SiemplifyAction` object.

    2. Determine the execution scope (Alert or Case).

    3. If the scope is `Alert`:
       - Access the first entity of the current alert.
       - Retrieve the `SourceFileContent` string from the entity's `additional_properties`.
       - Parse the string as JSON.
       - Add the parsed JSON to the action result.
    4. If the scope is `Case`:
       - Iterate through all alerts associated with the case.
       - For each alert, access the first entity.
       - Retrieve and parse the `SourceFileContent` from the entity's `additional_properties`.
       - Aggregate the parsed JSON objects.
       - Add the aggregated list to the action result.
    5. End the action with the retrieved JSON data.


    ### Additional Notes

    This action does not perform any external API calls. It relies on the presence
    of the `SourceFileContent` key within the `additional_properties` of the entities.
    If an alert has no entities, the action will not retrieve data for that alert.
