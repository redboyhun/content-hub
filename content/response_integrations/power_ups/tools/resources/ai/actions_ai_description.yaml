Lock Playbook:
  ai_description: >-
    ### General Description

    This action manages playbook execution flow by implementing a locking mechanism.
    It ensures that playbooks for alerts are executed sequentially or that all playbooks
    in a case are completed before proceeding, preventing race conditions or ensuring
    dependency order.


    ### Flow Description

    1. Determines the execution scope (Alert or Case).

    2. If in 'Alert' scope:
       - Sorts all alerts in the case by creation time.
       - Identifies the current alert's position.
       - If it is the first alert, the playbook proceeds immediately.
       - If it is not the first, it calls the `get_workflow_instance_card` API to
    check the status of the previous alert's playbook.
       - If the previous playbook is complete, it proceeds; otherwise, it pauses execution.
    3. If in 'Case' scope:
       - Iterates through all open alerts in the case.
       - Calls the `get_workflow_instance_card` API for each alert to verify if its
    playbook is complete.
       - If all are complete, it proceeds; otherwise, it pauses execution.

    ### Additional Notes

    This action is designed for orchestration flow control and does not perform external
    system mutations or entity enrichment. It relies on the SOAR platform's workflow
    status API to determine if the playbook should proceed or wait.
  ai_short_description: >-
    Controls playbook execution flow by locking the playbook until previous alert
    or case-wide playbooks are completed.
