Get Case SLA:
  ai_description: >-
    ### General Description

    Retrieves the Service Level Agreement (SLA) and critical SLA expiration times
    for the current case. This action provides visibility into the time remaining
    for the case or its current stage, formatted according to user-defined specifications.


    ### Flow Description

    1. Extracts the `DateTime Format` parameter (defaulting to "%Y-%m-%d %H:%M:%S").

    2. Calls the `get_case_overview_details` function from the `TIPCommon` library
    using the current `case_id` to fetch case metadata.

    3. Parses the response to extract `slaExpirationTime` and `criticalExpirationTime`
    from either the `sla` or `stageSla` sections of the case data.

    4. Converts the retrieved Unix timestamps into the specified date-time format.

    5. Adds the formatted SLA and critical SLA values to the action result as a JSON
    object.

    6. Outputs a summary message containing the formatted SLA and critical SLA details.


    ### Additional Notes

    This action is read-only and does not modify the case or any external systems.
    It is intended for reporting and monitoring purposes within the SOAR platform.
  ai_short_description: >-
    Retrieves and formats the SLA and critical SLA expiration times for the current
