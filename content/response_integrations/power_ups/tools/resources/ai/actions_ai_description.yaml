Delay Playbook:
  ai_description: >-
    ### General Description

    This action pauses the execution of a playbook for a specified duration. It is
    designed to introduce time-based delays in automated workflows, allowing for synchronization
    or waiting periods between steps.


    ### Flow Description

    1. The action retrieves the delay parameters (Seconds, Minutes, Hours, Days) from
    the configuration.

    2. It calculates a `target_date` by adding the specified duration to the current
    UTC time using the `arrow` library.

    3. It compares the `target_date` with the current UTC time.

    4. If the `target_date` has been reached, the action completes successfully.

    5. If the `target_date` has not been reached, the action sets the execution state
    to `INPROGRESS`, effectively pausing the playbook until the next execution cycle.


    ### Additional Notes

