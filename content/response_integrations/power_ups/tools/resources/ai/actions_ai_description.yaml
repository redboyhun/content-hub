Extract URL Domain:
  ai_description: >-
    ### General Description

    This action extracts the domain (and optionally the subdomain) from provided URL
    strings or from existing URL entities within the case. It enriches the entities
    by adding the extracted domain as an additional property and provides a structured
    JSON result of all extracted domains.


    ### Flow Description

    1. The action retrieves the `URLs` parameter and the `Extract subdomain` configuration.

    2. If `URLs` are provided, it splits them using the specified `Separator` and
    attempts to extract the domain from each URL using the `get_domain_from_string`
    utility.

    3. The action iterates through all `target_entities` in the current context.

    4. For each entity, it attempts to extract the domain from the entity identifier.

    5. If successful, it updates the entity's `additional_properties` with the key
    `siemplifytools_extracted_domain`.

    6. It compiles a JSON result containing the extraction status for both the provided
    URL parameters and the processed entities.

    7. Finally, it updates the entities in the SOAR platform and outputs the results.


    ### Additional Notes

    This action does not interact with external APIs; it performs local string parsing.
    It is useful for normalizing URL data for further analysis.
