    5. For each insight, if the content is a reference to an external blob (detected
    via regex), the action performs an HTTP GET request to the SDK API to retrieve
    and decode the actual insight content.

    6. The final aggregated JSON object, containing the filtered case data and parsed
    insights, is added to the action result using `siemplify.result.add_result_json`.


    ### Additional Notes

    If no `Case Id` is provided, the action defaults to the current case ID. If the
    `Fields to Return` parameter is empty, all available case fields are returned.
