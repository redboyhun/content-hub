Extract URL Domain:
  ai_description: >-
    ### General Description

    This action extracts the domain from provided URL strings or from the identifiers
    of target entities. It uses the `tldextract` library to parse domains and optionally
    includes subdomains in the output.


    ### Flow Description

    1. Retrieves the `URLs` parameter and `Extract subdomain` configuration.

    2. If `URLs` are provided, it splits them by the specified `Separator` and extracts
    the domain for each URL.

    3. Iterates through all `target_entities` provided to the action.

    4. For each entity, it attempts to extract the domain from the entity identifier.

    5. If successful, it updates the entity's `additional_properties` with the key
    `siemplifytools_extracted_domain`.

    6. Updates the entities in the SOAR platform using `siemplify.update_entities`.

    7. Adds a JSON result containing the extraction details for both parameters and
    entities.


    ### Additional Notes

