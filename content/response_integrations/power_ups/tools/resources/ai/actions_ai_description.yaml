Delay Playbook Synchronous:
  ai_description: >-
    General Description: This action pauses the execution of a playbook for a specified
    duration, up to a maximum of 30 seconds. It is useful for introducing delays between
    steps in an automated workflow.


    Flow Description:

    1. The action extracts the `Seconds` parameter from the configuration.

    2. It validates that the provided value is a positive number and falls within
    the allowed range (0 to 30 seconds).

    3. The action enters a loop, calculating the remaining time and using `time.sleep`
    to pause execution until the target time is reached.

    4. Upon completion, it returns a result message confirming the delay duration
    and the time it was reached.


    Additional Notes: This action is synchronous and will block the playbook execution
    thread for the duration of the delay.
