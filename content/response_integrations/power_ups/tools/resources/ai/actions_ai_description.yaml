  ai_description: >-
    ### General Description

    Performs DNS lookups on IP Address and Hostname entities using specified DNS servers.
    This action retrieves DNS records (such as PTR for IP addresses and various record
    types like A, AAAA, or MX for hostnames) to provide contextual intelligence about
    the entities.


    ### Flow Description

    1. Retrieves the list of DNS servers from the action parameters.

    2. Iterates through the target entities.

    3. If the entity is an IP Address (`ADDRESS`), it performs a reverse DNS lookup
    (PTR record) against the provided DNS servers.

    4. If the entity is a Hostname (`HOSTNAME`), it performs a DNS query for the specified
    record type (e.g., A, AAAA, MX) against the provided DNS servers.

    5. Collects the results (record type, response, DNS server used) into a JSON structure.

    6. Adds the collected results to the action output using `add_result_json`.


    ### Additional Notes

    The action is read-only and does not modify external systems or internal entity
    data. It is designed to provide additional context for investigation.
