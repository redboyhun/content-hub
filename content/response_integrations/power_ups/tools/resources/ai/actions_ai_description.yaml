Get Certificate Details:
  ai_description: >-
    ### General Description

    Retrieves SSL/TLS certificate details for a specified URL. This action performs
    a direct network connection to the target URL to inspect its certificate and returns
    the parsed details.


    ### Flow Description

    1. Extracts the `Url to check` parameter.

    2. Establishes a socket connection to the provided hostname on port 443.

    3. Wraps the socket with SSL/TLS (TLSv1.2 minimum).

    4. Retrieves the peer certificate in binary form.

    5. Parses the certificate to extract Common Name, Subject Alternative Names (SAN),
    Issuer, and validity dates.

    6. Calculates expiration status and self-signed status.

    7. Adds the resulting JSON object to the action results.


    ### Additional Notes

    This action does not interact with external APIs or modify any system state; it
    performs a direct network connection to the target URL to inspect its certificate.
