    1. Parses the `FieldsInput` and `SearchInData` parameters from the action configuration.

    2. Determines the execution scope (Alert or Case) and retrieves the relevant target
    entities using the `get_target_entities` utility.

    3. Iterates through each entity and extracts values from `additional_properties`
    based on the provided field names or regex patterns defined in `FieldsInput`.

    4. Applies regex transformations to the extracted values if a `RegexForFieldValue`
    is specified.

    5. Compares the processed entity values against the patterns defined in `SearchInData`.

    6. If a match is found, optionally updates the entity's `additional_properties`
    with a specified enrichment key if `ShouldEnrichEntity` is configured.

    7. Updates the entities in the SOAR platform if enrichment occurred.

    8. Returns a JSON result containing the findings for each entity.


