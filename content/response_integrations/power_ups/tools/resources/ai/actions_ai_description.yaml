Check Entities Fields In Text:
  ai_description: >-
    ### General Description

    This action searches for specific fields within an entity's `additional_properties`
    (or via regex patterns) and compares them against provided search data. It is
    a utility action designed to validate entity data against custom criteria and
    optionally enrich the entity if a match is found.


    ### Flow Description

    1. **Initialization**: The action parses the `FieldsInput` (JSON defining fields
    to test), `SearchInData` (JSON defining values to search for), `ShouldEnrichEntity`
    (optional enrichment key), and `IsCaseSensitive` parameters.

    2. **Entity Retrieval**: It retrieves the target entities based on the current
    execution scope (Alert or Case).

    3. **Data Processing**: For each entity, the action:
        * Extracts values from `additional_properties` based on the `FieldsInput`
    configuration, supporting regex for both field names and field values.
        * Compares the extracted values against the `SearchInData` using regex matching.
    4. **Enrichment**: If a match is found and `ShouldEnrichEntity` is provided, the
    action updates the entity's `additional_properties` with the specified key set
    to `True`.

    5. **Output**: The action updates the entities in the SOAR platform if enrichment
    occurred and returns a JSON result containing the match details.


    ### Additional Notes

    This action does not interact with external APIs. It is strictly an internal utility
    for data validation and entity property manipulation based on existing entity
    metadata.
