Update Case Description:
  ai_description: >-
    ### General Description

    Updates the description of the current case in Google SecOps. This action allows
    analysts to programmatically modify the case description, ensuring that case documentation
    remains accurate and up-to-date based on automated findings or analyst input.


    ### Flow Description

    1. The action retrieves the `Case Description` parameter provided by the user.

    2. The action retrieves the `case_id` from the current SOAR context.

    3. The action calls the `change_case_description` function from the `TIPCommon`
    library, which performs an internal API call to update the case description within
    the Google SecOps platform.

    4. The action concludes by ending the execution with a success message confirming
    the update.


    ### Additional Notes

