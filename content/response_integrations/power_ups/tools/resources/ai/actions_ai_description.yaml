    ### General Description

    Attaches a specified playbook to all alerts within the current case. This action
    automates the association of a workflow with every alert in a case, ensuring consistent
    handling and playbook execution across all related alerts.


    ### Flow Description

    1. Retrieve the `Playbook Name` parameter provided by the user.

    2. Iterate through all alerts associated with the current case using `siemplify.case.alerts`.

    3. For each alert, call the `attach_workflow_to_case` method using the provided
    playbook name, the current case ID, and the alert's unique identifier.

    4. Return a success or failure message based on the outcome of the attachment
    process.


