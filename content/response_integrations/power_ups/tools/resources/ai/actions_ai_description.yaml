Search Text:
  ai_description: >-
    ### General Description

    Searches for specific text or regex patterns within a provided input string. This
    utility action allows users to validate the presence of specific content or patterns
    within text data, returning a boolean result and detailed match information. It
    is designed for use in playbooks to facilitate conditional logic based on text
    content.


    ### Flow Description

    1. The action extracts the `Text` parameter, which serves as the input string
    to be searched.

    2. It extracts the `Search For` (literal string) and `Search For Regex` (comma-separated
    list of regex patterns) parameters.

    3. It determines if the search should be case-sensitive based on the `Case Sensitive`
    parameter.

    4. If `Search For` is provided, the action checks if the string exists within
    the input `Text`.

    5. If `Search For Regex` is provided, the action iterates through the list of
    regex patterns and performs a search on the input `Text` using the `re.search`
    method.

    6. If any match is found (either via literal string or regex), the result value
    is set to "true", and match details are appended to the JSON result.

    7. The final result is returned via `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is a utility tool and does not interact with external systems, modify
    case data, or perform entity enrichment. It is strictly for text processing and
