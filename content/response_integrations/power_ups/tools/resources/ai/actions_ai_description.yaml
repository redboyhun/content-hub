Spell Check String:
  ai_description: >-
    ### General Description

    The Spell Check String action validates the spelling of a provided input string.
    It calculates the accuracy percentage, identifies misspelled words, suggests corrections,
    and generates a corrected version of the input text. This action is designed as
    a utility tool to assist in text analysis and data cleaning within playbooks.


    ### Flow Description

    1. The action extracts the input string from the `String` parameter.

    2. The input string is processed by removing punctuation and splitting it into
    individual words.

    3. The action utilizes the `spellchecker` library to identify words that are not
    recognized.

    4. It calculates the accuracy percentage based on the ratio of correctly spelled
    words to the total word count.

    5. A corrected version of the input string is generated by replacing identified
    misspelled words with their suggested corrections.

    6. The results, including accuracy, total words, misspelled words, and the corrected
    string, are returned as a JSON object via `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is a utility tool and does not interact with external systems, nor
    does it modify any SOAR entities, insights, or case data.
