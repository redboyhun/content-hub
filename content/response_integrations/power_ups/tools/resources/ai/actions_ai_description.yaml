Wait for Playbook to Complete:
  ai_description: >-
    ### General Description

    This action pauses the current playbook execution until a specified target playbook
    or block completes its execution on the same alert or case. It is used for orchestration
    and synchronization within Google SecOps.


    ### Flow Description

    1. Retrieve the `Playbook Name` parameter.

    2. Determine the execution scope (Alert or Case).

    3. Call `get_workflow_instance_card` to fetch the status of the target playbook
    for the relevant alert(s).

    4. If the target playbook is in progress, pending for user, or pending in queue,
    the action returns an `INPROGRESS` status, effectively locking the current playbook.

    5. If the target playbook is completed, failed, or terminated, the action returns
    a `COMPLETED` status, releasing the lock.


    ### Additional Notes

    This action does not modify any external or internal data; it purely serves as
    a synchronization mechanism.
