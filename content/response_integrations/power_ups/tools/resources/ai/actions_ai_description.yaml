Search Text:
  ai_description: >-
    ### General Description

    Searches for specific strings or regex patterns within a provided text input.
    This utility action allows users to perform pattern matching on arbitrary text,
    returning a boolean result and detailed match information.


    ### Flow Description

    1. The action extracts the `Text` to be searched, the `Search For` string, the
    `Search For Regex` list, and the `Case Sensitive` flag from the action parameters.

    2. If `Search For` is provided, the action checks if the string exists within
    the `Text`, respecting the `Case Sensitive` flag.

    3. If `Search For Regex` is provided, the action iterates through the list of
    regex patterns and uses `re.search` to find matches within the `Text`.

    4. If any match is found, the action sets the result value to "true" and appends
    the match details (search pattern, input text, and match status) to a JSON result
    object.

    5. The action concludes by returning the result value and a summary message indicating
    whether a match was found.


    ### Additional Notes

    This is a utility action used for text processing and pattern matching within
    playbooks. It does not interact with external systems or modify SOAR data (entities,
    insights, or alerts).
