Get Certificate Details:
  ai_description: >-
    ### General Description

    Retrieves SSL/TLS certificate details for a specified URL. This action connects
    to the target host on port 443, extracts the certificate, and parses it to provide
    technical metadata regarding the certificate's validity, issuer, and subject information.


    ### Flow Description

    1. The action accepts a `Url to check` parameter.

    2. It establishes a socket connection to the provided hostname on port 443.

    3. It initiates an SSL/TLS handshake to retrieve the certificate in binary format.

    4. The action parses the certificate using the `cryptography` library to extract:
       - Common Name
       - Subject Alternative Names (SAN)
       - Issuer
       - Validity period (not_valid_before, not_valid_after)
       - Expiration status and days remaining
       - Self-signed status
    5. The gathered details are returned as a JSON object via `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is a utility tool for gathering technical context about a web resource's
    security configuration. It does not modify any entities or external systems.
