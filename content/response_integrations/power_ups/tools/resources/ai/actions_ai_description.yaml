Create Entity Relationships:
  ai_description: >-
    ### General Description

    Creates relationships between entities within a case or alert. This action allows
    users to link existing entities or create new ones and establish connections (Source,
    Destination, or Linked) between them. It also supports applying additional properties
    to entities via an optional JSON enrichment payload.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts input parameters, including entity
    identifiers, entity types, relationship direction, target entity types, and optional
    enrichment data.

    2. **Alert Identification**: It identifies the target alerts to process, which
    can be the current alert or all open alerts within the case.

    3. **Entity Matching**: For each alert, the action iterates through existing entities
    to find matches based on the specified `Target Entity Type` and `Target Entity
    Identifier(s)`.

    4. **Relationship Creation**: It calls the internal `create_entity` API to establish
    the requested relationships between the supplied entities and the target entities.

    5. **Enrichment Application**: If an `Enrichment JSON` payload is provided, the
    action updates the properties of the newly created or matched entities using `siemplify.update_entities`.

    6. **Result Reporting**: The action adds the result JSON to the execution output
    and completes the process.


