Find First Alert:
  ai_description: >-
    ### General Description

    This action identifies the first alert within a case by sorting all open alerts
    based on their creation time. It provides a way to determine if the current alert
    being processed is the earliest one in the case.


    ### Flow Description

    1. Retrieve all open alerts from the current case.

    2. Sort the retrieved alerts by their creation time in ascending order.

    3. Identify the first alert from the sorted list.

    4. Determine the execution scope (Alert or Case).

    5. If the scope is 'Alert', compare the current alert's identifier with the first
    alert's identifier and output whether it is the first alert.

    6. If the scope is 'Case', output the identifier of the first alert.


    ### Additional Notes

    This action does not interact with external systems and performs no mutations.
    It is purely analytical, operating on internal case data.
