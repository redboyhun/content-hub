Convert Into Simulated Case:
  ai_description: >-
    ### General Description

    Converts alert data into a simulated case format. This action extracts raw alert
    data from an entity's additional properties, modifies event fields, and exports
    the resulting JSON to a simulator or saves it as a file on the case wall.


    ### Flow Description

    1. Validates that the execution scope is 'Alert'. If the scope is 'Case', the
    action fails.

    2. Extracts action parameters: 'Push to Simulated Cases', 'Save JSON as Case Wall
    File', 'Override Alert Name', and 'Full path name'.

    3. Retrieves the 'SourceFileContent' from the first entity's additional properties.

    4. Parses the JSON data and updates event fields (e.g., 'DeviceEventClassId',
    'Name').

    5. Optionally updates the case name based on the 'Full path name' or 'Override
    Alert Name' parameters.

    6. If 'Push to Simulated Cases' is enabled, calls `import_simulator_custom_case`
    to push the data to the simulator.

    7. If 'Save JSON as Case Wall File' is enabled, encodes the JSON to base64 and
    adds it as an attachment to the case wall.

    8. Returns the final JSON result.


    ### Additional Notes

    This action requires the 'SourceFileContent' property to be present in the first
    entity's additional properties. It does not support case-level execution.
  ai_short_description: >-
    Converts alert data into a simulated case format and exports it to a simulator
