Spell Check String:
  ai_description: >-
    ### General Description

    The Spell Check String action evaluates the spelling of a provided input string.
    It utilizes the `pyspellchecker` library to identify misspelled words, calculate
    the overall accuracy percentage, and generate a corrected version of the input
    string. This action is a utility tool designed to assist in text validation tasks
    within a playbook.


    ### Flow Description

    1. The action extracts the "String" parameter from the input configuration.

    2. If the input string is empty, the action returns an accuracy of 0 and an output
    message indicating no input was provided.

    3. If the input string is not empty, the action splits the string into individual
    words.

    4. The `SpellChecker` library is used to identify unknown (misspelled) words.

    5. The action calculates the total number of misspelled words and the accuracy
    percentage based on the total word count.

    6. A corrected version of the input string is generated by replacing misspelled
    words with their most likely corrections.

    7. The action adds the detailed results (including the corrected string, accuracy,
    and list of misspelled words) to the action result JSON.

    8. The action concludes by setting the result value to the calculated accuracy
    percentage.


    ### Additional Notes

    This action is a pure utility and does not interact with any external systems,
    security entities, or platform alerts. It operates entirely on the provided input
    string.
  ai_short_description: >-
    Checks the spelling of an input string and returns the accuracy percentage, a
    list of misspelled words, and a corrected version of the string.
