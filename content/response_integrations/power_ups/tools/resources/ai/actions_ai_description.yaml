Attach Playbook to Alert:
  ai_description: >-
    General Description

    This action attaches one or more playbooks to a specific alert or all alerts within
    a case. It allows users to automate the assignment of playbooks to alerts, ensuring
    that necessary workflows are triggered as part of the incident response process.


    Flow Description

    1. The action extracts the 'Playbook Name' (a comma-separated list of playbooks)
    and the 'Allow Duplicates' (boolean) parameters.

    2. It determines the execution scope (Alert or Case) to identify the target alerts.

    3. It retrieves the target alert(s) using the `get_target_alerts` helper function.

    4. For each target alert, it checks which playbooks are already attached by calling
    the `get_workflow_instance_card` API.

    5. If a playbook is not already attached (or if 'Allow Duplicates' is set to true),
    it calls `Siemplify.attach_workflow_to_case` to attach the playbook to the alert.

    6. Finally, it constructs and returns a summary message detailing the success
    or failure of each attachment attempt.


    Additional Notes

    This action supports attaching multiple playbooks simultaneously by providing
    them as a comma-separated string. It also includes logic to prevent duplicate
    attachments unless explicitly allowed by the user.
