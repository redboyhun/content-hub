Change Case Name:
  ai_description: >-
    ### General Description

    Renames a case in Google SecOps SOAR. This action allows analysts to update the
    title of an existing case, which can be useful for standardizing case naming conventions
    or reflecting updated information.


    ### Flow Description

    1. The action determines the execution scope (Alert or Case) to understand the
    context of the operation.

    2. If the "Only If First Alert" parameter is enabled, the action retrieves all
    alerts associated with the case, sorts them by their detection time, and verifies
    if the current alert is the earliest one in the case.

    3. If the condition is met (or if the "Only If First Alert" parameter is disabled),
    the action calls the `rename_case` API to update the case title to the value provided
    in the "New Name" parameter.

    4. The action returns a success message confirming the case title has been updated.


    ### Additional Notes

