Delay Playbook V2:
  ai_description: >-
    ### General Description

    Pauses the execution of a playbook for a specified duration or until a cron-scheduled
    time is reached. This action is used to introduce delays in automated workflows,
    allowing for asynchronous processing or waiting for external conditions to be
    met.


    ### Flow Description

    1. The action receives time-based parameters (Seconds, Minutes, Hours, Days) or
    a Cron Expression.

    2. It calculates a target execution date based on the provided inputs.

    3. It compares the current UTC time against the target date.

    4. If the target date has not been reached, the action terminates with an `IN_PROGRESS`
    state, effectively pausing the playbook execution.

    5. If the target date has been reached, the action terminates with a `COMPLETED`
    state, allowing the playbook to proceed to the next step.


    ### Additional Notes

    This action is designed to be used in asynchronous playbook flows to introduce
    delays. It does not interact with external APIs or modify case data.
