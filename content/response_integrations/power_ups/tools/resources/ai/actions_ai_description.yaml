Get Case Data:
  ai_description: >-
    ### General Description

    This action retrieves comprehensive case data from the Google SecOps platform.
    It aggregates information including comments, entity details, insights, executed
    playbooks, alert information, and events. The action allows for granular control
    over the returned data by specifying fields and a delimiter for nested keys.


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the `Case Id`, `Fields to Return`,
    and `Nested Keys Delimiter` parameters.

    2. **Case Data Retrieval**: It calls `get_all_case_overview_details` to fetch
    the full case overview, including tags.

    3. **Data Filtering**: The retrieved case JSON is filtered based on the provided
    `Fields to Return` and `Nested Keys Delimiter`.

    4. **Insight Retrieval**: It calls `get_case_insights` to fetch all insights associated
    with the case.

    5. **Insight Content Resolution**: For each insight, if the content is a reference,
    the action performs an internal API call (`siemplify.session.get`) to retrieve
    the full insight content.

    6. **Result Aggregation**: The final aggregated JSON, containing the filtered
    case data and resolved insights, is returned via `siemplify.result.add_result_json`.


    ### Additional Notes

    This action is strictly read-only. It does not modify any case data, entities,
    or external systems. It is designed to provide analysts with a structured, filtered
    view of case information for further investigation.
