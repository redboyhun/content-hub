Normalize Entity Enrichment:
  ai_description: >-
    ### General Description

    Normalizes entity enrichment data by mapping existing entity fields to new, standardized
    keys within the entity's `additional_properties`. This action helps ensure consistency
    in entity data across different integrations or playbooks.


    ### Flow Description

    1. The action retrieves the `Normalization Data` parameter, which contains a JSON
    list of field mappings (old field name to new field name).

    2. It iterates through all target entities associated with the action.

    3. For each entity, it checks if the specified source field exists in the entity's
    `additional_properties`.

    4. If the source field exists, the value is copied to the new field name. If it
    does not exist, the new field is initialized with an empty string.

    5. The action updates the entities in the SOAR platform using `siemplify.update_entities`.

    6. The action completes by returning a summary of the number of entities updated.


    ### Additional Notes

