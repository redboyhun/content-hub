name: Mandiant ASM - Issues Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: entity_type
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: API Root
    default_value: https://asm-api.advantage.mandiant.com
    type: string
    description: 'API root of the Mandiant ASM instance. Note: if you want to authenticate
        with GTI credentials provide “https://www.virustotal.com” as API Root.'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Access Key
    default_value: ''
    type: password
    description: API Access Key of the Mandiant ASM account.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Secret Key
    default_value: ''
    type: password
    description: API Secret Key of the Mandiant ASM account.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: GTI API Key
    default_value: ''
    type: password
    description: 'Google Threat Intelligence API Key. Note: API Root should be “https://www.virustotal.com”
        to use this authentication. GTI API Key authentication has priority over other
        authentication.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Project Name
    default_value: ''
    type: string
    description: Project name that should be used in Mandiant ASM.  If Access Key
        & Secret Key is used for authentication, this parameter is mandatory.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Lowest Severity To Fetch
    default_value: ''
    type: string
    description: 'Lowest severity that needs to be used to fetch issues. Possible
        values: Informational, Low, Medium, High, Critical. If nothing is specified,
        the connector will ingest issues with all severities.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Hours Backwards
    default_value: '1'
    type: integer
    description: Number of hours before the first connector iteration to fetch issues
        from. This parameter applies to the initial connector iteration after you
        enable the connector for the first time, or used as a fallback value in cases
        where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Issues To Fetch
    default_value: '10'
    type: integer
    description: 'Specify the number of issues to process per one connector iteration.
        Default: 10.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: 'true'
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Mandiant ASM server is valid.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Use dynamic list as a blocklist
    default_value: 'false'
    type: boolean
    description: If enabled, dynamic lists will be used as a blocklist.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
description: 'Pull information about issues from Mandiant ASM. Note: The Dynamic List
    filter works with the "category" parameter.'
integration: MandiantASM
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/mandiant-asm#issues-connector
rules: []
is_connector_rules_supported: false
creator: admin
