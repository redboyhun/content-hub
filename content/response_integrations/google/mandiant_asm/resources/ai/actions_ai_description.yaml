Get ASM Entity Details:
  ai_description: >-
    ### General Description

    The **Get ASM Entity Details** action retrieves comprehensive information about
    specific entities within a Mandiant ASM project. It allows users to fetch the
    full metadata, technical details, geolocation data, and associated security findings
    for one or more entities by providing their unique identifiers.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Entity IDs** | String | Yes | A comma-separated list of Mandiant ASM entity
    UUIDs for which you want to retrieve detailed information. |


    ### Flow Description

    1. **Initialization**: The action sets up the connection to Mandiant ASM using
    the provided API credentials (either GTI API Key or Access/Secret Key pair) and
    the target Project Name.

    2. **Input Processing**: The comma-separated string of `Entity IDs` is parsed
    into a list of individual identifiers.

    3. **API Interaction**: For each provided ID, the action calls the Mandiant ASM
    API to retrieve the full 'raw' details of the entity.

    4. **Data Collection**: Successfully retrieved entity data is aggregated into
    a JSON result set.

    5. **Completion**: The action outputs the collected JSON data and provides a summary
    message indicating which entity IDs were successfully processed and which (if
    any) were not found or failed.
