Search Issues:
  ai_description: >-
    ### General Description

    Searches for security issues within Mandiant ASM based on a variety of user-defined
    criteria. This action allows analysts to query the Mandiant ASM platform for issues
    related to specific IDs, entity names, or tags, while applying filters for severity,
    status, and timeframes. The results are returned as a structured JSON list, providing
    detailed information about each matching issue.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Issue IDs | String | No | A comma-separated list of specific Mandiant issue
    IDs to retrieve. |

    | Entity IDs | String | No | A comma-separated list of Mandiant entity IDs to
    find related issues for. |

    | Entity Name | String | No | A comma-separated list of entity names (e.g., domains,
    IPs) to find related issues for. |

    | Time Parameter | String | No | Specifies whether to filter by 'First Seen' or
    'Last Seen' timestamps. |

    | Time Frame | String | No | The relative time window for the search (e.g., Last
    Hour, Last Week). If 'Custom' is selected, 'Start Time' must be provided. |

    | Start Time | String | No | The start date/time in ISO 8601 format. Required
    only if 'Time Frame' is set to 'Custom'. |

    | End Time | String | No | The end date/time in ISO 8601 format. If omitted during
    a 'Custom' search, the current time is used. |

    | Lowest Severity To Return | String | Yes | The minimum severity level (Informational
    to Critical) for issues to be included in the results. |

    | Status | String | No | Filters issues by their current status: 'Open' or 'Closed'.
    |

    | Tags | String | No | A comma-separated list of tags to filter the issues by.
    |

    | Max Issues To Return | Integer | No | The maximum number of issues to return
    (Default: 50, Max: 200). |


    ### Additional Notes

    - The 'Lowest Severity To Return' parameter is mandatory in the script logic,
    even if marked optional in some UI configurations.

    - If 'Custom' is selected for 'Time Frame', the 'Start Time' parameter must be
    populated with a valid ISO 8601 string.


    ### Flow Description

    1. **Parameter Initialization**: The action extracts configuration settings (API
    keys, project name) and user-provided search filters.

    2. **Time Range Calculation**: Based on the 'Time Frame' selection, the script
    calculates the start and end datetime objects for the API query.

    3. **Query Construction**: The action builds a complex query string for the Mandiant
    ASM API, incorporating filters for entity names, IDs, tags, status, and severity.

    4. **Data Retrieval**: The script performs a paginated search against the Mandiant
    ASM 'search_issues' endpoint, respecting the 'Max Issues To Return' limit and
    handling potential timeouts.

    5. **Result Processing**: The retrieved issues are parsed into a standard format
    and added to the action's JSON results for use in subsequent playbook steps.
