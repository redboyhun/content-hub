Search ASM Entities:
  ai_description: >-
    ### General Description

    Searches for entities within Mandiant ASM (Attack Surface Management) based on
    user-defined criteria. This action allows users to query the Mandiant ASM platform
    for specific assets, filtering by name, tags, vulnerability counts, and issue
    severity. It is primarily used for discovery and visibility into the external
    attack surface managed by Mandiant.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Entity Name | String | No | A comma-separated list of specific entity names
    to search for. |

    | Critical or High Issue | Boolean | No | If set to true, the search will only
    return entities that have at least one 'High' or 'Critical' severity issue. |

    | Minimum Vulnerabilities Count | Integer | No | Filters results to include only
    entities with a vulnerability count greater than or equal to this value. Must
    be a positive integer. |

    | Minimum Issues Count | Integer | No | Filters results to include only entities
    with an issue count greater than or equal to this value. Must be a positive integer.
    |

    | Tags | String | No | A comma-separated list of tags. Only entities associated
    with these tags will be returned. |

    | Max Entities To Return | Integer | No | The maximum number of entities to retrieve.
    Default is 50, with a hard limit of 200. |


    ### Additional Notes

    - The action requires valid Mandiant ASM credentials (either Client ID/Secret
    or a GTI API Key) and a Project Name configured in the integration settings.

    - If 'Max Entities To Return' exceeds 200, the action will automatically cap the
    results at 200.

    - This action does not process entities currently present in the Google SecOps
    case; it performs a global search based on the provided parameters.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves integration configuration (API keys, project
    name) and action parameters (filters, limits).

    2. **Validation**: Ensures that numerical parameters like 'Minimum Vulnerabilities
    Count', 'Minimum Issues Count', and 'Max Entities To Return' are valid positive
    integers.

    3. **Query Construction**: Builds a complex query string for the Mandiant ASM
    API, incorporating the specified names, tags, severity flags, and count thresholds.

    4. **API Interaction**: Authenticates with the Mandiant ASM service and performs
    a paginated search for entities matching the query.

    5. **Data Processing**: Collects the results, respecting the defined limit and
    handling potential timeouts gracefully.

    6. **Output**: Returns the found entities as a JSON object and provides a summary
    message to the user.
