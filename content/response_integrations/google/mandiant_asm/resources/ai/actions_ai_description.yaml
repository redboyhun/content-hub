Update Issue:
  ai_description: >-
    ### General Description\nUpdates the status of a specific issue within the Mandiant
    ASM platform. This action allows security analysts to programmatically manage
    the lifecycle of discovered issues by transitioning them between various states
    such as 'In Progress', 'Resolved', or 'False Positive'.\n\n### Parameters Description\n|
    Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n|
    **Issue ID** | String | Yes | The unique identifier (UUID or ID) of the issue
    that needs to be updated. |\n| **Status** | Enum | Yes | The target status to
    set for the issue. Options include: New, Triaged, In Progress, Resolved, Duplicate,
    Out Of Scope, Not A Security Issue (Benign), Risk Accepted, False Positive, Unable
    To Reproduce, Tracked Externally, and Mitigated. |\n\n### Additional Notes\n-
    The action requires a valid project configuration in the integration settings
    to correctly route the update request.\n- If \"Select One\" is chosen as the status,
    the action will fail with a validation error.\n\n### Flow Description\n1. **Parameter
    Extraction**: Retrieves the Issue ID and the desired Status from the action input.\n2.
    **Validation**: Checks if a valid status (other than \"Select One\") has been
    provided.\n3. **Manager Initialization**: Establishes a connection to the Mandiant
    ASM API using the provided credentials and project settings.\n4. **Update Execution**:
    Sends a POST request to the Mandiant ASM endpoint to update the status of the
    specified issue.\n5. **Data Retrieval**: Fetches the updated issue details from
    the API to confirm the change.\n6. **Result Reporting**: Returns the updated issue
    object as a JSON result and provides a success message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status of a specific issue in Mandiant ASM via a POST request to
      the status endpoint.
    fetches_data: true
    internal_data_mutation_explanation: null
