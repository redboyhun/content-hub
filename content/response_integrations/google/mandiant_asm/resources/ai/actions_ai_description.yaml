Ping:
  ai_description: >-
    Verifies connectivity to the Mandiant ASM server using the provided configuration
    parameters. This action ensures that the integration can successfully communicate
    with the Mandiant ASM API and that the specified project is accessible.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL for the Mandiant ASM API. |

    | Access Key | String | No | Mandiant ASM Access Key. Required if GTI API Key
    is not provided. |

    | Secret Key | String | No | Mandiant ASM Secret Key. Required if GTI API Key
    is not provided. |

    | GTI API Key | String | No | API key for GTI services. Required if Access/Secret
    keys are not provided. |

    | Project Name | String | No | The name of the project to validate. |

    | Verify SSL | Boolean | Yes | Specifies if the SSL certificate should be validated.
    |


    ### Additional Notes

    Either the combination of 'Access Key' and 'Secret Key' or the 'GTI API Key' must
    be provided for the action to run successfully.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves connection details and credentials from
    the integration configuration.

    2. **Manager Initialization**: Initializes the Mandiant ASM Manager with the provided
    settings.

    3. **Credential Validation**: Checks that the provided keys do not contain invalid
    characters and that at least one authentication method is provided.

    4. **Connectivity Test**: Executes a GET request to the Mandiant ASM API to list
    projects.

    5. **Project Validation**: If a Project Name is provided, the action verifies
    that the project exists within the account.

    6. **Result Reporting**: Returns a success message if connectivity is established
    and the project is found; otherwise, it reports a failure with the specific reason.
