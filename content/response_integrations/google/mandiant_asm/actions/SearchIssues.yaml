name: Search Issues
description: Search Issues that match the specified criteria in the action Parameters.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/mandiant-asm#search-issues
integration_identifier: MandiantASM
parameters:
-   name: Issue IDs
    type: string
    description: Specify a comma-separated list of issue ids, for which you want to
        return details.
    is_mandatory: false
-   name: Entity IDs
    type: string
    description: Specify a comma-separated list of entity ids for which you want to
        find related issues.
    is_mandatory: false
-   name: Entity Name
    type: string
    description: Specify a comma-separated list of entity names for which you want
        to find related issues.
    is_mandatory: false
-   name: Time Parameter
    default_value: First Seen
    type: ddl
    optional_values:
    - First Seen
    - Last Seen
    description: Specify what parameter should be used for filtering time.
    is_mandatory: false
-   name: Time Frame
    default_value: Last Hour
    type: ddl
    optional_values:
    - Last Hour
    - Last 6 Hours
    - Last 24 Hours
    - Last Week
    - Last Month
    - Custom
    description: Specify a time frame for the issues. If “Custom” is selected, you
        also need to provide “Start Time”.
    is_mandatory: false
-   name: Start Time
    type: string
    description: 'Specify the start time for the results. This parameter is mandatory,
        if “Custom” is selected for the “Time Frame” parameter. Format: ISO 8601'
    is_mandatory: false
-   name: End Time
    type: string
    description: 'Specify the end time for the results. Format: ISO 8601. If nothing
        is provided and “Custom” is selected for the “Time Frame” parameter then this
        parameter will use current time.'
    is_mandatory: false
-   name: Lowest Severity To Return
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Informational
    - Low
    - Medium
    - High
    - Critical
    description: Specify the lowest severity that should be used to return the issues.
        If “Select One” is selected, this filter is not applied during the search.
    is_mandatory: false
-   name: Status
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Open
    - Closed
    description: Specify the status filter for the search. If “Select One” is selected,
        this filter is not applied during the search.
    is_mandatory: false
-   name: Tags
    type: string
    description: Specify a comma-separated list of tag names, which should be used,
        when searching for the issues.
    is_mandatory: false
-   name: Max Issues To Return
    default_value: '50'
    type: string
    description: 'Specify how many issues to return. Default: 50. Maximum is 200.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/search_issues_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: admin
