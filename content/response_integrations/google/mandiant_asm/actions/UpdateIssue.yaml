name: Update Issue
description: Update an issue in Mandiant ASM.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/mandiant-asm#update_issue
integration_identifier: MandiantASM
parameters:
-   name: Issue ID
    type: string
    description: Specify the ID of the issue that needs to be updated.
    is_mandatory: true
-   name: Status
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - New
    - Triaged
    - In Progress
    - Resolved
    - Duplicate
    - Out Of Scope
    - Not A Security Issue (Benign)
    - Risk Accepted
    - False Positive
    - Unable To Reproduce
    - Tracked Externally
    - Mitigated
    description: Specify what status to set for the issues.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/update_issue_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
