name: Search ASM Entities
description: Search entities in Mandiant ASM.
integration_identifier: MandiantASM
parameters:
-   name: Entity Name
    type: string
    description: Specify a comma-separated list of entity names for which you want
        to find entities.
    is_mandatory: false
-   name: Critical or High Issue
    default_value: false
    type: boolean
    description: Specify whether to include only entities with High or Critical Issues.
    is_mandatory: false
-   name: Minimum Vulnerabilities Count
    default_value: ''
    type: string
    description: Specify how many vulnerabilities should be related to the entity
        for it to be returned.
    is_mandatory: false
-   name: Minimum Issues Count
    default_value: ''
    type: string
    description: Specify how many issues should be related to the entity for it to
        be returned.
    is_mandatory: false
-   name: Tags
    type: string
    description: Specify a comma-separated list of tag names, which should be used,
        when searching for the entities.
    is_mandatory: false
-   name: Max Entities To Return
    default_value: '50'
    type: string
    description: 'Specify how many entities to return. Default: 50. Maximum is 200.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/search_asm_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: admin
