name: Remove IP from Address Group
description: 'Remove IP address from specific SonicWall Address Group. Caution: Successful
    action execution commits all uncommitted changes. This is a SonicWall limitation.'
integration_identifier: SonicWall-Beta
parameters:
-   name: Group Name
    default_value: ''
    type: string
    description: Specify from which group you want to remove the IP address. Groups
        that contain unicode characters are not supported. This is a SonicWall limitation.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
