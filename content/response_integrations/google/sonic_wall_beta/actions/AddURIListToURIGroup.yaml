name: Add URI List to URI Group
description: 'Add URI List to SonicWall URI Group. Caution: Successful action execution
    commits all uncommitted changes. This is a SonicWall limitation. Requires SonicOS
    6.5.3 or higher.'
integration_identifier: SonicWall-Beta
parameters:
-   name: URI List Name
    default_value: ''
    type: string
    description: Specify which URI List you want to add the URI Group. URI Lists that
        contain unicode characters are not supported. This is a SonicWall limitation.
    is_mandatory: true
-   name: URI Group Name
    default_value: ''
    type: string
    description: Specify to which URI Group you want to add the URI List. URI Groups
        that contain unicode characters are not supported. This is a SonicWall limitation.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
