Add URI List to URI Group:
  ai_description: >-
    ### General Description

    Adds a URI list to a specific URI group within the SonicWall Content Filtering
    Service (CFS). This action is used to organize and manage web filtering policies
    by grouping multiple URI lists together. It performs a configuration update on
    the SonicWall device and automatically commits the changes.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | URI List Name | String | Yes | The name of the existing URI list that should
    be added to the group. |

    | URI Group Name | String | Yes | The name of the URI group where the specified
    URI list will be added. |


    ### Flow Description

    1. **Authentication**: The action authenticates with the SonicWall API using the
    configured credentials to establish a session.

    2. **Update URI Group**: It sends a PUT request to the SonicWall URI list groups
    endpoint, including the URI list name in the payload for the specified group.

    3. **Commit Changes**: The action sends a POST request to the SonicWall confirmation
    endpoint to apply and save the configuration changes permanently.


    ### Additional Notes

    This action is a configuration management task and does not process or enrich
    specific entities from the Google SecOps case.
