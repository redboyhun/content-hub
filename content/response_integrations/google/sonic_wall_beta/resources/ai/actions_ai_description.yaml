Add URL to URI List:
  ai_description: "### General Description\nAdds URL entities to a specified URI List\
    \ on a SonicWall device. This action is used for managing content filtering or\
    \ access control lists by programmatically inserting new URLs into existing URI\
    \ list objects. \n\n**Caution:** Due to SonicWall limitations, a successful execution\
    \ of this action will commit **all** uncommitted configuration changes on the\
    \ device, not just the changes related to this action. This requires SonicOS version\
    \ 6.5.3 or higher.\n\n### Parameters Description\n| Parameter Name | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| URI List Name | String | Yes\
    \ | The name of the specific SonicWall URI List where the URLs should be added.\
    \ Note: URI lists containing Unicode characters are not supported. |\n\n### Additional\
    \ Notes\n- The action iterates through all URL entities found in the alert context.\n\
    - If the specified URI List does not exist in SonicWall, the action will fail\
    \ for all entities.\n- The action performs a 'commit' operation (`confirm_changes`)\
    \ after each successful URL addition, which affects the entire device configuration\
    \ state.\n\n### Flow Description\n1. **Parameter Extraction:** Retrieves the target\
    \ URI List name from the action parameters and connection details from the integration\
    \ configuration.\n2. **Entity Filtering:** Identifies all entities of type `URL`\
    \ (DestinationURL) within the current scope.\n3. **External Interaction (Add):**\
    \ For each identified URL, it sends a `PUT` request to the SonicWall API to add\
    \ the URL to the specified URI list.\n4. **External Interaction (Commit):** After\
    \ adding a URL, it sends a `POST` request to the SonicWall `config/pending` endpoint\
    \ to commit the changes.\n5. **Result Reporting:** Tracks successes and failures\
    \ for each entity and provides a summary message in the action output."
