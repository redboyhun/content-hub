Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and a SonicWall server.\
    \ It ensures that the provided integration configuration parameters (API Root,\
    \ Username, Password, and SSL settings) are correct and that the SonicWall API\
    \ is reachable and responding to requests.\n\n### Parameters Description\n\n|\
    \ Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | API Root | String | Yes | The base URL of the SonicWall API (e.g., `https://<firewall-ip>`).\
    \ |\n| Username | String | Yes | The username used to authenticate with the SonicWall\
    \ device. |\n| Password | String | Yes | The password used to authenticate with\
    \ the SonicWall device. |\n| Verify SSL | Boolean | Yes | If set to `True`, the\
    \ action will verify the SSL certificate of the SonicWall server. Default is `True`.\
    \ |\n\n### Additional Notes\n- This action is typically used during the initial\
    \ setup of the integration or for troubleshooting communication issues.\n- It\
    \ performs an authentication handshake followed by a status check.\n\n### Flow\
    \ Description\n1. **Configuration Extraction:** The action retrieves the connection\
    \ details (API Root, Username, Password, and SSL verification flag) from the integration's\
    \ configuration settings.\n2. **Authentication:** It initializes the `SonicWallManager`,\
    \ which immediately attempts to establish an authenticated session with the SonicWall\
    \ API using a POST request to the authentication endpoint.\n3. **Connectivity\
    \ Check:** Once authenticated, the action calls the `test_connectivity` method,\
    \ which sends a GET request to the SonicWall status endpoint (`api/sonicos/user/status/all`).\n\
    4. **Outcome Reporting:** \n    - If both the authentication and the status check\
    \ succeed, the action completes with a success message.\n    - If an `UnauthorizedException`\
    \ occurs, it reports an authentication failure.\n    - If any other network or\
    \ system error occurs, it reports a connection failure with the specific error\
    \ details."
