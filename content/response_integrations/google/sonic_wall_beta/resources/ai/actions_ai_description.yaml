List URI Lists:
  ai_description: >-
    ### General Description

    Lists URI lists configured on a SonicWall device. This action is useful for administrators
    and security analysts to audit or verify the existing content filtering configurations
    on the firewall. It requires SonicOS version 6.5.3 or higher to function correctly.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max URI Lists To Return | Integer | No | Specifies the maximum number of URI
    lists to retrieve and display in the results. If set to 0 or less, it defaults
    to 100. |


    ### Additional Notes

    - This action does not require any input entities and operates as a global discovery
    task.

    - The results are presented both as a summary data table and a detailed JSON object
    for further automation steps.


    ### Flow Description

    1. **Authentication**: The action establishes a session with the SonicWall API
    using the provided API Root, Username, and Password.

    2. **Data Retrieval**: It sends a GET request to the SonicWall endpoint to fetch
    all available URI list objects.

    3. **Filtering**: The retrieved list is truncated based on the 'Max URI Lists
    To Return' parameter.

    4. **Output Generation**: The action processes the raw data to create a summary
    table (containing the list name and URI count) and a full JSON representation
    of the URI lists, which are then attached to the action results in Google SecOps.
