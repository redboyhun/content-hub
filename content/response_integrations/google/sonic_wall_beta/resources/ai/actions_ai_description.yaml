Create CFS Profile:
  ai_description: "### General Description\nCreates a new Content Filtering Service\
    \ (CFS) profile on a SonicWall firewall. This action allows administrators to\
    \ define web filtering policies, including allowed/forbidden URI lists, search\
    \ order, and safety filters for search engines and YouTube. \n\n**Note:** Due\
    \ to SonicWall architecture, successful execution of this action will commit all\
    \ uncommitted configuration changes on the device.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Name | String | Yes | The unique name for the CFS Profile. Unicode characters\
    \ are not supported. |\n| Allowed URI List or Group | String | No | The name of\
    \ the URI list or group to be allowed by this profile. |\n| Forbidden URI List\
    \ or Group | String | No | The name of the URI list or group to be forbidden by\
    \ this profile. |\n| Search Order | Enum | Yes | Determines the priority of URI\
    \ lists. Options: `Allowed URI First`, `Forbidden URI First`. |\n| Operation for\
    \ Forbidden URI | Enum | Yes | Action to take when a forbidden URI is accessed.\
    \ Options: `Block`, `Confirm`, `Passphrase`. |\n| Enable Smart Filter | Boolean\
    \ | Yes | If true, enables the SonicWall Smart Filter feature. |\n| Enable Google\
    \ Safe Search | Boolean | Yes | If true, enforces Google Safe Search for users\
    \ under this profile. |\n| Enable Youtube Restricted Mode | Boolean | Yes | If\
    \ true, enforces YouTube Restricted Mode. |\n| Enable Bing Safe Search | Boolean\
    \ | Yes | If true, enforces Bing Safe Search. |\n\n### Additional Notes\n- This\
    \ action requires SonicOS 6.5.3 or higher.\n- **Caution:** Executing this action\
    \ triggers a configuration commit (`/api/sonicos/config/pending`), which applies\
    \ all pending changes on the SonicWall appliance, not just the CFS profile creation.\n\
    \n### Flow Description\n1. **Authentication:** The action authenticates with the\
    \ SonicWall API using the provided credentials.\n2. **Parameter Extraction:**\
    \ Retrieves the profile configuration, including URI lists and safety filter toggles.\n\
    3. **Profile Creation:** Sends a POST request to the SonicWall `content-filter/profiles`\
    \ endpoint with the specified configuration.\n4. **Configuration Commit:** Executes\
    \ a follow-up request to confirm and commit the changes to the device's running\
    \ configuration."
  capabilities:
