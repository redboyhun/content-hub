Remove IP from Address Group:
  ai_description: >-
    Removes IP address entities from a specified SonicWall Address Group. This action
    identifies the correct address object within SonicWall associated with the entity's
    IP (supporting both IPv4 and IPv6), removes it from the target group, and commits
    the configuration changes.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group Name | String | Yes | The name of the SonicWall Address Group from which
    the IP addresses should be removed. Note: Groups with unicode characters are not
    supported due to SonicWall limitations. |


    ### Flow Description

    1. **Validation**: Iterates through the provided Address entities and determines
    if they are valid IPv4 or IPv6 addresses.

    2. **Group Verification**: Checks the SonicWall device to ensure the specified
    'Group Name' exists for the relevant IP types.

    3. **Object Mapping**: Retrieves all address objects from SonicWall to map the
    entity's IP address to its internal SonicWall object name.

    4. **Removal**: Executes a delete request to remove the identified address objects
    from the specified group.

    5. **Commit**: Calls the SonicWall 'confirm' endpoint to commit the changes. **Note**:
    This action commits all pending changes on the SonicWall device, not just the
    removal performed by this action.


    ### Additional Notes

    - This action performs a state change on the external SonicWall firewall.

    - Due to SonicWall API limitations, successful execution will commit all uncommitted
    changes currently pending on the device.
