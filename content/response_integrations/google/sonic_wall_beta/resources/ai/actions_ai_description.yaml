List URI Groups:
  ai_description: >-
    ### General Description

    Lists SonicWall URI Groups from the target appliance. This action is used to retrieve
    a list of configured URI groups, providing visibility into the content filtering
    structure of the SonicWall device. It is primarily a discovery and auditing tool.
    This action requires SonicOS 6.5.3 or higher.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max URI Groups To Return | Integer | No | Specifies the maximum number of URI
    Groups to return in the output. The default value is 100. If a value of 0 or less
    is provided, the action will use the default limit of 100. |


    ### Flow Description

    1. **Authentication**: The action initializes a session with the SonicWall appliance
    using the provided API Root, Username, and Password.

    2. **Data Retrieval**: It calls the SonicWall API to fetch all available URI list
    groups from the content filter configuration.

    3. **Result Slicing**: The retrieved list is truncated based on the user-defined
    `Max URI Groups To Return` parameter.

    4. **Data Transformation**: The action parses the raw API response into a structured
    format, counting the number of URI lists and URI groups associated with each entry.

    5. **Output**: The results are presented as a data table named "Available URI
    Groups" and a raw JSON object for downstream playbook processing.
