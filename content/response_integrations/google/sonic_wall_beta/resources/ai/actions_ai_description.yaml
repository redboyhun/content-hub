Add IP to Address Group:
  ai_description: >-
    ### General Description\nAdds IP address entities to a specific SonicWall Address
    Group. This action creates a new address object for the entity in a specified
    zone and then associates that object with the target group. It supports both IPv4
    and IPv6 addresses.\n\n### Parameters Description\n| Parameter | Type | Mandatory
    | Description |\n| :--- | :--- | :--- | :--- |\n| **Group Name** | String | Yes
    | Specify to which group you want to add IP address. Groups that contain unicode
    characters are not supported. |\n| **IP Zone** | String | Yes | Specify the zone
    of the IP address that you want to add. |\n\n### Additional Notes\n**Caution:**
    Successful action execution commits all uncommitted changes on the SonicWall device.
    This is a known limitation of the SonicWall API.\n\n### Flow Description\n1. **Initialization**:
    Connects to the SonicWall API using provided credentials.\n2. **Entity Filtering**:
    Identifies all ADDRESS entities in the current context.\n3. **Validation**: For
    each IP, it determines if it is IPv4 or IPv6 and verifies if the target Group
    Name exists on the SonicWall device for that specific IP version.\n4. **Object
    Creation**: Creates a new address object for the IP entity, associating it with
    the specified IP Zone.\n5. **Group Update**: Adds the newly created address object
    to the target Address Group.\n6. **Commit**: Executes a configuration confirmation
    to apply the changes.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new address object for the IP and adds it to the specified address
      group. Note that this action also triggers a configuration commit, which applies
      all pending changes on the SonicWall device.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
