List Address Groups:
  ai_description: >-
    ### General Description

    This action lists Address Groups from a SonicWall security appliance. It allows
    security analysts to discover existing network groupings defined on the firewall,
    which is useful for auditing configurations or preparing for policy changes. The
    action retrieves details such as the group name and its unique identifier (UUID).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Address Type | String | No | Determines the protocol version of the address
    groups to retrieve. Options are 'IPv4', 'IPv6', or 'All'. Defaults to 'IPv4'.
    |

    | Max Address Groups To Return | Integer | No | Sets a limit on the number of
    address groups returned in the results. Defaults to 100. If a value <= 0 is provided,
    it defaults to 100. |


    ### Additional Notes

    - This is a discovery/utility action and does not operate on specific entities
    within a case.

    - The action requires valid SonicWall API credentials (Username, Password, and
    API Root) configured in the integration settings.


    ### Flow Description

    1. **Initialization**: The action extracts the connection settings and user-provided
    parameters (`Address Type` and `Max Address Groups To Return`).

    2. **Authentication**: It establishes a session with the SonicWall appliance using
    the provided credentials.

    3. **Data Retrieval**: Depending on the `Address Type` parameter, the action makes
    GET requests to the SonicWall API to fetch IPv4 groups, IPv6 groups, or both.

    4. **Processing**: The retrieved groups are truncated to match the `Max Address
    Groups To Return` limit.

    5. **Output**: The action generates a data table for each address type found and
    attaches the raw data as a JSON result to the action execution.
