name: McAfee ESM Connector
parameters:
-   name: DeviceProductField
    default_value: data_type
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: alarmName
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: srcZone
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: PythonProcessTimeout
    default_value: 300
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: API Root
    default_value: https://{ip address}/rs/
    type: string
    description: 'API root of the McAfee ESM instance. Format: https://{ip address}/rs/'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: Username of the McAfee ESM account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: Password of the McAfee ESM account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Product Version
    default_value: ''
    type: string
    description: 'Version of Mcafee ESM. Possible values: 11.1, 11.2, 11.3, 11.4,
        11.5.'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Use AES Encryption
    default_value: false
    type: boolean
    description: 'If enabled, integration will authenticate using AES Encryption and
        will not do Base64 inside the code. Note: you need to provide Login and Password
        already as Base64 encoded strings.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If enabled, verifies that the SSL certificate for the connection
        to the McAfee ESM server is valid.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Lowest Severity To Fetch
    default_value: 0
    type: integer
    description: The lowest severity that needs to be used to fetch alarms. Possible
        values are in range from 0 to 100. If nothing is specified, the connector
        ingests alarms with all severities.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Ingest 0 Source Event Alarms
    default_value: true
    type: boolean
    description: 'If enabled, action will ingest alarms that have 0 source events.
        Note: this can have an impact on the values that come from parameters “Product
        Field Name”, “Event Field Name”, “Rule Generator Field Name”. Connector will
        wait the time that is provided in the parameter “Padding Time”, if the parameter
        is disabled.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Padding Time
    default_value: 1
    type: integer
    description: 'The number of hours that connector will use for padding. Note: this
        parameter describes how long the connector will wait to ingest the alarm with
        0 source events, if "Ingest 0 Source Event Alarms" is disabled. Maximum: 6
        hours.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Time Format
    default_value: '%m/%d/%Y %H:%M:%S'
    type: string
    description: Time format that will be used to read the timestamp provided in McAfee
        ESM. If nothing is provided or invalid time format is provided, then the connector
        will not perform the transformation.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Time Zone
    default_value: ''
    type: integer
    description: 'Time zone of the source event. This parameter is needed to transform
        the timestamp into the format that reflects UTC+0 time. Note: this parameter
        is ignored, if invalid values are provided in the "Time Format" parameter
        or nothing is provided there.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        alarms from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Alarms To Fetch
    default_value: 100
    type: integer
    description: 'The number of alarms to process per one connector iteration. Default:
        100.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Use dynamic list as a blacklist
    default_value: false
    type: boolean
    description: If enabled, dynamic lists will be used as a blacklist.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Rule Generator Field Name
    default_value: alarmName
    type: string
    description: 'Name of the field that will be used in the rule generator. Note:
        action will use "alarmName", if value is not available and this parameter
        is only applied to the values that come from source events.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Secondary Device Product Field
    default_value: ''
    type: string
    description: Fallback product field name.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Disable Overflow
    default_value: false
    type: boolean
    description: If enabled, the connector will disable the overflow mechanism.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Disable Overflow For Alarm Names
    default_value: ''
    type: string
    description: 'A comma-separated list of alarm names for which connector will ignore
        overflow. Note: requires "Disable Overflow" to be enabled.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
description: 'Pull information about alarms from McAfee ESM. Note: The dynamic list
    filter works with the "alarmName" parameter.'
integration: McAfeeESM
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/mcafee-esm#mcafee-esm-connector
rules: []
is_connector_rules_supported: false
creator: admin
