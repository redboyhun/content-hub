name: Send Entity Query To ESM
description: 'Send a query to ESM based on entities. Supported entities: IP Address,
    Hostname. Note: Action is running as async, please adjust script timeout value
    in Chronicle SOAR IDE for action as needed.'
integration_identifier: McAfeeESM
parameters:
-   name: IP Address Entity Key
    default_value: Alert.SrcIP
    type: string
    description: 'Specify the key that will be used with the IP Address entity during
        filtering. Note: if invalid key is provided, the action will still return
        results, but they will be unexpected.'
    is_mandatory: true
-   name: Hostname Entity Key
    default_value: Alert.4
    type: string
    description: 'Specify the key that will be used with the Hostname entity during
        filtering. Note: if invalid key is provided, the action will still return
        results, but they will be unexpected.'
    is_mandatory: true
-   name: Time Range
    default_value: LAST_HOUR
    type: ddl
    optional_values:
    - LAST_HOUR
    - LAST_MINUTE
    - LAST_10_MINUTES
    - LAST_30_MINUTES
    - CURRENT_DAY
    - PREVIOUS_DAY
    - LAST_24_HOURS
    - LAST_2_DAYS
    - LAST_3_DAYS
    - CURRENT_WEEK
    - PREVIOUS_WEEK
    - CURRENT_MONTH
    - PREVIOUS_MONTH
    - CURRENT_QUARTER
    - PREVIOUS_QUARTER
    - CURRENT_YEAR
    - PREVIOUS_YEAR
    - CUSTOM
    description: Specify a time frame for the results. If "Custom" is selected, you
        also need to provide "Start Time".
    is_mandatory: true
-   name: Start Time
    default_value: ''
    type: string
    description: 'Specify the start time for the results. This parameter is mandatory,
        if "Custom" is selected for the "Time Frame" parameter. Format: ISO 8601'
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'Specify the end time for the results. Format: ISO 8601. If nothing
        is provided and "Custom" is selected for the "Time Frame" parameter then this
        parameter will use current time.'
    is_mandatory: false
-   name: Filter Field Name
    default_value: ''
    type: string
    description: Specify the field name that will be used for filtering.
    is_mandatory: true
-   name: Filter Operator
    default_value: EQUALS
    type: ddl
    optional_values:
    - EQUALS
    - IN
    - NOT_IN
    - GREATER_OR_EQUALS_THAN
    - LESS_OR_EQUALS_THAN
    - DOES_NOT_EQUAL
    - CONTAINS
    - DOES_NOT_CONTAIN
    description: Specify the operator that should be used in the filter.
    is_mandatory: true
-   name: Filter Values
    default_value: ''
    type: string
    description: Specify a comma-separated list of values that will be used in the
        filter.
    is_mandatory: true
-   name: Fields To Fetch
    default_value: ''
    type: string
    description: Specify a comma-separated list of fields that should be returned.
        If nothing is provided, action will use the predefined fields.
    is_mandatory: false
-   name: Sort Field
    default_value: ''
    type: string
    description: 'Specify what parameter should be used for sorting. Note: this parameter
        expects the field in the format {table}.{key name}. If the parameter is provided
        in another format, action will skip it. Example: Alert.LastTime.'
    is_mandatory: false
-   name: Sort Order
    default_value: ASC
    type: ddl
    optional_values:
    - ASC
    - DESC
    description: Specify the order of sorting.
    is_mandatory: false
-   name: Max Results To Return
    default_value: 50
    type: string
    description: 'Specify how many results to return. Default: 50. Maximum: 200.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/send_entity_query_to_esm_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
