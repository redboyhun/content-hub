name: Get Similar Events
description: 'Get events related to the entities in McAfee ESM. Supported entities:
    Hostname, IP Address, User. Note: Action is running as async, please adjust script
    timeout value in Chronicle SOAR IDE for action as needed.'
integration_identifier: McAfeeESM
parameters:
-   name: Hours Back
    default_value: 1
    type: string
    description: Specify how many hours backwards to search.
    is_mandatory: true
-   name: IPS ID
    default_value: 144115188075855872/8
    type: string
    description: Specify the IP SID for the search.
    is_mandatory: false
-   name: Result Limit
    default_value: 50
    type: string
    description: 'Specify how many results to return. Max: 200 per entity.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_similar_events_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS", "USERUNIQNAME"]}'
