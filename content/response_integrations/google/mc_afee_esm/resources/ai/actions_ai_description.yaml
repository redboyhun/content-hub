Add Values To Watchlist:
  ai_description: >-
    ### General Description

    Adds a list of values to a specific watchlist in McAfee ESM. This action is used
    to dynamically update watchlists with indicators or identifiers for monitoring
    or blocking purposes within the ESM environment.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Watchlist Name | String | Yes | The exact name of the watchlist in McAfee ESM
    that needs to be updated. |

    | Values to Add | String | Yes | A comma-separated list of values (e.g., IP addresses,
    file hashes, usernames) to be added to the watchlist. |


    ### Additional Notes

    **Warning:** McAfee ESM does not strictly validate the data type of the values
    being added relative to the watchlist type. For example, the API will allow adding
    a file hash to an IP-based watchlist without returning an error. Users should
    ensure the input values match the intended watchlist type.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the McAfee ESM connection details
    and the user-provided watchlist name and values.

    2. **Watchlist Identification:** It queries the McAfee ESM API to fetch all available
    watchlists and identifies the unique ID of the watchlist matching the provided
    name.

    3. **Value Addition:** The action sends a POST request to the ESM API to append
    the specified values to the identified watchlist.

    4. **Completion:** Returns a success status if the values are successfully added
    or fails if the watchlist is not found or the API call fails.
  capabilities:
    can_create_case_comments: false
