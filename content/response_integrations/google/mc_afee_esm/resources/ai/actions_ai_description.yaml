Get Similar Events:
  ai_description: >-
    ### General Description

    The **Get Similar Events** action retrieves historical event data from McAfee
    ESM that matches specific entities (Hostname, IP Address, or User) found within
    the current alert scope. This action is designed to help analysts identify patterns
    or recurring threats by searching for related activity over a specified period.
    Because the search process in McAfee ESM can be time-consuming, this action operates
    asynchronously, initiating the query and then polling for results in subsequent
    execution cycles.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Hours Back** | Integer | Yes | Defines the lookback window for the search
    (e.g., 1 hour). Must be a positive integer. |

    | **IPS ID** | String | No | The specific Intrusion Prevention System (IPS) sensor
    ID to filter the search. If not provided, a default system ID is used. |

    | **Result Limit** | Integer | No | The maximum number of events to return for
    each entity. Valid range is 1 to 200. Default is 50. |


    ### Additional Notes

    - This action is **asynchronous**. It may require multiple execution cycles to
    complete depending on the ESM's response time and the volume of data.

    - Results are attached directly to the entities as data tables for easy viewing
    in the Case Wall and are also provided in the action's JSON result.


    ### Flow Description

    1. **Initialization**: Extracts connection details and action parameters, validating
    that the `Result Limit` and `Hours Back` are within acceptable ranges.

    2. **Entity Filtering**: Identifies all Hostname, IP Address, and User entities
    in the current scope.

    3. **Query Creation**: For each entity, it constructs a specific ESM query based
    on the entity type and the provided `IPS ID` and `Hours Back` window.

    4. **Execution**: Submits the queries to the McAfee ESM API and stores the resulting
    query locations in the action's state.

    5. **Status Polling**: Checks the status of the running queries. If they are not
    yet finished, the action enters an 'In Progress' state to be resumed later.

    6. **Data Retrieval**: Once queries are complete, it fetches the event details
    from the ESM.

    7. **Output**: Populates the action results with JSON data and attaches formatted
    CSV tables to each processed entity.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
