Send Advanced Query To ESM:
  ai_description: >-
    Sends an advanced JSON query to McAfee ESM to retrieve specific event or system
    data. This action operates asynchronously, meaning it initiates a query and then
    periodically checks its status until completion before fetching the results. It
    is designed for complex data retrieval that might exceed standard query timeouts.


    ### Parameters Description


    | Parameter | Expected Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query Payload | String (JSON) | Yes | A JSON object defining the query to be
    executed. The action automatically enforces a maximum limit of 200 results to
    ensure performance. |


    ### Flow Description


    1.  **Initialization**: The action extracts connection details (API Root, Credentials,
    Product Version) and the query payload.

    2.  **Query Creation (First Run)**: On the first execution, it sends the JSON
    payload to the McAfee ESM `v1/runningQuery` endpoint. If the query results are
    already available (cached), it fetches them immediately. Otherwise, it receives
    a `query_id`.

    3.  **Status Polling (Async)**: If the query is still processing, the action saves
    the `query_id` and enters an 'In Progress' state. In subsequent runs, it checks
    the status via the `v1/runningQuery/queue/{query_id}` endpoint.

    4.  **Data Retrieval**: Once the ESM reports the status as 'complete', the action
    calls the `v1/runningQuery/{query_id}` endpoint to retrieve the data.

    5.  **Output Generation**: The retrieved data is parsed into a list of objects,
    added to a SOAR data table named 'Query Results', and attached as a JSON result
    for downstream use.


    ### Additional Notes


    *   **Async Execution**: Because this action is asynchronous, users should ensure
    the script timeout in the Google SecOps IDE is appropriately configured to allow
    for multiple polling cycles if the ESM query is expected to take a long time.

    *   **Result Limit**: While the ESM might support more, this action explicitly
    caps the results at 200 records.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action populates a data table named 'Query Results' within the Google SecOps
      case and updates the action's JSON result with the fetched data.
  categories:
