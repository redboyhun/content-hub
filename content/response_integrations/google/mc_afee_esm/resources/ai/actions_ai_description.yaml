Send Query To ESM:
  ai_description: >-
    ### General Description

    This action executes a search query on McAfee ESM to retrieve specific data records
    related to Events, Flows, or Assets. It is designed to run asynchronously, allowing
    the system to poll for results without blocking execution for long-running queries.
    Users can define complex filters, time ranges, and sorting preferences to narrow
    down the results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Time Range | String | Yes | Specifies the time frame for the query (e.g., LAST_HOUR,
    LAST_24_HOURS, CUSTOM). |

    | Start Time | String | No | The start time for results in ISO 8601 format. Mandatory
    if 'Time Range' is set to 'CUSTOM'. |

    | End Time | String | No | The end time for results in ISO 8601 format. Used if
    'Time Range' is 'CUSTOM'; defaults to current time if empty. |

    | Filter Field Name | String | Yes | The name of the ESM field used for filtering
    the query. |

    | Filter Operator | String | Yes | The operator used for the filter (e.g., EQUALS,
    CONTAINS, IN). |

    | Filter Values | String | Yes | A comma-separated list of values to apply to
    the filter. |

    | Fields To Fetch | String | No | A comma-separated list of specific fields to
    return. If empty, predefined default fields for the query type are used. |

    | Sort Field | String | No | The field used for sorting results, expected in '{table}.{key}'
    format (e.g., Alert.LastTime). |

    | Sort Order | String | No | The order of sorting: ASC (Ascending) or DESC (Descending).
    |

    | Query Type | String | No | Specifies the data category to query: EVENT, FLOW,
    or ASSET. Default is EVENT. |

    | Max Results To Return | Integer | No | The maximum number of records to retrieve.
    Must be between 1 and 200. Default is 50. |


    ### Additional Notes

    - **Asynchronous Execution:** This action is marked as asynchronous. It initiates
    the query and then enters a polling state to check for completion. Ensure the
    script timeout in the Chronicle SOAR IDE is adjusted if expecting large datasets.

    - **Custom Time Range:** If 'Time Range' is set to 'CUSTOM', the 'Start Time'
    parameter becomes logically mandatory for the action to succeed.

    - **Validation:** The 'Max Results To Return' parameter is strictly validated
    to be within the 1-200 range.


    ### Flow Description

    1. **Initialization:** The action extracts integration configuration (API credentials)
    and user-provided parameters.

    2. **Query Building:** It constructs a structured query object for the McAfee
    ESM API, incorporating filters, time constraints, and sorting logic.

    3. **Execution (First Run):** The action sends the query to the ESM manager and
    receives a unique `result_id`.

    4. **Status Polling:** The action checks the status of the query. If not finished,
    it persists the `result_id` and yields execution (async behavior).

    5. **Data Retrieval:** Once the ESM query status is 'complete', the action fetches
    the actual data rows based on the specified limit.

    6. **Output:** The retrieved data is formatted into a CSV data table and a JSON
    result object, which are then attached to the action output in Google SecOps.
