Send Entity Query To ESM:
  ai_description: >-
    ### General Description

    Executes a search query against McAfee ESM for specific entities (IP Addresses
    and Hostnames). This action allows for complex filtering, time range selection,
    and sorting to retrieve relevant event, flow, or asset data. It operates asynchronously,
    polling the ESM system until the query results are ready, and then attaches the
    findings to the case context.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Address Entity Key | String | Yes | The ESM field name used to filter IP
    Address entities (e.g., 'Alert.SrcIP'). |

    | Hostname Entity Key | String | Yes | The ESM field name used to filter Hostname
    entities (e.g., 'Alert.4'). |

    | Time Range | String | Yes | The time window for the query (e.g., 'LAST_HOUR',
    'CUSTOM'). |

    | Start Time | String | No | Mandatory if 'Time Range' is 'CUSTOM'. Specifies
    the start of the search window in ISO 8601 format. |

    | End Time | String | No | Specifies the end of the search window in ISO 8601
    format. Defaults to current time if empty and 'Time Range' is 'CUSTOM'. |

    | Filter Field Name | String | Yes | The specific ESM field name to apply the
    filter logic to. |

    | Filter Operator | String | Yes | The operator for the filter (e.g., 'EQUALS',
    'CONTAINS', 'IN'). |

    | Filter Values | String | Yes | A comma-separated list of values to match against
    the 'Filter Field Name'. |

    | Fields To Fetch | String | No | A comma-separated list of ESM fields to include
    in the results. Defaults to a predefined set if empty. |

    | Sort Field | String | No | The field to use for sorting results (format: {table}.{key
    name}). |

    | Sort Order | String | No | The direction of sorting ('ASC' or 'DESC'). |

    | Max Results To Return | Integer | No | The maximum number of records to retrieve
    (1-200, default 50). |


    ### Additional Notes

    - The action is asynchronous and will poll McAfee ESM until the query is complete.
    Adjust the script timeout in the IDE if processing many entities or large datasets.

    - If 'CUSTOM' is selected for the 'Time Range' parameter, 'Start Time' must be
    provided.


    ### Flow Description

    1. **Entity Identification**: The action identifies all IP Address and Hostname
    entities in the current scope.

    2. **Query Construction**: For each entity, it builds a query for McAfee ESM using
    the provided filter parameters, time range, and entity-specific keys.

    3. **Asynchronous Execution**: It initiates the query execution in McAfee ESM
    and receives a result ID.

    4. **Status Polling**: The action enters a polling state, checking the status
    of each query until they are marked as complete or a timeout occurs.

    5. **Data Retrieval**: Once a query is complete, the action retrieves the result
    rows up to the specified limit.

    6. **Result Attachment**: The retrieved data is formatted into JSON results and
    entity-specific tables, which are then attached to the case context.
