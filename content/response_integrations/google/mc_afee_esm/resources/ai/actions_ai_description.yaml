Remove Values From Watchlist:
  ai_description: >-
    ### General Description

    Removes specific values from a designated watchlist in McAfee ESM. This action
    is used to manage and clean up threat intelligence or monitoring lists within
    the ESM environment by targeting a watchlist by its name and providing a list
    of values to be deleted.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Watchlist Name | String | Yes | The exact name of the watchlist in McAfee ESM
    from which values should be removed. |

    | Values to Remove | String | Yes | A comma-separated list of values (e.g., IP
    addresses, usernames, file hashes) to be removed from the specified watchlist.
    |


    ### Additional Notes

    - This action does not operate on Google SecOps entities; it uses the provided
    parameters to identify the target watchlist and the data to remove.

    - The action first performs a lookup to find the internal ID of the watchlist
    based on the provided name before executing the removal command.


    ### Flow Description

    1. **Initialization**: The action extracts connection details (API Root, credentials)
    and action parameters (Watchlist Name, Values to Remove).

    2. **Data Preparation**: The comma-separated string of values is converted into
    a Python list.

    3. **Watchlist Lookup**: The action queries McAfee ESM to retrieve all available
    watchlists and searches for the one matching the provided name to obtain its unique
    ID.

    4. **Removal Execution**: A request is sent to the McAfee ESM API to remove the
    specified values from the identified watchlist ID.

    5. **Completion**: The action reports success if the values were successfully
    removed or fails if the watchlist was not found or the API returned an error.
