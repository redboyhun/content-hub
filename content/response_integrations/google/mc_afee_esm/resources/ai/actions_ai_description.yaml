Ping:
  ai_description: >-
    Tests connectivity to the McAfee ESM server to ensure that the provided configuration
    parameters (API Root, Username, Password, etc.) are correct and that the Google
    SecOps environment can communicate with the ESM instance.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The API root of the McAfee ESM instance (e.g., https://1.1.1.1/rs/).
    |

    | Username | String | Yes | The username for the McAfee ESM instance. |

    | Password | String | Yes | The password for the McAfee ESM instance. |

    | Product Version | String | Yes | The product version of McAfee ESM (Supported:
    11.1, 11.2, 11.3, 11.4, 11.5). |

    | Use AES Encryption | Boolean | No | If enabled, the integration will authenticate
    using AES Encryption. |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the McAfee ESM server. |


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the connection details from the integration
    configuration.

    2. **Manager Initialization**: Initializes the `McAfeeESMManager`, which handles
    authentication and session token management (including AES encryption if configured).

    3. **Connectivity Test**: Executes a request to the McAfee ESM 'alarmGetTriggeredAlarms'
    endpoint (configured as the ping endpoint in constants) to verify that the API
    is reachable and credentials are valid.

    4. **Result Reporting**: Returns a success message if the connection is established,
    or an error message if the connection fails.
