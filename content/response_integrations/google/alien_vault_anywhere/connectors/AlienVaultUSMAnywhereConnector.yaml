name: AlienVault USM Anywhere Connector
parameters:
-   name: DeviceProductField
    default_value: device_product
    type: string
    description: The field name used to determine the device product
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: message_plugin
    type: string
    description: The field name used to determine the event name (sub-type)
    is_mandatory: false
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: '60'
    type: string
    description: The timeout limit (in seconds) for the python process running current
        script
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Api Root
    default_value: ''
    type: string
    description: e.g. https://<instance>.alienvault.com
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: ClientID
    default_value: ''
    type: string
    description: ClientID
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Secret
    default_value: ''
    type: password
    description: Secret
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Product Version
    default_value: V2
    type: string
    description: AlienVault Anywhere version - V1, V2
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: 'FALSE'
    type: boolean
    description: Indicate whether to use SSL in the session or not
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Alerts Per Cycle
    default_value: '10'
    type: integer
    description: Limit the number of alerts in every cycle. e.g. 10
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Days Backwards
    default_value: '1'
    type: integer
    description: This field is used in the connector first running cycle and determine
        the start time. e.g. 3
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Padding Period
    default_value: 0
    type: integer
    description: Padding period (hours) for the connector execution.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Show Suppressed
    default_value: ''
    type: boolean
    description: Whether to include suppressed alarms in the search
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use Suppressed Filter
    default_value: 'True'
    type: boolean
    description: This parameter will be used to determine whether to filter the incoming
        alerts using the "Show Suppressed" filter or not.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Priority
    default_value: ''
    type: string
    description: 'Filter by alarm priority, comma separated. Valid value: high/medium/low.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Rule Intent
    default_value: ''
    type: string
    description: 'Filter alarms by the purpose of the alarm. The intent describes
        the context of the behavior that is being observed. These are the threat categories:
        System Compromise, Exploitation & Installation, Delivery & Attack, Reconnaissance
        & Probing, Environmental Awareness'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Rule Strategy
    default_value: ''
    type: string
    description: The strategy of the rule that triggered the alarm. For example, use
        Client-Side Attack - Known Vulnerability when trying to exploit a known vulnerability
        in a web browser the attacker
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Rule Method
    default_value: ''
    type: string
    description: Filter alarms by rule method. The method would provide additional
        detail on the target of the attack and the particular vulnerability. e.g.
        Firefox - CVE-2008-4064
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: AlienVault USM Anywhere Connector
integration: AlienVaultAnywhere
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/alienvault-usm-anywhere#connectors
rules: []
is_connector_rules_supported: false
creator: admin
