List Events:
  ai_description: >-
    ### General Description

    This action searches for and retrieves a list of events from AlienVault Anywhere
    (V2). It allows users to filter events based on various criteria such as account
    name, event name, source name, and specific time ranges. The action is designed
    to work exclusively with the V2 version of the AlienVault Anywhere API. Results
    are returned as a structured data table and a raw JSON object for further processing
    within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Account Name | String | No | Filters the search results to include only events
    associated with a specific account name. |

    | Event Name | String | No | Filters the search results to include only events
    with a specific name. |

    | Source Name | String | No | Filters the search results to include only events
    originating from a specific source. |

    | Start Time | String | No | The beginning of the time range for the search. Expected
    format: `DD/MM/YYYY`. |

    | End Time | String | No | The end of the time range for the search. Expected
    format: `DD/MM/YYYY`. |

    | Suppressed | Boolean | No | If set to `True`, the action filters for events
    that have been marked as suppressed. Default is `False`. |

    | Events Limit | Integer | No | The maximum number of events to retrieve. Default
    is 100. |


    ### Additional Notes

    - **Version Requirement:** This action explicitly requires the 'Product Version'
    configuration parameter to be set to 'V2'. If 'V1' is used, the action will fail
    with an error message.

    - **Time Format:** The `Start Time` and `End Time` parameters must strictly follow
    the `DD/MM/YYYY` format; otherwise, the action will fail during the parsing stage.


    ### Flow Description

    1. **Initialization:** The action extracts configuration parameters (API Root,
    Credentials, Version) and action-specific parameters (Filters, Time Range, Limits).

    2. **Validation:** It verifies that the integration version is 'V2' and attempts
    to parse the provided `Start Time` and `End Time` into Unix timestamps.

    3. **Manager Loading:** It initializes the `AlienVaultAnywhereManagerV2` using
    the provided credentials and API root.

    4. **Data Retrieval:** The action calls the `get_events` method, which performs
    a paginated GET request to the AlienVault `/api/2.0/events` endpoint using the
    specified filters.

    5. **Processing:** The retrieved events are converted into internal data models.

    6. **Output Generation:** The action populates a SOAR data table named 'Events'
    with key event details (ID, Name, Severity, etc.) and attaches the full raw event
    data as a JSON result.
