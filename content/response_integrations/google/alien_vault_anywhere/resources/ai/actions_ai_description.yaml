Get Alarm Details:
  ai_description: >-
    ### General Description

    The **Get Alarm Details** action retrieves comprehensive information about a specific
    alarm from the AlienVault Anywhere platform using its unique identifier (Alarm
    ID). This action is used to gather deeper context on security incidents by fetching
    the full metadata associated with an alarm, including its priority, rule intent,
    attack tactics, and associated events.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alarm ID** | String | Yes | The unique UUID of the alarm to be retrieved.
    This ID is typically obtained from an AlienVault connector or a previous search
    action. |


    ### Flow Description

    1. **Initialization**: The action extracts connection settings (API Root, Credentials)
    and the mandatory **Alarm ID**.

    2. **Version Check**: It validates the integration version. The action is specifically
    designed for AlienVault Anywhere V2; it will terminate with a failure message
    if V1 is used.

    3. **Data Retrieval**: It authenticates via OAuth and executes a GET request to
    the AlienVault API to fetch the specific alarm's details.

    4. **Data Transformation**: The raw JSON response is parsed into a structured
    data model, and specific fields (like attack tactics and timestamps) are formatted
    for readability.

    5. **Output**: The action generates a data table titled 'Alarm [ID] Details' for
    the case wall and attaches the full raw data as a JSON result for use in downstream
    playbooks.


    ### Additional Notes

    - This action is a read-only operation and does not change the status or configuration
    of the alarm in AlienVault.

    - It does not iterate over entities in the Google SecOps case; it operates strictly
    on the provided input parameter.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: true
