Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the AlienVault Anywhere instance. It ensures that the provided
    credentials (Username/Password) and the API Root URL are correct and that the
    network path is open. This action supports both V1 and V2 versions of the AlienVault
    Anywhere API.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Product Version** | String | Yes | Specifies which version of the AlienVault
    Anywhere API to use (e.g., 'V1' or 'V2'). Defaults to 'V1'. |

    | **Api Root** | String | Yes | The base URL of the AlienVault Anywhere server.
    |

    | **Username** | String | Yes | The username used for authentication. |

    | **Password** | String | Yes | The password used for authentication. |

    | **Verify SSL** | Boolean | Yes | If enabled, the action will verify the SSL
    certificate of the AlienVault server. Defaults to `True`. |


    ### Additional Notes

    - This action does not process any entities and is typically used during the initial
    setup of the integration or for troubleshooting connection issues.

    - For V1, it attempts to access the `/api/1.0/license` endpoint.

    - For V2, it attempts to list a single alarm from the `/api/2.0/alarms` endpoint.


    ### Flow Description

    1. **Initialization**: The action retrieves the integration configuration parameters
    (API Root, Credentials, Version, and SSL settings).

    2. **Manager Loading**: Based on the 'Product Version' parameter, it initializes
    either the V1 or V2 AlienVault Manager.

    3. **Authentication**: The manager performs a login sequence to obtain necessary
    session cookies or OAuth tokens.

    4. **Connectivity Test**: The action calls the `test_connectivity` method, which
    executes a lightweight GET request to a version-specific endpoint.

    5. **Result Reporting**: If the request is successful, it returns a 'Connected
    successfully' message; otherwise, it captures and reports the specific error encountered.
