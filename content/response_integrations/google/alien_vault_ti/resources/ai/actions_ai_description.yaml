Enriches Entities:
  ai_description: >-
    ### General Description

    Enriches IP addresses, Hostnames, URLs, and File Hashes using AlienVault OTX (Open
    Threat Exchange) threat intelligence. This action retrieves detailed indicator
    information, including geographical data, pulse information, and malware analysis,
    to provide context for security investigations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Key | String | Yes | The API key used to authenticate requests to the AlienVault
    OTX API. |


    ### Flow Description

    1. **Initialization**: Retrieves the mandatory API key from the integration configuration.

    2. **Entity Filtering**: Iterates through target entities, selecting only those
    of type ADDRESS, HOSTNAME, FILEHASH, or URL. For ADDRESS and HOSTNAME, it specifically
    excludes internal entities.

    3. **Data Retrieval**: For each valid entity, it queries the AlienVault OTX API
    to fetch indicator details across various sections (e.g., general, geo, pulses).

    4. **Data Processing**: If results are found, the data is flattened and prefixed
    with "AlienVault".

    5. **Internal Mutation**:
        *   Updates the entity's `additional_properties` with the enriched data.
        *   Adds a CSV-formatted data table to the entity.
        *   Sets the entity's `is_enriched` flag to `True`.
    6. **Finalization**: Updates all enriched entities in the SOAR platform and returns
    a summary message and JSON result.


    ### Additional Notes

    * Internal IP addresses and Hostnames are skipped to avoid unnecessary API calls
    and false positives.

    * The action handles API timeouts and specific error messages (like private IP
    errors) gracefully.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with enrichment data and adds a data table
      to the entity.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - FILEHASH
    - HOSTNAME
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: true
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the AlienVault OTX (Open Threat Exchange) API. Its primary purpose
    is to validate that the integration's configuration, specifically the API Key,
    is correct and that the external service is reachable.


    ### Parameters

    There are no parameters for this action.


    ### Flow Description

    1. **Initialization**: The action initializes the AlienVault TI manager using
    the API Key provided in the integration configuration.

    2. **Connectivity Check**: It executes the `test_connectivity` method, which performs
    a simple `GET` request to the AlienVault OTX `user/me` endpoint.

    3. **Validation**: The action checks the response from the API. If the request
    is successful (returning valid user data), the connection is considered established.

    4. **Final Output**: The action returns a boolean result (`True` for success,
    `False` for failure) and an informative message indicating whether the connection
    was established or failed.


    ### Additional Notes

    This action does not process any entities and is strictly used for configuration
    validation.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
