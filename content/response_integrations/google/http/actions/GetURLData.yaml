name: Get URL Data
description: Send HTTP GET request to URL entities
integration_identifier: HTTP
parameters:
-   name: Username
    default_value: ''
    type: string
    description: Username for basic authentication. Optional.
    is_mandatory: false
-   name: Password
    default_value: ''
    type: password
    description: Password for basic authentication. Optional.
    is_mandatory: false
-   name: SSL Verification
    default_value: ''
    type: boolean
    description: Whether to verify the SSL certificate of the destination server.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_url_data_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["DestinationURL"]}'
