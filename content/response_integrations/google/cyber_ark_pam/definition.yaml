identifier: CyberArkPAM
name: CyberArk PAM
parameters:
-   name: Api Root
    default_value: https://x.x.x.x:port
    type: string
    description: Specify the API root url.
    is_mandatory: true
    integration_identifier: CyberArkPAM
-   name: Username
    default_value: ''
    type: string
    description: Specify the username to use to connect with.
    is_mandatory: true
    integration_identifier: CyberArkPAM
-   name: Password
    default_value: ''
    type: password
    description: Specify the password to use to connect with.
    is_mandatory: true
    integration_identifier: CyberArkPAM
-   name: Verify SSL
    default_value: 'false'
    type: boolean
    description: If enabled, the certificate configured for the API root is validated.
    is_mandatory: false
    integration_identifier: CyberArkPAM
-   name: CA Certificate
    default_value: ''
    type: string
    description: Specify the CA certificate to use to validate the secure connection
        to the API root. Parameter accepts the CA certificate in a form of base64
        encoded string.
    is_mandatory: false
    integration_identifier: CyberArkPAM
-   name: Client Certificate
    default_value: ''
    type: string
    description: Optional if configured for CyberArk PAM, specify the CyberArk client
        certificate to use to establish connection to the API root. Certificate should
        be provided in the .p12 format, parameter expects certificate as base64 encoded
        string.
    is_mandatory: false
    integration_identifier: CyberArkPAM
-   name: Client Certificate Passphrase
    default_value: ''
    type: password
    description: Optionally, if the client certificate is requiring a passphrase,
        specify it for this parameter.
    is_mandatory: false
    integration_identifier: CyberArkPAM
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cyberark-pam
categories:
- Access Management
- Identity
svg_logo_path: resources/logo.svg
image_path: resources/image.png
