Get Account Password Value:
  ai_description: >-
    ### General Description

    This action retrieves the password or SSH key value for a specific account managed
    within CyberArk Privileged Access Manager (PAM). It is designed to facilitate
    automated credential retrieval for playbooks, allowing subsequent steps to use
    these credentials for authentication or administrative tasks. Note that this action
    does not operate on Google SecOps entities but instead uses a specific Account
    ID provided as an input parameter.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Account | String | Yes | The unique identifier (Account ID) of the account in
    CyberArk PAM from which to retrieve the password. |

    | Reason | String | Yes | The justification for accessing the password. This is
    typically required by CyberArk for auditing purposes. |

    | Ticketing System Name | String | No | The name of the ticketing system associated
    with the access request. |

    | Ticket ID | Integer | No | The specific ticket ID from the ticketing system
    associated with the access request. |

    | Version | Integer | No | The specific version of the account password to retrieve.
    If not specified, the current version is usually returned. |


    ### Additional Notes

    - This action performs a POST request to the CyberArk API's retrieve endpoint.
    While it is a POST request, its primary purpose is data retrieval with an audit
    trail (the 'Reason' parameter).

    - The action returns the raw secret value in the JSON result under the `content`
    key.


    ### Flow Description

    1. **Initialization**: The action initializes the CyberArk PAM manager using integration
    configuration parameters (API Root, credentials, and SSL/Certificate settings).

    2. **Parameter Extraction**: It extracts the mandatory `Account` ID and `Reason`,
    along with optional ticketing and version information.

    3. **API Request**: It sends a POST request to the CyberArk `Password/Retrieve`
    endpoint for the specified account, including the audit information in the request
    body.

    4. **Result Processing**: Upon a successful response, the retrieved password or
    SSH key is captured and added to the action's JSON results.

    5. **Completion**: The action concludes by reporting success and providing the
    secret value to the SOAR environment.
