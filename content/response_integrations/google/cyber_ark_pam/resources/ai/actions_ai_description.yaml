Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility used to verify the connectivity and
    authentication configuration between Google SecOps and a CyberArk PAM instance.
    It ensures that the integration can successfully communicate with the CyberArk
    API using the provided credentials and security settings.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Root | String | Yes | The base URL of the CyberArk PAM API instance. |

    | Username | String | Yes | The username used for authentication. |

    | Password | String | Yes | The password used for authentication. |

    | Verify SSL | Boolean | Yes | Determines whether to verify the SSL certificate
    of the CyberArk server. |

    | CA Certificate | String | No | Base64 encoded CA certificate for SSL validation.
    |

    | Client Certificate | String | No | Base64 encoded client certificate for mutual
    TLS. |

    | Client Certificate Passphrase | String | No | Passphrase for the client certificate.
    |


    ### Flow Description

    1. **Initialization**: The action extracts the integration configuration parameters
    including API endpoints, credentials, and SSL/certificate settings.

    2. **Manager Setup**: It initializes the `CyberArkPamManager`, which configures
    the HTTP session with the appropriate SSL verification and certificates.

    3. **Authentication Test**: The action attempts to log in to the CyberArk PAM
    API by sending a POST request to the logon endpoint (`/PasswordVault/API/Auth/CyberArk/Logon`).

    4. **Validation**: It validates the response from the server. If an access token
    is successfully retrieved, the connection is considered valid.

    5. **Completion**: The action returns a success status if authentication succeeds,
    or a failure status with the error details if it fails.


    ### Additional Notes

    - This action does not process or require any entities.

    - It is primarily used for initial setup and troubleshooting connectivity issues.
