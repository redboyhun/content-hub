List Accounts:
  ai_description: >-
    ### General Description

    The **List Accounts** action retrieves a list of accounts from CyberArk Privileged
    Access Manager (PAM) based on user-defined search and filter criteria. It is primarily
    used for auditing, discovery, or identifying specific account IDs for subsequent
    management actions. This action does not interact with Google SecOps entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Search Query** | String | No | The search string used to find accounts. |

    | **Search operator** | Enum | No | Determines the search logic (`contains` or
    `startswith`). Default is `contains`. |

    | **Max Records To Return** | Integer | No | The maximum number of account records
    to retrieve. Default is 50. Must be a positive integer. |

    | **Records Offset** | Integer | No | The starting point (offset) for the result
    set, used for pagination. Default is 0. |

    | **Filter Query** | String | No | A query string to filter results by `safeName`
    or `modificationTime`. |

    | **Saved Filter** | String | No | A predefined filter name. If provided, it takes
    precedence over the **Filter Query**. |


    ### Additional Notes

    - If both **Filter Query** and **Saved Filter** are provided, the **Saved Filter**
    will be used.

    - The action requires valid CyberArk PAM credentials and API root configuration.


    ### Flow Description

    1. **Initialization**: Extracts integration configuration (API Root, Credentials,
    SSL/Certificates) and action parameters.

    2. **Validation**: Checks that `Max Records To Return` is positive and `Records
    Offset` is non-negative.

    3. **Authentication**: Establishes a session with CyberArk PAM and retrieves an
    access token via a POST request.

    4. **Data Retrieval**: Sends a GET request to the CyberArk API with the specified
    search, filter, and pagination parameters.

    5. **Output Generation**: Parses the returned account data, converts it into a
    flat JSON format, and populates a data table named "Available PAM Accounts" in
    the SOAR interface.
