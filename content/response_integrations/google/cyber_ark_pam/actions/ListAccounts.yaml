name: List Accounts
description: 'List accounts available in the CyberArk PAM based on provided criteria.
    Note: This action doesn’t run on Chronicle SOAR entities.'
integration_identifier: CyberArkPAM
parameters:
-   name: Search Query
    default_value: ''
    type: string
    description: Specify the search query to use in action.
    is_mandatory: false
-   name: Search operator
    default_value: contains
    type: ddl
    optional_values:
    - contains
    - startswith
    description: Specify the search operator action should use to search based on
        the provided search query.
    is_mandatory: false
-   name: Max Records To Return
    default_value: 50
    type: string
    description: Specify how many records to return. If nothing is provided, action
        will return 50 records (API default).
    is_mandatory: false
-   name: Records Offset
    default_value: 0
    type: string
    description: Specify the offset the action should use to return the values.
    is_mandatory: false
-   name: Filter Query
    default_value: ''
    type: string
    description: Specify the filter query action should use. Filter can be based on
        safeName or modificationTime parameters.
    is_mandatory: false
-   name: Saved Filter
    default_value: ''
    type: string
    description: Specify the saved filter query action should use. Takes priority
        over the Filter Query parameter.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_accounts_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
