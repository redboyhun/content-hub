name: Get Account Password Value
description: 'Get account password value from CyberArk PAM. Note: Both password and
    SSH Key can be retrieved with this action.  Note 2: This action doesn’t run on
    Chronicle SOAR entities.'
integration_identifier: CyberArkPAM
parameters:
-   name: Account
    default_value: ''
    type: string
    description: Specify the account id to retrieve the password value for. Note that
        you can get the account id from the List Accounts action.
    is_mandatory: true
-   name: Reason
    default_value: Retrieved automatically by Chronicle SOAR.
    type: string
    description: Specify the reason that account password value is accessed.
    is_mandatory: true
-   name: Ticketing System Name
    default_value: ''
    type: string
    description: Specify the name of the ticketing system.
    is_mandatory: false
-   name: Ticket ID
    default_value: ''
    type: string
    description: Specify the ticketing system ticket id.
    is_mandatory: false
-   name: Version
    default_value: ''
    type: string
    description: Specify the account password value version to retrieve.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_account_password_value_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
