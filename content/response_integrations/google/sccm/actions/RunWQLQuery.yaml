name: Run WQL Query
description: 'Run arbitrary Windows Management Instrumentation Query Language (WQL)
    query against Microsoft SCCM Instance. Note: action is not using Siemplify entities
    to operate.'
integration_identifier: SCCM
parameters:
-   name: Query to run
    default_value: SELECT UniqueUserName,LastLoginTime,LoginCount,ResourceName from
        SMS_UserMachineIntelligence JOIN SMS_R_User ON SMS_UserMachineIntelligence.UniqueUserName
        = SMS_R_User.UniqueUserName WHERE SMS_R_User.UserPrincipalName = "sccm_user@sccm-domain.com"
    type: string
    description: Specify WQL query to run. Consider the default example request for
        reference.
    is_mandatory: true
-   name: Number of records to return
    default_value: 100
    type: string
    description: Maximum number of records to return in action.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/run_wql_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
