name: Get Login History
description: Retrieve user login history from MS SCCM instance based on the provided
    Siemplify user entity.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/sccm#get_login_history
integration_identifier: SCCM
parameters:
-   name: Number of Records to Return
    default_value: 100
    type: string
    description: Maximum number of records to return in the action.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_login_history_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["USERUNIQNAME"]}'
script_result_name: is_succeed
