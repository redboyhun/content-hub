Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity between the
    Google SecOps (Chronicle) platform and a Microsoft System Center Configuration
    Manager (SCCM) instance. It ensures that the provided credentials and server details
    are correct and that the network path (specifically WMI/RPC ports) is open.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Server Address** | String | Yes | The IP address or FQDN of the Microsoft
    SCCM server. |

    | **Domain** | String | Yes | The Active Directory domain associated with the
    service account. |

    | **Username** | String | Yes | The username of the service account used to authenticate
    via WMI. |

    | **Password** | String | Yes | The password of the service account used to authenticate
    via WMI. |


    ### Additional Notes

    - This action does not process any entities.

    - It relies on the `wmi_client_wrapper` to establish a connection to the `ROOT\SMS`
    namespace and subsequently queries the `SMS_ProviderLocation` to identify the
    site-specific namespace.

    - Successful execution confirms that the SOAR environment can reach the SCCM server
    and perform WMI queries.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the connection details (Server
    Address, Domain, Username, and Password) from the integration configuration.

    2. **Manager Initialization**: It attempts to instantiate the `SCCMManager` class.

    3. **Connectivity Test**: Inside the manager, a WMI connection is established
    to the `ROOT\SMS` namespace. It then executes a query (`SELECT NamespacePath FROM
    SMS_ProviderLocation`) to verify read access and retrieve the site namespace.

    4. **Namespace Re-connection**: The manager attempts to connect to the specific
    site namespace returned by the previous query.

    5. **Result Reporting**: If all connection steps succeed, the action returns a
    success message. If any step fails (e.g., authentication error, timeout, or WMI
    failure), it catches the exception and reports a failure.
