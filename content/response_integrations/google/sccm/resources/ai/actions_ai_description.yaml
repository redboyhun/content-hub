Run WQL Query:
  ai_description: >-
    Executes custom Windows Management Instrumentation Query Language (WQL) queries
    against a Microsoft SCCM (System Center Configuration Manager) instance. This
    action allows users to retrieve specific management data, such as device details,
    user information, or system status, directly from the SCCM database using standard
    WQL syntax.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query to run | String | Yes | The specific WQL query to be executed against
    the SCCM instance. Example: `SELECT * FROM SMS_R_System`. |

    | Number of records to return | Integer | Yes | The maximum number of records
    to return in the action results. If the query returns more records, the list will
    be truncated. |


    ### Flow Description

    1. **Initialization**: The action initializes the SCCM manager using the provided
    server address, domain, and credentials.

    2. **Connection**: It establishes a WMI connection to the SCCM server, first targeting
    the `ROOT\SMS` namespace to find the site-specific namespace, and then reconnecting
    to that site namespace.

    3. **Execution**: The provided WQL query is executed against the SCCM instance.

    4. **Processing**: The results are parsed into a structured format. If the number
    of results exceeds the 'Number of records to return' limit, the list is truncated.

    5. **Output**: The action returns the results in three formats: a JSON object,
    a data table displayed in the UI, and a full JSON file attached to the action
    result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
