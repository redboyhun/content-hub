Enrich Entities:
  ai_description: "Enriches Host, IP, and User entities with detailed information\
    \ from Microsoft SCCM (System Center Configuration Manager). The action connects\
    \ to the SCCM server via WMI and executes WQL queries to retrieve system attributes,\
    \ user details, and network configurations. \n\n### Parameters\n| Parameter Name\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Server\
    \ Address | String | Yes | The IP address or hostname of the Microsoft SCCM server.\
    \ |\n| Domain | String | Yes | The Active Directory domain used for authentication.\
    \ |\n| Username | String | Yes | The username used to authenticate with the SCCM\
    \ server. |\n| Password | String | Yes | The password used to authenticate with\
    \ the SCCM server. |\n\n### Flow Description\n1. **Initialization**: Establishes\
    \ a connection to the SCCM server using the provided credentials and WMI protocol.\n\
    2. **Entity Filtering**: Identifies supported entities (User, Hostname, and IP\
    \ Address) from the current alert context.\n3. **Data Retrieval**: For each entity,\
    \ it executes a specific WQL query (e.g., querying `SMS_R_System` for hosts/IPs\
    \ or `SMS_R_User` for users) to fetch enrichment data.\n4. **Data Processing**:\
    \ Selects the most recent record based on the 'AgentTime' attribute and flattens\
    \ the data structure.\n5. **Internal Enrichment**: Updates the entity's additional\
    \ properties with the retrieved SCCM data, marks the entity as enriched, and attaches\
    \ a detailed CSV table to the entity in the Google SecOps UI.\n6. **Finalization**:\
    \ Updates all successfully enriched entities and provides a summary of the results."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with SCCM enrichment data and adds data
      tables to the entities within the case.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    - USERUNIQNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Get Computer Properties:
  ai_description: >-
    Retrieves detailed computer properties from a Microsoft System Center Configuration
    Manager (SCCM) instance to enrich Hostname entities. This action is deprecated
    and superseded by the 'Enrich Entities' action. It uses WMI to query the SCCM
    provider for system information such as Resource ID, Operating System, MAC Addresses,
    and Last Logon details.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Server Address | String | Yes | The network address or hostname of the SCCM
    server. |

    | Domain | String | Yes | The Active Directory domain used for WMI authentication.
    |

    | Username | String | Yes | The username used for WMI authentication. |

    | Password | String | Yes | The password used for WMI authentication. |


    ### Flow Description

    1. **Authentication**: Establishes a WMI connection to the SCCM server using the
    provided credentials and namespace.

    2. **Entity Filtering**: Processes only Hostname entities from the current context.

    3. **Identifier Normalization**: Strips domain suffixes or email-style formats
    from the hostname to ensure compatibility with SCCM records.

    4. **Data Retrieval**: Executes a WQL query against the `SMS_R_System` table to
    fetch computer properties.

    5. **Enrichment**: If a match is found, it populates the entity's additional properties
    with the retrieved data (prefixed with 'SCCM') and attaches a CSV table to the
    entity.

    6. **Update**: Updates the entities in the Google SecOps platform to reflect the
    new enrichment data.


    ### Additional Notes

    - This action requires ports 135, 445, 443, and the RPC service to be open on
    the SCCM server.

    - It is recommended to use the 'Enrich Entities' action for a more comprehensive
    enrichment process.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with SCCM computer information and sets
      the enriched status.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
