Get Login History:
  ai_description: "### General Description\nThe **Get Login History** action retrieves\
    \ historical login data for User entities from a Microsoft System Center Configuration\
    \ Manager (SCCM) instance. This action helps security analysts understand user\
    \ activity by providing details on login frequency and the most recent login timestamp\
    \ across the SCCM-managed environment.\n\n### Parameters\n| Parameter | Type |\
    \ Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Number of Records\
    \ to Return | Integer | Yes | The maximum number of login history records to retrieve\
    \ from SCCM for each processed entity. Default is 100. |\n\n### Flow Description\n\
    1. **Authentication:** The action connects to the SCCM server using WMI (Windows\
    \ Management Instrumentation) with the configured server address, domain, and\
    \ credentials.\n2. **Entity Processing:** It iterates through the target entities\
    \ provided in the context, specifically filtering for User entities.\n3. **Query\
    \ Execution:** For each User entity, it executes a WQL (WMI Query Language) query\
    \ that joins `SMS_UserMachineIntelligence` and `SMS_R_User` tables to find records\
    \ matching the user's identifier (checking against UniqueUserName, UserPrincipalName,\
    \ Mail, or UserName).\n4. **Data Enrichment:** \n    *   Retrieved data (Username,\
    \ Last Login Time, and Login Count) is formatted into a CSV table.\n    *   The\
    \ table is attached to the entity in Google SecOps using `add_entity_table`.\n\
    5. **Finalization:** The action returns a JSON object containing the raw login\
    \ history for all successful entities and provides a summary message of the processing\
    \ results.\n\n### Additional Notes\n*   This action requires network connectivity\
    \ to the SCCM server on ports 135, 445, and 443, with RPC services enabled.\n\
    *   The action is read-only regarding the external SCCM system."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds a login history CSV table to the entity's data within Google
      SecOps.
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - USERUNIQNAME
