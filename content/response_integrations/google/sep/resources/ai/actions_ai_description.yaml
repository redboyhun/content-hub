QuarantineEndpoint:
  ai_description: >-
    ### General Description

    Quarantines endpoint entities (IP Addresses or Hostnames) within Symantec Endpoint
    Protection (SEP). This action identifies the specific computer ID associated with
    the entity in the SEP Manager and issues a quarantine command to isolate the host
    from the network.


    ### Parameters Description

    There are no specific action parameters for this action. It relies on the integration's
    global configuration (Username, Password, Domain, and API Root).


    ### Additional Notes

    * The action supports both **ADDRESS** (IP) and **HOSTNAME** entity types.

    * It uses the SEP SOAP API to execute the quarantine command.

    * The resulting command ID from SEP is stored in the entity's additional properties
    for tracking purposes.


    ### Flow Description

    1. **Authentication**: Connects to the Symantec Endpoint Protection Manager using
    the provided credentials.

    2. **Entity Identification**: For each target entity:
        * If the entity is an **ADDRESS**, it retrieves the Computer ID using the
    IP.
        * If the entity is a **HOSTNAME**, it retrieves computer info and then the
    Computer ID using the hostname.
    3. **Quarantine Execution**: If a valid Computer ID is found, it sends a SOAP
    request to SEP to initiate the quarantine command.

    4. **Data Enrichment**: Updates the entity's additional properties with the `sep_quarantine_command_id`.

    5. **Finalization**: Updates the entities in Google SecOps and returns a success
    status if at least one endpoint was successfully processed.
