Get Report And Enrich:
  ai_description: >-
    ### General Description

    Retrieves command status reports from Symantec Endpoint Protection (SEP) and enriches
    entities that are associated with specific command IDs. This action is typically
    used to track the progress or results of previously issued commands (like scans
    or quarantine actions) and attach those details directly to the relevant entities
    in Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Command IDS | String | Yes | A comma-separated list of SEP command IDs for which
    to retrieve status reports. |


    ### Flow Description

    1. **Parameter Extraction:** The action parses the provided comma-separated list
    of Command IDs.

    2. **Entity Matching:** It iterates through all target entities in the current
    context, looking for those that have a key containing `_command_id` in their `additional_properties`
    matching one of the input IDs.

    3. **Data Retrieval:** For every match found, the action calls the SEP Manager
    to fetch the detailed command status report via the SOAP API.

    4. **Data Transformation:** The retrieved report is flattened and prefixed with
    `SEP_` and the specific command context to ensure clear data mapping.

    5. **Internal Enrichment:** The action updates the entity's `additional_properties`
    with the flattened report data and performs a bulk update of all enriched entities
    in Google SecOps.

    6. **Result Reporting:** Finally, it returns the raw JSON reports and a summary
    message of enriched entities.
