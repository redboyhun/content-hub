UpdateEndpoint:
  ai_description: >-
    ### General Description

    Triggers a content update command on Symantec Endpoint Protection (SEP) endpoints.
    This action is used to force managed clients to check for and download the latest
    security definitions and policies from the SEP Manager. It supports both IP Address
    and Hostname entities.


    ### Parameters

    There are no parameters for this action.


    ### Flow Description

    1. **Authentication**: Connects to the Symantec Endpoint Protection Manager using
    configured credentials (Username, Password, Domain, and API Root).

    2. **Entity Resolution**: Iterates through the target entities:
        * For **ADDRESS** (IP) entities: Retrieves the internal SEP Computer ID using
    the IP address.
        * For **HOSTNAME** entities: Retrieves computer information to resolve the
    specific Computer ID.
    3. **Command Execution**: For every successfully resolved Computer ID, the action
    issues a `runClientCommandUpdateContent` SOAP request to the SEP Manager.

    4. **Data Enrichment**: Captures the `command_id` returned by the SEP Manager
    and attaches it to the entity's `additional_properties` under the key `sep_update_command_id`.

    5. **Internal Update**: Updates the entities within Google SecOps to reflect the
    new metadata and provides a summary of the triggered updates.


    ### Additional Notes

    This action performs an active operation on the endpoint via the SEP Manager.
    While it retrieves data (Computer IDs), its primary purpose is to change the state
    of the endpoint by forcing an update, thus it is not classified as a pure enrichment
    action.
