    \ to activate Download Insight protection. \n\n### General Description\nThis action\
    \ is used to remediate or harden endpoints by ensuring that the SEP Download Insight\
    \ feature is active. It maps Google SecOps entities to SEP computer objects and\
    \ triggers a SOAP-based command on the SEP Manager. The resulting command ID is\
    \ stored back on the entity for tracking purposes.\n\n### Parameters Description\n\
    There are no parameters for this action.\n\n### Flow Description\n1. **Authentication**:\
