EnableNTP:
  ai_description: >-
    ### General Description

    Enables Network Threat Protection (NTP) on Symantec Endpoint Protection (SEP)
    endpoints. This action is used to ensure that the firewall and intrusion prevention
    components of the SEP agent are active on the target machines. It interacts with
    the SEP Manager via SOAP APIs to issue remote commands to managed clients.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. **Authentication**: Connects to the SEP Manager using the configured credentials
    (Username, Password, Domain, and API Root).

    2. **Entity Resolution**: Iterates through the target entities. For `ADDRESS`
    entities, it retrieves the internal SEP Computer ID using the IP. For `HOSTNAME`
    entities, it retrieves computer info and then resolves the Computer ID.

    3. **Command Execution**: For every resolved Computer ID, it sends a SOAP request
    to the SEP Command Service to trigger the `runClientCommandEnableNTP` operation.

    4. **Metadata Tracking**: Captures the `command_id` returned by the SEP Manager
    and updates the entity's additional properties with the key `sep_enable_ntp_command_id`.

    5. **Internal Update**: Updates the entities in Google SecOps with the new properties
    and completes the action with a status message indicating which entities were
    processed.


    ### Additional Notes

    This action performs a state change on the external endpoint by enabling a security
    feature. It requires the SEP Manager to be reachable and the integration credentials
    to have sufficient privileges to execute client commands.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Issues a remote command to the Symantec Endpoint Protection Manager to enable
      the Network Threat Protection (NTP) feature on specific client endpoints.
    fetches_data: true
