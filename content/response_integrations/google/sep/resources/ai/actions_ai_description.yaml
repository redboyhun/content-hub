DisableNTP:
  ai_description: >-
    ### General Description

    This action disables Network Threat Protection (NTP) on endpoints managed by Symantec
    Endpoint Protection (SEP). It is typically used during troubleshooting or specific
    administrative tasks where network traffic filtering needs to be temporarily suspended
    on a host. The action identifies the target endpoint within SEP using its IP address
    or hostname and issues a command to disable NTP for a user-defined duration.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Time Period | String/Integer | Yes | Specifies the length of time (in minutes)
    after which Network Threat Protection is automatically reset to the state specified
    by the applied policy. The minimum is 1 minute and the maximum is 720 minutes
    (12 hours). |


    ### Additional Notes

    * The action supports both **ADDRESS** (IP) and **HOSTNAME** entity types.

    * Upon successful execution, the SEP Command ID is stored in the entity's `additional_properties`
    under the key `sep_disable_ntp_command_id`.


    ### Flow Description

    1. **Authentication**: Connects to the Symantec Endpoint Protection Manager using
    provided credentials.

    2. **Entity Resolution**: For each target entity, the action attempts to find
    the corresponding SEP `computer_id`:
        * For **ADDRESS** entities, it searches by IP.
        * For **HOSTNAME** entities, it retrieves computer info and then resolves
    the ID by name.
    3. **Command Execution**: If a `computer_id` is found, it sends a SOAP request
    to the SEP Command Service to disable NTP for the specified `Time Period`.

    4. **Data Enrichment**: The resulting Command ID from SEP is added to the entity's
    additional properties.

    5. **Internal Update**: Updates the entities within Google SecOps with the new
    metadata and provides a summary of the commands issued.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Disables the Network Threat Protection (NTP) security component on the remote
      endpoint via the Symantec Endpoint Protection Manager API.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entity's 'additional_properties' attribute with the unique Command
      ID returned by the SEP Manager for tracking the task status.
