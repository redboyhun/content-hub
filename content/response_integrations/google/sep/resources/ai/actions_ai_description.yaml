GetReport:
  ai_description: >-
    ### General Description

    Retrieves status reports for specific command IDs from Symantec Endpoint Protection
    (SEP). This action is primarily used to track the progress or verify the completion
    of asynchronous tasks previously initiated in SEP, such as endpoint scans, quarantine
    requests, or policy updates.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Command IDS | String | Yes | A comma-separated list of unique command IDs (e.g.,
    '7E975C32C71349E9BE495EC2220B902F') for which status reports are requested. |


    ### Flow Description

    1. **Initialization**: The action initializes the SEP Manager using the provided
    API Root, credentials, and domain settings from the integration configuration.

    2. **Parameter Parsing**: It extracts the `Command IDS` string and splits it into
    a list of individual identifiers.

    3. **Status Retrieval**: For each command ID, the action calls the SEP SOAP API
    (`getCommandStatusDetails`) to retrieve the current execution status and details.

    4. **Result Aggregation**: The retrieved reports are collected into a JSON structure.

    5. **Completion**: The action outputs the aggregated reports as a JSON result
    and provides a summary message indicating the success of the retrieval process.


    ### Additional Notes

    This action does not interact with entities in the Google SecOps environment;
    it operates strictly on the provided command identifiers.
