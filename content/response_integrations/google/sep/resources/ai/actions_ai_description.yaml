ScanEndpoint:
  ai_description: >-
    Triggers a remote security scan on endpoints managed by Symantec Endpoint Protection
    (SEP). This action allows security analysts to initiate immediate scanning of
    suspicious hosts or IP addresses directly from the SOAR platform.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Scan Type | String | Yes | The type of scan to perform. Options include `ScanNow_Full`
    (comprehensive scan), `ScanNow_Quick` (fast scan of common areas), and `ScanNow_Custom`
    (user-defined scan configuration). Default is `ScanNow_Full`. |


    ### Flow Description


    1.  **Authentication**: Connects to the Symantec Endpoint Protection Manager (SEPM)
    using the configured API credentials and domain.

    2.  **Entity Resolution**: Iterates through the target entities (IP Addresses
    and Hostnames) to find their corresponding internal Computer IDs within the SEP
    environment.

    3.  **Command Execution**: For each identified computer, it sends a SOAP request
    to the SEPM Command Service to initiate the selected scan type.

    4.  **Tracking**: Retrieves a unique Command ID for each successful scan request.

    5.  **Internal Update**: Updates the entity's additional properties in Google
    SecOps with the `sep_scan_command_id` for audit and tracking purposes.
