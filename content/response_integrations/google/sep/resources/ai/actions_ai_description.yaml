ListEndpoints:
  ai_description: >-
    ### General Description

    This action retrieves a comprehensive list of all endpoints (sensors) configured
    within the Symantec Endpoint Protection (SEP) environment for the specified domain.
    It is primarily used for visibility and inventory purposes, allowing analysts
    to see the status and details of all managed devices.


    ### Parameters

    There are no input parameters for this action. It uses the global integration
    configuration (API Root, Username, Password, Domain, and Verify SSL) to authenticate
    and fetch data.


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the Symantec Endpoint
    Protection Manager (SEPM) using the provided credentials and retrieves an access
    token.

    2. **Domain Resolution**: It identifies the internal SEP domain ID based on the
    domain name provided in the configuration.

    3. **Data Retrieval**: The action calls the SEP API to fetch a list of all computers/endpoints
    associated with that domain.

    4. **Data Processing**: The retrieved list is processed into two formats: a raw
    JSON object and a CSV-formatted string for tabular display.

    5. **Output**: The action attaches a data table named "SEP Endpoints" to the case
    and provides the full list of endpoints as a JSON result.


    ### Additional Notes

    This action does not require any entities to be present in the context; it performs
    a global fetch of all endpoints managed by the SEPM instance.
