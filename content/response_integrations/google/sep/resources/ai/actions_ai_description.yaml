ListGroups:
  ai_description: >-
    ### General Description

    The **ListGroups** action retrieves a comprehensive list of all groups configured
    within the Symantec Endpoint Protection (SEP) Manager for the configured domain.
    This utility action is designed to provide administrators and analysts with visibility
    into the organizational structure and group hierarchy of the SEP environment.


    ### Parameters Description

    This action does not require any input parameters.


    ### Additional Notes

    - The action automatically targets the domain specified in the integration's global
    configuration.

    - It dynamically handles pagination by first querying the total number of elements
    and then requesting the full set in a single subsequent call.

    - The results are presented both as a raw JSON object and as a formatted data
    table named 'SEP Groups'.


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the SEP Manager
    using the credentials and API root provided in the integration settings.

    2. **Count Retrieval**: It performs an initial GET request to the `/api/v1/groups`
    endpoint to determine the total number of groups available.

    3. **Full Data Fetch**: Using the total count as the `pageSize` parameter, it
    performs a second GET request to retrieve the complete list of group objects.

    4. **Data Transformation**: The retrieved group data (including IDs, names, paths,
    and parent/child relationships) is processed and converted into a CSV-compatible
    format.

    5. **Output Generation**: The action populates a Siemplify data table with the
    group details, attaches the raw JSON result, and concludes with a summary message
    indicating the number of groups found.
