BlockHash:
  ai_description: >-
    ### General Description

    The **BlockHash** action allows security analysts to block specific file hashes
    on endpoints managed by Symantec Endpoint Protection (SEP). It works by adding
    MD5 hashes to a designated fingerprint blacklist within the SEP environment. This
    action is critical for containment during an incident, preventing known malicious
    files from executing across the network.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Black List Name | String | Yes | The name of the fingerprint list (blacklist)
    in Symantec Endpoint Protection where the hashes will be added. |


    ### Additional Notes

    - This action specifically supports **MD5** hashes (32 characters). Other hash
    types (like SHA256) are currently not supported by this specific implementation
    due to SEP 14 API limitations mentioned in the manager code.

    - The action first retrieves the existing hashes in the specified blacklist to
    avoid duplicates before updating the list on the server.


    ### Flow Description

    1. **Authentication**: Connects to the Symantec Endpoint Protection Manager using
    provided credentials and retrieves an access token.

    2. **Data Retrieval**: Fetches the current list of hashes associated with the
    provided 'Black List Name'.

    3. **Entity Filtering**: Iterates through the target entities, selecting only
    those of type `FILEHASH` that are 32 characters long (MD5) and not already present
    in the retrieved blacklist.

    4. **External Mutation**: Sends a request to the SEP API to update the fingerprint
    list with the new set of hashes.

    5. **Internal Update**: Updates the entities in Google SecOps by adding a custom
    property `SEP_IsBlocked: True` and saves these changes to the case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Updates or creates a fingerprint policy object (blacklist) in Symantec Endpoint
      Protection by adding new MD5 file hashes to the list.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'additional_properties' of the FileHash entities within Google SecOps
      to include the 'SEP_IsBlocked' flag.
  categories:
    enrichment: false
  entity_usage:
