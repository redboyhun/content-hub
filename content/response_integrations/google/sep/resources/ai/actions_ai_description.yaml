DisableDownloadInsight:
  ai_description: "### General Description\nDisables the **Download Insight** security\
    \ feature on Symantec Endpoint Protection (SEP) endpoints for a specified duration.\
    \ Download Insight is a reputation-based technology that detects potential threats\
    \ in files downloaded from the internet. This action is typically used by administrators\
    \ to temporarily bypass reputation checks on specific hosts during troubleshooting\
    \ or when deploying known-safe software that is being incorrectly flagged.\n\n\
    ### Parameters Description\n| Parameter | Type | Mandatory | Description |\n|\
    \ :--- | :--- | :--- | :--- |\n| Time Period | Integer | Yes | The duration (in\
    \ minutes) for which Download Insight will be disabled. The SEP Manager typically\
    \ accepts values between 1 and 720 minutes (12 hours). |\n\n### Additional Notes\n\
    * The action supports both **IP Address** and **Hostname** entities. \n* For Hostname\
    \ entities, the action first retrieves the system information to ensure the correct\
    \ computer name is used to fetch the internal SEP Computer ID.\n* The resulting\
    \ Command ID from the SEP Manager is stored in the entity's additional properties\
    \ for tracking purposes.\n\n### Flow Description\n1. **Authentication**: Connects\
    \ to the Symantec Endpoint Protection Manager using the provided credentials and\
    \ API root.\n2. **Entity Resolution**: For each target entity, the action attempts\
    \ to find the corresponding internal SEP `computer_id`:\n    * If the entity is\
    \ an **ADDRESS**, it searches by IP.\n    * If the entity is a **HOSTNAME**, it\
    \ retrieves computer info and then searches by the computer name.\n3. **Command\
    \ Execution**: If a valid `computer_id` is found, it sends a SOAP request to the\
    \ SEP Command Service to execute the `runClientCommandDisableDownloadInsight`\
    \ command with the specified `Time Period`.\n4. **Data Enrichment**: The unique\
    \ `command_id` returned by SEP is added to the entity's additional properties.\n\
    5. **Update**: Updates the entities within Google SecOps to reflect the new metadata\
    \ and provides a summary of the triggered commands."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Disables the Download Insight security feature on the target endpoint within
      the Symantec Endpoint Protection environment for a specified time period.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entity's additional properties with the Command ID returned by the
      SEP Manager.
  categories:
    enrichment: false
  entity_usage:
