UpdateAndScanEndpoint:
  ai_description: >-
    ### General Description

    Triggers a content update and a full system scan on endpoints managed by Symantec
    Endpoint Protection (SEP). This action is used to ensure that a suspicious or
    compromised endpoint has the latest security definitions and performs an immediate
    scan to detect potential threats.


    ### Parameters Description

    There are no user-configurable parameters for this action. The scan type is hardcoded
    to `Update_ScanNow_Full` within the script logic.


    ### Additional Notes

    - The action supports both IP Address and Hostname entities.

    - It retrieves the internal SEP `computer_id` before issuing the scan command.

    - The resulting `command_id` from the SEP Manager is stored in the entity's additional
    properties for tracking purposes.


    ### Flow Description

    1. **Authentication**: Connects to the Symantec Endpoint Protection Manager using
    the provided credentials and API root URL.

    2. **Entity Identification**: Iterates through the target entities (IP Addresses
    and Hostnames) to find their corresponding `computer_id` in the SEP environment.

    3. **Command Execution**: For each identified computer, it sends a request to
    the SEP Manager to perform a 'Content Update and Full Scan'.

    4. **Data Enrichment**: Captures the `command_id` returned by the SEP Manager
    and attaches it to the entity's `additional_properties` under the key `sep_update_and_scan_command_id`.

    5. **Entity Update**: Updates the entities within Google SecOps to reflect the
    new metadata and provides a summary of the triggered commands in the action output.
