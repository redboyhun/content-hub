UnblockHash:
  ai_description: "### General Description\nThe **UnblockHash** action removes specific\
    \ MD5 file hashes from a designated fingerprint blacklist within Symantec Endpoint\
    \ Protection (SEP). This action is used to remediate or whitelist hashes that\
    \ were previously restricted by the SEP policy.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Black List Name | String | Yes | The name of the fingerprint list (blacklist)\
    \ in the SEP Manager from which the hashes should be removed. |\n\n### Flow Description\n\
    1. **Authentication**: Connects to the Symantec Endpoint Protection Manager using\
    \ provided credentials.\n2. **Fetch Current Blacklist**: Retrieves the existing\
    \ list of hashes from the specified fingerprint list named in the parameters.\n\
    3. **Entity Matching**: Iterates through the provided `FILEHASH` entities and\
    \ identifies those that are MD5 formatted (32 characters) and currently present\
    \ in the SEP blacklist.\n4. **List Modification**: Removes the matching hashes\
    \ from the local list retrieved from SEP.\n5. **External Mutation**: Updates the\
    \ fingerprint policy on the SEP server by submitting the revised list (the original\
    \ list minus the unblocked hashes).\n6. **Internal Update**: Updates the entities\
    \ in Google SecOps with a new property `SEP_IsUnBlocked` and reports the results\
    \ to the case wall.\n\n### Additional Notes\n- This action only supports MD5 hashes\
    \ (32-character strings). \n- Note: The provided script logic sets the `SEP_IsUnBlocked`\
    \ property to `False` even when the unblocking is successful; this reflects the\
    \ literal implementation of the provided code."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
