UnquarantineEndpoint:
  ai_description: >-
    ### General Description

    This action unquarantines endpoint entities (IP addresses or Hostnames) within
    Symantec Endpoint Protection (SEP). It identifies the specific computer ID associated
    with the entity in the SEP Manager and issues a command to revert its quarantine
    status, effectively restoring its network access or operational state as defined
    by SEP policies.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the integration's
    global configuration (Username, Password, Domain, and API Root).


    ### Additional Notes

    * The action supports both **ADDRESS** (IP) and **HOSTNAME** entity types.

    * It uses SOAP-based commands to interact with the SEP CommandService.

    * Upon success, the action stores the SEP `command_id` in the entity's additional
    properties for tracking purposes.


    ### Flow Description

    1. **Authentication**: Connects to the Symantec Endpoint Protection Manager using
    the integration's credentials.

    2. **Entity Resolution**: Iterates through the target entities. For IP addresses,
    it fetches the Computer ID via a SOAP call. For Hostnames, it retrieves computer
    info to resolve the specific Computer ID.

    3. **Unquarantine Command**: For each resolved Computer ID, it sends a SOAP request
    to the SEP `CommandService` with the `Undo` command type to lift the quarantine.

    4. **Data Enrichment**: Updates the entity's `additional_properties` with the
    resulting `sep_unquarantine_command_id`.

    5. **Finalization**: Updates the entities in Google SecOps and returns a summary
    message of the operations performed.
