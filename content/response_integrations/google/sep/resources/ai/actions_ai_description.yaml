Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity and
    authentication between Google SecOps and the Symantec Endpoint Protection (SEP)
    Manager. It ensures that the integration configuration, including credentials
    and network access, is valid.


    ### Parameters Description

    This action does not have any input parameters. It relies entirely on the global
    integration settings:

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | N/A | This action does not require any input parameters. | N/A | N/A |


    ### Flow Description

    1. **Initialization**: The action retrieves the integration configuration, including
    the API Root, Username, Password, and Domain.

    2. **Authentication**: It initiates a connection to the SEP Manager and attempts
    to authenticate using the provided credentials via the `/api/v1/identity/authenticate`
    endpoint.

    3. **Domain Verification**: After successful authentication, the action retrieves
    the list of domains from the SEP Manager to verify that the configured domain
    exists and to obtain its internal ID.

    4. **Completion**: If all network requests succeed without exceptions, the action
    reports a successful connection.


    ### Additional Notes

    This action is strictly for connectivity testing and does not interact with or
    modify any security data or entities within the SEP environment.
