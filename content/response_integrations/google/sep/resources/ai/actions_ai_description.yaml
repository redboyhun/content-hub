    \ For `ADDRESS` entities, it fetches the Computer ID using the IP. For `HOSTNAME`\
    \ entities, it fetches computer info and then resolves the Computer ID.\n3. **Command\
    \ Execution**: For every resolved Computer ID, it calls the `runClientCommandEnableDownloadInsight`\
    \ method via the SEP SOAP API.\n4. **Data Enrichment**: Updates the entity's additional\
    \ properties with the unique SEP command ID generated by the manager.\n5. **Internal\
    \ Update**: Updates the entities in Google SecOps to reflect the new metadata\
    \ and completes the action with a summary of triggered commands."
