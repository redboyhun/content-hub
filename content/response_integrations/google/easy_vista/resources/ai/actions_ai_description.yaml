Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the EasyVista instance. It ensures that the integration configuration
    parameters (API Root, Account ID, Username, Password, and SSL settings) are correct
    and that the EasyVista API is reachable.


    ### Parameters Description

    This action does not require any input parameters from the user at runtime. It
    relies entirely on the configuration parameters defined at the integration level:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the EasyVista instance. |

    | Account ID | String | Yes | The specific Account ID for the EasyVista environment.
    |

    | Username | String | Yes | The username used for authentication. |

    | Password | String | Yes | The password used for authentication. |

    | Verify SSL | Boolean | Yes | If enabled, verifies the SSL certificate of the
    EasyVista server. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the connection details (API
    Root, Account ID, Credentials) from the integration's configuration.

    2. **Manager Initialization:** An instance of the `EasyVistaManager` is created
    using the retrieved settings.

    3. **Connectivity Test:** The action executes a `GET` request to the EasyVista
    `/requests` endpoint, limited to a single row (`max_rows=1`), to confirm the API
    is responsive and credentials are valid.

    4. **Response Validation:** The manager validates the HTTP response. If a successful
    status code is returned, the action completes successfully. If an error occurs
    (e.g., 401 Unauthorized or 500 Internal Error), an exception is raised.

    5. **Final Result:** The action reports a success message if the connection is
    established or a failure message with the specific error reason if it fails.
