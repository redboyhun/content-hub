Close EasyVista Ticket:
  ai_description: >-
    ### General Description

    The **Close EasyVista Ticket** action allows users to programmatically close a
    specific ticket within the EasyVista platform. This action does not operate on
    Google SecOps entities; instead, it requires a specific ticket identifier (RFC
    number) to target the correct record. It is primarily used for workflow synchronization
    and remediation by ensuring that tickets in the external ITSM tool are updated
    when a case is resolved in the SOAR.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Ticket Identifier** | String | Yes | The unique identifier for the EasyVista
    ticket (e.g., S201001_000001). |

    | **Comment** | String | No | A text comment explaining the reason for closing
    the ticket. |

    | **Actions Close Date** | String | No | The date and time to record for the closure
    (Format: `MM/DD/YYYY HH:MM:SS`). If left empty or provided in an incorrect format,
    the current system time will be used. |

    | **Delete ongoing actions?** | Boolean | No | If set to `True`, any ongoing actions
    associated with the ticket will be deleted upon closure. Default is `False`. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the EasyVista connection details
    (API Root, Account ID, Credentials) and the specific ticket parameters provided
    by the user.

    2. **Date Validation:** It checks if the `Actions Close Date` matches the required
    format (`MM/DD/YYYY HH:MM:SS`). If the format is invalid, it logs an error and
    defaults to using the current timestamp for the API call.

    3. **API Interaction:** The action utilizes the `EasyVistaManager` to send a `PUT`
    request to the EasyVista API endpoint for ticket modification. The payload includes
    the closure date, the comment, and the instruction regarding ongoing actions.

    4. **Result Handling:** If the API call is successful, the action completes with
    a success message. If the ticket is not found or an API error occurs (e.g., 401
    Unauthorized or 500 Internal Error), it reports a failure and logs the specific
    reason.


    ### Additional Notes

    - This action is a state-changing operation that modifies data in an external
    system.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status of a ticket to 'closed' in the EasyVista platform and can
      optionally delete ongoing actions associated with that ticket.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
