Add Comment to Ticket:
  ai_description: >-
    ### General Description

    Adds a comment to a specific ticket in the EasyVista service. This action allows
    users to update existing tickets with additional information or status updates
    directly from Google SecOps. It does not process entities from the case context
    and requires manual input of the ticket identifier.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Ticket Identifier | String | Yes | The unique identifier of the EasyVista ticket
    to which the comment will be added (e.g., S201001_000001). |

    | Comment | String | Yes | The text content of the comment to be added to the
    EasyVista ticket. |


    ### Additional Notes

    This action is designed to work independently of the entities present in a Google
    SecOps case. Both the ticket ID and the comment text must be provided as action
    parameters.


    ### Flow Description

    1. **Authentication**: The action initializes the EasyVista manager using the
    provided API Root, Account ID, and credentials (Username/Password).

    2. **Parameter Extraction**: It retrieves the `Ticket Identifier` and the `Comment`
    text from the action's input parameters.

    3. **API Interaction**: The action performs a `PUT` request to the EasyVista API
    endpoint (`/requests/{ticket_id}`) with a JSON payload containing the comment.

    4. **Validation**: It validates the API response to ensure the comment was successfully
    added.

    5. **Completion**: The action returns a success message and a boolean result indicating
    the outcome of the operation.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a comment to an existing ticket in the EasyVista system by performing a
      PUT request to the ticket's modification endpoint.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
