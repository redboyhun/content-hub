Get EasyVista Ticket:
  ai_description: >-
    ### General Description

    The **Get EasyVista Ticket** action retrieves comprehensive information for a
    specific ticket from the EasyVista platform. This action is designed to fetch
    metadata, descriptions, comments, actions, and attachment lists associated with
    a ticket identifier. Note that this action does not process Google SecOps entities;
    it relies entirely on a user-provided ticket identifier.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Ticket Identifier** | String | Yes | The unique EasyVista ticket identifier
    (RFC number) to retrieve information for, such as `I200716_000XXX` or `S201001_000001`.
    |


    ### Flow Description

    1. **Initialization**: The action initializes the EasyVista manager using the
    integration's configuration parameters (API Root, Account ID, and credentials).

    2. **Data Fetching**: The action executes multiple API GET requests to the EasyVista
    instance to collect:
        * General ticket information (status, timestamps, department, etc.).
        * The ticket's description.
        * Existing ticket comments.
        * A list of actions performed on the ticket.
        * A list of attachments associated with the ticket.
    3. **Data Aggregation**: The `EasyVistaParser` combines these disparate data points
    into a single `TicketInformation` object.

    4. **Output Generation**: The aggregated data is added to the action's execution
    results as a raw JSON object and formatted into a data table for display within
    the Google SecOps interface.


    ### Additional Notes

    * This action is strictly read-only and does not modify any data within EasyVista.

    * Because it does not iterate over `target_entities`, it will not automatically
    enrich entities found in an alert.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
