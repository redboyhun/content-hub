Wait for the Ticket Update:
  ai_description: "### General Description\nThe **Wait for the Ticket Update** action\
    \ is an asynchronous task designed to pause playbook execution until a specific\
    \ update occurs on an EasyVista ticket. This action is useful for workflows that\
    \ require manual intervention or external processing in EasyVista before proceeding\
    \ with automated steps in Google SecOps.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Ticket\
    \ Identifier | String | Yes | The unique identifier of the EasyVista ticket to\
    \ monitor (e.g., S201001_000001). |\n| Field To Monitor | String | No | The specific\
    \ ticket attribute to watch for changes. Supported values are `Status` (default),\
    \ `Comment`, or `Actions`. |\n\n### Flow Description\n1. **Initial State Capture**:\
    \ On the first run, the action retrieves the current value of the specified field\
    \ (`Status`, `Comment`, or `Actions`) for the given ticket identifier and stores\
    \ it as the baseline.\n2. **Periodic Polling**: Because the action is asynchronous,\
    \ it enters a polling loop. In each subsequent execution cycle, it fetches the\
    \ current value of the monitored field from EasyVista.\n3. **Change Detection**:\
    \ The action compares the newly fetched value with the baseline captured in the\
    \ first step.\n4. **Completion**: \n    * If a change is detected (e.g., the status\
    \ changes or a new comment is added), the action completes successfully and returns\
    \ the updated ticket information.\n    * If no change is detected, the action\
    \ remains in an 'In Progress' state and waits for the next polling interval.\n\
    \    * If the ticket is not found or an API error occurs, the action transitions\
    \ to a 'Failed' state.\n\n### Additional Notes\n- This action does not operate\
    \ on Google SecOps entities; it relies entirely on the provided `Ticket Identifier`\
    \ parameter.\n- The action will continue to poll until a change is detected or\
    \ the global action timeout is reached."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
