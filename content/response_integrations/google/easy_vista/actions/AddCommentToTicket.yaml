name: Add Comment to Ticket
description: 'Add a comment to the EasyVista ticket. Note: action is not working on
    Siemplify entities, action input parameters should be provided.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/easy-vista#add_comment_to_ticket
integration_identifier: EasyVista
parameters:
-   name: Ticket Identifier
    default_value: ''
    type: string
    description: EasyVista ticket identifier to get info for, eg S201001_000001.
    is_mandatory: true
-   name: Comment
    default_value: ''
    type: string
    description: Comment to add to EasyVista ticket.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
