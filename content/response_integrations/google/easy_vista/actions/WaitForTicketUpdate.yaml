name: Wait for the Ticket Update
description: 'Action pauses the playbook execution and periodically connects to EasyVista
    until timeout and checks if the specified ticket got an update. Action also can
    monitor specific field for the update, once that field is updated - action completes
    and fetches back the updated ticket information. '
integration_identifier: EasyVista
parameters:
-   name: Ticket Identifier
    default_value: ''
    type: string
    description: EasyVista ticket identifier, eg S201001_000001.
    is_mandatory: true
-   name: Field To Monitor
    default_value: Status
    type: ddl
    optional_values:
    - Status
    - Comment
    - Actions
    description: EasyVista ticket field to monitor for the update.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
is_async: true
