Change Case Stage:
  ai_description: >-
    ### General Description

    Updates the stage of a specific case in ArcSight. This action allows users to
    programmatically transition cases through different lifecycle phases within the
    ArcSight ESM environment, such as moving a case from 'INITIAL' to 'CLOSED'.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Case Name | String | Yes | The exact name of the case in ArcSight that you want
    to update. |

    | Stage | String | Yes | The new stage to assign to the case. Acceptable values
    are: `INITIAL`, `QUEUED`, `CLOSED`, `FINAL`, and `FOLLOW_UP`. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves connection settings (API Root,
    credentials) and action-specific parameters (Case Name and Stage).

    2. **Validation**: The script validates the provided `Stage` against a list of
    supported ArcSight case stages.

    3. **Authentication**: Connects to the ArcSight API and establishes an active
    session.

    4. **Case Retrieval**: Fetches the existing case data from ArcSight using the
    provided `Case Name`. This is necessary to obtain the full case object required
    for the update operation.

    5. **Mutation**: Modifies the `stage` attribute within the case's raw data structure
    to the new value.

    6. **External Update**: Sends a POST request to the ArcSight `update_case` endpoint
    with the modified case object to commit the change.

    7. **Session Termination**: Logs out of the ArcSight API to close the session.


    ### Additional Notes

    - This action does not process entities from the Google SecOps environment; it
    operates strictly based on the provided `Case Name` parameter.

    - If the provided `Stage` is not one of the five valid options, the action will
    fail before attempting to contact the API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the 'stage' field of a specific case in ArcSight by sending a POST request
      to the manager-service update endpoint.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
