Search:
  ai_description: >-
    ### General Description

    The **Search** action enables users to perform free-text searches for available
    resources within the ArcSight Manager. It is designed to locate various resource
    types such as Active Lists, Queries, Reports, or Cases based on a user-provided
    query string. This action is useful for resource discovery and management within
    the ArcSight ecosystem.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Search Query** | String | Yes | The specific search string used to query the
    ArcSight Manager for resources. |

    | **Max Items To Return** | Integer | No | Specifies the maximum number of results
    to be returned in the response. Defaults to 100. |


    ### Flow Description

    1. **Authentication**: The action establishes a session with the ArcSight Manager
    using the configured API root and credentials.

    2. **Search Execution**: It calls the `ManagerSearchService` with the provided
    search query and result limit.

    3. **Data Parsing**: The search hits returned by the API are parsed into structured
    objects.

    4. **Output Generation**: The action populates a data table named 'Results' with
    the search findings and attaches the full result set as a JSON object for further
    use in the playbook.

    5. **Cleanup**: The action explicitly logs out of the ArcSight Manager to ensure
    the session is closed correctly.
