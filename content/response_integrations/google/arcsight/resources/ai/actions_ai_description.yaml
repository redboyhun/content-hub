Add Entries To Activelist:
  ai_description: "Adds new entries to a specified Active List in ArcSight. This action\
    \ allows users to populate ArcSight lists using either delimited string formats\
    \ or a structured JSON array. It supports identifying the target list by its name\
    \ or unique UUID. \n\n### Parameters Description\n\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| **Columns** | String | No\
    \ | Semicolon-separated names of the columns where values should be placed (e.g.,\
    \ `Column1;Column2`). Required if using the 'Entries' parameter. |\n| **Entries**\
    \ | String | No | The actual data entries. Values within an entry are separated\
    \ by '|' and multiple entries are separated by ';' (e.g., `val1|val2;val3|val4`).\
    \ Required if using the 'Columns' parameter. |\n| **Active List UUID** | String\
    \ | No | The unique identifier of the target Active List. Takes priority over\
    \ 'Active list name'. |\n| **Active list name** | String | No | The name of the\
    \ target Active List. Used to resolve the UUID if 'Active List UUID' is not provided.\
    \ |\n| **Entries JSON** | String | No | A JSON list of objects representing entries\
    \ (e.g., `[{\"Col1\": \"Val1\"}, {\"Col1\": \"Val2\"}]`). |\n\n### Additional\
    \ Notes\n- Either **Active List UUID** or **Active list name** must be provided\
    \ to identify the target list.\n- Data must be provided using either the combination\
    \ of **Columns** + **Entries** OR the **Entries JSON** parameter. If both are\
    \ provided, the Columns/Entries combination takes priority.\n\n### Flow Description\n\
    1. **Parameter Initialization**: The action retrieves configuration settings (API\
    \ Root, credentials) and action parameters.\n2. **Validation**: It ensures that\
    \ a target list is specified and that entry data is provided in one of the supported\
    \ formats.\n3. **Data Parsing**: \n    - If using string parameters, it splits\
    \ the columns and entries based on the defined delimiters (`;` and `|`).\n   \
    \ - If using JSON, it parses the JSON string into a list of dictionaries and maps\
    \ them to a columnar format.\n4. **ArcSight Connection**: Authenticates with the\
    \ ArcSight Manager API.\n5. **UUID Resolution**: If only a list name was provided,\
    \ the action queries ArcSight to retrieve the corresponding UUID.\n6. **Mutation**:\
    \ Sends a POST request to the ArcSight API to add the parsed entries to the specified\
    \ Active List.\n7. **Finalization**: Logs out of the session and reports the execution\
    \ status."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds new data entries to an Active List within the ArcSight ESM system.
    fetches_data: true
    internal_data_mutation_explanation: null
