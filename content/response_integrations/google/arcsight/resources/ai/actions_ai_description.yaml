List Resources:
  ai_description: >-
    ### General Description

    The **List Resources** action retrieves a list of available resources from the
    ArcSight ESM manager. It allows users to discover and list Active Lists, Query
    Viewers, Cases, and Reports. This is primarily a discovery and utility action
    used to identify resource IDs or names for use in other ArcSight actions.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Return Active Lists** | Boolean | No | If enabled (default: True), the action
    retrieves available Active Lists. |

    | **Return Queries** | Boolean | No | If enabled (default: True), the action retrieves
    available Query Viewers. |

    | **Return Cases** | Boolean | No | If enabled (default: False), the action retrieves
    available Cases. |

    | **Return Reports** | Boolean | No | If enabled (default: False), the action
    retrieves available Reports. |

    | **Max Resources To Return** | Integer | No | Specifies the maximum number of
    resources to return per category (default: 50). |


    ### Additional Notes

    - At least one of the "Return ..." parameters must be set to **True** for the
    action to execute successfully.

    - The action outputs results both as a JSON object and as separate Data Tables
    for each resource type.

    - For Reports, the action automatically filters out unsupported resource types
    based on specific UUID prefixes.


    ### Flow Description

    1. **Initialization**: The action initializes the ArcSight manager using the provided
    API credentials and connection settings.

    2. **Parameter Extraction**: It reads the user-defined flags to determine which
    resource types (Active Lists, Queries, Cases, Reports) to fetch and sets the retrieval
    limit.

    3. **Authentication**: Logs into the ArcSight ESM manager to obtain a session
    token.

    4. **Data Retrieval**:
       - **Queries**: If requested, fetches Query Viewer IDs and then retrieves their
    full metadata.
       - **Active Lists**: If requested, fetches Active List IDs and then retrieves
    their full metadata.
       - **Cases**: If requested, fetches Case IDs and then retrieves their full metadata.
       - **Reports**: If requested, fetches Report IDs, filters out unsupported prefixes,
    and retrieves metadata for the remaining reports.
    5. **Output Generation**:
       - Constructs a consolidated JSON result containing all retrieved resources.
       - Creates individual Data Tables (e.g., "Available Queries", "Available Active
    List") for better visibility in the SOAR UI.
    6. **Cleanup**: Logs out of the ArcSight session to close the connection.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
