Get Query Results:
  ai_description: "### General Description\nRetrieves results for a specified query\
    \ from Micro Focus ArcSight. This action allows users to fetch data from pre-defined\
    \ queries within the ArcSight Manager, providing visibility into security events\
    \ and logs directly within Google SecOps. The action supports retrieving a specific\
    \ number of items and can identify queries by either their unique ID or their\
    \ display name.\n\n### Parameters Description\n\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| Query ID | String | No | The\
    \ unique identifier (UUID) of the query for which you want to return results.\
    \ If provided, this parameter takes priority over 'Query Name'. |\n| Max Items\
    \ To Return | Integer | No | Specifies the maximum number of result rows to return\
    \ in the response. Defaults to 100 if not specified. |\n| Query Name | String\
    \ | No | The name of the query for which you want to return results. This is used\
    \ to resolve the Query ID if the ID is not explicitly provided. |\n\n### Additional\
    \ Notes\n* **Mandatory Input**: Either the 'Query ID' or the 'Query Name' must\
    \ be provided for the action to run. If both are missing, the action will fail.\n\
    * **Output**: Results are presented in a Data Table named 'Results' and as a JSON\
    \ object for downstream playbook processing.\n\n### Flow Description\n1. **Authentication**:\
    \ The action logs into the ArcSight Manager using the configured credentials (API\
    \ Root, Username, Password).\n2. **Query Identification**: \n    * If a `Query\
    \ ID` is provided, the action uses it directly.\n    * If only a `Query Name`\
    \ is provided, the action calls the ArcSight API to retrieve the corresponding\
    \ UUID for that name.\n3. **Data Retrieval**: The action executes the query on\
    \ the ArcSight server and retrieves the result set, limited by the `Max Items\
    \ To Return` parameter.\n4. **Data Processing**: The retrieved rows are parsed\
    \ and mapped into a structured format.\n5. **Result Reporting**: \n    * If results\
    \ are found, they are added to the Google SecOps action results as a Data Table\
    \ ('Results') and a JSON object.\n    * If no results are found, the action completes\
    \ with a message indicating no data was returned.\n6. **Session Termination**:\
    \ The action logs out of the ArcSight Manager to close the session."
