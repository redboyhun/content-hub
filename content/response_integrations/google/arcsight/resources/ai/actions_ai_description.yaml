Is Value In Activelist Column:
  ai_description: >-
    ### General Description

    This action checks if entities within the current Google SecOps scope exist in
    a specific column of an ArcSight Active List. It is primarily used for enrichment
    and validation, allowing analysts to determine if an entity (such as an IP, File
    Hash, or Username) is already present in a managed list within ArcSight. If a
    match is found, the entity is updated with a specific attribute indicating its
    presence.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Active list UUID** | String | No | The unique identifier (UUID) of the ArcSight
    Active List. If provided, this takes priority over the 'Active list name'. |

    | **Column name** | String | Yes | The specific column within the Active List
    to search for the entity's identifier. |

    | **Active list name** | String | No | The display name of the ArcSight Active
    List. This is used to resolve the UUID if 'Active list UUID' is not provided.
    |


    ### Additional Notes

    - Either **Active list UUID** or **Active list name** must be provided for the
    action to function.

    - The action uses the entity's 'Original Identifier' for the comparison against
    the Active List column values.

    - If an entity is found, an additional property `IsInActivelist` is set to `True`
    on the entity object within Google SecOps.


    ### Flow Description

    1. **Initialization**: The action retrieves configuration parameters (API Root,
    credentials) and action parameters (UUID/Name, Column Name).

    2. **Authentication**: Connects to the ArcSight Manager and performs a login to
    obtain a session token.

    3. **Resource Resolution**: If a UUID is not provided, the action calls the ArcSight
    API to find the UUID associated with the provided Active List name.

    4. **Data Retrieval**: Fetches all entries from the specified Active List using
    its UUID.

    5. **Validation**: Verifies that the specified 'Column name' exists within the
    retrieved Active List data.

    6. **Entity Processing**: Iterates through all target entities in the scope. For
    each entity, it checks if its identifier exists in the specified column of the
    fetched entries.

    7. **Internal Mutation**: For every matching entity, it updates the entity's additional
    properties with `IsInActivelist: True` and prepares the entity for a batch update.

    8. **Result Reporting**: Adds the filtered JSON data (rows from the Active List
    that matched the entities) to the action results and updates the entities in the
    Google SecOps platform.

    9. **Cleanup**: Logs out of the ArcSight session.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates the 'additional_properties' of entities found in the active
      list by adding the 'IsInActivelist' key set to True.
