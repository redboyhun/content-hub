Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Arcsight server by attempting to authenticate and
    then terminate the session. This action ensures that the provided credentials
    and network configuration are correct and that the Arcsight REST API is reachable.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the following
    integration configuration parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Root | String | Yes | The IP address or hostname of the Arcsight server.
    |

    | Username | String | Yes | The username used to authenticate with Arcsight. |

    | Password | String | Yes | The password used to authenticate with Arcsight. |

    | CA Certificate File | String | No | Base64 encoded CA certificate file for SSL
    verification. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the server. Default is False. |


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying that the SOAR
    platform can communicate with the Arcsight instance.


    ### Flow Description

    1. **Initialize Manager**: The action initializes the Arcsight API manager using
    the provided configuration parameters.

    2. **Login**: It attempts to log in to the Arcsight server to obtain an authentication
    token.

    3. **Logout**: Upon a successful login, it immediately calls the logout endpoint
    to invalidate the token and close the session.

    4. **Result**: If both steps succeed, the action returns a success status; otherwise,
    it fails with an error message detailing the cause.
