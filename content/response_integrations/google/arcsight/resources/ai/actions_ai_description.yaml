Get Activelist Entries:
  ai_description: >-
    ### General Description

    This action retrieves entries from a specified active list within ArcSight. It
    allows users to fetch data based on either the active list's unique identifier
    (UUID) or its display name. The retrieved data is presented as a data table and
    a JSON result, with an option to map column headers directly to values for easier
    parsing.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Active list UUID | String | No* | The unique identifier of the ArcSight active
    list. This parameter takes priority over the 'Active list name'. |

    | Active list name | String | No* | The display name of the active list to retrieve
    entries from. |

    | Map Columns | Boolean | No | If set to true, the action will map column headers
    to their respective values in the JSON output. Default is false. |

    | Max Entries To Return | Integer | No | Specifies the maximum number of entries
    to retrieve from the list. |


    ### Additional Notes

    *   **Mandatory Inputs:** Either 'Active list UUID' or 'Active list name' must
    be provided for the action to execute successfully. If both are provided, the
    UUID is used.

    *   **Output:** The action generates a data table named 'Entries' and a JSON result
    containing the list data.


    ### Flow Description

    1.  **Initialization:** The action initializes the ArcSight manager using provided
    credentials and configuration.

    2.  **Validation:** It checks if at least one identifier (UUID or Name) for the
    active list is provided.

    3.  **UUID Resolution:** If only a name is provided, the action queries ArcSight
    to retrieve the corresponding UUID.

    4.  **Data Retrieval:** The action calls the ArcSight API to fetch entries for
    the specified UUID, applying the 'Max Entries To Return' limit if provided.

    5.  **Data Processing:** If entries are found, they are processed into a CSV format
    for the data table and a JSON format (with optional column mapping).

    6.  **Finalization:** The action attaches the results to the case, logs out of
    the ArcSight session, and completes the execution.
