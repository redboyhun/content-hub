Get Report:
  ai_description: >-
    ### General Description

    The **Get Report** action retrieves and downloads a specific report from ArcSight
    based on its URI. It supports dynamic parameters to filter or customize the report
    generation at runtime. The downloaded report is attached to the case, and if the
    format is CSV, the data is also presented as a structured data table and JSON
    result.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Report Full Path (URI) | String | Yes | The full URI path to the report in ArcSight
    (e.g., `/All Reports/ArcSight Foundation/MITRE ATT&CK/Mitre ATT&CK Summary`).
    |

    | Field 2 - Field 10 | String | No | Dynamic fields for the query to generate
    the report. These should be provided in `key=value` format. |


    ### Additional Notes

    - This action does not operate on specific entities; it is a global action used
    to fetch reporting data.

    - Only CSV reports are currently parsed into data tables and JSON results; other
    formats (PDF, XLS, etc.) are provided as attachments only.


    ### Flow Description

    1. **Authentication**: Logs in to the ArcSight Manager using the provided API
    root and credentials.

    2. **Metadata Retrieval**: Fetches report information, including the internal
    ID and file format, using the provided URI.

    3. **Token Generation**: Requests a download token from ArcSight, incorporating
    any dynamic parameters provided in the 'Field' parameters.

    4. **Download**: Retrieves the raw report content from the server using the download
    token.

    5. **Data Processing**: If the report format is CSV, the action parses the content
    into JSON and adds a data table to the SOAR case.

    6. **Attachment**: Attaches the downloaded report file to the case with a descriptive
    name.

    7. **Cleanup**: Logs out of the ArcSight session to ensure security.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds a data table to the case (if the report is CSV) and uploads
      the report file as an attachment to the case.
