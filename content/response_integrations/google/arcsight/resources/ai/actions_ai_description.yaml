Add Entities To Active List:
  ai_description: >-
    ### General Description\nAdds entities from the current Google SecOps context
    into a specified **ArcSight Active List**. This action is primarily used to synchronize
    threat intelligence or observed indicators (like malicious IPs or hostnames) from
    an investigation into ArcSight for further correlation or monitoring.\n\n### Parameters\n|
    Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n|
    **Active List Name** | String | Yes | The name of the active list in ArcSight
    where the entities should be added. |\n| **Entity Column** | String | Yes | The
    name of the column in the ArcSight active list that will store the entity identifier.
    |\n| **Additional Fields** | String (JSON) | No | A JSON object containing additional
    column-value pairs to be populated in the active list alongside the entity. Example:
    `{\"Reason\": \"Phishing\", \"Source\": \"SOAR\"}`. |\n\n### Flow Description\n1.
    **Parameter Extraction**: Retrieves the Active List name, target column, and any
    additional field data from the action parameters.\n2. **Entity Collection**: Gathers
    all entities present in the current action scope.\n3. **ArcSight Authentication**:
    Establishes a session with the ArcSight Manager.\n4. **Resource Identification**:
    Queries ArcSight to find the unique UUID associated with the provided Active List
    name.\n5. **Data Preparation**: Constructs a payload mapping each entity's original
    identifier to the specified 'Entity Column' and merges it with the 'Additional
    Fields' data.\n6. **External Mutation**: Sends a request to ArcSight to append
    these entries to the identified Active List.\n7. **Cleanup**: Logs out of the
    ArcSight session.\n\n### Additional Notes\n- If no entities are found in the scope,
    the action will fail with an informative error.\n- The `Additional Fields` parameter
    must be a valid JSON string.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds entity identifiers and optional additional field values as new entries
      into a specified ArcSight Active List.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
