name: ArcSight - Security Events Connector
parameters:
-   name: DeviceProductField
    default_value: type
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: name
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: 360
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: API Root
    default_value: https://{ip}
    type: string
    description: API root of the ArcSight instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: Username of the ArcSight account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: Password of the ArcSight account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Report Name
    default_value: ''
    type: string
    description: Name of the report that will be used to fetch events.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Fetch Base Events
    default_value: 'true'
    type: boolean
    description: If enabled, connector will also fetch base events.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Lowest Priority To Fetch
    default_value: ''
    type: string
    description: Lowest priority that will be used to fetch events. Possible values
        are in range 1 to 10. If nothing is provided, all events will be ingested.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Events To Fetch
    default_value: '100'
    type: integer
    description: How many alerts to process per one connector iteration. Maximum is
        1000.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use dynamic list as a blocklist
    default_value: 'false'
    type: boolean
    description: If enabled, dynamic lists will be used as a blocklist.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Verify SSL
    default_value: 'false'
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        ArcSight server is valid.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
description: 'Pull correlations from ArcSight. Note: dynamic list works with "name"
    parameter. Please refer to the doc portal for the configuration setup. This connector
    is suitable for Saas deployment of Chronicle SOAR and is the recommended one for
    production use.'
integration: Arcsight
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/arcsight#security-event-connector
rules: []
is_connector_rules_supported: false
creator: admin
