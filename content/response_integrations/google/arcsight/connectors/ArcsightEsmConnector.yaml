name: Arcsight ESM Connector
parameters:
-   name: DeviceProductField
    default_value: device_product
    type: string
    description: The field name used to determine the device product
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: name
    type: string
    description: The field name used to determine the event name (sub-type)
    is_mandatory: false
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: '500'
    type: string
    description: The timeout limit (in seconds) for the python process running current
        script
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Server Address
    type: string
    description: Server address of the ArcSight instance
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    type: string
    description: Username of the ArcSight account
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Password
    type: password
    description: Password of the ArcSight account
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Events Count Limit
    default_value: '15'
    type: integer
    description: How many events to process per one alert
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Cases Folder Path
    default_value: /opt/Correlations
    type: string
    description: 'Absolute path to cases. Example: /opt/Correlations'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Alerts Count Limit
    default_value: '10'
    type: integer
    description: How many alerts to process per one iteration
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Environment Field Name
    default_value: event.CustomerURI
    type: string
    description: The name of the environment's field. e.g. event.CustomerURI
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Secondary Device Product Field
    type: string
    description: Secondary field for Device Product
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Alert Custom Fields Names
    type: string
    description: 'Additional fields that should be added to Siemplify Alert. Example:
        source_address'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Done files retention days
    default_value: '3'
    type: integer
    description: 'For how many days to leave files in the “Done” folder '
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Error files retention days
    default_value: '14'
    type: integer
    description: For how many days to leave files in the “Error” folder
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        ArcSight ESM server is valid.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: CA Certificate File
    default_value: ''
    type: string
    description: Base 64 encoded CA certificate file.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Arcsight ESM Connector
integration: Arcsight
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/arcsight#connectors
rules: []
is_connector_rules_supported: false
creator: admin
