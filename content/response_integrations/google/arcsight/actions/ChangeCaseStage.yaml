name: Change Case Stage
description: Update the stage of the case in ArcSight.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/arcsight#change_case_stage
integration_identifier: Arcsight
parameters:
-   name: Case Name
    default_value: ''
    type: string
    description: Specify the name of the case for which you want to update the stage.
    is_mandatory: true
-   name: Stage
    default_value: ''
    type: string
    description: 'Specify a new stage for the case. Possible values: INITIAL, QUEUED,
        CLOSED, FINAL, and FOLLOW_UP.'
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
script_result_name: success
