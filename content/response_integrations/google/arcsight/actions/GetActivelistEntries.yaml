name: Get Activelist Entries
description: Retrieve active list entries in ArcSight
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/arcsight#get_activelist_entries
integration_identifier: Arcsight
parameters:
-   name: Active list UUID
    default_value: ''
    type: string
    description: 'Specify the UUID of the active list for which you want to retrieve
        entries. Note: parameter “Active list UUID“ takes priority over “Active list
        name“. Example: HLZRc9yYBABC-lHtlf3-f0Q=='
    is_mandatory: false
-   name: Active list name
    default_value: ''
    type: string
    description: 'Specify the name of the active list for which you want to retrieve
        entries. Note: parameter “Active list UUID“ takes priority over “Active list
        name“.'
    is_mandatory: false
-   name: Map Columns
    default_value: false
    type: boolean
    description: If enabled, action will map columns to the values in the JSON result.
    is_mandatory: false
-   name: Max Entries To Return
    default_value: ''
    type: string
    description: Specify how many entries to return.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_activelist_entries_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: Success_Indicator
