name: List Resources
description: List available queries in ArcSight.
integration_identifier: Arcsight
parameters:
-   name: Return Active Lists
    default_value: true
    type: boolean
    description: If enabled, action will return available active lists.
    is_mandatory: false
-   name: Return Queries
    default_value: true
    type: boolean
    description: If enabled, action will return available queries
    is_mandatory: false
-   name: Return Cases
    default_value: false
    type: boolean
    description: If enabled, action will return available cases.
    is_mandatory: false
-   name: Return Reports
    default_value: false
    type: boolean
    description: If enabled, action will return available reports.
    is_mandatory: false
-   name: Max Resources To Return
    default_value: 50
    type: string
    description: Specify how many resources to return per type.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_resources_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
