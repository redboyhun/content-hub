Ping:
  ai_description: >-
    ### General Description: The Ping action is a diagnostic tool designed to verify
    the connectivity between Google SecOps and the Twilio service. It ensures that
    the provided credentials (Account SID and Authentication Token) are valid and
    that the environment can successfully communicate with the Twilio API. ### Parameters
    Description: There are no action-specific parameters for this action. It relies
    on the integration's global configuration (Account SID and Authentication Token).
    ### Flow Description: 1. **Initialization**: The action retrieves the AccountSid
    and AuthenticationToken from the Twilio integration configuration. 2. **Connectivity
    Test**: It initializes the TwilioManager and attempts to retrieve a single message
    from the Twilio account using the list_messages method. 3. **Validation**: If
    the API call succeeds, it confirms the connection is established. If it fails
    (e.g., due to invalid credentials or network issues), it captures the error and
    reports a failure. ### Additional Notes: This action is primarily used during
    the initial setup of the Twilio integration or for troubleshooting communication
    issues.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
