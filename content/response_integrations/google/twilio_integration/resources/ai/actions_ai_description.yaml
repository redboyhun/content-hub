    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Send SMS:
  ai_description: >-
    ### General Description

    Sends an SMS message to a specified phone number using the Twilio service. This
    action is primarily used for automated notifications, multi-factor authentication
    workflows, or out-of-band communication with stakeholders during an incident response
    process.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Phone Number | String | True | The target phone number that will receive the
    SMS. This must include the country dial code (e.g., +1234567890). |

    | Message | String | True | The text content of the SMS message to be sent. |


    ### Flow Description

    1. **Initialization**: The action retrieves the Twilio Account SID, Authentication
    Token, and the 'From' phone number from the integration's global configuration.

    2. **Parameter Extraction**: It extracts the target 'Phone Number' and the 'Message'
    content provided as action inputs.

    3. **API Interaction**: The action initializes the Twilio client and calls the
    messaging API to create and send a new SMS message from the configured Twilio
    number to the target recipient.

    4. **Outcome Reporting**: If the API call is successful, the action completes
    with a success status and logs the message details. If the API call fails (e.g.,
    invalid credentials or number), it captures the error and reports a failure.


    ### Additional Notes

    - Ensure the 'SmsPhoneNumber' in the integration settings is a valid Twilio-purchased
    number or a verified caller ID.

    - The target phone number should follow the E.164 formatting standard for reliable
    delivery.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Sends an SMS message to an external recipient via the Twilio API, which constitutes
      an external communication and state change.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
