Send SMS And Wait:
  ai_description: >-
    ### General Description

    Sends an SMS message to a target phone number and waits for a response. This action
    is useful for out-of-band communication or user verification during an investigation.
    It appends a unique generated ID to the message to track the specific conversation
    thread.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Phone Number | String | Yes | The target phone number including the dial code
    (e.g., +123456789). |

    | Message | String | Yes | The content of the SMS message to be sent. |


    ### Flow Description

    1. **Initialization**: The action generates a unique 5 to 6-digit numeric ID.

    2. **Message Preparation**: The generated ID is appended to the message body along
    with instructions for the recipient to include the ID in their reply.

    3. **Transmission**: The SMS is sent to the specified phone number using the Twilio
    service.

    4. **Async Waiting**: The action enters an 'In Progress' state and stores the
    ID and timestamp.

    5. **Polling (Query Job)**: The action periodically checks Twilio for incoming
    messages from the target phone number that were sent after the initial message.

    6. **Verification**: It searches the fetched messages for a body that ends with
    the specific generated ID.

    7. **Completion**: Once a matching message is found, the action retrieves the
    reply content and marks the execution as completed.


    ### Additional Notes

    This is an asynchronous action. It will continue to run in the background until
    a response is received or the action times out.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
