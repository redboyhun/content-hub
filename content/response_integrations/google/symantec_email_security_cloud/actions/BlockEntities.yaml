name: Block Entities
description: 'Block entities in Symantec Email Security.Cloud. Supported entities:
    Hostname, IP address, URL, Filehash, Email Subject, Email Address (user entity
    that matches email regex). Note: only MD5 and SHA256 hashes are supported. All
    of the entities are treated as "sender IOCs" during blocking.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/symantec-email-security-cloud#block_entities
integration_identifier: SymantecEmailSecurityCloud
parameters:
-   name: Remediation Action
    default_value: Block and Delete
    type: ddl
    optional_values:
    - Block and Delete
    - Quarantine
    - Redirect
    - Tag Subject
    - Append Header
    description: Specify the remediation action for the entities.
    is_mandatory: false
-   name: Description
    default_value: Blocked by Siemplify
    type: string
    description: Specify a description that should be added to the blocked entities.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/block_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS", "HOSTNAME", "USERUNIQNAME", "DestinationURL",
    "FILEHASH", "EMAILSUBJECT"]}'
