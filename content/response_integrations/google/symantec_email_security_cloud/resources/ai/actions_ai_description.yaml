Block Entities:
  ai_description: "### General Description\nThis action blocks specific entities within\
    \ Symantec Email Security.Cloud by adding them to the platform's IOC (Indicator\
    \ of Compromise) list. It supports a variety of entity types including IP addresses,\
    \ hostnames, URLs, file hashes (MD5 and SHA256), email subjects, and email addresses.\
    \ The action allows users to define a remediation strategy (e.g., Block and Delete,\
    \ Quarantine) and provides a description for the blocked entries. All entities\
    \ are processed as 'sender IOCs' during the blocking operation.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Remediation Action | Dropdown (String) | No | Specifies the\
    \ action to take on the entities. Options include: 'Block and Delete' (default),\
    \ 'Quarantine', 'Redirect', 'Tag Subject', and 'Append Header'. |\n| Description\
    \ | String | Yes | A descriptive note to be associated with the blocked entities\
    \ in the Symantec system (e.g., 'Blocked by Siemplify'). |\n\n### Additional Notes\n\
    - **File Hashes:** Only MD5 and SHA256 hashes are supported. The action validates\
    \ the length of the hash string before processing.\n- **Email Addresses:** User\
    \ entities are only processed if they match a valid email regex pattern.\n- **API\
    \ Interaction:** The action uses the 'MERGE' action on the Symantec IOC upload\
    \ endpoint, meaning it adds or updates the provided IOCs without overwriting the\
    \ entire existing list.\n\n### Flow Description\n1. **Initialization:** Retrieves\
    \ integration configuration (API Root, Credentials) and action parameters (Remediation\
    \ Action, Description).\n2. **Entity Filtering:** Iterates through the target\
    \ entities and filters for supported types: ADDRESS, HOSTNAME, USERUNIQNAME, DestinationURL,\
    \ FILEHASH, and EMAILSUBJECT.\n3. **Validation and Mapping:** \n    - Validates\
    \ file hash lengths (32 for MD5, 64 for SHA256).\n    - Validates email formats\
    \ for User entities.\n    - Maps SecOps entity types to Symantec-specific IOC\
    \ types (e.g., `senderipaddress`, `url`, `subject`).\n4. **API Execution:** Sends\
    \ a single POST request to the Symantec Email Security.Cloud API containing the\
    \ batch of mapped IOCs, the chosen remediation action, and the description.\n\
    5. **Result Processing:** Parses the API response to determine which entities\
    \ were successfully blocked and which failed (including failure reasons), then\
    \ updates the action output and JSON results."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds or updates indicators (IOCs) in the Symantec Email Security.Cloud blocklist
      and assigns a remediation action such as 'Block and Delete' or 'Quarantine'.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    - USERUNIQNAME
    - DestinationURL
    - FILEHASH
    - EMAILSUBJECT
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
