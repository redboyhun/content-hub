    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the Symantec Email Security.Cloud instance. It ensures that
    the provided credentials (Username and Password) and the API Root URL are correct
    and that the network path is open.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **IOC API Root** | String | Yes | The base URL for the Symantec Email Security.Cloud
    IOC API. |

    | **Username** | String | Yes | The username used for basic authentication with
    the Symantec API. |

    | **Password** | String | Yes | The password used for basic authentication with
    the Symantec API. |

    | **Verify SSL** | Boolean | No | If enabled, the action will verify the SSL certificate
    of the API server. |


    ### Additional Notes

    - This action does not process any entities.

    - It is primarily used during the initial setup of the integration or for troubleshooting
    connection issues.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API Root, Username, Password,
    and SSL verification settings from the integration configuration.

    2. **Manager Initialization:** It initializes the `SymantecEmailSecurityCloudManager`
    with the provided credentials.

    3. **Connectivity Test:** The manager executes a `GET` request to the global IOC
    download endpoint (`/domains/global/iocs/download`).

    4. **Result Reporting:** If the request returns a successful status code, the
    action completes with a success message. If an exception occurs (e.g., authentication
    failure or network timeout), the action fails and reports the error details.
  capabilities:
    can_create_case_comments: false
