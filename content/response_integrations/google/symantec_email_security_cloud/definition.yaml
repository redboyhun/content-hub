identifier: SymantecEmailSecurityCloud
name: Symantec Email Security.Cloud
parameters:
-   name: IOC API Root
    default_value: https://iocapi.emailsecurity.symantec.com
    type: string
    description: IOC API root of the Symantec Email Security.Cloud instance.
    is_mandatory: true
    integration_identifier: SymantecEmailSecurityCloud
-   name: Username
    default_value: ''
    type: string
    description: Username of the Symantec Email Security.Cloud instance.
    is_mandatory: true
    integration_identifier: SymantecEmailSecurityCloud
-   name: Password
    default_value: ''
    type: password
    description: Password of the Symantec Email Security.Cloud instance.
    is_mandatory: true
    integration_identifier: SymantecEmailSecurityCloud
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Symantec Email Security.Cloud server is valid.
    is_mandatory: true
    integration_identifier: SymantecEmailSecurityCloud
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/symantec-email-security-cloud
categories:
- Email Security
svg_logo_path: resources/logo.svg
image_path: resources/image.png
