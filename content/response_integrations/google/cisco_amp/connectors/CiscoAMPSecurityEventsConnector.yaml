name: Cisco AMP - Security Events Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: event_type
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: API Root
    default_value: https://{{ip address}}
    type: string
    description: API root of the Cisco AMP instance.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Client ID
    default_value: ''
    type: string
    description: Client AMP Client ID.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Key
    default_value: ''
    type: password
    description: Cisco AMP API Key.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Lowest Severity To Fetch
    default_value: ''
    type: string
    description: 'Severity that will be used to fetch events. If nothing is specified,
        connector will ingest all events. Possible values: Low, Medium, High, Critical.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Fetch Events Without Severity
    default_value: true
    type: boolean
    description: If enabled, the connector will fetch events that don't have severity.
        Those events will be assigned "Informational" severity.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Events To Fetch
    default_value: 100
    type: integer
    description: 'How many alerts to process per one connector iteration. Maximum
        is 1000. Default: 100.'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        events from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: Proxy server address.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: Proxy username.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: Proxy password.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled,, verify the SSL certificate for the connection to the
        Cisco AMP server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
description: 'Pull security events from Cisco AMP into Siemplify. Note: whitelist
    works with eventType parameter.'
integration: CiscoAMP
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cisco-amp#security-events-connector
rules: []
is_connector_rules_supported: false
creator: admin
