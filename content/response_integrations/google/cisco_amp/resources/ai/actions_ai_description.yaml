Get Computers By Network Activity (Ip):
  ai_description: >-
    ### General Description

    The **Get Computers By Network Activity (Ip)** action identifies computers within
    a Cisco AMP environment that have communicated with a specific IP address. It
    is designed to help security analysts trace network activity back to specific
    endpoints, facilitating incident scoping and threat hunting.


    ### Parameters Description

    This action does not require any specific input parameters. It utilizes the global
    Cisco AMP integration settings:

    * **Api Root**: The base URL for the Cisco AMP API.

    * **Client ID**: The unique identifier for the API client.

    * **Api Key**: The secret key for API authentication.

    * **Use SSL**: Boolean flag to determine if SSL verification should be used.


    ### Additional Notes

    * This action exclusively processes entities of type **ADDRESS** (IP addresses).

    * Results are presented both as a structured JSON object and as a human-readable
    data table attached to the case.


    ### Flow Description

    1. **Entity Identification**: The action iterates through all entities in the
    current context and filters for those of type `ADDRESS`.

    2. **Activity Search**: For each identified IP address, the action queries the
    Cisco AMP `/v1/computers/activity` endpoint to find any recorded network events
    associated with that IP.

    3. **Computer Detail Retrieval**: For every computer found in the activity logs
    (identified by a connector GUID), the action performs a follow-up request to `/v1/computers/{guid}`
    to retrieve detailed metadata, including hostname, operating system, and internal/external
    IP addresses.

    4. **Data Transformation**: The raw computer data is cleaned (removing internal
    API links) and flattened into a readable format.

    5. **Reporting**: The action generates a CSV-formatted data table for each IP
    address and updates the entities within Google SecOps to reflect the enrichment
    status.
