Create Group:
  ai_description: >-
    ### General Description

    Creates a new group in Cisco AMP. This action allows for the programmatic organization
    of endpoints and policies by defining a new group container within the Cisco AMP
    environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group Name | String | Yes | The name of the new group to be created. |

    | Group Description | String | Yes | The description of the new group, providing
    context or purpose. |


    ### Flow Description

    1. **Initialization**: The action initializes the Cisco AMP manager using the
    integration's configuration (API Root, Client ID, Api Key, and SSL settings).

    2. **Parameter Extraction**: It retrieves the 'Group Name' and 'Group Description'
    provided by the user.

    3. **API Interaction**: The action sends a POST request to the Cisco AMP `/v1/groups`
    endpoint with the specified name and description.

    4. **Completion**: The response from the API is added to the action's JSON results,
    and the action concludes with a success message indicating the group was created.
