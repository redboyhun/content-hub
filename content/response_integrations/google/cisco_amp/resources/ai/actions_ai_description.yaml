Isolate Machine:
  ai_description: >-
    Isolates machine entities within Cisco AMP to prevent the spread of threats. This
    action targets Hostname and IP Address entities, resolves them to a specific Cisco
    AMP connector GUID, and triggers the isolation command.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action requires the Cisco AMP 'Api Root', 'Client ID', and 'Api Key' to be
    configured in the integration settings. It supports both internal and external
    IP addresses for resolution.


    ### Flow Description

    1. **Entity Filtering**: The action identifies supported entities (IP Address
    and Hostname) from the target list.

    2. **Computer Resolution**: For each entity, it queries Cisco AMP to retrieve
    the computer's metadata, specifically looking for the `connector_guid`.

    3. **Isolation Trigger**: If a matching computer is found, the action sends a
    PUT request to the Cisco AMP isolation endpoint using the retrieved GUID.

    4. **Internal Update**: Successfully processed entities are updated within Google
    SecOps, and the isolation status (including unlock codes if applicable) is returned
    as JSON results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      The action performs a PUT request to the Cisco AMP API endpoint '/v1/computers/{connector_guid}/isolation'
      to change the isolation state of the target machine.
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action calls 'update_entities' to refresh the state of the entities in the
      Google SecOps case after the isolation process.
