Add File To File List:
  ai_description: >-
    ### General Description

    This action adds SHA-256 file hashes to a specified file list within Cisco AMP.
    It is primarily used for managing blacklists or application blocking lists by
    programmatically appending new threat indicators discovered during an investigation.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File List Name | String | Yes | The name of the target file list in Cisco AMP
    where the hashes should be added (e.g., 'File Blacklist'). |

    | Description | String | Yes | A descriptive note to be associated with the file
    hash entry in the Cisco AMP list. |


    ### Flow Description

    1. **Configuration Retrieval:** The action initializes the Cisco AMP manager using
    the provided API credentials and connection settings.

    2. **List Identification:** It retrieves the unique identifier (GUID) for the
    file list specified in the 'File List Name' parameter by querying Cisco AMP's
    custom detections and application blocking lists.

    3. **Entity Filtering:** The action iterates through the target entities, specifically
    looking for `FILEHASH` types.

    4. **Validation:** It validates that the file hash is a SHA-256 (exactly 64 characters
    long), as required by the Cisco AMP API for this operation.

    5. **External Mutation:** For each valid hash, it performs a POST request to Cisco
    AMP to add the hash and the provided description to the identified file list.

    6. **Internal Update:** Successfully processed entities are updated within the
    Google SecOps case, and a summary message is returned.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      The action performs a POST request to the Cisco AMP API to add a new file hash
      entry to a specified file list, such as a blacklist or application blocking
      list.
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates the entity objects within the Google SecOps case using the
      update_entities method to reflect that they have been processed and added to
      the external list.
  categories:
