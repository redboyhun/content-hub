Get File List Items:
  ai_description: >-
    ### General Description

    The **Get File List Items** action retrieves all items (such as file hashes and
    descriptions) associated with a specific file list in Cisco AMP. It is designed
    to work with both 'Simple Custom Detections' and 'Application Blocking' list types.
    This action is primarily used for auditing existing lists or fetching a set of
    indicators for further processing in a workflow.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File List Name | String | Yes | The name of the file list in Cisco AMP to retrieve
    items from (e.g., 'File Blacklist'). |


    ### Flow Description

    1. **Initialization**: The action retrieves the Cisco AMP API credentials and
    the 'File List Name' parameter.

    2. **List Discovery**: It searches for the specified list name by querying the
    Cisco AMP API for 'Simple Custom Detections'. If not found, it queries 'Application
    Blocking' lists.

    3. **Item Retrieval**: Once the list is found, the action fetches all file items
    associated with that list's unique identifier (GUID).

    4. **Data Sanitization**: The action iterates through the retrieved items, removes
    irrelevant metadata links, and flattens the data structure.

    5. **Output**: The processed items are added to the case as a Data Table and returned
    as a JSON result for use in subsequent playbook steps.


    ### Additional Notes

    This action does not require or process specific entities from the alert; it performs
    a global lookup based on the provided parameter.
