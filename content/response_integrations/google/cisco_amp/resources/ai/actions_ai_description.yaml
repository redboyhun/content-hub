Unisolate Machine:
  ai_description: >-
    ### General Description

    This action stops the isolation of machine entities (IP Addresses or Hostnames)
    within Cisco AMP. It is used to restore network connectivity to a previously isolated
    endpoint by communicating with the Cisco AMP API using the machine's unique connector
    GUID.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    * The action relies on the integration configuration for 'Api Root', 'Client ID',
    and 'Api Key'.

    * The action supports both internal and external IP addresses by checking the
    entity's 'is_internal' attribute during the lookup phase.


    ### Flow Description

    1. **Entity Identification**: The action iterates through the provided IP Address
    and Hostname entities.

    2. **Computer Lookup**: For each entity, it queries the Cisco AMP API to find
    the corresponding computer record. For IP addresses, it distinguishes between
    internal and external IPs based on the entity metadata.

    3. **Unisolation Command**: If a matching computer is found, the action retrieves
    its `connector_guid` and sends a DELETE request to the Cisco AMP isolation endpoint
    to stop the isolation.

    4. **Internal Updates**: Successfully processed entities are added to a list to
    be updated within Google SecOps.

    5. **Result Reporting**: The action provides a summary message of unisolated computers
    and attaches the raw JSON response from Cisco AMP for each entity to the action
    results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      The action sends a DELETE request to the Cisco AMP '/v1/computers/{connector_guid}/isolation'
      endpoint, which changes the state of the target machine from isolated to unisolated.
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action calls 'update_entities' to refresh the state of the entities in the
      Google SecOps case after the unisolation process is triggered.
  categories:
    enrichment: false
