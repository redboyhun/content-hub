Get Computer Info:
  ai_description: "### General Description\nThis action retrieves detailed computer\
    \ information from Cisco AMP for specific entities. It supports both IP Address\
    \ and Hostname entities, querying the Cisco AMP API to fetch metadata such as\
    \ operating system versions, connector GUIDs, policy names, and network status.\
    \ The retrieved data is used to enrich the entities within Google SecOps, providing\
    \ analysts with immediate context regarding the endpoint's state and configuration.\n\
    \n### Parameters Description\nThere are no parameters for this action.\n\n###\
    \ Additional Notes\n- For **ADDRESS** entities, the action distinguishes between\
    \ internal and external IPs based on the entity's `is_internal` attribute to optimize\
    \ the search in Cisco AMP.\n- The action automatically flattens complex JSON responses\
    \ from Cisco AMP and prefixes them with 'CiscoAMP' before adding them to the entity's\
    \ additional properties.\n\n### Flow Description\n1. **Initialization**: The action\
    \ initializes the Cisco AMP manager using the integration's configuration (API\
    \ Root, Client ID, and API Key).\n2. **Entity Filtering**: It iterates through\
    \ the target entities in the current context, filtering for those of type `ADDRESS`\
    \ or `HOSTNAME`.\n3. **Data Retrieval**: \n    - For `ADDRESS` entities, it calls\
    \ the Cisco AMP API to find computer info by IP (internal or external).\n    -\
    \ For `HOSTNAME` entities, it calls the Cisco AMP API to find computer info by\
    \ hostname.\n4. **Data Processing**: If a match is found, the action removes unnecessary\
    \ metadata (like API links), flattens the data structure, and prepares a human-readable\
    \ summary table.\n5. **Enrichment**: The action updates the entity's additional\
    \ properties with the flattened data and attaches a CSV-formatted table to the\
    \ entity in the SOAR interface.\n6. **Finalization**: It performs a bulk update\
    \ of all enriched entities and provides a summary message of the results."
