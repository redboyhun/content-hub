Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the Cisco AMP API. It validates the integration's configuration
    parameters, including the API Root, Client ID, and API Key, by attempting a basic
    handshake with the service.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action is primarily used for troubleshooting and initial setup verification.
    It does not interact with any entities or modify any data.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the API Root, Client ID,
    API Key, and SSL settings from the integration configuration.

    2. **Manager Initialization**: It initializes the `CiscoAMPManager` using the
    provided credentials.

    3. **Connectivity Test**: The action executes a GET request to the `/v1/version`
    endpoint of the Cisco AMP API.

    4. **Validation**: If the API responds successfully, the action confirms connectivity.
    If an error occurs (e.g., 401 Unauthorized or 404 Not Found), an exception is
    raised and reported.
