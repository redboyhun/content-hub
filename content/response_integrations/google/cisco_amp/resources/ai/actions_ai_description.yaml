Get Computers By File Name:
  ai_description: >-
    ### General Description

    Retrieves a list of computers (endpoints) that have observed or interacted with
    a specific file, identified by its filename, using the Cisco AMP (Advanced Malware
    Protection) service. This action is useful for identifying the scope of a potential
    file-based threat across an environment by mapping filenames to specific infected
    or involved hosts.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    The action specifically targets entities of type **FILENAME**. It retrieves detailed
    information for each computer found, including Hostname, IP addresses (Internal
    and External), Operating System, and Policy Name. If no computers are found for
    a given filename, the action will report that no results were found.


    ### Flow Description

    1. **Filter Entities**: The action identifies all `FILENAME` entities within the
    current target entities list.

    2. **Search Activity**: For each filename, it queries the Cisco AMP `/v1/computers/activity`
    endpoint to find associated connector GUIDs (unique identifiers for endpoints).

    3. **Retrieve Computer Details**: For every discovered GUID, it fetches full endpoint
    details from the `/v1/computers/{guid}` endpoint.

    4. **Data Transformation**: The raw computer data is processed to remove unnecessary
    API links and is formatted into a human-readable structure for reporting.

    5. **Output Generation**:
        *   A data table named "Computers" is added to the case for each processed
    entity, displaying endpoint metadata.
        *   The entities are updated within Google SecOps to reflect they have been
    processed.
        *   A JSON result containing the full raw data of the discovered computers
    is attached to the action output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
