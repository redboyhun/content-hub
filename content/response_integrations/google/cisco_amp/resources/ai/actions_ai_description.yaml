Get Computers By File Hash:
  ai_description: >-
    ### General Description

    The **Get Computers By File Hash** action identifies endpoints within the Cisco
    AMP environment that have observed a specific file, identified by its SHA-256
    hash. This action is critical for incident response as it allows analysts to quickly
    determine the prevalence and scope of a potentially malicious file across the
    organization's managed devices.


    ### Parameters

    This action does not require any additional input parameters beyond the standard
    integration configuration (API Root, Client ID, Api Key).


    ### Flow Description

    1. **Entity Identification**: The action iterates through all entities in the
    current scope, specifically targeting those of type `FILEHASH`.

    2. **Hash Validation**: It validates that the entity identifier is a 64-character
    string, corresponding to the SHA-256 format required by Cisco AMP.

    3. **Activity Query**: For each valid hash, the action queries Cisco AMP to find
    any computer activity (events or observations) associated with that specific file
    hash.

    4. **Endpoint Enrichment**: For every matching endpoint found, the action retrieves
    detailed metadata, including the hostname, internal and external IP addresses,
    operating system version, and the policy applied to the device.

    5. **Data Visualization**: The retrieved endpoint information is formatted into
    a data table named "Computers" and attached to the case for easy review.

    6. **Internal Update**: The action updates the entities within Google SecOps and
    provides a comprehensive JSON result containing the raw data for further automation
    steps.
