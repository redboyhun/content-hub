    3. **Computer Detail Retrieval**: For every endpoint found in the activity search,
    the action retrieves comprehensive metadata (such as Operating System, internal/external
    IPs, and policy names) using the `/v1/computers/{guid}` endpoint.

    4. **Data Processing**: It flattens the computer metadata, removes unnecessary
    API links, and prepares the data for display.

    5. **Output Generation**: The action populates a 'Computers' data table in the
    case wall for each entity, updates the entities in Google SecOps, and attaches
    the full JSON response for further automation steps.
