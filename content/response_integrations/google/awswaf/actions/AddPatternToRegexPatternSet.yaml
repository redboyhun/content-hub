name: Add Pattern To Regex Pattern Set
description: 'Add string patterns to the Regex Pattern Set in AWS WAF. Note: Regex
    Pattern Set can only contain 10 patterns per set.'
integration_identifier: AWSWAF
parameters:
-   name: Regex Pattern Set Names
    default_value: ''
    type: string
    description: 'Specify the comma-separated list of Regex Pattern set names. Example:
        name_1,name_2'
    is_mandatory: true
-   name: Patterns
    default_value: ''
    type: string
    description: 'Specify the comma-separated list of patterns that should be added
        to the Regex Pattern Set. Example: pattern_1,pattern_2'
    is_mandatory: true
-   name: Scope
    default_value: CloudFront
    type: ddl
    optional_values:
    - CloudFront
    - Regional
    - Both
    description: Specify what should be the scope of the set. If “Both” is selected,
        action will add patterns base on entities to Regex Pattern sets in Regional
        and CloudFront scopes.
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
