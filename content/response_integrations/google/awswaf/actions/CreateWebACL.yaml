name: Create Web ACL
description: 'Create a Web ACL in AWS WAF. Note: You can have only 100 Web ACLs per
    region.'
integration_identifier: AWSWAF
parameters:
-   name: Name
    default_value: ''
    type: string
    description: 'Specify the name of the Web ACL. Note: The name must have 1-128
        characters. Valid characters: A-Z, a-z, 0-9, - (hyphen), and _ (underscore).'
    is_mandatory: true
-   name: Rule Source Type
    default_value: IP Set
    type: ddl
    optional_values:
    - IP Set
    - Rule Group
    description: Specify what rule type should be used.
    is_mandatory: true
-   name: Rule Source Name
    default_value: ''
    type: string
    description: Specify the name of the source, which should be used for Web ACL.
        If “Rule Source Type” is “IP Set”, action will search for IP Sets with that
        name. If “Rule Source Type” is “Rule Group”, action will search for Rule Groups
        with that name.
    is_mandatory: true
-   name: Scope
    default_value: CloudFront
    type: ddl
    optional_values:
    - CloudFront
    - Regional
    - Both
    description: Specify what should be the scope for the creation of the web acl.
        If “Both” is selected, action will create a Web ACL in Regional and CloudFront
        scopes.
    is_mandatory: true
-   name: Enable Sampled Requests
    default_value: 'True'
    type: boolean
    description: If enabled, AWS WAF will store a sampling of the web requests that
        match the rules.
    is_mandatory: true
-   name: Enable CloudWatch Metrics
    default_value: 'True'
    type: boolean
    description: If enabled, the associated resource sends metrics to CloudWatch.
    is_mandatory: true
-   name: CloudWatch Metric Name
    default_value: ''
    type: string
    description: 'Specify the name of the CloudWatch Metric. Note: The name must have
        1-128 characters. Valid characters: A-Z, a-z, 0-9, - (hyphen), and _ (underscore).'
    is_mandatory: true
-   name: Default Action
    default_value: Allow
    type: ddl
    optional_values:
    - Allow
    - Block
    description: Specify what should be the default action for requests that don't
        match any rules.
    is_mandatory: true
-   name: IP Set Action
    default_value: Block
    type: ddl
    optional_values:
    - Allow
    - Block
    - Count
    description: Specify what should be the action for rules that are based on the
        IP set.
    is_mandatory: false
-   name: Rule Priority
    default_value: ''
    type: string
    description: Specify what should be the priority of the rule. Priorities in Web
        ACL should be unique.
    is_mandatory: true
-   name: Description
    default_value: ''
    type: string
    description: Specify the description for the Web ACL.
    is_mandatory: false
-   name: Tags
    default_value: ''
    type: string
    description: 'Specify additional tags that should be added to the Web ACL. Format:
        key_1:value_1,key_2:value_1.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_web_acl_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
