name: Create Regex Pattern Set
description: 'Create a Regex Pattern Set in AWS WAF based on entities. Note: Regex
    Pattern Set can only contain 10 patterns per set and there can only be 10 Regex
    Pattern Sets at max.'
integration_identifier: AWSWAF
parameters:
-   name: Name
    default_value: ''
    type: string
    description: 'Specify the name of the Regex Pattern set. Note: The name must have
        1-128 characters. Valid characters: A-Z, a-z, 0-9, - (hyphen), and _ (underscore).'
    is_mandatory: true
-   name: Scope
    default_value: CloudFront
    type: ddl
    optional_values:
    - CloudFront
    - Regional
    - Both
    description: Specify what should be the scope for the creation of Regex Pattern
        sets. If “Both” is selected, action will create a Regex Pattern set in Regional
        and CloudFront scopes.
    is_mandatory: true
-   name: Description
    default_value: ''
    type: string
    description: Specify the description for the Regex Pattern set.
    is_mandatory: false
-   name: Tags
    default_value: ''
    type: string
    description: 'Specify additional tags that should be added to the Regex Pattern
        set. Format: key_1:value_1,key_2:value_1.'
    is_mandatory: false
-   name: Domain Pattern
    default_value: 'True'
    type: boolean
    description: 'If enabled, action will retrieve domain part out of urls and create
        a regex pattern based on them. Example: http://test.com/folder will be converted
        to a pattern ^(http)(s|)(://)(test.com).*'
    is_mandatory: false
-   name: IP Pattern
    default_value: 'True'
    type: boolean
    description: 'If enabled, action will construct a proper regex pattern out of
        IP address instead of using raw value. Example: 10.0.0.1 will be converted
        into ^(http)(s|)(://)(10.0.0.1).*'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_regex_pattern_set_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["DestinationURL", "ADDRESS"]}'
