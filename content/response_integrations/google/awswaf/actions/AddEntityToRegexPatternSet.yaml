name: Add Entity To Regex Pattern Set
description: 'Add string patterns based on entities to the Regex Pattern Set in AWS
    WAF. Note: Regex Pattern Set can only contain 10 patterns per set'
integration_identifier: AWSWAF
parameters:
-   name: Regex Pattern Set Names
    default_value: ''
    type: string
    description: 'Specify the comma-separated list of Regex Pattern set names. Example:
        name_1,name_2'
    is_mandatory: true
-   name: Scope
    default_value: CloudFront
    type: ddl
    optional_values:
    - CloudFront
    - Regional
    - Both
    description: Specify what should be the scope for the creation of Regex Pattern
        sets. If “Both” is selected, action will add patterns base on entities to
        Regex Pattern sets in Regional and CloudFront scopes.
    is_mandatory: true
-   name: Domain Pattern
    default_value: 'True'
    type: boolean
    description: 'If enabled, action will retrieve domain part out of urls and create
        a regex pattern based on them. If enabled, action will retrieve domain part
        out of urls and create a regex pattern based on them. Example: http://test.com/folder
        will be converted to a pattern ^(http|https)(:\/\/)(\Qtest.com\E).*'
    is_mandatory: false
-   name: IP Pattern
    default_value: 'True'
    type: boolean
    description: 'If enabled, action will construct a proper regex pattern out of
        IP address instead of using raw value. Example: 10.0.0.1 will be converted
        into ^(http|https)(:\/\/)(\Q10.0.0.1\E).*'
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities": ["DestinationURL", "ADDRESS"]}'
