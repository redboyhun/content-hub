name: Create Rule Group
description: Create a rule group in AWS WAF.
integration_identifier: AWSWAF
parameters:
-   name: Name
    default_value: ''
    type: string
    description: 'Specify the name of the rule group. Note: The name must have 1-128
        characters. Valid characters: A-Z, a-z, 0-9, - (hyphen), and _ (underscore).'
    is_mandatory: true
-   name: Scope
    default_value: CloudFront
    type: ddl
    optional_values:
    - CloudFront
    - Regional
    - Both
    description: Specify what should be the scope for the creation of the rule group.
        If “Both” is selected, action will create a Rule Group in Regional and CloudFront
        scopes.
    is_mandatory: true
-   name: Capacity
    default_value: '100'
    type: string
    description: 'Specify the capacity of the rule group. Note: you can’t change the
        capacity after the group is created. Maximum is 1500.'
    is_mandatory: true
-   name: Enable Sampled Requests
    default_value: 'True'
    type: boolean
    description: If enabled, AWS WAF will store a sampling of the web requests that
        match the rules.
    is_mandatory: true
-   name: Enable CloudWatch Metrics
    default_value: 'True'
    type: boolean
    description: If enabled, the associated resource sends metrics to CloudWatch.
    is_mandatory: true
-   name: CloudWatch Metric Name
    default_value: ''
    type: string
    description: 'Specify the name of the CloudWatch Metric. Note: The name must have
        1-128 characters. Valid characters: A-Z, a-z, 0-9, - (hyphen), and _ (underscore).'
    is_mandatory: true
-   name: Description
    default_value: ''
    type: string
    description: Specify the description for the Rule Group.
    is_mandatory: false
-   name: Tags
    default_value: ''
    type: string
    description: 'Specify additional tags that should be added to the Rule Group.
        Format: key_1:value_1,key_2:value_1.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_rule_group_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
