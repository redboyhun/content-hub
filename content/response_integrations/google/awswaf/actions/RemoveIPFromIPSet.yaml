name: Remove IP From IP Set
description: Remove IP addresses from the IP Set in AWS WAF.
integration_identifier: AWSWAF
parameters:
-   name: IP Set Names
    default_value: ''
    type: string
    description: 'Specify the comma-separated list of IP set names. Example: name_1,name_2'
    is_mandatory: true
-   name: Scope
    default_value: CloudFront
    type: ddl
    optional_values:
    - CloudFront
    - Regional
    - Both
    description: Specify what should be the scope of the set. If "Both" is selected,
        action will remove IP addresses from IPsets in Regional and CloudFront scopes.
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
