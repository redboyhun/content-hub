Create Regex Pattern Set:
  ai_description: >-
    ### General Description

    Creates a Regex Pattern Set in AWS WAF based on provided IP and URL entities.
    This action allows users to group multiple regex patterns into a single set, which
    can then be referenced in AWS WAF rules to inspect and control web requests. It
    supports both Regional and CloudFront scopes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The name of the Regex Pattern set. Must be 1-128 characters.
    Valid characters: A-Z, a-z, 0-9, - (hyphen), and _ (underscore). |

    | Scope | String | Yes | The deployment scope for the Regex Pattern set. Options:
    'CloudFront', 'Regional', or 'Both'. |

    | Description | String | No | A description for the Regex Pattern set to help
    with identification. |

    | Tags | String | No | Additional tags to associate with the resource in `key:value`
    format, separated by commas (e.g., `Environment:Production,Team:Security`). |

    | Domain Pattern | Boolean | No | If enabled (default), the action extracts the
    domain from URL entities and wraps it in a regex pattern: `^(http)(s|)(://)(domain.com).*`.
    |

    | IP Pattern | Boolean | No | If enabled (default), the action wraps IP address
    entities in a regex pattern: `^(http)(s|)(://)(ip_address).*`. |


    ### Additional Notes

    - **AWS Quotas**: A single Regex Pattern Set can contain a maximum of 10 patterns.
    If more than 10 valid entities are provided, the action will fail with a limit
    exceeded error.

    - **Account Limits**: AWS WAF allows a maximum of 10 Regex Pattern Sets per account/region.

    - **Scope**: If 'Both' is selected, the action will attempt to create the set
    in both the Regional and CloudFront environments.


    ### Flow Description

    1. **Initialization**: Extracts AWS credentials from the integration configuration
    and retrieves action parameters including the set name, scope, and pattern preferences.

    2. **Entity Processing**: Iterates through the target entities in the current
    context, filtering for supported types (ADDRESS and DestinationURL).

    3. **Pattern Generation**: For each valid entity, it generates a regex string.
    If 'Domain Pattern' or 'IP Pattern' is enabled, it applies a protocol-wrapping
    template; otherwise, it uses the raw entity identifier.

    4. **Validation**: Checks if the number of generated patterns exceeds the AWS
    limit of 10.

    5. **AWS Interaction**: Connects to the AWS WAF service and creates the Regex
    Pattern Set in the specified scope(s) (Regional, CloudFront, or both).

    6. **Reporting**: Updates the action results with the names of the successfully
    created sets and provides a summary message to the user.
