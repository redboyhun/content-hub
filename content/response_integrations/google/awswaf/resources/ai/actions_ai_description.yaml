    1. **Parameter Extraction**: Retrieves AWS credentials from the integration configuration
    and ACL settings from the action parameters.

    2. **Connectivity Validation**: Tests the connection to the AWS WAF service using
    the provided credentials.

    3. **Source ARN Retrieval**: For each selected scope (Regional/CloudFront), the
    action searches for the existing IP Set or Rule Group by name to retrieve its
    Amazon Resource Name (ARN).

    4. **Web ACL Creation**: Invokes the AWS WAFv2 `create_web_acl` API, configuring
    the rules, visibility settings (CloudWatch/Sampling), and default actions.

    5. **Tagging**: Applies any provided metadata tags to the newly created resource.

    6. **Result Aggregation**: Collects the names of successfully created ACLs and
    reports any errors or duplicate name conflicts.
