Create Rule Group:
  ai_description: >-
    ### General Description

    Creates a new Rule Group in AWS WAF. Rule groups are reusable collections of rules
    that you can use in Web ACLs to inspect and control web requests. This action
    allows for the creation of rule groups in Regional scopes (ALB, API Gateway, AppSync),
    CloudFront scopes, or both simultaneously.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The name of the rule group (1-128 characters). Valid characters:
    A-Z, a-z, 0-9, - (hyphen), and _ (underscore). |

    | Scope | Enum | Yes | The scope for the rule group: 'CloudFront', 'Regional',
    or 'Both'. |

    | Capacity | String | Yes | The web ACL capacity units (WCUs) required for this
    rule group (Maximum 1500). This value is immutable after creation. |

    | Enable Sampled Requests | Boolean | Yes | If enabled, AWS WAF stores a sampling
    of web requests that match the rules. |

    | Enable CloudWatch Metrics | Boolean | Yes | If enabled, the resource sends metrics
    to CloudWatch. |

    | CloudWatch Metric Name | String | Yes | The name of the CloudWatch metric (1-128
    characters). |

    | Description | String | No | A description for the Rule Group to help with identification.
    |

    | Tags | String | No | Additional tags to associate with the Rule Group. Format:
    `key_1:value_1,key_2:value_2`. |


    ### Additional Notes

    - The **Capacity** parameter is critical as it cannot be changed once the rule
    group is created.

    - If **Both** is selected in the Scope parameter, the action will attempt to create
    the rule group in both the Regional and CloudFront environments.

    - The action handles cases where a rule group with the same name already exists,
    reporting them as successful/duplicate rather than failing the entire action.


    ### Flow Description

    1. **Initialization**: Extracts AWS credentials and action parameters from the
    environment.

    2. **Connectivity Check**: Validates the provided AWS credentials by attempting
    to list existing IP sets.

    3. **Scope Resolution**: Determines the target AWS scopes (Regional, CloudFront,
    or both) based on user input.

    4. **Resource Creation**: Iterates through the resolved scopes and calls the AWS
    WAF API to create the Rule Group with the specified capacity, visibility configurations,
    and optional tags/description.

    5. **Error Handling**: Specifically catches `AWSWAFDuplicateItemException` to
    identify existing groups and logs other API errors.

    6. **Result Compilation**: Aggregates the status of creation across all targeted
    scopes and returns a JSON summary of the results.
