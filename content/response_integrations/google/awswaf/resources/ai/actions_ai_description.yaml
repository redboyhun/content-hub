Create IP Set:
  ai_description: >-
    Creates IP Sets in AWS WAF based on provided IP Address entities. This action
    automates the creation of network security boundaries by grouping entities into
    AWS WAF IP Sets for either Regional or CloudFront scopes.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The base name for the IP set. The action appends the IP
    version to this name (e.g., Siemplify_Name_IPv4). |

    | Scope | Dropdown | Yes | Specifies the AWS WAF scope: 'Regional', 'CloudFront',
    or 'Both'. |

    | Description | String | No | A description for the created IP set in AWS. |

    | Tags | String | No | Key-value pairs to tag the AWS resource (format: key_1:value_1,key_2:value_2).
    |


    ### Flow Description

    1. **Initialization**: Validates AWS credentials and retrieves action parameters
    including the desired scope and naming convention.

    2. **Entity Processing**: Iterates through target entities, filtering for IP addresses.
    It determines the IP version (IPv4 or IPv6) and applies standard CIDR masking
    (/32 for IPv4, /128 for IPv6).

    3. **Grouping**: Organizes the processed IP addresses into separate collections
    based on their version to comply with AWS WAF requirements.

    4. **Resource Creation**: Communicates with the AWS WAF service to create the
    IP Sets in the specified scopes (Regional and/or CloudFront) with the provided
    tags and descriptions.

    5. **Result Reporting**: Returns a list of successfully created IP Set names and
    identifies any entities that failed processing.
