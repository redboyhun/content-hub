Remove Rule From Rule Group:
  ai_description: >-
    Removes a specific rule from one or more AWS WAF Rule Groups. This action is used
    to manage WAF configurations by programmatically deleting rules from existing
    groups across different scopes (Regional or CloudFront). It identifies the target
    rule groups, retrieves their current rule sets, filters out the specified rule,
    and updates the group configuration in AWS.


    ### Parameters

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Rule Group Names | A comma-separated list of Rule Group names where the rule
    should be removed. Example: `group_1,group_2`. | String | Yes |

    | Scope | The deployment scope of the rule group. Options are `CloudFront`, `Regional`,
    or `Both`. | String | Yes |

    | Rule Name | The exact name of the rule to be deleted from the specified rule
    groups. | String | Yes |


    ### Flow Description

    1. **Initialization**: Authenticates with AWS WAF using provided credentials and
    parses the input parameters.

    2. **Discovery**: Lists rule groups in the specified scopes (Regional, CloudFront,
    or both) and filters them to find those matching the provided names.

    3. **Retrieval**: For each identified rule group, the action fetches the current
    configuration, including the list of rules and the required lock token for updates.

    4. **Modification**: It iterates through the rules in the group and creates a
    new list that excludes the rule matching the `Rule Name` parameter.

    5. **Update**: If the rule was found and removed from the list, the action calls
    the AWS WAF API to update the rule group with the modified rule set.

