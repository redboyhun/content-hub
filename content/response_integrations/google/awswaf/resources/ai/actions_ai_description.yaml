    - The action requires that the specified `Rule Source Name` already exists in
    the target AWS environment/scope.

    - AWS limits the number of Web ACLs to 100 per region.

    - When using the `Both` scope, the action will attempt to find the rule source
    and create the ACL in both the specified region and the `us-east-1` region (required
    for CloudFront).


