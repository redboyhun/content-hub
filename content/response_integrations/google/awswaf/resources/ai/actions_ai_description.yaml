Add Pattern To Regex Pattern Set:
  ai_description: >-
    ### General Description

    This action adds specific string patterns to one or more Regex Pattern Sets in
    AWS WAF. It is used to update the filtering criteria of WAF rules by expanding
    the list of regular expressions the service inspects. The action supports both
    Regional and CloudFront scopes and handles duplicate patterns and AWS service
    limits automatically.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Regex Pattern Set Names** | String | Yes | A comma-separated list of the names
    of the Regex Pattern Sets you want to update (e.g., `Set1,Set2`). |

    | **Patterns** | String | Yes | A comma-separated list of the actual regex patterns
    to be added to the sets (e.g., `^admin.*,.*\.php$`). |

    | **Scope** | String | Yes | Defines the AWS WAF scope. Options are `CloudFront`,
    `Regional`, or `Both`. If `Both` is selected, the action attempts to find and
    update sets in both environments. |


    ### Additional Notes

    * **AWS Quotas:** AWS WAF enforces a strict limit of **10 patterns per Regex Pattern
    Set**. If the addition of new patterns exceeds this limit, the action will only
    add patterns up to the limit and report the remaining as failed.

    * **Duplicates:** The action automatically detects if a pattern already exists
    in the target set and will not attempt to add it again, preventing unnecessary
    API calls.

    * **Entity Usage:** This action does not run on SecOps entities; it relies entirely
    on the provided input parameters.


    ### Flow Description

    1. **Initialization:** Retrieves AWS credentials from the integration configuration
    and parses the input parameters (names, patterns, and scope).

    2. **Connectivity:** Establishes a connection to the AWS WAF service and validates
    credentials.

    3. **Discovery:** Lists existing Regex Pattern Sets in the specified scope(s)
    and filters them to find matches for the provided names.

    4. **Validation & Preparation:** For each matching set, the action retrieves the
    current pattern list and a `LockToken` (required for updates). It identifies which
    new patterns are duplicates and checks if the set has remaining capacity (under
    the 10-pattern limit).

    5. **Execution:** Calls the AWS WAF API to update the Regex Pattern Sets with
    the new, non-duplicate patterns that fit within the capacity limits.

    6. **Reporting:** Generates a detailed summary message indicating which patterns
    were successfully added, which were duplicates, and which failed due to capacity
    limits or missing sets.
