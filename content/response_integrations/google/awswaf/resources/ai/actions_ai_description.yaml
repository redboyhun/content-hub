Remove Rule From Web ACL:
  ai_description: >-
    ### General Description

    This action removes a specific rule from one or more Web Access Control Lists
    (Web ACLs) in AWS WAF. It is used to programmatically manage firewall rules by
    targeting specific ACL names across different AWS scopes (CloudFront or Regional).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Web ACL Names | String | Yes | A comma-separated list of the names of the Web
    ACLs from which the rule should be removed. |

    | Scope | String | Yes | The deployment scope of the Web ACLs. Options are 'CloudFront',
    'Regional', or 'Both'. Default is 'CloudFront'. |

    | Rule Name | String | Yes | The exact name of the rule that should be deleted
    from the specified Web ACLs. |


    ### Additional Notes

    - The action uses optimistic locking (via lock tokens) to ensure that the Web
    ACL configuration hasn't changed between the time it was retrieved and the time
    the update is submitted.

    - If 'Both' is selected for the Scope, the action will attempt to find and modify
    Web ACLs in both the Regional and CloudFront environments.


    ### Flow Description

    1. **Initialization**: The action initializes the AWS WAF manager using provided
    credentials and parses the input parameters, including the list of Web ACL names
    and the target scopes.

    2. **Discovery**: It connects to the AWS WAF service and retrieves a list of existing
    Web ACLs within the specified scopes that match the provided names.

    3. **Rule Removal Logic**: For each identified Web ACL, the action:
        - Fetches the current rule set and a lock token.
        - Filters the rule list to exclude the rule matching the 'Rule Name' parameter.
        - Compares the original rule list with the filtered list to verify if the
    rule existed.
    4. **Execution**: If the rule was found, the action sends an update request to
    AWS WAF to save the Web ACL with the modified rule list.

    5. **Reporting**: The action aggregates the results, identifying which Web ACLs
    were successfully updated, which did not contain the specified rule, and any errors
    that occurred during the process.
