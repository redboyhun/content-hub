Add IP To IP Set:
  ai_description: >-
    Adds IP Address entities to specified AWS WAF IP Sets across Regional and/or CloudFront
    scopes. This action is used to manage network access control by dynamically updating
    IP Sets with new addresses. It validates IP versions (IPv4 vs IPv6) against the
    target IP Set configuration before performing the update.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Set Names | String | Yes | A comma-separated list of the names of the IP
    sets where the addresses should be added. |

    | Scope | String | Yes | Specifies the AWS WAF scope. Options are 'CloudFront',
    'Regional', or 'Both'. If 'Both' is selected, the action attempts to find and
    update sets in both environments. |


    ### Flow Description

    1. **Connection**: Establishes a connection to the AWS WAF service using provided
    credentials and region.

    2. **Discovery**: Lists and identifies the target IP Sets in AWS based on the
    provided names and scope.

    3. **Entity Filtering**: Iterates through target entities, selecting only those
    of type ADDRESS.

    4. **Version Validation**: For each valid entity, it checks if the IP version
    (IPv4 or IPv6) matches the version required by the target AWS IP Set.

    5. **State Retrieval**: Fetches the current addresses and the 'LockToken' for
    each target IP Set to ensure optimistic locking during the update.

    6. **Mutation**: Appends the new masked IP addresses to the existing list and
    updates the IP Set in AWS WAF.
