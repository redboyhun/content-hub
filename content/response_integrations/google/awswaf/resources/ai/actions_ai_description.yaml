Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the AWS WAF service. It ensures that the provided AWS credentials
    (Access Key ID and Secret Key) and the specified region are valid and have the
    necessary permissions to interact with the AWS WAF API. The action attempts to
    communicate with both Regional and CloudFront WAF scopes.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not take any direct input parameters. It
    uses the credentials and region defined in the integration's configuration settings.
    |


    ### Additional Notes

    *   The action requires the following integration configuration parameters to
    be set: `AWS Access Key ID`, `AWS Secret Key`, and `AWS Default Region`.

    *   Connectivity is considered successful if the manager can successfully list
    at least one IP set from either the Regional or CloudFront scope.


    ### Flow Description

    1.  **Initialization**: The action retrieves the AWS Access Key, Secret Key, and
    Default Region from the integration configuration.

    2.  **Manager Setup**: An `AWSWAFManager` instance is created, which initializes
    boto3 clients for both the specified AWS region (Regional scope) and the `us-east-1`
    region (required for CloudFront scope).

    3.  **Connectivity Test**: The manager executes the `test_connectivity` method,
    which calls the `list_ip_sets` API for both scopes with a limit of 1.

    4.  **Validation**: The action validates the HTTP response status codes from AWS.
    If at least one scope responds successfully, the connectivity is verified.

    5.  **Completion**: The action returns a success message if connectivity is established;
    otherwise, it catches exceptions and reports a failure.
