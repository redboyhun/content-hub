Remove Entity From Regex Pattern Set:
  ai_description: >-
    Removes regex patterns derived from entities (IP Addresses and URLs) from specified
    AWS WAF Regex Pattern Sets. This action is used to manage access control lists
    by dynamically removing patterns that were previously added for blocking or filtering
    purposes.


    ### Flow Description

    1. **Initialization**: Retrieves AWS credentials and action parameters, including
    the target Regex Pattern Set names and the desired scope (Regional, CloudFront,
    or Both).

    2. **Connectivity**: Validates the AWS credentials by testing connectivity to
    the AWS WAF service.

    3. **Discovery**: Searches for the specified Regex Pattern Sets within the selected
    scopes to retrieve their unique IDs and current configurations.

    4. **Pattern Generation**: Processes target entities (ADDRESS and URL). If 'Domain
    Pattern' or 'IP Pattern' is enabled, it wraps the entity identifier in a protocol-specific
    regex template (e.g., `^(http|https)(:\/\/)(\Q<identifier>\E).*`). Otherwise,
    it uses the raw identifier.

    5. **Mutation**: For each identified Regex Pattern Set, the action retrieves the
    current list of patterns, identifies which target patterns exist, and updates
    the set on AWS WAF by submitting a new list that excludes those patterns.

    6. **Reporting**: Provides a detailed summary of which patterns were successfully
    removed, which were not found in the sets, and any failures encountered.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Regex Pattern Set Names | String | Yes | A comma-separated list of the names
    of the Regex Pattern Sets in AWS WAF from which patterns should be removed. |

    | Scope | String | Yes | The scope of the Regex Pattern Sets. Options: 'CloudFront',
    'Regional', or 'Both'. |

    | Domain Pattern | Boolean | No | If enabled (default: True), the action extracts
    the domain from URL entities and creates a regex pattern matching both HTTP and
    HTTPS protocols for that domain. |

    | IP Pattern | Boolean | No | If enabled (default: True), the action creates a
    regex pattern matching both HTTP and HTTPS protocols for IP Address entities.
    |


    ### Additional Notes

    - The action requires the exact names of the Regex Pattern Sets as they appear
    in the AWS Console.

    - If 'Both' is selected for Scope, the action will attempt to find and update
    sets in both the Regional and CloudFront environments.
