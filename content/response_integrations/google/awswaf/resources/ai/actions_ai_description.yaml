Add Entity To Regex Pattern Set:
  ai_description: >-
    ### General Description

    Adds string patterns derived from entities to specified Regex Pattern Sets in
    AWS WAF. This action allows security teams to dynamically update AWS WAF configurations
    by converting IP addresses and URLs into regex patterns. It supports both Regional
    and CloudFront scopes and includes logic to handle AWS's limit of 10 patterns
    per set.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Regex Pattern Set Names | String | Yes | A comma-separated list of the names
    of the Regex Pattern sets in AWS WAF where the patterns should be added. |

    | Scope | String | Yes | The deployment scope for the AWS WAF resources. Options
    are 'CloudFront', 'Regional', or 'Both'. |

    | Domain Pattern | Boolean | No | If enabled (default), the action extracts the
    domain from URL entities and creates a regex pattern in the format: `^(http|https)(:\/\/)(\Q<domain>\E).*`.
    |

    | IP Pattern | Boolean | No | If enabled (default), the action wraps IP address
    entities in a regex pattern in the format: `^(http|https)(:\/\/)(\Q<ip>\E).*`.
    |


    ### Additional Notes

    * **AWS Quota:** AWS WAF Regex Pattern Sets have a hard limit of 10 patterns per
    set. The action will check the current count and only add patterns up to this
    limit, reporting any failures due to capacity.

    * **Deduplication:** The action automatically checks for existing patterns in
    the target sets to avoid adding duplicates.


    ### Flow Description

    1. **Initialization:** Retrieves AWS credentials and action parameters, including
    the target set names and scope.

    2. **Connectivity Check:** Validates the connection to the AWS WAF service.

    3. **Resource Discovery:** Lists and identifies the existing Regex Pattern Sets
    in the specified AWS scopes that match the provided names.

    4. **Entity Processing:** Iterates through the target entities (IPs and URLs).
    If 'Domain Pattern' or 'IP Pattern' is enabled, it transforms the entity identifier
    into a specific regex string; otherwise, it uses the raw identifier.

    5. **State Synchronization:** For each target set, it retrieves the current list
    of patterns and the required lock token for optimistic locking.

    6. **Update Execution:** Filters out duplicates and checks against the 10-pattern
    limit. It then updates the Regex Pattern Set in AWS WAF with the new combined
    list of patterns.

    7. **Reporting:** Returns a summary of successfully added patterns, existing duplicates,
    and any patterns that could not be added due to errors or capacity limits.
