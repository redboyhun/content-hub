Add Rule To Web ACL:
  ai_description: >-
    Adds a rule to one or more AWS WAF Web ACLs based on an existing IP Set or Rule
    Group. This action allows for centralized management of web access control by
    attaching predefined rule sources to multiple Web ACLs across different AWS scopes
    (Regional or CloudFront).


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Web ACL Names** | String | Yes | A comma-separated list of Web ACL names where
    the rule should be added. |

    | **Rule Source Type** | Enum | Yes | Specifies whether the rule is based on an
    'IP Set' or a 'Rule Group'. |

    | **Rule Source Name** | String | Yes | The name of the IP Set or Rule Group to
    be used as the rule source. |

    | **Scope** | Enum | Yes | The AWS WAF scope: 'CloudFront', 'Regional', or 'Both'.
    |

    | **Rule Priority** | Integer | Yes | The unique priority value for the rule within
    the Web ACL. Lower values are processed first. |

    | **IP Set Action** | Enum | No | The action to take (Allow, Block, Count) if
    the source type is 'IP Set'. Defaults to 'Block'. |


    ### Additional Notes

    - The action performs a duplicate check; if a rule with the same name already
    exists in a target Web ACL, it will skip that specific ACL to avoid errors.

    - A Web ACL can contain a maximum of 1500 rules (WCUs).

    - If 'Both' is selected for Scope, the action will attempt to find and update
    Web ACLs in both Regional and CloudFront environments.


    ### Flow Description

    1. **Initialization**: Retrieves AWS credentials and action parameters.

    2. **Connectivity**: Validates connection to the AWS WAF service.

    3. **Discovery**: Lists existing Web ACLs in the specified scopes to identify
    targets matching the provided names.

    4. **Source Retrieval**: Searches for the specified IP Set or Rule Group to obtain
    its Amazon Resource Name (ARN).

    5. **Validation**: Ensures the rule source exists in the target scope.

    6. **Update Logic**: For each target Web ACL, the action fetches the current configuration
    (including the lock token and existing rules), checks for duplicates, and appends
    the new rule.

    7. **Execution**: Commits the updated rule list back to AWS WAF using the `update_web_acl`
    method.

    8. **Reporting**: Returns a summary of successful updates, duplicates found, and
    any failures.
