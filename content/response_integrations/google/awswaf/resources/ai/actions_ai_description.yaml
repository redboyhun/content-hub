Create Web ACL:
  ai_description: >-
    ### General Description

    Creates a Web Access Control List (Web ACL) in AWS WAF (v2). This action allows
    users to define a collection of rules to inspect and control web requests for
    AWS resources like CloudFront distributions or regional applications (ALB, API
    Gateway). It supports associating the new ACL with either an existing IP Set or
    a Rule Group and allows configuration of default actions, CloudWatch metrics,
    and request sampling.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The name of the Web ACL (1-128 characters). Valid characters:
    A-Z, a-z, 0-9, hyphen (-), and underscore (_). |

    | Rule Source Type | String | Yes | Specifies the type of rule source to use.
    Options: `IP Set`, `Rule Group`. |

    | Rule Source Name | String | Yes | The name of the existing IP Set or Rule Group
    to be used as the rule source for the Web ACL. |

    | Scope | String | Yes | The deployment scope. `CloudFront` (Global), `Regional`,
    or `Both`. If `Both` is selected, the action attempts to create the ACL in both
    environments. |

    | Enable Sampled Requests | Boolean | Yes | If enabled, AWS WAF stores a sampling
    of web requests that match the rules for analysis. |

    | Enable CloudWatch Metrics | Boolean | Yes | If enabled, the Web ACL sends metrics
    to Amazon CloudWatch. |

    | CloudWatch Metric Name | String | Yes | The name for the CloudWatch metric (1-128
    characters). |

    | Default Action | String | Yes | The action to perform for requests that do not
    match any rules. Options: `Allow`, `Block`. |

    | IP Set Action | String | No | The action to take when a request matches an IP
    Set rule. Options: `Allow`, `Block`, `Count`. Default is `Block`. |

    | Rule Priority | Integer | Yes | The priority of the rule within the Web ACL.
