Add Rule To Rule Group:
  ai_description: >-
    ### General Description

    Adds a specific rule to one or more existing AWS WAF Rule Groups. This action
    allows for the programmatic expansion of WAF protections by injecting rule logic
    (provided as a JSON object) into managed rule groups across different AWS scopes
    (Regional or CloudFront).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Rule Group Names | String | Yes | A comma-separated list of the names of the
    Rule Groups where the rule should be added. Example: `group1, group2`. |

    | Scope | String (Enum) | Yes | The AWS WAF scope to target. Options are `CloudFront`,
    `Regional`, or `Both`. If `Both` is selected, the action attempts to find and
    update groups in both environments. |

    | Rule JSON Object | String (JSON) | Yes | A JSON string representing the rule
    configuration. It must include a `Name` field to identify the rule and prevent
    duplicates. |


    ### Additional Notes

    - The action performs a duplicate check: if a rule with the same name already
    exists within a target Rule Group, the action will skip that group to avoid errors
    and report it as a duplicate.

    - The action uses optimistic locking (`LockToken`) to ensure that the Rule Group
    configuration hasn't changed between the time it was read and the time it is updated.


    ### Flow Description

    1. **Initialization**: Extracts AWS credentials and action parameters.

    2. **Validation**: Parses the `Rule Group Names` CSV and validates that the `Rule
    JSON Object` is valid JSON containing a `Name` key.

    3. **Discovery**: Connects to the AWS WAF service and lists rule groups in the
    specified scope(s) to find matches for the provided names.

    4. **Rule Retrieval**: For each matching Rule Group, the action fetches the current
    configuration, including the existing list of rules and the current `LockToken`.

    5. **Duplicate Check**: Verifies if a rule with the same name already exists in
    the group's rule list.

    6. **Update**: If no duplicate is found, it appends the new rule to the existing
    list and calls the AWS WAF API to update the Rule Group.

    7. **Reporting**: Aggregates the results (successes, duplicates, failures, and
    missing groups) into a final output message.
