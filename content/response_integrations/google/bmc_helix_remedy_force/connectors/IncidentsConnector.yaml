name: BMC Helix Remedyforce - Incidents Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: BMCServiceDesk__Type__c
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Root
    default_value: https://{{your instance}}.my.salesforce.com
    type: string
    description: API root of the BMC Helix Remedyforce instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Login API Root
    default_value: https://login.salesforce.com
    type: string
    description: API root that is used to authenticate in BMC Helix Remedyforce.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: BMC Helix Remedyforce username.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: BMC Helix Remedyforce password.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Client ID
    default_value: ''
    type: string
    description: 'BMC Helix Remedyforce client ID of the connected app. This parameter
        is needed for OAuth authentication. Note: this parameter has priority over
        Username + Password authentication.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Client Secret
    default_value: ''
    type: password
    description: 'BMC Helix Remedyforce client secret of the connected app. This parameter
        is needed for OAuth authentication. Note: this parameter has priority over
        Username + Password authentication.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Refresh Token
    default_value: ''
    type: password
    description: Refresh token for the OAuth authorization.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        BMC Helix Remedyforce server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Lowest Priority To Fetch
    default_value: 5
    type: integer
    description: 'Lowest priority that will be used to fetch incidents. Maximum: 5.
        Minimum: 1. If nothing is provided, the connector will ingest all incidents.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Ingest Empty Priority Incidents
    default_value: true
    type: boolean
    description: If enabled, the connector will fetch incidents that don't have priority.
        Siemplify Alerts created in this manner will have priority set to "Informational".
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Type Filter
    default_value: Incident,Service Request
    type: string
    description: 'Type filter for the incidents. If nothing is provided, the connector
        will ingest all incidents. Example: Incident, Service Request.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        incidents from. This parameter applies to the initial connector iteration
        after you enable the connector for the first time, or used as a fallback value
        in cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Incidents To Fetch
    default_value: 10
    type: integer
    description: How many incidents to process per one connector iteration. Maximum
        is 200.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Pull information about incidents from BMC Helix Remedyforce.
integration: BMCHelixRemedyForce
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/bmc-helix-remedyforce#bmc-helix-remedyforce-incidents-connector
rules: []
is_connector_rules_supported: false
creator: admin
