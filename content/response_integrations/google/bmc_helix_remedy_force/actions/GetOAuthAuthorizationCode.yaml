name: Get OAuth Authorization Code
description: Generate an OAuth authorization code in BMC Helix Remedyforce. Please
    refer to the documentation portal for more information.
integration_identifier: BMCHelixRemedyForce
parameters:
-   name: Redirect URL
    default_value: https://localhost
    type: string
    description: Specify the redirect URL that was used when the "Connector App" was
        created.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
