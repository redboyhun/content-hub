name: List Record Types
description: 'List available record types from BMC Helix Remedyforce. '
integration_identifier: BMCHelixRemedyForce
parameters:
-   name: Filter Value
    default_value: ''
    type: string
    description: Specify what value should be used in the filter. If "Equal" is selected,
        action will try to find the exact match among record types and if "Contains"
        is selected, action will try to find record types that contain that substring.
        If nothing is provided in this parameter, the filter will not be applied.
    is_mandatory: false
-   name: Max Record Types To Return
    default_value: '50'
    type: string
    description: 'Specify how many record types to return. Default: 50.'
    is_mandatory: false
-   name: Filter Logic
    default_value: Equal
    type: ddl
    optional_values:
    - Equal
    - Contains
    description: Specify what filter logic should be applied.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_record_types_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
