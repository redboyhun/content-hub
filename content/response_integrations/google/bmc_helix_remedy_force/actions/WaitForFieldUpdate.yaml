name: Wait For Fields Update
description: Wait for fields update in BMC Helix Remedyforce.
integration_identifier: BMCHelixRemedyForce
parameters:
-   name: Record Type
    default_value: ''
    type: string
    description: Specify the type of the record for which you are waiting an update.
        If you don't know what kind of records are available, please execute action
        "List Record Types".
    is_mandatory: true
-   name: Record ID
    default_value: ''
    type: string
    description: Specify the ID of the record that needs to be updated.
    is_mandatory: true
-   name: Fields To Check
    default_value: '{"field":"value"}'
    type: string
    description: Specify a JSON object containing all of the needed fields and  values.
    is_mandatory: true
-   name: Fail If Timeout
    default_value: true
    type: boolean
    description: If enabled, action will be failed, if not all of the fields were
        updated.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/wait_for_field_update_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
