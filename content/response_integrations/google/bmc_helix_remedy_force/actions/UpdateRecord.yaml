name: Update Record
description: Update record in BMC Helix Remedyforce.
integration_identifier: BMCHelixRemedyForce
parameters:
-   name: Record Type
    default_value: ''
    type: string
    description: Specify the type of the record that needs to be updated. If you don't
        know what kind of records are available, please execute action "List Record
        Types".
    is_mandatory: true
-   name: Record ID
    default_value: ''
    type: string
    description: Specify the id of the record that needs to be updated.
    is_mandatory: true
-   name: Fields To Update
    default_value: '{"field":"value"}'
    type: string
    description: Specify a JSON object containing all of the needed fields and  values
        that need to be updated.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
