name: Execute Simple Query
description: Execute a SOQL query based on parameters in BMC Helix Remedyforce.
integration_identifier: BMCHelixRemedyForce
parameters:
-   name: Record Type
    default_value: ''
    type: string
    description: Specify what record type should be queried.
    is_mandatory: true
-   name: Where Filter
    default_value: ''
    type: string
    description: 'Specify the WHERE filter for the query  that needs to be executed.
        Note: you don''t need to provide time filter, limiting and sorting. Also,
        you don''t need to provide WHERE string in the payload.'
    is_mandatory: false
-   name: Time Frame
    default_value: Last Hour
    type: ddl
    optional_values:
    - Last Hour
    - Last 6 Hours
    - Last 24 Hours
    - Last Week
    - Last Month
    - Custom
    description: Specify a time frame for the results. If "Custom" is selected, you
        also need to provide "Start Time".
    is_mandatory: false
-   name: Start Time
    default_value: ''
    type: string
    description: 'Specify the start time for the results. This parameter is mandatory,
        if "Custom" is selected for the "Time Frame" parameter. Format: ISO 8601'
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'Specify the end time for the results. Format: ISO 8601. If nothing
        is provided and "Custom" is selected for the "Time Frame" parameter then this
        parameter will use current time.'
    is_mandatory: false
-   name: Fields To Return
    default_value: ''
    type: string
    description: Specify what fields to return. If nothing is provided action will
        return all fields.
    is_mandatory: false
-   name: Sort Field
    default_value: CreatedDate
    type: string
    description: Specify what parameter should be used for sorting.
    is_mandatory: false
-   name: Max Results To Return
    default_value: '50'
    type: string
    description: 'Specify how many results to return. Default: 50. Maximum is 200.'
    is_mandatory: false
-   name: Sort Order
    default_value: ASC
    type: ddl
    optional_values:
    - ASC
    - DESC
    description: Specify the order of sorting.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/execute_simple_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
