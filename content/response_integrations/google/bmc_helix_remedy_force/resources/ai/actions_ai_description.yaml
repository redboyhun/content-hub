Update Record:
  ai_description: >-
    Updates an existing record in BMC Helix Remedyforce. This action allows users
    to modify specific fields of a record by providing the record type, its unique
    identifier, and a JSON object containing the fields and values to be updated.


    ### General Description

    This action interacts with the BMC Helix Remedyforce API to perform a partial
    update (PATCH) on a specified record. It is useful for automating ticket updates,
    changing statuses, or modifying metadata within the Remedyforce platform based
    on security orchestration workflows.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Record Type | String | Yes | The type of the record to be updated (e.g., Incident,
    Task, or a custom object). Users can find available types using the 'List Record
    Types' action. |

    | Record ID | String | Yes | The unique identifier (ID) of the specific record
    that needs to be updated. |

    | Fields To Update | String (JSON) | Yes | A JSON-formatted string representing
    the fields and their corresponding new values. Example: `{"Status__c": "Closed",
    "Note__c": "Resolved by SOAR"}`. |


    ### Additional Notes

    - The 'Fields To Update' parameter must be a valid JSON object. If the JSON is
    malformed, the action will fail with a descriptive error message.

    - Authentication can be performed using either Basic (Username/Password) or OAuth
    (Client ID/Secret/Refresh Token) credentials configured in the integration settings.


    ### Flow Description

