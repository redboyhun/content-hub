Create Record:
  ai_description: >-
    ### General Description

    Creates a new record in BMC Helix Remedyforce. This action allows users to programmatically
    generate various types of records (such as Incidents, Tasks, or custom objects)
    by providing the record type and a JSON-formatted payload containing the field
    values.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Record Type | String | Yes | Specifies the type of the record to be created
    (e.g., 'Incident', 'Task'). Use the 'List Record Types' action to see available
    options. |

    | Record Payload | String (JSON) | Yes | A JSON object containing the fields and
    values for the new record. Must be a valid JSON string. |


    ### Additional Notes

    - The 'Record Payload' must be a valid JSON string; otherwise, the action will
    fail during the validation stage.

    - This action does not process entities from the Google SecOps case; it operates
    solely based on the provided parameters.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the connection settings (API
    roots, credentials) and the action parameters (Record Type and Record Payload).

    2. **JSON Validation:** It attempts to parse the 'Record Payload' to ensure it
    is a valid JSON structure.

    3. **Manager Initialization:** Initializes the BMC Helix Remedyforce manager,
    handling authentication (Basic or OAuth).

    4. **Record Creation:** Sends a POST request to the BMC Helix Remedyforce API
    endpoint corresponding to the specified record type with the provided payload.

    5. **Result Handling:** If successful, the action returns the API response (including
    the new record ID) as JSON and completes the execution.
