List Record Types:
  ai_description: >-
    ### General Description

    The **List Record Types** action retrieves a list of available record types (SObjects)
    from the BMC Helix Remedyforce platform. This is a discovery-oriented action designed
    to help users identify valid object names and metadata for use in subsequent automation
    steps, such as creating or updating records. It provides details like the object's
    name, label, and whether it is a custom object.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Filter Value** | String | No | The string used to filter the record types.
    If provided, the action will filter the results based on the 'Name' of the record
    type. |

    | **Filter Logic** | String | No | Specifies the logic for the filter. Options
    are `Equal` (exact match) or `Contains` (substring match). Default is `Equal`.
    |

    | **Max Record Types To Return** | Integer | No | The maximum number of record
    types to return in the output. Default is 50. Must be a positive integer. |


    ### Flow Description

    1. **Initialization:** The action extracts configuration parameters (API Root,
    Credentials, SSL settings) and action-specific parameters (Filter Logic, Filter
    Value, Limit).

    2. **Authentication:** It initializes the `BMCHelixRemedyForceManager` which handles
    authentication via OAuth or Basic credentials to establish a session.

    3. **API Request:** The action performs a GET request to the BMC Helix Remedyforce
    `/sobjects/` endpoint to retrieve all available object metadata.

    4. **Filtering:** The `BMCHelixRemedyForceParser` processes the raw response,
    applying the user-defined filter (Equal or Contains) against the record type names.

    5. **Limiting:** The resulting list is truncated based on the `Max Record Types
    To Return` parameter.

    6. **Output:** The filtered list is added to the action results as a JSON object
    and formatted into a data table titled 'Available Record Types' for visibility
    in the SOAR interface.


    ### Additional Notes

    - This action does not require or process any specific entities (e.g., IP, Host)
    from the case context.

    - If the `Max Record Types To Return` is set to a non-positive value, the action
    will fail with an error message.
