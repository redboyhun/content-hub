Execute Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom SOQL (Salesforce Object Query Language) query in BMC Helix Remedyforce.
    This action provides a flexible way to retrieve specific data records from the
    Remedyforce platform that are not accessible through standard search actions.
    It returns the results as raw JSON and a formatted data table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | SOQL Query | String | Yes | The SOQL query string to be executed against the
    BMC Helix Remedyforce instance. |


    ### Flow Description

    1. **Authentication**: The action initializes a connection to BMC Helix Remedyforce
    using the provided credentials, supporting both Basic (Username/Password) and
    OAuth (Client ID/Secret/Refresh Token) authentication methods.

    2. **Query Execution**: It sends a GET request to the Remedyforce Query API endpoint
    with the user-defined SOQL query string.

    3. **Data Parsing**: The action parses the API response to extract the records
    and the total size of the result set.

    4. **Output Generation**: If records are found, the action adds the raw JSON data
    to the result and constructs a data table (CSV format) to be displayed in the
    Google SecOps interface. If no records are found, it reports a successful execution
    with zero results.


    ### Additional Notes

    * This action does not operate on specific entities; it is a global query utility.

    * Users must ensure the SOQL syntax is correct and that the user account has the
    necessary permissions to query the target objects.
