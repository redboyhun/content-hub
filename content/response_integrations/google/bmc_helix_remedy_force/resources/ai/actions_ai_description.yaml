Get OAuth Authorization Code:
  ai_description: >-
    ### General Description

    Generates an OAuth authorization URL for BMC Helix Remedyforce. This action is
    the first step in the OAuth2 authentication process, creating a link that a user
    must manually visit in a web browser to authorize the application and retrieve
    an authorization code. This code is subsequently used in the 'Get OAuth Refresh
    Token' action.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Redirect URL | String | Yes | The redirect URI that was configured when the
    'Connector App' was created in BMC Helix Remedyforce. The authorization server
    will redirect the user to this URL after successful authorization. |


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the `API Root` and `Client
    ID` from the integration's global configuration.

    2. **Parameter Extraction**: The action extracts the `Redirect URL` provided by
    the user.

    3. **URL Construction**: It formats a specific BMC Helix Remedyforce authorization
    endpoint URL using the retrieved configuration and parameters.

    4. **Output Generation**: The action adds the generated URL as a clickable link
    ('Authorization Code Link') in the SOAR interface and provides instructions to
    the user on how to proceed with the manual authorization step.


    ### Additional Notes

    This action does not perform any network requests to external systems; it strictly
    performs string manipulation to generate a valid OAuth URL based on the provided
    configuration.
