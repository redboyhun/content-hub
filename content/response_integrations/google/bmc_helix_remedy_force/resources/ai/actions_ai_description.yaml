Execute Simple Query:
  ai_description: >-
    Executes a SOQL (Salesforce Object Query Language) query against BMC Helix Remedyforce
    to retrieve specific records. The action allows for granular filtering based on
    record types, time frames, and custom WHERE clauses. It supports sorting and limiting
    the number of returned results. The retrieved data is attached to the case as
    a JSON result and displayed in a data table on the case wall.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Record Type | String | Yes | The specific BMC Helix Remedyforce object/record
    type to query (e.g., 'Account', 'Incident'). |

    | Where Filter | String | No | A SOQL WHERE clause to filter results. Do not include
    the 'WHERE' keyword itself. |

    | Time Frame | Enum | No | Predefined time ranges (e.g., 'Last Hour', 'Last 24
    Hours') or 'Custom'. Default is 'Last Hour'. |

    | Start Time | String | No | The start time for the query in ISO 8601 format.
    **Mandatory** if 'Time Frame' is set to 'Custom'. |

    | End Time | String | No | The end time for the query in ISO 8601 format. If 'Custom'
    is selected and this is empty, the current time is used. |

    | Fields To Return | String | No | A comma-separated list of fields to retrieve.
    If empty, all fields are returned. |

    | Sort Field | String | No | The field used to sort the results. Default is 'CreatedDate'.
    |

    | Sort Order | Enum | No | The direction of sorting: 'ASC' (ascending) or 'DESC'
    (descending). |

    | Max Results To Return | Integer | No | The maximum number of records to return.
    Range: 1 to 200. Default is 50. |


    ### Additional Notes

    - If 'Time Frame' is set to 'Custom', the 'Start Time' parameter must be provided,
    otherwise the action will fail.

    - The 'Max Results To Return' parameter is strictly capped at 200 by the integration
    logic.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves configuration settings (API roots, credentials)
    and action parameters.

    2. **Validation:** Checks if 'Max Results To Return' is within the allowed range
    (1-200) and ensures 'Start Time' is provided if a 'Custom' time frame is selected.

    3. **Query Construction:** Uses the `BMCHelixRemedyForceManager` to build a valid
    SOQL query string based on the provided filters, time constraints, and sorting
    preferences.

    4. **Execution:** Sends a GET request to the BMC Helix Remedyforce query endpoint.

    5. **Output Generation:** If records are found, it converts the raw data into
    a JSON result and constructs a CSV-formatted data table for the case wall.
