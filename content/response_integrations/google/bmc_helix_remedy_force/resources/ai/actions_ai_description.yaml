Get Record Details:
  ai_description: "### General Description\nRetrieves detailed information for specific\
    \ records from BMC Helix Remedyforce. This action allows users to fetch all or\
    \ specific fields for a list of record IDs belonging to a particular record type\
    \ (e.g., Incident, Account, Task). It is useful for deep-dive investigations where\
    \ specific record metadata is required to progress a case.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Record Type | String | Yes | The type of the record to retrieve (e.g., 'Incident',\
    \ 'Account'). Use the \"List Record Types\" action if the exact name is unknown.\
    \ |\n| Record IDs | String | Yes | A comma-separated list of unique identifiers\
    \ for the records you want to fetch details for. |\n| Fields To Return | String\
    \ | No | A comma-separated list of specific fields to include in the output. If\
    \ left empty, all available fields for the record will be returned. |\n\n### Additional\
    \ Notes\n- If a provided field name in 'Fields To Return' does not exist on the\
    \ record, the action will log an error for that specific field but continue processing\
    \ others.\n- The action will fail if the 'Record Type' is invalid or if no records\
    \ are found for the provided IDs.\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the BMC Helix Remedyforce manager using provided credentials\
    \ (either Basic or OAuth).\n2. **Parameter Parsing**: It converts the comma-separated\
    \ strings for 'Record IDs' and 'Fields To Return' into Python lists.\n3. **Data\
    \ Retrieval**: For each provided Record ID, the action sends a GET request to\
    \ the BMC Helix Remedyforce API for the specified Record Type.\n4. **Field Filtering**:\
    \ If 'Fields To Return' was specified, the action filters the API response to\
    \ include only those keys.\n5. **Output Generation**: \n    - For each successful\
    \ retrieval, a data table named \"Record [ID] Details\" is added to the case.\n\
    \    - A consolidated JSON object containing all retrieved records is attached\
    \ to the action results.\n6. **Final Status**: The action completes with a summary\
    \ message listing successful and failed record IDs."
