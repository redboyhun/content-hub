Wait For Fields Update:
  ai_description: "### General Description\nThe **Wait For Field Update** action is\
    \ an asynchronous polling mechanism designed to monitor a specific record in BMC\
    \ Helix Remedyforce. It pauses the playbook execution until a set of defined fields\
    \ on a target record (such as an Incident or Change Request) match the expected\
    \ values provided in the input. This action is primarily used to synchronize SOAR\
    \ workflows with manual or external processes occurring within the Remedyforce\
    \ platform.\n\n### Parameters\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| **Record Type** | String | Yes | The API name\
    \ of the BMC Helix Remedyforce object to monitor (e.g., `BMCServiceDesk__Incident__c`).\
    \ |\n| **Record ID** | String | Yes | The unique Salesforce/Remedyforce ID of\
    \ the specific record. |\n| **Fields To Check** | JSON | Yes | A JSON object where\
    \ keys are field API names and values are the expected values to wait for (e.g.,\
    \ `{\"BMCServiceDesk__Status_ID__c\": \"CLOSED\"}`). |\n| **Fail If Timeout**\
    \ | Boolean | Yes | If set to `True`, the action will report a failure status\
    \ if the playbook timeout is reached before the conditions are met. If `False`,\
    \ it will complete with a 'False' result value but a 'Completed' status upon timeout.\
    \ |\n\n### Additional Notes\n- The **Fields To Check** parameter must be a valid\
    \ JSON string. If the JSON is malformed, the action will fail during the initialization\
    \ phase.\n- This is an **Asynchronous** action. It does not block the entire SOAR\
    \ execution engine but rather checks the status periodically based on the platform's\
    \ polling interval.\n- Ensure that the **Record Type** provided is the internal\
    \ API name, not the display label.\n\n### Flow Description\n1. **Initialization**:\
    \ The action extracts configuration parameters and parses the `Fields To Check`\
    \ JSON payload.\n2. **Validation (First Run)**: On the first execution, it fetches\
    \ the record's current details to verify that the record exists and that all fields\
    \ specified in the `Fields To Check` parameter are valid attributes of that record\
    \ type.\n3. **Polling (Async Loop)**: The action enters an 'In Progress' state.\
    \ In each subsequent polling cycle, it retrieves the latest data for the specified\
    \ record from BMC Helix Remedyforce.\n4. **Comparison**: It iterates through the\
    \ `Fields To Check` map and compares the current values of the record's fields\
    \ against the expected values.\n5. **Completion**: \n    - If all fields match\
    \ the expected values, the action transitions to 'Completed', returns a success\
    \ result, and attaches the full record details as a JSON result.\n    - If the\
    \ timeout is reached and `Fail If Timeout` is enabled, the action transitions\
    \ to 'Failed'.\n    - If the timeout is reached and `Fail If Timeout` is disabled,\
    \ the action transitions to 'Completed' with a negative result value."
