Ping:
  ai_description: >-
    ### General Description

    Verifies the connection to the BMC Helix Remedyforce instance using the provided
    credentials and API endpoints. This action ensures that the integration is correctly
    configured and can communicate with the external service.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL for the BMC Helix Remedyforce API. |

    | Login API Root | String | Yes | The base URL used for authentication purposes.
    |

    | Username | String | No | The username for basic authentication. Required if
    not using OAuth. |

    | Password | String | No | The password for basic authentication. Required if
    not using OAuth. |

    | Client ID | String | No | The OAuth client ID of the connected app. Required
    if using OAuth. |

    | Client Secret | String | No | The OAuth client secret of the connected app.
    Required if using OAuth. |

    | Refresh Token | String | No | The refresh token for OAuth authorization. Required
    if using OAuth. |

    | Verify SSL | Boolean | Yes | If enabled, verifies the SSL certificate for the
    connection. Defaults to True. |


    ### Additional Notes

    The action supports two authentication methods: Basic Authentication (Username
    and Password) or OAuth (Client ID, Client Secret, and Refresh Token). At least
    one set of these parameters must be configured for the action to run successfully.


    ### Flow Description

    1. **Parameter Initialization**: The action extracts all necessary configuration
    parameters from the integration settings.

    2. **Manager Initialization**: It initializes the `BMCHelixRemedyForceManager`,
    which handles the authentication logic (Basic or OAuth) and establishes a session.

    3. **Connectivity Test**: The manager executes a test query (`SELECT FIELDS(ALL)
    from Account LIMIT 1`) against the BMC Helix Remedyforce API to verify read access.

    4. **Result Reporting**: If the request is successful, it returns a completion
    state; otherwise, it catches the exception and reports a failure.
