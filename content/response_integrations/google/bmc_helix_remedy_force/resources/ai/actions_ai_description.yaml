Get OAuth Refresh Token:
  ai_description: >-
    ### General Description

    The **Get OAuth Refresh Token** action is a utility designed to facilitate the
    OAuth 2.0 authentication flow for the BMC Helix Remedyforce integration. Its primary
    purpose is to exchange a temporary authorization code for a long-lived refresh
    token, which is required for the integration to maintain persistent access to
    the API without manual re-authentication.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Redirect URL** | String | Yes | The callback URL configured in the BMC Helix
    Remedyforce 'Connected App'. This must match the URL used during the authorization
    code generation. |

    | **Authorization Code** | String | Yes | The short-lived code retrieved from
    the 'Get OAuth Authorization Code' action. |


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the `Client ID`, `Client Secret`,
    and `Login API Root` from the integration's global settings.

    2. **Input Extraction**: It retrieves the `Redirect URL` and `Authorization Code`
    provided by the user in the action parameters.

    3. **Token Exchange**: The action performs a POST request to the Remedyforce OAuth
    endpoint (`/services/oauth2/token`) using the `authorization_code` grant type,
    passing the credentials and the authorization code.

    4. **Result Processing**: Upon success, the full JSON response (containing the
    refresh token and initial access token) is saved to the action's results for the
    user to use in the integration configuration.


    ### Additional Notes

    - This action is typically run only once during the initial setup or when a token
    needs to be manually rotated.

    - The `Login API Root` is crucial as it determines whether the action targets
    a production or sandbox environment.
