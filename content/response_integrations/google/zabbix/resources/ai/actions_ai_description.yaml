Execute Script:
  ai_description: >-
    ### General Description

    Executes a predefined script on Zabbix hosts identified by their IP address. This
    action allows security teams to trigger remote commands, remediation scripts,
    or diagnostic tools directly from Google SecOps onto systems managed by Zabbix.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Script Name | String | Yes | The exact name of the script to execute, as configured
    in the Zabbix 'Administration -> Scripts' section. |


    ### Flow Description

    1. **Initialization**: Connects to the Zabbix API using the provided credentials
    and configuration.

    2. **Script Retrieval**: Fetches the internal Zabbix ID for the script specified
    in the 'Script Name' parameter.

    3. **Host Identification**: For each IP Address entity in the scope, the action
    queries Zabbix to find all hosts associated with that specific IP.

    4. **Execution**: If matching hosts are found, the action triggers the execution
    of the script on each identified host.

    5. **Result Collection**: Captures the execution output (stdout/stderr) and status
    (success/failure) from Zabbix for each host.

    6. **Reporting**: Aggregates the results into a JSON object and provides a summary
    message indicating which entities succeeded or failed.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Executes a script on the remote host via the Zabbix agent or server, which performs
      actions or changes state on the target system.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the Zabbix instance. It ensures that the provided credentials
    (API Root, Username, and Password) are valid and that the network path to the
    Zabbix API is open.


    ### Parameters Description

    This action does not have any action-specific parameters. It relies entirely on
    the integration's global configuration settings:


    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Api Root | The base URL of the Zabbix server API. | String | Yes |

    | Username | The username used to authenticate with the Zabbix API. | String |
    Yes |

    | Password | The password used to authenticate with the Zabbix API. | String |
    Yes |

    | Verify SSL | Determines whether to verify the SSL certificate of the Zabbix
    server. | Boolean | No (Defaults to False) |


    ### Additional Notes

    - This action is typically used during the initial setup of the Zabbix integration
    to confirm that the environment is correctly configured.

    - If the connection fails, the action will raise a `ZabbixManagerError` with details
    about the failure.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the Zabbix API Root, Username,
    Password, and SSL verification settings from the integration configuration.

    2. **Manager Initialization**: It initializes the `ZabbixManager` class.

    3. **Authentication**: The `ZabbixManager` attempts to log in to the Zabbix API
    using the `pyzabbix` library.

    4. **Result Reporting**: If the login is successful, the action concludes with
    a success message indicating a valid connection. If an exception occurs during
    login, the action fails.
  capabilities:
