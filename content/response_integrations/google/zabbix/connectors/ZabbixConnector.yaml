name: Zabbix Connector
parameters:
-   name: DeviceProductField
    default_value: Product Field Name
    type: string
    description: The field name used to determine the device product
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: Event Field Name
    type: string
    description: The field name used to determine the event name (sub-type)
    is_mandatory: false
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: '300'
    type: string
    description: The timeout limit (in seconds) for the python process running current
        script
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Api Root
    default_value: ''
    type: string
    description: Api Root
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: Username
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: Password
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Only Problematic Triggers
    default_value: 'False'
    type: boolean
    description: If enabled, only problematic triggers will be considered.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Fetch Max Hours Backwards
    default_value: 24
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        alerts from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Zabbix server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
description: Zabbix connector - fetches events from Zabbix.
integration: Zabbix
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/zabbix#zabbix_connector
rules:
-   rule_name: tag_name_value
    rule_type: allow_list
is_connector_rules_supported: false
creator: admin
