name: AlienVault USM Appliance Connector
parameters:
-   name: DeviceProductField
    default_value: device_product
    type: string
    description: The field name used to determine the device product
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: name
    type: string
    description: The field name used to determine the event name (sub-type)
    is_mandatory: false
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: '60'
    type: string
    description: The timeout limit (in seconds) for the python process running current
        script
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Api Root
    default_value: ''
    type: string
    description: e.g. https://<instance>.alienvault.com
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: Username
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: Password
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Events Per Alert
    default_value: '10'
    type: integer
    description: Limit the number of events per alert. e.g. 10
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Days Backwards
    default_value: '1'
    type: integer
    description: This field is used in the connector first running cycle and determine
        the connector start time. e.g. 3
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Alerts Per Cycle
    default_value: '10'
    type: integer
    description: Limit the number of alerts in every cycle. e.g. 10
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Server Timezone
    default_value: UTC
    type: string
    description: The timezone configured in the AlienVault's, ex. UTC, Asia/Jerusalem
        etc.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Environment Field Name
    default_value: ''
    type: string
    description: The name of the environment's field. e.g. AlienVault Sensor
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: ''
integration: AlienVaultAppliance
documentation_link: null
rules: []
is_connector_rules_supported: false
creator: admin
