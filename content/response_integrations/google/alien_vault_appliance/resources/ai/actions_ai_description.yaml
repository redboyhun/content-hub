Get Vulnerability Reports:
  ai_description: >-
    ### General Description

    The **Get Vulnerability Reports** action retrieves vulnerability report files
    from an AlienVault Appliance. It scans the environment's vulnerability overview,
    identifies available reports, and downloads the specified number of files to attach
    them directly to the Google SecOps case for further analysis. This action is useful
    for gathering historical or current vulnerability data across the managed environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Number Of Files To Fetch | Integer | Yes | Specifies the maximum number of vulnerability
    report files to retrieve and attach to the case. Defaults to 1 if not specified.
    |


    ### Flow Description

    1. **Authentication**: Establishes a session with the AlienVault Appliance using
    the provided API Root, Username, and Password.

    2. **Metadata Retrieval**: Fetches a list of available vulnerability reports from
    the AlienVault environment vulnerability overview page.

    3. **Selection**: Limits the list of reports based on the user-defined `Number
    Of Files To Fetch` parameter.

    4. **File Processing**: For each selected report, the action downloads the file
    content (typically .xlsx) from the internal download link.

    5. **Case Enrichment**: Attaches the downloaded files to the case and creates
    a data table named 'Vulnerability Report Files' containing metadata such as the
    target address and creation time.


    ### Additional Notes

    This action does not operate on specific entities (like IP or Hostname) within
    the case; instead, it fetches general environment reports based on the appliance's
    global state.
