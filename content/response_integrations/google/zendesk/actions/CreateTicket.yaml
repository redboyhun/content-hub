name: Create Ticket
description: Create a ticket with specific properties
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/zendesk#create_ticket
integration_identifier: Zendesk
parameters:
-   name: Subject
    default_value: ''
    type: string
    description: Subject
    is_mandatory: true
-   name: Description
    default_value: ''
    type: string
    description: Description
    is_mandatory: true
-   name: Assigned User
    default_value: ''
    type: string
    description: User full name.
    is_mandatory: false
-   name: Assignment Group
    default_value: ''
    type: string
    description: Group name.
    is_mandatory: false
-   name: Priority
    default_value: ''
    type: string
    description: 'Priority will be one of the following: urgent, high, normal or low.'
    is_mandatory: false
-   name: Ticket Type
    default_value: ''
    type: string
    description: 'The ticket type will be one of the following: problem, incident,
        question or task.'
    is_mandatory: false
-   name: Tag
    default_value: ''
    type: string
    description: Tag
    is_mandatory: false
-   name: Internal Note
    default_value: 'False'
    type: boolean
    description: Specify whether the comment should be public, or internal. Unchecked
        means it will be public, checked means it will be internal only.
    is_mandatory: false
-   name: Email CCs
    default_value: ''
    type: string
    description: 'Specify a comma-separated list of email addresses, which should
        also receive the notification of the ticket creation. Note: at max 48 email
        CCs can be added. This is Zendesk limitation.'
    is_mandatory: false
-   name: Validate Email CCs
    default_value: true
    type: boolean
    description: If enabled, action will try to check that users with emails provided
        in “Email CCs“ parameter exist. If at least one user doesn’t exist, action
        will fail. If this parameter is disabled, action will not perform this check.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
script_result_name: ticket_id
