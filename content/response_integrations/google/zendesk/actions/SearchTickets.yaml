name: Search Tickets
description: Search tickets by keyword
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/zendesk#search_tickets
integration_identifier: Zendesk
parameters:
-   name: Search Query
    default_value: ''
    type: string
    description: 'Query content(e.g: type:ticket status:pending).'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/search_tickets_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
script_result_name: results_count
