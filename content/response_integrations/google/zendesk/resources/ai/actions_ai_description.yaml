Get Ticket Details:
  ai_description: >-
    ### General Description

    Retrieves comprehensive information for a specific Zendesk ticket using its unique
    identifier. This action fetches the core ticket metadata, the full conversation
    history (comments), and any associated file attachments, making them available
    within the Google SecOps platform for investigation and record-keeping.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Ticket ID | String | Yes | The unique numerical ID of the Zendesk ticket to
    retrieve details for. |


    ### Flow Description

    1. **Authentication**: Initializes the Zendesk manager using the provided server
    address, user email, and API token.

    2. **Data Retrieval**: Executes three distinct API calls to Zendesk to fetch the
    ticket's metadata, its comments, and its attachments.

    3. **Comment Processing**: Converts the retrieved ticket comments into a CSV format
    and adds them as a Data Table named 'Ticket Comments' to the action results.

    4. **Attachment Handling**: Iterates through all retrieved attachments, encodes
    the file content in Base64, and attaches them directly to the SOAR case.

    5. **Result Output**: Formats the primary ticket metadata into a JSON object and
    provides it as the main action output, while also setting the execution status
    based on whether the ticket was successfully found.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds a data table containing ticket comments and uploads file attachments
      retrieved from Zendesk directly to the SOAR case.
