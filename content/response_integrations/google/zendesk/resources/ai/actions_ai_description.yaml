Search Tickets:
  ai_description: "### General Description\nThe **Search Tickets** action allows users\
    \ to search for tickets within a Zendesk instance using a keyword or a structured\
    \ query string. This action is designed to retrieve ticket data based on specific\
    \ criteria, such as status, priority, or type, without modifying any data in Zendesk.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| **Search Query** | String | Yes | The search\
    \ string used to filter tickets. It supports Zendesk's advanced search syntax\
    \ (e.g., `type:ticket status:pending` or specific keywords). |\n\n### Flow Description\n\
    1. **Authentication**: The action initializes a connection to the Zendesk API\
    \ using the configured User Email, API Token, and Server Address.\n2. **Parameter\
    \ Retrieval**: It extracts the mandatory 'Search Query' provided by the user.\n\
    3. **API Request**: The action executes a GET request to the Zendesk search endpoint\
    \ with the specified query.\n4. **Result Processing**: \n    * If tickets are\
    \ found, the action iterates through the results and adds each ticket's full JSON\
    \ data to the action's output.\n    * It calculates the total count of tickets\
    \ found.\n5. **Completion**: The action ends by returning the total count of results\
    \ and a summary message indicating success or failure to find matches.\n\n###\
    \ Additional Notes\nThis action does not operate on specific SecOps entities (like\
    \ IPs or Hostnames). It performs a global search based solely on the input parameter.\
    \ There are no internal or external data mutations performed by this action."
