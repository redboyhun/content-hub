Create Ticket:
  ai_description: >-
    Creates a new ticket in Zendesk with specified properties such as subject, description,
    priority, and type. This action allows for assigning the ticket to specific users
    or groups, adding tags, and including CC recipients. It also supports validating
    CC email addresses against existing Zendesk users before creation.


    ### Flow Description

    1. **Initialization**: Connects to the Zendesk API using provided credentials
    (User Email, API Token, and Server Address).

    2. **Email Format Validation**: Checks the syntax of provided CC email addresses
    using a regular expression to ensure they are valid email formats.

    3. **User Verification (Optional)**: If the 'Validate Email CCs' parameter is
    enabled, the action fetches all existing Zendesk users and verifies that every
    CC recipient exists in the system.

    4. **Identity Resolution**: Resolves the provided 'Assigned User' and 'Assignment
    Group' names into their corresponding numeric Zendesk IDs by querying the Zendesk
    API.

    5. **Ticket Creation**: Constructs a ticket object and sends a POST request to
    the Zendesk API to create the ticket with the defined subject, description, priority,
    type, tags, and CCs.

    6. **Result Handling**: Returns the ID of the newly created ticket to the Google
    SecOps platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Subject | String | Yes | The subject line of the ticket. |

    | Description | String | Yes | The initial comment or body text of the ticket.
    |

    | Assigned User | String | No | The full name of the Zendesk user to whom the
    ticket should be assigned. |

    | Assignment Group | String | No | The name of the Zendesk group to which the
    ticket should be assigned. |

    | Priority | String | No | The priority level of the ticket. Expected values:
    'urgent', 'high', 'normal', or 'low'. |

    | Ticket Type | String | No | The category of the ticket. Expected values: 'problem',
    'incident', 'question', or 'task'. |

    | Tag | String | No | A single tag to be added to the ticket. |

    | Internal Note | Boolean | No | If checked, the initial comment will be marked
    as private (internal). If unchecked, it will be public. |

    | Email CCs | String | No | A comma-separated list of email addresses to be added
    as CCs on the ticket. |

    | Validate Email CCs | Boolean | No | If enabled, the action will fail if any
    email in 'Email CCs' does not correspond to an existing Zendesk user. |


    ### Additional Notes

    - **Zendesk Limitation**: A maximum of 48 email CCs can be added to a single ticket.

    - **Case Sensitivity**: User and Group names are case-sensitive when being resolved
    to IDs.

    - **Validation**: The action will fail if the CC email format is invalid, regardless
    of the 'Validate Email CCs' setting.
