Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the Zendesk instance. It ensures that the provided credentials
    (User Email Address and API Token) and the Server Address are correct and that
    the Zendesk API is reachable.


    ### Parameters Description

    There are no input parameters for this action. It relies entirely on the integration's
    global configuration settings.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the 'User Email Address',
    'Api Token', and 'Server Address' from the Zendesk integration configuration.

    2. **Manager Initialization**: It initializes the `ZendeskManager` with the retrieved
    credentials.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    internally attempts to fetch a list of tickets from the Zendesk `/api/v2/tickets.json`
    endpoint using a GET request.

    4. **Result Handling**: If the API returns a valid response, the action concludes
    with a 'Connection Established' message. If the request fails or returns an error,
    it concludes with 'Connection Failed'.


    ### Additional Notes

    This action is typically used during the initial setup of the integration or for
    troubleshooting communication issues.
