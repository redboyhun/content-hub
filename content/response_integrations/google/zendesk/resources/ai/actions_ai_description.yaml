Add Comment To Ticket:
  ai_description: >-
    ### General Description

    Adds a comment to an existing ticket in Zendesk. This action allows users to append
    text to a ticket's conversation, with the option to specify the author and whether
    the note should be public or internal (private).


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | Ticket ID | The unique identifier of the Zendesk ticket to which the comment
    will be added. | String | Yes |

    | Comment Body | The text content of the comment. | String | Yes |

    | Author Name | The full name of the author of the comment. This name must already
    exist in Zendesk to be resolved to a User ID. | String | No |

    | Internal Note | Determines the visibility of the comment. If checked (True),
    the comment is added as a private internal note. If unchecked (False), the comment
    is public. | Boolean | Yes |


    ### Additional Notes

    - This action does not operate on Google SecOps entities; it requires a specific
    Ticket ID as input.

    - The 'Author Name' is case-sensitive and must match an existing user in the Zendesk
    system.


    ### Flow Description

    1. **Initialization**: The action initializes the Zendesk manager using the provided
    server address, user email, and API token.

    2. **Parameter Extraction**: It retrieves the Ticket ID, Comment Body, Author
    Name, and the Internal Note flag from the action parameters.

    3. **Ticket Verification**: The action fetches the current details of the specified
    ticket from Zendesk to verify its existence.

    4. **Author Resolution**: If an 'Author Name' is provided, the action performs
    a lookup to find the corresponding Zendesk User ID.

    5. **Payload Construction**: It constructs a JSON payload containing the comment
    body and visibility settings. If 'Internal Note' is selected, the comment's 'public'
    attribute is set to false.

    6. **Execution**: The action sends a PUT request to the Zendesk API to update
    the ticket with the new comment.

    7. **Completion**: The action returns a success message if the ticket was updated
    or an error message if the operation failed.
