Update Ticket:
  ai_description: >-
    Updates the details of an existing ticket in Zendesk and optionally adds a comment.
    This action allows for the modification of various ticket attributes including
    the subject, assignee, assignment group, priority, type, tags, and status. It
    interacts with the Zendesk API to first retrieve the current state of the ticket
    and then applies the requested changes via a PUT request. Additionally, if a comment
    is provided, it can be posted as either a public response or an internal note.


    ### Flow Description

    1. **Initialization**: The action initializes the Zendesk manager using the provided
    server address, user email, and API token.

    2. **Parameter Extraction**: It retrieves the mandatory Ticket ID and other optional
    parameters like Subject, Status, and Priority.

    3. **Identity Resolution**: If an 'Assigned User' or 'Assignment Group' is provided
    by name, the action performs lookup requests to Zendesk to find the corresponding
    numeric IDs.

    4. **Ticket Update**: The action fetches the current ticket data, applies the
    new attribute values, and sends a PUT request to Zendesk to update the ticket.

    5. **Comment Addition**: If the 'Additional Comment' parameter is populated, a
    second update is performed to append the comment to the ticket's conversation
    history, respecting the 'Internal Note' visibility setting.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Ticket ID | String | Yes | The unique numeric identifier of the Zendesk ticket
    to be updated. |

    | Subject | String | No | The new subject line for the ticket. |

    | Assigned User | String | No | The full name of the Zendesk user to whom the
    ticket should be assigned. |

    | Assignment Group | String | No | The name of the group to which the ticket should
    be assigned. |

    | Priority | String | No | The priority level of the ticket. Expected values:
    'urgent', 'high', 'normal', or 'low'. |

    | Ticket Type | String | No | The category of the ticket. Expected values: 'problem',
    'incident', 'question', or 'task'. |

    | Tag | String | No | A single tag to be added to the ticket's existing tags.
    |

    | Status | String | No | The current state of the ticket. Expected values: 'new',
    'open', 'pending', 'hold', 'solved', or 'closed'. |

    | Additional Comment | String | No | Text to be added as a new comment on the
    ticket. |

    | Internal Note | Boolean | No | If checked (True), the 'Additional Comment' will
    be added as a private internal note. If unchecked (False), it will be a public
    comment. |


    ### Additional Notes

    - The action performs name-to-ID resolution for users and groups, which requires
    the names to match exactly (case-sensitive) in Zendesk.

    - Updating the 'Tag' parameter will append the new tag to the existing list of
    tags on the ticket rather than overwriting them.
