Apply Macros On Ticket:
  ai_description: "### General Description\nThis action applies a predefined Zendesk\
    \ macro to a specific ticket. Macros in Zendesk are sets of predefined actions\u2014\
    such as changing the ticket status, adding tags, or inserting standard responses\u2014\
    that can be applied to a ticket in a single operation. This action automates the\
    \ process of updating ticket metadata and content based on existing Zendesk templates.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| Ticket ID | String/Integer | Yes | The unique\
    \ numerical identifier of the Zendesk ticket to which the macro will be applied.\
    \ |\n| Macro Title | String | Yes | The exact title (case-sensitive) of the macro\
    \ to be executed. |\n\n### Flow Description\n1. **Macro Identification**: The\
    \ action first queries the Zendesk API to retrieve the unique ID associated with\
    \ the provided `Macro Title`.\n2. **Preview Application**: It calls the Zendesk\
    \ 'apply macro' endpoint for the specific `Ticket ID`. This step calculates the\
    \ resulting state of the ticket if the macro were applied but does not yet commit\
    \ the changes.\n3. **Ticket Mutation**: The action then takes the resulting data\
    \ from the preview and performs a `PUT` request to the Zendesk ticket endpoint,\
    \ effectively updating the ticket with the macro's actions.\n4. **Finalization**:\
    \ The action returns a success message if the ticket was successfully updated\
    \ or an error message if the macro could not be found or applied."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates a specific Zendesk ticket by applying the changes (status, tags, comments,
      etc.) defined within a macro.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
