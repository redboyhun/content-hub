Add Tag To Device:
  ai_description: >-
    ### General Description

    This action adds a specific tag to device entities (Hostnames or IP Addresses)
    within McAfee Mvision ePO V2. It is primarily used for administrative tasks, such
    as marking devices for investigation, grouping them for policy application, or
    labeling them based on security findings.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tag Name | String | Yes | The exact name of the tag to be applied to the target
    devices. The action will first verify if this tag exists in the McAfee environment
    before attempting to apply it. |


    ### Flow Description

    1. **Authentication**: The action establishes a connection to McAfee Mvision ePO
    V2 using the provided API credentials and retrieves an OAuth token.

    2. **Tag Verification**: It searches for the provided `Tag Name` in the McAfee
    system. If the tag is not found, the action terminates with an error to prevent
    inconsistent states.

    3. **Device Identification**: For each supported entity (Hostname or IP Address),
    the action queries the McAfee device inventory to find a matching record.

    4. **Tag Application**: Once a matching device is found, the action sends a POST
    request to the McAfee API to associate the verified tag with that specific device.

    5. **Reporting**: The action tracks successes, missing devices, and failures,
    providing a summarized output message at the end of the execution.


    ### Additional Notes

    - This action requires the `epo.tags.r`, `epo.tags.w`, and `epo.device.w` scopes
    to be configured in the integration settings.

    - If a device is not found in McAfee for a given entity, the action will report
    it as a missing entity but continue processing other entities in the list.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action performs a POST request to the McAfee Mvision ePO V2 API to create
      a relationship between a device and a tag, effectively changing the device's
      metadata state in the external system.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - HOSTNAME
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Enrich Endpoint:
  ai_description: "### General Description\nEnriches Hostname and IP Address entities\
    \ by retrieving detailed system information from McAfee Mvision ePO V2. This action\
    \ helps analysts understand the managed state, operating system details, and security\
    \ posture of an endpoint directly within the case context.\n\n### Parameters\n\
    There are no action-specific parameters for this action. It relies on the global\
    \ integration configuration (API Root, IAM Root, Client ID, Client Secret, API\
    \ Key, Scopes, and Verify SSL).\n\n### Flow Description\n1. **Authentication**:\
    \ Connects to the McAfee Mvision ePO V2 service using the configured IAM and API\
    \ credentials to obtain an OAuth token.\n2. **Entity Filtering**: Identifies all\
    \ `HOSTNAME` and `ADDRESS` entities within the current Google SecOps context.\n\
    3. **Device Lookup**: For each entity, the action queries the McAfee ePO API to\
    \ find a matching device record. It supports pagination to ensure the device is\
    \ found even in large environments.\n4. **Data Extraction**: Retrieves comprehensive\
    \ metadata including Agent GUID, OS Platform, OS Version, Last Update time, Managed\
    \ State, and assigned Tags.\n5. **Internal Enrichment**: \n    *   Updates the\
    \ entity's `additional_properties` with the retrieved data (prefixed with `MMV_EPO_V2`).\n\
    \    *   Marks the entity as enriched (`is_enriched = True`).\n    *   Creates\
    \ a detailed Entity Insight containing a summary of the host, OS, and agent status.\n\
    6. **Reporting**: Generates a 'Devices' data table in the case wall and provides\
    \ a summary message of successful and failed enrichments."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates Google SecOps entities by adding enrichment data to their
      'additional_properties' field, setting the 'is_enriched' flag to true, and creating
      entity insights with device details.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
