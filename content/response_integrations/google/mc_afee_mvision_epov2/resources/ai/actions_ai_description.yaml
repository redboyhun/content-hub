Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the McAfee Mvision ePO V2 server to ensure that the provided
    configuration parameters are valid and that the Google SecOps environment can
    communicate with the external API. This action is primarily used for troubleshooting
    and verifying integration setup.


    ### Parameters

    There are no parameters for this action.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the necessary connection
    details from the integration settings, including API Root, IAM Root, Client ID,
    Client Secret, API Key, and Scopes.

    2. **Manager Initialization**: It initializes the `McAfeeMvisionEPOV2Manager`
    which handles the session and authentication logic.

    3. **Authentication**: The manager attempts to retrieve an OAuth2 token from the
    IAM service using the provided Client ID and Client Secret.

    4. **Connectivity Test**: The action performs a lightweight GET request to the
    `/epo/v2/devices` endpoint (limiting the result to 1) to verify that the API is
    reachable and the credentials have the necessary permissions to access the ePO
    environment.

    5. **Result Reporting**: If all steps succeed, the action completes with a success
    message. If any step fails (e.g., authentication error, network timeout), it catches
    the exception and reports a failure with the specific error details.
