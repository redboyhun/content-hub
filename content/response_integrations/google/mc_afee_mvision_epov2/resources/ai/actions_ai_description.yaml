List Tags:
  ai_description: >-
    ### General Description

    The **List Tags** action retrieves a list of all tags currently defined within
    the McAfee Mvision ePO V2 environment. This utility action is primarily used for
    discovery, allowing users to see which tags are available for assignment to devices
    in subsequent workflow steps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | **Max Tags to Return** | Integer | No | 100 | Specifies the maximum number of
    tags to retrieve from the McAfee Mvision ePO V2 server. If the value provided
    is 0 or negative, the action defaults to 100. |


    ### Flow Description

    1. **Authentication**: The action connects to McAfee Mvision ePO V2 using the
    configured API Root, IAM Root, Client ID, Client Secret, and API Key.

    2. **Request Execution**: It performs a GET request to the `/epo/v2/tags` endpoint,
    utilizing pagination parameters to limit the result set based on the 'Max Tags
    to Return' input.

    3. **Data Processing**: The raw JSON response is parsed into Tag objects, extracting
    key attributes such as Tag ID, Name, Family, and Notes.

    4. **Output Generation**: The action populates a data table named 'Available Tags'
    for the case wall and provides the full list of tags in JSON format for use in
    downstream playbook logic.


    ### Additional Notes

    - This action does not operate on specific entities and is executed at the integration
    level.

    - If no tags are found, the action will complete with a 'False' result value and
    an informative message.
