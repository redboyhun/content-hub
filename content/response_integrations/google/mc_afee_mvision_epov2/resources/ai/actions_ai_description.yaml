Remove Tag From Device:
  ai_description: >-
    Removes a specified tag from device entities (IP Address or Hostname) within McAfee
    Mvision ePO V2. This action is primarily used for endpoint management and incident
    response cleanup, such as removing 'Infected' or 'Quarantined' tags once a threat
    has been remediated.


    ### Flow Description

    1. **Authentication**: Establishes a connection to McAfee Mvision ePO V2 using
    the configured API credentials and IAM roots.

    2. **Tag Verification**: Retrieves the internal ID for the provided 'Tag Name'
    from the McAfee environment. If the tag does not exist, the action terminates
    with an error.

    3. **Device Lookup**: Iterates through the target entities (IPs and Hostnames)
    and searches for corresponding device records in the McAfee database.

    4. **Tag Removal**: For every matching device found, it executes a DELETE request
    to remove the association between the device and the specified tag.

    5. **Reporting**: Provides a summary of successful removals, missing devices,
    and any errors encountered during the process.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tag Name | String | Yes | The exact name of the tag to be removed from the target
    endpoints. |


    ### Additional Notes

    - This action supports both IP Address and Hostname entity types.

    - If the specified tag name is misspelled or does not exist in the McAfee environment,
    the action will fail for all entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Removes a tag association from a device record in McAfee Mvision ePO V2 using
      a DELETE request to the assignedTags relationship endpoint.
    fetches_data: true
    internal_data_mutation_explanation: null
