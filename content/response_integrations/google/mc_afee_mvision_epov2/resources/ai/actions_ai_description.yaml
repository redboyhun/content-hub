List Devices:
  ai_description: "### General Description\nLists devices that are available in McAfee\
    \ Mvision ePO V2. This action provides visibility into managed endpoints by retrieving\
    \ a list of devices and their associated metadata from the McAfee Mvision environment.\n\
    \n### Parameters Description\n| Parameter Name | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| Max Devices to Return | Integer | No | Specifies\
    \ the maximum number of devices to retrieve from the system. If not provided or\
    \ if a non-positive value is entered, the default value of 100 is used. |\n\n\
    ### Flow Description\n1. **Authentication**: The action establishes a connection\
    \ to McAfee Mvision ePO V2 using the provided API Root, IAM Root, Client ID, Client\
    \ Secret, and API Key.\n2. **Data Retrieval**: It sends a GET request to the `/epo/v2/devices`\
    \ endpoint, applying the `Max Devices to Return` limit as a pagination parameter.\n\
    3. **Processing**: The retrieved device data is parsed into internal data models.\n\
    4. **Output**: \n    * A data table titled \"Available Devices\" is added to the\
    \ case, containing columns such as ID, Name, Hostname, IP Address, OS Platform,\
    \ and Agent Version.\n    * The complete device details are returned as a JSON\
    \ result for use in downstream playbook tasks.\n    * If no devices are found,\
    \ the action returns a negative result value."
