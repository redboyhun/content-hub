name: McAfee Mvision EPO V2 - Events Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: threattype
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Root
    default_value: https://api.mvision.mcafee.com
    type: string
    description: API Root of the McAfee Mvision EPO V2 account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: IAM Root
    default_value: https://iam.mcafee-cloud.com
    type: string
    description: IAM Root of the McAfee Mvision EPO V2 API.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Client ID
    default_value: ''
    type: string
    description: Client ID of the McAfee Mvision EPO V2 account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Client Secret
    default_value: ''
    type: password
    description: Client Secret of the McAfee Mvision EPO V2 account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Key
    default_value: ''
    type: password
    description: API Key of the McAfee Mvision EPO V2 account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Scopes
    default_value: epo.device.r epo.device.w epo.evt.r epo.taggroup.r epo.taggroup.w
        epo.tags.r epo.tags.w mi.user.investigate soc.inv.ade
    type: string
    description: Scopes of the McAfee Mvision EPO V2 account.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Fetch Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        alerts from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Alerts To Fetch
    default_value: 50
    type: integer
    description: How many alerts to process per one connector iteration.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        CheckPoint Cloud Guard server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Pull events from McAfee Mvision EPO V2.
integration: McAfeeMvisionEPOV2
documentation_link: null
rules: []
is_connector_rules_supported: false
creator: admin
