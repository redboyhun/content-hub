List Policies:
  ai_description: >-
    ### General Description

    The **List Policies** action retrieves a list of managed policies from an AWS
    IAM account. It allows security analysts to discover both AWS-managed and customer-defined
    policies, providing visibility into available permissions. The action supports
    filtering by attachment status and policy scope, and outputs the results as both
    a JSON object and a formatted data table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Only Attached** | Boolean | No | If set to `True`, the action filters results
    to only include policies currently attached to an IAM user, group, or role. Default
    is `False`. |

    | **Scope** | Dropdown | No | Filters policies by their origin. Options include
    `All` (default), `AWS` (AWS-managed policies), and `Local` (Customer-managed policies).
    |

    | **Max Policies to Return** | Integer | No | Specifies the maximum number of
    policies to retrieve. The value must be between 1 and 1000. Default is 100. |


    ### Flow Description

    1. **Initialization**: The action extracts AWS credentials and validates the `Max
    Policies to Return` parameter to ensure it falls within the allowed range (1-1000).

    2. **Connectivity Check**: It verifies the connection to the AWS IAM service using
    the provided Access Key and Secret Key.

    3. **Policy Retrieval**: The action calls the AWS IAM API to list policies based
    on the specified `Scope` and `Only Attached` filters.

    4. **Pagination Handling**: If the number of policies exceeds the initial API
    response limit but is less than the requested maximum, the action handles pagination
    markers to fetch additional results.

    5. **Output Generation**: The retrieved policy data (including Name, ID, ARN,
    and Creation Date) is added to the action's JSON results and displayed in a data
    table named "IAM Policies".
