Remove a User from a Group:
  ai_description: >-
    Removes one or more users from a specified AWS Identity and Access Management
    (IAM) group. This action is used to manage group memberships by dissociating users
    from groups, which in turn removes the permissions inherited from those groups.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group Name | String | Yes | The name of the IAM group from which the user(s)
    will be removed. |

    | User Name | String | Yes | A comma-separated list of IAM usernames to be removed
    from the group. |


    ### Flow Description

    1. **Initialization**: The action initializes the AWS IAM manager using the provided
    Access Key, Secret Key, and SSL verification settings.

    2. **Connectivity Check**: It performs a connectivity test to ensure the credentials
    are valid and the AWS IAM service is reachable.

    3. **Input Parsing**: The 'User Name' parameter is parsed from a comma-separated
    string into a list of individual usernames.

    4. **Execution**: The action iterates through each username and attempts to remove
    it from the specified group using the AWS SDK.

    5. **Error Handling**: It specifically handles cases where the user or group does
    not exist, or where AWS account limits are exceeded, and logs these events.

    6. **Reporting**: Finally, it aggregates the results, identifying which users
    were successfully removed and which failed, and returns a summary message to the
    SOAR platform.
