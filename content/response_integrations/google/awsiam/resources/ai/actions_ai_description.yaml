Create a User:
  ai_description: >-
    ### General Description

    Creates one or more new IAM users in a target AWS account. This action allows
    for bulk user creation by providing a comma-separated list of usernames. It validates
    the provided names against AWS naming conventions and ensures connectivity before
    attempting the creation. Note that this action only creates the user identities;
    it does not apply any policies, groups, or login profiles at this stage.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User Name | String | Yes | A comma-separated list of usernames to create. Usernames
    must be unique within the AWS account and can only contain alphanumeric characters
    and the following symbols: `+=.@_-`. |


    ### Additional Notes

    - The action will fail if the AWS account user limit has been reached.

    - Usernames are case-insensitive for uniqueness checks (e.g., 'Admin' and 'admin'
    are considered the same).

    - No permissions or policies are attached to the users during this process.


    ### Flow Description

    1. **Authentication**: Initializes the AWS IAM manager using the provided Access
    Key ID and Secret Key.

    2. **Connectivity Check**: Performs a test connection to the AWS IAM service to
    verify credentials.

    3. **Input Parsing**: Splits the 'User Name' input string into a list of individual
    usernames.

    4. **Validation**: Iterates through each username to verify it meets AWS character
    requirements.

    5. **Creation**: Calls the AWS IAM API to create each valid user.

    6. **Error Handling**: Captures specific exceptions such as 'EntityAlreadyExists'
    (if the user already exists) or 'LimitExceeded' (if the AWS account user limit
    is reached).

    7. **Reporting**: Aggregates the results and returns a summary message along with
    the JSON data for all successfully created users.
