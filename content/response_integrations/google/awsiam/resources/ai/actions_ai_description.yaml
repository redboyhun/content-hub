    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds IAM users to an IAM group in the target AWS account, which modifies the
      users' group memberships and associated permissions.
    fetches_data: false
    internal_data_mutation_explanation: null
