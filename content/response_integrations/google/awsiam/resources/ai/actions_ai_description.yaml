Attach a Policy:
  ai_description: >-
    ### General Description

    Attaches a specified AWS managed policy to an IAM identity, which can be a User,
    Group, or Role. This action is used to programmatically manage permissions within
    an AWS environment by linking existing policies to identities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Identity Type | String (Dropdown) | Yes | The type of IAM identity to which
    the policy will be attached. Supported values: User, Group, Role. |

    | Identity Name | String | Yes | The friendly name (not ARN) of the IAM User,
    Group, or Role. |

    | Policy Name | String | Yes | The friendly name (not ARN) of the managed policy
    to attach. |


    ### Flow Description

    1. **Validation**: The action validates that the `Identity Name` and `Policy Name`
    contain only allowed characters (alphanumeric and `+=,.@_-`).

    2. **ARN Retrieval**: It searches for the specified `Policy Name` within the AWS
    account to retrieve its unique Amazon Resource Name (ARN).

    3. **Policy Attachment**: Based on the `Identity Type`, it calls the corresponding
    AWS IAM API (`attach_user_policy`, `attach_group_policy`, or `attach_role_policy`)
    to link the policy to the identity.

    4. **Finalization**: The action reports success or failure based on the API response.


    ### Additional Notes

    This action requires valid AWS credentials with permissions to list policies and
    attach them to the specified identity types. It does not work on SecOps entities
    directly but uses manual input parameters.
