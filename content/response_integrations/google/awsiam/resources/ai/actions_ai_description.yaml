Create a Group:
  ai_description: >-
    ### General Description

    This action creates one or more new IAM groups in a target AWS account. It is
    used to set up administrative or functional containers for users, allowing for
    centralized permission management within AWS Identity and Access Management (IAM).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group Name | String | Yes | A comma-separated list of names for the groups to
    be created. Group names must be unique within the AWS account and can only contain
    alphanumeric characters and the following symbols: `+=.@_-`. Spaces are not allowed.
    |


    ### Additional Notes

    - The action performs a connectivity test before attempting to create groups.

    - If a group name already exists, the action will skip that specific name and
    continue with others, reporting the conflict in the final message.

    - The action handles AWS service limits; if the maximum number of groups for the
    account is reached, it will stop and report the error.


    ### Flow Description

    1. **Initialization**: Retrieves AWS credentials (Access Key ID, Secret Key) and
    SSL verification settings from the integration configuration.

    2. **Parameter Parsing**: Extracts the `Group Name` string and converts it into
    a list of individual names.

    3. **Connectivity Check**: Establishes a connection to the AWS IAM service and
    verifies credentials using an account summary request.

    4. **Validation and Creation**: For each group name provided:
        - Validates that the name adheres to AWS character requirements.
        - Calls the AWS IAM API to create the group.
        - Captures the resulting group metadata (ARN, Group ID, Creation Date).
    5. **Error Handling**: Specifically catches and logs instances where a group already
    exists, the name is invalid, or account limits are exceeded.

    6. **Result Reporting**: Aggregates the results of all creation attempts into
    a final status message and provides the raw JSON data of successfully created
    groups.
