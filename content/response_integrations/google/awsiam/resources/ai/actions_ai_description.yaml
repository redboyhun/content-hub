List Users:
  ai_description: >-
    ### General Description

    This action retrieves a list of all users within an AWS Identity and Access Management
    (IAM) account. It is primarily used for discovery and auditing purposes, allowing
    security analysts to see which identities exist in the AWS environment. The action
    returns user details including their Amazon Resource Name (ARN), creation date,
    path, and unique User ID.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max Users to Return | Integer | No | Specifies the maximum number of users to
    retrieve from AWS IAM. The value must be between 1 and 1000. If not provided,
    it defaults to 50. |


    ### Additional Notes

    - The action handles AWS API pagination automatically if the requested number
    of users exceeds the default page size.

    - Results are provided in both JSON format and as a formatted data table named
    'IAM Users' within the SOAR interface.


    ### Flow Description

    1. **Initialization**: The action extracts AWS credentials (Access Key, Secret
    Key) and the 'Max Users to Return' parameter.

    2. **Validation**: It verifies that the 'Max Users to Return' value falls within
    the allowed range (1 to 1000).

    3. **Connectivity Check**: It performs a connectivity test to the AWS IAM service
    using the provided credentials.

    4. **Data Retrieval**: It calls the AWS IAM `list_users` API. If the number of
    users exceeds the initial response, it uses markers to paginate through the results
    until the requested limit is reached.

    5. **Data Processing**: The raw AWS response is parsed into structured User data
    models.

    6. **Output Generation**: The action populates a JSON result for automated processing
    and creates a CSV-formatted data table for human review in the case wall.
