List Groups:
  ai_description: >-
    ### General Description

    This action retrieves a list of all IAM groups within a specified AWS account.
    It is primarily used for auditing, visibility, and administrative oversight of
    group structures in AWS Identity and Access Management (IAM).


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max Groups to Return | Integer | No | Specifies the maximum number of groups
    to retrieve. The value must be between 1 and 1000. If not provided, it defaults
    to 50. |


    ### Additional Notes

    - This action does not operate on specific entities; it performs a global fetch
    of group data for the configured AWS account.

    - The action includes a connectivity test before attempting to list groups to
    ensure the provided AWS credentials are valid.


    ### Flow Description

    1. **Initialization**: The action extracts AWS credentials (Access Key, Secret
    Key) and the SSL verification setting from the integration configuration.

    2. **Parameter Validation**: It validates that the `Max Groups to Return` parameter
    falls within the allowed range (1 to 1000).

    3. **Connectivity Test**: It establishes a connection to the AWS IAM service and
    performs a test call (`get_account_summary`) to verify permissions.

    4. **Data Retrieval**: It calls the AWS IAM API to list groups, handling pagination
    automatically if the number of groups exceeds the initial page size, up to the
    specified limit.

    5. **Data Processing**: The retrieved group objects (containing ARN, Group Name,
    Group ID, Path, and Creation Date) are converted into JSON and CSV formats.

    6. **Output**: The action populates a JSON result and creates a data table named
    "IAM Groups" in the Google SecOps case.
