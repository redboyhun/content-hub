Ping:
  ai_description: >-
    ### General Description

    Verifies the connectivity between Google SecOps and the AWS Identity and Access
    Management (IAM) service. This action ensures that the provided AWS credentials
    (Access Key ID and Secret Key) are valid and have sufficient permissions to access
    the IAM API.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | AWS Access Key ID | String | Yes | The access key ID for the AWS account used
    for authentication. |

    | AWS Secret Key | String | Yes | The secret key for the AWS account used for
    authentication. |

    | Verify SSL | Boolean | No | If enabled (default), the action will verify the
    SSL certificate of the AWS endpoint. |


    ### Additional Notes

    This is a standard connectivity test (Ping) and does not process any entities
    or modify any data.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the AWS Access Key, Secret Key, and SSL
    verification setting from the integration configuration.

    2. **Manager Initialization**: Creates an instance of the `AWSIAMManager` using
    the provided credentials.

    3. **Connectivity Test**: Calls the `test_connectivity` method, which executes
    the AWS IAM `get_account_summary` API call.

    4. **Result Handling**: If the API call returns a successful response (HTTP 200),
    the action completes successfully. If an exception is caught (e.g., authentication
    failure), the action fails and returns the error message.
