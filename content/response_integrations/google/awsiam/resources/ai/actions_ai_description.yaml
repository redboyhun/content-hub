Disable User Access:
  ai_description: >-
    ### General Description

    The **Disable User Access** action is a remediation capability for AWS Identity
    and Access Management (IAM). It is designed to immediately revoke a user's permissions
    by attaching an explicit "Deny All" inline policy named `DisableUserAccessPolicy`.
    This is particularly useful during incident response to contain a compromised
    user account without deleting the user or their existing permissions.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **AWS Access Key ID** | String | Yes | The access key ID used to authenticate
    with AWS IAM. This is retrieved from the integration configuration. |

    | **AWS Secret Key** | String | Yes | The secret access key used to authenticate
    with AWS IAM. This is retrieved from the integration configuration. |

    | **Verify SSL** | Boolean | No | If enabled (default), the action will verify
    the SSL certificate of the AWS API endpoint. |


    ### Flow Description

    1. **Initialization**: The action extracts AWS credentials (Access Key and Secret
    Key) and SSL verification settings from the integration's configuration parameters.

    2. **Entity Filtering**: The action identifies and processes entities of type
    `USERUNIQNAME` present in the context.

    3. **Username Extraction**: For each user entity, the action parses the `original_identifier`
    (which may be a full ARN) to extract the specific IAM username.

    4. **External Mutation**: The action calls the AWS IAM `put_user_policy` API to
    attach an inline policy named `DisableUserAccessPolicy`. This policy contains
    a JSON document that explicitly denies all actions (`*`) on all resources (`*`).

    5. **Finalization**: The action records the success or failure of the policy application
    for each user and provides a summary message and JSON results for use in subsequent
    playbook steps.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Attaches an inline deny-all policy named 'DisableUserAccessPolicy' to the IAM
      user in AWS, which explicitly denies all actions across all AWS resources for
      that user.
    fetches_data: false
    internal_data_mutation_explanation: null
