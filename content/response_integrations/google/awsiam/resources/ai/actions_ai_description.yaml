Add a User to a Group:
  ai_description: >-
    ### General Description

    Adds specified AWS IAM users to a designated IAM group. This action is used to
    manage user permissions by grouping them, allowing for consistent policy application
    across multiple identities within an AWS environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group Name | String | Yes | The name of the AWS IAM group to which users will
    be added. Must contain only alphanumeric characters and/or +=.@_-. |

    | User Name | String | Yes | A comma-separated list of AWS IAM usernames to be
    added to the group. |


    ### Flow Description

    1. **Initialization**: Retrieves AWS credentials (Access Key, Secret Key) and
    SSL verification settings from the integration configuration.

    2. **Connectivity Check**: Validates the connection to the AWS IAM service using
    the provided credentials.

    3. **Input Parsing**: Processes the 'User Name' parameter, converting the comma-separated
    string into a list of individual usernames.

    4. **Execution**: Iterates through the list of usernames and calls the AWS IAM
    API to add each user to the specified group.

    5. **Error Handling**: Specifically handles cases where the user or group does
    not exist, or where AWS account limits (e.g., maximum users per group) are exceeded.

    6. **Finalization**: Aggregates the results and provides a summary message indicating
    which users were successfully added and which failed.


    ### Additional Notes

    This action does not utilize or iterate over Google SecOps entities. It relies
    entirely on the manual input provided in the action parameters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
