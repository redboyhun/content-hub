name: Create a Group
description: Create a new IAM group for your AWS account. To set up a group, you need
    to create the group. Then give the group permissions based on the type of work
    that you expect the users in the group to do. Finally, add users to the group.
integration_identifier: AWSIAM
parameters:
-   name: Group Name
    default_value: ''
    type: string
    description: 'Name of the group to create. Comma separated values. Note: Group
        names can not include spaces and must contain only alphanumeric characters
        and/or the following: +=.@_-. Names must be unique within an account.'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/create_group_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
