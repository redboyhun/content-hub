name: Create a User
description: Create a new IAM user for your AWS account. You can add multiple users
    at once with comma separated values. Please note that no policies will be applied
    at this stage.
integration_identifier: AWSIAM
parameters:
-   name: User Name
    default_value: ''
    type: string
    description: 'Name of the user to create. Comma separated values. Note: Username
        can not include spaces and must contain only alphanumeric characters and/or
        the following: +=.@_-. Names must be unique within an account.'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/create_user_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
