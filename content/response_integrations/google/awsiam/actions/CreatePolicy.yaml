name: Create a Policy
description: Create an IAM customer managed policy for your AWS account. This action
    creates a policy version with a version identifier of v1and sets v1 as the policy's
    default version.
integration_identifier: AWSIAM
parameters:
-   name: Policy Name
    default_value: ''
    type: string
    description: 'Name of the policy to create. Policy name can not include spaces
        and must contain only alphanumeric characters and/or the following: +=.@_-.
        Policy names must be unique within an account.'
    is_mandatory: true
-   name: Policy Document
    default_value: ''
    type: string
    description: The JSON policy document that you want to use as the content for
        the new policy.
    is_mandatory: true
-   name: Description
    default_value: ''
    type: string
    description: Description of the policy.Typically used to store information about
        the permissions defined in the policy. For example, "Grants access to production
        DynamoDB tables." The policy description is immutable. After a value is assigned,
        it cannot be changed.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_policy_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
