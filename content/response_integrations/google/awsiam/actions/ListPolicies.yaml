name: List Policies
description: List all the managed policies that are available in your AWS account,
    including your own customer-defined managed policies and all AWS managed policies.
    You can filter the list of policies that are returned using the optional Only
    Attached, Scope, and Policy Usage parameters. For example, to list only the customer
    managed policies in your AWS account, set Scope to Local. To list only AWS managed
    policies, set Scope to AWS.
integration_identifier: AWSIAM
parameters:
-   name: Only Attached
    default_value: 'False'
    type: boolean
    description: When checked, filtering the results to only the policies that are
        attached to an IAM user, group or role. When unchecked, all policies will
        be returned.
    is_mandatory: false
-   name: Scope
    default_value: All
    type: ddl
    optional_values:
    - All
    - AWS
    - Local
    description: The scope to use for filtering the results. To list only AWS managed
        policies, set Scope to AWS. To list only the customer managed policies in
        your AWS account, set Scope to Local. As default, all policies will be returned.
    is_mandatory: false
-   name: Max Policies to Return
    default_value: '100'
    type: string
    description: Specify how many policies to return. Default is 100. Maximum is 1000.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_policies_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
