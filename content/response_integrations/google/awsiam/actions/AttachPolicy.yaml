name: Attach a Policy
description: Attach the specified managed policy to an identity (user, group, role).
integration_identifier: AWSIAM
parameters:
-   name: Identity Type
    default_value: Group
    type: ddl
    optional_values:
    - User
    - Group
    - Role
    description: IAM Identity type.
    is_mandatory: true
-   name: Identity Name
    default_value: ''
    type: string
    description: 'The name (friendly name, not ARN) of the identity to attach the
        policy to. Identity names can not include spaces and must contain only alphanumeric
        characters and/or the following: +=.@_-'
    is_mandatory: true
-   name: Policy Name
    default_value: ''
    type: string
    description: 'The name (friendly name, not ARN) of the policy to attach the policy
        to. Policy names can not include spaces and must contain only alphanumeric
        characters and/or the following: +=.@_-'
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities":[]}'
