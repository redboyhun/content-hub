name: Add a User to a Group
description: Adds the specified user to the specified IAM group. Use groups to apply
    the same permissions policies across multiple users at once.
integration_identifier: AWSIAM
parameters:
-   name: Group Name
    default_value: ''
    type: string
    description: 'The name of the group to update. Note: Group names can not include
        spaces and must contain only alphanumeric characters and/or the following:
        +=.@_-'
    is_mandatory: true
-   name: User Name
    default_value: ''
    type: string
    description: 'The name of the user to add. Note: User names can not include spaces
        and must contain only alphanumeric characters and/or the following: +=.@_-.
        Comma separated values.'
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities":[]}'
