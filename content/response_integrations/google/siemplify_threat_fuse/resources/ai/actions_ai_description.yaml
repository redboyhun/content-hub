Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the Siemplify ThreatFuse server. It ensures that the provided
    configuration parameters, such as the API Root, Web Root, and authentication credentials,
    are correct and that the server is reachable.


    ### Parameters Description

    This action does not take any input parameters directly from the playbook. Instead,
    it utilizes the following configuration parameters defined at the integration
    level:


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Web Root | String | Yes | The base URL for the ThreatFuse web interface. |

    | API Root | String | Yes | The base URL for the ThreatFuse API. |

    | Email Address | String | Yes | The email address associated with the ThreatFuse
    account. |

    | API Key | String | Yes | The API key used for authentication. |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the ThreatFuse server. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the connection details (URLs
    and credentials) from the integration's configuration.

    2. **Manager Initialization:** It initializes the `ThreatFuseManager` with the
    extracted settings.

    3. **Connectivity Test:** The action performs a `GET` request to the ThreatFuse
    intelligence endpoint (`/api/v2/intelligence/`) with a minimal limit to validate
    that the credentials are valid and the server responds correctly.

    4. **Result Reporting:** If the request is successful, it returns a success message
    and sets the execution state to completed. If an exception occurs (e.g., timeout,
    invalid credentials), it logs the error and reports a failure.
