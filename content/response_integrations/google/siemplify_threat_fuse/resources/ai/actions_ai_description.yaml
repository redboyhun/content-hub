Get Related Associations:
  ai_description: >-
    ### General Description

    The **Get Related Associations** action retrieves deep threat intelligence context
    from Siemplify ThreatFuse for specific entities (IP Addresses, File Hashes, URLs,
    and Users). It identifies related objects such as threat actors, malware families,
    active campaigns, and vulnerabilities associated with the indicators in the case.
    This action is designed to provide analysts with a comprehensive view of the threat
    landscape surrounding the entities involved in an investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Return [Type]** | Boolean | No | Toggles whether to fetch details for specific
    association types (e.g., Campaigns, Actors, Malware, TTPs, Vulnerabilities). Default
    values vary by type. |

    | **Create [Type] Entity** | Boolean | No | If enabled, the action will automatically
    add discovered associations (e.g., a specific Threat Actor or CVE) as new entities
    to the current case. |

    | **Create Case Tag** | Boolean | No | If enabled, adds the names of the discovered
    associations as tags to the case for easier filtering and categorization. |

    | **Create Insight** | Boolean | No | If enabled, generates a detailed Case Insight
    summarizing the findings and providing direct links to the ThreatFuse portal.
    |

    | **Max Associations To Return** | Integer | No | Limits the number of related
    objects retrieved per category. Default is 5. |

    | **Max Statistics To Return** | Integer | No | Specifies the number of top IOC
    statistics (countries, types, sources) to include for the associations. |


    ### Flow Description

    1. **Entity Filtering:** The action identifies supported entities (IP, Hash, URL,
    User) from the case and validates their format (e.g., checking for unsupported
    spaces).

    2. **Indicator Lookup:** It queries the ThreatFuse API to retrieve internal indicator
    IDs for the identified entities.

    3. **Association Discovery:** It searches for related association IDs (e.g., identifying
    which Campaigns or Actors are linked to the indicator IDs) based on the enabled
    categories.

    4. **Detail Retrieval (Async):** The action enters an asynchronous execution state
    to fetch full metadata and statistics for each discovered association ID, ensuring
    it doesn't exceed script timeouts.

    5. **Case Enrichment:** Once all data is gathered, it populates the case with
    Data Tables, JSON results, Case Insights, Tags, and new Case Entities as configured.


    ### Additional Notes

    - This is an asynchronous action that may run across multiple cycles to handle
    large volumes of intelligence data.

    - New entities created by this action are marked with the property `is_new_entity:
    True` and are set as vulnerable.
