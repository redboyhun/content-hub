Get Related Domains:
  ai_description: "Retrieves domains related to specific entities by querying associations\
    \ within Siemplify ThreatFuse. This action allows analysts to discover infrastructure\
    \ linked to known threats, such as malware, campaigns, or threat actors, by traversing\
    \ the ThreatFuse relationship graph.\n\n### Parameters\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| Confidence Threshold | Integer\
    \ | Yes | The minimum confidence score (0-100) required for a related domain to\
    \ be included in the results. |\n| Search Threat Bulletins | Boolean | Yes | If\
    \ enabled, searches for domains associated with Threat Bulletins. |\n| Search\
    \ Actors | Boolean | Yes | If enabled, searches for domains associated with Threat\
    \ Actors. |\n| Search Attack Patterns | Boolean | Yes | If enabled, searches for\
    \ domains associated with Attack Patterns. |\n| Search Campaigns | Boolean | Yes\
    \ | If enabled, searches for domains associated with Campaigns. |\n| Search Courses\
    \ Of Action | Boolean | Yes | If enabled, searches for domains associated with\
    \ Courses of Action. |\n| Search Identities | Boolean | Yes | If enabled, searches\
    \ for domains associated with Identities. |\n| Search Incidents | Boolean | Yes\
    \ | If enabled, searches for domains associated with Incidents. |\n| Search Infrastructures\
    \ | Boolean | Yes | If enabled, searches for domains associated with Infrastructures.\
    \ |\n| Search Intrusion Sets | Boolean | Yes | If enabled, searches for domains\
    \ associated with Intrusion Sets. |\n| Search Malware | Boolean | Yes | If enabled,\
    \ searches for domains associated with Malware. |\n| Search Signatures | Boolean\
    \ | Yes | If enabled, searches for domains associated with Signatures. |\n| Search\
    \ Tools | Boolean | Yes | If enabled, searches for domains associated with Tools.\
    \ |\n| Search TTPs | Boolean | Yes | If enabled, searches for domains associated\
    \ with TTPs. |\n| Search Vulnerabilities | Boolean | Yes | If enabled, searches\
    \ for domains associated with Vulnerabilities. |\n| Max Domains To Return | Integer\
    \ | No | The maximum number of unique domains to return. Default is 50. |\n\n\
    ### Additional Notes\n* The action supports a wide range of entity types including\
    \ File Hashes, IP Addresses, URLs, Email Addresses (User entities), Threat Actors,\
    \ and CVEs.\n* Results are aggregated into a unique set of domains to prevent\
    \ duplicates.\n\n### Flow Description\n1. **Initialization**: Validates the `Confidence\
    \ Threshold` and initializes the ThreatFuse manager using API credentials.\n2.\
    \ **Entity Filtering**: Identifies supported entities from the target list and\
    \ categorizes them into standard indicators (IP, Hash, URL, Email) or model-based\
    \ entities (CVE, Threat Actor).\n3. **Association Mapping**: Determines which\
    \ ThreatFuse association types to query based on the boolean 'Search' parameters\
    \ provided by the user.\n4. **Indicator Retrieval**: For standard entities, the\
    \ action first retrieves their corresponding indicator IDs from ThreatFuse.\n\
    5. **Relationship Traversal**: \n    * For standard indicators: Finds related\
    \ associations (e.g., Malware) and then queries those associations for linked\
    \ Domain indicators.\n    * For CVEs and Threat Actors: Directly searches for\
    \ the association by name and then queries for linked Domain indicators.\n6. **Filtering\
    \ & Aggregation**: Filters domains based on the `Confidence Threshold` and `Max\
    \ Domains To Return` limit.\n7. **Output**: Returns the list of discovered domains\
    \ in the action's JSON result."
