Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches entities including IP Addresses, URLs, File Hashes, and User (Email)
    entities using threat intelligence from Siemplify ThreatFuse. The action retrieves
    detailed indicator data, evaluates risk based on configurable severity and confidence
    thresholds, and provides contextual insights and analysis links directly within
    the case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Severity Threshold | Enum | Yes | Specifies the minimum severity level (Low,
    Medium, High, Very High) required to mark an entity as suspicious. |

    | Confidence Threshold | Integer | Yes | Specifies the minimum confidence score
    (0-100) required to mark an entity as suspicious. |

    | Ignore False Positive Status | Boolean | No | If enabled, the action will evaluate
    and potentially mark an entity as suspicious even if its status in ThreatFuse
    is 'False Positive'. |

    | Add Threat Type To Case | Boolean | No | If enabled, the action adds the threat
    types (e.g., 'bot', 'apt') associated with the indicators as tags to the case.
    |

    | Create Insight | Boolean | No | If enabled, the action generates a detailed
    case insight for each processed entity. |

    | Only Suspicious Entity Insight | Boolean | No | If enabled, insights will only
    be created for entities that exceed the specified severity and confidence thresholds.
    |


    ### Flow Description

    1. **Initialization:** The action extracts integration configuration (API keys,
    roots) and user-defined parameters for thresholds and insight creation.

    2. **Entity Filtering:** It iterates through the target entities, filtering for
    supported types (IP, URL, Hash, User) and validating identifiers (e.g., ensuring
    no spaces are present).

    3. **Data Retrieval:** It performs a batch query to the ThreatFuse API to retrieve
    indicators for all supported entities.

    4. **Enrichment:** For each entity with matching indicators, the action updates
    the entity's additional properties with enrichment data, sets the enriched status,
    and adds an entity data table.

    5. **Risk Evaluation:** It calculates whether the entity is suspicious by comparing
    the indicator's severity and confidence against the user-provided thresholds.

    6. **Contextual Data:** The action fetches related analysis links and detailed
    intelligence (e.g., VirusTotal or DomainTools classifications) for the entities.

    7. **Internal Updates:** Based on configuration, it adds threat tags to the case,
    creates detailed insights (IP, URL, Domain, Hash, or Email details), and updates
    the entities in Google SecOps.


    ### Additional Notes

    - If multiple records are found for the same entity, the action enriches using
    the latest record but takes the highest severity and average confidence for risk
    assessment.

    - The action supports specific logic for different URL indicator types, distinguishing
    between 'URL' and 'Domain' for insight generation.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: true
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action enriches entities with threat intelligence, updates their suspicious
      status, adds threat-related tags to the case, and generates detailed entity
      insights.
  categories:
