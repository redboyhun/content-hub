Submit Observables:
  ai_description: >-
    ### General Description

    The **Submit Observables** action allows users to submit threat intelligence data
    (observables) to the Siemplify ThreatFuse (Anomali) platform. It supports IP addresses,
    URLs, File Hashes, and User entities. This action is used to contribute local
    intelligence to the ThreatFuse ecosystem, allowing for classification, threat
    typing, and sharing within trusted circles.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Classification** | String | Yes | Defines the visibility of the observable.
    Options: `Public`, `Private`. |

    | **Threat Type** | String | Yes | Categorizes the threat (e.g., `APT`, `Malware`,
    `Phish`, `C2`). |

    | **Source** | String | No | The source of the intelligence. Defaults to `Siemplify`.
    |

    | **Expiration Date** | Integer | No | Number of days until the observable expires.
    If left blank, the observable will never expire. |

    | **Trusted Circle IDs** | String | No | A comma-separated list of IDs for specific
    trusted circles to share the observable with. |

    | **TLP** | String | Yes | Traffic Light Protocol level (e.g., `Red`, `Amber`,
    `Green`, `White`). |

    | **Confidence** | Integer | No | A confidence score between 0 and 100. Only applied
    if `Override System Confidence` is enabled. |

    | **Override System Confidence** | Boolean | No | If enabled, the system will
    use the value provided in the `Confidence` parameter instead of the default system
    confidence. |

    | **Anonymous Submission** | Boolean | No | If enabled, the submission will be
    made without revealing the submitter's identity. |

    | **Tags** | String | No | A comma-separated list of tags to associate with the
    observable. |


    ### Flow Description

    1. **Initialization**: The action extracts configuration settings (API keys, roots)
    and action parameters, validating that mandatory fields like `Classification`
    and `TLP` are present.

    2. **Entity Filtering**: It iterates through the target entities in the case,
    filtering for supported types: `ADDRESS` (IP), `FILEHASH`, `DestinationURL`, and
    `USERUNIQNAME`. It also excludes entities containing spaces in their identifiers.

    3. **Submission**: For each valid entity, it sends a POST request to the ThreatFuse
    API to import the observable with the specified metadata (TLP, Threat Type, Tags,
    etc.).

    4. **Approval Polling**: The action enters a polling loop, checking the status
    of the submitted jobs. It waits for the platform to approve the submission before
    proceeding.

    5. **Finalization**: Once all jobs are processed, the action returns a JSON summary
    of approved jobs and any entities that failed the submission or approval process.


    ### Additional Notes

    * **Permissions**: This action requires the following permissions in ThreatFuse:
    `Org admin`, `Create Anomali Community Intel`, and `Approve Intel`.

    * **Validation**: The `Confidence` parameter must be between 0 and 100, and the
    `Expiration Date` must be a positive integer.
