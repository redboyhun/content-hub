  ai_description: "### General Description\nRetrieves unique URLs associated with\
    \ specific entities by traversing threat intelligence relationships in Siemplify\
    \ ThreatFuse. This action allows analysts to discover related infrastructure,\
    \ phishing links, or distribution sites linked to indicators like IPs, Hashes,\
    \ or Threat Actors.\n\n### Parameters Description\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| Confidence Threshold | Integer\
    \ | Yes | Filters related indicators by a minimum confidence score (0-100). |\n\
    | Search [Category] | Boolean | Yes | A series of flags (e.g., Search Actors,\
    \ Search Malware, Search TTPs) that determine which association types in ThreatFuse\
    \ are traversed to find related URLs. |\n| Max URLs To Return | Integer | No |\
    \ Limits the total number of unique URLs returned in the result. Default is 50.\
    \ |\n\n### Additional Notes\n- The action supports a wide range of entity types\
    \ including standard indicators (IP, Hash, URL, Email) and threat model objects\
    \ (CVE, Threat Actor).\n- Entities containing space characters are automatically\
    \ skipped as they are not supported by the underlying API.\n\n### Flow Description\n\
    1. **Initialization**: Validates the confidence threshold and initializes the\
    \ ThreatFuse manager with API credentials.\n2. **Entity Filtering**: Iterates\
    \ through target entities, filtering for supported types (ADDRESS, FILEHASH, DestinationURL,\
    \ USERUNIQNAME, CVE, THREATACTOR) and ensuring identifiers do not contain spaces.\n\
    3. **Association Traversal**: \n    - For standard indicators (IP, Hash, URL,\
    \ Email), it fetches the indicator ID and then searches for related associations\
    \ (e.g., Malware, Campaigns) based on the enabled search parameters.\n    - For\
    \ CVE and Threat Actor entities, it directly identifies the corresponding threat\
    \ model object in ThreatFuse.\n4. **URL Extraction**: Queries the identified associations\
    \ for linked indicators of type 'URL' that meet the specified confidence threshold.\n\
    5. **Aggregation**: Collects all discovered URLs into a unique set, respecting\
    \ the 'Max URLs To Return' limit.\n6. **Output**: Returns the list of unique URLs\
    \ as a JSON result for use in subsequent playbook steps."
