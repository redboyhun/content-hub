Get Related Hashes:
  ai_description: >-
    ### General Description

    The **Get Related Hashes** action retrieves file hashes (MD5, SHA1, SHA256) associated
    with specific entities from Siemplify ThreatFuse. It leverages ThreatFuse's threat
    modeling and association engine to find related indicators across various categories
    such as Malware, Campaigns, Actors, and Vulnerabilities. This action is primarily
    used to expand the scope of an investigation by identifying related malicious
    files based on a known indicator (IP, URL, Hash, etc.).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Confidence Threshold | Integer | Yes | The minimum confidence score (0-100)
    required for a related hash to be included in the results. |

    | Search Threat Bulletins | Boolean | Yes | If enabled, the action will search
    for hashes associated with threat bulletins. |

    | Search Actors | Boolean | Yes | If enabled, the action will search for hashes
    associated with threat actors. |

    | Search Attack Patterns | Boolean | Yes | If enabled, the action will search
    for hashes associated with attack patterns. |

    | Search Campaigns | Boolean | Yes | If enabled, the action will search for hashes
    associated with campaigns. |

    | Search Courses Of Action | Boolean | Yes | If enabled, the action will search
    for hashes associated with courses of action. |

    | Search Identities | Boolean | Yes | If enabled, the action will search for hashes
    associated with identities. |

    | Search Incidents | Boolean | Yes | If enabled, the action will search for hashes
    associated with incidents. |

    | Search Infrastructures | Boolean | Yes | If enabled, the action will search
    for hashes associated with infrastructures. |

    | Search Intrusion Sets | Boolean | Yes | If enabled, the action will search for
    hashes associated with intrusion sets. |

    | Search Malware | Boolean | Yes | If enabled, the action will search for hashes
    associated with malware. |

    | Search Signatures | Boolean | Yes | If enabled, the action will search for hashes
    associated with signatures. |

    | Search Tools | Boolean | Yes | If enabled, the action will search for hashes
    associated with tools. |

    | Search TTPs | Boolean | Yes | If enabled, the action will search for hashes
    associated with TTPs. |

    | Search Vulnerabilities | Boolean | Yes | If enabled, the action will search
    for hashes associated with vulnerabilities. |

    | Max Hashes To Return | Integer | No | The maximum number of hashes to retrieve.
    Defaults to 50 if not specified or if a negative value is provided. |


    ### Flow Description

    1. **Initialization**: The action extracts configuration parameters and validates
    that the `Confidence Threshold` is between 0 and 100.

    2. **Entity Scoping**: It identifies supported entities from the target list (IP,
    URL, Hash, User, CVE, Threat Actor). It specifically separates `CVE` and `THREATACTOR`
    entities for specialized lookup logic.

    3. **Association Mapping**: It builds a list of association types to search based
    on the enabled "Search" boolean parameters.

    4. **Indicator Retrieval**: For standard indicators (IP, URL, Hash, User), it
    fetches corresponding indicator IDs from the ThreatFuse API.

    5. **Association Querying**: It iterates through the selected association types
    to find objects linked to the identified indicators.

    6. **Hash Extraction**: For each found association (or directly for CVE/Actor
    entities), it queries for related MD5/SHA hashes that meet the confidence threshold.

    7. **Aggregation**: The action collects all unique hashes, categorizes them by
    type (MD5, SHA1, SHA256), and returns them as a JSON result.


    ### Additional Notes

    - The action will skip entities containing spaces as they are not supported by
    the underlying API for these lookups.

    - Email addresses are supported when provided as User entities that match standard
    email regex.
