Get Related IPs:
  ai_description: >-
    ### General Description

    The **Get Related IPs** action retrieves IP addresses associated with specific
    entities from the Siemplify ThreatFuse platform. It allows analysts to discover
    connected infrastructure by exploring relationships across various threat intelligence
    categories such as Malware, Campaigns, Threat Actors, and Vulnerabilities. This
    action is primarily used for infrastructure pivoting and expanding the scope of
    an investigation based on known indicators.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Confidence Threshold | Integer | Yes | Specifies the minimum confidence level
    (0-100) required for a related IP to be included in the results. |

    | Search Observables | Boolean | Yes | If enabled, the action searches for IPs
    related to observables. |

    | Search Threat Bulletins | Boolean | Yes | If enabled, the action searches for
    IPs related to threat bulletins. |

    | Search Actors | Boolean | Yes | If enabled, the action searches for IPs related
    to threat actors. |

    | Search Attack Patterns | Boolean | Yes | If enabled, the action searches for
    IPs related to attack patterns. |

    | Search Campaigns | Boolean | Yes | If enabled, the action searches for IPs related
    to campaigns. |

    | Search Courses Of Action | Boolean | Yes | If enabled, the action searches for
    IPs related to courses of action. |

    | Search Identities | Boolean | Yes | If enabled, the action searches for IPs
    related to identities. |

    | Search Incidents | Boolean | Yes | If enabled, the action searches for IPs related
    to incidents. |

    | Search Infrastructures | Boolean | Yes | If enabled, the action searches for
    IPs related to infrastructures. |

    | Search Intrusion Sets | Boolean | Yes | If enabled, the action searches for
    IPs related to intrusion sets. |

    | Search Malware | Boolean | Yes | If enabled, the action searches for IPs related
    to malware. |

    | Search Signatures | Boolean | Yes | If enabled, the action searches for IPs
    related to signatures. |

    | Search Tools | Boolean | Yes | If enabled, the action searches for IPs related
    to tools. |

    | Search TTPs | Boolean | Yes | If enabled, the action searches for IPs related
    to TTPs. |

    | Search Vulnerabilities | Boolean | Yes | If enabled, the action searches for
    IPs related to vulnerabilities. |

    | Max IPs To Return | Integer | No | The maximum number of unique IP addresses
    to return in the result (Default: 50). |


    ### Additional Notes

    - The action supports the following entity types: **FileHash**, **Address (IP)**,
    **DestinationURL**, **UserUniqName (Email)**, **ThreatActor**, and **CVEID**.

    - For User entities, the identifier must match a standard email regex to be processed.

    - The action performs a multi-stage lookup: first identifying the indicator in
    ThreatFuse, then finding its associations, and finally extracting IP-type indicators
    from those associations.


    ### Flow Description

    1. **Initialization**: Extracts configuration and action parameters, validating
    that the confidence threshold is within the 0-100 range.

    2. **Entity Filtering**: Iterates through target entities and filters for supported
    types (Hash, IP, URL, User, Actor, CVE). It also excludes identifiers containing
    spaces.

    3. **Association Mapping**: Determines which association types (e.g., Malware,
    Campaigns) to query based on the boolean toggle parameters.

    4. **Standard Entity Processing**: For IP, Hash, URL, and User entities, the action
    retrieves their internal indicator IDs from ThreatFuse and then queries for related
    associations of the enabled types.

    5. **Threat Model Processing**: For Actor and CVE entities, it performs a direct
    search for the threat model association by name.

    6. **IP Extraction**: For every discovered association, the action fetches linked
    indicators of type 'IP' that meet the specified confidence threshold.

    7. **Aggregation**: Collects unique IP addresses up to the `Max IPs To Return`
    limit and attaches them to the action's JSON result.
