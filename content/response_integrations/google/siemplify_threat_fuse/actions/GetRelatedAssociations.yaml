name: Get Related Associations
description: 'Retrieve entity related associations from Siemplify ThreatFuse. Configure
    the parameters below: choose the association types to return, specify Max Associations
    To Return. You can also choose to add retrieved associations as entities to the
    case.'
integration_identifier: SiemplifyThreatFuse
parameters:
-   name: Return Campaigns
    default_value: 'True'
    type: boolean
    description: If enabled, action will fetch related campaigns and details about
        them.
    is_mandatory: false
-   name: Return Threat Bulletins
    default_value: 'False'
    type: boolean
    description: If enabled, action will fetch related threat bulletins and details
        about them.
    is_mandatory: false
-   name: Return Actors
    default_value: 'False'
    type: boolean
    description: If enabled, action will fetch related actors and details about them.
    is_mandatory: false
-   name: Return Attack Patterns
    default_value: 'False'
    type: boolean
    description: If enabled, action will fetch related attack patterns and details
        about them.
    is_mandatory: false
-   name: Return Courses Of Action
    default_value: 'False'
    type: boolean
    description: If enabled, action will fetch related courses of action and details
        about them.
    is_mandatory: false
-   name: Return Identities
    default_value: 'False'
    type: boolean
    description: If enabled, action will fetch related identities and details about
        them.
    is_mandatory: false
-   name: Return Incidents
    default_value: 'False'
    type: boolean
    description: If enabled, action will fetch related incidents and details about
        them.
    is_mandatory: false
-   name: Return Infrastructure
    default_value: 'False'
    type: boolean
    description: If enabled, action will fetch related infrastructure and details
        about them.
    is_mandatory: false
-   name: Return Intrusion Sets
    default_value: 'False'
    type: boolean
    description: If enabled, action will fetch related intrusion sets and details
        about them.
    is_mandatory: false
-   name: Return Malware
    default_value: 'False'
    type: boolean
    description: If enabled, action will fetch related malware and details about them.
    is_mandatory: false
-   name: Return Signatures
    default_value: 'False'
    type: boolean
    description: If enabled, action will fetch related signatures and details about
        them.
    is_mandatory: false
-   name: Return Tools
    default_value: 'False'
    type: boolean
    description: If enabled, action will fetch related tools and details about them.
    is_mandatory: false
-   name: Return TTPs
    default_value: 'False'
    type: boolean
    description: If enabled, action will fetch related TTPs and details about them.
    is_mandatory: false
-   name: Return Vulnerabilities
    default_value: 'True'
    type: boolean
    description: If enabled, action will fetch related vulnerabilities and details
        about them.
    is_mandatory: false
-   name: Create Campaign Entity
    default_value: 'False'
    type: boolean
    description: If enabled, action will create an entity out of available “Campaign”
        associations.
    is_mandatory: false
-   name: Create Actors Entity
    default_value: 'False'
    type: boolean
    description: If enabled, action will create an entity out of available “Actor”
        associations.
    is_mandatory: false
-   name: Create Signature Entity
    default_value: 'False'
    type: boolean
    description: If enabled, action will create an entity out of available “Signature”
        associations.
    is_mandatory: false
-   name: Create Vulnerability Entity
    default_value: 'False'
    type: boolean
    description: If enabled, action will create an entity out of available “Vulnerability”
        associations.
    is_mandatory: false
-   name: Create Case Tag
    default_value: 'True'
    type: boolean
    description: If enabled, action will create case tags based on the results.
    is_mandatory: false
-   name: Create Insight
    default_value: 'True'
    type: boolean
    description: If enabled, action will create an insight base on the results.
    is_mandatory: false
-   name: Max Associations To Return
    default_value: '5'
    type: string
    description: 'Specify how many associations to return per type. Default: 5'
    is_mandatory: false
-   name: Max Statistics To Return
    default_value: '3'
    type: string
    description: 'Specify how many top statistics results regarding IOCs to return.
        Note: action will at max process 1000 IOCs related to the association. If
        you provide "0", action will not try to fetch statistics information.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_related_associations_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
is_async: true
simulation_data_json: '{"Entities": ["FILEHASH", "ADDRESS", "DestinationURL", "USERUNIQNAME"]}'
