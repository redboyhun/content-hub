name: Submit Observables
description: 'Submit an observable to Siemplify ThreatFuse based on IP, URL, Hash
    or User entities with Email regexes from Siemplify ThreatFuse. Note: requires
    ''Org admin'', ''Create Anomali Community Intel'' and ''Approve Intel'' permissions.'
integration_identifier: SiemplifyThreatFuse
parameters:
-   name: Classification
    default_value: Private
    type: ddl
    optional_values:
    - Public
    - Private
    description: Specify the classification of the observable.
    is_mandatory: true
-   name: Threat Type
    default_value: APT
    type: ddl
    optional_values:
    - APT
    - Adware
    - Anomalous
    - Anomyzation
    - Bot
    - Brute
    - C2
    - Compromised
    - Crypto
    - Data Leakage
    - DDOS
    - Dynamic DNS
    - Exfil
    - Exploit
    - Fraud
    - Hacking Tool
    - I2P
    - Informational
    - Malware
    - P2P
    - Parked
    - Phish
    - Scan
    - Sinkhole
    - Social
    - Spam
    - Suppress
    - Suspicious
    - TOR
    - VPS
    description: Specify the threat type of the observables.
    is_mandatory: true
-   name: Source
    default_value: Siemplify
    type: string
    description: Specify the intelligence source for the observable.
    is_mandatory: false
-   name: Expiration Date
    default_value: ''
    type: string
    description: Specify the expiration date in days for the observable. If nothing
        is specified here, action will create an observable that will never expire.
    is_mandatory: false
-   name: Trusted Circle IDs
    default_value: ''
    type: string
    description: Specify the comma-separated list of trusted circle ids. Observables
        will be shared with those trusted circles.
    is_mandatory: false
-   name: TLP
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Red
    - Green
    - Amber
    - White
    description: Specify the TLP for your observables.
    is_mandatory: false
-   name: Confidence
    default_value: ''
    type: string
    description: 'Specify what should be the confidence for the observable. Note:
        this parameter will only work, if you create observables in your organization
        and requires ''Override System Confidence'' to be enabled.'
    is_mandatory: false
-   name: Override System Confidence
    default_value: 'False'
    type: boolean
    description: 'If enabled, created observables will have the confidence specified
        in the ''Confidence'' parameter. Note: you can''t share observables in trusted
        circles and publicly, when this parameter is enabled.'
    is_mandatory: false
-   name: Anonymous Submission
    default_value: 'False'
    type: boolean
    description: If enabled, action will make an anonymous submission.
    is_mandatory: false
-   name: Tags
    default_value: ''
    type: string
    description: Specify a comma-separated list of tags that you want to add to observable.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/submit_observables_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["FILEHASH", "ADDRESS", "DestinationURL", "USERUNIQNAME"]}'
