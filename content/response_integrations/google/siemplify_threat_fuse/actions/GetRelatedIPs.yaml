name: Get Related IPs
description: 'Retrieve entity related IP addresses based on the associations in Siemplify
    ThreatFuse. Supported entities: Hash, URL, IP Address, Email Address (user entity
    that matches email regex), Threat Actor, CVE.'
integration_identifier: SiemplifyThreatFuse
parameters:
-   name: Confidence Threshold
    default_value: ''
    type: string
    description: 'Specify what should be the confidence threshold. Note: Maximum is
        100.'
    is_mandatory: true
-   name: Search Observables
    default_value: 'True'
    type: boolean
    description: If enabled, action will search among observables.
    is_mandatory: true
-   name: Search Threat Bulletins
    default_value: 'True'
    type: boolean
    description: If enabled, action will search among threat bulletins.
    is_mandatory: true
-   name: Search Actors
    default_value: 'True'
    type: boolean
    description: If enabled, action will search among actors.
    is_mandatory: true
-   name: Search Attack Patterns
    default_value: 'True'
    type: boolean
    description: If enabled, action will search among attack patterns.
    is_mandatory: true
-   name: Search Campaigns
    default_value: 'True'
    type: boolean
    description: If enabled, action will search among campaigns.
    is_mandatory: true
-   name: Search Courses Of Action
    default_value: 'True'
    type: boolean
    description: If enabled, action will search among courses of action.
    is_mandatory: true
-   name: Search Identities
    default_value: 'True'
    type: boolean
    description: If enabled, action will search among identities.
    is_mandatory: true
-   name: Search Incidents
    default_value: 'True'
    type: boolean
    description: If enabled, action will search among incidents.
    is_mandatory: true
-   name: Search Infrastructures
    default_value: 'True'
    type: boolean
    description: If enabled, action will search among infrastructures.
    is_mandatory: true
-   name: Search Intrusion Sets
    default_value: 'True'
    type: boolean
    description: If enabled, action will search among intrusion sets.
    is_mandatory: true
-   name: Search Malware
    default_value: 'True'
    type: boolean
    description: If enabled, action will search among malware.
    is_mandatory: true
-   name: Search Signatures
    default_value: 'True'
    type: boolean
    description: If enabled, action will search among signatures.
    is_mandatory: true
-   name: Search Tools
    default_value: 'True'
    type: boolean
    description: If enabled, action will search among tools.
    is_mandatory: true
-   name: Search TTPs
    default_value: 'True'
    type: boolean
    description: If enabled, action will search among TTPs.
    is_mandatory: true
-   name: Search Vulnerabilities
    default_value: 'True'
    type: boolean
    description: If enabled, action will search among vulnerabilities.
    is_mandatory: true
-   name: Max IPs To Return
    default_value: '50'
    type: string
    description: 'Specify how many IPs to return. Default: 50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_related_i_ps_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["FILEHASH", "ADDRESS", "DestinationURL", "USERUNIQNAME",
    "THREATACTOR", "CVE"]}'
