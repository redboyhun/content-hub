name: Siemplify ThreatFuse - Observables Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: type
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: 300
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: API Root
    default_value: https://api.threatstream.com
    type: string
    description: API root of the Siemplify ThreatFuse instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Email Address
    default_value: ''
    type: string
    description: Email address of the Siemplify ThreatFuse account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Key
    default_value: ''
    type: password
    description: API Key of the Siemplify ThreatFuse account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Lowest Severity To Fetch
    default_value: High
    type: string
    description: 'Lowest severity that will be used to fetch observables. Possible
        values: Low, Medium, High, Very-High'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Lowest Confidence To Fetch
    default_value: 50
    type: integer
    description: Lowest confidence that will be used to fetch observables. Maximum
        is 100.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Source Feed Filter
    default_value: ''
    type: string
    description: 'Comma-separated list of feed ids that should be used to ingest observables.
        Example: 515,4129'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Observable Type Filter
    default_value: url, domain, email, hash, ip, ipv6
    type: string
    description: 'Comma-separated list of observable types that should be  ingested.
        Example: url, domain. Possible values: url, domain, email, hash, ip, ipv6'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Observable Status Filter
    default_value: active
    type: string
    description: 'Comma-separated list of observable status that should be used to
        ingest new data. Example: active, inactive. Possible values: active, inactive,
        falsepos'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Threat Type Filter
    default_value: ''
    type: string
    description: 'Comma-separated list of threat types that should be used to ingest
        observables. Example: аdware, anomalous, anonymization, apt. Possible values:
        аdware, anomalous, anonymization, apt,bot,brute, c2,compromised, crypto,data_leakage,
        ddos, dyn_dns, exfil, exploit, fraud, hack_tool, i2p, informational, malware,
        p2p, parked, phish, scan, sinkhole, spam, suppress, suspicious, tor, vps'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Trusted Circle Filter
    default_value: ''
    type: string
    description: 'Comma-separated list of trusted circle ids that should be used to
        ingest observables. Example: 146,147'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Tag Name Filter
    default_value: ''
    type: string
    description: 'Comma-separated list of tag names associated with observables that
        should be used with ingestion. Example: Microsoft Credentials, Phishing'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Source Feed Grouping
    default_value: false
    type: boolean
    description: If enabled, the connector will group observables from the same source
        under the same Siemplify Alert.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Fetch Max Days Backwards
    default_value: 1
    type: integer
    description: Number of days before the first connector iteration to retrieve findings
        from. This parameter applies to the initial connector iteration after you
        enable the connector for the first time, or used as a fallback value in cases
        where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Observables Per Alert
    default_value: 100
    type: integer
    description: How many observables should be a part of one Siemplify Alert. Maximum
        is 200.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Siemplify ThreatFuse server is valid.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
description: 'Pull observables from Siemplify ThreatFuse. Note: Source names are used
    in the whitelist.'
integration: SiemplifyThreatFuse
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/siemplify-threatfuse
rules: []
is_connector_rules_supported: false
creator: admin
