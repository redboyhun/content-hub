Get URL Data:
  ai_description: '### General Description

    The **Get URL Data** action performs an HTTP GET request against provided URL
    entities. It is designed to retrieve the raw response body (HTML/Data) and the
    sequence of redirects encountered during the request. This is useful for analyzing
    the content of a suspicious URL or verifying the final destination of a shortened
    link.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Username** | String | No | The username used for basic authentication if the
    target URL requires it. |

    | **Password** | Password | No | The password used for basic authentication if
    the target URL requires it. |

    | **SSL Verification** | Boolean | No | If set to True, the action will verify
    the SSL certificate of the destination server. Default is False. |


    ### Flow Description

    1. **Initialization**: The action retrieves the authentication credentials and
    SSL verification preference from the configuration.

    2. **Entity Filtering**: It iterates through the target entities, specifically
    looking for those of type URL.

    3. **URL Normalization**: For each URL, it checks for a protocol scheme (e.g.,
    http://). If missing, it prepends http:// to ensure a valid request.

    4. **Request Execution**: It sends an HTTP GET request to the URL. If credentials
    are provided, it uses Basic Authentication.

    5. **Data Extraction**: Upon a successful response, it captures the response text
    and the list of URLs in the redirect history.

    6. **Result Reporting**: The collected data is formatted into a JSON result and
    associated with the entity.


    ### Additional Notes

    - The action includes a timeout check to ensure it respects the execution deadline.

    - If a URL fails to process (e.g., connection error or 404), the error is logged,
    and the entity is marked as failed in the final output message.'
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
