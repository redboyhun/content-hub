Post Data:
  ai_description: '### General Description

    Sends an HTTP POST request to a specified URL. This action is designed for generic
    integration with external web services and APIs, allowing users to submit data
    payloads and receive responses within the Google SecOps environment.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | URL | String | Yes | The destination endpoint for the HTTP POST request. |

    | Data | String | Yes | The payload to be sent in the request body. |

    | Username | String | No | The username for Basic Authentication. |

    | Password | Password | No | The password for Basic Authentication. |

    | SSL Verification | Boolean | No | If true, the action verifies the SSL certificate
    of the destination server. Defaults to False. |

    | Headers JSON | String | No | A JSON-formatted string containing custom HTTP
    headers to be included in the request. |

    | Content Type | Dropdown | No | Specifies the ''Content-Type'' header. If set
    to ''application/json'', the ''Data'' parameter is parsed as a JSON object. |


    ### Flow Description

    1. **Initialization:** The action extracts all input parameters, including the
    URL, payload, and authentication details.

    2. **Header Configuration:** It parses the ''Headers JSON'' parameter and appends
    the specified ''Content Type'' to the request headers.

    3. **Payload Preparation:** If the ''Content Type'' is ''application/json'', the
    action attempts to parse the ''Data'' string into a JSON object. Otherwise, the
    data is encoded as a UTF-8 string.

    4. **Request Execution:** An HTTP POST request is dispatched to the target URL
    using the provided authentication and SSL settings.

    5. **Response Processing:** The action captures the response status, body (attempting
    to parse it as JSON), and any redirection history.

    6. **Completion:** The response data is attached as a JSON result, and the raw
    response text is provided as the action''s output message.


    ### Additional Notes

    - If ''Content Type'' is set to ''application/json'' but the ''Data'' provided
    is not valid JSON, the action logs an error and falls back to sending the data
    as a raw string.'
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
