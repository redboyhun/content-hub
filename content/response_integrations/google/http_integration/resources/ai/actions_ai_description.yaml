Get Data:
  ai_description: '### General Description

    This action sends an HTTP GET request to a specified URL to retrieve data. It
    is a utility action designed for flexible data retrieval from external web services
    or APIs within a playbook flow. It supports basic authentication, custom headers,
    and SSL verification settings.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | URL | String | Yes | The destination URL to which the GET request will be sent.
    |

    | Username | String | No | The username to be used for basic authentication. |

    | Password | String | No | The password to be used for basic authentication. |

    | SSL Verification | Boolean | No | If set to true, the action will verify the
    SSL certificate of the destination server. Default is false. |

    | Ignore HTTP Error Codes | Boolean | No | If enabled, the action will treat 4xx
    and 5xx HTTP response codes as successful executions rather than failing the action.
    |

    | Headers JSON | String | No | A JSON-formatted string representing the HTTP headers
    to be included in the request (e.g., `{"Content-Type": "application/json"}`).
    |


    ### Additional Notes

    - The action attempts to parse the response body as JSON. If JSON parsing fails,
    it returns the raw text of the response.

    - Redirect history is captured and returned in the results.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the URL, authentication credentials,
    SSL settings, and custom headers from the input parameters.

    2. **Header Parsing:** If a Headers JSON string is provided, it is parsed into
    a Python dictionary.

    3. **Request Construction:** An HTTP GET request is constructed using the `requests`
    library, incorporating the URL, headers, and basic authentication if provided.

    4. **Execution:** The request is executed. The action respects the `SSL Verification`
    setting.

    5. **Error Handling:** If the response returns an error code (4xx/5xx), the action
    will fail unless `Ignore HTTP Error Codes` is set to true.

    6. **Result Processing:** The action captures the response status code, the response
    body (as JSON or text), and any URL redirects encountered.

    7. **Output:** The gathered data is returned as a JSON result and the raw response
    text is set as the action''s output message.'
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
