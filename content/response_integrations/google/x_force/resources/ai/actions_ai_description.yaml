Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the IBM X-Force Exchange API. It ensures that the provided credentials
    (API Key and API Password) are valid and that the network path to the X-Force
    service is open.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Address | String | Yes | The base URL for the IBM X-Force API (e.g., https://api.xforce.ibmcloud.com).
    |

    | Api Key | String | Yes | The API Key used for Basic Authentication. |

    | Api Password | String | Yes | The API Password used for Basic Authentication.
    |

    | Verify SSL | Boolean | Yes | If set to true, the action will verify the SSL
    certificate of the X-Force API endpoint. |


    ### Additional Notes

    - This action does not process any entities from the case.

    - It uses a hardcoded IP address (8.8.8.8) to perform a test reputation lookup
    to confirm the API is responding correctly.

    - As per standard SOAR practices, Ping actions are excluded from being categorized
    as enrichment actions.


    ### Flow Description

    1. **Configuration Retrieval:** The action retrieves the integration configuration,
    including the API endpoint, credentials, and SSL verification settings.

    2. **Manager Initialization:** An instance of the `XForceManager` is created,
    which prepares the Basic Authentication header using the encoded Key and Password.

    3. **Connectivity Test:** The action calls the `test_connectivity` method, which
    executes a GET request to the IP reputation endpoint for the address '8.8.8.8'.

    4. **Response Validation:** The manager validates the HTTP response. If a 403
    (Access Denied) or 404 (Not Found) error occurs, specific exceptions are raised.

    5. **Final Result:** If the request is successful, the action returns a 'Connected
    Successfully' message and a boolean `True` value.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
