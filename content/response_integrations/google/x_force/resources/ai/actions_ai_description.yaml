Get IP Info:
  ai_description: "### General Description\nEnriches IP Address entities using IBM\
    \ X-Force Exchange threat intelligence. This action retrieves reputation scores,\
    \ geographic location, and category classifications for external IP addresses.\
    \ It helps security analysts determine the risk level of network traffic by providing\
    \ historical context and real-time reputation data.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Threshold | Integer | No | The risk score threshold (0-10). If the retrieved\
    \ risk score exceeds this value, the entity is marked as suspicious and an insight\
    \ is created. Defaults to 1 if not provided. |\n\n### Additional Notes\n- This\
    \ action only processes entities of type **ADDRESS**.\n- Internal IP addresses\
    \ (marked as `is_internal`) are automatically skipped to avoid unnecessary API\
    \ calls and false positives.\n\n### Flow Description\n1. **Filter Entities:**\
    \ The action identifies all `ADDRESS` entities in the current context that are\
    \ not marked as internal.\n2. **API Query:** For each valid entity, it queries\
    \ the IBM X-Force API to retrieve the IP reputation report.\n3. **Data Enrichment:**\
    \ It updates the entity's additional properties with the risk score, country,\
    \ and categories.\n4. **Table Generation:** \n    - Creates a detailed history\
    \ table for each entity showing past reputation changes.\n    - Creates a global\
    \ summary table for the action result showing all processed IPs and their scores.\n\
    5. **Risk Assessment:** Compares the retrieved risk score against the configured\
    \ `Threshold`.\n6. **Internal Mutation:** If the score exceeds the threshold,\
    \ the entity is marked as `suspicious` and a Case Insight is generated with the\
    \ risk details.\n7. **Final Update:** Updates all enriched entities within the\
    \ Google SecOps platform."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with enrichment data (score, country, categories),
      marks entities as suspicious based on risk thresholds, and creates entity insights.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
