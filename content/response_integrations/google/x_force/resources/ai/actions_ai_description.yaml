Get IP Malware:
  ai_description: "### General Description\nThis action queries IBM X-Force to retrieve\
    \ malware associated with specific IP address entities. It is designed to identify\
    \ if an IP has been linked to known malware families, command-and-control (CnC)\
    \ activity, or other malicious behaviors. The action enriches the entity with\
    \ malware counts, provides detailed data tables of associated malware, and marks\
    \ entities as suspicious if threats are found.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Address | String | Yes | The base URL for the IBM X-Force API (e.g., https://api.xforce.ibmcloud.com).\
    \ |\n| Api Key | String | Yes | The API Key used for authentication with IBM X-Force.\
    \ |\n| Api Password | String | Yes | The API Password/Secret used for authentication\
    \ with IBM X-Force. |\n| Verify SSL | Boolean | No | If enabled, the action will\
    \ verify the SSL certificate of the X-Force API endpoint. Default is False. |\n\
    \n### Additional Notes\n- This action only processes entities of type **ADDRESS**\
    \ that are marked as **external** (is_internal = False).\n- If an IP is associated\
    \ with one or more malware entries, the action automatically sets the entity's\
    \ `is_suspicious` flag to `True`.\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the X-Force manager using the provided API credentials\
    \ and connection settings.\n2. **Entity Filtering**: It iterates through the target\
    \ entities in the case, selecting only external IP addresses.\n3. **Data Retrieval**:\
    \ For each valid IP, it performs a GET request to the X-Force 'ipr/malware' endpoint\
    \ to fetch associated malware reports.\n4. **Enrichment & Reporting**: \n    -\
    \ If malware is found, it constructs a detailed CSV table containing MD5 hashes,\
    \ malware families, and first/last seen timestamps.\n    - It updates the entity's\
    \ additional properties with the total malware count.\n    - It marks the entity\
    \ as 'enriched'.\n5. **Threat Identification**: If the malware count is greater\
    \ than zero, the action marks the entity as suspicious and generates a Case Insight\
    \ summarizing the findings.\n6. **Finalization**: The action updates all enriched\
    \ entities in the Google SecOps platform and returns a summary message of the\
    \ results."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity attributes (additional_properties), sets the 'is_suspicious'
      and 'is_enriched' flags, adds entity insights, and attaches data tables to entities
      within the case.
  categories:
    enrichment: true
  entity_usage:
