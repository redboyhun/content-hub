Get Hash Info:
  ai_description: "### General Description\nEnriches File Hash entities using IBM\
    \ X-Force threat intelligence. This action retrieves malware reports, including\
    \ risk scores, malware family associations, and creation dates. It updates the\
    \ entity's attributes within Google SecOps and can automatically mark entities\
    \ as suspicious based on a configurable risk threshold.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Threshold | String | No | The risk level threshold used to determine if an entity\
    \ should be marked as suspicious. Possible values are 'low', 'medium', or 'high'.\
    \ Defaults to 'low'. If the retrieved risk score exceeds this threshold, the entity\
    \ is marked as suspicious and an insight is created. |\n\n### Additional Notes\n\
    - The action supports MD5, SHA1, and SHA256 hash formats as supported by the IBM\
    \ X-Force API.\n- If an entity is not found in the X-Force database, it will be\
    \ skipped and noted in the final output message.\n\n### Flow Description\n1. **Initialization**:\
    \ Connects to the IBM X-Force API using provided credentials and retrieves the\
    \ user-defined risk threshold.\n2. **Entity Filtering**: Iterates through the\
    \ target entities and selects only those of type `FILEHASH`.\n3. **Data Retrieval**:\
    \ For each hash, it queries the IBM X-Force malware endpoint to fetch the reputation\
    \ report.\n4. **Data Processing**: Extracts the risk score, malware families,\
    \ and creation date from the API response.\n5. **Internal Enrichment**: \n   \
    \ - Updates the entity's additional properties with `IBM_XForce_Risk` and `IBM_XForce_Families`.\n\
    \    - Attaches the full raw JSON report to the entity.\n    - Sets the entity's\
    \ `is_enriched` status to true.\n6. **Risk Assessment**: Compares the entity's\
    \ risk score against the configured threshold. If the score is higher, the entity\
    \ is marked as suspicious and a Case Insight is generated.\n7. **Reporting**:\
    \ Generates a summary data table (CSV) containing the hash, risk level, and family\
    \ info for all processed entities.\n8. **Finalization**: Updates all modified\
    \ entities in the case and returns a summary message."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with risk scores and malware family information, marks
      entities as suspicious based on a threshold, and creates entity insights.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Get IP By Category:
  ai_description: >-
    ### General Description

    The **Get IP By Category** action retrieves a list of IP addresses from IBM X-Force
    that are associated with a specific threat category. This action is designed to
    gather bulk intelligence on known malicious or suspicious infrastructure, such
    as botnets, malware hosts, or anonymization services, which can then be used for
    investigation or blocklist generation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Category** | String | Yes | The threat category to query. Supported categories
    include: `Spam`, `Anonymisation Services`, `Scanning IPs`, `Dynamic IPs`, `Malware`,
    `Bots`, and `Botnet Command and Control Server`. |


    ### Flow Description

    1. **Initialization**: The action initializes the XForceManager using the integration's
    configuration (API Key, Password, and Address).

    2. **Data Retrieval**: It executes a GET request to the IBM X-Force API, passing
    the user-specified `Category` as a filter.

    3. **Data Processing**: The action parses the response to extract a list of IP
    addresses and their associated metadata (e.g., score, creation date).

    4. **Output Generation**:
        *   **Data Table**: A CSV-formatted table of the retrieved IPs is added to
    the case wall.
        *   **JSON Result**: The raw list of IPs is returned as a JSON object for
    use in subsequent playbook steps.
        *   **Status**: The action ends with a success message and a boolean result
    indicating whether IPs were found.

    ### Additional Notes

    * This action does not process or filter existing entities within the Google SecOps
    case; it is a standalone query based on the input parameter.

    * If no IPs are found for the specified category, the action will return a 'false'
    result value.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
