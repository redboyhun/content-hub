    filters_by_is_internal: true
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Get Url Info:
  ai_description: "### General Description\nThe **Get Url Info** action enriches URL\
    \ entities by querying the IBM X-Force Exchange threat intelligence platform.\
    \ It retrieves reputation data, including a risk score and associated categories\
    \ (e.g., Botnet, Malware), to help analysts assess the threat level of specific\
    \ URLs within a case.\n\n### Parameters Description\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| Threshold | Integer | No |\
    \ Defines the risk score limit (default is 1). If the URL's risk score retrieved\
    \ from X-Force exceeds this value, the entity is marked as suspicious in Google\
    \ SecOps and an insight is generated. |\n\n### Additional Notes\n- The action\
    \ specifically targets entities of type `DestinationURL`.\n- It uses a Basic Authentication\
    \ scheme (API Key and Password) configured in the integration settings to communicate\
    \ with the IBM X-Force API.\n\n### Flow Description\n1. **Initialization**: The\
    \ action initializes the X-Force manager using the provided integration credentials\
    \ and retrieves the `Threshold` parameter.\n2. **Entity Filtering**: It iterates\
    \ through the target entities in the current context, filtering for those identified\
    \ as URLs.\n3. **Data Retrieval**: For each URL, it performs a GET request to\
    \ the IBM X-Force API to fetch the URL's reputation report.\n4. **Enrichment**:\
    \ \n    - The action extracts the risk score and category descriptions.\n    -\
    \ It updates the entity's additional properties with `IBM_XForce_Score` and `IBM_XForce_Categories`.\n\
    \    - It marks the entity as enriched (`is_enriched = True`).\n5. **Risk Assessment**:\
    \ If the retrieved risk score is higher than the configured `Threshold`, the action\
    \ marks the entity as suspicious (`is_suspicious = True`) and adds a detailed\
    \ entity insight to the case.\n6. **Reporting**: It generates a data table named\
    \ \"Report\" containing the URL, Score, and Categories for all processed entities\
    \ and attaches the raw JSON response to each entity for further inspection.\n\
    7. **Finalization**: The action updates all enriched entities in the Google SecOps\
    \ platform and returns a summary message."
