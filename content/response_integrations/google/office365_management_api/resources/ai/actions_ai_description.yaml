Stop Subscription:
  ai_description: >-
    ### General Description

    Stops a subscription to a specific Office 365 Management API content type. This
    action is used to halt the flow of notifications and content retrieval for specific
    audit or DLP logs from the Microsoft environment. Note that once a subscription
    is stopped, you will no longer receive notifications, and content generated during
    the inactive period cannot be retrieved even if the subscription is later restarted.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Stop a Subscription for | String | Yes | Specifies the content type for which
    to stop the subscription. Common values include `DLP.All` and `Audit.General`.
    |


    ### Flow Description

    1. **Authentication**: The action initializes the Office 365 Management API manager,
    authenticating via Azure Active Directory using either a Client Secret or a Certificate.

    2. **Parameter Extraction**: It retrieves the target content type (e.g., DLP or
    Audit logs) from the action configuration.

    3. **API Execution**: It sends a POST request to the Microsoft Management API
    endpoint specifically designed to stop activity feed subscriptions for the chosen
    content type.

    4. **Outcome Reporting**: The action validates the API response and reports whether
    the subscription was successfully stopped or if an error occurred.


    ### Additional Notes

    This action does not process entities and operates at the integration/tenant level
    to modify subscription states.
