Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the Office 365 Management API. It ensures that the provided credentials and
    configuration parameters are valid and that the environment can successfully communicate
    with the Microsoft identity platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Root | String | Yes | The base URL for the Office 365 Management API. |

    | Azure Active Directory ID | String | Yes | The Tenant ID of the Azure AD instance.
    |

    | Client ID | String | Yes | The Application (client) ID registered in Azure AD.
    |

    | Client Secret | String | No | The client secret for authentication. Required
    if Certificate Path is not provided. |

    | Certificate Path | String | No | Local path to the .pfx certificate file. Required
    if Client Secret is not provided. |

    | Certificate Password | String | No | Password for the certificate file. |

    | OAUTH2 Login Endpoint Url | String | Yes | The URL used for OAuth2 authentication
    (e.g., `https://login.microsoftonline.com`). |

    | Verify SSL | Boolean | Yes | Whether to verify the SSL certificate of the API
    endpoint. |


    ### Additional Notes

    Either the **Client Secret** or the **Certificate Path** must be provided for
    the authentication to succeed. If both are missing, the action will raise an exception
    during initialization.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves all configuration settings from the integration's
    settings, including authentication details and endpoint URLs.

    2. **Manager Initialization**: Creates an instance of the `Office365ManagementAPIManager`,
    which triggers the authentication logic.

    3. **Authentication Attempt**: The manager attempts to generate an OAuth2 access
    token by making a POST request to the Microsoft identity platform using either
    the Client Secret or the provided Certificate (JWT-based assertion).

    4. **Connectivity Validation**: If a token is successfully retrieved and the response
    is validated, the action confirms connectivity.

    5. **Result Reporting**: Returns a success message if authentication works, or
    an error message detailing the failure if an exception occurs.
