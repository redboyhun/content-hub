Start Subscription:
  ai_description: >-
    ### General Description

    Starts a subscription to a chosen Office 365 Management API content type. This
    action is a prerequisite for collecting activity logs from the Office 365 environment,
    such as Data Loss Prevention (DLP) events or general audit logs. By initiating
    a subscription, the Office 365 Management API begins to aggregate and make available
    the activity data for the specified content type.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Start a Subscription for | String (Dropdown) | Yes | Specifies the Office 365
    content type to subscribe to. Available options typically include `DLP.All` and
    `Audit.General`. |


    ### Flow Description

    1. **Authentication**: The action initializes the connection using the provided
    Azure Active Directory credentials, supporting both Client Secret and Certificate-based
    authentication.

    2. **Token Acquisition**: It requests an OAuth2 access token from the Microsoft
    identity platform for the Office 365 Management API resource.

    3. **Subscription Request**: The action sends a POST request to the Office 365
    Management API's subscription start endpoint, targeting the specific content type
    selected in the parameters.

    4. **Execution Result**: The action validates the API response and reports whether
    the subscription was successfully created or if an error occurred during the process.


    ### Additional Notes

    - This action does not operate on entities and is used for system-level configuration.

    - For successful execution, the integration must be configured with either a valid
    Client Secret or a Certificate Path/Password.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a subscription for activity feeds in the Office 365 Management API,
      which changes the logging state for the tenant.
    fetches_data: false
    internal_data_mutation_explanation: null
