name: Office 365 Management API DLP Events Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: Operation
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Api Root
    default_value: https://manage.office.com
    type: string
    description: Api root url to use with integration.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Azure Active Directory ID
    default_value: ''
    type: string
    description: Azure Active Directory Tenant ID, can be viewed in Active Directory
        > App Registration > <Application you configured for your integration> > Directory
        (tenant) ID. Eg, k48f52ca-0000-4708-8ed0-0000a20a40a
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Client ID
    default_value: ''
    type: string
    description: Client (Application) ID that was added for the app registration in
        Azure Active Directory for this integration. Eg, 29bf818e-0000-0000-0000-784fb644178d
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Client Secret
    default_value: ''
    type: password
    description: Secret that was entered for Azure AD app registration. Eg, XF00000Qc0000000[UZSW7-0?qXb6Qx]
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Certificate Path
    default_value: ''
    type: string
    description: If authentication based on certificates is used instead of client
        secret, specify path to the certificate on Siemplify server.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Certificate Password
    default_value: ''
    type: password
    description: Optional, if certificate is password-protected, specify the password
        to open the certificate file.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: OAUTH2 Login Endpoint Url
    default_value: https://login.microsoftonline.com
    type: string
    description: Specify the url connector should use for OAUTH2 Login Endpoint Url
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: Specify whether remote API endpoint SSL certificate should be validated.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Type of Operation Filter
    default_value: ''
    type: string
    description: 'The following operation types are available for DLP events: DlpRuleMatch,
        DlpRuleUndo, DlpInfo. Parameter works as a blacklist. By default if nothing
        is specified in this parameter - ingest all possible operation types. If operation
        type is specified in this parameter - event with this operation type will
        not be ingested. Parameter accepts multiple values as a comma separated string.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Type of Policy Filter
    default_value: ''
    type: string
    description: Parameter can be used to specify policy name that if present in event,
        event will not be ingested. Parameter works as a blacklist. By default if
        nothing is specified - ingest all possible policy types. Parameter accepts
        multiple values as a comma separated string.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Mask findings?
    default_value: false
    type: boolean
    description: Specify whether the connector should mask sensitive findings that
        triggered DLP policies hits.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max events to fetch
    default_value: 50
    type: integer
    description: How many events to process per one connector iteration.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Fetch Max Hours Backwards
    default_value: 8
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        events from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires. Note that O365 Management
        API allows to return events for the last 7 days, not older.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Fetch Backwards Time Interval (minutes)
    default_value: 240
    type: integer
    description: Time interval connector should use to fetch events from max hours
        backwards. If O365 tenant is busy, it could return a lot of event blobs. Because
        of this, this parameter in minutes can be used to split max hours backwards
        on smaller segments and process them individually. Time interval cant be bigger
        than 24 hours in total.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Events Padding Period (minutes)
    default_value: 60
    type: integer
    description: Event Padding Period in minutes specifies a minimum time interval
        that will be used by connector to check new events.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Fetch DLP events from  Office 365 Management API.
integration: Office365ManagementAPI
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/ms-o365
rules: []
is_connector_rules_supported: false
creator: admin
