name: Start Subscription
description: Start a subscription to a chosen Office 365 Management API content type.
integration_identifier: Office365ManagementAPI
parameters:
-   name: Start a Subscription for
    default_value: Select content type
    type: ddl
    optional_values:
    - Select content type
    - DLP.All
    - Audit.General
    description: Specify for which content type to start a subscription.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
