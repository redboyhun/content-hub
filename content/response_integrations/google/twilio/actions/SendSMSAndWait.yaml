name: Send SMS And Wait
description: 'Send SMS and wait for answer. The message will be sent with a generated
    SiemplifyID: <code>. The action will wait for a response containing SiemplifyID:
    <code>.'
integration_identifier: Twilio
parameters:
-   name: Phone Number
    default_value: ''
    type: string
    description: Target phone number.The phone number must include a dial code.
    is_mandatory: true
-   name: Message
    default_value: ''
    type: string
    description: Message content.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
is_async: true
