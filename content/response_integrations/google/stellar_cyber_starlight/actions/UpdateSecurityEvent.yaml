name: Update Security Event
description: Update security event in Stellar Cyber Starlight.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/stellar-cyber-starlight#update_security_event
integration_identifier: StellarCyberStarlight
parameters:
-   name: Index
    default_value: ''
    type: string
    description: Specify the index of the security event.
    is_mandatory: true
-   name: ID
    default_value: ''
    type: string
    description: Specify the ID of the security event.
    is_mandatory: true
-   name: Comment
    default_value: ''
    type: string
    description: Specify a comment for the security event.
    is_mandatory: false
-   name: Status
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - New
    - In Progress
    - Ignored
    - Closed
    description: Specify the new status for the security event.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
