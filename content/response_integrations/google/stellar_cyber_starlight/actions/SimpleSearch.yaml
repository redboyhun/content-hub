name: Simple Search
description: Perform simple search in Stellar Cyber Starlight.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/stellar-cyber-starlight#simple_search
integration_identifier: StellarCyberStarlight
parameters:
-   name: Index
    default_value: ''
    type: string
    description: Specify in which index do you want to search. You can find a list
        of known indexes in the documentation.
    is_mandatory: true
-   name: Query
    default_value: ''
    type: string
    description: Specify query filter for the search.
    is_mandatory: true
-   name: Max Results To Return
    default_value: 50
    type: string
    description: Specify how many results to return in response.
    is_mandatory: false
-   name: Sort Field
    default_value: ''
    type: string
    description: Specify the field, which should be used for sorting.
    is_mandatory: false
-   name: Sort Order
    default_value: Descending
    type: ddl
    optional_values:
    - Ascending
    - Descending
    description: Specify the sort order for the result.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/simple_search_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
