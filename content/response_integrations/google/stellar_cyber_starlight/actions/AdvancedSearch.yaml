name: Advanced Search
description: Perform advanced search in Stellar Cyber Starlight.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/stellar-cyber-starlight#advanced_search
integration_identifier: StellarCyberStarlight
parameters:
-   name: Index
    default_value: ''
    type: string
    description: Specify in which index do you want to search. You can find a list
        of known indexes in the documentation.
    is_mandatory: true
-   name: DSL Query
    default_value: "{\n    \"size\": 1,\n    \"from\": 0,\n    \"query\": {\n    \
        \    \"match_all\": {}\n    },\n    \"sort\": [\n        {\n            \"\
        timestamp\": {\n                \"order\": \"asc\"\n            }\n      \
        \  }\n    ]\n}\n"
    type: string
    description: Specify the json object of the DSL query that you want to execute.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/advanced_search_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
