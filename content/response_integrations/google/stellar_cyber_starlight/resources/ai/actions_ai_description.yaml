Simple Search:
  ai_description: >-
    ### General Description

    Performs a simple search in Stellar Cyber Starlight using a query string against
    a specific index. This action is used to retrieve raw event data or logs based
    on custom search criteria, allowing for flexible data retrieval from the Stellar
    Cyber platform. It returns the search results as a JSON object for further processing
    within the playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Index | String | Yes | The specific index in Stellar Cyber Starlight where the
    search will be performed (e.g., aella-assets-*). |

    | Query | String | Yes | The query string used to filter the search results, supporting
    Lucene-style syntax. |

    | Max Results To Return | Integer | No | The maximum number of search hits to
    return in the response. Default is 50. |

    | Sort Field | String | No | The field name to use for sorting the results. |

    | Sort Order | String | No | The direction of sorting: 'Ascending' or 'Descending'.
    Default is 'Descending'. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API credentials (API Root,
    Username, API Key/Token) from the integration configuration and search parameters
    (Index, Query, Limit, Sort) from the action input.

    2. **Manager Initialization**: Initializes the Stellar Cyber Starlight Manager,
    which handles authentication using either an API Key or a JWT Token generated
    from an API Token.

    3. **Search Execution**: The manager constructs a GET request to the `data/{index}/_search`
    endpoint with a JSON payload containing the query string, size limit, and sorting
    logic.

    4. **Result Processing**: The action parses the JSON response from Stellar Cyber
    into hit objects and adds them to the action's result JSON.

    5. **Completion**: The action concludes by returning a success status and the
    retrieved data to the Google SecOps platform.


    ### Additional Notes

    This action is a utility search tool and does not operate on specific entities
    within a case. Either an 'API Key' or an 'API Token' must be provided in the integration
    configuration for the action to authenticate successfully.
