Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic utility\
    \ designed to verify the connectivity between Google SecOps and the Stellar Cyber\
    \ Starlight platform. Its primary purpose is to ensure that the integration's\
    \ configuration parameters\u2014such as the API Root, Username, and authentication\
    \ credentials (API Key or API Token)\u2014are correctly configured and that the\
    \ remote service is reachable.\n\n### Parameters Description\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| API Root | String\
    \ | Yes | The base URL of the Stellar Cyber Starlight instance. |\n| Username\
    \ | String | Yes | The username used for authentication with the Stellar Cyber\
    \ Starlight account. |\n| API Key | String | No | The API Key for authentication.\
    \ Note: Either an API Key or an API Token must be provided for the action to function.\
    \ |\n| API Token | String | No | The API Token for authentication. Note: Either\
    \ an API Key or an API Token must be provided for the action to function. |\n\
    | Verify SSL | Boolean | Yes | Determines whether to verify the SSL certificate\
    \ of the Stellar Cyber Starlight server. |\n\n### Additional Notes\n- This action\
    \ does not operate on entities and is used strictly for health checks of the integration.\n\
    - The action logic requires that at least one form of credential (API Key or API\
    \ Token) is present in the configuration.\n\n### Flow Description\n1. **Initialization**:\
    \ The action starts by extracting the configuration parameters (API Root, Username,\
    \ API Key, API Token, and SSL verification setting) from the integration settings.\n\
    2. **Manager Setup**: It initializes the `StellarCyberStarlightManager`. If an\
    \ API Token is provided, the manager performs an initial request to generate a\
    \ JWT access token.\n3. **Connectivity Test**: The action calls the `test_connectivity`\
    \ method, which sends a lightweight GET request to the Stellar Cyber Starlight\
    \ search endpoint (`data/*/_search`) with a minimal query payload.\n4. **Validation**:\
    \ The response is validated. If the server returns a successful status code, the\
    \ action completes with a success message. If an authentication error or connection\
    \ failure occurs, it catches the exception and reports the failure."
