Update Security Event:
  ai_description: >-
    Updates a security event in Stellar Cyber Starlight by modifying its status and/or
    adding a comment. This action interacts with the Stellar Cyber API to perform
    state changes on specific events identified by their ID and Index.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Index** | String | Yes | The specific index where the security event is located
    in Stellar Cyber. |

    | **ID** | String | Yes | The unique identifier of the security event to be updated.
    |

    | **Comment** | String | No | A text comment to be added to the security event.
    |

    | **Status** | Enum | Yes | The new status to assign to the event. Options include:
    `New`, `In Progress`, `Ignored`, `Closed`. |


    ### Additional Notes


    * **Validation Logic:** Although the `Status` parameter is mandatory, the action
    requires that either a valid status (other than 'Select One') or a `Comment` be
    provided. If both are missing or the status is left as 'Select One' without a
    comment, the action will fail.


    ### Flow Description


    1. **Initialization:** The action retrieves connection details (API Root, Credentials,
    SSL settings) and action parameters (Index, ID, Comment, Status).

    2. **Validation:** It checks if at least one update field (Status or Comment)
    has been populated.

    3. **API Interaction:** The action initializes the `StellarCyberStarlightManager`
    and calls the `update_security_event` method.

    4. **External Mutation:** A POST request is sent to the `update_ser` endpoint
    of the Stellar Cyber Starlight instance with the event identifiers and the new
    data.

    5. **Completion:** The action returns a success message if the external system
    confirms the update, or an error message if the request fails.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status and/or adds comments to a security event within the Stellar
      Cyber Starlight platform via a POST request to the 'update_ser' endpoint.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
