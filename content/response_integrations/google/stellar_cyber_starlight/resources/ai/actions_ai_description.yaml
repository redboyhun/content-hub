Advanced Search:
  ai_description: >-
    ### General Description

    Performs an advanced search in Stellar Cyber Starlight using Elasticsearch Domain
    Specific Language (DSL). This action allows users to execute complex, customized
    queries against specific indices within the Stellar Cyber platform to retrieve
    detailed event, alert, or asset data.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Index | String | Yes | Specify the Stellar Cyber index to search. Common indices
    include `aella-assets-*` for asset data or `aella-ser-*` for security events.
    |

    | DSL Query | String | Yes | The JSON-formatted Elasticsearch DSL query object.
    This defines the search filters, result size, and sorting logic. |


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the Stellar Cyber
    API using the configured credentials (Username and either API Key or API Token).

    2. **Parameter Extraction**: The action retrieves the target `Index` and the `DSL
    Query` string from the user input.

    3. **Search Execution**: The manager executes a GET request to the Stellar Cyber
    search endpoint (`data/{index}/_search`), passing the DSL query as a JSON payload.

    4. **Result Processing**: The action parses the response from Stellar Cyber, extracting
    the individual search hits.

    5. **Output**: The search results are returned as a JSON array, and the action
    completes with a success status if data is retrieved.


    ### Additional Notes

    - This action does not process specific entities from the Google SecOps case;
    it is a general-purpose search utility.

    - Users must ensure the `DSL Query` is a valid JSON string that conforms to Elasticsearch
    query syntax.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
