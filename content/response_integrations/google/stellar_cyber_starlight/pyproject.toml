[project]
name = "StellarCyberStarlight"
version = "19.0"
description = "Stellar Cyber is the only open, automated detection and response platform that correlates detections from existing solutions as well as its own security applications to deliver comprehensive protection across the cybersecurity kill chain and present them through one intuitive dashboard. Customers can leverage 20 native applications and a growing list of open ecosystem partners to detect and respond automatically to attacks within seconds wherever they occur â€“ on servers, in the network, at endpoints, or in cloud-based applications. Stellar Cyber deploys easily on premises, in public clouds or with service providers."
requires-python = ">=3.11,<3.12"
dependencies = [ "environmentcommon", "requests==2.32.4", "tipcommon",]

[dependency-groups]
dev = [ "pytest>=9.0.3", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-1.0.12-py2.py3-none-any.whl"

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.1-py2.py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"
