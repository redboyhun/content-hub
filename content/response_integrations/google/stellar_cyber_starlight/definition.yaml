identifier: StellarCyberStarlight
name: Stellar Cyber Starlight
parameters:
-   name: API Root
    default_value: https://{ip address}/connect/api/
    type: string
    description: ''
    is_mandatory: true
    integration_identifier: StellarCyberStarlight
-   name: Username
    default_value: ''
    type: string
    description: ''
    is_mandatory: true
    integration_identifier: StellarCyberStarlight
-   name: API Key
    default_value: ''
    type: password
    description: API Key of the Stellar Cyber Starlight account. This parameter was
        used for Basic Authentication. If both “API Key” and “API Token” is provided,
        “API Token” will have priority.
    is_mandatory: false
    integration_identifier: StellarCyberStarlight
-   name: API Token
    default_value: ''
    type: password
    description: API Token of the Stellar Cyber Starlight account. This parameter
        was used for JWT Authentication. If both “API Key” and “API Token” is provided,
        “API Token” will have priority.
    is_mandatory: false
    integration_identifier: StellarCyberStarlight
-   name: Verify SSL
    default_value: 'False'
    type: boolean
    description: ''
    is_mandatory: true
    integration_identifier: StellarCyberStarlight
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/stellar-cyber-starlight
categories:
- SIEM
- Security
svg_logo_path: resources/logo.svg
image_path: resources/image.png
