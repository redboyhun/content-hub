name: Stellar Cyber Starlight - Security Events Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: _source_event_name
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Root
    default_value: https://{ip}/connect/api/
    type: string
    description: API Root of the Stellar Cyber Starlight instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: Username of the Stellar Cyber Starlight account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Key
    default_value: ''
    type: password
    description: API Key of the Stellar Cyber Starlight account. This parameter was
        used for Basic Authentication. If both “API Key” and “API Token” is provided,
        “API Token” will have priority.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: API Token
    default_value: ''
    type: password
    description: API Token of the Stellar Cyber Starlight account. This parameter
        was used for JWT Authentication. If both “API Key” and “API Token” is provided,
        “API Token” will have priority.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Lowest Severity To Fetch
    default_value: 50
    type: integer
    description: Lowest severity that will be used to fetch events.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Padding Period
    default_value: 0
    type: integer
    description: Padding period (hours) for the connector execution.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Fetch Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        events from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Events To Fetch
    default_value: 50
    type: integer
    description: How many events to process per one connector iteration.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Timestamp Field
    default_value: timestamp
    type: string
    description: 'Field that will be used for managing time in the connector. Supported
        values: timestamp, write_time'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Product Field Fallback
    default_value: ''
    type: string
    description: Specify a comma separated list of incident or alert attributes that
        should be used as a fallback for the "Product Field Name" parameter and "DeviceProduct"
        field in descending order. First attribute will have the highest priority,
        next if its not present or empty in the event - fallback to the next value
        from the list and so on.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Event Field Fallback
    default_value: ''
    type: string
    description: 'Specify a comma separated list of alert attributes that should be
        used as a fallback for the "Event Field Name" parameter in descending order.
        First attribute will have the highest priority, next if it''s not present
        or empty in the event - fallback to the next value from the list and so on.
        Note: this parameter will introduce a new key in the event data called "chronicle_event_type".
        Use this key in the "Event Field Name" parameter to be able to utilize the
        fallback logic.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Stellar Cyber Starlight server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: 'Pull security events from Stellar Cyber Starlight.  Note: dynamic list
    works with the Chronicle SOAR alert name, which can be either “event_category:
    event_name” or “_source_xdr_event_xdr_killchain_stage:_source_xdr_event_name”'
integration: StellarCyberStarlight
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/stellar-cyber-starlight#stellar-cyber-starlight-security-events-connector
rules: []
is_connector_rules_supported: false
creator: admin
