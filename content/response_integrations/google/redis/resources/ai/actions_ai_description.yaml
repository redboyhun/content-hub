Set Key:
  ai_description: >-
    ### General Description

    Sets a value for a specific key in a Redis database. This action allows for the
    creation of new keys or the overwriting of existing ones, regardless of their
    previous data type. It is a utility action for managing state or shared data within
    a Redis instance.


    ### Parameters

    | Parameter Name | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Key Name | The name of the target key in Redis. | String | Yes | If the key
    exists, it will be overwritten. |

    | Value | The data to be stored in the key. | String | Yes | Supports various
    data formats including strings, integers, and serialized objects. |


    ### Flow Description

    1. **Initialization**: Connects to the Redis server using the configured server
    address and port.

    2. **Parameter Extraction**: Retrieves the 'Key Name' and 'Value' provided by
    the user.

    3. **Execution**: Calls the Redis `SET` command via the RedisManager to store
    the value at the specified key.

    4. **Completion**: Returns a success message indicating the value has been set.


    ### Additional Notes

    This action does not process entities and operates directly on the Redis database
    specified in the integration configuration.
