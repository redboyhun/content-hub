Get List:
  ai_description: "### General Description\nThe **Get List** action retrieves all\
    \ elements stored within a specific Redis list. It is primarily used to fetch\
    \ sequential data or queues managed within a Redis database for further processing\
    \ or inspection within a playbook.\n\n### Parameters Description\n| Parameter\
    \ Name | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **List\
    \ Name** | String | Yes | The identifier (key) of the Redis list from which to\
    \ retrieve values. |\n\n### Flow Description\n1. **Connection**: The action initializes\
    \ a connection to the Redis server using the configured server address and port.\n\
    2. **Data Retrieval**: It queries the Redis server to determine the length of\
    \ the list specified by the `List Name` parameter.\n3. **Iteration**: The action\
    \ iterates through each index of the list (from 0 to length-1) using the `LINDEX`\
    \ command to collect all values.\n4. **Output**: \n    * If elements are found,\
    \ they are formatted into a JSON array and returned.\n    * The action provides\
    \ a summary message indicating the total number of elements retrieved.\n    *\
    \ If the list is empty or does not exist, a \"Can not find values\" message is\
    \ returned.\n\n### Additional Notes\n* This action does not interact with SOAR\
    \ entities; it operates solely based on the provided list name.\n* The performance\
    \ of this action depends on the size of the Redis list, as it fetches elements\
    \ individually by index."
