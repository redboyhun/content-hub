    filters_by_modification_time: false
Get Key:
  ai_description: >-
    ### General Description

    This action retrieves the value associated with a specific key from a Redis database.
    It is a read-only operation used to fetch stored data, such as configuration settings,
    session information, or cached threat intelligence, for use in subsequent playbook
    steps.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Key Name | String | Yes | The specific identifier (key) to look up in the Redis
    database. |


    ### Flow Description

    1. **Connection**: The action establishes a connection to the Redis server using
    the configured server address and port.

    2. **Retrieval**: It executes a `GET` command using the provided `Key Name` parameter.

    3. **Processing**: The action checks if a value exists for the given key.

    4. **Output**: If found, the value is returned as a JSON-formatted string and
    the action completes successfully. If the key does not exist, it returns a 'not
    found' message with a null result.


    ### Additional Notes

    - This action does not interact with entities and operates solely based on the
    provided key name.

    - The connection uses database index 0 by default as per the implementation logic.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
