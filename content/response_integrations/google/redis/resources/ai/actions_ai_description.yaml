Add To List:
  ai_description: >-
    ### General Description

    Adds a value to the head of a Redis list. If the list does not exist, it is automatically
    created. This action is primarily used for managing ordered data structures or
    queues within a Redis database.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | List Name | String | Yes | The name of the target Redis list where the value
    will be added. |

    | Value | String | Yes | The value to be inserted into the list. Supports various
    data types including strings, integers, and JSON-formatted strings. |


    ### Flow Description

    1. **Connection**: Establishes a connection to the Redis server using the configured
    server address and port.

    2. **Insertion**: Executes the `LPUSH` command via the Redis manager to add the
    provided `Value` to the beginning (head) of the list specified by `List Name`.

    3. **Retrieval**: Fetches the entire updated list from Redis using the `LINDEX`
    command for each element to provide the current state of the list.

    4. **Output**: Returns the updated list as a JSON result and provides a success
    message to the SOAR platform.


    ### Additional Notes

    This action does not process or filter SecOps entities. It operates directly on
    the Redis database based on the provided parameters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new value to a Redis list using the LPUSH command, which modifies the
      state of the external Redis database.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
