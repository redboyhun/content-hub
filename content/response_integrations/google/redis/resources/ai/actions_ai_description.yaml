Ping:
  ai_description: >-
    ### General Description

    Pings the Redis server to verify connectivity between Google SecOps and the Redis
    instance. This action is primarily used for troubleshooting and ensuring that
    the integration configuration (Server Address and Port) is correct and reachable.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action does not process any entities and is a standard connectivity test.
    It relies on the integration's global configuration for connection details.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the Redis server address
    and port from the integration's global configuration settings.

    2. **Manager Initialization**: It initializes the `RedisManager` using the retrieved
    server address and port.

    3. **Connectivity Test**: It executes the `test_connectivity` method, which sends
    a `PING` command to the Redis server using the underlying Redis client.

    4. **Result Reporting**: If the server responds successfully, the action concludes
    with a success message. If the connection fails or the server is unreachable,
    an exception is raised and reported.
