name: Enrich Entities
description: 'Enrich entities using information from Axonius. Supported entities:
    IP Address, Hostname, Mac Address, User, Email Addresses (User entities that match
    email regex).'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/axonius#enrich_entities
integration_identifier: Axonius
parameters:
-   name: Create Endpoint Insight
    default_value: 'True'
    type: boolean
    description: If enabled, action will create an insight containing information
        about the endpoints.
    is_mandatory: false
-   name: Create User Insight
    default_value: 'True'
    type: boolean
    description: If enabled, action will create an insight containing information
        about the user.
    is_mandatory: false
-   name: Max Notes To Return
    default_value: '50'
    type: string
    description: 'Specify how many notes to show in the case wall table. Default:
        50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS", "MacAddress", "HOSTNAME", "USERUNIQNAME"]}'
