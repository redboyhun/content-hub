Ping:
  ai_description: >-
    Tests the connectivity between Google SecOps and the Axonius server using the
    provided integration configuration parameters. This action is primarily used to
    verify that the API Root, API Key, and API Secret are correct and that the network
    path is open.


    ### Parameters

    There are no action-specific parameters for this action. It relies entirely on
    the integration's global configuration settings (API Root, API Key, API Secret,
    and Verify SSL).


    ### Flow Description

    1. **Configuration Extraction:** Retrieves the API Root, API Key, API Secret,
    and SSL verification settings from the integration configuration.

    2. **Manager Initialization:** Initializes the AxoniusManager with the extracted
    credentials.

    3. **Connectivity Test:** Executes a GET request to the Axonius metadata endpoint
    (`/api/V4.0/settings/meta/about`) to verify the credentials and network connectivity.

    4. **Result Reporting:** Returns a success message if the API responds correctly,
    or an error message detailing the failure if the connection or authentication
    fails.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
