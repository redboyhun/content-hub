Remove Tags:
  ai_description: >-
    Removes specified tags from entities within the Axonius platform. This action
    supports Hostname, IP Address, MAC Address, and User entities (including email
    addresses). It first identifies the internal Axonius IDs for the provided entities
    and then performs a deletion request to remove the designated labels.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    |-----------|------|-----------|-------------|

    | Tags | String | Yes | A comma-separated list of tags that should be removed
    from the identified entities in Axonius. |


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the integration configuration and the list
    of tags to be removed from the action parameters.

    2. **Entity Categorization**: Filters the target entities in the current context,
    identifying supported types: Hostname, IP Address, MAC Address, and User.

    3. **Internal ID Retrieval**: Queries the Axonius API to find the internal Axonius
    IDs for the identified users and devices.

    4. **Tag Removal**: Executes API calls to Axonius to remove the specified tags
    from the found users and devices using their internal IDs.

    5. **Result Reporting**: Provides a summary of entities from which tags were successfully
    removed and lists any entities that could not be processed.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Removes labels (tags) from user and device records within the Axonius asset
      management platform.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
