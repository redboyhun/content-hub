Enrich Entities:
  ai_description: "### General Description\nEnriches multiple entity types including\
    \ IP Addresses, Hostnames, Mac Addresses, and Users using information from the\
    \ Axonius platform. This action retrieves comprehensive asset data, including\
    \ adapter details, labels, and notes, to provide security analysts with deep context\
    \ regarding the entities involved in a case.\n\n### Parameters Description\n|\
    \ Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Create Endpoint Insight | Boolean | No | If enabled (default: True), the action\
    \ will create a case-level insight containing detailed information about the enriched\
    \ endpoints. |\n| Create User Insight | Boolean | No | If enabled (default: True),\
    \ the action will create a case-level insight containing detailed information\
    \ about the enriched users. |\n| Max Notes To Return | Integer | No | Specifies\
    \ the maximum number of notes associated with the entity in Axonius to display\
    \ in the case wall table. Default is 50. |\n\n### Additional Notes\n- The action\
    \ automatically distinguishes between User entities and Email addresses (User\
    \ entities matching email regex) for targeted Axonius queries.\n- Enrichment data\
    \ is mapped to the `AXS` prefix in entity additional properties.\n- Entity links\
    \ are added to the case, directing users to the specific asset report in the Axonius\
    \ UI.\n\n### Flow Description\n1. **Entity Categorization**: The action iterates\
    \ through target entities and categorizes them into Users (usernames or emails),\
    \ IP Addresses, Hostnames, and Mac Addresses.\n2. **Axonius Search**: It performs\
    \ bulk searches in Axonius to find matching internal Axonius IDs for the identified\
    \ entities.\n3. **Detailed Retrieval**: For each matched entity, the action fetches\
    \ detailed information, including adapter data, labels, and recent notes.\n4.\
    \ **Internal Data Mutation**: \n    - Updates entity enrichment fields with retrieved\
    \ attributes.\n    - Adds entity-specific tables and links to the case.\n    -\
    \ Creates data tables for entity notes based on the `Max Notes To Return` parameter.\n\
    5. **Insight Generation**: If configured, it aggregates the findings into case-level\
    \ insights for Users and Endpoints."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity enrichment fields, adds entity links, creates data tables for
      notes, and generates case insights with detailed user and endpoint information.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
