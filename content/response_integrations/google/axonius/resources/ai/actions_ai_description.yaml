Add Note:
  ai_description: >-
    ### General Description

    The **Add Note** action allows users to attach a text-based note to specific entities
    within the Axonius platform. This is useful for documenting investigations, adding
    context to assets, or marking entities for follow-up directly from Google SecOps.
    It supports Hostnames, IP Addresses, MAC Addresses, and User entities (including
    email addresses).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Note** | String | Yes | The specific text content that will be added as a
    note to the identified entities in Axonius. |


    ### Flow Description

    1. **Entity Categorization**: The action iterates through the target entities
    and sorts them into device-related (IP, Hostname, MAC) or user-related (Username,
    Email) categories.

    2. **ID Retrieval**: It queries the Axonius API using the `get_users` or `get_devices`
    methods to retrieve the internal Axonius UUIDs for the matching entities.

    3. **Note Creation**: For every entity successfully matched in Axonius, the action
    sends a POST request to the respective notes endpoint (`/notes`) to append the
    provided text.

    4. **Result Reporting**: The action tracks successes and failures, providing a
    summary message and detailed JSON results for each processed entity.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new note record to the user or device entity in the Axonius database
      via a POST request.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    - MacAddress
    - USERUNIQNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Add Tags:
  ai_description: "### General Description\nThis action adds specific tags to entities\
    \ within the Axonius platform. It supports Hostnames, IP Addresses, MAC Addresses,\
    \ and User entities (including email addresses). The action first identifies the\
    \ internal Axonius IDs for the provided entities and then applies the requested\
    \ tags to those records in the external system.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Tags | String | Yes | A comma-separated list of tags (labels) to be added to\
    \ the identified entities in Axonius. |\n\n### Flow Description\n1. **Parameter\
    \ Extraction**: The action retrieves the comma-separated list of tags from the\
    \ input parameters and the connection details from the integration configuration.\n\
    2. **Entity Filtering**: It iterates through the target entities in the current\
    \ context, filtering for supported types: Hostname, IP Address, MAC Address, and\
    \ User.\n3. **Axonius ID Retrieval**: \n    * For User entities, it queries the\
    \ Axonius API to find matching users by username or email and retrieves their\
    \ internal Axonius IDs.\n    * For Device entities (IP, Hostname, MAC), it queries\
    \ the Axonius API to find matching devices and retrieves their internal Axonius\
    \ IDs.\n4. **Tag Application**: \n    * It performs a PUT request to the Axonius\
    \ `/users/labels` endpoint to add the specified tags to the found user IDs.\n\
    \    * It performs a PUT request to the Axonius `/devices/labels` endpoint to\
    \ add the specified tags to the found device IDs.\n5. **Result Reporting**: The\
    \ action tracks which entities were successfully tagged and which were not found\
    \ or failed, providing a summary message in the action output."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action adds labels (tags) to user and device records in the Axonius platform
      using PUT requests to the labels endpoints.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    - MacAddress
    - USERUNIQNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
