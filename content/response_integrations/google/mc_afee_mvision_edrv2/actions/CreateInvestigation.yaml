name: Create Investigation
description: Create investigations for IP addresses and hostnames.
integration_identifier: McAfeeMvisionEDRV2
parameters:
-   name: Case Type
    default_value: IOC
    type: ddl
    optional_values:
    - Malware
    - Network
    - IOC
    description: Defines the type of alert.
    is_mandatory: true
-   name: Priority
    default_value: Low
    type: ddl
    optional_values:
    - High
    - Medium
    - Low
    description: Assigns a priority to the investigation.
    is_mandatory: true
-   name: Hint
    default_value: ''
    type: string
    description: Automatically links related investigations and avoids creating many
        cases from multiple alerts related to the same incident. If the same hint
        is used, the evidences will be added to the already existing investigation.
    is_mandatory: false
-   name: Name
    default_value: ''
    type: string
    description: Gives the investigation a meaningful name. If the name is missing,
        a default case name is assigned.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_investigation_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
is_custom: true
