Create Investigation:
  ai_description: >-
    ### General Description

    This action creates new investigations in McAfee Mvision EDR V2 for specific entities,
    specifically IP addresses and hostnames. It allows security analysts to programmatically
    initiate guided investigations within the McAfee platform, providing metadata
    such as priority, case type, and naming conventions to organize the response effort.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Case Type** | String | Yes | Defines the category of the alert. Supported
    values include `Malware`, `Network`, and `IOC`. |

    | **Priority** | String | Yes | Assigns a severity level to the investigation.
    Supported values are `High`, `Medium`, and `Low`. |

    | **Hint** | String | No | A unique identifier used to automatically link related
    investigations. If an investigation with the same hint already exists, evidence
    is added to that case instead of creating a new one. |

    | **Name** | String | No | A custom name for the investigation. If left blank,
    a default name ('Siemplify Investigation') is used. |


    ### Additional Notes

    - The action includes a built-in 10-second delay between processing entities when
    a **Hint** is provided to prevent triggering API rate limits (429 errors) on the
    McAfee side.

    - Supported entity types are limited to IP Addresses and Hostnames.


    ### Flow Description

    1. **Authentication**: The action retrieves credentials (API Key, Client ID/Secret)
    and obtains an OAuth token from the McAfee IAM service.

    2. **Entity Filtering**: It iterates through the target entities in the Google
    SecOps case, filtering for `ADDRESS` (IP) and `HOSTNAME` types.

    3. **Investigation Creation**: For each valid entity, it sends a POST request
    to the McAfee EDR API (`/edr/v2/investigations`) containing the investigation
    details (name, priority, type, and the entity identifier as evidence).

    4. **Result Processing**: It captures the unique Investigation ID and metadata
    returned by McAfee.

    5. **Output Generation**: The action populates a data table with the investigation
    details and attaches the raw JSON response for each entity to the action results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new investigation resource (case) within the McAfee Mvision EDR platform
      for each processed entity.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description\n\nThe **Ping** action is a diagnostic utility designed
    to verify the connectivity and authentication between Google SecOps and the McAfee
    Mvision EDR V2 platform. It ensures that the integration is correctly configured
    and that the system can successfully communicate with the McAfee API endpoints.\n\n###
    Parameters Description\n\n| Parameter Name | Type | Mandatory | Description |\n|
    :--- | :--- | :--- | :--- |\n| N/A | N/A | N/A | This action does not have any
    input parameters. It relies on the integration's global configuration settings.
    |\n\n### Additional Notes\n\n- This action utilizes the integration's configuration
    parameters, including API Root, IAM Root, Client ID, Client Secret, API Key, and
    Scopes.\n- It is primarily used for initial setup verification and troubleshooting
    connectivity issues.\n\n### Flow Description\n\n1. **Parameter Extraction**: The
    action retrieves the integration's global configuration parameters.\n2. **Manager
    Initialization**: It initializes the McAfee Mvision EDR V2 manager class.\n3.
    **Authentication Check**: During initialization, the manager attempts to retrieve
    an OAuth access token from the IAM service using the provided credentials via
    a GET request.\n4. **Connectivity Confirmation**: If the token is successfully
    retrieved, the action confirms that the connection is established and reports
    success.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
